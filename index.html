<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
  <!-- PWA -->
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#0c1010">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="BodyLens">
  <link rel="apple-touch-icon" href="/icons/icon-180.png">
  <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png">
<title>BodyLens</title>
</head>
<body>
<script>
try {
  const p = localStorage.getItem('bl_profile');
  const ok = p && JSON.parse(p) && JSON.parse(p).name;
  location.replace(ok ? 'bodylens-dailyplan.html' : 'bodylens-onboard.html');
} catch(e) {
  location.replace('bodylens-onboard.html');
}
</script>

<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js', { scope: '/' })
      .then(reg => {
        window.__SW_REG = reg;
        // Check for updates silently
        reg.addEventListener('updatefound', () => {
          const newWorker = reg.installing;
          newWorker.addEventListener('statechange', () => {
            if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
              newWorker.postMessage({ type: 'SKIP_WAITING' });
            }
          });
        });
      })
      .catch(err => console.warn('[BodyLens] SW registration failed:', err));
  });
}
</script>
</body>
</html>
