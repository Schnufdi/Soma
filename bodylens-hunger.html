<link rel="stylesheet" href="style.css">

</head>
<body>

<nav class="site-nav">
  <div class="nav-brand">Body<em>Lens</em></div>
  <div class="nav-links">
    <a class="nav-link nav-daily" href="bodylens-day.html">Today</a>

  <div class="nav-breadcrumb">

    <span class="nav-bc-sep">›</span>
    <span class="nav-bc-current">Hunger</span>
  </div>
  <div class="nav-meta" id="nav-meta"></div>
</nav>

<div id="page-hero" style="max-width:900px;margin:0 auto;padding:48px 32px 32px;border-bottom:1px solid rgba(255,255,255,0.07);">
  <div style="font-size:10px;font-weight:600;letter-spacing:0.2em;text-transform:uppercase;color:#00c8a0;margin-bottom:12px;display:flex;align-items:center;gap:10px;">
    <span style="width:18px;height:1px;background:#00c8a0;display:inline-block;"></span>
    Hunger
  </div>
  <div style="font-family:'Cormorant Garamond',serif;font-size:56px;font-weight:300;line-height:0.93;letter-spacing:-0.025em;color:#e8e3da;margin-bottom:14px;">
    Hunger<br><em style="font-style:italic;color:#3e504a;">yours.</em>
  </div>
  <div id="hero-sub" style="font-size:14px;font-weight:300;color:#8a9490;line-height:1.7;max-width:480px;">Why you eat the way you do.</div>
</div>

<div style="max-width:900px;margin:0 auto;padding:40px 32px 120px;" id="generated-content"></div>

<script src="nav.js"></script>
<script>
(function(){
  const profile = getProfile();
  if (!profile) {
    document.getElementById('generated-content').innerHTML = `
      <div style="text-align:center;padding:80px 24px;">
        <div style="font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:300;color:#e8e3da;margin-bottom:10px;">No profile yet</div>
        <div style="font-size:13px;font-weight:300;color:#8a9490;margin-bottom:24px;">Complete onboarding to see your personalised content.</div>
        <a href="bodylens-onboard.html" style="display:inline-block;padding:12px 24px;background:#00c8a0;border-radius:6px;font-size:12px;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;color:#0c1010;text-decoration:none;">Get started →</a>
      </div>`;
    return;
  }

  document.getElementById('nav-meta').innerHTML = `<span class="nav-tag nt-jade">${profile.name}</span>`;
  document.getElementById('hero-sub').textContent = profile.name + " · " + (profile.goal||'') + (profile.sex?' · '+profile.sex:'');

  const regen = document.createElement('button');
  regen.textContent = '↺ Regenerate';
  regen.style.cssText = 'margin-top:12px;background:transparent;border:1px solid rgba(255,255,255,0.13);color:#3e504a;padding:6px 14px;border-radius:4px;font-size:10px;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;cursor:pointer;font-family:var(--sans);display:block;';
  regen.onclick = () => { BL_GENERATOR.clearCache('hunger', profile); location.reload(); };
  document.getElementById('page-hero').appendChild(regen);

  const container = document.getElementById('generated-content');
  BL_GENERATOR.generate(
    'hunger',
    profile,
    (loading) => { container.innerHTML = loading; },
    (html)    => { container.innerHTML = html; },
    (err)     => {
      console.error(err);
      console.error('Page generation error:', err);
      container.innerHTML = '<div style="padding:40px 0;text-align:center;color:#8a9490;font-size:13px;">Could not generate content: ' + (err||'unknown error') + '. <button onclick="BL_GENERATOR.clearCache(\'' + 'hunger' + '\', getProfile()); location.reload()" style="color:#00c8a0;background:none;border:none;cursor:pointer;font-size:13px;text-decoration:underline;">Try again</button></div>';
    }
  );
})();
</script>
</body>
</html>
