<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#0c1010">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Soma">
<link rel="apple-touch-icon" href="/icons/icon-180.png">
<link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta name="bl-page" content="profile">
<title>Soma — Profile</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=Space+Grotesk:wght@300;400;500;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
body { background:var(--ink); color:var(--dk-1); }
.page { max-width:900px; margin:0 auto; padding:0 24px 80px; }

/* Hero */
.prof-hero { padding:48px 0 36px; border-bottom:1px solid var(--bd); margin-bottom:36px; display:grid; grid-template-columns:1fr auto; gap:32px; align-items:end; }
.prof-kicker { font-size:10px; font-weight:600; letter-spacing:0.2em; text-transform:uppercase; color:var(--jade); margin-bottom:10px; display:flex; align-items:center; gap:10px; }
.prof-kicker::before { content:''; width:18px; height:1px; background:var(--jade); }
.prof-name { font-family:var(--serif); font-size:64px; font-weight:300; line-height:0.92; letter-spacing:-0.03em; color:var(--dk-1); }
.prof-goal { font-size:14px; font-weight:300; color:var(--dk-2); line-height:1.6; margin-top:12px; max-width:440px; }

/* Benchmarks */
.prof-benchmarks { display:grid; grid-template-columns:repeat(5,1fr); gap:1px; background:var(--bd); border:1px solid var(--bd); border-radius:6px; overflow:hidden; }
.prof-bm { background:var(--ink-2); padding:16px 12px; text-align:center; }
.prof-bm-val { font-family:var(--mono); font-size:24px; font-weight:500; color:var(--jade); line-height:1; margin-bottom:5px; }
.prof-bm-val.amber { color:var(--amber); }
.prof-bm-val.slate { color:var(--dk-2); }
.prof-bm-val.red   { color:var(--red); }
.prof-bm-label { font-size:9px; font-weight:600; letter-spacing:0.1em; text-transform:uppercase; color:var(--dk-3); }

/* Sections */
.prof-grid { display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-bottom:24px; }
.prof-card { background:var(--ink-2); border:1px solid var(--bd); border-radius:6px; overflow:hidden; }
.prof-card.full { grid-column:1/-1; }
.prof-card.jade  { border-top:3px solid var(--jade); }
.prof-card.amber { border-top:3px solid var(--amber); }
.prof-card.gold  { border-top:3px solid var(--gold); }
.prof-card.red   { border-top:3px solid var(--red); }
.prof-card.slate { border-top:3px solid var(--slate); }
.prof-card-head { padding:14px 18px; background:var(--ink-1); border-bottom:1px solid var(--bd); display:flex; align-items:center; gap:8px; }
.prof-card-icon { font-size:14px; }
.prof-card-title { font-size:10px; font-weight:600; letter-spacing:0.1em; text-transform:uppercase; color:var(--dk-3); flex:1; }
.prof-card.jade  .prof-card-title { color:var(--jade); }
.prof-card.amber .prof-card-title { color:var(--amber); }
.prof-card.gold  .prof-card-title { color:var(--gold); }
.prof-card.red   .prof-card-title { color:var(--red); }
.prof-row { display:flex; justify-content:space-between; align-items:baseline; padding:10px 18px; border-bottom:1px solid var(--bd); font-size:12px; gap:12px; }
.prof-row:last-child { border-bottom:none; }
.prof-row-label { font-weight:400; color:var(--dk-3); flex-shrink:0; }
.prof-row-val   { font-weight:500; color:var(--dk-1); text-align:right; line-height:1.4; }
.prof-row-val.jade  { color:var(--jade); }
.prof-row-val.amber { color:var(--amber); }
.prof-row-val.red   { color:var(--red); }

/* Edit button in card header */
.prof-edit-btn {
  font-size:9px; font-weight:600; letter-spacing:0.08em; text-transform:uppercase;
  color:var(--dk-3); border:1px solid var(--bd-2); background:transparent;
  padding:4px 10px; border-radius:4px; cursor:pointer; font-family:var(--sans);
  transition:all 0.12s; white-space:nowrap;
}
.prof-edit-btn:hover { border-color:var(--jade-br); color:var(--jade); }

/* Injury card */
.prof-injury { padding:14px 18px; border-bottom:1px solid var(--bd); border-left:3px solid var(--gold); margin-left:-1px; }
.prof-injury:last-child { border-bottom:none; }
.prof-injury-loc { font-size:12px; font-weight:600; color:var(--gold); margin-bottom:4px; }
.prof-injury-text { font-size:12px; font-weight:300; color:var(--dk-2); line-height:1.65; }
.prof-injury-rules { margin-top:8px; font-size:11px; font-weight:300; color:var(--dk-3); line-height:1.65; }

/* Supplement table */
.supp-row { display:grid; grid-template-columns:1fr 80px 120px; padding:10px 18px; border-bottom:1px solid var(--bd); font-size:12px; gap:12px; align-items:baseline; }
.supp-row:last-child { border-bottom:none; }
.supp-row.head { background:var(--ink-1); }
.supp-row.head div { font-size:9px; font-weight:600; letter-spacing:0.1em; text-transform:uppercase; color:var(--dk-3); }
.supp-name { font-weight:500; color:var(--dk-1); }
.supp-dose { font-family:var(--mono); font-weight:300; color:var(--amber); }
.supp-time { font-weight:300; color:var(--dk-3); }

/* Coach summary */
.prof-coach-summary { padding:20px 18px; font-family:var(--serif); font-size:16px; font-weight:300; font-style:italic; line-height:1.82; color:var(--dk-2); border-left:2px solid var(--jade-br); margin:4px 0; }

/* Laws */
.prof-law { padding:16px 18px; border-bottom:1px solid var(--bd); }
.prof-law:last-child { border-bottom:none; }
.prof-law-num { font-family:var(--serif); font-size:28px; font-weight:300; color:var(--jade); opacity:0.4; float:left; margin-right:12px; line-height:1; }
.prof-law-text { font-size:13px; font-weight:500; color:var(--dk-1); margin-bottom:4px; }
.prof-law-why  { font-size:12px; font-weight:300; color:var(--dk-2); line-height:1.65; clear:both; }

/* No profile */
.no-profile { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:60vh; text-align:center; padding:48px 24px; gap:14px; }
.no-profile h2 { font-family:var(--serif); font-size:30px; font-weight:300; color:var(--dk-1); }
.no-profile p  { font-size:14px; font-weight:300; color:var(--dk-2); max-width:360px; line-height:1.7; }
.no-profile a  { display:inline-block; padding:12px 28px; background:var(--jade); border-radius:6px; font-size:13px; font-weight:600; letter-spacing:0.06em; text-transform:uppercase; color:var(--ink); text-decoration:none; }

/* ── EDIT MODAL ── */
.edit-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 9000;
  display: flex; align-items: flex-end; justify-content: center;
  opacity: 0; pointer-events: none; transition: opacity 0.2s;
}
.edit-overlay.open { opacity: 1; pointer-events: all; }
.edit-drawer {
  background: var(--ink-2); border: 1px solid var(--bd-2);
  border-radius: 16px 16px 0 0; width: 100%; max-width: 640px;
  max-height: 90vh; overflow-y: auto;
  transform: translateY(40px); transition: transform 0.25s ease;
  padding-bottom: env(safe-area-inset-bottom, 0);
}
.edit-overlay.open .edit-drawer { transform: translateY(0); }
.edit-drawer-handle { width: 36px; height: 4px; background: var(--bd-2); border-radius: 2px; margin: 14px auto 0; }
.edit-drawer-head { padding: 18px 24px 14px; border-bottom: 1px solid var(--bd); display: flex; align-items: center; gap: 10px; }
.edit-drawer-title { font-size: 13px; font-weight: 600; color: var(--dk-1); flex: 1; }
.edit-drawer-close { background: transparent; border: none; color: var(--dk-3); font-size: 20px; cursor: pointer; padding: 0; line-height: 1; }
.edit-drawer-body { padding: 24px; display: flex; flex-direction: column; gap: 20px; }
.edit-field { display: flex; flex-direction: column; gap: 6px; }
.edit-label { font-size: 10px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: var(--dk-3); }
.edit-input {
  background: var(--ink-1); border: 1px solid var(--bd-2); border-radius: 6px;
  padding: 11px 14px; font-size: 15px; font-weight: 300; color: var(--dk-1);
  font-family: var(--sans); outline: none; width: 100%;
  transition: border-color 0.15s; box-sizing: border-box;
  -moz-appearance: textfield;
}
.edit-input::-webkit-inner-spin-button,
.edit-input::-webkit-outer-spin-button { -webkit-appearance: none; }
.edit-input:focus { border-color: var(--jade-br); }
.edit-input::placeholder { color: var(--dk-3); font-size: 13px; }
.edit-textarea {
  background: var(--ink-1); border: 1px solid var(--bd-2); border-radius: 6px;
  padding: 11px 14px; font-size: 13px; font-weight: 300; color: var(--dk-1);
  font-family: var(--sans); outline: none; width: 100%; resize: none;
  transition: border-color 0.15s; box-sizing: border-box; line-height: 1.6;
}
.edit-textarea:focus { border-color: var(--jade-br); }
.edit-chips { display: flex; flex-wrap: wrap; gap: 8px; }
.edit-chip {
  padding: 8px 14px; background: var(--ink-1); border: 1px solid var(--bd-2);
  border-radius: 20px; font-size: 12px; font-weight: 400; color: var(--dk-2);
  cursor: pointer; transition: all 0.1s; font-family: var(--sans); user-select: none;
  -webkit-tap-highlight-color: transparent;
}
.edit-chip:hover { border-color: var(--jade-br); color: var(--jade); }
.edit-chip.sel { background: var(--jade-dim); border-color: var(--jade-br); color: var(--jade); font-weight: 500; }
.edit-chip.sel-solid { background: var(--jade); border-color: var(--jade); color: var(--ink); font-weight: 600; }
.edit-hint { font-size: 11px; font-weight: 300; color: var(--dk-3); line-height: 1.5; }
.edit-footer { padding: 0 24px 28px; display: flex; gap: 10px; }
.edit-save-btn {
  flex: 1; background: var(--jade); color: var(--ink); border: none;
  padding: 14px; border-radius: 6px; font-size: 13px; font-weight: 600;
  letter-spacing: 0.04em; text-transform: uppercase; cursor: pointer;
  font-family: var(--sans); transition: background 0.15s;
}
.edit-save-btn:hover { background: var(--jade-hi); }
.edit-cancel-btn {
  background: transparent; color: var(--dk-3); border: 1px solid var(--bd-2);
  padding: 14px 20px; border-radius: 6px; font-size: 13px; font-weight: 500;
  cursor: pointer; font-family: var(--sans); transition: border-color 0.15s;
}
.edit-cancel-btn:hover { border-color: var(--dk-3); }
.edit-saved-flash {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
  background: var(--jade); color: var(--ink); padding: 10px 22px;
  border-radius: 6px; font-size: 12px; font-weight: 600; letter-spacing: 0.06em;
  text-transform: uppercase; z-index: 9999; opacity: 0;
  transition: opacity 0.2s; pointer-events: none;
}
.edit-saved-flash.show { opacity: 1; }

@media(max-width:860px) {
  .prof-hero { grid-template-columns:1fr; gap:20px; }
  .prof-benchmarks { grid-template-columns:repeat(3,1fr); }
  .prof-grid { grid-template-columns:1fr; }
  .prof-card.full { grid-column:1; }
}
@media(max-width:600px) {
  .page { padding:0 16px 60px; }
  .prof-name { font-size:44px; }
  .prof-benchmarks { grid-template-columns:repeat(2,1fr); }
  .supp-row { grid-template-columns:1fr 70px; }
  .supp-time { display:none; }
}
</style>
</head>
<body>

<nav class="site-nav"></nav>

<div class="page" id="main"></div>

<!-- Edit modal -->
<div class="edit-overlay" id="edit-overlay" onclick="handleOverlayClick(event)">
  <div class="edit-drawer" id="edit-drawer">
    <div class="edit-drawer-handle"></div>
    <div class="edit-drawer-head">
      <div class="edit-drawer-title" id="edit-drawer-title">Edit</div>
      <button class="edit-drawer-close" onclick="closeEdit()">×</button>
    </div>
    <div class="edit-drawer-body" id="edit-drawer-body"></div>
    <div class="edit-footer">
      <button class="edit-cancel-btn" onclick="closeEdit()">Cancel</button>
      <button class="edit-save-btn" id="edit-save-btn">Save changes</button>
    </div>
  </div>
</div>

<div class="edit-saved-flash" id="edit-saved-flash">Saved</div>

<script src="nav.js"></script>
<script>
// ── PROFILE ──────────────────────────────────────────────
function loadProfile() {
  try { return JSON.parse(localStorage.getItem('bl_profile') || 'null'); } catch(e) { return null; }
}
function saveProfile(p) {
  p.lastModified = new Date().toISOString();
  localStorage.setItem('bl_profile', JSON.stringify(p));
}

// ── CHANGE TRACKING ───────────────────────────────────────
var CHANGE_LABELS = {
  weight:'Weight', bodyFat:'Body fat %', wakeTime:'Wake time',
  calories:'Calories', protein:'Protein (g)', carbs:'Carbs (g)', fat:'Fat (g)',
  trainingDays:'Training days/week', sleep:'Sleep', alcoholHabit:'Alcohol habit',
  goal:'Goal', target:'Target',
  stressLevel:'Stress level', energyPattern:'Energy pattern',
  activityLevel:'Activity level', caffeineHabits:'Caffeine habits',
  sleepQuality:'Sleep quality', bedtime:'Bedtime', dietHistory:'Diet history',
  gymAccess:'Gym access', freeWeightComfort:'Free weight comfort',
  trainingTime:'Training time', cookingApproach:'Cooking approach', triggerFoods:'Trigger foods',
};
var CHANGE_ARRAY_LABELS = {
  equipmentUsed:'Equipment used', cuisinePrefs:'Cuisine preferences',
  healthConditions:'Health conditions', injuries:'Injuries', nonNegotiables:'Non-negotiables',
};
function recordChanges(oldP, newP) {
  var changes = [];
  var ts = new Date().toISOString();
  Object.keys(CHANGE_LABELS).forEach(function(field) {
    var o = oldP[field] != null ? String(oldP[field]) : '';
    var n = newP[field] != null ? String(newP[field]) : '';
    if (o !== n && n) changes.push({ field:field, label:CHANGE_LABELS[field], old:o||'—', 'new':n, ts:ts });
  });
  Object.keys(CHANGE_ARRAY_LABELS).forEach(function(field) {
    var o = (oldP[field]||[]).join(', ') || '—';
    var n = (newP[field]||[]).join(', ') || '—';
    if (o !== n) changes.push({ field:field, label:CHANGE_ARRAY_LABELS[field], old:o, 'new':n, ts:ts });
  });
  if (!changes.length) return;
  var existing = [];
  try { existing = JSON.parse(localStorage.getItem('bl_profile_changes')||'[]'); } catch(e) {}
  var byField = {};
  existing.forEach(function(c) { byField[c.field] = c; });
  changes.forEach(function(c) { byField[c.field] = c; });
  localStorage.setItem('bl_profile_changes', JSON.stringify(Object.values(byField)));
}

var currentSection = null;

const profile = loadProfile();

if (!profile) {
  document.getElementById('main').innerHTML = `
    <div class="no-profile">
      <div style="font-size:44px;">👤</div>
      <h2>No profile yet</h2>
      <p>Complete the onboarding and your full profile will appear here.</p>
      <a href="bodylens-onboard.html">Get started →</a>
    </div>`;
} else {
  render(loadProfile());
}

// ── RENDER ────────────────────────────────────────────────
function render(p) {
  const injuries     = p.injuryAssessments || [];
  const supps        = p.supplements || [];
  const weekPlan     = p.weekPlan || [];
  const trainingDays = weekPlan.filter(d=>d.priority==='training').map(d=>d.day).join(', ');
  const genDate      = p.generatedAt ? new Date(p.generatedAt).toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'}) : '—';
  const healthConds  = Array.isArray(p.healthConditions)
    ? p.healthConditions.join(', ')
    : (p.healthConditions || '');

  document.getElementById('main').innerHTML = `
    <!-- Hero -->
    <div class="prof-hero">
      <div>
        <div class="prof-kicker">Performance profile</div>
        <div class="prof-name">${p.name || 'Profile'}</div>
        <div class="prof-goal">${p.goal || ''} ${p.target ? '— ' + p.target : ''}</div>
      </div>
      <div style="text-align:right;">
        <div style="font-size:10px;font-weight:300;color:var(--dk-3);">Generated ${genDate}</div>
        <a href="bodylens-reset.html" style="display:inline-block;margin-top:8px;font-size:10px;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;color:var(--dk-3);border:1px solid var(--bd-2);padding:6px 14px;border-radius:4px;text-decoration:none;">Reset profile</a>
      </div>
    </div>

    <!-- Update note / pending changes -->
    ${(function(){
      var _pc = [];
      try { _pc = JSON.parse(localStorage.getItem('bl_profile_changes')||'[]'); } catch(e) {}
      if (_pc.length) {
        var rows = _pc.map(function(c){
          return '<div style="display:flex;gap:12px;align-items:baseline;padding:6px 0;border-bottom:1px solid rgba(0,200,160,0.08);">'
            +'<span style="font-size:11px;font-weight:600;color:var(--dk-2);min-width:140px;flex-shrink:0;">'+c.label+'</span>'
            +'<span style="font-size:11px;color:var(--dk-3);text-decoration:line-through;flex-shrink:0;">'+c.old+'</span>'
            +'<span style="font-size:11px;color:var(--dk-3);">→</span>'
            +'<span style="font-size:11px;font-weight:500;color:var(--jade);">'+c['new']+'</span>'
            +'</div>';
        }).join('');
        return '<div style="background:rgba(0,200,160,0.03);border:1px solid var(--jade-br);border-radius:6px;padding:14px 18px;margin-bottom:20px;">'
          +'<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">'
          +'<span style="font-size:10px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--jade);">⚡ '+_pc.length+' update'+ (_pc.length>1?'s':'')+' since last programme</span>'
          +'<a href="/bodylens-regen.html" style="font-size:11px;font-weight:600;color:var(--jade);text-decoration:none;border:1px solid var(--jade-br);padding:4px 12px;border-radius:4px;">Review & regenerate →</a>'
          +'</div>'
          +rows
          +'</div>';
      }
      return '<div style="background:rgba(200,148,30,0.04);border:1px solid rgba(200,148,30,0.18);border-radius:6px;padding:12px 18px;margin-bottom:28px;display:flex;align-items:baseline;gap:12px;">'
        +'<span style="font-size:10px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--amber);flex-shrink:0;">Profile data</span>'
        +'<span style="font-size:12px;font-weight:300;color:var(--dk-2);line-height:1.6;">All onboarding inputs are shown below. Edit any section as things change — updates save instantly. To apply changes to your programme use <a href="/bodylens-regen.html" style="color:var(--jade);">Regenerate programme</a>.</span>'
        +'</div>';
    })()}

    <!-- Benchmarks -->
    <div class="prof-benchmarks" style="margin-bottom:32px;">
      <div class="prof-bm">
        <div class="prof-bm-val">${p.age||'—'}</div>
        <div class="prof-bm-label">Age</div>
      </div>
      <div class="prof-bm">
        <div class="prof-bm-val slate">${p.weight||'—'}kg</div>
        <div class="prof-bm-label">Weight</div>
      </div>
      <div class="prof-bm">
        <div class="prof-bm-val jade">${p.bodyFat||'—'}%</div>
        <div class="prof-bm-label">Body fat</div>
      </div>
      <div class="prof-bm">
        <div class="prof-bm-val amber">${p.calories||'—'}</div>
        <div class="prof-bm-label">Kcal/day</div>
      </div>
      <div class="prof-bm">
        <div class="prof-bm-val jade">${p.protein||'—'}g</div>
        <div class="prof-bm-label">Protein</div>
      </div>
    </div>

    ${p.coachSummary ? `
    <div class="prof-card full jade" style="margin-bottom:16px;">
      <div class="prof-card-head"><div class="prof-card-icon">🎯</div><div class="prof-card-title">Coach's read</div></div>
      <div class="prof-coach-summary">${p.coachSummary}</div>
    </div>` : ''}

    <div class="prof-grid">

      <!-- Baseline -->
      <div class="prof-card slate">
        <div class="prof-card-head">
          <div class="prof-card-icon">👤</div>
          <div class="prof-card-title">Baseline</div>
          <button class="prof-edit-btn" onclick="openEdit('baseline')">✏ Edit</button>
        </div>
        <div class="prof-row"><span class="prof-row-label">Age / Sex</span><span class="prof-row-val">${p.age||'—'} · ${p.sex||'—'}</span></div>
        <div class="prof-row"><span class="prof-row-label">Height</span><span class="prof-row-val">${p.height||'—'} cm</span></div>
        <div class="prof-row"><span class="prof-row-label">Weight</span><span class="prof-row-val">${p.weight||'—'} kg</span></div>
        <div class="prof-row"><span class="prof-row-label">Body fat</span><span class="prof-row-val jade">${p.bodyFat||'—'}%</span></div>
        <div class="prof-row"><span class="prof-row-label">Experience</span><span class="prof-row-val">${p.experience||p.exp||'—'}</span></div>
        <div class="prof-row"><span class="prof-row-label">Wake time</span><span class="prof-row-val">${p.wakeTime||'—'}</span></div>
      </div>

      <!-- Nutrition -->
      <div class="prof-card amber">
        <div class="prof-card-head">
          <div class="prof-card-icon">🥗</div>
          <div class="prof-card-title amber">Nutrition</div>
          <button class="prof-edit-btn" onclick="openEdit('nutrition')">✏ Edit</button>
        </div>
        <div class="prof-row"><span class="prof-row-label">Calories</span><span class="prof-row-val amber">${p.calories||'—'} kcal</span></div>
        <div class="prof-row"><span class="prof-row-label">Protein</span><span class="prof-row-val jade">${p.protein||'—'}g</span></div>

function closeEdit() {
  document.getElementById('edit-overlay').classList.remove('open');
  currentSection = null;
}

function handleOverlayClick(e) {
  if (e.target === document.getElementById('edit-overlay')) closeEdit();
}

function singleChip(el, group) {
  el.closest('.edit-chips').querySelectorAll('.edit-chip').forEach(c => {
    c.classList.remove('sel','sel-solid');
  });
  el.classList.add('sel-solid');
}

function toggleChip(el) {
  el.classList.toggle('sel');
}

function saveEdit(section) {
  var p = loadProfile();
  var _snap = JSON.parse(JSON.stringify(p)); // snapshot before edits

  if (section === 'baseline') {
    var w = parseFloat(document.getElementById('ed-weight').value);
    var bf = parseFloat(document.getElementById('ed-bf').value);
    var wakeChip = document.querySelector('[data-wake].sel-solid');
    if (w && w > 0) p.weight = w;
    if (bf && bf > 0) p.bodyFat = bf;
    if (wakeChip) p.wakeTime = wakeChip.dataset.wake;

  } else if (section === 'nutrition') {
    var cal = parseInt(document.getElementById('ed-calories').value);
    var pro = parseInt(document.getElementById('ed-protein').value);
    var carb = parseInt(document.getElementById('ed-carbs').value);
    var fat = parseInt(document.getElementById('ed-fat').value);
    if (cal > 0) p.calories = cal;
    if (pro > 0) p.protein = pro;
    if (carb > 0) p.carbs = carb;
    if (fat > 0) p.fat = fat;

  } else if (section === 'training') {
    var daysChip = document.querySelector('[data-days].sel-solid');
    var sleepChip = document.querySelector('[data-sleep].sel-solid');
    var alcChip = document.querySelector('[data-alcohol].sel-solid');
    if (daysChip) p.trainingDays = parseInt(daysChip.dataset.days);
    if (sleepChip) p.sleep = sleepChip.dataset.sleep;
    if (alcChip) p.alcoholHabit = alcChip.dataset.alcohol;

  } else if (section === 'goals') {
    var goalChip = document.querySelector('[data-goal].sel-solid');
    var target = document.getElementById('ed-target').value.trim();
    if (goalChip) p.goal = goalChip.dataset.goal;
    if (target) p.target = target;

  } else if (section === 'lifestyle') {
    var stressChip    = document.querySelector('[data-stress].sel-solid');
    var energyChip    = document.querySelector('[data-energy].sel-solid');
    var activityChip  = document.querySelector('[data-activity].sel-solid');
    var caffeineChip  = document.querySelector('[data-caffeine].sel-solid');
    var sleepqChip    = document.querySelector('[data-sleepq].sel-solid');
    var bedtimeChip   = document.querySelector('[data-bedtime].sel-solid');
    var dietHist      = document.getElementById('ed-diet-history').value.trim();
    if (stressChip)   p.stressLevel    = stressChip.dataset.stress;
    if (energyChip)   p.energyPattern  = energyChip.dataset.energy;
    if (activityChip) p.activityLevel  = activityChip.dataset.activity;
    if (caffeineChip) p.caffeineHabits = caffeineChip.dataset.caffeine;
    if (sleepqChip)   p.sleepQuality   = sleepqChip.dataset.sleepq;
    if (bedtimeChip)  p.bedtime        = bedtimeChip.dataset.bedtime;
    if (dietHist)     p.dietHistory    = dietHist;

  } else if (section === 'equip-food') {
    var equipSel    = Array.from(document.querySelectorAll('[data-equip].sel')).map(c => c.dataset.equip);
    var traintimeChip = document.querySelector('[data-traintime].sel-solid');
    var fwcChip     = document.querySelector('[data-fwc].sel-solid');
    var cookingChip = document.querySelector('[data-cooking].sel-solid');
    var cuisineSel  = Array.from(document.querySelectorAll('[data-cuisine].sel')).map(c => c.dataset.cuisine);
    var triggers    = document.getElementById('ed-triggers').value.trim();
    if (equipSel.length)  p.equipmentUsed    = equipSel;
    if (traintimeChip)    p.trainingTime     = traintimeChip.dataset.traintime;
    if (fwcChip)          p.freeWeightComfort = fwcChip.dataset.fwc;
    if (cookingChip)      p.cookingApproach  = cookingChip.dataset.cooking;
    if (cuisineSel.length) p.cuisinePrefs    = cuisineSel;
    if (triggers)         p.triggerFoods     = triggers;

  } else if (section === 'health') {
    // Conditions
    var selConds = Array.from(document.querySelectorAll('[data-cond].sel')).map(c => c.dataset.cond);
    p.healthConditions = selConds;
    // Injuries
    var selInj = Array.from(document.querySelectorAll('[data-inj].sel')).map(c => c.dataset.inj);
    p.injuries = selInj;
    var injDetail = document.getElementById('ed-inj-detail').value.trim();
    if (injDetail) p.injuryDetail = injDetail;
    // Hormonal
    var horChip = document.querySelector('[data-hormonal].sel-solid');
    if (horChip) {
      p.menstrualCycle = horChip.dataset.hormonal;
      p.hormonalStatus = horChip.dataset.hormonal;
    }
  }

  recordChanges(_snap, p);
  saveProfile(p);
  closeEdit();
  render(loadProfile());
  flashSaved();
}

function flashSaved() {
  var el = document.getElementById('edit-saved-flash');
  el.classList.add('show');
  setTimeout(function() { el.classList.remove('show'); }, 1800);
}
</script>
</body>
</html>
