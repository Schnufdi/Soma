<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Soma — Reset</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #0c1010;
  color: #e8e3da;
  font-family: 'Space Grotesk', sans-serif;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
}
.card {
  background: #131918;
  border: 1px solid rgba(255,255,255,0.07);
  border-radius: 8px;
  padding: 40px 36px;
  max-width: 420px;
  width: 100%;
  text-align: center;
}
.icon { font-size: 36px; margin-bottom: 16px; }
h2 {
  font-size: 22px;
  font-weight: 400;
  margin-bottom: 10px;
  color: #e8e3da;
}
p {
  font-size: 13px;
  font-weight: 300;
  color: #8a9490;
  line-height: 1.7;
  margin-bottom: 28px;
}
.btn {
  display: block;
  width: 100%;
  padding: 14px;
  background: #d94e35;
  border: none;
  border-radius: 6px;
  font-family: 'Space Grotesk', sans-serif;
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: #0c1010;
  cursor: pointer;
  margin-bottom: 10px;
  transition: opacity 0.15s;
}
.btn:hover { opacity: 0.85; }
.btn-ghost {
  background: transparent;
  border: 1px solid rgba(255,255,255,0.13);
  color: #8a9490;
}
.btn-ghost:hover { opacity: 0.7; }
.status {
  font-size: 12px;
  color: #00c8a0;
  margin-top: 14px;
  min-height: 18px;
}
</style>
</head>
<body>
<div class="card">
  <div class="icon">🔄</div>
  <h2>Reset BodyLens</h2>
  <p>This will clear all stored profile data and take you back to the beginning. Use this to start fresh or test the onboarding as a new user.</p>
  <button class="btn" onclick="doReset()">Clear data and restart</button>
  <button class="btn btn-ghost" onclick="location.href='bodylens-day.html'">Cancel — keep my data</button>
  <div class="status" id="status"></div>
</div>
<script>
function doReset() {
  try {
    // Clear everything with bl_ prefix
    const keys = Object.keys(localStorage).filter(k => k.startsWith('bl_'));
    keys.forEach(k => localStorage.removeItem(k));
    document.getElementById('status').textContent = '✓ Data cleared — redirecting…';
    setTimeout(() => location.replace('bodylens-onboard.html'), 800);
  } catch(e) {
    document.getElementById('status').textContent = 'Error clearing data — try manually clearing browser storage.';
  }
}
</script>
</body>
</html>
