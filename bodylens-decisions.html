<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta name="bl-page" content="decisions">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>BodyLens — Decision Log</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&family=Space+Grotesk:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
body { background: var(--ink); color: var(--dk-1); }
.page { max-width: 860px; margin: 0 auto; padding: 0 24px 120px; }

/* Hero */
.dl-hero { padding: 36px 0 28px; border-bottom: 1px solid var(--bd); margin-bottom: 36px; }
.dl-kicker { font-size: 9px; font-weight: 700; letter-spacing: .22em; text-transform: uppercase; color: var(--dk-3); margin-bottom: 8px; }
.dl-title { font-family: var(--serif); font-size: 48px; font-weight: 300; line-height: .93; color: var(--dk-1); margin-bottom: 10px; }
.dl-title em { font-style: italic; color: var(--jade); }
.dl-sub { font-size: 13px; font-weight: 300; color: var(--dk-2); line-height: 1.7; max-width: 520px; }

/* Section label */
.sec-label { font-size: 9px; font-weight: 700; letter-spacing: .2em; text-transform: uppercase; color: var(--dk-3); margin: 0 0 14px; display: flex; align-items: center; gap: 10px; }
.sec-label::after { content: ''; flex: 1; height: 1px; background: var(--bd); }

/* Stats strip */
.dl-stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1px; background: var(--bd); border: 1px solid var(--bd); border-radius: 8px; overflow: hidden; margin-bottom: 36px; }
.dl-stat { background: var(--ink-2); padding: 14px 16px; }
.dl-stat-val { font-size: 24px; font-weight: 600; color: var(--dk-1); margin-bottom: 3px; font-variant-numeric: tabular-nums; }
.dl-stat-val.jade { color: var(--jade); }
.dl-stat-val.amber { color: var(--amber); }
.dl-stat-label { font-size: 9px; font-weight: 600; letter-spacing: .1em; text-transform: uppercase; color: var(--dk-3); }

/* Pending proposals — bright section */
.dl-pending-section { margin-bottom: 40px; }
.dl-pending-empty { font-size: 13px; font-weight: 300; color: var(--dk-3); padding: 20px 0; }

.prop-card {
  background: rgba(0,200,160,.05);
  border: 1px solid rgba(0,200,160,.25);
  border-left: 4px solid var(--jade);
  border-radius: 12px;
  padding: 22px 24px;
  margin-bottom: 14px;
}
.prop-card-header { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 14px; flex-wrap: wrap; }
.prop-source-badge {
  font-size: 9px; font-weight: 800; letter-spacing: .14em; text-transform: uppercase;
  color: var(--jade); background: rgba(0,200,160,.12); border: 1px solid rgba(0,200,160,.25);
  padding: 4px 10px; border-radius: 20px; white-space: nowrap;
}
.prop-source-badge.coach   { color: rgba(120,180,255,.9); background: rgba(120,180,255,.1); border-color: rgba(120,180,255,.25); }
.prop-source-badge.scan    { color: var(--amber); background: rgba(196,124,24,.1); border-color: rgba(196,124,24,.25); }
.prop-source-badge.recon   { color: rgba(180,130,255,.9); background: rgba(180,130,255,.1); border-color: rgba(180,130,255,.25); }
.prop-source-badge.manual  { color: var(--dk-3); background: rgba(255,255,255,.05); border-color: var(--bd); }
.prop-date { font-size: 11px; font-weight: 300; color: var(--dk-3); padding-top: 5px; }
.prop-title { font-family: var(--serif); font-size: 20px; font-weight: 300; color: var(--dk-1); line-height: 1.2; margin-bottom: 6px; }
.prop-context { font-size: 12px; font-weight: 300; color: var(--dk-3); line-height: 1.6; margin-bottom: 14px; }

/* Before/after table */
.ba-table { background: rgba(0,0,0,.3); border-radius: 8px; overflow: hidden; margin-bottom: 16px; }
.ba-head { display: grid; grid-template-columns: 1fr 1fr 1fr; padding: 8px 14px; background: rgba(0,0,0,.25); border-bottom: 1px solid rgba(255,255,255,.07); }
.ba-head-cell { font-size: 9px; font-weight: 800; letter-spacing: .1em; text-transform: uppercase; color: var(--dk-3); }
.ba-head-cell.after { color: var(--jade); }
.ba-row { display: grid; grid-template-columns: 1fr 1fr 1fr; padding: 9px 14px; border-bottom: 1px solid rgba(255,255,255,.04); }
.ba-row:last-child { border-bottom: none; }
.ba-field { font-size: 12px; font-weight: 600; color: var(--dk-2); }
.ba-before { font-size: 12px; font-weight: 300; color: var(--dk-3); text-decoration: line-through; }
.ba-after { font-size: 12px; font-weight: 700; color: var(--jade); }

/* Proposal action buttons */
.prop-actions { display: flex; gap: 10px; }
.btn-apply {
  flex: 1; background: var(--jade); color: #0c1010;
  font-family: var(--sans); font-size: 12px; font-weight: 800;
  letter-spacing: .08em; text-transform: uppercase;
  padding: 13px 20px; border: none; border-radius: 7px; cursor: pointer;
  transition: opacity .12s;
}
.btn-apply:hover { opacity: .88; }
.btn-dismiss {
  background: rgba(255,255,255,.04); border: 1px solid var(--bd);
  color: var(--dk-3); font-family: var(--sans); font-size: 11px; font-weight: 600;
  padding: 13px 18px; border-radius: 7px; cursor: pointer;
  transition: all .12s;
}
.btn-dismiss:hover { border-color: rgba(255,255,255,.2); color: var(--dk-2); }

/* Committed log */
.dl-log-section { margin-bottom: 40px; }
.log-entry { padding: 16px 0; border-bottom: 1px solid var(--bd); }
.log-entry:last-child { border-bottom: none; }
.log-entry-header { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; flex-wrap: wrap; }
.log-status-applied { font-size: 9px; font-weight: 800; letter-spacing: .08em; text-transform: uppercase; color: var(--jade); background: rgba(0,200,160,.1); padding: 3px 8px; border-radius: 4px; }
.log-status-dismissed { font-size: 9px; font-weight: 800; letter-spacing: .08em; text-transform: uppercase; color: var(--dk-3); background: rgba(255,255,255,.04); padding: 3px 8px; border-radius: 4px; }
.log-entry-title { font-size: 13px; font-weight: 500; color: var(--dk-1); margin-bottom: 6px; }
.log-chips { display: flex; flex-wrap: wrap; gap: 4px; }
.log-chip { font-size: 10px; font-weight: 300; color: var(--dk-3); background: rgba(255,255,255,.04); border: 1px solid var(--bd); border-radius: 4px; padding: 3px 8px; }
.btn-revert {
  margin-left: auto;
  background: none; border: 1px solid var(--bd);
  color: var(--dk-3); font-family: var(--sans); font-size: 9px; font-weight: 600;
  letter-spacing: .06em; text-transform: uppercase;
  padding: 4px 10px; border-radius: 4px; cursor: pointer;
  transition: all .12s;
}
.btn-revert:hover { border-color: rgba(255,255,255,.2); color: var(--dk-2); }

/* Empty state */
.dl-empty { text-align: center; padding: 60px 20px; }
.dl-empty-icon { font-size: 36px; margin-bottom: 14px; }
.dl-empty-title { font-family: var(--serif); font-size: 26px; font-weight: 300; color: var(--dk-1); margin-bottom: 8px; }
.dl-empty-sub { font-size: 13px; font-weight: 300; color: var(--dk-3); line-height: 1.7; max-width: 400px; margin: 0 auto; }

/* Filter bar */
.dl-filters { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 20px; }
.dl-filter-btn { font-size: 10px; font-weight: 600; letter-spacing: .06em; text-transform: uppercase; padding: 6px 12px; border-radius: 16px; border: 1px solid var(--bd); background: transparent; color: var(--dk-3); cursor: pointer; font-family: var(--sans); transition: all .12s; }
.dl-filter-btn.active { border-color: var(--jade); color: var(--jade); background: rgba(0,200,160,.06); }
.dl-filter-btn:hover { border-color: rgba(255,255,255,.2); color: var(--dk-2); }
</style>
</head>
<body>
<div id="nav-root"></div>
<div class="page">
  <div class="dl-hero">
    <div class="dl-kicker">BodyLens</div>
    <div class="dl-title">Decision<br><em>log.</em></div>
    <div class="dl-sub">Every change proposed, applied, or dismissed. Full before/after record. Nothing hidden.</div>
  </div>
  <div id="main-content">
    <div style="text-align:center;padding:60px 0;color:var(--dk-3);">Loading…</div>
  </div>
</div>
<script src="/bl-proposals.js"></script>
<script src="nav.js"></script>
<script>
'use strict';

var SOURCE_CONFIG = {
  'goals':          { label:'Goal analysis',         cls:'',       color:'var(--jade)' },
  'coach':          { label:'Coach',                 cls:'coach',  color:'rgba(120,180,255,.9)' },
  'body-scan':      { label:'Body scan',             cls:'scan',   color:'var(--amber)' },
  'reconciliation': { label:'Reconciliation',        cls:'recon',  color:'rgba(180,130,255,.9)' },
  'accelerator':    { label:'Accelerator',           cls:'',       color:'var(--jade)' },
  'programme':      { label:'Programme',             cls:'manual', color:'var(--dk-3)' },
  'manual':         { label:'Manual',                cls:'manual', color:'var(--dk-3)' },
  'revert':         { label:'Revert',                cls:'manual', color:'rgba(220,100,60,.8)' },
};

var _activeFilter = 'all';

function fmtVal(val) {
  if (val === null || val === undefined) return '—';
  if (Array.isArray(val)) return val.length ? val.slice(0,3).join(', ') + (val.length > 3 ? ' +' + (val.length-3) : '') : '—';
  if (typeof val === 'object') return JSON.stringify(val).slice(0, 60);
  if (typeof val === 'number') return val.toLocaleString();
  return String(val).slice(0, 80);
}

function badgeHtml(source) {
  var cfg = SOURCE_CONFIG[source] || { label: source, cls: 'manual', color: 'var(--dk-3)' };
  return '<span class="prop-source-badge ' + cfg.cls + '">' + cfg.label + '</span>';
}

function baTableHtml(changes) {
  if (!changes || !changes.length) return '';
  var rows = changes.map(function(c) {
    return '<div class="ba-row">'
      + '<div class="ba-field">' + (c.label || c.field) + '</div>'
      + '<div class="ba-before">' + fmtVal(c.before) + '</div>'
      + '<div class="ba-after">' + fmtVal(c.after) + '</div>'
      + '</div>';
  }).join('');
  return '<div class="ba-table">'
    + '<div class="ba-head">'
    + '<div class="ba-head-cell">What changes</div>'
    + '<div class="ba-head-cell">Before</div>'
    + '<div class="ba-head-cell after">After</div>'
    + '</div>'
    + rows
    + '</div>';
}

function renderPage() {
  var pending = (typeof blGetPending === 'function') ? blGetPending() : [];
  var log     = (typeof blGetProposalLog === 'function') ? blGetProposalLog() : [];

  // Filter log
  var filtered = log;
  if (_activeFilter !== 'all') {
    if (_activeFilter === 'applied')   filtered = log.filter(function(e){ return e.status === 'committed'; });
    if (_activeFilter === 'dismissed') filtered = log.filter(function(e){ return e.status === 'dismissed'; });
    if (_activeFilter === 'goals')     filtered = log.filter(function(e){ return e.source === 'goals'; });
    if (_activeFilter === 'coach')     filtered = log.filter(function(e){ return e.source === 'coach'; });
  }

  var appliedCount   = log.filter(function(e){ return e.status === 'committed'; }).length;
  var dismissedCount = log.filter(function(e){ return e.status === 'dismissed'; }).length;
  var totalCount     = log.length + pending.length;

  var html = '';

  // Stats strip
  html += '<div class="dl-stats">';
  html += '<div class="dl-stat"><div class="dl-stat-val jade">' + pending.length + '</div><div class="dl-stat-label">Pending review</div></div>';
  html += '<div class="dl-stat"><div class="dl-stat-val jade">' + appliedCount + '</div><div class="dl-stat-label">Applied</div></div>';
  html += '<div class="dl-stat"><div class="dl-stat-val">' + dismissedCount + '</div><div class="dl-stat-label">Dismissed</div></div>';
  html += '<div class="dl-stat"><div class="dl-stat-val">' + totalCount + '</div><div class="dl-stat-label">Total decisions</div></div>';
  html += '</div>';

  // ── PENDING ──────────────────────────────────────────────────────
  if (pending.length > 0) {
    html += '<div class="dl-pending-section">';
    html += '<div class="sec-label">Pending — ' + pending.length + ' awaiting your decision</div>';
    pending.forEach(function(prop) {
      html += '<div class="prop-card">';
      html += '<div class="prop-card-header">';
      html += badgeHtml(prop.source);
      html += '<span class="prop-date">' + prop.date + '</span>';
      html += '</div>';
      html += '<div class="prop-title">' + prop.title + '</div>';
      if (prop.context) html += '<div class="prop-context">' + prop.context + '</div>';
      html += baTableHtml(prop.changes);
      html += '<div class="prop-actions">';
      html += '<button class="btn-apply bl-prop-btn" data-pid="' + prop.id + '" data-action="commit">&#10003; Apply this change</button>';
      html += '<button class="btn-dismiss bl-prop-btn" data-pid="' + prop.id + '" data-action="dismiss">Dismiss</button>';
      html += '</div>';
      html += '</div>';
    });
    html += '</div>';
  }

  // ── LOG ──────────────────────────────────────────────────────────
  html += '<div class="dl-log-section">';

  if (filtered.length > 0) {
    // Filter buttons
    html += '<div class="dl-filters">';
    var filters = [
      {key:'all',       label:'All (' + log.length + ')'},
      {key:'applied',   label:'Applied (' + appliedCount + ')'},
      {key:'dismissed', label:'Dismissed (' + dismissedCount + ')'},
      {key:'goals',     label:'Goals'},
      {key:'coach',     label:'Coach'},
    ];
    filters.forEach(function(f) {
      html += '<button class="dl-filter-btn' + (_activeFilter===f.key?' active':'') + '" onclick="setFilter(\'' + f.key + '\')">' + f.label + '</button>';
    });
    html += '</div>';

    html += '<div class="sec-label">Decision history</div>';

    filtered.slice().reverse().forEach(function(entry) {
      var isApplied = entry.status === 'committed';
      var chips = (entry.changes || []).map(function(c) {
        return '<span class="log-chip">' + (c.label||c.field) + ': ' + fmtVal(c.before) + ' → ' + fmtVal(c.after) + '</span>';
      }).join('');

      html += '<div class="log-entry">';
      html += '<div class="log-entry-header">';
      html += badgeHtml(entry.source);
      html += '<span class="' + (isApplied ? 'log-status-applied' : 'log-status-dismissed') + '">' + (isApplied ? 'Applied' : 'Dismissed') + '</span>';
      html += '<span style="font-size:10px;font-weight:300;color:var(--dk-3);">' + entry.date + '</span>';
      if (isApplied) html += '<button class="btn-revert bl-prop-btn" data-pid="' + entry.id + '" data-action="revert">Revert</button>';
      html += '</div>';
      html += '<div class="log-entry-title">' + entry.title + '</div>';
      if (chips) html += '<div class="log-chips">' + chips + '</div>';
      html += '</div>';
    });

  } else if (log.length === 0 && pending.length === 0) {
    html += '<div class="dl-empty">';
    html += '<div class="dl-empty-icon">◎</div>';
    html += '<div class="dl-empty-title">Nothing logged yet</div>';
    html += '<div class="dl-empty-sub">Every change proposed or applied across Goals, the Coach, Body scan, and the weekly reconciliation will appear here with a full before/after record.</div>';
    html += '<div style="margin-top:24px;font-size:12px;color:var(--dk-3);">Run a goal analysis and hit Apply — it will appear here immediately.</div>';
    html += '</div>';
  } else {
    html += '<div class="dl-pending-empty">No entries match this filter.</div>';
  }

  html += '</div>';

  document.getElementById('main-content').innerHTML = html;

  // Delegated click handler for all action buttons
  document.getElementById('main-content').onclick = function(e) {
    var btn = e.target.closest('.bl-prop-btn');
    if (!btn) return;
    var pid = btn.dataset.pid;
    var action = btn.dataset.action;
    if (!pid || !action) return;

    if (action === 'commit') {
      var ok = blCommitProposal(pid);
      if (ok) { renderPage(); }
    } else if (action === 'dismiss') {
      blDismissProposal(pid);
      renderPage();
    } else if (action === 'revert') {
      var newId = blRevertProposal(pid);
      if (newId) { renderPage(); }
    }
  };
}

function setFilter(f) {
  _activeFilter = f;
  renderPage();
}

// Boot
document.addEventListener('DOMContentLoaded', function() {
  renderPage();

  // Also intercept localStorage to auto-refresh when proposals change
  var _origSet = localStorage.setItem.bind(localStorage);
  localStorage.setItem = function(key, val) {
    _origSet(key, val);
    if (key === 'bl_proposals' || key === 'bl_proposal_log') {
      setTimeout(renderPage, 50);
    }
  };
});
</script>
<script src="coach.js"></script>
</body>
</html>
