<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta name="bl-page" content="week">
<meta name="theme-color" content="#0c1010">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Soma — Week</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Space+Grotesk:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
body{background:var(--ink);color:var(--dk-1);}
.page{max-width:980px;margin:0 auto;padding:0 24px 100px;}
.wk-hero{padding:28px 0 24px;border-bottom:1px solid var(--bd);margin-bottom:28px;display:flex;align-items:baseline;justify-content:space-between;gap:16px;}
@media(max-width:599px){.wk-hero{padding:16px 0 14px;margin-bottom:18px;}}
.wk-hero-left{flex:1;}
.wk-kicker{font-size:9px;font-weight:700;letter-spacing:.22em;text-transform:uppercase;color:var(--dk-3);margin-bottom:6px;}
.wk-title{font-family:var(--serif);font-size:48px;font-weight:300;line-height:.93;color:var(--dk-1);margin-bottom:8px;}
@media(max-width:599px){.wk-title{font-size:32px;margin-bottom:4px;}}
.wk-title em{font-style:italic;color:var(--dk-3);}
.wk-sub{font-size:13px;font-weight:300;color:var(--dk-2);line-height:1.7;max-width:500px;}
@media(max-width:599px){.wk-sub{display:none;}}
.missed-banner{display:flex;align-items:center;gap:12px;background:rgba(196,124,24,.07);border:1px solid rgba(196,124,24,.2);border-radius:10px;padding:14px 18px;margin-bottom:24px;cursor:pointer;transition:background .12s;}
.missed-banner:hover{background:rgba(196,124,24,.12);}
.missed-banner-icon{font-size:18px;flex-shrink:0;}
.missed-banner-text{flex:1;}
.missed-banner-title{font-size:12px;font-weight:700;color:var(--amber);margin-bottom:2px;}
.missed-banner-sub{font-size:11px;font-weight:300;color:var(--dk-3);}
.missed-banner-cta{font-size:11px;font-weight:700;color:var(--amber);flex-shrink:0;}
.wk-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--bd);border:1px solid var(--bd);border-radius:10px;overflow:hidden;margin-bottom:28px;}
.wk-stat{background:var(--ink-1);padding:16px 18px;text-align:center;}
.wk-stat-val{font-size:clamp(13px,3.5vw,22px);font-weight:700;letter-spacing:-.03em;color:var(--dk-1);margin-bottom:3px;word-break:break-word;}
.wk-stat-val.jade{color:var(--jade);}
.wk-stat-val.amber{color:var(--amber);}
.wk-stat-val.red{color:var(--red);}
.wk-stat-val.slate{color:var(--dk-3);}
.wk-stat-label{font-size:9px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--dk-3);}
.sec-label{font-size:9px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:var(--dk-3);margin:0 0 14px;display:flex;align-items:center;gap:10px;}
.sec-label::after{content:'';flex:1;height:1px;background:var(--bd);}
.ledger-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:8px;margin-bottom:28px;}
@media(max-width:599px){.ledger-grid{display:flex;overflow-x:auto;gap:8px;padding-bottom:12px;-webkit-overflow-scrolling:touch;scrollbar-width:none;}.ledger-grid::-webkit-scrollbar{display:none;}}
.day-card{background:var(--ink-1);border:1px solid var(--bd);border-radius:10px;padding:12px 10px;position:relative;overflow:hidden;min-height:130px;transition:border-color .15s;display:flex;flex-direction:column;}
@media(max-width:599px){.day-card{flex:0 0 140px;min-width:140px;}}
.day-card.is-today{cursor:pointer;}
.day-card.is-today:hover{border-color:rgba(0,200,160,.5);}
.day-card.training{border-top:2px solid rgba(0,200,160,.3);}
.day-card.today{border-color:rgba(0,200,160,.35);background:rgba(0,200,160,.03);}
.day-card.missed{border-top:2px solid rgba(220,80,60,.5);}
.day-card.skipped{border-top:2px solid rgba(220,80,60,.3);}
.day-card.done{border-top:2px solid rgba(0,200,160,.6);}
.day-card.reshuffled{border-top:2px solid rgba(196,124,24,.5);}
.today-badge{position:absolute;top:8px;right:8px;font-size:7px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;background:var(--jade);color:var(--ink);padding:2px 6px;border-radius:3px;}
.dc-day{font-size:8px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--dk-3);margin-bottom:4px;}
.dc-type{font-family:var(--serif);font-size:17px;font-weight:500;color:var(--dk-1);margin-bottom:4px;line-height:1.1;}
.dc-focus{font-size:9px;font-weight:300;color:var(--dk-3);margin-bottom:6px;line-height:1.35;}
.dc-status{font-size:8px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;padding:2px 7px;border-radius:8px;display:inline-block;margin-bottom:6px;}
.dc-status.done{background:rgba(0,200,160,.1);color:var(--jade);}
.dc-status.missed{background:rgba(220,80,60,.1);color:var(--red);}
.dc-status.skipped{background:rgba(220,80,60,.08);color:rgba(220,80,60,.7);}
.dc-status.upcoming{background:rgba(255,255,255,.06);color:var(--dk-3);}
.dc-status.today{background:rgba(0,200,160,.08);color:var(--jade);}
.dc-status.rest{background:rgba(255,255,255,.04);color:var(--dk-3);}
.dc-status.reshuffled{background:rgba(196,124,24,.1);color:var(--amber);}
.dc-exercises{margin-top:6px;flex:1;}
.dc-ex{font-size:8px;font-weight:300;color:rgba(255,255,255,.28);line-height:1.5;}
.dc-cardio{font-size:7px;font-weight:600;color:rgba(100,160,255,.45);margin-top:6px;letter-spacing:.02em;padding-top:5px;border-top:1px solid rgba(100,160,255,.1);}
.dc-cardio:empty{border-top:none;margin-top:0;padding-top:0;}
/* ── Energy Balance ───────────────────────────────────── */
.energy-balance{margin-bottom:28px;}
.eb-summary{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--bd);border:1px solid var(--bd);border-radius:10px;overflow:hidden;margin-bottom:12px;}
@media(max-width:599px){.eb-summary{grid-template-columns:repeat(2,1fr);}}
.eb-sum-item{background:var(--ink-1);padding:14px 16px;}
.eb-sum-label{font-size:9px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--dk-3);margin-bottom:5px;}
.eb-sum-val{font-size:22px;font-weight:700;letter-spacing:-.03em;color:var(--dk-1);line-height:1;}
.eb-sum-val.jade{color:var(--jade);}
.eb-sum-val.amber{color:var(--amber);}
.eb-sum-val.slate{color:var(--dk-3);}
.eb-sum-sub{font-size:10px;font-weight:300;color:var(--dk-3);margin-top:3px;}
.eb-sum-val.red{color:var(--red);}
.eb-sum-item.net{border-left:2px solid rgba(0,200,160,.25);}
.eb-sum-item.net.surplus{border-left-color:rgba(196,124,24,.35);}
.eb-sum-item.net.nodata{border-left-color:rgba(255,255,255,.08);}
.eb-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;margin-bottom:10px;}
@media(max-width:599px){.eb-grid{display:flex;overflow-x:auto;gap:6px;padding-bottom:8px;-webkit-overflow-scrolling:touch;scrollbar-width:none;}.eb-grid::-webkit-scrollbar{display:none;}}
.eb-day{background:var(--ink-1);border:1px solid var(--bd);border-radius:8px;padding:10px 5px 8px;text-align:center;}
.eb-day.is-today{border-color:rgba(0,200,160,.3);background:rgba(0,200,160,.025);}
.eb-day-lbl{font-size:8px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--dk-3);margin-bottom:6px;}
.eb-day.is-today .eb-day-lbl{color:var(--jade);}
.eb-day-burn{font-size:9px;font-weight:600;color:var(--dk-3);line-height:1.3;}
.eb-day-intake{font-size:9px;font-weight:600;color:var(--dk-3);margin-top:2px;line-height:1.3;}
.eb-day-intake.logged{color:var(--dk-2);}
.eb-day-intake.target{color:rgba(255,255,255,.18);}
.eb-day-unit{font-size:6px;font-weight:400;letter-spacing:.05em;color:var(--dk-3);margin-left:1px;text-transform:uppercase;display:block;line-height:1.2;}
.eb-day-net{font-size:8px;font-weight:700;padding:2px 5px;border-radius:4px;display:inline-block;letter-spacing:-.01em;margin-top:4px;}
.eb-day-net.deficit{background:rgba(0,200,160,.1);color:var(--jade);}
.eb-day-net.deficit.planned{opacity:.5;}
.eb-day-net.surplus{background:rgba(196,124,24,.1);color:var(--amber);}
.eb-day-net.surplus.planned{opacity:.5;}
.eb-day-net.empty{color:var(--dk-3);background:none;}
.eb-note{font-size:9px;font-weight:300;color:var(--dk-3);text-align:center;padding:4px 0 2px;line-height:1.6;}
/* ── Burn split strip ─────────────────────────────────── */
.eb-burn-split{display:grid;grid-template-columns:1fr 1px 1fr 1px 1fr;gap:0;background:var(--bd);border:1px solid var(--bd);border-radius:10px;overflow:hidden;margin-bottom:12px;}
.eb-bsp-div{background:var(--bd);}
.eb-bsp-item{background:var(--ink-1);padding:13px 16px;}
.eb-bsp-label{font-size:9px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--dk-3);margin-bottom:4px;}
.eb-bsp-val{font-size:20px;font-weight:700;letter-spacing:-.03em;line-height:1;}
.eb-bsp-val.jade{color:var(--jade);}
.eb-bsp-val.amber{color:var(--amber);}
.eb-bsp-val.slate{color:var(--dk-3);}
.eb-bsp-sub{font-size:10px;font-weight:300;color:var(--dk-3);margin-top:3px;}
.dc-reshuffle-note{font-size:8px;font-weight:600;color:var(--amber);margin-top:4px;letter-spacing:.02em;}
.reshuffle-trigger{display:none;width:100%;margin-top:6px;background:rgba(196,124,24,.1);border:1px solid rgba(196,124,24,.3);border-radius:5px;color:var(--amber);font-family:var(--sans);font-size:8px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;padding:5px 6px;cursor:pointer;text-align:center;transition:background .12s;flex-shrink:0;}
.reshuffle-trigger:hover{background:rgba(196,124,24,.18);}
.day-card.missed .reshuffle-trigger,.day-card.skipped .reshuffle-trigger{display:block;}
/* ── Nutrition Ledger ─────────────────────────────────── */
.macro-ledger{margin-bottom:28px;}
.macro-ledger-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;}
@media(max-width:599px){.macro-ledger-grid{display:flex;overflow-x:auto;gap:6px;padding-bottom:8px;-webkit-overflow-scrolling:touch;scrollbar-width:none;}.macro-ledger-grid::-webkit-scrollbar{display:none;}}
.ml-col{display:flex;flex-direction:column;align-items:center;gap:5px;padding:10px 4px 8px;background:var(--ink-1);border:1px solid var(--bd);border-radius:9px;transition:border-color .15s;}
.ml-col.is-today{border-color:rgba(0,200,160,.3);background:rgba(0,200,160,.025);}
.ml-day-lbl{font-size:8px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--dk-3);}
.ml-col.is-today .ml-day-lbl{color:var(--jade);}
.ml-bar-wrap{width:22px;height:56px;background:rgba(255,255,255,.025);border-radius:3px;overflow:hidden;display:flex;flex-direction:column-reverse;}
.ml-seg{width:100%;flex-shrink:0;}
.ml-kcal{font-size:8px;font-weight:600;color:var(--dk-3);text-align:center;line-height:1.2;letter-spacing:-.01em;}
.ml-kcal.logged{color:var(--dk-2);}
.ml-kcal.over{color:var(--amber);}
.ml-prot-lbl{font-size:7px;font-weight:600;letter-spacing:.02em;color:rgba(255,255,255,.18);text-align:center;}
.ml-prot-lbl.hit{color:var(--jade);}
.ml-prot-lbl.close{color:var(--amber);}
.ml-legend{display:flex;gap:14px;margin-top:9px;}
.ml-legend-item{display:flex;align-items:center;gap:5px;font-size:9px;font-weight:300;color:var(--dk-3);}
.ml-legend-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0;}
.wk-coach-card{border-radius:10px;padding:16px 18px;margin-bottom:10px;border:1px solid var(--bd);background:var(--ink-1);}
.wk-coach-card.red{border-color:rgba(220,80,60,.25);background:rgba(220,80,60,.04);}
.wk-coach-card.amber{border-color:rgba(196,124,24,.25);background:rgba(196,124,24,.04);}
.wk-coach-card.positive{border-color:rgba(0,200,160,.25);background:rgba(0,200,160,.04);}
.wk-coach-label{font-size:9px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--amber);margin-bottom:6px;}
.wk-coach-card.red .wk-coach-label{color:var(--red);}
.wk-coach-card.positive .wk-coach-label{color:var(--jade);}
.wk-coach-text{font-size:13px;font-weight:300;color:var(--dk-2);line-height:1.7;}
.ai-gen-btn{width:100%;display:flex;align-items:center;gap:14px;background:var(--ink-1);border:1px solid var(--bd);border-radius:10px;padding:16px 18px;cursor:pointer;transition:border-color .12s;text-align:left;}
.ai-gen-btn:hover{border-color:var(--jade);}
.ai-gen-label{font-size:13px;font-weight:600;color:var(--dk-1);}
.ai-gen-sub{font-size:11px;font-weight:300;color:var(--dk-3);margin-top:2px;}
.ai-result{margin-top:12px;font-size:13px;font-weight:300;color:var(--dk-2);line-height:1.75;}
#rs-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);display:flex;align-items:flex-end;justify-content:center;z-index:9000;padding:0 16px;}
@media(min-width:600px){#rs-overlay{align-items:center;}}
.rs-modal{background:var(--ink-1);border:1px solid rgba(255,255,255,.1);border-radius:18px 18px 0 0;width:100%;max-width:540px;max-height:88vh;overflow-y:auto;padding:24px 22px 36px;}
@media(min-width:600px){.rs-modal{border-radius:18px;}}
.rs-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px;}
.rs-title{font-family:var(--serif);font-size:24px;font-weight:500;color:var(--dk-1);}
.rs-close{background:none;border:none;color:var(--dk-3);font-size:18px;cursor:pointer;padding:4px;}
.rs-section{font-size:9px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--dk-3);margin-bottom:10px;margin-top:18px;}
.rs-missed-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.rs-missed-badge{font-size:8px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;background:rgba(220,80,60,.1);color:var(--red);border:1px solid rgba(220,80,60,.2);padding:2px 8px;border-radius:4px;flex-shrink:0;}
.rs-missed-name{font-size:13px;font-weight:600;color:var(--dk-1);}
.rs-missed-day{font-size:12px;font-weight:300;color:var(--dk-3);}
.rs-slots{display:flex;flex-wrap:wrap;gap:7px;}
.rs-slot{border-radius:8px;padding:8px 14px;border:1px solid var(--bd);}
.rs-slot.free{background:rgba(0,200,160,.05);border-color:rgba(0,200,160,.2);}
.rs-slot.busy{background:rgba(255,255,255,.03);}
.rs-slot-day{font-size:11px;font-weight:700;color:var(--dk-1);}
.rs-slot-type{font-size:9px;font-weight:300;color:var(--dk-3);margin-top:1px;}
.rs-note{font-size:11px;font-weight:300;color:var(--dk-3);line-height:1.6;padding:12px 14px;background:rgba(255,255,255,.03);border-radius:8px;margin-top:16px;}
.rs-assign-row{padding:12px 0;border-bottom:1px solid rgba(255,255,255,.06);}
.rs-assign-row:last-child{border-bottom:none;}
.rs-assign-from{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.rs-assign-fromday{font-size:12px;font-weight:300;color:var(--dk-3);}
.rs-assign-arrow{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--dk-3);margin-bottom:6px;}
.rs-assign-btns{display:flex;flex-wrap:wrap;gap:6px;}
.rs-day-btn{background:rgba(255,255,255,.05);border:1px solid var(--bd);color:var(--dk-2);font-family:var(--sans);font-size:11px;font-weight:600;padding:6px 12px;border-radius:6px;cursor:pointer;position:relative;}
.rs-day-btn.selected{background:rgba(0,200,160,.12);border-color:rgba(0,200,160,.4);color:var(--jade);}
.rs-day-btn.rs-day-busy{opacity:.55;}
.rs-day-busy-dot{position:absolute;top:3px;right:4px;width:5px;height:5px;border-radius:50%;background:var(--amber);}
.rs-day-drop{background:rgba(220,80,60,.07);border-color:rgba(220,80,60,.2);color:var(--red);}
.rs-day-drop.selected{background:rgba(220,80,60,.15);border-color:var(--red);}
.rs-btn{width:100%;margin-top:18px;background:var(--jade);color:var(--ink);border:none;border-radius:10px;font-family:var(--sans);font-size:13px;font-weight:700;letter-spacing:.04em;padding:15px;cursor:pointer;}
.rs-btn:disabled{opacity:.55;cursor:not-allowed;}
.rs-result{margin-top:20px;}
.rs-result-label{font-size:9px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--jade);margin-bottom:12px;}
.rs-change-row{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:8px;margin-bottom:6px;border:1px solid var(--bd);}
.rs-change-row.train{background:rgba(0,200,160,.05);border-color:rgba(0,200,160,.2);}
.rs-change-row.rest{background:rgba(255,255,255,.02);}
.rs-change-day{font-size:11px;font-weight:700;color:var(--dk-2);width:90px;flex-shrink:0;}
.rs-change-type{font-size:13px;font-weight:700;color:var(--dk-1);flex:1;}
.rs-change-note{font-size:9px;font-weight:300;color:var(--dk-3);}
.rs-rationale{font-size:12px;font-weight:300;color:var(--dk-2);line-height:1.75;margin:14px 0;padding:12px 14px;background:rgba(255,255,255,.03);border-left:2px solid rgba(0,200,160,.3);border-radius:0 8px 8px 0;}
.rs-warning{font-size:11px;color:var(--amber);padding:8px 12px;background:rgba(196,124,24,.08);border-radius:6px;margin-bottom:10px;}
.rs-actions{display:flex;gap:8px;margin-top:16px;}
.rs-apply{flex:1;background:var(--jade);color:var(--ink);border:none;border-radius:8px;padding:13px;font-family:var(--sans);font-size:12px;font-weight:700;cursor:pointer;}
.rs-reject{background:none;border:1px solid var(--bd);color:var(--dk-3);font-family:var(--sans);font-size:12px;font-weight:600;padding:13px 18px;border-radius:8px;cursor:pointer;}
.rs-error{font-size:12px;color:var(--red);text-align:center;margin-top:12px;}
@keyframes spin{to{transform:rotate(360deg);}}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(0,200,160,.2);border-top-color:var(--jade);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:8px;}
.pro-page-banner{display:none;position:relative;padding-right:44px;}
.pro-banner-dismiss{position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;color:rgba(200,148,30,.5);font-size:14px;cursor:pointer;padding:4px 6px;line-height:1;}
.pro-banner-dismiss:hover{color:#c8941e;}
.wk-toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--jade);color:var(--ink);font-family:var(--sans);font-size:12px;font-weight:700;padding:10px 22px;border-radius:20px;z-index:9999;pointer-events:none;transition:transform .25s ease;}
.wk-toast.show{transform:translateX(-50%) translateY(0);}
</style>
</head>

<div class="pro-page-banner" id="pro-page-banner">&#10022; PRO features are highlighted &mdash; <a href="/bodylens-pro.html">Founding member pricing available</a><button class="pro-banner-dismiss" onclick="document.getElementById('pro-page-banner').style.display='none';sessionStorage.setItem('wk_pro_banner_dismissed','1');" title="Dismiss">&#10005;</button></div>
<script>(function(){if(localStorage.getItem('bl_pro_status')!=='active'&&!sessionStorage.getItem('wk_pro_banner_dismissed')){var b=document.getElementById('pro-page-banner');if(b)b.style.display='block';}})();</script>
<div class="page" id="main-page"></div>
<div class="wk-toast" id="wk-toast"></div>
<script src="nav.js"></script>
<script src="supabase-auth.js"></script>

<script>
'use strict';
var DNS=['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
var DNS3=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];

function _ovKey(){var d=new Date(),wd=d.getDay();var mon=new Date(d);mon.setDate(d.getDate()-(wd===0?6:wd-1));mon.setHours(0,0,0,0);return 'bl_week_override_'+mon.toISOString().slice(0,10);}
function loadOverride(){try{return JSON.parse(localStorage.getItem(_ovKey())||'{}');}catch(e){return {};}}
function saveOverride(data){try{localStorage.setItem(_ovKey(),JSON.stringify(data));}catch(e){}}
function getEffDay(p,idx){var ov=loadOverride();if(ov[idx])return Object.assign({},(p.weekPlan||[])[idx]||{},ov[idx]);return (p.weekPlan||[])[idx]||{type:'Rest',priority:'rest'};}
function mondayDate(){var d=new Date(),wd=d.getDay();var mon=new Date(d);mon.setDate(d.getDate()-(wd===0?6:wd-1));mon.setHours(0,0,0,0);return mon;}
function dayStr(i){var mon=mondayDate();var d=new Date(mon);d.setDate(mon.getDate()+i);return d.toISOString().slice(0,10);}
function loadLog(ds){try{var r=JSON.parse(localStorage.getItem('bl_daylog_'+ds)||'null');return(r&&typeof r==='object')?r:null;}catch(e){return null;}}
function todayIdx(){var wd=new Date().getDay();return wd===0?6:wd-1;}
function getProfile(){try{return JSON.parse(localStorage.getItem('bl_profile')||'null');}catch(e){return null;}}

function getMissed(p){
  var ti=todayIdx();var missed=[];
  var ov=loadOverride();
  for(var i=0;i<ti;i++){
    // Always use the ORIGINAL weekPlan to check if this day was meant to be training.
    // An override (e.g. reshuffle-vacated) must not silently remove a missed session.
    var origPlan=(p.weekPlan||[])[i]||{};
    if(origPlan.priority!=='training')continue;
    var log=loadLog(dayStr(i));
    if(log&&log.trainStatus==='done')continue;
    // If this day was vacated by a reshuffle, check whether the destination is
    // still pending (future day) or was already completed.
    // If the destination is a future day → reshuffle is valid, not missed yet.
    // If the destination is a past day that was done → session is complete, not missed.
    // Otherwise (destination past + not done, or no destination found) → still missed.
    var ovEntry=ov[i];
    if(ovEntry&&ovEntry.source==='reshuffle-vacated'){
      var reshuffledOk=false;
      for(var j=0;j<7;j++){
        if(j===i)continue;
        var destOv=ov[j];
        if(destOv&&destOv.source==='reshuffle'&&destOv.note&&destOv.note.indexOf(DNS[i])!==-1){
          if(j>ti){reshuffledOk=true;break;}                            // future — still planned
          var destLog=loadLog(dayStr(j));
          if(destLog&&destLog.trainStatus==='done'){reshuffledOk=true;break;} // past, done
        }
      }
      if(reshuffledOk)continue;
    }
    missed.push({idx:i,day:DNS[i],ds:dayStr(i),type:origPlan.type});
  }
  return missed;
}

// ── Cardio hint per training day ─────────────────────────
function _wkCardioHint(wp) {
  if (!wp || wp.priority !== 'training') return '<div class="dc-cardio"></div>';
  var t = ((wp.type||'') + ' ' + (wp.focus||'')).toLowerCase();
  var hint;
  if      (t.match(/leg|lower|squat|glute|hinge/))   hint = '+ 20 min bike / swim';
  else if (t.match(/push|chest|shoulder/))            hint = '+ 20 min row / walk';
  else if (t.match(/pull|back|bicep/))               hint = '+ 20 min cycle / elliptical';
  else if (t.match(/condition|full.?body|circuit/))   hint = '+ 15 min Zone 2 walk';
  else                                                hint = '+ 20 min Zone 2 cardio';
  return '<div class="dc-cardio">&#9632; ' + hint + '</div>';
}

// ── BMR / daily burn estimates ────────────────────────────
function _calcBMR(p) {
  var w = parseFloat(p.weight) || 80;
  var h = parseFloat(p.height) || 178;
  var a = parseFloat(p.age) || 35;
  var isFemale = (p.sex || 'm').toLowerCase().match(/^f/);
  return Math.round(10*w + 6.25*h - 5*a + (isFemale ? -161 : 5));
}

function _calcDayBurn(p, dayPlan) {
  var bmr = _calcBMR(p);
  var actMults = { sedentary:1.2, light:1.375, moderate:1.55, active:1.725 };
  var base = Math.round(bmr * (actMults[p.activityLevel || 'light'] || 1.375));
  if (!dayPlan || dayPlan.priority !== 'training') return base;
  var t = ((dayPlan.type||'') + ' ' + (dayPlan.focus||'')).toLowerCase();
  var bonus = t.match(/condition|circuit|hiit/) ? 360 :
              t.match(/strength/) ? 270 : 240;
  return base + bonus;
}

function render(){
  var p=getProfile();
  if(!p){document.getElementById('main-page').innerHTML='<div style="padding:80px 24px;text-align:center;color:var(--dk-3);">No profile found. <a href="/bodylens-onboard.html" style="color:var(--jade);">Complete onboarding</a></div>';return;}
  var ti=todayIdx();
  var missed=getMissed(p);
  var ov=loadOverride();
  var trainingDays=(p.weekPlan||[]).filter(function(d){return d.priority==='training';}).length;
  var doneSessions=0;
  for(var i=0;i<7;i++){var log=loadLog(dayStr(i));if(log&&log.trainStatus==='done')doneSessions++;}
  var remaining=0;
  for(var i=ti+1;i<7;i++){var effD=getEffDay(p,i);if(effD.priority==='training'){var flog=loadLog(dayStr(i));if(!flog||flog.trainStatus!=='done')remaining++;}}
  var sessCol=doneSessions===trainingDays?'jade':doneSessions>0?'amber':'slate';
  var wkStatus=missed.length===0&&doneSessions>=trainingDays?'Clean':missed.length>0?'Off plan':'Active';
  var wkCol=wkStatus==='Clean'?'jade':wkStatus==='Off plan'?'red':'amber';

  var statsHTML='<div class="wk-stats">'
    +'<div class="wk-stat"><div class="wk-stat-val '+sessCol+'">'+doneSessions+' / '+trainingDays+'</div><div class="wk-stat-label">Sessions done</div></div>'
    +'<div class="wk-stat"><div class="wk-stat-val '+(missed.length?'red':'jade')+'">'+(missed.length||'✓')+'</div><div class="wk-stat-label">To reshuffle</div></div>'
    +'<div class="wk-stat"><div class="wk-stat-val slate">'+(remaining||'✓')+'</div><div class="wk-stat-label">Remaining</div></div>'
    +'<div class="wk-stat"><div class="wk-stat-val '+wkCol+'">'+wkStatus+'</div><div class="wk-stat-label">Status</div></div>'
    +'</div>';

  var bannerHTML='';
  if(missed.length){
    var names=missed.map(function(m){return m.type+' ('+m.day+')';}).join(', ');
    bannerHTML='<div class="missed-banner" onclick="openReshuffle()">'
      +'<div class="missed-banner-icon">⚠</div>'
      +'<div class="missed-banner-text">'
        +'<div class="missed-banner-title">'+missed.length+' session'+(missed.length>1?'s':'')+' missed this week</div>'
        +'<div class="missed-banner-sub">'+names+' — tap to move them to remaining days</div>'
      +'</div>'
      +'<div class="missed-banner-cta">Reshuffle →<span class="pro-badge">PRO</span></div>'
    +'</div>';
  }

  var maxKcal=Math.max.apply(null,(p.weekPlan||[]).map(function(d){return d.kcal||0;}));
  var cardsHTML='<div class="sec-label">Week at a glance</div><div class="ledger-grid">';
  for(var i=0;i<7;i++){
    var wp=getEffDay(p,i);
    var ds=dayStr(i);
    var log=loadLog(ds);
    var isToday=i===ti;var isPast=i<ti;var isFuture=i>ti;
    var isTraining=wp.priority==='training';
    var ovEntry=ov[i];
    var wasReshuffled=ovEntry&&ovEntry.source==='reshuffle';          // received a moved session
    var wasVacated=ovEntry&&ovEntry.source==='reshuffle-vacated';     // gave its session away
    var status,statusLabel,statusClass;
    if(!isTraining){status='rest';statusLabel=isToday?'Today':isPast?'Rest':'Upcoming';statusClass='rest';}
    else if(log&&log.trainStatus==='done'){status='done';statusLabel='Done';statusClass='done';}
    else if(log&&log.trainStatus==='skipped'){status='skipped';statusLabel='Skipped';statusClass='skipped';}
    else if(isToday){status='today';statusLabel='Today';statusClass='today';}
    else if(isPast){status='missed';statusLabel='Missed';statusClass='missed';}
    else{status='upcoming';statusLabel='Upcoming';statusClass='upcoming';}
    if(wasReshuffled)statusClass='reshuffled';
    var cardCls='day-card';
    if(isTraining&&status==='done')cardCls+=' done';
    else if(isTraining&&status==='missed')cardCls+=' missed training';
    else if(isTraining&&status==='skipped')cardCls+=' skipped training';
    else if(isTraining)cardCls+=' training';
    if(isToday)cardCls+=' today is-today';
    if(wasReshuffled)cardCls+=' reshuffled';
    // Exercise list — always present so flex:1 works on rest days too
    var exHTML='<div class="dc-exercises">';
    if(isTraining&&wp.keyExercises&&wp.keyExercises.length){
      wp.keyExercises.forEach(function(ex){exHTML+='<div class="dc-ex">· '+ex+'</div>';});
    }
    exHTML+='</div>';
    // Notes: destination shows "Moved from X", source shows "Session moved to Y"
    var reshuffleNote=wasReshuffled&&ovEntry&&ovEntry.note
      ?'<div class="dc-reshuffle-note">↻ '+ovEntry.note+'</div>'
      :wasVacated&&ovEntry&&ovEntry.note
        ?'<div class="dc-reshuffle-note" style="color:rgba(255,255,255,.22);">↑ '+ovEntry.note+'</div>'
        :'';
    // Cardio hint — always a div (empty for rest days, :empty CSS hides border)
    var cardioHTML=_wkCardioHint(wp);
    // Reshuffle button — always in DOM; CSS .day-card.missed/.skipped controls display
    var reshuffleBtn='<button class="reshuffle-trigger" onclick="event.stopPropagation();openReshuffle()">↻ Reshuffle week<span class="pro-badge">PRO</span></button>';
    var cardOnclick=isToday?'location.href=\'bodylens-dailyplan.html\'':(isPast&&isTraining?'location.href=\'bodylens-dailyplan.html?date='+ds+'\'':'');
    var cardCursor=cardOnclick?'cursor:pointer;':'';
    var cardTitle=isToday?'Open today\'s plan':(isPast&&isTraining?'Open session log':'');
    cardsHTML+='<div class="'+cardCls+'"'+(cardOnclick?' onclick="'+cardOnclick+'"':'')+' title="'+cardTitle+'" style="'+cardCursor+'">'
      +(isToday?'<div class="today-badge">Today</div>':'')
      +'<div class="dc-day">'+DNS3[i]+'</div>'
      +'<div class="dc-type">'+(wp.type||'Rest')+'</div>'
      +(wp.focus&&isTraining?'<div class="dc-focus">'+wp.focus+'</div>':'')
      +'<div class="dc-status '+statusClass+'">'+statusLabel+'</div>'
      +exHTML+reshuffleNote+cardioHTML+reshuffleBtn
    +'</div>';
  }
  cardsHTML+='</div>';

  // ── Nutrition Ledger (actual macros per day) ─────────────
  var ML_BAR = 56; // must match CSS .ml-bar-wrap height
  var mlCols = '';
  for (var mi = 0; mi < 7; mi++) {
    var mds = dayStr(mi);
    var mLog = loadLog(mds);
    var mDay = getEffDay(p, mi);
    var mIsT = mDay.priority === 'training';
    var mIsToday = mi === ti;
    var mIsFuture = mi > ti;
    var mKcalTarget = mDay.kcal || (mIsT ? (p.trainingKcal || p.calories || 2400) : (p.restKcal || p.calories || 2000));
    var mProtTarget = p.protein || 140;

    var mAct = mLog && mLog.actual ? mLog.actual : null;
    var mAKcal = mAct ? (mAct.kcal || 0) : 0;
    var mAProt = mAct ? (mAct.prot || 0) : 0;
    var mACarbs = mAct ? (mAct.carbs || 0) : 0;
    var mAFat = mAct ? (mAct.fat || 0) : 0;
    var mHas = mAKcal > 0 || mAProt > 0;

    // Build stacked bar segments (column-reverse: first HTML child → bottom)
    var mSegs = '';
    if (mHas) {
      var mTotalH = Math.min(Math.round(ML_BAR * 1.05), Math.round((mAKcal / mKcalTarget) * ML_BAR));
      if (mTotalH < 3) mTotalH = 3;
      var mMK = (mAProt * 4) + (mACarbs * 4) + (mAFat * 9);
      if (mMK > 0) {
        var mPH = Math.max(1, Math.round((mAProt * 4 / mMK) * mTotalH));
        var mCH = Math.max(0, Math.round((mACarbs * 4 / mMK) * mTotalH));
        var mFH = Math.max(0, mTotalH - mPH - mCH);
        // column-reverse: first = bottom (protein), then carbs, then fat at top
        mSegs = '<div class="ml-seg" style="height:'+mPH+'px;background:rgba(0,200,160,.72);"></div>'
          + '<div class="ml-seg" style="height:'+mCH+'px;background:rgba(130,170,240,.28);"></div>'
          + '<div class="ml-seg" style="height:'+mFH+'px;background:rgba(196,124,24,.58);"></div>';
      } else {
        mSegs = '<div class="ml-seg" style="height:'+mTotalH+'px;background:rgba(0,200,160,.38);"></div>';
      }
    } else {
      // Ghost bar: target reference for future, faint line for past
      var mGhH = mIsFuture ? Math.round(ML_BAR * 0.55) : Math.round(ML_BAR * 0.12);
      mSegs = '<div class="ml-seg" style="height:'+mGhH+'px;background:rgba(255,255,255,.05);"></div>';
    }

    var mKcalTxt = mHas ? (mAKcal > 0 ? mAKcal.toLocaleString() : (mAProt + 'g')) : (mIsFuture ? mKcalTarget.toLocaleString() : '—');
    var mKcalCls = mHas ? (mAKcal > mKcalTarget * 1.08 ? 'over' : 'logged') : '';
    var mPPct = mProtTarget > 0 ? mAProt / mProtTarget : 0;
    var mProtCls = (mHas && mAProt > 0) ? (mPPct >= 0.9 ? 'hit' : mPPct >= 0.7 ? 'close' : '') : '';
    var mProtTxt = (mHas && mAProt > 0) ? mAProt + 'g P' : (mIsFuture ? mProtTarget + 'g' : '—');

    mlCols += '<div class="ml-col'+(mIsToday?' is-today':'')+'">'
      + '<div class="ml-day-lbl">'+DNS3[mi]+'</div>'
      + '<div class="ml-bar-wrap">'+mSegs+'</div>'
      + '<div class="ml-kcal '+mKcalCls+'">'+mKcalTxt+'</div>'
      + '<div class="ml-prot-lbl '+mProtCls+'">'+mProtTxt+'</div>'
    + '</div>';
  }
  var macroLedgerHTML = '<div class="macro-ledger">'
    + '<div class="sec-label" style="margin-top:28px;">Nutrition &nbsp;<span style="font-weight:300;text-transform:none;letter-spacing:.04em;font-size:9px;">actual macros · daily</span></div>'
    + '<div class="macro-ledger-grid">'+mlCols+'</div>'
    + '<div class="ml-legend">'
      + '<div class="ml-legend-item"><div class="ml-legend-dot" style="background:rgba(0,200,160,.72)"></div>Protein</div>'
      + '<div class="ml-legend-item"><div class="ml-legend-dot" style="background:rgba(130,170,240,.28)"></div>Carbs</div>'
      + '<div class="ml-legend-item"><div class="ml-legend-dot" style="background:rgba(196,124,24,.58)"></div>Fat</div>'
      + '<div style="margin-left:auto;font-size:8px;font-weight:300;color:var(--dk-3);">bar height = kcal vs target</div>'
    + '</div>'
  + '</div>';

  // ── Energy balance section ───────────────────────────────
  var ebBMR = _calcBMR(p);
  // Burn split: baseline (rest day TDEE) vs active (training day TDEE)
  var ebRestBurn = _calcDayBurn(p, {priority:'rest'});
  var ebTrainBurns = (p.weekPlan||[]).filter(function(d){return d.priority==='training';}).map(function(d){return _calcDayBurn(p,d);});
  var ebAvgTrainBurn = ebTrainBurns.length ? Math.round(ebTrainBurns.reduce(function(a,b){return a+b;},0)/ebTrainBurns.length) : ebRestBurn + 270;
  var ebBurnDelta = ebAvgTrainBurn - ebRestBurn;
  var ebTotalBurn=0, ebTotalIntake=0, ebLoggedCount=0;
  for(var ei=0;ei<7;ei++){
    ebTotalBurn += _calcDayBurn(p, getEffDay(p,ei));
    var elog=loadLog(dayStr(ei));
    var ekcal=elog&&elog.actual&&elog.actual.kcal>0?elog.actual.kcal:0;
    if(ekcal>0){ebTotalIntake+=ekcal;ebLoggedCount++;}
  }
  var ebAvgBurn=Math.round(ebTotalBurn/7);
  var ebAvgIntake=ebLoggedCount>0?Math.round(ebTotalIntake/ebLoggedCount):0;
  var ebAvgDef=ebAvgIntake>0?ebAvgBurn-ebAvgIntake:0;
  var ebDefCls=ebAvgDef>300?'jade':ebAvgDef>=0?'amber':'slate';

  var ebCols='';
  for(var ei=0;ei<7;ei++){
    var eDayPlan=getEffDay(p,ei);
    var eBurn=_calcDayBurn(p,eDayPlan);
    var eLog=loadLog(dayStr(ei));
    var eIsToday=ei===ti; var eIsFuture=ei>ti;
    var eKcal=eLog&&eLog.actual&&eLog.actual.kcal>0?eLog.actual.kcal:0;
    var eTarget=eDayPlan.kcal||(eDayPlan.priority==='training'?(p.trainingKcal||p.calories||2400):(p.restKcal||p.calories||2000));
    var eIntakeTxt,eIntakeCls;
    if(eKcal>0){eIntakeTxt=eKcal.toLocaleString();eIntakeCls='logged';}
    else if(eIsFuture){eIntakeTxt=eTarget.toLocaleString();eIntakeCls='target';}
    else{eIntakeTxt='&mdash;';eIntakeCls='';}
    var eNetVal=eKcal>0?eBurn-eKcal:(eIsFuture?eBurn-eTarget:null);
    var eNetTxt,eNetCls;
    if(eNetVal!==null){
      var eNetAbs=Math.abs(Math.round(eNetVal));
      eNetTxt=(eNetVal>=0?'&minus;':'+')+(eNetAbs>999?(eNetAbs/1000).toFixed(1)+'k':eNetAbs);
      eNetCls=eNetVal>=0?'deficit':'surplus';
      if(eIsFuture&&eNetVal!==null)eNetCls+=' planned';
    }else{eNetTxt='?';eNetCls='empty';}
    ebCols+='<div class="eb-day'+(eIsToday?' is-today':'')+'">'
      +'<div class="eb-day-lbl">'+DNS3[ei]+'</div>'
      +'<div class="eb-day-burn">'+eBurn.toLocaleString()+'<span class="eb-day-unit">burn</span></div>'
      +'<div class="eb-day-intake '+eIntakeCls+'">'+eIntakeTxt+'<span class="eb-day-unit">in</span></div>'
      +'<div class="eb-day-net '+eNetCls+'">'+eNetTxt+'</div>'
    +'</div>';
  }

  // Net: weighted avg (training days use trainBurn, rest days use restBurn)
  var ebTrainCount=(p.weekPlan||[]).filter(function(d){return d.priority==='training';}).length;
  var ebRestCount=7-ebTrainCount;
  var ebWeeklyBurn=ebAvgTrainBurn*ebTrainCount+ebRestBurn*ebRestCount;
  var ebWtdAvgBurn=Math.round(ebWeeklyBurn/7);
  var ebNetVal=ebAvgIntake>0?ebWtdAvgBurn-ebAvgIntake:null;
  var ebNetTxt=ebNetVal!==null?(ebNetVal>=0?'−':'+')+(Math.abs(ebNetVal)).toLocaleString():'—';
  var ebNetLbl=ebNetVal!==null?(ebNetVal>=0?'deficit':'surplus'):'not logged';
  var ebNetCls=ebNetVal===null?'slate':ebNetVal>=300?'jade':ebNetVal>=0?'amber':'red';
  var ebNetItemCls=ebNetVal===null?'net nodata':ebNetVal<0?'net surplus':'net';

  var energyBalanceHTML='<div class="energy-balance">'
    +'<div class="sec-label" style="margin-top:28px;">Energy balance&nbsp;<span style="font-weight:300;text-transform:none;letter-spacing:.04em;font-size:9px;">est. burn vs intake &middot; daily</span></div>'
    +'<div class="eb-summary">'
      +'<div class="eb-sum-item"><div class="eb-sum-label">Burnt · training</div><div class="eb-sum-val amber">'+ebAvgTrainBurn.toLocaleString()+'</div><div class="eb-sum-sub">kcal/day · gym sessions</div></div>'
      +'<div class="eb-sum-item"><div class="eb-sum-label">Burnt · baseline</div><div class="eb-sum-val slate">'+ebRestBurn.toLocaleString()+'</div><div class="eb-sum-sub">kcal/day · rest days</div></div>'
      +(ebAvgIntake>0
        ?'<div class="eb-sum-item"><div class="eb-sum-label">Calories in</div><div class="eb-sum-val">'+ebAvgIntake.toLocaleString()+'</div><div class="eb-sum-sub">avg · '+ebLoggedCount+' day'+(ebLoggedCount===1?'':'s')+' logged</div></div>'
        :'<div class="eb-sum-item"><div class="eb-sum-label">Calories in</div><div class="eb-sum-val slate">—</div><div class="eb-sum-sub">log food to see intake</div></div>')
      +'<div class="eb-sum-item '+ebNetItemCls+'"><div class="eb-sum-label">= Net avg</div><div class="eb-sum-val '+ebNetCls+'">'+ebNetTxt+'</div><div class="eb-sum-sub">kcal/day · '+ebNetLbl+'</div></div>'
    +'</div>'
    +'<div class="eb-grid">'+ebCols+'</div>'
    +'<div class="eb-note">BMR via Mifflin-St Jeor &middot; training burn = baseline + ~240–360 kcal session · baseline = BMR &times; activity</div>'
  +'</div>';
  // ─────────────────────────────────────────────────────────

  var aiCacheKey='bl_week_analysis_'+new Date().toISOString().slice(0,10);
  var aiCached=null;try{aiCached=localStorage.getItem(aiCacheKey);}catch(e){}
  var aiHTML='<div class="sec-label" style="margin-top:28px;">AI week analysis<span class="pro-badge">PRO</span></div>'
    +'<button class="ai-gen-btn" onclick="generateWeekAnalysis()" id="ai-gen-btn">'
      +'<div id="ai-gen-icon" style="font-size:18px;">⚡</div>'
      +'<div><div class="ai-gen-label">'+(aiCached?'Refresh week analysis':'Generate week analysis')+'</div>'
      +'<div class="ai-gen-sub">Coach reads your actual week and advises on what remains</div></div>'
    +'</button>'
    +'<div class="ai-result" id="ai-result-box">'+(aiCached?'<div style="font-size:9px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--jade);margin-bottom:8px;">Coach</div><div>'+aiCached+'</div>':'')+'</div>';

  document.getElementById('main-page').innerHTML=
    '<div class="wk-hero"><div class="wk-hero-left"><div class="wk-kicker">Training ledger</div><div class="wk-title">This<br><em>week.</em></div><div class="wk-sub">Planned vs actual. Every session classified against your goals.</div></div></div>'
    +statsHTML+bannerHTML+cardsHTML+macroLedgerHTML+energyBalanceHTML+aiHTML
    +'<div id="bl-proposals-section" style="margin-top:28px;"></div>'
    +'<div id="bl-log-section" style="margin-top:14px;"></div>';

  if(typeof blRefreshProposalUI==='function')blRefreshProposalUI();
}

async function generateWeekAnalysis(){
  var p=getProfile();if(!p)return;
  var btn=document.getElementById('ai-gen-btn');
  var box=document.getElementById('ai-result-box');
  if(btn){btn.disabled=true;btn.querySelector('#ai-gen-icon').innerHTML='<span class="spinner"></span>';}
  var ti=todayIdx();
  var ws=DNS.map(function(day,i){var wp=getEffDay(p,i);var log=loadLog(dayStr(i));var ts=log?(log.trainStatus||'not logged'):'not logged';return day+': '+wp.type+(i<ti?' — '+ts:i===ti?' (today)':' (upcoming)');}).join('\n');
  var prompt='You are a performance coach for '+(p.name||'the user')+', age '+(p.age||44)+', goal: '+(p.goal||'body recomposition')+'.\n\nThis week:\n'+ws+'\n\nWrite 2-3 concise, direct sentences assessing the week and what to prioritise for the remaining days. Be specific about training and recovery. No bullet points.';
  try{
    var res=await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:200,messages:[{role:'user',content:prompt}]})});
    var data=await res.json();
    var text=(data.content||[]).map(function(b){return b.text||'';}).join('').trim();
    var cacheKey='bl_week_analysis_'+new Date().toISOString().slice(0,10);
    try{localStorage.setItem(cacheKey,text);}catch(e){}
    if(box)box.innerHTML='<div style="font-size:9px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--jade);margin-bottom:8px;">Coach</div><div>'+text+'</div>';
    if(btn){var lbl=btn.querySelector('.ai-gen-label');if(lbl)lbl.textContent='Refresh week analysis';}
  }catch(e){
    if(box)box.innerHTML='<div style="color:var(--dk-3);font-size:12px;">Could not load — <button onclick="generateWeekAnalysis()" style="background:none;border:none;color:var(--dk-3);text-decoration:underline;cursor:pointer;font-family:var(--sans);">try again</button></div>';
  }
  if(btn){btn.disabled=false;btn.querySelector('#ai-gen-icon').innerHTML='⚡';}
}

function openReshuffle(){
  var p=getProfile();if(!p)return;
  var missed=getMissed(p);if(!missed.length)return;
  var ex=document.getElementById('rs-overlay');if(ex)ex.remove();
  var ti=todayIdx();

  var rowsHTML=missed.map(function(m,mi){
    var btns='';
    for(var i=ti;i<7;i++){
      if(i===m.idx)continue;
      var wp=getEffDay(p,i);
      var isBusy=(wp.priority==='training');
      btns+='<button class="rs-day-btn'+(isBusy?' rs-day-busy':'')+'" onclick="rsSelectDay(this,'+mi+','+i+')" '+(isBusy?'title="Already has '+wp.type+'"':'')+'>'
        +DNS3[i]+(isBusy?'<span class="rs-day-busy-dot"></span>':'')
      +'</button>';
    }
    btns+='<button class="rs-day-btn rs-day-drop" onclick="rsSelectDay(this,'+mi+',-1)">Drop</button>';
    return '<div class="rs-assign-row" id="rs-row-'+mi+'">'
      +'<div class="rs-assign-from">'
        +'<span class="rs-missed-badge">'+m.type+'</span>'
        +'<span class="rs-assign-fromday">'+m.day+'</span>'
      +'</div>'
      +'<div class="rs-assign-arrow">→ move to</div>'
      +'<div class="rs-assign-btns">'+btns+'</div>'
    +'</div>';
  }).join('');

  var el=document.createElement('div');
  el.id='rs-overlay';
  el.innerHTML='<div class="rs-modal">'
    +'<div class="rs-hd"><div class="rs-title">Reshuffle week</div><button class="rs-close" onclick="closeReshuffle()">&#10005;</button></div>'
    +'<div class="rs-section">Move missed sessions</div>'
    +rowsHTML
    +'<div class="rs-note">Select a target day for each session. Days with an amber dot already have a session.</div>'
    +'<button class="rs-btn" id="rs-apply-btn" onclick="applyReshuffle()" disabled>Apply changes</button>'
  +'</div>';
  el.addEventListener('click',function(e){if(e.target===el)closeReshuffle();});
  document.body.appendChild(el);
  window._rsAssignments=missed.map(function(){return null;});
  window._rsMissed=missed;
}

function rsSelectDay(btn,mi,targetIdx){
  var row=document.getElementById('rs-row-'+mi);
  row.querySelectorAll('.rs-day-btn').forEach(function(b){b.classList.remove('selected');});
  btn.classList.add('selected');
  window._rsAssignments[mi]=targetIdx;
  var allSet=window._rsAssignments.every(function(a){return a!==null;});
  var applyBtn=document.getElementById('rs-apply-btn');
  if(applyBtn){applyBtn.disabled=!allSet;}
}

function closeReshuffle(){var el=document.getElementById('rs-overlay');if(el)el.remove();}

function applyReshuffle(){
  var p=getProfile();if(!p)return;
  var assignments=window._rsAssignments||[];
  var missed=window._rsMissed||[];
  var ov=loadOverride();
  var changes=[];

  missed.forEach(function(m,mi){
    var target=assignments[mi];
    var existing=loadLog(m.ds)||{};
    existing.trainStatus='skipped';
    existing.trainNote='Missed — reshuffled '+new Date().toLocaleDateString('en-GB');
    existing.updatedAt=new Date().toISOString();
    try{localStorage.setItem('bl_daylog_'+m.ds,JSON.stringify(existing));}catch(e){}

    if(target===-1){
      // Dropped — vacate the source day to Rest
      ov[m.idx]={
        type:        'Rest',
        priority:    'rest',
        focus:       'Session dropped',
        keyExercises:[],
        kcal:        null,
        source:      'reshuffle-vacated',
        note:        'Session dropped',
        reshuffledAt:new Date().toISOString()
      };
      changes.push({field:m.day,label:m.day,before:m.type,after:'Dropped'});
    } else {
      var orig=getEffDay(p,target);
      // Copy the FULL source plan — type, focus, exercises, kcal — so the card
      // actually shows the moved session with all its exercises intact
      var srcPlan=getEffDay(p,m.idx);
      ov[target]={
        type:        srcPlan.type       || m.type,
        priority:    'training',
        focus:       srcPlan.focus      || '',
        keyExercises:(srcPlan.keyExercises||[]).slice(),
        kcal:        srcPlan.kcal       || null,
        source:      'reshuffle',
        note:        'Moved from '+m.day,
        reshuffledAt:new Date().toISOString()
      };
      // Vacate the source day — it becomes Rest now that the session moved out
      ov[m.idx]={
        type:        'Rest',
        priority:    'rest',
        focus:       'Session moved to '+DNS[target],
        keyExercises:[],
        kcal:        null,
        source:      'reshuffle-vacated',
        note:        'Moved to '+DNS[target],
        reshuffledAt:new Date().toISOString()
      };
      changes.push({field:DNS[target],label:DNS[target],before:orig.type||'Rest',after:m.type+' (from '+m.day+')'});
    }
  });

  saveOverride(ov);
  var today=new Date().toISOString().slice(0,10);
  var monthKey=today.slice(0,7);
  ['dayplan_v6r3_','dayplan_v6r2_','bl_macros_'].forEach(function(k){try{localStorage.removeItem(k+today);}catch(e){}});
  try{localStorage.removeItem('bl_week_pool_v2_'+monthKey);}catch(e){}
  // Also clear the destination day's cached plan so it regenerates with the moved session
  assignments.forEach(function(target,mi){
    if(target!==-1){
      var destDs=dayStr(target);
      if(destDs!==today){
        ['dayplan_v6r3_','dayplan_v6r2_','bl_macros_'].forEach(function(k){try{localStorage.removeItem(k+destDs);}catch(e){}});
      }
    }
  });

  if(changes.length && typeof blPropose==='function'){
    var id=blPropose('programme','Week reshuffled — '+new Date().toLocaleDateString('en-GB'),changes,'Manual reshuffle: missed sessions moved to new days',null);
    if(id && typeof blCommitProposal==='function') blCommitProposal(id);
  }

  closeReshuffle();
  render();
  var t=document.getElementById('wk-toast');t.textContent='Week reshuffled — open Today to regenerate your plan';t.classList.add('show');setTimeout(function(){t.classList.remove('show');},3500);
}

render();
</script>
