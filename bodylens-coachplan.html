<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta name="theme-color" content="#0c1010">
<title>BodyLens &mdash; Coaching Plan</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
.cp-page { max-width:780px; margin:0 auto; padding:40px 28px 140px; }
.cp-hero { padding-bottom:28px; border-bottom:1px solid var(--bd); margin-bottom:32px; }
.cp-kicker { font-size:9px; font-weight:700; letter-spacing:.22em; text-transform:uppercase; color:var(--jade); margin-bottom:12px; display:flex; align-items:center; gap:10px; }
.cp-kicker::before { content:''; width:18px; height:1px; background:var(--jade); }
.cp-title { font-family:var(--serif); font-size:48px; font-weight:300; line-height:.92; letter-spacing:-.03em; color:var(--dk-1); margin-bottom:12px; }
.cp-title em { font-style:italic; color:var(--dk-3); }
.cp-meta { font-size:11px; font-weight:300; color:var(--dk-3); display:flex; gap:20px; flex-wrap:wrap; }
.cp-meta-item { display:flex; align-items:center; gap:5px; }
.cp-meta-dot { width:5px; height:5px; border-radius:50%; background:var(--jade); }
.cp-meta-dot.amber { background:var(--amber); }
.cp-meta-dot.red { background:rgba(220,80,60,.7); }
.cp-regen-btn {
  padding:8px 16px; border-radius:8px; border:1px solid rgba(0,200,160,.25);
  background:rgba(0,200,160,.06); font-size:10px; font-weight:700; letter-spacing:.08em;
  text-transform:uppercase; color:var(--jade); cursor:pointer; font-family:var(--sans);
  transition:all .15s; margin-top:14px;
}
.cp-regen-btn:hover { background:rgba(0,200,160,.12); }
.cp-regen-btn:disabled { opacity:.4; cursor:not-allowed; }
.cp-section { margin-bottom:36px; }
.cp-section-label { font-size:9px; font-weight:700; letter-spacing:.2em; text-transform:uppercase; color:var(--jade); margin-bottom:14px; display:flex; align-items:center; justify-content:space-between; }
.cp-section-label.amber { color:var(--amber); }
.cp-section-label.slate { color:var(--dk-3); }
.cp-prose { font-size:14px; font-weight:300; color:var(--dk-2); line-height:1.85; font-family:var(--serif); }
.cp-prose strong { font-weight:500; color:var(--dk-1); font-family:var(--sans); font-size:13px; }
.cp-card { background:var(--ink-1); border:1px solid rgba(255,255,255,.07); border-radius:12px; padding:18px 20px; margin-bottom:10px; }
.cp-card-label { font-size:9px; font-weight:700; letter-spacing:.14em; text-transform:uppercase; color:var(--dk-3); margin-bottom:8px; }
.cp-card-text { font-size:13px; font-weight:300; color:var(--dk-2); line-height:1.75; }
.cp-row { display:flex; justify-content:space-between; align-items:baseline; padding:7px 0; border-bottom:1px solid rgba(255,255,255,.04); font-size:13px; }
.cp-row:last-child { border-bottom:none; }
.cp-row-label { font-weight:300; color:var(--dk-3); }
.cp-row-val { font-weight:600; color:var(--dk-1); text-align:right; max-width:60%; }
.cp-row-val.jade { color:var(--jade); }
.cp-row-val.amber { color:var(--amber); }
.cp-pill-list { display:flex; flex-wrap:wrap; gap:6px; margin-top:4px; }
.cp-pill { padding:3px 10px; border-radius:20px; font-size:10px; font-weight:600; letter-spacing:.04em; background:rgba(255,255,255,.05); border:1px solid rgba(255,255,255,.08); color:var(--dk-2); }
.cp-pill.jade { background:rgba(0,200,160,.08); border-color:rgba(0,200,160,.2); color:var(--jade); }
.cp-pill.amber { background:rgba(196,124,24,.08); border-color:rgba(196,124,24,.2); color:var(--amber); }
.cp-divider { height:1px; background:var(--bd); margin:32px 0; }
.cp-sources { margin-top:40px; border-top:1px solid var(--bd); padding-top:20px; }
.cp-sources-label { font-size:9px; font-weight:700; letter-spacing:.16em; text-transform:uppercase; color:var(--dk-3); margin-bottom:12px; }
.cp-source-row { display:flex; align-items:center; gap:10px; padding:7px 0; border-bottom:1px solid rgba(255,255,255,.04); }
.cp-source-row:last-child { border-bottom:none; }
.cp-source-dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; }
.cp-source-dot.filled { background:var(--jade); }
.cp-source-dot.empty { background:rgba(255,255,255,.1); border:1px solid rgba(255,255,255,.15); }
.cp-source-name { font-size:12px; font-weight:600; color:var(--dk-1); min-width:160px; }
.cp-source-status { font-size:11px; font-weight:300; color:var(--dk-3); flex:1; }
.cp-source-action { font-size:10px; font-weight:600; color:var(--jade); text-decoration:none; }
.cp-generated { font-size:10px; font-weight:300; color:var(--dk-3); margin-top:4px; }
.cp-loading { text-align:center; padding:60px 20px; display:none; }
.cp-loading.show { display:block; }
.cp-spinner { width:28px; height:28px; border-radius:50%; border:2px solid rgba(255,255,255,.08); border-top-color:var(--jade); animation:spin .8s linear infinite; margin:0 auto 16px; }
@keyframes spin { to { transform:rotate(360deg); } }
.cp-empty { text-align:center; padding:80px 20px; }
.cp-empty-title { font-family:var(--serif); font-size:28px; font-weight:300; color:var(--dk-2); margin-bottom:10px; }
.cp-empty-body { font-size:13px; font-weight:300; color:var(--dk-3); line-height:1.75; max-width:440px; margin:0 auto 24px; }
.cp-flag-row { display:flex; gap:8px; padding:8px 0; border-bottom:1px solid rgba(255,255,255,.04); }
.cp-flag-row:last-child { border-bottom:none; }
.cp-flag-icon { font-size:12px; flex-shrink:0; margin-top:2px; }
.cp-flag-text { font-size:12px; font-weight:300; color:var(--dk-2); line-height:1.6; }
.cp-compliance { display:flex; align-items:center; gap:12px; }
.cp-compliance-bar-wrap { flex:1; height:5px; background:rgba(255,255,255,.06); border-radius:3px; }
.cp-compliance-bar { height:100%; border-radius:3px; background:var(--jade); transition:width .4s; }
.cp-compliance-score { font-size:13px; font-weight:700; color:var(--jade); min-width:40px; text-align:right; }
</style>
</head>
<body>
<script src="nav.js"></script>
<div class="cp-page">

  <div class="cp-hero">
    <div class="cp-kicker">Your coaching plan</div>
    <div class="cp-title" id="cp-title">Loading<br><em>your plan&hellip;</em></div>
    <div class="cp-meta" id="cp-meta"></div>
    <button class="cp-regen-btn" id="cp-regen-btn" onclick="regenPlan()" style="display:none;">
      &#8635; Refresh coaching plan
    </button>
    <div class="cp-generated" id="cp-generated"></div>
  </div>

  <div class="cp-loading" id="cp-loading">
    <div class="cp-spinner"></div>
    <div style="font-size:13px;font-weight:300;color:var(--dk-2);">Reading your full profile&hellip;</div>
    <div style="font-size:11px;font-weight:300;color:var(--dk-3);margin-top:6px;">This takes 15&ndash;20 seconds</div>
  </div>

  <div id="cp-content"></div>

</div>
<script src="pwa.js"></script>
<script>
'use strict';
const API = '/api/chat';
const MODEL = 'claude-sonnet-4-20250514';
const PLAN_KEY = 'bl_coachplan';

const _p = (function(){
  try { return JSON.parse(localStorage.getItem('bl_profile')||'null'); } catch(e){return null;}
})();

const navMeta = document.getElementById('nav-meta');
if (navMeta && _p) navMeta.innerHTML = '<span class="nav-tag nt-jade">'+(_p.name||'You')+'</span>';

function cap(s){ return s ? s.charAt(0).toUpperCase()+s.slice(1) : ''; }

// ── Data completeness audit ─────────────────────────────
function auditProfile(p) {
  if (!p) return [];
  return [
    { name:'Onboarding', filled:!!(p.weekPlan && p.weekPlan.length && p.calories), link:'bodylens-onboard.html', key:'onboarding' },
    { name:'Body scan (machine)', filled:!!p.bodyScan, link:'bodylens-bodyscan.html', key:'bodyScan' },
    { name:'Photo analysis', filled:!!p.bodyPhotoAnalysis, link:'bodylens-bodyscan.html', key:'bodyPhoto' },
    { name:'Gap bridge', filled:!!p.gapBridge, link:'bodylens-bodyscan.html', key:'gapBridge' },
    { name:'Behaviour memory', filled:!!(p.behaviourMemory && p.behaviourMemory.weekSummaries && p.behaviourMemory.weekSummaries.length), link:'bodylens-dailyplan.html', key:'memory' },
    { name:'Accelerators active', filled:!!(p.optimisations && p.optimisations.length), link:'bodylens-accelerators.html', key:'accelerators' },
    { name:'Overlays active', filled:!!(p.overlays && p.overlays.filter(function(o){return o.active!==false;}).length), link:'bodylens-dailyplan.html', key:'overlays' },
    { name:'Coach notes', filled:!!(p.coachNotes && p.coachNotes.trim()), link:'bodylens-dailyplan.html', key:'coachNotes' },
    { name:'Injuries assessed', filled:!!(p.injuryAssessments && p.injuryAssessments.length), link:'bodylens-programme.html', key:'injuries' },
    { name:'Programme report', filled:!!(p.instructions || p.coachSummary), link:'bodylens-instructions.html', key:'report' },
  ];
}

// ── Load or generate the plan ───────────────────────────
function init() {
  if (!_p) {
    document.getElementById('cp-title').innerHTML = 'No profile<br><em>found.</em>';
    document.getElementById('cp-content').innerHTML =
      '<div class="cp-empty">'
      + '<div class="cp-empty-title">Start here</div>'
      + '<div class="cp-empty-body">Complete onboarding to generate your coaching plan. It takes about 3 minutes.</div>'
      + '<a href="bodylens-onboard.html" class="cp-regen-btn" style="display:inline-block;text-decoration:none;">Get started &rarr;</a>'
      + '</div>';
    return;
  }

  const stored = loadStoredPlan();
  if (stored && stored.generatedAt) {
    renderPlan(stored, false);
  } else {
    generatePlan();
  }
}

function loadStoredPlan() {
  try { return JSON.parse(localStorage.getItem(PLAN_KEY)||'null'); } catch(e){ return null; }
}

async function generatePlan() {
  document.getElementById('cp-loading').classList.add('show');
  document.getElementById('cp-content').innerHTML = '';

  const p = _p;
  const sources = auditProfile(p);
  const filledSources = sources.filter(function(s){return s.filled;}).map(function(s){return s.name;});

  // Build a full context dump for the AI
  const ctx = [
    'PERSON: ' + p.name + ', ' + p.age + 'yo ' + p.sex + ', ' + p.weight + 'kg ' + p.height + 'cm',
    'GOAL: ' + p.goal + (p.target ? ' — ' + p.target : ''),
    'TRAINING: ' + (p.trainingDays||4) + ' days/week — ' + (p.weekPlan||[]).filter(function(d){return d.priority==='training';}).map(function(d){return d.type;}).join(', '),
    'MACROS: ' + p.calories + ' kcal | ' + p.protein + 'g protein | ' + p.carbs + 'g carbs | ' + p.fat + 'g fat',
    'TRAINING vs REST: ' + (p.trainingKcal||p.calories) + ' kcal training / ' + (p.restKcal||'?') + ' kcal rest',
    'SUPPLEMENTS: ' + (p.supplements||[]).map(function(s){return s.name+' '+s.dose;}).join(', '),
    p.bodyScan ? 'BODY SCAN: BF%=' + (p.bodyScan.bodyFatPct||'?') + ' | Lean=' + (p.bodyScan.leanMass||'?') + 'kg | BMR=' + (p.bodyScan.bmr||'?') : '',
    p.bodyPhotoAnalysis ? 'PHOTO ANALYSIS: BF range=' + (p.bodyPhotoAnalysis.bodyFatRange||'?') + ' | Muscle base=' + (p.bodyPhotoAnalysis.muscleBase||'?') + ' | Gaps: ' + (p.bodyPhotoAnalysis.gaps||[]).join(', ') + ' | Key lever: ' + (p.bodyPhotoAnalysis.keyLever||'') : '',
    p.gapBridge ? 'GAP BRIDGE: Phase=' + (p.gapBridge.currentPhase||'?') + ' | Timeline=' + (p.gapBridge.timeline||'?') + ' | Weekly focus: ' + (p.gapBridge.weeklyFocus||'') : '',
    p.behaviourMemory ? 'BEHAVIOUR MEMORY: Compliance=' + (p.behaviourMemory.complianceScore||'?') + '/100 | Flags: ' + (p.behaviourMemory.currentFlags||[]).join(', ') + ' | Patterns: ' + (p.behaviourMemory.patterns||[]).join('; ') : '',
    p.overlays && p.overlays.length ? 'ACTIVE OVERLAYS: ' + p.overlays.filter(function(o){return o.active!==false;}).map(function(o){return o.name+' ('+o.trigger+')';}).join(', ') : '',
    p.optimisations && p.optimisations.length ? 'OPTIMISATIONS: ' + p.optimisations.slice(0,8).join(', ') : '',
    p.coachNotes ? 'COACH NOTES: ' + p.coachNotes : '',
    p.injuries && p.injuries.length ? 'INJURIES: ' + p.injuries.map(function(i){return i.location||i;}).join(', ') : '',
    p.watchPoints ? 'WATCH POINTS: ' + p.watchPoints : '',
    p.nonNegotiables && p.nonNegotiables.length ? 'NON-NEGOTIABLES: ' + p.nonNegotiables.join(', ') : '',
    p.coachSummary ? 'COACH SUMMARY: ' + p.coachSummary : '',
    'DATA SOURCES ACTIVE: ' + filledSources.join(', '),
  ].filter(Boolean).join('\n');

  const prompt = 'You are writing the living coaching plan for ' + p.name + '. This is a single document that summarises everything the system knows about them — their goal, where they currently are, what the programme is doing, and what to watch for. It is written directly to them in second person, honest, specific, no fluff.\n\n'
    + 'FULL PROFILE DATA:\n' + ctx + '\n\n'
    + 'Write the coaching plan as a structured JSON document:\n'
    + '{\n'
    + '  "headline": "One powerful sentence about where they are and what this programme is doing for them",\n'
    + '  "goal": "Their goal stated precisely — not what they said, what it actually means physically",\n'
    + '  "currentStatus": "2-3 sentences. Where they genuinely are right now based on all available data. Specific numbers where available.",\n'
    + '  "whatTheProgrammeIsDoing": "2-3 sentences. What the training + nutrition approach is engineered to do. The logic behind the plan.",\n'
    + '  "phase": "Current phase name",\n'
    + '  "phaseRationale": "1-2 sentences. Why this phase, what it achieves, when it moves to the next.",\n'
    + '  "primaryLevers": ["The 2-4 highest-leverage things. Specific, not generic."],\n'
    + '  "nutrition": "2 sentences. The nutrition strategy in plain English. Not just the numbers — the logic.",\n'
    + '  "training": "2 sentences. What the training split is doing and why.",\n'
    + '  "behaviour": "1-2 sentences. The behaviour pattern to protect. What to watch for.",\n'
    + '  "watchPoints": ["2-3 specific early warning signs to watch for"],\n'
    + '  "complianceSummary": "1 sentence on recent compliance if data exists, null otherwise",\n'
    + '  "whatWouldDerailThis": "1-2 sentences. Honest. The specific failure modes for this person.",\n'
    + '  "coachDirective": "A direct instruction to this person right now. Not motivational — operational. What to do today/this week.",\n'
    + '  "dataGaps": ["What data is missing that would make this coaching more precise — max 3 items"]\n'
    + '}\n'
    + 'Be specific. Use their actual numbers. Reference the gap bridge and behaviour memory where present.\n'
    + 'Return ONLY valid JSON. No markdown.';

  try {
    const res = await fetch(API, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ model:MODEL, max_tokens:1800, messages:[{role:'user',content:prompt}] })
    });
    if (!res.ok) throw new Error('API ' + res.status);
    const data = await res.json();
    const raw = (data.content||[]).map(function(b){return b.text||'';}).join('').trim();
    const plan = JSON.parse(raw.replace(/```json|```/g,'').trim());
    plan.generatedAt = new Date().toISOString();
    plan.sources = sources;
    try { localStorage.setItem(PLAN_KEY, JSON.stringify(plan)); } catch(e) {}
    document.getElementById('cp-loading').classList.remove('show');
    renderPlan(plan, true);
  } catch(err) {
    document.getElementById('cp-loading').classList.remove('show');
    document.getElementById('cp-content').innerHTML =
      '<div style="padding:20px;background:rgba(220,80,60,.06);border:1px solid rgba(220,80,60,.2);border-radius:8px;font-size:13px;color:var(--dk-2);">Failed to generate coaching plan: '+err.message+'<br><br><button class="cp-regen-btn" onclick="generatePlan()">Try again</button></div>';
  }
}

async function regenPlan() {
  localStorage.removeItem(PLAN_KEY);
  document.getElementById('cp-regen-btn').disabled = true;
  await generatePlan();
  document.getElementById('cp-regen-btn').disabled = false;
}

function renderPlan(plan, fresh) {
  const p = _p;
  const sources = plan.sources || auditProfile(p);
  const filledCount = sources.filter(function(s){return s.filled;}).length;

  // Hero
  document.getElementById('cp-title').innerHTML = (p ? p.name : 'Your') + '<br><em>coaching plan.</em>';
  const d = new Date(plan.generatedAt||Date.now());
  const ds = d.toLocaleDateString('en-GB', {weekday:'long',day:'numeric',month:'long',year:'numeric'});
  document.getElementById('cp-meta').innerHTML =
    '<div class="cp-meta-item"><div class="cp-meta-dot"></div><span>' + (p ? p.goal : '') + '</span></div>'
    + '<div class="cp-meta-item"><div class="cp-meta-dot amber"></div><span>' + (plan.phase||'Foundation') + '</span></div>'
    + '<div class="cp-meta-item"><div class="cp-meta-dot' + (filledCount < 5 ? ' red' : '') + '"></div><span>' + filledCount + '/' + sources.length + ' data sources active</span></div>';
  document.getElementById('cp-generated').textContent = 'Generated ' + ds;
  document.getElementById('cp-regen-btn').style.display = 'inline-block';

  // Build content
  var html = '';

  // Headline callout
  if (plan.headline) {
    html += '<div style="padding:20px 24px;background:rgba(0,200,160,.04);border:1px solid rgba(0,200,160,.12);border-left:3px solid var(--jade);border-radius:0 10px 10px 0;margin-bottom:28px;">'
      + '<div style="font-family:var(--serif);font-size:18px;font-weight:300;color:var(--dk-1);line-height:1.65;">' + plan.headline + '</div>'
      + '</div>';
  }

  // Goal
  html += '<div class="cp-section"><div class="cp-section-label">Goal</div>';
  html += '<div class="cp-prose">' + (plan.goal||'') + '</div></div>';

  // Current status
  html += '<div class="cp-section"><div class="cp-section-label amber">Where you are now</div>';
  html += '<div class="cp-prose">' + (plan.currentStatus||'') + '</div>';
  if (p && p.bodyPhotoAnalysis) {
    html += '<div class="cp-card" style="margin-top:12px;">'
      + '<div class="cp-card-label">Body composition (photo analysis)</div>'
      + '<div class="cp-row"><span class="cp-row-label">Body fat estimate</span><span class="cp-row-val jade">' + (p.bodyPhotoAnalysis.bodyFatRange||'—') + '</span></div>'
      + '<div class="cp-row"><span class="cp-row-label">Muscle base</span><span class="cp-row-val">' + cap(p.bodyPhotoAnalysis.muscleBase||'—') + '</span></div>'
      + (p.bodyPhotoAnalysis.keyLever ? '<div class="cp-row"><span class="cp-row-label">Key lever</span><span class="cp-row-val">' + p.bodyPhotoAnalysis.keyLever + '</span></div>' : '')
      + '</div>';
  }
  if (p && p.bodyScan) {
    html += '<div class="cp-card" style="margin-top:8px;">'
      + '<div class="cp-card-label">Body scan (' + (p.bodyScan.source||'machine') + ')</div>'
      + (p.bodyScan.bodyFatPct ? '<div class="cp-row"><span class="cp-row-label">Body fat</span><span class="cp-row-val jade">' + p.bodyScan.bodyFatPct + '%</span></div>' : '')
      + (p.bodyScan.leanMass ? '<div class="cp-row"><span class="cp-row-label">Lean mass</span><span class="cp-row-val">' + p.bodyScan.leanMass + 'kg</span></div>' : '')
      + (p.bodyScan.bmr ? '<div class="cp-row"><span class="cp-row-label">BMR (measured)</span><span class="cp-row-val">' + p.bodyScan.bmr + ' kcal</span></div>' : '')
      + (p.bodyScan.metabolicAge ? '<div class="cp-row"><span class="cp-row-label">Metabolic age</span><span class="cp-row-val">' + p.bodyScan.metabolicAge + '</span></div>' : '')
      + '</div>';
  }
  html += '</div>';

  // What the programme is doing
  html += '<div class="cp-section"><div class="cp-section-label">What this programme is doing</div>';
  html += '<div class="cp-prose">' + (plan.whatTheProgrammeIsDoing||'') + '</div></div>';

  // Phase
  if (plan.phase) {
    html += '<div class="cp-section"><div class="cp-section-label">Current phase</div>';
    html += '<div class="cp-card"><div class="cp-card-label">' + plan.phase + '</div><div class="cp-card-text">' + (plan.phaseRationale||'') + '</div></div>';
    if (p && p.gapBridge && p.gapBridge.successMetrics) {
      html += '<div style="margin-top:8px;font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--dk-3);margin-bottom:8px;">How to know it\'s working</div>';
      html += (p.gapBridge.successMetrics||[]).map(function(m){
        return '<div style="display:flex;gap:8px;padding:5px 0;"><div style="color:var(--jade);flex-shrink:0;">&#9670;</div><div style="font-size:12px;font-weight:300;color:var(--dk-2);">'+m+'</div></div>';
      }).join('');
    }
    html += '</div>';
  }

  // Primary levers
  if (plan.primaryLevers && plan.primaryLevers.length) {
    html += '<div class="cp-section"><div class="cp-section-label">Primary levers</div>';
    html += plan.primaryLevers.map(function(l) {
      return '<div style="display:flex;gap:10px;padding:9px 0;border-bottom:1px solid rgba(255,255,255,.04);">'
        + '<div style="width:6px;height:6px;border-radius:50%;background:var(--jade);flex-shrink:0;margin-top:5px;"></div>'
        + '<div style="font-size:13px;font-weight:300;color:var(--dk-2);">'+l+'</div>'
        + '</div>';
    }).join('');
    html += '</div>';
  }

  // Three pillars inline
  html += '<div class="cp-section"><div class="cp-section-label slate">The pillars</div>';
  html += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">';
  html += '<div class="cp-card"><div class="cp-card-label" style="color:var(--jade);">Training</div><div class="cp-card-text">' + (plan.training||'—') + '</div>';
  if (p && p.overlays && p.overlays.filter(function(o){return o.active!==false;}).length) {
    html += '<div style="margin-top:10px;font-size:9px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--dk-3);margin-bottom:6px;">Active overlays</div>';
    html += '<div class="cp-pill-list">';
    p.overlays.filter(function(o){return o.active!==false;}).forEach(function(o){
      html += '<span class="cp-pill jade">'+o.name+'</span>';
    });
    html += '</div>';
  }
  html += '</div>';
  html += '<div class="cp-card"><div class="cp-card-label" style="color:var(--amber);">Nutrition</div><div class="cp-card-text">' + (plan.nutrition||'—') + '</div>';
  html += '<div style="margin-top:10px;">';
  html += '<div class="cp-row"><span class="cp-row-label">Training days</span><span class="cp-row-val jade">' + (p ? p.trainingKcal||p.calories : '—') + ' kcal</span></div>';
  html += '<div class="cp-row"><span class="cp-row-label">Rest days</span><span class="cp-row-val">' + (p ? p.restKcal : '—') + ' kcal</span></div>';
  html += '<div class="cp-row"><span class="cp-row-label">Protein</span><span class="cp-row-val jade">' + (p ? p.protein : '—') + 'g daily</span></div>';
  html += '</div></div>';
  html += '</div></div>';

  // Behaviour / compliance
  html += '<div class="cp-section"><div class="cp-section-label slate">Behaviour</div>';
  html += '<div class="cp-prose" style="margin-bottom:12px;">' + (plan.behaviour||'—') + '</div>';
  if (p && p.behaviourMemory && p.behaviourMemory.complianceScore !== null && p.behaviourMemory.complianceScore !== undefined) {
    html += '<div class="cp-card" style="margin-bottom:10px;">'
      + '<div class="cp-card-label">Rolling compliance</div>'
      + '<div class="cp-compliance">'
        + '<div class="cp-compliance-bar-wrap"><div class="cp-compliance-bar" style="width:'+p.behaviourMemory.complianceScore+'%"></div></div>'
        + '<div class="cp-compliance-score">'+p.behaviourMemory.complianceScore+'%</div>'
      + '</div>';
    if (p.behaviourMemory.currentFlags && p.behaviourMemory.currentFlags.length) {
      html += '<div style="margin-top:10px;font-size:9px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--amber);margin-bottom:6px;">Current flags</div>';
      p.behaviourMemory.currentFlags.forEach(function(f){
        html += '<div class="cp-flag-row"><div class="cp-flag-icon" style="color:var(--amber);">&#9651;</div><div class="cp-flag-text">'+f+'</div></div>';
      });
    }
    html += '</div>';
  }
  html += '</div>';

  // Watch points
  if (plan.watchPoints && plan.watchPoints.length) {
    html += '<div class="cp-section"><div class="cp-section-label amber">Watch points</div>';
    html += plan.watchPoints.map(function(w){
      return '<div class="cp-flag-row"><div class="cp-flag-icon" style="color:rgba(220,80,60,.7);">&#9888;</div><div class="cp-flag-text">'+w+'</div></div>';
    }).join('');
    html += '</div>';
  }

  // What would derail this
  if (plan.whatWouldDerailThis) {
    html += '<div class="cp-section"><div class="cp-section-label" style="color:rgba(220,80,60,.7);">What would derail this</div>';
    html += '<div class="cp-prose">' + plan.whatWouldDerailThis + '</div></div>';
  }

  // Coach directive
  if (plan.coachDirective) {
    html += '<div style="padding:20px 24px;background:rgba(196,124,24,.04);border:1px solid rgba(196,124,24,.15);border-left:3px solid var(--amber);border-radius:0 10px 10px 0;margin-bottom:28px;">'
      + '<div style="font-size:9px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:var(--amber);margin-bottom:8px;">Coach directive</div>'
      + '<div style="font-family:var(--serif);font-size:16px;font-weight:300;color:var(--dk-1);line-height:1.75;">' + plan.coachDirective + '</div>'
      + '</div>';
  }

  // Data completeness
  html += '<div class="cp-divider"></div>';
  html += '<div class="cp-sources"><div class="cp-sources-label">Data completeness &mdash; ' + filledCount + ' of ' + sources.length + ' sources active</div>';
  sources.forEach(function(s) {
    html += '<div class="cp-source-row">'
      + '<div class="cp-source-dot ' + (s.filled ? 'filled' : 'empty') + '"></div>'
      + '<div class="cp-source-name">' + s.name + '</div>'
      + '<div class="cp-source-status">' + (s.filled ? 'Active' : 'Not yet set up') + '</div>'
      + (!s.filled ? '<a href="' + s.link + '" class="cp-source-action">Set up &rarr;</a>' : '')
      + '</div>';
  });
  html += '</div>';

  // Data gaps
  if (plan.dataGaps && plan.dataGaps.length) {
    html += '<div class="cp-section" style="margin-top:20px;"><div class="cp-section-label slate">To make coaching more precise</div>';
    html += plan.dataGaps.map(function(d){
      return '<div class="cp-flag-row"><div class="cp-flag-icon" style="color:var(--dk-3);">&#9642;</div><div class="cp-flag-text">'+d+'</div></div>';
    }).join('');
    html += '</div>';
  }

  document.getElementById('cp-content').innerHTML = html;
}

init();
</script>
</body>
</html>
