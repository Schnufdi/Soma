<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta name="theme-color" content="#0c1010">
<title>BodyLens &mdash; Stack</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
.sp-page { max-width:760px; margin:0 auto; padding:32px 24px 120px; }
.sp-hero { padding-bottom:24px; border-bottom:1px solid var(--bd); margin-bottom:28px; }
.sp-kicker { font-size:9px; font-weight:700; letter-spacing:.2em; text-transform:uppercase; color:var(--jade); margin-bottom:10px; }
.sp-title { font-family:var(--serif); font-size:40px; font-weight:300; line-height:.95; letter-spacing:-.03em; color:var(--dk-1); margin-bottom:10px; }
.sp-title em { font-style:italic; color:var(--dk-3); }
.sp-sub { font-size:13px; font-weight:300; color:var(--dk-2); line-height:1.8; max-width:540px; }

/* Section labels */
.sp-section-label {
  font-size:9px; font-weight:700; letter-spacing:.18em; text-transform:uppercase;
  color:var(--dk-3); margin-bottom:14px; display:flex; align-items:center;
  justify-content:space-between; gap:10px;
}
.sp-section-label::after { content:''; flex:1; height:1px; background:rgba(255,255,255,.06); }
.sp-section-action { font-size:10px; font-weight:600; color:var(--jade); cursor:pointer; white-space:nowrap; letter-spacing:.06em; text-transform:uppercase; margin-left:10px; }

/* Active stack */
.sp-stack-empty {
  padding:20px; background:var(--ink-1); border:1px dashed rgba(255,255,255,.1);
  border-radius:10px; font-size:13px; font-weight:300; color:var(--dk-3);
  text-align:center; margin-bottom:28px;
}
.sp-stack-grid { display:flex; flex-direction:column; gap:6px; margin-bottom:28px; }
.sp-stack-row {
  display:flex; align-items:center; gap:12px; padding:12px 16px;
  background:var(--ink-1); border:1px solid rgba(255,255,255,.07); border-radius:10px;
  transition:all .12s;
}
.sp-stack-row:hover { border-color:rgba(255,255,255,.12); }
.sp-stack-icon { font-size:20px; flex-shrink:0; width:32px; text-align:center; }
.sp-stack-info { flex:1; min-width:0; }
.sp-stack-name { font-size:13px; font-weight:600; color:var(--dk-1); }
.sp-stack-meta { font-size:11px; font-weight:300; color:var(--dk-3); margin-top:2px; }
.sp-stack-timing {
  font-size:10px; font-weight:600; letter-spacing:.04em; color:var(--jade);
  white-space:nowrap; flex-shrink:0;
}
.sp-stack-remove {
  width:26px; height:26px; border-radius:6px; border:1px solid rgba(255,255,255,.08);
  background:none; color:var(--dk-3); cursor:pointer; font-size:13px;
  display:flex; align-items:center; justify-content:center; font-family:var(--sans);
  transition:all .12s; flex-shrink:0;
}
.sp-stack-remove:hover { border-color:rgba(220,80,60,.3); color:rgba(220,80,60,.7); }
.sp-stack-baseline-badge {
  font-size:9px; font-weight:700; letter-spacing:.08em; text-transform:uppercase;
  padding:2px 7px; border-radius:10px; background:rgba(0,200,160,.08);
  border:1px solid rgba(0,200,160,.2); color:var(--jade); flex-shrink:0;
}

/* Goal match panel */
.sp-goal-panel {
  background:var(--ink-1); border:1px solid rgba(255,255,255,.07); border-radius:12px;
  padding:18px 20px; margin-bottom:28px;
}
.sp-goal-title {
  font-size:12px; font-weight:700; color:var(--dk-1); margin-bottom:4px;
  display:flex; align-items:center; gap:8px;
}
.sp-goal-desc { font-size:12px; font-weight:300; color:var(--dk-3); margin-bottom:14px; line-height:1.6; }
.sp-goal-chips { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:14px; }
.sp-goal-chip {
  padding:6px 12px; border-radius:20px; border:1px solid rgba(255,255,255,.1);
  background:var(--ink-2); font-size:11px; font-weight:600; color:var(--dk-3);
  cursor:pointer; font-family:var(--sans); transition:all .12s;
}
.sp-goal-chip:hover { border-color:rgba(0,200,160,.3); color:var(--jade); }
.sp-goal-chip.active { border-color:rgba(0,200,160,.35); background:rgba(0,200,160,.08); color:var(--jade); }
.sp-reco-grid {
  display: flex;
  flex-direction: column;
  gap: 8px;
  margin-top: 4px;
}
.sp-reco-card {
  padding: 13px 14px;
  background: var(--ink-2);
  border: 1px solid rgba(255,255,255,.06);
  border-radius: 9px;
  transition: border-color .15s;
}
.sp-reco-card:hover { border-color: rgba(255,255,255,.12); }
.sp-reco-lead {
  display: flex;
  align-items: flex-start;
  gap: 12px;
}
.sp-reco-icon {
  font-size: 20px;
  flex-shrink: 0;
  margin-top: 2px;
  width: 24px;
  text-align: center;
}
.sp-reco-info {
  flex: 1;
  min-width: 0;
}
.sp-reco-name-row {
  display: flex;
  align-items: center;
  gap: 7px;
  flex-wrap: wrap;
  margin-bottom: 4px;
}
.sp-reco-name {
  font-size: 13px;
  font-weight: 700;
  color: var(--dk-1);
  line-height: 1.2;
}
.sp-reco-ev {
  font-size: 8px;
  font-weight: 700;
  letter-spacing: .1em;
  text-transform: uppercase;
  padding: 2px 7px;
  border-radius: 8px;
  flex-shrink: 0;
}
.sp-reco-ev-strong   { background: rgba(0,200,160,.12);  color: var(--jade); }
.sp-reco-ev-moderate { background: rgba(196,124,24,.1);   color: var(--amber); }
.sp-reco-ev-emerging { background: rgba(255,255,255,.07); color: var(--dk-3); }
.sp-reco-why {
  font-size: 12px;
  font-weight: 300;
  color: var(--dk-2);
  line-height: 1.55;
  margin-bottom: 3px;
}
.sp-reco-meta {
  font-size: 10px;
  font-weight: 300;
  color: var(--dk-3);
  margin-top: 4px;
}
.sp-reco-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
  margin-top: 7px;
}
.sp-reco-tag {
  font-size: 8px;
  font-weight: 600;
  letter-spacing: .06em;
  text-transform: uppercase;
  padding: 2px 7px;
  border-radius: 8px;
  background: rgba(255,255,255,.05);
  color: var(--dk-3);
  border: 1px solid rgba(255,255,255,.07);
}
.sp-reco-add {
  padding: 7px 14px;
  border-radius: 7px;
  border: 1px solid rgba(0,200,160,.3);
  background: rgba(0,200,160,.06);
  color: var(--jade);
  font-size: 11px;
  font-weight: 700;
  letter-spacing: .06em;
  text-transform: uppercase;
  cursor: pointer;
  font-family: var(--sans);
  transition: all .12s;
  flex-shrink: 0;
  white-space: nowrap;
}
.sp-reco-add:hover { background: rgba(0,200,160,.12); }
.sp-reco-add.saved { border-color: rgba(255,255,255,.1); color: var(--dk-3); cursor: default; }

.supp-ev-badge {
  display:inline-flex;align-items:center;gap:5px;
  font-size:9px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;
  border:1px solid;border-radius:4px;padding:2px 7px;
  margin-top:6px;cursor:help;opacity:.8;transition:opacity .15s;
}
.supp-ev-badge:hover{opacity:1;}
.supp-ev-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0;}

.sp-badge.established { background:rgba(0,200,160,.12); color:var(--jade,#00c8a0); border-color:rgba(0,200,160,.25); }
.sp-badge.emerging    { background:rgba(196,124,24,.1);  color:var(--amber,#c47c18); border-color:rgba(196,124,24,.2); }
.sp-badge.limited     { background:rgba(255,255,255,.04); color:rgba(160,168,152,.8); border-color:rgba(255,255,255,.1); }
.sp-badge.anecdotal   { background:rgba(180,100,80,.08);  color:rgba(200,120,100,.8); border-color:rgba(180,100,80,.2); }
</style>
</head>
<body>
<script src="nav.js"></script>
<div class="sp-page">

  <div class="sp-hero">
    <div class="sp-kicker">Supplementation</div>

  </div>
  <div id="sp-root"></div>
</div>

    warn: 'Paraesthesia (tingling skin, particularly face and hands) is common and harmless but uncomfortable for some. Splits doses of 1.6g or sustained-release formulations reduce this. Not suitable with some cardiac medications.',

  {

    tagline: 'NAD+ restoration, mitochondrial function, metabolic rate — David Sinclair territory',
    cat: 'Longevity',
    evidence: 'limited', evidenceNote: 'NAD+ biology compelling; human RCTs emerging but small; longevity extrapolation from animal data',
    dose: 'NMN: 500mg–1g/day | NR: 300–500mg/day',

    form: 'Sublingual NMN (better absorption) or NR capsules',

    mechanism: 'NMN and NR are precursors to NAD+, a coenzyme involved in cellular energy metabolism, DNA repair, and sirtuin activation. NAD+ levels decline with age — measurably so after 40. Restoration has shown improvements in energy metabolism, insulin sensitivity, and muscle function in animal models. Human evidence is building.',
    relevance: 'The most speculative item on this list — but the longevity angle is directly relevant at 44. The mechanism is real and the safety profile is excellent. If you\'re interested in the Sinclair protocol, this is the entry point. The mitochondrial energy effect is secondary but genuine.',

var GOALS_MAP = {
  'tongkat-ali':      ['body recomposition','muscle gain','testosterone','fat loss'],
  'fadogia-agrestis': ['testosterone','muscle gain'],
  'shilajit':         ['energy','testosterone','body recomposition','recovery'],
  'ashwagandha':      ['stress reduction','muscle gain','sleep','body recomposition','recovery'],
  'lions-mane':       ['cognitive performance','recovery','brain'],
  'rhodiola':         ['endurance','stress reduction','training performance','recovery'],
  'apigenin':         ['sleep','recovery','testosterone'],
  'glycine':          ['sleep','joint health','recovery','collagen'],
  'tart-cherry':      ['recovery','sleep','muscle soreness'],
  'berberine':        ['fat loss','metabolic health','body recomposition'],
  'citrulline':       ['training performance','pump','endurance'],
  'beta-alanine':     ['training performance','endurance','lactate'],
  'nmn':              ['longevity','energy','metabolic health'],
};

var GOAL_CHIPS = [
  { id:'recomp',      label:'Body recomposition',   keys:['body recomposition','fat loss','muscle gain'] },
  { id:'muscle',      label:'Build muscle',          keys:['muscle gain','training performance','testosterone'] },
  { id:'fatloss',     label:'Fat loss',              keys:['fat loss','metabolic health','body recomposition'] },
  { id:'recovery',    label:'Recovery',              keys:['recovery','sleep','muscle soreness'] },
  { id:'hormones',    label:'Hormonal support',      keys:['testosterone','body recomposition','energy'] },
  { id:'performance', label:'Training performance',  keys:['training performance','endurance','pump'] },
  { id:'sleep',       label:'Sleep & stress',        keys:['sleep','stress reduction','recovery'] },
  { id:'longevity',   label:'Longevity',             keys:['longevity','energy','metabolic health'] },
];

var _activeFilter = 'All';
var _openCard = null;
var _activeGoals = [];

function getProfile() {
  try { return JSON.parse(localStorage.getItem('bl_profile') || 'null'); } catch(e) { return null; }
}

function isBaseline(id) {
  var p = getProfile();
  if (!p || !p.supplements) return false;
  return p.supplements.some(function(s) {
    return (s.name||s).toLowerCase().includes(id.replace(/-/g,' ').slice(0,6));
  });
}

function isInDeepStack(id) {
  var p = getProfile();
  return p && (p.deepStack||[]).includes(id);
}

function spAddToStack(btn) { var id = btn.dataset.aid; addToStack(id); btn.textContent = '\u2713 Added'; btn.className = 'sp-add-btn saved'; btn.disabled = true; }

function addToStack(id) {
  var p = getProfile();
  if (!p) return;
  if (!p.deepStack) p.deepStack = [];
  if (!p.deepStack.includes(id)) p.deepStack.push(id);
  localStorage.setItem('bl_profile', JSON.stringify(p));
  render();
}

function removeFromStack(id) {
  var p = getProfile();
  if (!p) return;
  p.deepStack = (p.deepStack||[]).filter(function(x){ return x !== id; });
  localStorage.setItem('bl_profile', JSON.stringify(p));
  render();
}

function getOptimisedTiming(name, isTraining) {
  var nl = (name||'').toLowerCase();
  if (nl.includes('creatine')) return isTraining ? 'Post-training' : 'Morning';
  if (nl.includes('omega')) return 'With largest meal';
  if (nl.includes('d3')||nl.includes('vitamin d')) return 'Morning, with fat';
  if (nl.includes('magnesium')) return 'Before bed';
  if (nl.includes('theanine')) return isTraining ? 'Pre-session' : 'With coffee';
  if (nl.includes('tongkat')||nl.includes('fadogia')||nl.includes('shilajit')) return 'Morning, with food';
  if (nl.includes('ashwagandha')) return 'With dinner';
  if (nl.includes('apigenin')||nl.includes('glycine')) return 'Before bed';
  if (nl.includes('tart cherry')) return 'Post-training';
  if (nl.includes('berberine')) return 'With meals';
  if (nl.includes('citrulline')||nl.includes('beta-alanine')) return '30 min pre-training';
  return 'With food';
}

function toggleGoal(id) {
  var idx = _activeGoals.indexOf(id);
  if (idx >= 0) _activeGoals.splice(idx, 1);
  else _activeGoals.push(id);
  render();
}

function setFilter(cat) {
  _activeFilter = cat;
  render();
}

function toggleCard(id) {
  _openCard = _openCard === id ? null : id;
  render();
  if (_openCard) {
    setTimeout(function() {
      var el = document.getElementById('sp-card-' + id);
      if (el) el.scrollIntoView({ behavior:'smooth', block:'nearest' });
    }, 50);
  }
}

function scrollToDeep(id) {
  var el = document.getElementById('sp-card-' + id);
  if (el) {
    el.scrollIntoView({ behavior:'smooth', block:'start' });
    el.style.borderColor = 'rgba(0,200,160,.4)';
    setTimeout(function(){ el.style.borderColor = ''; }, 2000);
  }
}

function render() {
  var p = getProfile();
  var root = document.getElementById('sp-root');
  if (!root) return;

  if (p && p.name) {
    var nm = document.getElementById('nav-meta');
    if (nm) nm.innerHTML = '<span class="nav-tag nt-jade">' + p.name + '</span>';
  }

  var isTraining = false;
  try {
    var tLog = JSON.parse(localStorage.getItem('bl_daylog_' + new Date().toISOString().slice(0,10)) || '{}');
    isTraining = tLog.dayType && tLog.dayType.toLowerCase().includes('train');
  } catch(e) {}

  var html = '';

  // ── 1. ACTIVE STACK ─────────────────────────────────────────────
  html += '<div style="font-size:9px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--jade);margin-bottom:14px;">Your active stack</div>';

  var baselineSupps = p ? (p.supplements || []) : [];
  var deepStackIds = p ? (p.deepStack || []) : [];
  var deepStackSupps = SUPPS.filter(function(s){ return deepStackIds.includes(s.id); });
  var totalCount = baselineSupps.length + deepStackSupps.length;

  if (totalCount === 0) {
    html += '<div class="sp-stack-empty">No supplements yet. Complete onboarding to add your baseline, or select from below.</div>';
  } else {
    html += '<div class="sp-stack-grid">';
    // Baseline first
    baselineSupps.forEach(function(s) {
      var name = s.name || s;
      var timing = getOptimisedTiming(name, isTraining);
      html += '<div class="sp-stack-row">'
        + '<div class="sp-stack-icon">&#128138;</div>'
        + '<div class="sp-stack-info">'
          + '<div class="sp-stack-name">' + name + '</div>'
          + '<div class="sp-stack-meta">' + (s.dose||'') + (s.dose&&timing?' &mdash; ':' ') + timing + '</div>'
        + '</div>'
        + '<span class="sp-stack-baseline-badge">Baseline</span>'
        + '</div>';
    });
    // Deep stack
    deepStackSupps.forEach(function(s) {
      var timing = getOptimisedTiming(s.name, isTraining);
      var evClass = s.evidence === 'established' ? 'established' : s.evidence === 'emerging' ? 'emerging' : s.evidence === 'anecdotal' ? 'anecdotal' : 'limited';
      html += '<div class="sp-stack-row">'
        + '<div class="sp-stack-icon">' + s.icon + '</div>'
        + '<div class="sp-stack-info">'
          + '<div class="sp-stack-name">' + s.name + '</div>'
          + '<div class="sp-stack-meta">' + s.dose + ' &mdash; ' + timing + '</div>'
        + '</div>'
        + '<span class="sp-badge ' + evClass + '" style="flex-shrink:0;">' + s.evidence + '</span>'
        + '<button class="sp-stack-remove" data-rid="' + s.id + '" onclick="removeFromStack(this.dataset.rid)" title="Remove from stack">&times;</button>';
        + '</div>';
    });
    html += '</div>';
  }

  // ── 2. GOAL MATCH ────────────────────────────────────────────────
  html += '<div class="sp-goal-panel">'
    + '<div class="sp-goal-title">&#127919; Match supplements to your goals</div>'
    + '<div class="sp-goal-desc">Select what you are working on and get recommendations from the stack below. Only shows supplements not already in your stack.</div>'
    + '<div class="sp-goal-chips">';
  GOAL_CHIPS.forEach(function(g) {
    var active = _activeGoals.includes(g.id);
    html += '<button class="sp-goal-chip' + (active?' active':'') + '" data-gid="' + g.id + '" onclick="toggleGoal(this.dataset.gid)">' + g.label + '</button>';
  });
  html += '</div>';

  if (_activeGoals.length > 0) {
    // Find matching supplements not already in stack
    var matchedKeys = [];
    _activeGoals.forEach(function(goalId) {
      var chip = GOAL_CHIPS.find(function(g){ return g.id === goalId; });
      if (chip) matchedKeys = matchedKeys.concat(chip.keys);
    });
    var matches = SUPPS.filter(function(s) {
      if (isBaseline(s.id) || isInDeepStack(s.id)) return false;
      var suppGoals = GOALS_MAP[s.id] || [];
      return suppGoals.some(function(g){ return matchedKeys.includes(g); });
    });
    if (matches.length) {
      html += '<div style="font-size:9px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--dk-3);margin-bottom:10px;">' + matches.length + ' match' + (matches.length>1?'es':'') + ' for your goals</div>';
      html += '<div class="sp-reco-grid">';
      matches.forEach(function(s) {
        var evClass = s.evidence === 'established' ? 'established' : s.evidence === 'emerging' ? 'emerging' : s.evidence === 'anecdotal' ? 'anecdotal' : 'limited';
        var evLabel = { established: 'Established', emerging: 'Emerging evidence', limited: 'Limited evidence', anecdotal: 'Anecdotal' }[evClass] || s.evidence;
        var topGoals = (GOALS_MAP[s.id]||[]).slice(0,3).map(function(g){
          return '<span class="sp-reco-tag">' + g + '</span>';
        }).join('');
        html += '<div class="sp-reco-card">'
          + '<div class="sp-reco-lead">'
            + '<span class="sp-reco-icon">' + s.icon + '</span>'
            + '<div class="sp-reco-info">'
              + '<div class="sp-reco-name-row">'
                + '<span class="sp-reco-name">' + s.name + '</span>'
                + '<span class="sp-reco-ev sp-reco-ev-' + evClass + '">' + evLabel + '</span>'
              + '</div>'
              + '<div class="sp-reco-why">' + s.tagline + '</div>'
              + '<div class="sp-reco-meta">' + s.dose + ' · ' + s.timing + '</div>'
              + (topGoals ? '<div class="sp-reco-tags">' + topGoals + '</div>' : '')
            + '</div>'
            + '<button class="sp-reco-add" data-aid="' + s.id + '" onclick="spAddToStack(this)">Add</button>'
          + '</div>'
        + '</div>';
      });
      html += '</div>';
    } else {
      html += '<div style="font-size:12px;font-weight:300;color:var(--dk-3);padding:8px 0;">All matching supplements for these goals are already in your stack.</div>';
    }
  }
  html += '</div>';

  // ── 3. BROWSE ALL ────────────────────────────────────────────────
  html += '<div class="sp-divider"><div class="sp-divider-line"></div><div class="sp-divider-label">Browse all</div><div class="sp-divider-line"></div></div>';

  var cats = ['All','Hormonal','Adaptogenic','Cognitive','Sleep','Recovery','Metabolic','Performance','Longevity'];
  html += '<div class="sp-filter">';
  cats.forEach(function(c) {
    html += '<button class="sp-filter-btn' + (_activeFilter===c?' active':'') + '" data-cat="' + c + '" onclick="setFilter(this.dataset.cat)">' + c + '</button>';
  });
  html += '</div>';

  var filtered = _activeFilter === 'All' ? SUPPS : SUPPS.filter(function(s){ return s.cat === _activeFilter; });
  var groups = {};
  filtered.forEach(function(s) {
    if (!groups[s.cat]) groups[s.cat] = [];
    groups[s.cat].push(s);
  });

  var CAT_LABELS = {
    Hormonal:'Hormonal & testosterone', Adaptogenic:'Adaptogenic',
    Cognitive:'Cognitive', Sleep:'Sleep & recovery', Recovery:'Recovery',
    Metabolic:'Metabolic & body composition', Performance:'Training performance', Longevity:'Longevity'
  };

  Object.keys(groups).forEach(function(cat) {
    html += '<div class="sp-cat-label">' + (CAT_LABELS[cat]||cat) + '</div>';
    groups[cat].forEach(function(s) {
      var inStack = isBaseline(s.id) || isInDeepStack(s.id);
      var evClass = s.evidence === 'established' ? 'established' : s.evidence === 'emerging' ? 'emerging' : s.evidence === 'anecdotal' ? 'anecdotal' : 'limited';
      var evLabel = s.evidence === 'established' ? 'Established' : s.evidence === 'emerging' ? 'Emerging evidence' : s.evidence === 'anecdotal' ? 'Anecdotal' : 'Emerging evidence';
      var isOpen = _openCard === s.id;

      html += '<div class="sp-card' + (isOpen ? ' open' : '') + '" id="sp-card-' + s.id + '">'
        + '<div class="sp-card-hd" data-cid="' + s.id + '" onclick="toggleCard(this.dataset.cid)">'
          + '<div class="sp-icon">' + s.icon + '</div>'
          + '<div class="sp-info">'
            + '<div class="sp-name">' + s.name + '</div>'
            + '<div class="sp-tagline">' + s.tagline + '</div>'
          + '</div>'
          + '<div class="sp-badges">'
            + '<div class="sp-badge ' + evClass + '" title="' + (s.evidenceNote||'') + '">' + evLabel + '</div>'
            + (inStack ? '<div class="sp-badge in-stack">In stack</div>' : '')
          + '</div>'
          + '<div class="sp-chevron">&#8250;</div>'
        + '</div>';

      if (isOpen) {
        html += '<div class="sp-card-body">'
          + '<div class="sp-mechanism">' + s.mechanism + '</div>';
        if (s.relevance) html += '<div class="sp-detail-row"><div class="sp-detail-key">Relevance</div><div class="sp-detail-val">' + s.relevance + '</div></div>';
        html += '<div class="sp-detail-row"><div class="sp-detail-key">Dose</div><div class="sp-detail-val">' + s.dose + '</div></div>';
        html += '<div class="sp-detail-row"><div class="sp-detail-key">Form</div><div class="sp-detail-val">' + (s.form||'—') + '</div></div>';
        html += '<div class="sp-detail-row"><div class="sp-detail-key">Timing</div><div class="sp-detail-val">' + s.timing + '</div></div>';
        if (s.cycle) html += '<div class="sp-detail-row"><div class="sp-detail-key">Cycle</div><div class="sp-detail-val">' + s.cycle + '</div></div>';
        if (s.warn) html += '<div class="sp-detail-row"><div class="sp-detail-key">Caution</div><div class="sp-detail-val" style="color:rgba(220,140,80,.8);">' + s.warn + '</div></div>';
        if (s.stacks) html += '<div class="sp-detail-row"><div class="sp-detail-key">Stacks with</div><div class="sp-detail-val">' + s.stacks + '</div></div>';
        if (!inStack) {
          html += '<button class="sp-add-btn" data-aid="' + s.id + '" onclick="spAddToStack(this)">+ Add to stack</button>';
        }
        html += '</div>';
      }

      html += '</div>';
    });
  });

  root.innerHTML = html;
}

render();
</script>
</body>
</html>
