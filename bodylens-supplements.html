<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#0c1010">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>BodyLens — Deep Stack</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Space+Grotesk:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
body { background:var(--ink); color:var(--dk-1); }
.sp-page { max-width:800px; margin:0 auto; padding:0 28px 100px; }

/* Hero */
.sp-hero { padding:44px 0 28px; border-bottom:1px solid var(--bd); margin-bottom:32px; }
.sp-kicker { font-size:10px; font-weight:700; letter-spacing:.22em; text-transform:uppercase; color:var(--dk-3); margin-bottom:10px; }
.sp-title { font-family:var(--serif); font-size:52px; font-weight:300; line-height:.93; letter-spacing:-.02em; color:var(--dk-1); margin-bottom:12px; }
.sp-title em { font-style:italic; color:var(--dk-3); }
.sp-sub { font-size:13px; font-weight:300; color:var(--dk-2); line-height:1.75; max-width:520px; }

/* Category filter */
.sp-filter { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:28px; }
.sp-filter-btn {
  padding:5px 14px; border-radius:14px; border:1px solid var(--bd);
  background:transparent; font-size:10px; font-weight:600;
  letter-spacing:.06em; text-transform:uppercase;
  color:var(--dk-3); cursor:pointer; font-family:var(--sans); transition:all .1s;
}
.sp-filter-btn:hover { border-color:rgba(255,255,255,.1); color:var(--dk-2); }
.sp-filter-btn.active { background:var(--ink-1); border-color:rgba(200,148,30,.3); color:var(--amber); }

/* Section label */
.sp-sec { font-size:9px; font-weight:700; letter-spacing:.18em; text-transform:uppercase; color:var(--dk-3);
  margin:28px 0 14px; display:flex; align-items:center; gap:10px; }
.sp-sec::after { content:''; flex:1; height:1px; background:var(--bd); }

/* Supplement cards */
.sp-card {
  background:var(--ink-1); border:1px solid var(--bd);
  border-radius:10px; overflow:hidden; margin-bottom:8px;
  transition:border-color .12s;
}
.sp-card:hover { border-color:rgba(255,255,255,.08); }
.sp-card.open { border-color:rgba(200,148,30,.25); }

.sp-card-hd {
  display:flex; align-items:center; gap:12px;
  padding:14px 18px; cursor:pointer;
}
.sp-icon { font-size:18px; flex-shrink:0; width:24px; text-align:center; }
.sp-info { flex:1; min-width:0; }
.sp-name { font-size:14px; font-weight:600; color:var(--dk-1); margin-bottom:2px; }
.sp-card.open .sp-name { color:var(--amber); }
.sp-tagline { font-size:11px; font-weight:300; color:var(--dk-3); line-height:1.4; }
.sp-badges { display:flex; gap:5px; align-items:center; flex-shrink:0; flex-wrap:wrap; justify-content:flex-end; }
.sp-badge {
  font-size:8px; font-weight:700; letter-spacing:.08em; text-transform:uppercase;
  padding:3px 8px; border-radius:8px;
}
.sp-badge.evidence-strong { background:rgba(0,200,160,.1); border:1px solid var(--jade-br); color:var(--jade); }
.sp-badge.evidence-moderate { background:rgba(200,148,30,.08); border:1px solid rgba(200,148,30,.25); color:var(--amber); }
.sp-badge.evidence-emerging { background:rgba(255,255,255,.04); border:1px solid var(--bd); color:var(--dk-3); }
.sp-badge.cat { background:var(--ink-2); border:1px solid var(--bd); color:var(--dk-3); }
.sp-chevron { color:var(--dk-3); font-size:10px; transition:transform .15s; flex-shrink:0; }
.sp-card.open .sp-chevron { transform:rotate(180deg); color:var(--amber); }

/* Card body */
.sp-body {
  display:none; border-top:1px solid var(--bd);
  padding:16px 18px; background:var(--ink-2);
}
.sp-card.open .sp-body { display:block; }
.sp-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:14px; }
.sp-field-label { font-size:8px; font-weight:700; letter-spacing:.12em; text-transform:uppercase; color:var(--dk-3); margin-bottom:4px; }
.sp-field-val { font-size:12px; font-weight:300; color:var(--dk-2); line-height:1.6; }
.sp-mechanism { font-family:var(--serif); font-size:14px; font-weight:300; color:var(--dk-2); line-height:1.85; margin-bottom:12px; }
.sp-relevance {
  background:rgba(0,200,160,.04); border:1px solid var(--jade-br);
  border-radius:6px; padding:10px 14px; margin-bottom:12px;
}
.sp-relevance-label { font-size:8px; font-weight:700; letter-spacing:.12em; text-transform:uppercase; color:var(--jade); margin-bottom:4px; }
.sp-relevance-text { font-size:11px; font-weight:300; color:var(--dk-2); line-height:1.65; }
.sp-warn {
  background:rgba(200,148,30,.05); border:1px solid rgba(200,148,30,.2);
  border-radius:6px; padding:8px 12px; margin-bottom:12px;
}
.sp-warn-text { font-size:10px; font-weight:300; color:var(--amber); line-height:1.6; }
.sp-add-btn {
  display:inline-block; background:transparent; border:1px solid var(--bd);
  border-radius:7px; padding:7px 16px; font-size:10px; font-weight:600;
  letter-spacing:.06em; text-transform:uppercase; color:var(--dk-3);
  cursor:pointer; font-family:var(--sans); transition:all .12s;
}
.sp-add-btn:hover { border-color:var(--jade-br); color:var(--jade); }
.sp-add-btn.saved { background:var(--jade); border-color:var(--jade); color:var(--ink); cursor:default; }
.sp-stack-note { font-size:10px; font-weight:300; color:var(--dk-3); margin-top:6px; line-height:1.5; }
</style>

var _openCard = null;
var _activeFilter = 'All';

function getProfile() {
  try { return JSON.parse(localStorage.getItem('bl_profile') || 'null'); } catch(e) { return null; }
}

function isInStack(id) {
  var p = getProfile();
  if (!p) return false;
  var supps = (p.supplements || []).map(function(s){ return (s.name||s).toLowerCase(); });
  var supp = SUPPS.find(function(s){ return s.id === id; });
  if (!supp) return false;
  return supps.some(function(s){ return s.includes(supp.name.toLowerCase().split(' ')[0]); });
}

function isSaved(id) {
  var p = getProfile();
  return p && (p.deepStack || []).includes(id);
}

function toggleCard(id) {
  _openCard = _openCard === id ? null : id;
  render();
  if (_openCard) {
    setTimeout(function() {
      var el = document.getElementById('sp-card-' + id);
      if (el) el.scrollIntoView({ behavior:'smooth', block:'nearest' });
    }, 50);
  }
}

function addToStack(id, btn) {
  var p = getProfile();
  if (!p) return;
  if (!p.deepStack) p.deepStack = [];
  if (!p.deepStack.includes(id)) p.deepStack.push(id);
  localStorage.setItem('bl_profile', JSON.stringify(p));
  if (btn) { btn.textContent = '✓ In your deep stack'; btn.className = 'sp-add-btn saved'; btn.disabled = true; }
}

function setFilter(cat) {
  _activeFilter = cat;
  render();
}

  var filtered = _activeFilter === 'All' ? SUPPS : SUPPS.filter(function(s){ return s.cat === _activeFilter; });

    groups[s.cat].push(s);
  });

    Cognitive: 'Cognitive',

    Recovery: 'Recovery',
    Metabolic: 'Metabolic & body composition',
    Performance: 'Training performance',
    Longevity: 'Longevity'

    html += '<div style="background:var(--ink-1);border:1px solid var(--jade-br);border-radius:8px;padding:12px 16px;margin-bottom:24px;">'
      + '<div style="font-size:9px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--jade);margin-bottom:5px;">Your current stack</div>'
      + '<div style="font-size:12px;font-weight:300;color:var(--dk-2);">' + p.supplements.map(function(s){ return s.name||s; }).join(' · ') + '</div>'
      + '<div style="font-size:10px;font-weight:300;color:var(--dk-3);margin-top:4px;">The compounds below are additions — don\'t stack everything at once. Add one at a time, 4 weeks apart.</div>'
      + '</div>';
  }

  Object.keys(groups).forEach(function(cat) {
    html += '<div class="sp-sec">' + (CAT_LABELS[cat] || cat) + '</div>';
    groups[cat].forEach(function(s, idx) {
      var isOpen = _openCard === s.id;
      var inStack = isInStack(s.id);
      var saved = isSaved(s.id);
      var evClass = 'evidence-' + s.evidence;
      var evLabel = s.evidence === 'strong' ? 'Strong evidence' : s.evidence === 'moderate' ? 'Moderate evidence' : 'Emerging evidence';

      html += '<div class="sp-card' + (isOpen?' open':'') + '" id="sp-card-' + s.id + '">';

      // Header
      html += '<div class="sp-card-hd" onclick="toggleCard(\'' + s.id + '\')">'
        + '<div class="sp-icon">' + s.icon + '</div>'
        + '<div class="sp-info">'
          + '<div class="sp-name">' + s.name + '</div>'
          + '<div class="sp-tagline">' + s.tagline + '</div>'
        + '</div>'
        + '<div class="sp-badges">'
          + '<div class="sp-badge ' + evClass + '">' + evLabel + '</div>'
          + (inStack ? '<div class="sp-badge" style="background:rgba(0,200,160,.08);border-color:var(--jade-br);color:var(--jade);">In stack</div>' : '')
          + (saved && !inStack ? '<div class="sp-badge" style="background:rgba(200,148,30,.06);border-color:rgba(200,148,30,.2);color:var(--amber);">Saved</div>' : '')
        + '</div>'
        + '<div class="sp-chevron">▾</div>'
        + '</div>';

      // Body
      html += '<div class="sp-body">';
      html += '<div class="sp-mechanism">' + s.mechanism + '</div>';

      // Relevance to you
      if (s.relevance) {
        html += '<div class="sp-relevance">'
          + '<div class="sp-relevance-label">Relevance to you</div>'
          + '<div class="sp-relevance-text">' + s.relevance + '</div>'
          + '</div>';
      }

      // Dose grid
      html += '<div class="sp-grid">'
        + '<div><div class="sp-field-label">Dose</div><div class="sp-field-val">' + s.dose + '</div></div>'
        + '<div><div class="sp-field-label">Timing</div><div class="sp-field-val">' + s.timing + '</div></div>'
        + '<div><div class="sp-field-label">Form</div><div class="sp-field-val">' + s.form + '</div></div>'
        + '<div><div class="sp-field-label">Cycling</div><div class="sp-field-val">' + s.cycle + '</div></div>'
        + '</div>';

      // Stacking notes
      if (s.stacks) {
        html += '<div style="margin-bottom:12px;">'
          + '<div class="sp-field-label" style="margin-bottom:4px;">Stacking</div>'
          + '<div class="sp-field-val">' + s.stacks + '</div>'
          + '</div>';
      }

      // Warning
      if (s.warn) {
        html += '<div class="sp-warn"><div class="sp-warn-text">⚠ ' + s.warn + '</div></div>';
      }

      // Add button
      if (!inStack) {
        html += '<div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">'
          + '<button class="sp-add-btn' + (saved?' saved':'') + '" '
          + (saved ? 'disabled ' : '')
          + 'onclick="event.stopPropagation();addToStack(\'' + s.id + '\',this)">'
          + (saved ? '✓ Saved to deep stack' : '+ Save to deep stack')
          + '</button>'
          + '</div>';
      }

      html += '</div>'; // end body
      html += '</div>'; // end card
    });
  });

  root.innerHTML = html;
}

render();
</script>
</body>
</html>
