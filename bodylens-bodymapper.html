<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="manifest" href="/manifest.json">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>BodyLens — Body Mapper</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&family=Space+Grotesk:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
body{background:var(--ink);color:var(--dk-1);min-height:100vh;}
.bm-page{max-width:1100px;margin:0 auto;padding:0 28px 100px;}
.bm-hero{padding:28px 0 20px;border-bottom:1px solid var(--bd);}
.bm-kicker{font-size:10px;font-weight:700;letter-spacing:.22em;text-transform:uppercase;color:var(--dk-3);margin-bottom:6px;}
.bm-title{font-family:var(--serif);font-size:48px;font-weight:300;line-height:.93;letter-spacing:-.025em;color:var(--dk-1);margin-bottom:8px;}
.bm-title em{font-style:italic;color:var(--dk-3);}
.bm-sub{font-size:12px;font-weight:300;color:var(--dk-2);line-height:1.7;max-width:520px;}
.bm-mode-bar{display:flex;gap:0;margin:20px 0 0;border:1px solid var(--bd);border-radius:10px;overflow:hidden;width:fit-content;}
.bm-mode-btn{padding:10px 24px;font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--dk-3);background:transparent;border:none;cursor:pointer;font-family:var(--sans);transition:all .15s;}
.bm-mode-btn.active{background:var(--ink-2);color:var(--dk-1);}
.bm-mode-btn.active.query{color:var(--jade);}
.bm-mode-btn.active.focus{color:var(--amber);}
.bm-layout{display:grid;grid-template-columns:1fr 340px;gap:28px;margin-top:24px;align-items:start;}
@media(max-width:800px){.bm-layout{grid-template-columns:1fr;}}
.bm-map-section{background:var(--ink-1);border:1px solid var(--bd);border-radius:12px;padding:20px;}
.bm-map-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.bm-map-title{font-size:9px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--dk-3);}
.bm-view-toggle{display:flex;gap:0;border:1px solid var(--bd);border-radius:7px;overflow:hidden;}
.bm-view-btn{padding:5px 14px;font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--dk-3);background:transparent;border:none;cursor:pointer;font-family:var(--sans);transition:all .1s;}
.bm-view-btn.active{background:var(--ink-2);color:var(--dk-2);}
.bm-map-wrap{display:flex;justify-content:center;align-items:flex-start;min-height:460px;padding:10px 0;}

/* Dot system */
.bm-dot-group{cursor:pointer;}
.bm-dot{transition:r .15s ease,filter .15s ease;r:4px;}
.bm-dot-group:hover .bm-dot{filter:brightness(1.5) drop-shadow(0 0 4px currentColor);}
.bm-dot-ring{opacity:0;transform-origin:center;transition:opacity .15s,transform .15s;transform:scale(0.5);}
.bm-dot-group:hover .bm-dot-ring{opacity:1;transform:scale(1);}
.bm-dot-tooltip{opacity:0;transform:translateX(-3px);transition:opacity .15s ease,transform .15s ease;pointer-events:none;}
.bm-dot-group:hover .bm-dot-tooltip{opacity:1;transform:translateX(0);}

/* Pulse for high-priority */
.bm-dot-pulse{transform-origin:center;animation:dotPulse 2.5s ease-in-out infinite;opacity:0;}
.bm-dot-pulse.active{opacity:1;}
@keyframes dotPulse{
  0%{r:4;opacity:.55;}
  60%{r:13;opacity:0;}
  100%{r:13;opacity:0;}
}

/* Selected label */
.bm-selected-label{text-align:center;margin-top:10px;font-size:11px;font-weight:500;color:var(--jade);min-height:18px;letter-spacing:.04em;transition:opacity .2s;}

/* Legend */
.bm-legend{display:flex;gap:14px;margin-top:12px;flex-wrap:wrap;justify-content:center;}
.bm-legend-item{display:flex;align-items:center;gap:5px;font-size:9px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--dk-3);}
.bm-legend-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}

/* Panel */
.bm-panel{display:flex;flex-direction:column;gap:12px;}
.bm-query-card{background:var(--ink-1);border:1px solid var(--bd);border-radius:10px;padding:16px;}
.bm-card-label{font-size:9px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--dk-3);margin-bottom:10px;}
.bm-query-input{width:100%;background:var(--ink-2);border:1px solid var(--bd);border-radius:8px;padding:11px 13px;font-size:13px;font-weight:300;color:var(--dk-1);font-family:var(--sans);resize:none;outline:none;box-sizing:border-box;line-height:1.5;transition:border-color .12s;}
.bm-query-input:focus{border-color:rgba(0,200,160,.3);}
.bm-query-input::placeholder{color:var(--dk-3);}
.bm-chips{display:flex;gap:5px;flex-wrap:wrap;margin-top:8px;}
.bm-chip{padding:5px 11px;border-radius:14px;border:1px solid var(--bd);background:transparent;font-size:10px;font-weight:500;color:var(--dk-3);cursor:pointer;font-family:var(--sans);transition:all .1s;white-space:nowrap;}
.bm-chip:hover{border-color:rgba(255,255,255,.1);color:var(--dk-2);}
.bm-chip.sel{background:rgba(0,200,160,.07);border-color:var(--jade-br);color:var(--jade);}
.bm-submit-btn{width:100%;background:var(--jade);border:none;color:var(--ink);padding:12px;border-radius:8px;font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;font-family:var(--sans);margin-top:4px;display:flex;align-items:center;justify-content:center;gap:8px;transition:opacity .12s;}
.bm-submit-btn:hover{opacity:.88;}
.bm-submit-btn:disabled{opacity:.4;cursor:not-allowed;}
.bm-focus-card{background:var(--ink-1);border:1px solid var(--bd);border-radius:10px;padding:16px;}
.bm-focus-zone{display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.04);cursor:pointer;transition:all .1s;}
.bm-focus-zone:last-child{border-bottom:none;}
.bm-focus-zone:hover{background:rgba(255,255,255,.01);margin:0 -4px;padding-left:4px;padding-right:4px;border-radius:5px;}
.bm-fz-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;margin-top:3px;}
.bm-fz-name{font-size:12px;font-weight:500;color:var(--dk-1);flex:1;}
.bm-fz-reason{font-size:10px;font-weight:300;color:var(--dk-3);line-height:1.4;}
.bm-fz-pri{font-size:8px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:2px 7px;border-radius:8px;flex-shrink:0;}
.bm-fz-pri.high{background:rgba(217,78,53,.12);color:#d94e35;border:1px solid rgba(217,78,53,.25);}
.bm-fz-pri.mid{background:rgba(196,124,24,.1);color:var(--amber);border:1px solid rgba(196,124,24,.25);}
.bm-fz-pri.low{background:rgba(0,168,114,.08);color:var(--green);border:1px solid rgba(0,168,114,.2);}
.bm-result{background:var(--ink-1);border:1px solid var(--bd);border-radius:10px;overflow:hidden;margin-top:20px;}
.bm-result-header{padding:16px 20px;border-bottom:1px solid var(--bd);display:flex;align-items:flex-start;justify-content:space-between;gap:12px;}
.bm-result-region{font-family:var(--serif);font-size:26px;font-weight:300;color:var(--dk-1);line-height:1.1;}
.bm-result-sensation{font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;padding:3px 10px;border-radius:10px;background:rgba(0,200,160,.07);border:1px solid var(--jade-br);color:var(--jade);margin-top:5px;display:inline-block;}
.bm-result-disclaimer{font-size:9px;font-weight:300;color:var(--dk-3);font-style:italic;line-height:1.5;max-width:180px;text-align:right;}
.bm-result-body{padding:20px;}
.bm-result-section{margin-bottom:18px;}
.bm-result-section:last-child{margin-bottom:0;}
.bm-result-sec-label{font-size:8px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--dk-3);margin-bottom:6px;}
.bm-result-text{font-size:13px;font-weight:300;color:var(--dk-2);line-height:1.8;}
.bm-result-text.serif{font-family:var(--serif);font-size:15px;color:var(--dk-1);line-height:1.85;}
.bm-warning{background:rgba(217,78,53,.06);border:1px solid rgba(217,78,53,.2);border-radius:8px;padding:12px 14px;margin-top:14px;}
.bm-warning-label{font-size:8px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:#d94e35;margin-bottom:5px;}
.bm-warning-text{font-size:11px;font-weight:300;color:rgba(232,220,210,.7);line-height:1.65;}
.bm-actions{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px;}
.bm-action-tag{padding:5px 12px;border-radius:12px;font-size:10px;font-weight:600;border:1px solid var(--bd);color:var(--dk-2);background:var(--ink-2);}
.bm-action-tag.do{border-color:var(--jade-br);color:var(--jade);background:var(--jade-dim);}
.bm-action-tag.avoid{border-color:rgba(217,78,53,.25);color:#d94e35;background:rgba(217,78,53,.06);}
.bm-action-tag.monitor{border-color:rgba(196,124,24,.25);color:var(--amber);background:rgba(196,124,24,.06);}
.bm-loading{padding:32px 20px;display:flex;align-items:center;gap:12px;color:var(--dk-3);font-size:12px;font-weight:300;}
.bm-spin{width:16px;height:16px;border-radius:50%;border:2px solid rgba(255,255,255,.08);border-top-color:var(--jade);animation:bmspin .7s linear infinite;flex-shrink:0;}
@keyframes bmspin{to{transform:rotate(360deg)}}
.bm-focus-result{background:var(--ink-1);border:1px solid rgba(196,124,24,.2);border-radius:10px;padding:20px;margin-top:20px;}
.bm-focus-result-title{font-family:var(--serif);font-size:22px;font-weight:300;color:var(--dk-1);margin-bottom:14px;}
</style>
</head>

<script>
var API = '/api/chat', MODEL = 'claude-sonnet-4-20250514';
function getProfile(){ try{ return JSON.parse(localStorage.getItem('bl_profile')||'null'); }catch(e){ return null; } }

var BM = { mode:'query', view:'front', selected:null, sensation:[], context:[], queryText:'' };

var DOTS_FRONT = [
  ["head","Head",100,28],["neck","Neck",100,62],
  ["l-shoulder","Left Shoulder",60,88],["r-shoulder","Right Shoulder",140,88],
  ["l-chest","Left Pec",78,108],["r-chest","Right Pec",122,108],
  ["upper-abs","Upper Abdomen",100,136],["lower-abs","Lower Abdomen",100,164],
  ["l-hip","Left Hip",75,192],["r-hip","Right Hip",125,192],
  ["l-upper-arm","Left Bicep",46,120],["r-upper-arm","Right Bicep",154,120],
  ["l-elbow","Left Elbow",40,152],["r-elbow","Right Elbow",160,152],
  ["l-forearm","Left Forearm",40,178],["r-forearm","Right Forearm",160,178],
  ["l-groin","Left Groin",82,206],["r-groin","Right Groin",118,206],
  ["l-quad","Left Quad",80,240],["r-quad","Right Quad",120,240],
  ["l-knee","Left Knee",84,292],["r-knee","Right Knee",116,292],
  ["l-shin","Left Shin",80,335],["r-shin","Right Shin",120,335],
  ["l-ankle","Left Ankle",80,382],["r-ankle","Right Ankle",120,382]
];
var DOTS_BACK = [
  ["b-head","Back of Head",100,28],["b-neck","Cervical Spine",100,62],
  ["b-l-trap","Left Trap",72,86],["b-r-trap","Right Trap",128,86],
  ["b-l-shoulder","Left Rear Shoulder",52,98],["b-r-shoulder","Right Rear Shoulder",148,98],
  ["b-upper-back","Upper Back",100,120],["b-l-lat","Left Lat",62,138],["b-r-lat","Right Lat",138,138],
  ["b-lower-back","Lower Back",100,168],
  ["b-l-glute","Left Glute",78,212],["b-r-glute","Right Glute",122,212],
  ["b-l-tri","Left Tricep",44,122],["b-r-tri","Right Tricep",156,122],
  ["b-l-elbow","Left Elbow rear",40,154],["b-r-elbow","Right Elbow rear",160,154],
  ["b-l-ham","Left Hamstring",78,258],["b-r-ham","Right Hamstring",122,258],
  ["b-l-knee","Back of Left Knee",83,296],["b-r-knee","Back of Right Knee",117,296],
  ["b-l-calf","Left Calf",78,338],["b-r-calf","Right Calf",122,338],
  ["b-l-achilles","Left Achilles",78,384],["b-r-achilles","Right Achilles",122,384]
];

var PRI_COLORS = { high:'#d94e35', mid:'#c47c18', low:'#00a872', neutral:'rgba(255,255,255,0.22)', selected:'#00c8a0' };
var DOT_PRIORITY_MAP = {};

function computePriorities(p) {
  if (!p) return {};
  var out = {};
  var age = p.age||35;
  var types = (p.weekPlan||[]).map(function(d){ return (d.type||'').toLowerCase(); });
  var hasPull = types.some(function(t){ return t.indexOf('pull')>=0; });
  var hasPush = types.some(function(t){ return t.indexOf('push')>=0; });
  var hasPost = types.some(function(t){ return t.indexOf('posterior')>=0||t.indexOf('lower')>=0; });
  var injuries = (p.injuryAssessments||p.injuries||[]).map(function(i){ return (i.location||i||'').toLowerCase(); });
  if (age>=40||hasPost){ out['b-lower-back']='high'; out['lower-abs']='mid'; }
  if (age>=38||hasPost){ out['b-l-glute']='high'; out['b-r-glute']='high'; out['l-hip']='mid'; out['r-hip']='mid'; }
  if (hasPush||age>=38){ out['b-upper-back']='mid'; out['b-l-trap']='mid'; out['b-r-trap']='mid'; }
  if (hasPush||hasPull){ out['l-shoulder']='mid'; out['r-shoulder']='mid'; out['b-l-shoulder']='mid'; out['b-r-shoulder']='mid'; }
  if (hasPost||age>=40){ out['b-l-ham']='mid'; out['b-r-ham']='mid'; }
  if (age>=40||hasPost){ out['l-knee']='mid'; out['r-knee']='mid'; }
  if (hasPull||age>=40){ out['neck']='mid'; out['b-neck']='mid'; }
  if (age>=40){ out['b-l-achilles']='low'; out['b-r-achilles']='low'; out['b-l-calf']='low'; out['b-r-calf']='low'; }
  injuries.forEach(function(loc){
    DOTS_FRONT.concat(DOTS_BACK).forEach(function(d){
      if(d[1].toLowerCase().indexOf(loc)>=0||d[0].indexOf(loc.replace(/\s+/g,'-'))>=0){ out[d[0]]='high'; }
    });
  });
  return out;
}

function applyPriorityColours() {
  DOTS_FRONT.concat(DOTS_BACK).forEach(function(d) {
    var el = document.getElementById('dc-'+d[0]);
    if (!el) return;
    var pri = DOT_PRIORITY_MAP[d[0]];
    var isSel = BM.selected && BM.selected.id === d[0];
    el.setAttribute('fill', isSel ? PRI_COLORS.selected : (PRI_COLORS[pri]||PRI_COLORS.neutral));
    var pulse = el.parentElement && el.parentElement.querySelector('.bm-dot-pulse');
    if (pulse) { if(pri==='high') pulse.classList.add('active'); else pulse.classList.remove('active'); }
  });
}

function setMode(mode) {
  BM.mode = mode; BM.selected = null;
  document.getElementById('btn-query').className = 'bm-mode-btn'+(mode==='query'?' active query':'');
  document.getElementById('btn-focus').className = 'bm-mode-btn'+(mode==='focus'?' active focus':'');
  var ml = document.getElementById('map-mode-label');
  if (ml) ml.textContent = mode==='query' ? 'Hover to identify \u2014 tap to select' : 'Priority zones from your profile';
  applyPriorityColours();
  renderPanel();
  document.getElementById('bm-result-area').innerHTML = '';
  document.getElementById('selected-label').textContent = '';
}

function setView(view) {
  BM.view = view; BM.selected = null;
  document.getElementById('svg-front').style.display = view==='front' ? '' : 'none';
  document.getElementById('svg-back').style.display  = view==='back'  ? '' : 'none';
  document.getElementById('btn-front').className = 'bm-view-btn'+(view==='front'?' active':'');
  document.getElementById('btn-back').className  = 'bm-view-btn'+(view==='back'?' active':'');
  document.getElementById('selected-label').textContent = '';
}

function selectDot(id, label) {
  BM.selected = {id:id, label:label};
  applyPriorityColours();
  var sl = document.getElementById('selected-label');
  if (sl) sl.textContent = '\u2192 '+label;
  if (BM.mode === 'query') updateSubmitBtn();
  else showFocusDetail(id, label);
}

var SENSATIONS = ['Dull ache','Sharp pain','Tightness','Pulling','Burning','Numbness','Stiffness','Soreness','Pressure','Weakness','Instability','Clicking'];
var CONTEXTS   = ['After sitting','After lifting','During movement','After running','In the morning','After travel','During sleep','After stairs','At rest'];

function renderPanel() {
  var panel = document.getElementById('bm-panel');
  if (!panel) return;
  if (BM.mode === 'query') renderQueryPanel(panel);
  else renderFocusPanel(panel);
}

function renderQueryPanel(panel) {
  var chips1 = SENSATIONS.map(function(s){
    var sel = BM.sensation.indexOf(s)>=0 ? ' sel' : '';
    return '<button class="bm-chip'+sel+'" onclick="toggleChip(\'sensation\',\''+s+'\',this)">'+s+'</button>';
  }).join('');
  var chips2 = CONTEXTS.map(function(s){
    var sel = BM.context.indexOf(s)>=0 ? ' sel' : '';
    return '<button class="bm-chip'+sel+'" onclick="toggleChip(\'context\',\''+s+'\',this)">'+s+'</button>';
  }).join('');
  panel.innerHTML =
    '<div class="bm-query-card">'
    +'<div class="bm-card-label">What are you feeling?</div>'
    +'<textarea class="bm-query-input" id="bm-query-inp" rows="3" placeholder="Describe in plain language \u2014 e.g. tight on the right side when I rotate, dull ache after sitting\u2026">'+BM.queryText+'</textarea>'
    +'<div class="bm-card-label" style="margin-top:12px;">Sensation type</div>'
    +'<div class="bm-chips">'+chips1+'</div>'
    +'<div class="bm-card-label" style="margin-top:12px;">Context</div>'
    +'<div class="bm-chips">'+chips2+'</div>'
    +'</div>'
    +'<button class="bm-submit-btn" id="bm-submit" onclick="submitQuery()" disabled><span>Interpret this \u2192</span></button>';
  var inp = document.getElementById('bm-query-inp');
  if (inp) inp.addEventListener('input', function(){ BM.queryText = this.value; updateSubmitBtn(); });
  updateSubmitBtn();
}

function renderFocusPanel(panel) {
  var pri = DOT_PRIORITY_MAP;
  var ZONE_META = {
    'b-lower-back': {name:'Lower back',     reason:'Posterior chain loading + lumbar compression risk at 40+'},
    'b-l-glute':    {name:'Left Glute',      reason:'Glute inhibition common with desk lifestyle at 40+'},
    'b-r-glute':    {name:'Right Glute',     reason:'Glute inhibition common with desk lifestyle at 40+'},
    'b-upper-back': {name:'Thoracic spine',  reason:'Push training + forward posture risk'},
    'l-shoulder':   {name:'Shoulders',       reason:'Push + Pull volume loads the anterior capsule'},
    'b-l-ham':      {name:'Hamstrings',      reason:'Posterior chain focus + prolonged hip flexion from sitting'},
    'l-knee':       {name:'Knees',           reason:'40+ joint resilience monitoring recommended'},
    'neck':         {name:'Neck / Cervical', reason:'Pull training + forward head posture at desk'},
    'l-hip':        {name:'Hip flexors',     reason:'Hip flexor tension from training + sitting pattern'},
    'b-l-calf':     {name:'Calves',          reason:'Posterior chain loading + ankle mobility at 40+'}
  };
  var zones = [];
  Object.keys(pri).forEach(function(id){ if(ZONE_META[id]) zones.push({id:id,priority:pri[id],meta:ZONE_META[id]}); });
  var order = {high:0,mid:1,low:2};
  zones.sort(function(a,b){ return (order[a.priority]||3)-(order[b.priority]||3); });
  var seen = {};
  zones = zones.filter(function(z){ var base=z.meta.name.replace(/Left |Right /,''); if(seen[base]) return false; seen[base]=true; return true; });
  var rows = zones.slice(0,8).map(function(z){
    var col = z.priority==='high'?'#d94e35':z.priority==='mid'?'var(--amber)':'var(--green)';
    return '<div class="bm-focus-zone" onclick="showFocusDetail(\''+z.id+'\',\''+z.meta.name+'\')">'
      +'<div class="bm-fz-dot" style="background:'+col+';"></div>'
      +'<div style="flex:1;"><div class="bm-fz-name">'+z.meta.name+'</div><div class="bm-fz-reason">'+z.meta.reason+'</div></div>'
      +'<div class="bm-fz-pri '+z.priority+'">'+z.priority+'</div>'
      +'</div>';
  }).join('');
  panel.innerHTML = '<div class="bm-focus-card"><div class="bm-card-label">Your priority zones \u2014 tap to explore</div>'
    +rows
    +'<button class="bm-submit-btn" style="margin-top:12px;" onclick="generateFocusReport()"><span>Generate full body report \u2192</span></button></div>';
}

function toggleChip(type, val, btn) {
  var arr = type==='sensation' ? BM.sensation : BM.context;
  var idx = arr.indexOf(val);
  if(idx>=0){ arr.splice(idx,1); btn.classList.remove('sel'); }
  else{ arr.push(val); btn.classList.add('sel'); }
  updateSubmitBtn();
}

function updateSubmitBtn() {
  var btn = document.getElementById('bm-submit');
  if(!btn) return;
  btn.disabled = !(BM.selected || BM.queryText.trim().length>0 || BM.sensation.length>0);
}

async function submitQuery() {
  var p = getProfile();
  var ra = document.getElementById('bm-result-area');
  ra.innerHTML = '<div class="bm-result"><div class="bm-loading"><div class="bm-spin"></div>Interpreting your body signal\u2026</div></div>';
  ra.scrollIntoView({behavior:'smooth',block:'nearest'});
  var regionLabel = BM.selected ? BM.selected.label : 'unspecified';
  var sensation   = BM.sensation.length ? BM.sensation.join(', ') : 'not specified';
  var context     = BM.context.length   ? BM.context.join(', ')   : 'not specified';
  var trainingStr = p ? (p.weekPlan||[]).filter(function(d){return d.priority==='training';}).map(function(d){return d.type;}).join('/') : '';
  var profileCtx  = p ? (p.name+', '+p.age+'yo '+(p.sex||'male')+', '+p.weight+'kg, goal:'+(p.goal||'recomposition')+', training:'+trainingStr) : 'no profile';
  var prompt = 'Sports science and movement specialist.\n\nUSER: '+profileCtx+'\n\nQUERY:\nBody area: '+regionLabel+'\nDescription: '+(BM.queryText.trim()||'not provided')+'\nSensation: '+sensation+'\nContext: '+context+'\n\nReturn ONLY valid JSON: {"anatomical_area":"specific name","coach_insight":"One direct sentence connecting to their training","likely_pattern":"2-3 sentences","contributing_factors":"2-3 factors specific to this user","immediate_suggestions":["action 1","action 2","action 3"],"avoid":["avoid 1","avoid 2"],"monitor":["sign 1","sign 2"],"training_note":"1-2 sentences","seek_medical":"clear warning signs"}';
  try {
    var res = await fetch(API,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:MODEL,max_tokens:800,system:'Sports science. Return ONLY valid JSON.',messages:[{role:'user',content:prompt}]})});
    var data = await res.json();
    var text = (data.content||[]).map(function(b){return b.text||'';}).join('').trim();
    var m = text.match(/\{[\s\S]*\}/);
    if(!m) throw new Error('no json');
    renderQueryResult(JSON.parse(m[0]), regionLabel, sensation);
  } catch(e) {
    ra.innerHTML = '<div class="bm-result" style="padding:20px;color:var(--dk-3);">Could not interpret \u2014 <button onclick="submitQuery()" style="background:none;border:none;color:var(--jade);cursor:pointer;font-family:var(--sans);font-size:12px;text-decoration:underline;">try again</button></div>';
  }
}

function renderQueryResult(r, region, sensation) {
  var ra = document.getElementById('bm-result-area');
  var doTags = (r.immediate_suggestions||[]).map(function(s){return '<span class="bm-action-tag do">\u2713 '+s+'</span>';}).join('');
  var avTags = (r.avoid||[]).map(function(s){return '<span class="bm-action-tag avoid">\u2717 '+s+'</span>';}).join('');
  var moTags = (r.monitor||[]).map(function(s){return '<span class="bm-action-tag monitor">\u25ce '+s+'</span>';}).join('');
  ra.innerHTML = '<div class="bm-result">'
    +'<div class="bm-result-header">'
      +'<div><div class="bm-result-region">'+(r.anatomical_area||region)+'</div>'+(sensation!=='not specified'?'<div class="bm-result-sensation">'+sensation+'</div>':'')+'</div>'
      +'<div class="bm-result-disclaimer">Pattern recognition, not diagnosis. See a clinician for persistent or worsening symptoms.</div>'
    +'</div>'
    +'<div class="bm-result-body">'
      +'<div class="bm-result-section"><div class="bm-result-sec-label">Coach insight</div><div class="bm-result-text serif">'+(r.coach_insight||'')+'</div></div>'
      +'<div class="bm-result-section"><div class="bm-result-sec-label">Likely pattern</div><div class="bm-result-text">'+(r.likely_pattern||'')+'</div></div>'
      +'<div class="bm-result-section"><div class="bm-result-sec-label">Contributing factors</div><div class="bm-result-text">'+(r.contributing_factors||'')+'</div></div>'
      +'<div class="bm-result-section"><div class="bm-result-sec-label">Training note</div><div class="bm-result-text">'+(r.training_note||'')+'</div></div>'
      +'<div class="bm-result-section"><div class="bm-result-sec-label">What to do</div><div class="bm-actions">'+doTags+'</div></div>'
      +'<div class="bm-result-section"><div class="bm-result-sec-label">Avoid</div><div class="bm-actions">'+avTags+'</div></div>'
      +'<div class="bm-result-section"><div class="bm-result-sec-label">Monitor</div><div class="bm-actions">'+moTags+'</div></div>'
      +'<div class="bm-warning"><div class="bm-warning-label">\u26a0 Seek medical assessment if</div><div class="bm-warning-text">'+(r.seek_medical||'Pain is severe, worsening, or accompanied by neurological symptoms.')+'</div></div>'
    +'</div></div>';
  ra.scrollIntoView({behavior:'smooth',block:'start'});
}

async function showFocusDetail(id, label) {
  BM.selected = {id:id, label:label};
  applyPriorityColours();
  var ra = document.getElementById('bm-result-area');
  ra.innerHTML = '<div class="bm-result"><div class="bm-loading"><div class="bm-spin"></div>Analysing '+label+' for your profile\u2026</div></div>';
  ra.scrollIntoView({behavior:'smooth',block:'nearest'});
  var p = getProfile();
  var zonePri = DOT_PRIORITY_MAP[id]||'moderate';
  var trainingStr = p ? (p.weekPlan||[]).filter(function(d){return d.priority==='training';}).map(function(d){return d.type;}).join('/') : '';
  var profileCtx  = p ? (p.name+', '+p.age+'yo, goal:'+(p.goal||'recomposition')+', training:'+trainingStr) : '';
  var prompt = 'Sports science specialist. Proactive body focus briefing for: '+label+'. User: '+profileCtx+'. Priority: '+zonePri+'. Return ONLY valid JSON: {"why_matters":"2-3 sentences","risk_drivers":["f1","f2","f3"],"mobility_work":["m1","m2"],"strength_work":["s1","s2"],"training_link":"connection to their split","one_action":"single most important thing this week"}';
  try {
    var res=await fetch(API,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:MODEL,max_tokens:500,system:'Sports science. Return ONLY valid JSON.',messages:[{role:'user',content:prompt}]})});
    var data=await res.json();
    var text=(data.content||[]).map(function(b){return b.text||'';}).join('').trim();
    var m=text.match(/\{[\s\S]*\}/);
    if(!m) throw new Error('no json');
    var r=JSON.parse(m[0]);
    var col=zonePri==='high'?'#d94e35':zonePri==='mid'?'var(--amber)':'var(--green)';
    var riskTags=(r.risk_drivers||[]).map(function(s){return '<span class="bm-action-tag monitor">'+s+'</span>';}).join('');
    var mobTags=(r.mobility_work||[]).map(function(s){return '<span class="bm-action-tag do">'+s+'</span>';}).join('');
    var strTags=(r.strength_work||[]).map(function(s){return '<span class="bm-action-tag do">'+s+'</span>';}).join('');
    ra.innerHTML='<div class="bm-focus-result">'
      +'<div style="display:flex;align-items:center;gap:10px;margin-bottom:14px;">'
        +'<div style="width:12px;height:12px;border-radius:50%;background:'+col+';flex-shrink:0;"></div>'
        +'<div class="bm-focus-result-title" style="margin-bottom:0;">'+label+'</div>'
        +'<div class="bm-fz-pri '+zonePri+'" style="margin-left:auto;">'+zonePri+'</div>'
      +'</div>'
      +'<div class="bm-result-sec-label">Why this matters for you</div>'
      +'<div class="bm-result-text" style="margin-bottom:14px;">'+(r.why_matters||'')+'</div>'
      +'<div class="bm-result-sec-label">Risk drivers</div>'
      +'<div class="bm-actions" style="margin-bottom:14px;">'+riskTags+'</div>'
      +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px;">'
        +'<div><div class="bm-result-sec-label">Mobility</div><div class="bm-actions" style="flex-direction:column;">'+mobTags+'</div></div>'
        +'<div><div class="bm-result-sec-label">Strength</div><div class="bm-actions" style="flex-direction:column;">'+strTags+'</div></div>'
      +'</div>'
      +'<div class="bm-result-sec-label">Training link</div>'
      +'<div class="bm-result-text" style="margin-bottom:14px;">'+(r.training_link||'')+'</div>'
      +'<div style="background:rgba(0,200,160,.04);border:1px solid var(--jade-br);border-radius:8px;padding:12px 14px;">'
        +'<div class="bm-result-sec-label" style="color:var(--jade);">This week</div>'
        +'<div class="bm-result-text serif" style="color:var(--dk-1);">'+(r.one_action||'')+'</div>'
      +'</div>'
    +'</div>';
    ra.scrollIntoView({behavior:'smooth',block:'start'});
  } catch(e) {
    ra.innerHTML = '<div class="bm-result" style="padding:20px;color:var(--dk-3);">Could not load \u2014 <button onclick="showFocusDetail(\''+id+'\',\''+label+'\')" style="background:none;border:none;color:var(--jade);cursor:pointer;font-family:var(--sans);font-size:12px;text-decoration:underline;">try again</button></div>';
  }
}

async function generateFocusReport() {
  var ra = document.getElementById('bm-result-area');
  ra.innerHTML='<div class="bm-result"><div class="bm-loading"><div class="bm-spin"></div>Building your full body focus report\u2026</div></div>';
  ra.scrollIntoView({behavior:'smooth',block:'nearest'});
  var p = getProfile();
  var pri = DOT_PRIORITY_MAP;
  var allDots = DOTS_FRONT.concat(DOTS_BACK);
  function zoneNames(pv){ return Object.keys(pri).filter(function(k){return pri[k]===pv;}).map(function(id){ var d=allDots.find(function(x){return x[0]===id;}); return d?d[1]:id; }).slice(0,5).join(', '); }
  var trainingStr = p ? (p.weekPlan||[]).filter(function(d){return d.priority==='training';}).map(function(d){return d.type;}).join('/') : '';
  var profileCtx  = p ? (p.name+', '+p.age+'yo '+(p.sex||'male')+', '+p.weight+'kg, goal:'+(p.goal||'recomposition')+', '+(p.trainingDays||4)+' days/wk ('+trainingStr+')') : 'no profile';
  var prompt = 'Body intelligence specialist. Write a personalised body focus report.\nUser: '+profileCtx+'\nHigh priority zones: '+zoneNames('high')+'\nWatch areas: '+zoneNames('mid')+'\n\n3 paragraphs: 1. What the pattern shows about this person. 2. Highest-leverage areas and why they compound each other. 3. Concrete 4-week protocol integrated with their training split.\n\nDirect, specific, personal. Plain prose only. Under 250 words.';
  try {
    var res=await fetch(API,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:MODEL,max_tokens:400,system:'Body intelligence specialist. Direct, specific. Plain prose.',messages:[{role:'user',content:prompt}]})});
    var data=await res.json();
    var text=(data.content||[]).map(function(b){return b.text||'';}).join('').trim();
    var paras=text.split(/\n+/).filter(Boolean);
    ra.innerHTML='<div class="bm-focus-result">'
      +'<div class="bm-focus-result-title">Your body focus report</div>'
      +'<div style="font-size:9px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--dk-3);margin-bottom:14px;">Personalised to your profile \u00b7 '+new Date().toLocaleDateString('en-GB',{day:'numeric',month:'long'})+'</div>'
      +paras.map(function(para,idx){return '<p style="font-family:var(--serif);font-size:15px;font-weight:300;color:'+(idx===0?'var(--dk-1)':'var(--dk-2)')+';line-height:1.85;margin-bottom:14px;">'+para+'</p>';}).join('')
    +'</div>';
    ra.scrollIntoView({behavior:'smooth',block:'start'});
  } catch(e) {
    ra.innerHTML='<div class="bm-result" style="padding:20px;color:var(--dk-3);">Could not generate \u2014 <button onclick="generateFocusReport()" style="background:none;border:none;color:var(--jade);cursor:pointer;font-family:var(--sans);font-size:12px;text-decoration:underline;">try again</button></div>';
  }
}

function init() {
  var p = getProfile();
  var nm = document.getElementById('nav-meta');
  if (nm && p) nm.innerHTML = '<span class="nav-tag nt-jade">'+p.name+'</span>';
  DOT_PRIORITY_MAP = computePriorities(p);
  applyPriorityColours();
  renderPanel();
}

init();
</script>
</body>
</html>
