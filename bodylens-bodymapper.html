<title>BodyLens — Body Mapper</title>

<style>
body{background:var(--ink);color:var(--dk-1);min-height:100vh;}
.bm-page{max-width:1100px;margin:0 auto;padding:0 28px 100px;}

/* ── HERO ───────────────────────────────────────── */
.bm-hero{padding:28px 0 20px;border-bottom:1px solid var(--bd);}
.bm-kicker{font-size:10px;font-weight:700;letter-spacing:.22em;text-transform:uppercase;color:var(--dk-3);margin-bottom:6px;}
.bm-title{font-family:var(--serif);font-size:48px;font-weight:300;line-height:.93;letter-spacing:-.025em;color:var(--dk-1);margin-bottom:8px;}
.bm-title em{font-style:italic;color:var(--dk-3);}
.bm-sub{font-size:12px;font-weight:300;color:var(--dk-2);line-height:1.7;max-width:520px;}

/* ── MODE TOGGLE ────────────────────────────────── */
.bm-mode-bar{display:flex;gap:0;margin:20px 0 0;border:1px solid var(--bd);border-radius:10px;overflow:hidden;width:fit-content;}
.bm-mode-btn{padding:10px 24px;font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--dk-3);background:transparent;border:none;cursor:pointer;font-family:var(--sans);transition:all .15s;}
.bm-mode-btn.active{background:var(--ink-2);color:var(--dk-1);}
.bm-mode-btn.active.query{color:var(--jade);}
.bm-mode-btn.active.focus{color:var(--amber);}

/* ── MAIN LAYOUT ────────────────────────────────── */
.bm-layout{display:grid;grid-template-columns:1fr 340px;gap:28px;margin-top:24px;align-items:start;}
@media(max-width:800px){.bm-layout{grid-template-columns:1fr;}}

/* ── BODY MAP CONTAINER ─────────────────────────── */
.bm-map-section{background:var(--ink-1);border:1px solid var(--bd);border-radius:12px;padding:20px;}
.bm-map-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.bm-map-title{font-size:9px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--dk-3);}
.bm-view-toggle{display:flex;gap:0;border:1px solid var(--bd);border-radius:7px;overflow:hidden;}
.bm-view-btn{padding:5px 14px;font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--dk-3);background:transparent;border:none;cursor:pointer;font-family:var(--sans);transition:all .1s;}
.bm-view-btn.active{background:var(--ink-2);color:var(--dk-2);}

.bm-map-wrap{display:flex;justify-content:center;align-items:flex-start;min-height:480px;position:relative;}
.bm-body-svg{width:100%;max-width:260px;cursor:pointer;}

/* Body region styles */
.bm-region{transition:fill .15s,opacity .15s;cursor:pointer;}
.bm-region:hover{opacity:.75;}
.bm-region.pri-high{fill:rgba(217,78,53,0.45);stroke:rgba(217,78,53,.7);stroke-width:.5;}
.bm-region.pri-mid{fill:rgba(196,124,24,0.3);stroke:rgba(196,124,24,.5);stroke-width:.5;}
.bm-region.pri-low{fill:rgba(0,168,114,0.15);stroke:rgba(0,168,114,.3);stroke-width:.5;}
.bm-region.neutral{fill:rgba(255,255,255,.04);stroke:rgba(255,255,255,.06);stroke-width:.5;}
.bm-region.selected{fill:rgba(0,200,160,.2);stroke:var(--jade);stroke-width:1.5;}
.bm-region.selected:hover{opacity:1;}

/* Priority legend */
.bm-legend{display:flex;gap:14px;margin-top:14px;flex-wrap:wrap;justify-content:center;}
.bm-legend-item{display:flex;align-items:center;gap:5px;font-size:9px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--dk-3);}
.bm-legend-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}

/* Selected region label */
.bm-selected-label{text-align:center;margin-top:10px;font-size:11px;font-weight:500;color:var(--jade);min-height:18px;transition:opacity .2s;}

/* ── RIGHT PANEL ────────────────────────────────── */
.bm-panel{display:flex;flex-direction:column;gap:12px;}

/* Query input */
.bm-query-card{background:var(--ink-1);border:1px solid var(--bd);border-radius:10px;padding:16px;}
.bm-card-label{font-size:9px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--dk-3);margin-bottom:10px;}
.bm-query-input{width:100%;background:var(--ink-2);border:1px solid var(--bd);border-radius:8px;padding:11px 13px;font-size:13px;font-weight:300;color:var(--dk-1);font-family:var(--sans);resize:none;outline:none;box-sizing:border-box;line-height:1.5;transition:border-color .12s;}
.bm-query-input:focus{border-color:rgba(0,200,160,.3);}
.bm-query-input::placeholder{color:var(--dk-3);}

/* Sensation chips */
.bm-chips{display:flex;gap:5px;flex-wrap:wrap;margin-top:8px;}
.bm-chip{padding:5px 11px;border-radius:14px;border:1px solid var(--bd);background:transparent;font-size:10px;font-weight:500;color:var(--dk-3);cursor:pointer;font-family:var(--sans);transition:all .1s;white-space:nowrap;}
.bm-chip:hover{border-color:rgba(255,255,255,.1);color:var(--dk-2);}
.bm-chip.sel{background:rgba(0,200,160,.07);border-color:var(--jade-br);color:var(--jade);}

/* Submit button */
.bm-submit-btn{width:100%;background:var(--jade);border:none;color:var(--ink);padding:12px;border-radius:8px;font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;font-family:var(--sans);margin-top:4px;display:flex;align-items:center;justify-content:center;gap:8px;transition:opacity .12s;}
.bm-submit-btn:hover{opacity:.88;}
.bm-submit-btn:disabled{opacity:.4;cursor:not-allowed;}

/* Focus mode summary */
.bm-focus-card{background:var(--ink-1);border:1px solid var(--bd);border-radius:10px;padding:16px;}
.bm-focus-zone{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.04);cursor:pointer;transition:background .1s;}
.bm-focus-zone:last-child{border-bottom:none;}
.bm-focus-zone:hover{background:rgba(255,255,255,.01);margin:0 -4px;padding-left:4px;padding-right:4px;border-radius:5px;}
.bm-fz-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.bm-fz-name{font-size:12px;font-weight:500;color:var(--dk-1);flex:1;}
.bm-fz-reason{font-size:10px;font-weight:300;color:var(--dk-3);line-height:1.4;}
.bm-fz-pri{font-size:8px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:2px 7px;border-radius:8px;flex-shrink:0;}
.bm-fz-pri.high{background:rgba(217,78,53,.12);color:#d94e35;border:1px solid rgba(217,78,53,.25);}
.bm-fz-pri.mid{background:rgba(196,124,24,.1);color:var(--amber);border:1px solid rgba(196,124,24,.25);}
.bm-fz-pri.low{background:rgba(0,168,114,.08);color:var(--green);border:1px solid rgba(0,168,114,.2);}

/* ── RESULT PANEL ───────────────────────────────── */
.bm-result{background:var(--ink-1);border:1px solid var(--bd);border-radius:10px;overflow:hidden;margin-top:20px;}
.bm-result-header{padding:16px 20px;border-bottom:1px solid var(--bd);display:flex;align-items:flex-start;justify-content:space-between;gap:12px;}
.bm-result-region{font-family:var(--serif);font-size:26px;font-weight:300;color:var(--dk-1);line-height:1.1;}
.bm-result-sensation{font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;padding:3px 10px;border-radius:10px;background:rgba(0,200,160,.07);border:1px solid var(--jade-br);color:var(--jade);margin-top:5px;display:inline-block;}
.bm-result-disclaimer{font-size:9px;font-weight:300;color:var(--dk-3);font-style:italic;line-height:1.5;max-width:200px;text-align:right;}

.bm-result-body{padding:20px;}
.bm-result-section{margin-bottom:18px;}
.bm-result-section:last-child{margin-bottom:0;}
.bm-result-sec-label{font-size:8px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--dk-3);margin-bottom:6px;}
.bm-result-text{font-size:13px;font-weight:300;color:var(--dk-2);line-height:1.8;}
.bm-result-text.serif{font-family:var(--serif);font-size:15px;color:var(--dk-1);line-height:1.85;}

/* Warning box */
.bm-warning{background:rgba(217,78,53,.06);border:1px solid rgba(217,78,53,.2);border-radius:8px;padding:12px 14px;margin-top:14px;}
.bm-warning-label{font-size:8px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:#d94e35;margin-bottom:5px;}
.bm-warning-text{font-size:11px;font-weight:300;color:rgba(232,220,210,.7);line-height:1.65;}

/* Action tags */
.bm-actions{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px;}
.bm-action-tag{padding:5px 12px;border-radius:12px;font-size:10px;font-weight:600;border:1px solid var(--bd);color:var(--dk-2);background:var(--ink-2);}
.bm-action-tag.do{border-color:var(--jade-br);color:var(--jade);background:var(--jade-dim);}
.bm-action-tag.avoid{border-color:rgba(217,78,53,.25);color:#d94e35;background:rgba(217,78,53,.06);}
.bm-action-tag.monitor{border-color:rgba(196,124,24,.25);color:var(--amber);background:rgba(196,124,24,.06);}

/* Loading */
.bm-loading{padding:32px 20px;display:flex;align-items:center;gap:12px;color:var(--dk-3);font-size:12px;font-weight:300;}
.bm-spin{width:16px;height:16px;border-radius:50%;border:2px solid rgba(255,255,255,.08);border-top-color:var(--jade);animation:bmspin .7s linear infinite;flex-shrink:0;}
@keyframes bmspin{to{transform:rotate(360deg)}}

/* Proactive focus result */
.bm-focus-result{background:var(--ink-1);border:1px solid rgba(196,124,24,.2);border-radius:10px;padding:20px;margin-top:20px;}
.bm-focus-result-title{font-family:var(--serif);font-size:22px;font-weight:300;color:var(--dk-1);margin-bottom:14px;}
.bm-focus-zone-detail{margin-bottom:18px;padding-bottom:18px;border-bottom:1px solid var(--bd);}
.bm-focus-zone-detail:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0;}
.bm-fzd-name{font-size:13px;font-weight:600;color:var(--dk-1);margin-bottom:4px;display:flex;align-items:center;gap:8px;}
.bm-fzd-text{font-size:12px;font-weight:300;color:var(--dk-2);line-height:1.7;}
</style>
</head>

        <div class="bm-legend-item"><div class="bm-legend-dot" style="background:var(--jade);"></div>Selected</div>
      </div>
    </div>

    <!-- RIGHT: Panel -->
    <div class="bm-panel" id="bm-panel"></div>
  </div>

  <!-- Result area -->
  <div id="bm-result-area"></div>
</div>

// ── PROFILE-BASED PRIORITY MAPPING ────────────────────
function computePriorities(p) {
  if (!p) return {};
  var priorities = {};
  var age  = p.age || 35;
  var isMale = (p.sex||'').toLowerCase() !== 'female';
  var training = (p.weekPlan||[]).filter(function(d){ return d.priority === 'training'; }).length;
  var types = (p.weekPlan||[]).map(function(d){ return (d.type||'').toLowerCase(); });
  var hasPull = types.some(function(t){ return t.includes('pull'); });
  var hasPush = types.some(function(t){ return t.includes('push'); });
  var hasLower = types.some(function(t){ return t.includes('posterior') || t.includes('leg') || t.includes('lower'); });
  var injuries = (p.injuryAssessments||p.injuries||[]).map(function(i){ return (i.location||i||'').toLowerCase(); });
  var fatStorage = (p.fatStorage||'').toLowerCase();
  var activity  = (p.activityLevel||'').toLowerCase();
  var isSedentary = activity.includes('sedent') || activity.includes('desk') || activity.includes('sitting');

  // Lower back — almost universal for 40+ male desk workers with posterior chain loading
  if (age >= 35 || isSedentary || hasLower) {
    priorities['b-lower-back'] = age >= 40 ? 'high' : 'mid';
    priorities['lower-abs']    = 'mid';
  }

  // Hips — 40+ male, posterior chain, glute weakness
  if (age >= 38 || hasLower) {
    priorities['b-left-glute']  = age >= 42 ? 'high' : 'mid';
    priorities['b-right-glute'] = age >= 42 ? 'high' : 'mid';
    priorities['left-hip']      = 'mid';
    priorities['right-hip']     = 'mid';
  }

  // Thoracic / upper back — push training, desk work, 40+
  if (hasPush || age >= 38) {
    priorities['b-upper-back']    = 'mid';
    priorities['b-left-trap']     = age >= 40 ? 'mid' : 'low';
    priorities['b-right-trap']    = age >= 40 ? 'mid' : 'low';
  }

  // Shoulders — push + pull training
  if (hasPush || hasPull) {
    priorities['left-shoulder']    = 'mid';
    priorities['right-shoulder']   = 'mid';
    priorities['b-left-shoulder']  = hasPush ? 'mid' : 'low';
    priorities['b-right-shoulder'] = hasPush ? 'mid' : 'low';
  }

  // Hamstrings — posterior chain, 40+, sitting
  if (hasLower || age >= 40) {
    priorities['b-left-ham']  = 'mid';
    priorities['b-right-ham'] = 'mid';
  }

  // Knees — 40+, lower body training
  if (age >= 40 || hasLower) {
    priorities['left-knee']  = age >= 42 ? 'mid' : 'low';
    priorities['right-knee'] = age >= 42 ? 'mid' : 'low';
    priorities['b-left-knee']  = 'low';
    priorities['b-right-knee'] = 'low';
  }

  // Neck / cervical — desk work, pull training
  if (hasPull || isSedentary || age >= 40) {
    priorities['neck']   = 'mid';
    priorities['b-neck'] = 'mid';
  }

  // Calves / achilles — posterior chain, running age-related
  if (age >= 40 || hasLower) {
    priorities['b-left-calf']      = 'low';
    priorities['b-right-calf']     = 'low';
    priorities['b-left-achilles']  = 'low';
    priorities['b-right-achilles'] = 'low';
  }

  // Apply known injury history
  injuries.forEach(function(loc) {
    var key = loc.replace(/\s+/g, '-');
    REGIONS_FRONT.concat(REGIONS_BACK).forEach(function(r) {
      if (r.id.includes(key) || r.label.toLowerCase().includes(loc)) {
        priorities[r.id] = 'high';
      }
    });
  });

  return priorities;
}

function priorityClass(pri) {
  if (pri === 'high') return 'pri-high';
  if (pri === 'mid')  return 'pri-mid';
  if (pri === 'low')  return 'pri-low';
  return 'neutral';
}

// ── SVG BODY MAP ──────────────────────────────────────
function buildSVG(view) {
  var regions  = view === 'front' ? REGIONS_FRONT : REGIONS_BACK;
  var outline  = view === 'front' ? BODY_OUTLINE_FRONT : BODY_OUTLINE_BACK;
  var pri = BM.priorities || {};

  var pathsHtml = regions.map(function(r) {
    var pClass = pri[r.id] ? priorityClass(pri[r.id]) : 'neutral';
    var isSel  = BM.selected && BM.selected.id === r.id;
    if (isSel) pClass = 'selected';
    return '<path class="bm-region ' + pClass + '" data-id="' + r.id + '" data-label="' + r.label + '" d="' + r.path + '" onclick="selectRegion(\'' + r.id + '\',\'' + r.label.replace(/'/g,"\\'") + '\')">'
      + '<title>' + r.label + '</title>'
    + '</path>';
  }).join('');

  return '<svg class="bm-body-svg" viewBox="0 0 250 295" xmlns="http://www.w3.org/2000/svg">'
    + '<defs>'
      + '<filter id="bm-glow"><feGaussianBlur stdDeviation="2" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>'
    + '</defs>'
    // Body outline silhouette
    + '<path d="' + outline + '" fill="rgba(255,255,255,.03)" stroke="rgba(255,255,255,.08)" stroke-width="1"/>'
    // Region overlays
    + pathsHtml
    // Centre line (subtle)
    + '<line x1="125" y1="40" x2="125" y2="275" stroke="rgba(255,255,255,.04)" stroke-width=".5" stroke-dasharray="3 4"/>'
  + '</svg>';
}

function renderMap() {
  var container = document.getElementById('body-svg-container');
  if (!container) return;
  container.innerHTML = buildSVG(BM.view);
  updateSelectedLabel();
}

function selectRegion(id, label) {
  BM.selected = {id: id, label: label};
  renderMap();
  updateSelectedLabel();
  if (BM.mode === 'query') {
    updateSubmitBtn();
  } else {
    showFocusDetail(id, label);
  }
}

function updateSelectedLabel() {
  var el = document.getElementById('selected-label');
  if (!el) return;
  el.textContent = BM.selected ? '→ ' + BM.selected.label : '';
}

// ── MODE SWITCHING ────────────────────────────────────
function setMode(mode) {
  BM.mode = mode;
  BM.selected = null;
  document.getElementById('btn-query').classList.toggle('active', mode === 'query');
  document.getElementById('btn-query').classList.toggle('query', mode === 'query');
  document.getElementById('btn-focus').classList.toggle('active', mode === 'focus');
  document.getElementById('btn-focus').classList.toggle('focus', mode === 'focus');
  var mapLabel = document.getElementById('map-mode-label');
  if (mapLabel) mapLabel.textContent = mode === 'query' ? 'Tap where you feel it' : 'Priority zones from your profile';
  renderMap();
  renderPanel();
  document.getElementById('bm-result-area').innerHTML = '';
}

function setView(view) {
  BM.view = view;
  BM.selected = null;
  document.getElementById('btn-front').classList.toggle('active', view === 'front');
  document.getElementById('btn-back').classList.toggle('active', view === 'back');
  renderMap();
  updateSelectedLabel();
}

function renderFocusPanel(panel) {
  var p = getProfile();
  var pri = BM.priorities || {};

  // Build prioritised list
  var zones = [];
  var ZONE_META = {
    'b-lower-back':   { name:'Lower back',          reason:'Posterior chain loading + age-related lumbar compression risk' },
    'b-left-glute':   { name:'Left Glute',           reason:'Glute inhibition common with desk-seated lifestyle at 40+' },
    'b-right-glute':  { name:'Right Glute',          reason:'Glute inhibition common with desk-seated lifestyle at 40+' },
    'b-upper-back':   { name:'Thoracic spine',       reason:'Push training + forward posture risk from desk work' },
    'left-shoulder':  { name:'Left Shoulder',        reason:'Push + Pull volume increases anterior capsule load' },
    'right-shoulder': { name:'Right Shoulder',       reason:'Push + Pull volume increases anterior capsule load' },
    'b-left-ham':     { name:'Left Hamstrings',      reason:'Posterior chain focus + prolonged hip flexion from sitting' },
    'b-right-ham':    { name:'Right Hamstrings',     reason:'Posterior chain focus + prolonged hip flexion from sitting' },
    'neck':           { name:'Neck / Cervical',      reason:'Pull training + forward head posture at desk' },
    'left-knee':      { name:'Left Knee',            reason:'40+ joint resilience monitoring recommended' },
    'right-knee':     { name:'Right Knee',           reason:'40+ joint resilience monitoring recommended' },
    'left-hip':       { name:'Left Hip',             reason:'Hip flexor tension from training + sitting pattern' },
    'right-hip':      { name:'Right Hip',            reason:'Hip flexor tension from training + sitting pattern' },
    'b-left-calf':    { name:'Left Calf',            reason:'Posterior chain loading + ankle mobility at 40+' },
    'b-right-calf':   { name:'Right Calf',           reason:'Posterior chain loading + ankle mobility at 40+' },
  };

  Object.keys(pri).forEach(function(id) {
    if (ZONE_META[id]) zones.push({ id: id, priority: pri[id], meta: ZONE_META[id] });
  });

  // Sort: high > mid > low
  var order = { high:0, mid:1, low:2 };
  zones.sort(function(a,b){ return (order[a.priority]||3) - (order[b.priority]||3); });

  // Dedupe similar zones
  var seen = {};
  zones = zones.filter(function(z) {
    var base = z.meta.name.replace(/Left |Right /,'');
    if (seen[base]) return false;
    seen[base] = true;
    return true;
  });

  var html = '<div class="bm-focus-card">'
    + '<div class="bm-card-label">Your priority zones — tap to explore</div>';

  zones.slice(0, 8).forEach(function(z) {
    var col = z.priority === 'high' ? '#d94e35' : z.priority === 'mid' ? 'var(--amber)' : 'var(--green)';
    html += '<div class="bm-focus-zone" onclick="showFocusDetail(\'' + z.id + '\',\'' + z.meta.name + '\')">'
      + '<div class="bm-fz-dot" style="background:' + col + ';"></div>'
      + '<div style="flex:1;">'
        + '<div class="bm-fz-name">' + z.meta.name + '</div>'
        + '<div class="bm-fz-reason">' + z.meta.reason + '</div>'
      + '</div>'
      + '<div class="bm-fz-pri ' + z.priority + '">' + z.priority + '</div>'
    + '</div>';
  });

  html += '<button class="bm-submit-btn" style="margin-top:12px;" onclick="generateFocusReport()">'
    + '<span>Generate full body focus report →</span>'
  + '</button>';
  html += '</div>';

  panel.innerHTML = html;
}

function toggleChip(type, val, btn) {
  var arr = type === 'sensation' ? BM.sensation : BM.context;
  var idx = arr.indexOf(val);
  if (idx >= 0) { arr.splice(idx, 1); btn.classList.remove('sel'); }
  else           { arr.push(val);     btn.classList.add('sel'); }
  updateSubmitBtn();
}

function updateSubmitBtn() {
  var btn = document.getElementById('bm-submit');
  if (!btn) return;
  var hasRegion = !!BM.selected;
  var hasInput  = (BM.queryText && BM.queryText.trim().length > 0) || BM.sensation.length > 0;
  btn.disabled = !(hasRegion || hasInput);
}

    + 'High priority zones: ' + zoneNames(highZones) + '\n'
    + 'Watch areas: ' + zoneNames(midZones.slice(0,5)) + '\n\n'
    + 'Write a 3-paragraph report: 1. What the pattern shows about this user\'s body under their current training and lifestyle. 2. The highest-leverage areas to address and why they compound each other. 3. A concrete 4-week focus protocol — specific, actionable, integrated with their training split.\n\n'
    + 'Tone: direct, specific, personal. Reference their actual training types. Not generic advice. This is a body intelligence briefing for a serious user.\n\n'
    + 'Return plain prose, no JSON, no headers, no markdown. Under 250 words.';

  try {
    var res = await fetch(API,{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:MODEL,max_tokens:400,system:'Body intelligence specialist. Direct, specific, personal. Plain prose only.',messages:[{role:'user',content:prompt}]})});
    var data=await res.json();
    var text=(data.content||[]).map(function(b){return b.text||'';}).join('').trim();
    var paras=text.split(/\n+/).filter(Boolean);
    ra.innerHTML='<div class="bm-focus-result">'
      +'<div class="bm-focus-result-title">Your body focus report</div>'
      +'<div style="font-size:9px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--dk-3);margin-bottom:14px;">Personalised to your profile · ' + new Date().toLocaleDateString('en-GB',{day:'numeric',month:'long'}) + '</div>'
      +paras.map(function(p,i){return '<p style="font-family:var(--serif);font-size:15px;font-weight:300;color:'+(i===0?'var(--dk-1)':'var(--dk-2)')+';line-height:1.85;margin-bottom:14px;">'+p+'</p>';}).join('')
    +'</div>';
    ra.scrollIntoView({behavior:'smooth',block:'start'});
  } catch(e) {
    ra.innerHTML='<div class="bm-result" style="padding:20px;color:var(--dk-3);">Could not generate — <button onclick="generateFocusReport()" style="background:none;border:none;color:var(--jade);cursor:pointer;font-family:var(--sans);font-size:12px;text-decoration:underline;">try again</button></div>';
  }
}

// ── BOOT ─────────────────────────────────────────────
function init() {
  var p = getProfile();
  var nm = document.getElementById('nav-meta');
  if (nm && p) nm.innerHTML = '<span class="nav-tag nt-jade">' + p.name + '</span>';

  BM.priorities = computePriorities(p);
  renderMap();
  renderPanel();
}

init();
</script>
</body>
</html>
