<style>
@keyframes spin{to{transform:rotate(360deg)}}
.week-strip{background:var(--ink-1);border-bottom:1px solid var(--bd);padding:10px 28px;display:flex;gap:5px;overflow-x:auto;}

.ws-day.today .ws-day-name{color:var(--jade);}
.ws-day-type{font-size:10px;font-weight:500;color:var(--dk-2);}
.macro-bar{position:sticky;top:0;z-index:40;background:rgba(12,16,16,.96);backdrop-filter:blur(8px);border-bottom:1px solid var(--bd);padding:8px 28px;display:flex;gap:12px;align-items:center;}
.mb-group{flex:1;display:flex;align-items:center;gap:7px;min-width:0;}
.mb-label{font-size:9px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--dk-3);width:38px;flex-shrink:0;}
.mb-track{flex:1;height:4px;background:var(--ink-2);border-radius:2px;overflow:hidden;}
.mb-fill{height:100%;border-radius:2px;transition:width .4s;}
.mb-fill.p{background:var(--jade);}
.mb-fill.c{background:var(--amber);}
.mb-fill.f{background:#5a7898;}
.mb-val{font-size:9px;font-family:var(--mono);color:var(--dk-3);width:28px;text-align:right;flex-shrink:0;}
.mb-kcal{font-size:10px;font-weight:600;font-family:var(--mono);white-space:nowrap;flex-shrink:0;}
.day-page{max-width:760px;margin:0 auto;padding:0 28px 120px;}
.day-hero{padding:28px 0 20px;border-bottom:1px solid var(--bd);margin-bottom:20px;}
.day-kicker{font-size:10px;font-weight:600;letter-spacing:.2em;text-transform:uppercase;color:var(--jade);margin-bottom:8px;}
.day-title{font-family:var(--serif);font-size:38px;font-weight:300;line-height:1.05;letter-spacing:-.02em;color:var(--dk-1);margin-bottom:8px;}

.macro-tiles{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--bd);border-radius:7px;overflow:hidden;margin-bottom:14px;}
.mt{background:var(--ink-2);padding:11px 8px;text-align:center;}

.mt-val.j{color:var(--jade);}
.mt-val.a{color:var(--amber);}
.mt-label{font-size:9px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--dk-3);}
.week-tabs{display:flex;gap:5px;margin-bottom:14px;}

.wt.active{border-color:var(--jade-br);background:rgba(0,200,160,.04);}
.wt.done{border-color:rgba(200,148,30,.22);background:rgba(200,148,30,.03);}
.wt-num{font-size:8px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--dk-3);margin-bottom:2px;}
.wt.active .wt-num{color:var(--jade);}
.wt.done .wt-num{color:var(--gold);}
.wt-phase{font-size:11px;font-weight:600;color:var(--dk-1);margin-bottom:1px;}
.wt-note{font-size:9px;font-weight:300;color:var(--dk-3);line-height:1.3;}
.week-detail{background:var(--ink-2);border:1px solid var(--jade-br);border-radius:5px;padding:12px 14px;margin-bottom:14px;display:none;animation:fadeIn .15s ease;}
.week-detail.open{display:block;}
@keyframes fadeIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
.wd-phase{font-size:9px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--jade);margin-bottom:3px;}
.wd-focus{font-size:13px;font-weight:500;color:var(--dk-1);margin-bottom:3px;}
.wd-note{font-size:12px;font-weight:300;color:var(--dk-2);line-height:1.65;}
.acc-strip{background:linear-gradient(135deg,rgba(200,148,30,.06),rgba(200,148,30,.02));border:1px solid rgba(200,148,30,.22);border-radius:7px;padding:12px 16px;margin-bottom:14px;display:flex;align-items:center;gap:12px;}
.acc-body{flex:1;}
.acc-kicker{font-size:8px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--gold);margin-bottom:2px;}
.acc-title{font-size:13px;font-weight:600;color:var(--dk-1);margin-bottom:2px;}
.acc-why{font-size:11px;font-weight:300;color:var(--dk-2);line-height:1.55;}
.acc-link{background:rgba(200,148,30,.1);border:1px solid rgba(200,148,30,.3);color:var(--gold);padding:5px 12px;border-radius:4px;font-size:10px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;text-decoration:none;white-space:nowrap;}
.water-bar{font-size:11px;font-weight:300;color:rgba(100,180,220,.75);background:rgba(74,143,168,.06);border:1px solid rgba(74,143,168,.14);border-radius:4px;padding:7px 12px;margin-bottom:14px;}
.prog-strip{background:rgba(200,148,30,.04);border:1px solid rgba(200,148,30,.18);border-radius:6px;padding:9px 14px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center;}
.ps-label{font-size:9px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--gold);margin-bottom:3px;}

.tl-block.t-supp{border-left:3px solid var(--gold);}

.tl-tag.g{color:var(--gold);background:rgba(200,148,30,.08);border:1px solid rgba(200,148,30,.25);}

.tl-tick.done{background:var(--jade);color:var(--ink);border-color:var(--jade);}
.tl-body{display:none;padding:0 14px 14px 54px;}
.tl-block.open .tl-body{display:block;}
.tl-detail{font-size:13px;font-weight:300;color:var(--dk-2);line-height:1.8;margin-bottom:8px;}
.tl-detail p{margin:0 0 5px;}

.tl-item{background:var(--ink-1);border:1px solid var(--bd);border-radius:4px;padding:3px 9px;font-size:11px;font-weight:500;color:var(--dk-1);}

.tl-block.meal-open .tl-chev{transform:rotate(180deg);}
.meal-actions{display:flex;gap:7px;margin-bottom:10px;flex-wrap:wrap;}

.meal-btn.pri{border-color:var(--amber-br);color:var(--amber);}
.meal-btn.con{border-color:var(--jade-br);color:var(--jade);}

.dev-input{width:100%;background:var(--ink-2);border:1px solid var(--bd);border-radius:5px;padding:8px 11px;font-size:12px;font-family:var(--sans);color:var(--dk-1);outline:none;resize:none;line-height:1.4;transition:border-color .12s;}
.dev-input:focus{border-color:rgba(0,200,160,.35);}
.dev-input::placeholder{color:var(--dk-3);}
.dev-send{margin-top:6px;background:var(--jade);border:none;color:var(--ink);border-radius:5px;padding:7px 14px;font-size:10px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;cursor:pointer;font-family:var(--sans);}
.dev-result{margin-top:7px;padding:8px 10px;background:var(--ink-2);border:1px solid var(--jade-br);border-radius:4px;font-size:11px;font-weight:300;color:var(--dk-2);line-height:1.65;}
.ri{background:var(--ink-2);border:1px solid var(--bd);border-radius:5px;overflow:hidden;margin-top:10px;}

.ri-name{font-size:13px;font-weight:500;color:var(--dk-1);}
.ri-desc{font-size:10px;font-weight:300;color:var(--dk-3);}
.ri-shuf{background:transparent;border:1px solid var(--amber-br);color:var(--amber);border-radius:12px;padding:3px 10px;font-size:9px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;cursor:pointer;font-family:var(--sans);}
.ri-macs{padding:9px 13px;border-bottom:1px solid var(--bd);display:flex;flex-direction:column;gap:4px;}
.ri-mr{display:grid;grid-template-columns:44px 1fr 30px;gap:6px;align-items:center;}
.ri-ml{font-size:9px;font-weight:500;color:var(--dk-3);}
.ri-mb{height:5px;background:var(--ink-1);border-radius:2px;overflow:hidden;}
.ri-mf{height:100%;border-radius:2px;}
.ri-mf.p{background:var(--jade);}
.ri-mf.c{background:var(--amber);}
.ri-mf.f{background:#5a7898;}
.ri-mv{font-size:9px;font-family:var(--mono);color:var(--dk-3);text-align:right;}

.ri-ing{background:var(--ink-1);border:1px solid var(--bd);border-radius:3px;padding:3px 8px;font-size:10px;}

.ri-iq{font-weight:300;color:var(--dk-3);margin-left:3px;}
.ri-meth{padding:9px 13px;font-size:11px;font-weight:300;color:var(--dk-2);line-height:1.7;}
.sp-overlay{display:none;position:fixed;inset:0;background:rgba(8,14,13,.7);z-index:200;}
.sp-panel{position:fixed;top:0;right:0;bottom:0;width:420px;max-width:96vw;background:var(--ink-1);border-left:1px solid var(--bd);z-index:201;display:flex;flex-direction:column;transform:translateX(100%);transition:transform .25s cubic-bezier(.34,1.2,.64,1);}
.sp-panel.open{transform:translateX(0);}

.sp-title{font-size:13px;font-weight:600;color:var(--dk-1);}
.sp-close{background:none;border:1px solid var(--bd);color:var(--dk-3);width:28px;height:28px;border-radius:5px;cursor:pointer;font-size:14px;font-family:var(--sans);}
.sp-body{flex:1;overflow-y:auto;padding:14px 18px;}
.sp-body::-webkit-scrollbar{width:3px;}
.sp-body::-webkit-scrollbar-thumb{background:var(--bd);}
.lv-tabs{display:grid;grid-template-columns:1fr 1fr 1fr;border-bottom:1px solid var(--bd);}
.lvt{padding:9px 6px;text-align:center;cursor:pointer;transition:background .1s;border-right:1px solid var(--bd);}
.lvt:last-child{border-right:none;}
.lvt.active{background:rgba(200,148,30,.05);}
.lvt.yours{background:rgba(0,200,160,.04);}
.lvt-name{font-size:9px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--dk-3);margin-bottom:1px;}
.lvt.active .lvt-name{color:var(--gold);}
.lvt.yours .lvt-name{color:var(--jade);}
.lvt-desc{font-size:9px;font-weight:300;color:var(--dk-3);}
.ex-card{background:var(--ink-2);border:1px solid var(--bd);border-radius:6px;margin-bottom:7px;overflow:hidden;}

.ex-card.open .ex-hd{border-bottom:1px solid var(--bd);background:var(--ink-1);}
.ex-nm{flex:1;font-size:13px;font-weight:500;color:var(--dk-1);}
.ex-sc{font-family:var(--mono);font-size:12px;font-weight:600;color:var(--jade);}

.ex-card.open .ex-bd{display:block;}

<script src="nav.js"></script>
<script>
'use strict';
// BodyLens Daily Plan v5 — clean rebuild
var API   = '/api/chat';
var MODEL = 'claude-sonnet-4-20250514';
var P=null, TODAY=null, MACROS=null;
var _recipes={}, _rDate=new Date().toISOString().slice(0,10);

function _rKey(s){return 'bl_recipe_'+s+'_'+_rDate;}
function _rLoad(){['pre-training','post-training','midday','afternoon','evening'].forEach(function(s){try{var r=localStorage.getItem(_rKey(s));if(r)_recipes[s]=JSON.parse(r);}catch(e){}});}
function _rSave(s,r){_recipes[s]=r;try{localStorage.setItem(_rKey(s),JSON.stringify(r));}catch(e){}}
function _rBust(s){delete _recipes[s];try{localStorage.removeItem(_rKey(s));}catch(e){}}

function loadProfile(){try{return JSON.parse(localStorage.getItem('bl_profile')||'null');}catch(e){return null;}}

function getTodayCtx(p){
  var N=['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
  var M={0:6,1:0,2:1,3:2,4:3,5:4,6:5};
  var i=M[new Date().getDay()];
  var plan=(p.weekPlan||[])[i]||{type:'Rest',focus:'Recovery',priority:'rest'};
  return {idx:i,name:N[i],plan:plan,isTraining:plan.priority==='training',
    cacheKey:'dayplan_v5_'+_rDate,DAY_NAMES:N};
}

function initMacros(p,t){
  var k='bl_macros_'+_rDate;
  try{var r=localStorage.getItem(k);if(r){MACROS=JSON.parse(r);return;}}catch(e){}
  var kcal=t.isTraining?(t.plan.kcal||p.calories||2000):Math.round((p.calories||2000)*0.91);
  MACROS={target:{kcal:kcal,prot:p.protein||140,carbs:p.carbs||160,fat:p.fat||60},eaten:{kcal:0,prot:0,carbs:0,fat:0},meals:{}};
  saveMacros();
}
function saveMacros(){try{localStorage.setItem('bl_macros_'+_rDate,JSON.stringify(MACROS));}catch(e){}}
function logMealMacros(slot,m){
  MACROS.meals[slot]=m;
  MACROS.eaten={kcal:0,prot:0,carbs:0,fat:0};
  Object.values(MACROS.meals).forEach(function(x){if(x&&x.logged){MACROS.eaten.kcal+=x.kcal||0;MACROS.eaten.prot+=x.prot||0;MACROS.eaten.carbs+=x.carbs||0;MACROS.eaten.fat+=x.fat||0;}});
  saveMacros();updateMacroBar();adjustRemaining();
}
function buildMacroRow(label,eaten,target,color,unit){
  var pct=Math.min(100,target>0?Math.round(eaten/target*100):0);
  var over=eaten>target*1.1;
  var barColor=over?'var(--amber)':color;
  return '<div class="ms-row">'
    +'<div class="ms-label">'+label+'</div>'
    +'<div class="ms-track"><div class="ms-fill" style="width:'+pct+'%;background:'+barColor+';"></div></div>'
    +'<div class="ms-val">'+eaten+(unit?unit:'')+'<span style="color:var(--dk-3);font-size:8px;"> /'+target+'</span></div>'
    +'</div>';
}

function updateMacroBar(){
  var bar=document.getElementById('macro-bar');
  if(!bar||!MACROS)return;
  bar.style.display='flex';
  var t=MACROS.target,e=MACROS.eaten;
  function pct(v,mx){return Math.min(100,Math.round(v/Math.max(1,mx)*100));}
  var left=t.kcal-e.kcal;
  var cls=e.kcal===0?'s':left>150?'j':left<-100?'':' ';
  bar.innerHTML='<div class="mb-group"><div class="mb-label">Protein</div><div class="mb-track"><div class="mb-fill p" style="width:'+pct(e.prot,t.prot)+'%"></div></div><div class="mb-val">'+e.prot+'g</div></div>'
    +'<div class="mb-group"><div class="mb-label">Carbs</div><div class="mb-track"><div class="mb-fill c" style="width:'+pct(e.carbs,t.carbs)+'%"></div></div><div class="mb-val">'+e.carbs+'g</div></div>'
    +'<div class="mb-group"><div class="mb-label">Fat</div><div class="mb-track"><div class="mb-fill f" style="width:'+pct(e.fat,t.fat)+'%"></div></div><div class="mb-val">'+e.fat+'g</div></div>'
    +'<div class="mb-kcal tl-tag '+cls+'">'+(e.kcal===0?t.kcal+' target':left>0?left+' left':Math.abs(left)+' over')+'</div>';

  // Day macro progress panel — always visible, fills as you log
  var prog=document.getElementById('day-macro-progress');
  if(!prog)return;
  var mealsTotal=(window._blocks||[]).filter(function(b){return b.mealSlot;}).length||4;
  var mealsLogged=Object.values(MACROS.meals||{}).filter(function(m){return m&&m.logged;}).length;
  var leftLabel=left>0?(left+' kcal remaining'):(Math.abs(left)+' kcal over');
  var leftColor=left>0?'var(--jade)':'var(--amber)';
  prog.innerHTML='<div class="macro-summary">'
    +'<div class="ms-title"><span>Today&#39;s progress</span>'
    +'<span style="color:'+leftColor+';font-weight:600;">'+leftLabel+'</span></div>'
    +'<div class="ms-rows">'
    +buildMacroRow('Protein',e.prot,t.prot,'var(--jade)','g')
    +buildMacroRow('Carbs',e.carbs,t.carbs,'var(--amber)','g')
    +buildMacroRow('Fat',e.fat,t.fat,'#5a7898','g')
    +buildMacroRow('Calories',e.kcal,t.kcal,'rgba(200,200,200,0.4)','')
    +'</div>'
    +(mealsLogged>0?'<div style="margin-top:10px;font-size:10px;font-weight:300;color:var(--dk-3);">'+mealsLogged+' of '+mealsTotal+' meals logged</div>':'<div style="margin-top:10px;font-size:10px;font-weight:300;color:var(--dk-3);">Tap &#10003; on a meal to start tracking</div>')
    +'</div>';
}
function buildMacroRow(label,eaten,target,colour,unit){
  function pct(v,m){return Math.min(100,Math.round(v/Math.max(1,m)*100));}
  var p=pct(eaten,target);
  var over=eaten>target;
  return '<div style="display:grid;grid-template-columns:52px 1fr 70px;gap:8px;align-items:center;">'    +'<div style="font-size:10px;font-weight:500;color:var(--dk-3);">'+label+'</div>'    +'<div style="height:6px;background:var(--bd);border-radius:3px;overflow:hidden;position:relative;">'    +'<div style="height:100%;border-radius:3px;background:'+(over?'var(--amber)':colour)+';width:'+p+'%;transition:width 0.4s ease;"></div>'    +'</div>'    +'<div style="font-size:10px;font-family:var(--mono);color:'+(over?'var(--amber)':colour)+';text-align:right;">'+eaten+unit+' / '+target+unit+'</div>'    +'</div>';
}
function adjustRemaining(){
  if(!MACROS||!window._blocks)return;
  var t=MACROS.target,e=MACROS.eaten;
  var rem={prot:t.prot-e.prot,kcal:t.kcal-e.kcal};
  var ul=window._blocks.filter(function(b){return b.mealSlot&&!(MACROS.meals[b.mealSlot]&&MACROS.meals[b.mealSlot].logged);});
  if(!ul.length)return;
  var pp=Math.round(Math.max(0,rem.prot)/ul.length);
  var kk=Math.round(Math.max(0,rem.kcal)/ul.length);
  ul.forEach(function(b){var el=document.getElementById('sub-'+b.mealSlot);if(el&&pp>0){el.textContent='Adjusted: '+pp+'g P \u00b7 '+kk+' kcal';el.style.color='var(--amber)';}});
}


const STRENGTH_STANDARDS = {
  'bench press':    { m:[0.5,1.0,1.5],   f:[0.25,0.6,1.0] },
  'squat':          { m:[0.75,1.25,1.75], f:[0.5,1.0,1.5] },
  'deadlift':       { m:[1.0,1.5,2.0],   f:[0.75,1.25,1.75] },
  'overhead press': { m:[0.3,0.65,1.0],  f:[0.15,0.4,0.65] },
  'ohp':            { m:[0.3,0.65,1.0],  f:[0.15,0.4,0.65] },
  'row':            { m:[0.5,0.9,1.3],   f:[0.3,0.6,0.9] },
  'barbell row':    { m:[0.5,0.9,1.3],   f:[0.3,0.6,0.9] },
  'pull-up':        { m:[0,0.2,0.5],     f:[0,0.1,0.35] },
  'pull up':        { m:[0,0.2,0.5],     f:[0,0.1,0.35] },
  'romanian deadlift':{ m:[0.7,1.1,1.6], f:[0.5,0.8,1.2] },
  'rdl':            { m:[0.7,1.1,1.6],   f:[0.5,0.8,1.2] },
  'hip thrust':     { m:[0.9,1.4,1.9],   f:[0.7,1.2,1.7] },
  'lateral raise':  { m:[0.06,0.12,0.2], f:[0.04,0.08,0.14] },
  'bicep curl':     { m:[0.2,0.4,0.6],   f:[0.1,0.2,0.4] },
  'tricep':         { m:[0.15,0.35,0.55],f:[0.08,0.2,0.35] },
  'leg press':      { m:[1.5,2.5,3.5],   f:[1.0,1.8,2.6] },
  'leg curl':       { m:[0.3,0.55,0.8],  f:[0.2,0.4,0.65] },
  'calf raise':     { m:[0.8,1.4,2.0],   f:[0.6,1.0,1.5] },
};

function getStandard(name, weight, isFemale, age) {
  const n = name.toLowerCase();
  let std = null;
  for (const [key, val] of Object.entries(STRENGTH_STANDARDS)) {
    if (n.includes(key)) { std = val; break; }
  }
  if (!std) return null;
  const ageFactor = age < 30 ? 0.95 : age < 40 ? 1.0 : age < 50 ? 0.93 : age < 60 ? 0.85 : 0.78;
  const m = isFemale ? std.f : std.m;
  return {
    beginner:     Math.round(m[0] * weight * ageFactor),
    intermediate: Math.round(m[1] * weight * ageFactor),
    advanced:     Math.round(m[2] * weight * ageFactor),
  };
}
function getAgeNote(age, isFemale) {
  if (age < 35) return 'Prime neurological adaptation phase. Technique investment now compounds.';
  if (age < 45) return `At ${age}, recovery takes 72h for heavy sessions. Strength response unchanged — the timeline isn't.`;
  if (age < 55) return `At ${age}, progressive overload works identically. Deloads matter more. Sleep is the primary recovery lever.`;
  return `At ${age}, the training stimulus is as effective as ever. ${isFemale ? 'Resistance training is protecting bone density as oestrogen shifts.' : 'GH pulses are smaller — sleep quality is the biggest lever.'}`;
}
function parseExercise(str) {
  const m = str.match(/(\d+)\s*[xX×]\s*([\d\-]+)/);
  const name = str.replace(/\d+\s*[xX×]\s*[\d\-]+.*/, '').trim();
  return { name, raw:str, sets: m ? parseInt(m[1]) : 3, reps: m ? m[2] : '8-12', schema: m ? m[0] : '3×8-12' };
}



function buildPlan(profile, today) {
  const p = profile;
  const { name, plan, isTraining } = today;

  // Time helper
  const wake = p.wakeTime || '07:00';
  const [wHr, wMin] = wake.split(':').map(Number);
  const wMins = wHr * 60 + wMin;
  const fmt = (totalMins) => {
    const h = Math.floor(totalMins / 60) % 24;
    const m = totalMins % 60;
    return String(h).padStart(2,'0') + ':' + String(m).padStart(2,'0');
  };

  // Derived times
  const coffeeTime  = fmt(wMins + 90);
  const isFemale    = (p.sex||'').toLowerCase() === 'female';
  const injuries    = p.injuryAssessments || p.injuries || [];
  const supps       = p.supplements || [];
  const kcal        = plan.kcal || p.calories || 2000;
  const prot        = p.protein || 140;
  const carbs       = p.carbs   || 160;
  const fat         = p.fat     || 60;
  const water       = Math.round((p.weight || 75) * 35 + (isTraining ? 500 : 0));
  const window_str  = p.actualEatingWindow || p.fastingWindow || p.eatingWindow || 'flexible';
  const mealCount   = p.mealCount || 3;

  // Training time
  const trainTimeStr = (p.trainingTime || 'Morning').toLowerCase();
  const trainMins =
    trainTimeStr.includes('early')    ? wMins + 60  :
    trainTimeStr.includes('morning')  ? wMins + 120 :
    trainTimeStr.includes('lunch')    ? 12 * 60     :
    trainTimeStr.includes('afternoon')? 15 * 60     :
    trainTimeStr.includes('evening')  ? 18 * 60     : wMins + 120;

  // Supplements by timing
  const mornSupps  = supps.filter(s => /morning|wake|before train/i.test(s.timing||''));
  const nightSupps = supps.filter(s => /night|sleep|evening|bed/i.test(s.timing||''));

  // Bedtime
  const bed = p.bedtime || '';
  const bedMins =
    bed.includes('Before 10') ? 21*60+30 :
    bed.includes('10–11')     ? 22*60    :
    bed.includes('11')        ? 22*60+30 :
    bed.includes('midnight')  ? 23*60+30 : 22*60;

  const blocks = [];

  // WAKE
  blocks.push({
    time: wake, type: 'wake', tag: 'Wake', tagColor: 'jade',
    title: 'Morning ignition',
    subtitle: 'Cortisol peak · Circadian set',
    detail: 'No phone for 5 minutes. 500ml water immediately — you\'ve been fasting 7-8 hours.\n\nOutside for 10 minutes: morning light sets your circadian clock and determines tonight\'s melatonin timing.' + (isTraining && trainMins - wMins <= 90 ? '\n\nCollagen + Vit C at ' + fmt(trainMins - 45) + ' — 45 min before training.' : ''),
    science: 'Cortisol peaks 30-45 min post-wake. It\'s doing caffeine\'s job — don\'t double up.',
    items: [{ name:'Water', meta:'500ml immediately' }, { name:'Sunlight', meta:'10 min outside' }]
  });

  // COFFEE + MORNING SUPPS
  blocks.push({
    time: coffeeTime, type: 'supp', tag: 'Supps', tagColor: 'gold',
    title: 'Coffee & morning supplements',
    subtitle: '90 min post-wake — after cortisol peak',
    detail: 'Coffee now. The cortisol that was doing caffeine\'s job has peaked and is clearing.\n\n' +
      (mornSupps.length
        ? mornSupps.map(s => s.name + ' ' + s.dose + ' — ' + (s.timing||'')).join('\n')
        : 'Creatine 5g with water. Omega-3 with food if not taken.'),
    science: 'Caffeine before the cortisol peak adds nothing and enlarges the afternoon crash.',
    items: mornSupps.length
      ? mornSupps.map(s => ({ name:s.name, meta:s.dose }))
      : [{ name:'Coffee', meta:'after cortisol peak' }, { name:'Creatine', meta:'5g' }]
  });

  // PRE-TRAINING (training days)
  if (isTraining) {
    const preMins = Math.max(trainMins - 105, wMins + 60);
    blocks.push({
      time: fmt(preMins), type: 'meal', tag: 'Eat', tagColor: 'amber',
      title: 'Pre-training meal',
      subtitle: '90-120 min before session',
      mealSlot: 'pre-training',
      detail: 'High protein, moderate fast carbs, low fat.\nExclude: ' + ((p.foodExclusions||[]).join(', ')||'none') + '.\n' +
        ((p.cuisinePrefs||[]).length ? (p.cuisinePrefs[0] + ' style.') : '') + '\nKeep fat under 15g — slows gastric emptying and glucose delivery.',
      science: 'Glycogen priming + amino acid availability. Fat blunts the performance fuel supply.',
      items: [
        { name:'Protein', meta: Math.round(prot * 0.25) + 'g' },
        { name:'Fast carbs', meta:'40-60g' },
        { name:'Fat', meta:'under 15g' }
      ]
    });

    // TRAINING
    const injNote = injuries.length
      ? ' Modifications active: ' + injuries.map(i => i.location||i).join(', ') + '.'
      : '';
    blocks.push({
      time: fmt(trainMins), type: 'training', tag: 'Train', tagColor: 'jade',
      title: plan.type + ': ' + (plan.focus || ''),
      subtitle: 'Main session',
      detail: 'Warm up 10 min. Working sets at RPE 7-9 — 1-3 reps from failure. Track every load.' + injNote + '\nCool down 5-10 min.',
      science: 'The last 5 reps drive adaptation. Everything before is preparation.',
      items: ((plan.keyExercises||[]).slice(0,5).map(e => ({ name:e, meta:'' }))
              .concat([{ name:'Track loads', meta:'progressive overload' }])).slice(0,5)
    });

    // POST-TRAINING
    blocks.push({
      time: fmt(trainMins + 75), type: 'meal', tag: 'Eat', tagColor: 'amber',
      title: 'Post-training nutrition',
      subtitle: 'Within 30 min of finishing',
      mealSlot: 'post-training',
      detail: 'Fast protein + fast carbs. mTOR is elevated — this window matters.\nTarget ' + Math.round(prot * 0.28) + 'g protein here.\n' +
        ((p.dietType||'').toLowerCase().includes('vegan')
          ? 'Plant-based: combine sources to hit leucine threshold (2.5g leucine minimum).'
          : 'Whey or egg white is fastest if convenience is a factor.'),
      science: 'mTOR peaks post-training. Leucine threshold 2.5g per meal triggers protein synthesis.',
      items: [
        { name:'Fast protein', meta: Math.round(prot * 0.28) + 'g' },
        { name:'Fast carbs', meta:'30-40g' }
      ]
    });
  }

  // MIDDAY / FIRST MEAL
  const middayMins = isTraining
    ? Math.max(trainMins + 180, 12*60)
    : wMins + 210;
  blocks.push({
    time: fmt(middayMins), type: 'meal', tag: 'Eat', tagColor: 'amber',
    title: isTraining ? 'Midday meal' : 'First meal',
    subtitle: isTraining ? 'Protein anchor' : window_str,
    mealSlot: 'midday',
    detail: 'Build around protein. ' +
      ((p.cuisinePrefs||[]).length ? p.cuisinePrefs[0] + ' inspired. ' : '') +
      'Include vegetables. Avoid: ' + (p.triggerFoods||'none') + '.',
    science: 'Protein every 3-4 hours sustains MPS throughout the day.',
    items: [
      { name:'Protein', meta: Math.round(prot * 0.28) + 'g' },
      { name:'Vegetables', meta:'200g+' },
      { name:'Carbs', meta: isTraining ? '40-60g' : '30-50g' }
    ]
  });

  // AFTERNOON (if 4+ meals)
  if (mealCount >= 4) {
    blocks.push({
      time: fmt(Math.max(middayMins + 180, 15*60)),
      type:'meal', tag:'Eat', tagColor:'amber',
      title: 'Afternoon meal',
      subtitle: 'Protein maintained',
      mealSlot: 'afternoon',
      detail: 'Lighter than midday. Protein anchor, lower carbs.\n' +
        ((p.cuisinePrefs||[]).length ? p.cuisinePrefs[0] + ' style.' : ''),
      science: 'Consistent protein timing sustains elevated MPS across the full day.',
      items: [
        { name:'Protein', meta: Math.round(prot * 0.22) + 'g' },
        { name:'Veg or fruit', meta:'200g' }
      ]
    });
  }

  // EVENING MEAL
  const eveningMins = Math.max(middayMins + 210, 18*60);
  const closeWin =
    window_str.includes('20:') ? 20*60 :
    window_str.includes('19:') ? 19*60 : 21*60;
  blocks.push({
    time: fmt(eveningMins), type: 'meal', tag: 'Eat', tagColor: 'amber',
    title: 'Evening meal',
    subtitle: 'Final protein hit · close the window',
    mealSlot: 'evening',
    detail: 'Lean protein priority. ' +
      (isTraining ? 'Lower carbs than midday — glycogen already replenished.' : 'Moderate carbs fine on rest day.') +
      '\nClose eating window by ' + fmt(closeWin) + '.',
    science: 'Casein-rich foods (cottage cheese, Greek yoghurt) extend overnight MPS during the fast.',
    items: [
      { name:'Lean protein', meta: Math.round(prot * 0.25) + 'g' },
      { name:'Vegetables', meta:'200g' },
      { name:'Window closes', meta: fmt(closeWin) }
    ]
  });

  // WIND-DOWN
  blocks.push({
    time: fmt(bedMins - 45), type: 'recovery', tag: 'Wind down', tagColor: 'slate',
    title: 'Evening wind-down',
    subtitle: 'Protect tonight\'s adaptation',
    detail: 'Screens dim or off.\n' +
      (nightSupps.length
        ? nightSupps.map(s => s.name + ' ' + s.dose).join('. ') + '.'
        : 'Magnesium glycinate 300mg.') +
      '\nRoom 17-19°C.' +
      ((p.recoveryTools||[]).length ? '\nRecovery: ' + (p.recoveryTools||[]).slice(0,2).join(', ') + ' if available.' : ''),
    science: 'Core temperature drop signals sleep onset. Magnesium activates GABA for sleep transition.',
    items: [
      ...nightSupps.map(s => ({ name:s.name, meta:s.dose })),
      { name:'Screens off', meta:'45 min before sleep' },
      { name:'Room temp', meta:'17-19°C' }
    ].slice(0, 4)
  });

  // SLEEP
  blocks.push({
    time: fmt(bedMins), type: 'sleep', tag: 'Sleep', tagColor: 'slate',
    title: 'Sleep',
    subtitle: p.sleep || '7-8 hours',
    detail: isTraining
      ? 'Training day: sleep is where adaptation happens. GH pulses in the first slow-wave cycle — this is when today&#39;s session becomes actual muscle. Nothing else drives recovery like this.'
      : 'Rest day: sleep extends the repair from previous sessions. Satellite cells divide, myofibrils remodel, cortisol clears.',
    science: isFemale
      ? 'GH peaks in first 90 min. Progesterone is a natural GABA agonist — protect sleep to protect hormonal recovery.'
      : 'GH peaks in first 90 min. One week sub-6h sleep reduces testosterone 10-15%.',
    items: [
      { name:'Target', meta: p.sleep || '7-8h' },
      { name:'Wake', meta: wake }
    ]
  });

  return {
    dayTitle: name + (isTraining ? ' — ' + plan.type : ' — Rest'),
    dayBrief: isTraining
      ? plan.type + ' day. Signal, feed, recover. Hit ' + prot + 'g protein.'
      : 'Recovery day. The adaptation from your last session is happening now. Protein + sleep.',
    priority: isTraining
      ? Math.round(prot * 0.28) + 'g protein within 30 min post-training. This window matters most.'
      : prot + 'g protein today — including rest days. MPS runs 24-48h post-session.',
    macros: { kcal, prot, carbs, fat, water: (water/1000).toFixed(1) + 'L' },
    blocks
  };
}

// ── Programme week context ────────────────────────
function getProgCtx(p){
  var start=p.generatedAt?new Date(p.generatedAt):new Date();
  var days=Math.floor((new Date()-start)/(1000*60*60*24));
  var wk=Math.min(4,Math.floor(days/7)+1);
  var phases=['Foundation','Build','Peak','Deload'];
  return {weekNum:wk,phase:phases[wk-1],totalWeeks:4};
}

function pickAcc(p,t){
  var g=(p.goal||'').toLowerCase(),age=p.age||35;
  if(!t.isTraining)return{name:'NSDR — 20 minutes today',why:'Rest day. 20 min yoga nidra raises dopamine 65% and restores focus as well as 90 min of sleep.',url:'bodylens-accelerators.html'};
  if(g.includes('fat')||g.includes('los'))return{name:'NEAT target: +3,000 steps',why:'Easiest caloric deficit available. 3,000 extra steps \u2248 150 kcal without touching food or training.',url:'bodylens-accelerators.html'};
  if(age>=40)return{name:'Zone 2 cardio \u2014 20 min today',why:'At '+age+', VO\u2082max is the primary longevity lever. 20 min at conversational pace.',url:'bodylens-accelerators.html'};

}

// ── Session view with level tabs ──────────────────
var LEVEL_SCHEMES={
  beginner:    {label:'Beginner',     rpeTarget:'RPE 6-7', rpeNote:'Leave 3+ reps in the tank. Technique is the priority.',  rest:'2-3 min'},
  intermediate:{label:'Intermediate', rpeTarget:'RPE 7-8', rpeNote:'1-2 reps in the tank. Challenged but in control.',        rest:'90 sec-2 min'},
  advanced:    {label:'Advanced',     rpeTarget:'RPE 8-9', rpeNote:'1 rep from failure on top sets. Full warm-up essential.',  rest:'60-90 sec'},
};

function showSession(blockIdx, block){
  var p=P;
  var isFemale=(p.sex||'').toLowerCase()==='female';
  var age=p.age||35,weight=p.weight||75;
  var injuries=p.injuryAssessments||p.injuries||[];
  var tier=p.fitnessLevelTier||'intermediate';
  var level=p.fitnessLevel!==undefined?Math.round(p.fitnessLevel*100):50;
  var progCtx=getProgCtx(p);
  var wp=p.weeklyProgression;
  var wkKey='week'+progCtx.weekNum;
  var weekNote=wp&&wp[wkKey]?wp[wkKey].focus:'';
  var exercises=(block.items||[]).filter(function(e){return e.name!=='Track loads';});

  function buildExCards(tier){
    var scheme=LEVEL_SCHEMES[tier]||LEVEL_SCHEMES.intermediate;
    return exercises.map(function(ex,i){
      var parsed=parseExercise(ex.name);
      var std=getStandard(parsed.name,weight,isFemale,age);
      var injMatch=injuries.find(function(inj){
        return ['knee','back','shoulder','hip','elbow'].some(function(j){
          return (inj.location||'').toLowerCase().includes(j)&&parsed.name.toLowerCase().includes(j.slice(0,4));
        });
      });
      var reps=parseInt((parsed.reps||'10').split('-')[0]);
      var rpe=tier==='beginner'?'6-7':tier==='advanced'?'8-9':'7-8';
      var setsCount=tier==='beginner'?3:tier==='advanced'?parsed.sets+1:parsed.sets;
      var markerPct=Math.min(95,Math.max(5,level));

      var benchHtml='';
      if(std){
        benchHtml='<div class="bench">'
          +'<div class="bench-lbl">'+age+'yr '+(isFemale?'female':'male')+' \u00b7 '+weight+'kg \u00b7 age-adjusted</div>'
          +'<div class="bench-vs"><div>'+std.beginner+'kg</div><div class="you">'+std.intermediate+'kg</div><div style="text-align:right">'+std.advanced+'kg</div></div>'
          +'<div class="bench-tr"><div class="bench-fi" style="width:'+markerPct+'%"></div><div class="bench-mk" style="left:'+markerPct+'%"></div></div>'
          +'<div class="bench-sc"><div>Beginner</div><div>You ('+(p.fitnessLevelLabel||'est.')+')</div><div>Advanced</div></div>'
          +'<div class="bench-nt">'+getAgeNote(age,isFemale)+'</div>'
          +'</div>';
      }
      var sets=[];
      for(var s=1;s<=setsCount;s++){
        var isLast=s===setsCount;
        var det=s===1?'Warm-up: \u221220% load, lock in technique':isLast?('Working set: '+rpe+' \u2014 '+parsed.reps+' reps'):'Build set: increase load';
        sets.push('<div class="set-row"><div class="set-num">S'+s+'</div><div class="set-det">'+det+'</div></div>');
      }
      return '<div class="ex-card" id="exc-'+i+'">'
        +'<div class="ex-hd" onclick="document.getElementById(\'exc-'+i+'\').classList.toggle(\'open\')">'
        +'<div class="ex-nm">'+parsed.name+'</div>'
        +'<div class="ex-sc">'+setsCount+'\u00d7'+parsed.reps+'</div>'
        +'<div class="ex-rpe">'+scheme.rpeTarget+'</div>'
        +'<span class="ex-cv">\u25be</span></div>'
        +'<div class="ex-bd">'
        +(injMatch?'<div class="inj-nt"><span>\u26a0 '+injMatch.location+':</span> '+(injMatch.safeAlternatives||[]).slice(0,2).join(', ')||'Reduced ROM only'+'</div>':'')
        +benchHtml
        +'<div style="font-size:9px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:var(--dk-3);margin-bottom:6px;">Set guide</div>'
        +'<div class="sets-g">'+sets.join('')+'</div>'
        +'<div class="ex-rest">Rest: '+scheme.rest+' \u00b7 '+scheme.rpeNote+'</div>'
        +'</div></div>';
    }).join('');
  }

  var hasLevel=p.fitnessLevel!==undefined;
  if(!hasLevel){showQuiz(blockIdx,block);return;}

  window._buildExCards=buildExCards;
  window._sessionBlockIdx=blockIdx;

  var tierOrder=['beginner','intermediate','advanced'];
  var levelTabs=tierOrder.map(function(t){
    var s=LEVEL_SCHEMES[t];
    var isYours=t===tier;
    return '<div class="lvt '+(t===tier?'active':'')+' '+(isYours?'yours':'')+'" onclick="switchLevel(\''+t+'\')">'
      +'<div class="lvt-name">'+(isYours?'\u25b8 ':'')+s.label+'</div>'
      +'<div class="lvt-desc">'+s.rpeTarget+'</div>'
      +'</div>';
  }).join('');

  var progHtml=weekNote?'<div style="font-size:11px;font-weight:300;color:var(--dk-2);padding:9px 18px;border-bottom:1px solid var(--bd);background:rgba(0,200,160,0.03);"><strong style="color:var(--jade);">Week '+progCtx.weekNum+' \u2014 '+progCtx.phase+':</strong> '+weekNote+'</div>':'';
  var retakeHtml='<div style="padding:7px 18px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;">'
    +'<div style="font-size:10px;font-weight:300;color:var(--dk-3);">Level: <strong style="color:var(--gold);">'+(p.fitnessLevelLabel||'Intermediate')+'</strong></div>'
    +'<button style="background:none;border:none;color:var(--dk-3);font-size:10px;cursor:pointer;text-decoration:underline;" onclick="showQuiz('+blockIdx+',window._blocks['+blockIdx+'])">Retake assessment</button>'
    +'</div>';

  openSession(block.title,
    '<div class="lv-tabs">'+levelTabs+'</div>'
    +progHtml+retakeHtml
    +'<div id="session-ex-cards" style="padding:14px 0;">'+buildExCards(tier)+'</div>'
  );
}
function switchLevel(tier){
  var cards=document.getElementById('session-ex-cards');
  if(cards&&window._buildExCards)cards.innerHTML=window._buildExCards(tier);
  document.querySelectorAll('.lvt').forEach(function(el,i){
    var t=['beginner','intermediate','advanced'][i];
    el.classList.toggle('active',t===tier);
    el.classList.toggle('yours',t===(P.fitnessLevelTier||'intermediate'));
  });
}

var QQ=[
  {q:'How many full press-ups can you do?',n:'Chest to floor, full extension.',opts:[
    {l:'0-5',  n:'Just getting started',score:0.10},
    {l:'6-15', n:'Building a solid base',score:0.30},
    {l:'16-25',n:'Good upper body endurance',score:0.55},

    {l:'5-10', n:'Solid pulling foundation',score:0.55},
    {l:'10+',  n:'Strong relative bodyweight',score:0.78}]},
  {q:'Squat or leg press working weight?',n:'Working sets, not max. Machine totals count.',opts:[
    {l:'Never / machines only',n:'Completely fine',score:0.15},
    {l:'Under bodyweight',     n:'Building leg strength',score:0.28},
    {l:'Bodyweight to 1.5x',   n:'Solid lower body',score:0.52},
    {l:'1.5x BW and beyond',   n:'Strong leg pattern',score:0.78}]},
  {q:'How do you feel the day after a hard session?',n:'Recovery speed reflects your training age.',opts:[
    {l:'Very sore for 2-3 days',           n:'Normal early on',score:-0.05},
    {l:'Sore next day, fine by day 2',     n:'Typical intermediate',score:0.00},
    {l:'Mildly sore, back next session',   n:'Well adapted',score:0.07},
    {l:'Rarely very sore',                 n:'High training age',score:0.12}]},
  {q:'Training consistency last 3 months?',n:'Honest answer calibrates difficulty.',opts:[
    {l:'Just getting back into it',     n:'Starting fresh',score:0.00},
    {l:'1-2 sessions a week, sporadic', n:'Building the habit',score:0.05},
    {l:'3+ sessions, fairly consistent',n:'Established routine',score:0.12},
    {l:'4+ sessions, rarely miss',      n:'High training age',score:0.18}]}
];
var _qA=[],_qI=0,_qBI=0;
function getLevelResult(score){
  if(score<0.25)return{label:'Beginner',           tier:'beginner',   desc:'Programme focuses on patterns and capacity. Loads conservative \u2014 technique first.'};
  if(score<0.42)return{label:'Low-intermediate',   tier:'intermediate',desc:'You have the basics. Lifts established, loads building.'};
  if(score<0.60)return{label:'Intermediate',       tier:'intermediate',desc:'Solid base. Proper periodisation applied.'};
  if(score<0.75)return{label:'Upper-intermediate', tier:'advanced',    desc:'Strong foundation with real training history.'};
  return            {label:'Advanced',             tier:'advanced',    desc:"You've been doing this a while. High intensity, good technique."};
}
function showQuiz(blockIdx,block){
  _qA=[];_qI=0;_qBI=blockIdx;
  renderQuiz();
}
function renderQuiz(){
  var q=QQ[_qI],total=QQ.length,hasAns=!!_qA[_qI],isLast=_qI===total-1;
  var dots=QQ.map(function(_,i){return '<div class="qp-d '+(i<_qI?'done':i===_qI?'curr':'')+'"></div>';}).join('');
  var opts=q.opts.map(function(o,i){
    return '<div class="qz-opt '+(_qA[_qI]===o?'sel':'')+'" onclick="qzSel('+i+')">'
      +'<div class="qz-ol">'+o.l+'</div><div class="qz-on">'+o.n+'</div></div>';
  }).join('');
  openSession('Strength assessment',
    '<div class="qz-hdr"><div class="qz-kick">One-time \u00b7 Q'+(_qI+1)+' of '+total+'</div>'
    +'<div class="qz-ttl">Where are you right now?</div>'
    +'<div class="qz-sub">5 questions. Sets your benchmark marker on every exercise.</div></div>'
    +'<div class="qz-prg">'+dots+'</div>'
    +'<div class="qz-body"><div class="qz-q">'+q.q+'</div><div class="qz-n">'+q.n+'</div>'
    +'<div class="qz-opts">'+opts+'</div>'
    +'<div class="qz-nav">'
    +(_qI>0?'<button class="qz-bk" onclick="qzBack()">\u2190 Back</button>':'')
    +'<button class="qz-nxt'+(hasAns?' ready':'')+'" id="qz-nxt" onclick="'+(hasAns?(isLast?'qzFinish()':'qzNext()'):'')+'">'+( isLast?'See my level \u2192':'Next \u2192')+'</button>'
    +'</div></div>');
}
function qzSel(i){
  _qA[_qI]=QQ[_qI].opts[i];
  document.querySelectorAll('.qz-opt').forEach(function(el,j){el.classList.toggle('sel',j===i);});
  var btn=document.getElementById('qz-nxt');
  if(btn){btn.classList.add('ready');btn.setAttribute('onclick',_qI===QQ.length-1?'qzFinish()':'qzNext()');}
}
function qzNext(){if(!_qA[_qI])return;_qI++;renderQuiz();}
function qzBack(){if(_qI>0){_qI--;renderQuiz();}}
function qzFinish(){
  if(!_qA[_qI])return;
  var base=_qA.slice(0,3).reduce(function(s,a){return s+(a?a.score:0);},0)/3;
  var mod=_qA.slice(3).reduce(function(s,a){return s+(a?a.score:0);},0);
  var score=Math.min(1,Math.max(0,base+mod));
  var res=getLevelResult(score);
  var pct=Math.round(score*100);
  try{
    var raw=localStorage.getItem('bl_profile');
    if(raw){var p=JSON.parse(raw);
      p.fitnessLevel=score;p.fitnessLevelLabel=res.label;p.fitnessLevelTier=res.tier;
      localStorage.setItem('bl_profile',JSON.stringify(p));
      P.fitnessLevel=score;P.fitnessLevelLabel=res.label;P.fitnessLevelTier=res.tier;
    }
  }catch(e){}
  openSession('Your level',
    '<div style="padding:16px 18px;">'
    +'<div style="font-size:9px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:var(--gold);margin-bottom:6px;">Your level</div>'
    +'<div style="font-family:var(--serif);font-size:26px;font-weight:300;color:var(--dk-1);margin-bottom:6px;">'+res.label+'</div>'
    +'<div style="font-size:13px;font-weight:300;color:var(--dk-2);line-height:1.75;margin-bottom:14px;">'+res.desc+'</div>'
    +'<div class="rb-tr"><div class="rb-fi" style="width:'+pct+'%"></div><div class="rb-mk" style="left:'+pct+'%"></div></div>'
    +'<div class="rb-sc"><span>Beginner</span><span>Intermediate</span><span>Advanced</span></div>'
    +'<div style="display:flex;gap:8px;margin-top:16px;">'
    +'<button class="ra-sv" onclick="showSession('+_qBI+',window._blocks['+_qBI+'])">See my session \u2192</button>'
    +'<button class="ra-rd" onclick="showQuiz('+_qBI+',window._blocks['+_qBI+'])">Retake</button>'
    +'</div></div>');
}

    if(_sub){_sub.textContent=(est.protein||0)+'g P \u00b7 '+(est.calories||0)+' kcal \u2713';_sub.style.color='var(--jade)';}
    if(_tag){_tag.textContent='\u2713 Eaten';}

  }catch(e){if(btn){btn.disabled=false;btn.textContent='Estimate macros \u2191';}if(res)res.innerHTML='<div class="dev-result">Could not estimate \u2014 try again</div>';}

      messages:[{role:'user',content:(forceNew?'Different meal. ':'')+'Meal: '+title+'. Targets: '+mt.protein+'g P, '+mt.carbs+'g C, '+mt.fat+'g F, '+mt.calories+' kcal. Diet:'+(p.dietType||'flex')+' Excl:'+excl+' Return:{"name":"","calories":0,"protein":0,"carbs":0,"fat":0,"prepTime":"<10 min","ingredients":[{"name":"","quantity":""}],"method":"One sentence."}'}]})});

    +'<div class="ri-mr"><div class="ri-ml">Carbs</div><div class="ri-mb"><div class="ri-mf c" style="width:'+pC+'%"></div></div><div class="ri-mv">'+(r.carbs||0)+'g<span style="color:var(--dk-3);font-size:8px;"> /'+mt.carbs+'g</span></div></div>'

function buildMealBars(loggedM, mProt, p, mealCount) {
  function bar(pct, colour) {
    return '<div style="flex:1;height:3px;background:var(--ink-1);border-radius:2px;overflow:hidden;">'
      +'<div style="height:100%;width:'+Math.min(100,pct)+'%;background:'+colour+';border-radius:2px;transition:width 0.5s;"></div></div>';
  }
  function row(label, pct, val, colour) {
    return '<div style="display:flex;align-items:center;gap:4px;margin-bottom:2px;">'
      +'<div style="width:9px;font-size:8px;font-weight:700;color:'+colour+';">'+label+'</div>'
      +bar(pct, colour)
      +'<div style="width:28px;font-size:8px;font-family:var(--mono);color:var(--dk-3);text-align:right;">'+val+'</div>'
      +'</div>';
  }
  if (loggedM) {
    var tP = Math.round((p.protein||140)/mealCount);
    var tC = Math.round((p.carbs||160)/mealCount);
    var tF = Math.round((p.fat||60)/mealCount);
    return row('P', Math.round(loggedM.prot/Math.max(1,tP)*100), loggedM.prot+'g', 'var(--jade)')
         + row('C', Math.round((loggedM.carbs||0)/Math.max(1,tC)*100), (loggedM.carbs||0)+'g', 'var(--amber)')
         + row('F', Math.round((loggedM.fat||0)/Math.max(1,tF)*100), (loggedM.fat||0)+'g', '#5a7898');
  } else {
    // Not yet logged — show target as dimmed single bar
    return row('P', 0, mProt+'g', 'rgba(0,200,160,0.25)');
  }
}

    +'<div class="ask-row"><input class="ask-inp" id="ask-inp" type="text" placeholder="Ask anything about today\u2026"><button class="ask-snd" onclick="sendAsk()">\u2191</button></div>'
    +'<div class="ask-ans" id="ask-ans"></div>'
    +'</div>';

  // Programme strip
  var ps=document.getElementById('prog-strip-slot');
  if(ps){
    var dots=[1,2,3,4].map(function(w){return '<div class="ps-dot'+(w<progCtx.weekNum?' done':w===progCtx.weekNum?' curr':'')+'"></div>';}).join('');
    var acc=pickAcc(p,t);
    ps.innerHTML='<div class="prog-strip"><div class="ps-left"><div class="ps-label">Programme</div><div class="ps-dots">'+dots+'</div></div><div class="ps-right"><div class="ps-week">Week '+progCtx.weekNum+' of 4</div><div class="ps-phase">'+progCtx.phase+'</div></div></div>'
      +(acc?'<div class="acc-strip"><div class="acc-body"><div class="acc-kicker">\uD83D\uDCA1 Accelerator</div><div class="acc-title">'+acc.name+'</div><div class="acc-why">'+acc.why+'</div></div><a href="'+acc.url+'" class="acc-link">More \u2192</a></div>':'');
  }

  // Chips
  var chips=t.isTraining?['How hard should I push today?','Most important meal today?','Am I recovered enough?']:['Rest day: active or off?','Same calories today?','How to make rest day count?'];
  var chipEl=document.getElementById('ask-chips');
  if(chipEl){
    chipEl.innerHTML=chips.map(function(c){return '<div class="ask-chip" data-msg="'+c.replace(/"/g,'&quot;')+'">'+c+'</div>';}).join('');
    chipEl.querySelectorAll('.ask-chip').forEach(function(el){el.addEventListener('click',function(){sendAsk(el.dataset.msg);});});
  }
  var askInp=document.getElementById('ask-inp');
  if(askInp)askInp.addEventListener('keydown',function(e){if(e.key==='Enter')sendAsk();});
}

function regen(){try{localStorage.removeItem(TODAY.cacheKey);}catch(e){}location.reload();}


// ── Pre-load all recipes silently in background ──────────────────
function preloadRecipes(p, t){
  if(!p||!t||!window._blocks) return;
  var mealCount = p.mealCount || 4;
  var trainKcal = t.isTraining ? (t.plan.kcal||p.calories||2000) : Math.round((p.calories||2000)*0.91);
  var mt = {
    calories: Math.round(trainKcal / mealCount),
    protein:  Math.round((p.protein||140) / mealCount),
    carbs:    Math.round((p.carbs||160) / mealCount),
    fat:      Math.round((p.fat||60) / mealCount)
  };
  var mealBlocks = window._blocks.filter(function(b){ return b.mealSlot && !_recipes[b.mealSlot]; });
  if(!mealBlocks.length) return;
  // Stagger fetches 400ms apart to avoid hammering API
  mealBlocks.forEach(function(b, i){
    setTimeout(function(){
      var blockIdx = window._blocks.indexOf(b);
      fetchRecipe(b.mealSlot, b.title, mt, false).then(function(recipe){
        // Update the recipe zone if still showing the Load button
        var zone = document.getElementById('ri-' + blockIdx);
        if(zone && zone.querySelector && zone.querySelector('.meal-btn.pri')){
          zone.innerHTML = buildRecipeHtml(recipe, mt, b.mealSlot, blockIdx);
        }
      }).catch(function(){});
    }, i * 400);
  });
}

(function init(){

  // No profile at all

      +'<div style="font-size:44px;margin-bottom:14px;">&#128170;</div>'

      +'<a href="bodylens-onboard.html" style="display:inline-block;background:var(--jade);color:var(--ink);padding:12px 28px;border-radius:6px;font-size:13px;font-weight:600;text-decoration:none;">Get started &#8594;</a>'
      +'</div>';
    document.getElementById('week-strip').style.display='none';
    return;
  }

  // Set nav name
  var nm = document.getElementById('nav-meta');
  if(nm) nm.innerHTML = '<span class="nav-tag nt-jade">'+P.name+'</span>';

  // Incomplete profile
  TODAY = getTodayCtx(P);
  var ok = P.calories > 0 && P.weekPlan && P.weekPlan.length === 7;
  if(!ok){
    root.innerHTML = '<div style="text-align:center;padding:60px 24px;max-width:480px;margin:0 auto;">'
      +'<div style="font-size:32px;margin-bottom:12px;">&#9881;&#65039;</div>'
      +'<div style="font-family:var(--serif);font-size:24px;font-weight:300;color:var(--dk-1);margin-bottom:10px;">Profile incomplete</div>'
      +'<div style="font-size:13px;font-weight:300;color:var(--dk-2);line-height:1.75;margin-bottom:20px;">Your profile was found but the programme data is missing. Go to the Report page to rebuild it.</div>'
      +'<div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap;">'
      +'<a href="bodylens-instructions.html" style="background:var(--jade);color:var(--ink);padding:11px 22px;border-radius:6px;font-size:12px;font-weight:600;text-decoration:none;">Rebuild report &#8594;</a>'
      +'<a href="bodylens-onboard.html" style="background:transparent;border:1px solid var(--bd);color:var(--dk-2);padding:11px 22px;border-radius:6px;font-size:12px;font-weight:600;text-decoration:none;">Re-do onboarding</a>'
      +'</div></div>';
    return;
  }

  _rLoad();
  initMacros(P, TODAY);
  renderWeekStrip(P, TODAY);

  // Check cache — if plan exists for today, load it instantly, no button
  var cached = null;
  try { var c = localStorage.getItem(TODAY.cacheKey); if(c) cached = JSON.parse(c); } catch(e){}

  if(cached && cached.blocks && cached.blocks.length >= 3){
    // Plan already built today — show immediately, no interaction needed
    renderPlan(cached);
    updateMacroBar();
    enrichMeals(P, TODAY);
    preloadRecipes(P, TODAY);
    return;
  }

  // No plan for today yet — just the button
  root.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;min-height:60vh;">'
    +'<button onclick="buildDay()" style="background:var(--jade);border:none;color:var(--ink);border-radius:8px;padding:18px 48px;font-size:15px;font-weight:700;letter-spacing:0.05em;text-transform:uppercase;cursor:pointer;font-family:var(--sans);">'
    +'Build today&#39;s plan &#8594;</button>'
    +'</div>';
})();

// Pre-fetch all meal recipes silently in background after plan renders
function prefetchRecipes(p,t){
  if(!window._blocks)return;
  var mealCount=p.mealCount||4;
  var dayKcal=t.isTraining?(t.plan.kcal||p.calories||2000):Math.round((p.calories||2000)*0.91);
  var mt={
    calories:Math.round(dayKcal/mealCount),
    protein: Math.round((p.protein||140)/mealCount),
    carbs:   Math.round((p.carbs||160)*0.25),
    fat:     Math.round((p.fat||60)*0.25)
  };
  var mealBlocks=window._blocks.filter(function(b){return b.mealSlot&&!_recipes[b.mealSlot];});
  mealBlocks.forEach(function(b,i){
    var blockIdx=window._blocks.indexOf(b);
    setTimeout(function(){
      fetchRecipe(b.mealSlot,b.title,mt,false).then(function(recipe){
        var zone=document.getElementById('ri-'+blockIdx);
        if(zone&&zone.querySelector('.meal-btn')){
          zone.innerHTML=buildRecipeHtml(recipe,mt,b.mealSlot,blockIdx);
        }
      }).catch(function(){});
    }, i * 250);
  });
}

// Called when user taps the button
function buildDay(){
  var root = document.getElementById('day-root');
  root.innerHTML = '<div style="padding:60px 0;text-align:center;">'
    +'<div style="width:26px;height:26px;border:2px solid #1e2e28;border-top-color:#00c8a0;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 14px;"></div>'
    +'<div style="font-size:13px;font-weight:300;color:var(--dk-3);">Building your day&#8230;</div>'
    +'</div>';
  try{
    var plan = buildPlan(P, TODAY);
    try { localStorage.setItem(TODAY.cacheKey, JSON.stringify(plan)); } catch(e){}
    renderPlan(plan);
    updateMacroBar();
    enrichMeals(P, TODAY);
    preloadRecipes(P, TODAY);
  } catch(e){
    root.innerHTML = '<div style="text-align:center;padding:60px;">'
      +'<div style="font-size:13px;color:var(--dk-3);margin-bottom:14px;">Could not build plan: '+e.message+'</div>'
      +'<button onclick="buildDay()" style="background:transparent;border:1px solid var(--bd);color:var(--dk-2);padding:8px 18px;border-radius:4px;font-size:12px;cursor:pointer;font-family:var(--sans);">Try again</button>'
      +'</div>';
  }
}
