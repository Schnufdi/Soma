<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta name="bl-page" content="day">
<title>BodyLens — Today</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=Space+Grotesk:wght@300;400;500;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
body { background:var(--ink); color:var(--dk-1); }

/* ── TWO-COLUMN LAYOUT ─────────────────────────── */
.day-outer { display:grid; grid-template-columns:1fr 380px; gap:0; min-height:100vh; }
.day-main  { padding:0 32px 120px; max-width:700px; }
.day-right { background:var(--ink-2); border-left:1px solid var(--bd); position:sticky; top:0; height:100vh; overflow-y:auto; display:flex; flex-direction:column; }
.day-right::-webkit-scrollbar { width:3px; }
.day-right::-webkit-scrollbar-thumb { background:var(--bd); }

/* ── WEEK STRIP ────────────────────────────────── */
.week-strip { background:var(--ink-1); border-bottom:1px solid var(--bd); padding:12px 32px; display:flex; gap:6px; align-items:stretch; overflow-x:auto; }
.week-strip::-webkit-scrollbar { display:none; }
.ws-day { display:flex; flex-direction:column; align-items:center; padding:7px 10px; border-radius:5px; border:1px solid transparent; cursor:pointer; transition:all 0.12s; min-width:52px; flex-shrink:0; }
.ws-day:hover { background:var(--ink-2); }
.ws-day.today { background:var(--ink-2); border-color:var(--bd); }
.ws-day.train { border-top:2px solid var(--jade); }
.ws-day.rest  { border-top:2px solid var(--dk-3); }
.ws-day.selected { background:rgba(0,200,160,0.06); border-color:var(--jade-br); }
.ws-day-name { font-size:9px; font-weight:700; letter-spacing:0.08em; text-transform:uppercase; color:var(--dk-3); margin-bottom:3px; }
.ws-day.today .ws-day-name { color:var(--jade); }
.ws-day.selected .ws-day-name { color:var(--jade); }
.ws-day-type { font-size:10px; font-weight:500; color:var(--dk-2); }
.ws-day-dot  { width:5px; height:5px; border-radius:50%; margin-top:4px; background:var(--bd); }
.ws-day.train .ws-day-dot { background:var(--jade); }

/* ── HERO ──────────────────────────────────────── */
.day-hero { padding:32px 0 20px; border-bottom:1px solid var(--bd); margin-bottom:20px; }
.day-kicker { font-size:10px; font-weight:600; letter-spacing:0.2em; text-transform:uppercase; color:var(--jade); margin-bottom:8px; }
.day-title  { font-family:var(--serif); font-size:40px; font-weight:300; line-height:1; letter-spacing:-0.02em; color:var(--dk-1); margin-bottom:8px; }
.day-brief  { font-size:13px; font-weight:300; color:var(--dk-2); line-height:1.7; margin-bottom:10px; }
.day-priority { display:inline-flex; align-items:center; gap:8px; font-size:11px; font-weight:500; color:var(--jade); background:var(--jade-dim); border:1px solid var(--jade-br); padding:5px 12px; border-radius:20px; }

/* ── MACRO STRIP ───────────────────────────────── */
.day-macros { display:grid; grid-template-columns:repeat(4,1fr); gap:1px; background:var(--bd); border-radius:8px; overflow:hidden; margin-bottom:12px; }
.dm { background:var(--ink-2); padding:12px 10px; text-align:center; }
.dm-val { font-family:var(--mono); font-size:18px; font-weight:500; color:var(--dk-1); margin-bottom:3px; }
.dm-val.jade  { color:var(--jade); }
.dm-val.amber { color:var(--amber); }
.dm-label { font-size:9px; font-weight:600; letter-spacing:0.1em; text-transform:uppercase; color:var(--dk-3); }

/* ── LIVE MACRO CUP ────────────────────────────── */
.macro-cup {
  background:var(--ink-2); border:1px solid var(--bd); border-radius:8px;
  padding:14px 16px; margin-bottom:14px;
}
.mc-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; }
.mc-title { font-size:9px; font-weight:700; letter-spacing:0.16em; text-transform:uppercase; color:var(--dk-3); }
.mc-remaining { font-size:10px; font-weight:300; color:var(--dk-3); }
.mc-remaining .kcal-left { font-weight:600; color:var(--jade); }
.mc-rows { display:flex; flex-direction:column; gap:8px; }
.mc-row { display:grid; grid-template-columns:52px 1fr 48px; gap:8px; align-items:center; }
.mc-name { font-size:10px; font-weight:500; color:var(--dk-2); }
.mc-bar-wrap { position:relative; height:8px; background:var(--ink-1); border-radius:4px; overflow:visible; }
.mc-bar-bg { position:absolute; inset:0; border-radius:4px; background:var(--ink-1); }
.mc-bar-fill { position:absolute; left:0; top:0; height:100%; border-radius:4px; transition:width 0.4s ease; }
.mc-bar-fill.prot { background:linear-gradient(90deg, rgba(0,200,160,0.5), var(--jade)); }
.mc-bar-fill.carb { background:linear-gradient(90deg, rgba(196,124,24,0.5), var(--amber)); }
.mc-bar-fill.fat  { background:linear-gradient(90deg, rgba(74,98,117,0.5), #5a7898); }
.mc-bar-fill.kcal { background:linear-gradient(90deg, rgba(200,200,200,0.2), rgba(200,200,200,0.4)); }
.mc-bar-fill.over { background:rgba(217,78,53,0.7) !important; }
.mc-val { font-size:10px; font-family:var(--mono); color:var(--dk-3); text-align:right; }

/* ── WATER STRIP ───────────────────────────────── */
.water-strip { font-size:11px; font-weight:300; color:rgba(100,180,220,0.7); background:rgba(74,143,168,0.07); border:1px solid rgba(74,143,168,0.15); border-radius:4px; padding:7px 12px; margin-bottom:16px; }

/* ── ACCELERATOR STRIP ─────────────────────────── */
.acc-strip { background:linear-gradient(135deg,rgba(200,148,30,0.06),rgba(200,148,30,0.02)); border:1px solid rgba(200,148,30,0.22); border-radius:8px; padding:14px 18px; margin-bottom:16px; display:grid; grid-template-columns:1fr auto; gap:12px; align-items:center; }
.as-eyebrow { font-size:8px; font-weight:700; letter-spacing:0.18em; text-transform:uppercase; color:var(--gold); margin-bottom:4px; }
.as-title { font-size:13px; font-weight:600; color:var(--dk-1); margin-bottom:3px; }
.as-why { font-size:11px; font-weight:300; color:var(--dk-2); line-height:1.6; }
.as-btn { background:rgba(200,148,30,0.1); border:1px solid rgba(200,148,30,0.3); color:var(--gold); padding:6px 12px; border-radius:4px; font-size:10px; font-weight:600; letter-spacing:0.06em; text-transform:uppercase; cursor:pointer; font-family:var(--sans); white-space:nowrap; text-decoration:none; display:inline-block; }

/* ── TIMELINE BLOCKS ───────────────────────────── */
.tl-label { font-size:9px; font-weight:600; letter-spacing:0.18em; text-transform:uppercase; color:var(--dk-3); margin-bottom:12px; display:flex; align-items:center; gap:10px; }
.tl-label::after { content:''; flex:1; height:1px; background:var(--bd); }

.tl-block { background:var(--ink-2); border:1px solid var(--bd); border-radius:8px; margin-bottom:8px; overflow:hidden; cursor:pointer; transition:border-color 0.15s; }
.tl-block:hover { border-color:var(--bd-2,#2a3830); }

.tl-block.type-wake     { border-left:3px solid var(--jade); }
.tl-block.type-supp     { border-left:3px solid var(--gold); }
.tl-block.type-meal     { border-left:3px solid var(--amber); }
.tl-block.type-training { border-left:3px solid var(--jade); background:rgba(0,200,160,0.02); }
.tl-block.type-recovery { border-left:3px solid var(--dk-3); }
.tl-block.type-sleep    { border-left:3px solid #4a6070; }
.tl-block.type-hydration{ border-left:3px solid rgba(74,143,168,0.6); }

/* Eaten state */
.tl-block.eaten { opacity:0.6; }
.tl-block.eaten .tl-head { background:rgba(0,200,160,0.03); }

.tl-head { display:flex; align-items:center; gap:10px; padding:13px 14px; }
.tl-time { font-family:var(--mono); font-size:11px; font-weight:500; color:var(--dk-3); width:40px; flex-shrink:0; }
.tl-main { flex:1; min-width:0; }
.tl-title { font-size:13px; font-weight:500; color:var(--dk-1); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.tl-block.type-training .tl-title { color:var(--jade); }
.tl-subtitle { font-size:11px; font-weight:300; color:var(--dk-3); margin-top:1px; }
.tl-tag { font-size:9px; font-weight:600; letter-spacing:0.06em; text-transform:uppercase; padding:3px 9px; border-radius:10px; flex-shrink:0; }
.tl-tag.jade  { color:var(--jade); background:var(--jade-dim); border:1px solid var(--jade-br); }
.tl-tag.amber { color:var(--amber); background:rgba(196,124,24,0.08); border:1px solid var(--amber-br); }
.tl-tag.gold  { color:var(--gold); background:rgba(200,148,30,0.08); border:1px solid rgba(200,148,30,0.2); }
.tl-tag.slate { color:var(--dk-3); background:var(--ink-1); border:1px solid var(--bd); }
.tl-chevron { font-size:10px; color:var(--dk-3); flex-shrink:0; transition:transform 0.18s; }
.tl-block.open .tl-chevron { transform:rotate(180deg); }

.tl-body { display:none; padding:0 14px 14px 54px; }
.tl-block.open .tl-body { display:block; }
.tl-detail { font-size:13px; font-weight:300; color:var(--dk-2); line-height:1.8; margin-bottom:10px; }
.tl-detail p { margin-bottom:6px; }
.tl-science { font-size:11px; font-weight:300; color:var(--dk-3); line-height:1.65; padding:8px 12px; background:var(--ink-1); border-radius:4px; border-left:2px solid var(--bd); margin-bottom:10px; }
.tl-items { display:flex; flex-wrap:wrap; gap:6px; }
.tl-item { background:var(--ink-1); border:1px solid var(--bd); border-radius:4px; padding:4px 9px; }
.tl-item-name { font-size:11px; font-weight:500; color:var(--dk-1); }
.tl-item-meta { font-size:10px; font-weight:300; color:var(--dk-3); margin-left:4px; }

/* Meal action buttons */
.meal-actions { display:flex; gap:7px; margin-top:12px; flex-wrap:wrap; }
.meal-action-btn { padding:5px 14px; border-radius:14px; font-size:10px; font-weight:600; letter-spacing:0.06em; text-transform:uppercase; cursor:pointer; font-family:var(--sans); border:1px solid var(--bd); background:transparent; color:var(--dk-3); transition:all 0.12s; }
.meal-action-btn:hover { border-color:var(--amber-br); color:var(--amber); }
.meal-action-btn.view-recipe { border-color:var(--amber-br); color:var(--amber); }
.meal-action-btn.log-eaten { border-color:var(--jade-br); color:var(--jade); }
.meal-action-btn.log-diff { border-color:var(--bd-2,#2a3830); color:var(--dk-2); }

/* ── RIGHT PANEL ────────────────────────────────── */
.right-panel-header { padding:16px 20px 12px; border-bottom:1px solid var(--bd); background:var(--ink-1); flex-shrink:0; }
.rph-title { font-size:11px; font-weight:600; letter-spacing:0.1em; text-transform:uppercase; color:var(--dk-2); margin-bottom:2px; }
.rph-sub { font-size:11px; font-weight:300; color:var(--dk-3); }
.right-panel-body { flex:1; padding:16px 20px; overflow-y:auto; }
.right-panel-body::-webkit-scrollbar { width:3px; }
.right-panel-body::-webkit-scrollbar-thumb { background:var(--bd); }
.right-panel-empty { display:flex; flex-direction:column; align-items:center; justify-content:center; height:100%; text-align:center; padding:20px; gap:10px; }
.rpe-icon { font-size:32px; opacity:0.25; }
.rpe-text { font-size:13px; font-weight:300; color:var(--dk-3); line-height:1.65; }

/* Recipe card in right panel */
.recipe-card { background:var(--ink-1); border:1px solid var(--bd); border-radius:6px; overflow:hidden; margin-bottom:12px; }
.rc-header { padding:14px 16px; border-bottom:1px solid var(--bd); display:flex; justify-content:space-between; align-items:flex-start; gap:10px; }
.rc-name { font-size:15px; font-weight:500; color:var(--dk-1); margin-bottom:2px; }
.rc-desc { font-size:11px; font-weight:300; color:var(--dk-3); }
.rc-shuffle-btn { background:transparent; border:1px solid var(--amber-br); color:var(--amber); border-radius:14px; padding:4px 12px; font-size:10px; font-weight:600; letter-spacing:0.06em; text-transform:uppercase; cursor:pointer; font-family:var(--sans); white-space:nowrap; transition:all 0.12s; flex-shrink:0; }
.rc-shuffle-btn:hover { background:rgba(196,124,24,0.08); }
.rc-shuffle-btn:disabled { opacity:0.4; cursor:not-allowed; }

/* Macro fit bars */
.macro-fit { padding:12px 16px; border-bottom:1px solid var(--bd); }
.mf-label { font-size:9px; font-weight:600; letter-spacing:0.12em; text-transform:uppercase; color:var(--dk-3); margin-bottom:8px; }
.mf-rows { display:flex; flex-direction:column; gap:6px; }
.mf-row { display:grid; grid-template-columns:52px 1fr 36px; gap:8px; align-items:center; }
.mf-name { font-size:10px; font-weight:500; color:var(--dk-2); }
.mf-bar-wrap { height:6px; background:var(--ink-2); border-radius:3px; overflow:hidden; }
.mf-bar { height:100%; border-radius:3px; transition:width 0.4s ease; }
.mf-bar.p { background:var(--jade); }
.mf-bar.c { background:var(--amber); }
.mf-bar.f { background:#5a7898; }
.mf-bar.k { background:rgba(200,200,200,0.35); }
.mf-val { font-size:10px; font-family:var(--mono); color:var(--dk-3); text-align:right; }

.rc-ingredients { padding:12px 16px; border-bottom:1px solid var(--bd); }
.rc-ing-label { font-size:9px; font-weight:600; letter-spacing:0.1em; text-transform:uppercase; color:var(--dk-3); margin-bottom:7px; }
.rc-ing-row { display:flex; justify-content:space-between; padding:5px 0; border-bottom:1px solid var(--bd); }
.rc-ing-row:last-child { border-bottom:none; }
.rc-ing-name { font-size:12px; font-weight:400; color:var(--dk-1); }
.rc-ing-qty  { font-size:11px; font-family:var(--mono); color:var(--dk-3); }
.rc-method { padding:12px 16px; font-size:12px; font-weight:300; color:var(--dk-2); line-height:1.75; }
.rc-method-label { font-size:9px; font-weight:600; letter-spacing:0.1em; text-transform:uppercase; color:var(--dk-3); margin-bottom:6px; }

/* Deviation logger */
.dev-logger { background:var(--ink-1); border:1px solid var(--bd); border-radius:6px; padding:14px 16px; margin-bottom:12px; }
.dev-label { font-size:9px; font-weight:600; letter-spacing:0.12em; text-transform:uppercase; color:var(--dk-3); margin-bottom:8px; }
.dev-input { width:100%; background:var(--ink-2); border:1px solid var(--bd); border-radius:6px; padding:9px 12px; font-size:13px; font-family:var(--sans); color:var(--dk-1); outline:none; resize:none; transition:border-color 0.12s; line-height:1.4; }
.dev-input:focus { border-color:rgba(0,200,160,0.35); }
.dev-input::placeholder { color:var(--dk-3); }
.dev-send { margin-top:8px; width:100%; background:var(--jade); border:none; color:var(--ink); border-radius:6px; padding:9px; font-size:11px; font-weight:700; letter-spacing:0.06em; text-transform:uppercase; cursor:pointer; font-family:var(--sans); transition:opacity 0.12s; }
.dev-send:hover { opacity:0.85; }
.dev-send:disabled { opacity:0.35; cursor:not-allowed; }
.dev-result { margin-top:8px; padding:10px 12px; background:var(--ink-2); border:1px solid var(--jade-br); border-radius:4px; font-size:12px; font-weight:300; color:var(--dk-2); line-height:1.75; }
.dev-result strong { color:var(--jade); font-weight:600; }

/* Exercise cards (in right panel) */
.session-panel { padding:4px 0; }
.ex-card { background:var(--ink-1); border:1px solid var(--bd); border-radius:6px; margin-bottom:8px; overflow:hidden; }
.ex-card-head { display:grid; grid-template-columns:1fr auto auto; gap:10px; align-items:center; padding:11px 14px; cursor:pointer; }
.ex-card.open .ex-card-head { border-bottom:1px solid var(--bd); background:var(--ink-2); }
.ex-name { font-size:13px; font-weight:500; color:var(--dk-1); }
.ex-schema { font-family:var(--mono); font-size:12px; font-weight:600; color:var(--jade); }
.ex-rpe { font-size:10px; font-weight:500; color:var(--dk-3); background:var(--ink-2); padding:2px 8px; border-radius:8px; border:1px solid var(--bd); }
.ex-chevron { font-size:10px; color:var(--dk-3); transition:transform 0.15s; }
.ex-card.open .ex-chevron { transform:rotate(180deg); }
.ex-body { display:none; padding:12px 14px; }
.ex-card.open .ex-body { display:block; }

/* Benchmarks */
.bench-strip { background:var(--ink-2); border:1px solid var(--bd); border-radius:5px; padding:12px; margin-bottom:10px; }
.bench-label { font-size:9px; font-weight:600; letter-spacing:0.1em; text-transform:uppercase; color:var(--dk-3); margin-bottom:8px; }
.bench-values { display:grid; grid-template-columns:1fr 1fr 1fr; font-family:var(--mono); font-size:13px; font-weight:600; color:var(--dk-1); margin-bottom:4px; }
.bench-values .you { color:var(--jade); font-size:15px; }
.bench-track { position:relative; height:7px; background:var(--bd); border-radius:4px; margin:10px 0 5px; }
.bench-fill { position:absolute; left:0; top:0; height:100%; border-radius:4px; background:linear-gradient(90deg,rgba(0,200,160,0.4),rgba(0,200,160,0.85)); }
.bench-marker { position:absolute; top:-4px; width:15px; height:15px; border-radius:50%; border:2px solid var(--jade); background:var(--ink); transform:translateX(-50%); }
.bench-labels { display:grid; grid-template-columns:1fr 1fr 1fr; font-size:9px; font-weight:600; letter-spacing:0.06em; text-transform:uppercase; color:var(--dk-3); }
.bench-age-note { font-size:10px; font-weight:300; color:var(--dk-3); line-height:1.6; margin-top:7px; }
.sets-guide { display:flex; flex-direction:column; gap:5px; margin-bottom:10px; }
.set-row { display:grid; grid-template-columns:36px 1fr; gap:8px; align-items:baseline; }
.set-num { font-family:var(--mono); font-size:10px; font-weight:600; color:var(--jade); }
.set-detail { font-size:11px; font-weight:300; color:var(--dk-2); line-height:1.55; }
.ex-injury-note { padding:7px 10px; background:rgba(200,148,30,0.06); border:1px solid rgba(200,148,30,0.2); border-radius:4px; font-size:11px; font-weight:300; color:var(--dk-2); line-height:1.6; margin-bottom:8px; }
.ex-injury-note span { color:var(--gold); font-weight:600; }

/* Loading */
.loading-state { padding:50px 0; text-align:center; }
.loading-spinner { width:28px; height:28px; border:2px solid var(--bd); border-top-color:var(--jade); border-radius:50%; animation:spin 0.8s linear infinite; margin:0 auto 14px; }
@keyframes spin { to { transform:rotate(360deg); } }
.loading-text { font-size:13px; font-weight:300; color:var(--dk-3); }
.fp-spinner { width:20px; height:20px; border:2px solid var(--bd); border-top-color:var(--amber); border-radius:50%; animation:spin 0.8s linear infinite; margin:8px auto; }

/* Ask bar */
.ask-wrap { margin-top:24px; }
.ask-sec { font-size:9px; font-weight:600; letter-spacing:0.18em; text-transform:uppercase; color:var(--dk-3); margin-bottom:8px; display:flex; align-items:center; gap:10px; }
.ask-sec::after { content:''; flex:1; height:1px; background:var(--bd); }
.ask-chips { display:flex; flex-wrap:wrap; gap:5px; margin-bottom:8px; }
.ask-chip { background:var(--ink-2); border:1px solid var(--bd); border-radius:20px; padding:5px 12px; font-size:11px; font-weight:400; color:var(--dk-3); cursor:pointer; transition:all 0.12s; }
.ask-chip:hover { border-color:rgba(0,200,160,0.4); color:var(--jade); }
.ask-input-row { display:flex; gap:8px; }
.ask-input { flex:1; background:var(--ink-2); border:1px solid var(--bd); border-radius:8px; padding:9px 13px; font-size:13px; font-family:var(--sans); color:var(--dk-1); outline:none; transition:border-color 0.12s; }
.ask-input:focus { border-color:rgba(0,200,160,0.35); }
.ask-input::placeholder { color:var(--dk-3); }
.ask-send { width:36px; height:36px; background:var(--jade); border:none; border-radius:8px; cursor:pointer; font-size:15px; font-weight:700; color:var(--ink); flex-shrink:0; transition:opacity 0.12s; }
.ask-send:hover { opacity:0.85; }
.ask-answer { margin-top:10px; padding:12px 14px; background:var(--ink-2); border:1px solid var(--bd); border-left:3px solid var(--jade); border-radius:0 6px 6px 0; font-size:13px; font-weight:300; color:var(--dk-2); line-height:1.8; display:none; }
.ask-answer p { margin:0 0 8px; }
.ask-answer p:last-child { margin:0; }
.regen-btn { background:transparent; border:1px solid var(--bd); color:var(--dk-3); padding:6px 14px; border-radius:16px; font-size:10px; font-weight:600; letter-spacing:0.04em; cursor:pointer; font-family:var(--sans); margin-top:16px; transition:all 0.12s; }
.regen-btn:hover { border-color:var(--jade-br); color:var(--jade); }

/* Week programme indicator */
.week-prog-strip { background:rgba(200,148,30,0.04); border:1px solid rgba(200,148,30,0.18); border-radius:6px; padding:10px 14px; margin-bottom:14px; display:flex; justify-content:space-between; align-items:center; }
.wps-label { font-size:9px; font-weight:600; letter-spacing:0.12em; text-transform:uppercase; color:var(--gold); }

<script>
// ════════════════════════════════════════════════════════
//  bodylens-dailyplan.html  v4
//  Right-side panel · Macro cup · Deviation logging
//  Week strip · Programme week indicator
// ════════════════════════════════════════════════════════

const API   = '/api/chat';
const MODEL = 'claude-sonnet-4-20250514';

// ── 1. LOAD PROFILE ───────────────────────────────────
function loadProfile() {
  try { return JSON.parse(localStorage.getItem('bl_profile') || 'null'); }
  catch(e) { return null; }
}

// ── 2. TODAY CONTEXT ──────────────────────────────────
function getTodayContext(profile) {
  const DAY_NAMES = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
  const DAY_MAP   = {0:6,1:0,2:1,3:2,4:3,5:4,6:5};
  const idx       = DAY_MAP[new Date().getDay()];
  const name      = DAY_NAMES[idx];
  const plan      = (profile.weekPlan || [])[idx] || { type:'Rest', focus:'Recovery', priority:'rest' };
  const isTraining = plan.priority === 'training';
  const cacheKey  = 'dayplan_v4_' + new Date().toISOString().slice(0, 10);
  return { idx, name, plan, isTraining, cacheKey, DAY_NAMES };
}

// ── 3. BUILD PLAN FROM PROFILE ────────────────────────
function buildPlan(profile, today) {
  const p = profile;
  const { name, plan, isTraining } = today;

  // Time helper
  const wake = p.wakeTime || '07:00';
  const [wHr, wMin] = wake.split(':').map(Number);
  const wMins = wHr * 60 + wMin;
  const fmt = (totalMins) => {
    const h = Math.floor(totalMins / 60) % 24;
    const m = totalMins % 60;
    return String(h).padStart(2,'0') + ':' + String(m).padStart(2,'0');
  };

  // Derived times
  const coffeeTime  = fmt(wMins + 90);
  const isFemale    = (p.sex||'').toLowerCase() === 'female';
  const injuries    = p.injuryAssessments || p.injuries || [];
  const supps       = p.supplements || [];
  const kcal        = plan.kcal || p.calories || 2000;
  const prot        = p.protein || 140;
  const carbs       = p.carbs   || 160;
  const fat         = p.fat     || 60;
  const water       = Math.round((p.weight || 75) * 35 + (isTraining ? 500 : 0));
  const window_str  = p.actualEatingWindow || p.fastingWindow || p.eatingWindow || 'flexible';
  const mealCount   = p.mealCount || 3;

  // Training time
  const trainTimeStr = (p.trainingTime || 'Morning').toLowerCase();
  const trainMins =
    trainTimeStr.includes('early')    ? wMins + 60  :
    trainTimeStr.includes('morning')  ? wMins + 120 :
    trainTimeStr.includes('lunch')    ? 12 * 60     :
    trainTimeStr.includes('afternoon')? 15 * 60     :
    trainTimeStr.includes('evening')  ? 18 * 60     : wMins + 120;

  // Supplements by timing
  const mornSupps  = supps.filter(s => /morning|wake|before train/i.test(s.timing||''));
  const nightSupps = supps.filter(s => /night|sleep|evening|bed/i.test(s.timing||''));

  // Bedtime
  const bed = p.bedtime || '';
  const bedMins =
    bed.includes('Before 10') ? 21*60+30 :
    bed.includes('10–11')     ? 22*60    :
    bed.includes('11')        ? 22*60+30 :
    bed.includes('midnight')  ? 23*60+30 : 22*60;

  const blocks = [];

  // WAKE
  blocks.push({
    time: wake, type: 'wake', tag: 'Wake', tagColor: 'jade',
    title: 'Morning ignition',
    subtitle: 'Cortisol peak · Circadian set',
    detail: 'No phone for 5 minutes. 500ml water immediately — you\'ve been fasting 7-8 hours.\n\nOutside for 10 minutes: morning light sets your circadian clock and determines tonight\'s melatonin timing.' + (isTraining && trainMins - wMins <= 90 ? '\n\nCollagen + Vit C at ' + fmt(trainMins - 45) + ' — 45 min before training.' : ''),
    science: 'Cortisol peaks 30-45 min post-wake. It\'s doing caffeine\'s job — don\'t double up.',
    items: [{ name:'Water', meta:'500ml immediately' }, { name:'Sunlight', meta:'10 min outside' }]
  });

  // COFFEE + MORNING SUPPS
  blocks.push({
    time: coffeeTime, type: 'supp', tag: 'Supps', tagColor: 'gold',
    title: 'Coffee & morning supplements',
    subtitle: '90 min post-wake — after cortisol peak',
    detail: 'Coffee now. The cortisol that was doing caffeine\'s job has peaked and is clearing.\n\n' +
      (mornSupps.length
        ? mornSupps.map(s => s.name + ' ' + s.dose + ' — ' + (s.timing||'')).join('\n')
        : 'Creatine 5g with water. Omega-3 with food if not taken.'),
    science: 'Caffeine before the cortisol peak adds nothing and enlarges the afternoon crash.',
    items: mornSupps.length
      ? mornSupps.map(s => ({ name:s.name, meta:s.dose }))
      : [{ name:'Coffee', meta:'after cortisol peak' }, { name:'Creatine', meta:'5g' }]
  });

  // PRE-TRAINING (training days)
  if (isTraining) {
    const preMins = Math.max(trainMins - 105, wMins + 60);
    blocks.push({
      time: fmt(preMins), type: 'meal', tag: 'Eat', tagColor: 'amber',
      title: 'Pre-training meal',
      subtitle: '90-120 min before session',
      mealSlot: 'pre-training',
      detail: 'High protein, moderate fast carbs, low fat.\nExclude: ' + ((p.foodExclusions||[]).join(', ')||'none') + '.\n' +
        ((p.cuisinePrefs||[]).length ? (p.cuisinePrefs[0] + ' style.') : '') + '\nKeep fat under 15g — slows gastric emptying and glucose delivery.',
      science: 'Glycogen priming + amino acid availability. Fat blunts the performance fuel supply.',
      items: [
        { name:'Protein', meta: Math.round(prot * 0.25) + 'g' },
        { name:'Fast carbs', meta:'40-60g' },
        { name:'Fat', meta:'under 15g' }
      ]
    });

    // TRAINING
    const injNote = injuries.length
      ? ' Modifications active: ' + injuries.map(i => i.location||i).join(', ') + '.'
      : '';
    blocks.push({
      time: fmt(trainMins), type: 'training', tag: 'Train', tagColor: 'jade',
      title: plan.type + ': ' + (plan.focus || ''),
      subtitle: 'Main session',
      detail: 'Warm up 10 min. Working sets at RPE 7-9 — 1-3 reps from failure. Track every load.' + injNote + '\nCool down 5-10 min.',
      science: 'The last 5 reps drive adaptation. Everything before is preparation.',
      items: ((plan.keyExercises||[]).slice(0,5).map(e => ({ name:e, meta:'' }))
              .concat([{ name:'Track loads', meta:'progressive overload' }])).slice(0,5)
    });

    // POST-TRAINING
    blocks.push({
      time: fmt(trainMins + 75), type: 'meal', tag: 'Eat', tagColor: 'amber',
      title: 'Post-training nutrition',
      subtitle: 'Within 30 min of finishing',
      mealSlot: 'post-training',
      detail: 'Fast protein + fast carbs. mTOR is elevated — this window matters.\nTarget ' + Math.round(prot * 0.28) + 'g protein here.\n' +
        ((p.dietType||'').toLowerCase().includes('vegan')
          ? 'Plant-based: combine sources to hit leucine threshold (2.5g leucine minimum).'
          : 'Whey or egg white is fastest if convenience is a factor.'),
      science: 'mTOR peaks post-training. Leucine threshold 2.5g per meal triggers protein synthesis.',
      items: [
        { name:'Fast protein', meta: Math.round(prot * 0.28) + 'g' },
        { name:'Fast carbs', meta:'30-40g' }
      ]
    });
  }

  // MIDDAY / FIRST MEAL
  const middayMins = isTraining
    ? Math.max(trainMins + 180, 12*60)
    : wMins + 210;
  blocks.push({
    time: fmt(middayMins), type: 'meal', tag: 'Eat', tagColor: 'amber',
    title: isTraining ? 'Midday meal' : 'First meal',
    subtitle: isTraining ? 'Protein anchor' : window_str,
    mealSlot: 'midday',
    detail: 'Build around protein. ' +
      ((p.cuisinePrefs||[]).length ? p.cuisinePrefs[0] + ' inspired. ' : '') +
      'Include vegetables. Avoid: ' + (p.triggerFoods||'none') + '.',
    science: 'Protein every 3-4 hours sustains MPS throughout the day.',
    items: [
      { name:'Protein', meta: Math.round(prot * 0.28) + 'g' },
      { name:'Vegetables', meta:'200g+' },
      { name:'Carbs', meta: isTraining ? '40-60g' : '30-50g' }
    ]
  });

  // AFTERNOON (if 4+ meals)
  if (mealCount >= 4) {
    blocks.push({
      time: fmt(Math.max(middayMins + 180, 15*60)),
      type:'meal', tag:'Eat', tagColor:'amber',
      title: 'Afternoon meal',
      subtitle: 'Protein maintained',
      mealSlot: 'afternoon',
      detail: 'Lighter than midday. Protein anchor, lower carbs.\n' +
        ((p.cuisinePrefs||[]).length ? p.cuisinePrefs[0] + ' style.' : ''),
      science: 'Consistent protein timing sustains elevated MPS across the full day.',
      items: [
        { name:'Protein', meta: Math.round(prot * 0.22) + 'g' },
        { name:'Veg or fruit', meta:'200g' }
      ]
    });
  }

  // EVENING MEAL
  const eveningMins = Math.max(middayMins + 210, 18*60);
  const closeWin =
    window_str.includes('20:') ? 20*60 :
    window_str.includes('19:') ? 19*60 : 21*60;
  blocks.push({
    time: fmt(eveningMins), type: 'meal', tag: 'Eat', tagColor: 'amber',
    title: 'Evening meal',
    subtitle: 'Final protein hit · close the window',
    mealSlot: 'evening',
    detail: 'Lean protein priority. ' +
      (isTraining ? 'Lower carbs than midday — glycogen already replenished.' : 'Moderate carbs fine on rest day.') +
      '\nClose eating window by ' + fmt(closeWin) + '.',
    science: 'Casein-rich foods (cottage cheese, Greek yoghurt) extend overnight MPS during the fast.',
    items: [
      { name:'Lean protein', meta: Math.round(prot * 0.25) + 'g' },
      { name:'Vegetables', meta:'200g' },
      { name:'Window closes', meta: fmt(closeWin) }
    ]
  });

  // WIND-DOWN
  blocks.push({
    time: fmt(bedMins - 45), type: 'recovery', tag: 'Wind down', tagColor: 'slate',
    title: 'Evening wind-down',
    subtitle: 'Protect tonight\'s adaptation',
    detail: 'Screens dim or off.\n' +
      (nightSupps.length
        ? nightSupps.map(s => s.name + ' ' + s.dose).join('. ') + '.'
        : 'Magnesium glycinate 300mg.') +
      '\nRoom 17-19°C.' +
      ((p.recoveryTools||[]).length ? '\nRecovery: ' + (p.recoveryTools||[]).slice(0,2).join(', ') + ' if available.' : ''),
    science: 'Core temperature drop signals sleep onset. Magnesium activates GABA for sleep transition.',
    items: [
      ...nightSupps.map(s => ({ name:s.name, meta:s.dose })),
      { name:'Screens off', meta:'45 min before sleep' },
      { name:'Room temp', meta:'17-19°C' }
    ].slice(0, 4)
  });

  // SLEEP
  blocks.push({
    time: fmt(bedMins), type: 'sleep', tag: 'Sleep', tagColor: 'slate',
    title: 'Sleep',
    subtitle: p.sleep || '7-8 hours',
    detail: isTraining
      ? 'Training day: sleep is where adaptation happens. GH pulses in the first slow-wave cycle — this is when today\'s session becomes actual muscle. Nothing else drives recovery like this.'
      : 'Rest day: sleep extends the repair from previous sessions. Satellite cells divide, myofibrils remodel, cortisol clears.',
    science: isFemale
      ? 'GH peaks in first 90 min. Progesterone is a natural GABA agonist — protect sleep to protect hormonal recovery.'
      : 'GH peaks in first 90 min. One week sub-6h sleep reduces testosterone 10-15%.',
    items: [
      { name:'Target', meta: p.sleep || '7-8h' },
      { name:'Wake', meta: wake }
    ]
  });

  return {
    dayTitle: name + (isTraining ? ' — ' + plan.type : ' — Rest'),
    dayBrief: isTraining
      ? plan.type + ' day. Signal, feed, recover. Hit ' + prot + 'g protein.'
      : 'Recovery day. The adaptation from your last session is happening now. Protein + sleep.',
    priority: isTraining
      ? Math.round(prot * 0.28) + 'g protein within 30 min post-training. This window matters most.'
      : prot + 'g protein today — including rest days. MPS runs 24-48h post-session.',
    macros: { kcal, prot, carbs, fat, water: (water/1000).toFixed(1) + 'L' },
    blocks
  };
}


// ── STRENGTH BENCHMARKS ───────────────────────────────
const STRENGTH_STANDARDS = {
  'bench press':    { m:[0.5,1.0,1.5],   f:[0.25,0.6,1.0] },
  'squat':          { m:[0.75,1.25,1.75], f:[0.5,1.0,1.5] },
  'deadlift':       { m:[1.0,1.5,2.0],   f:[0.75,1.25,1.75] },
  'overhead press': { m:[0.3,0.65,1.0],  f:[0.15,0.4,0.65] },
  'ohp':            { m:[0.3,0.65,1.0],  f:[0.15,0.4,0.65] },
  'row':            { m:[0.5,0.9,1.3],   f:[0.3,0.6,0.9] },
  'barbell row':    { m:[0.5,0.9,1.3],   f:[0.3,0.6,0.9] },
  'pull-up':        { m:[0,0.2,0.5],     f:[0,0.1,0.35] },
  'pull up':        { m:[0,0.2,0.5],     f:[0,0.1,0.35] },
  'romanian deadlift':{ m:[0.7,1.1,1.6], f:[0.5,0.8,1.2] },
  'rdl':            { m:[0.7,1.1,1.6],   f:[0.5,0.8,1.2] },
  'hip thrust':     { m:[0.9,1.4,1.9],   f:[0.7,1.2,1.7] },
  'lateral raise':  { m:[0.06,0.12,0.2], f:[0.04,0.08,0.14] },
  'bicep curl':     { m:[0.2,0.4,0.6],   f:[0.1,0.2,0.4] },
  'tricep':         { m:[0.15,0.35,0.55],f:[0.08,0.2,0.35] },
  'leg press':      { m:[1.5,2.5,3.5],   f:[1.0,1.8,2.6] },
  'leg curl':       { m:[0.3,0.55,0.8],  f:[0.2,0.4,0.65] },
  'calf raise':     { m:[0.8,1.4,2.0],   f:[0.6,1.0,1.5] },
};

function getStandard(name, weight, isFemale, age) {
  const n = name.toLowerCase();
  let std = null;
  for (const [key, val] of Object.entries(STRENGTH_STANDARDS)) {
    if (n.includes(key)) { std = val; break; }
  }
  if (!std) return null;
  const ageFactor = age < 30 ? 0.95 : age < 40 ? 1.0 : age < 50 ? 0.93 : age < 60 ? 0.85 : 0.78;
  const m = isFemale ? std.f : std.m;
  return {
    beginner:     Math.round(m[0] * weight * ageFactor),
    intermediate: Math.round(m[1] * weight * ageFactor),
    advanced:     Math.round(m[2] * weight * ageFactor),
  };
}
function getAgeNote(age, isFemale) {
  if (age < 35) return 'Prime neurological adaptation phase. Technique investment now compounds.';
  if (age < 45) return `At ${age}, recovery takes 72h for heavy sessions. Strength response unchanged — the timeline isn't.`;
  if (age < 55) return `At ${age}, progressive overload works identically. Deloads matter more. Sleep is the primary recovery lever.`;
  return `At ${age}, the training stimulus is as effective as ever. ${isFemale ? 'Resistance training is protecting bone density as oestrogen shifts.' : 'GH pulses are smaller — sleep quality is the biggest lever.'}`;
}
function parseExercise(str) {
  const m = str.match(/(\d+)\s*[xX×]\s*([\d\-]+)/);
  const name = str.replace(/\d+\s*[xX×]\s*[\d\-]+.*/, '').trim();
  return { name, raw:str, sets: m ? parseInt(m[1]) : 3, reps: m ? m[2] : '8-12', schema: m ? m[0] : '3×8-12' };
}

// ── MACRO TRACKING STATE ──────────────────────────────
const MACRO_KEY = 'bl_macros_' + new Date().toISOString().slice(0,10);
let _macroState = (() => {
  try { return JSON.parse(localStorage.getItem(MACRO_KEY) || 'null'); }
  catch(e) { return null; }
})();

function saveMacroState() {
  try { localStorage.setItem(MACRO_KEY, JSON.stringify(_macroState)); } catch(e) {}
}

function initMacroState(profile, today) {
  if (_macroState) return; // already exists for today
  const kcal  = today.isTraining ? (today.plan.kcal || profile.calories || 2000) : Math.round((profile.calories||2000)*0.91);
  _macroState = {
    target: { kcal, prot: profile.protein||140, carbs: profile.carbs||160, fat: profile.fat||60 },
    eaten:  { kcal:0, prot:0, carbs:0, fat:0 },
    meals:  {} // mealSlot -> { eaten:bool, prot, carbs, fat, kcal }
  };
  saveMacroState();
}

function getMacroCupHTML() {
  if (!_macroState) return '';
  const { target, eaten } = _macroState;
  const remaining = {
    kcal:  target.kcal  - eaten.kcal,
    prot:  target.prot  - eaten.prot,
    carbs: target.carbs - eaten.carbs,
    fat:   target.fat   - eaten.fat,
  };
  function pct(val, max) { return Math.min(100, Math.round((val/Math.max(1,max))*100)); }
  function rowHTML(name, val, max, cls) {
    const p = pct(val, max);
    const over = val > max;
    return `<div class="mc-row">
      <div class="mc-name">${name}</div>
      <div class="mc-bar-wrap">
        <div class="mc-bar-bg"></div>
        <div class="mc-bar-fill ${cls} ${over?'over':''}" style="width:${p}%"></div>
      </div>
      <div class="mc-val">${val}${name==='Calories'?'':'g'}</div>
    </div>`;
  }
  const kcalLeft = remaining.kcal;
  return `<div class="macro-cup">
    <div class="mc-header">
      <div class="mc-title">Macro cup — today</div>
      <div class="mc-remaining"><span class="kcal-left">${kcalLeft > 0 ? kcalLeft + ' kcal left' : Math.abs(kcalLeft) + ' kcal over'}</span></div>
    </div>
    <div class="mc-rows">
      ${rowHTML('Calories', eaten.kcal, target.kcal, 'kcal')}
      ${rowHTML('Protein',  eaten.prot,  target.prot,  'prot')}
      ${rowHTML('Carbs',    eaten.carbs, target.carbs, 'carb')}
      ${rowHTML('Fat',      eaten.fat,   target.fat,   'fat')}
    </div>
  </div>`;
}

function refreshMacroCup() {
  const cup = document.getElementById('macro-cup');
  if (cup) cup.outerHTML = getMacroCupHTML();
  // Re-attach id
  const newCup = document.querySelector('.macro-cup');
  if (newCup) newCup.id = 'macro-cup';
}

// ── WEEK PROGRAMME CONTEXT ────────────────────────────
function getWeekProgrammeContext(profile) {
  const startDate = profile.generatedAt ? new Date(profile.generatedAt) : new Date();
  const now = new Date();
  const daysDiff = Math.floor((now - startDate) / (1000*60*60*24));
  const weekNum = Math.min(4, Math.floor(daysDiff / 7) + 1);
  const phases = ['Foundation', 'Build', 'Peak', 'Deload'];
  const phase = phases[Math.min(3, weekNum-1)];
  return { weekNum, phase, totalWeeks: 4 };
}

// ── WEEK STRIP ────────────────────────────────────────
function renderWeekStrip(profile, today) {
  const strip = document.getElementById('week-strip');
  if (!strip) return;
  const { DAY_NAMES } = today;
  strip.innerHTML = DAY_NAMES.map((name, i) => {
    const plan = (profile.weekPlan||[])[i] || {type:'Rest',priority:'rest'};
    const isTrain = plan.priority === 'training';
    const isToday = i === today.idx;
    return `<div class="ws-day ${isTrain?'train':'rest'} ${isToday?'today':''}" onclick="jumpToDay(${i})">
      <div class="ws-day-name">${name.slice(0,3)}</div>
      <div class="ws-day-type">${plan.type||'Rest'}</div>
      <div class="ws-day-dot"></div>
    </div>`;
  }).join('');
}

function jumpToDay(idx) {
  // For non-today days just show a tooltip — full nav would reload the page
  const DAY_NAMES = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
  const plan = (_profile.weekPlan||[])[idx] || {type:'Rest',focus:'Recovery',priority:'rest'};
  showRightPanel(
    DAY_NAMES[idx] + ' — ' + (plan.type||'Rest'),
    plan.focus || 'Recovery',
    `<div style="padding:8px 0;">
      <div style="font-size:13px;font-weight:300;color:var(--dk-2);line-height:1.8;margin-bottom:12px;">
        ${plan.coachNote || ('A ' + (plan.priority==='training'?'training':'rest') + ' day in your programme.')}
      </div>
      ${(plan.keyExercises||[]).length ? `
        <div style="font-size:9px;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;color:var(--jade);margin-bottom:8px;">Key exercises</div>
        ${(plan.keyExercises||[]).map(e=>`<div style="padding:6px 0;border-bottom:1px solid var(--bd);font-size:12px;color:var(--dk-1);">${e}</div>`).join('')}` : ''}

// ── RECIPE FETCH ──────────────────────────────────────
const _recipeCache = {};

async function fetchRecipe(slot, mealTitle, mealTarget, forceNew) {
  const cacheKey = 'recipe_' + (slot||mealTitle) + '_' + new Date().toISOString().slice(0,10) + (forceNew?'_'+Date.now():'');
  if (!forceNew && _recipeCache[slot]) return _recipeCache[slot];

  const p = _profile;
  const exclusions = (p.foodExclusions||[]).join(', ')||'none';
  const cuisines   = (p.cuisinePrefs||[]).join(', ')||'neutral';
  const shuffleNote = forceNew
    ? `IMPORTANT: Return a completely different meal from what you might have given before. Different cuisine direction (${cuisines}), different protein source, different cooking method. Same macro targets.`
    : '';

  const res = await fetch(API, {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ model:MODEL, max_tokens:400,
      system:'Return only valid JSON. No markdown.',
      messages:[{role:'user', content:`Performance nutritionist. Recipe for "${mealTitle}" slot.
${shuffleNote}
Target: ${mealTarget.calories} kcal, ${mealTarget.protein}g protein, ${mealTarget.carbs}g carbs, ${mealTarget.fat}g fat.
Diet: ${p.dietType||'flexible'} | Exclude: ${exclusions} | Cuisine: ${cuisines}
Complexity: ${p.recipeComplexity||'standard'}
${p.recipeComplexity&&p.recipeComplexity.includes('5')?'MAX 5 ingredients.':''}
Return JSON: {"name":"dish name","description":"one line","calories":0,"protein":0,"carbs":0,"fat":0,"prepTime":"10 min","ingredients":[{"name":"item","quantity":"200g"}],"method":"2-3 sentences"}`
    }]})
  });
  const data = await res.json();
  const text = (data.content||[]).map(b=>b.text||'').join('').trim();
  const match = text.match(/\{[\s\S]*\}/);
  if (!match) throw new Error('No JSON');
  const recipe = JSON.parse(match[0]);
  _recipeCache[slot] = recipe;
  return recipe;
}

  function pct(v,m) { return Math.min(100, Math.round(v/Math.max(1,m)*100)); }
  const ings = (recipe.ingredients||[]).map(i=>
    `<div class="rc-ing-row"><div class="rc-ing-name">${i.name}</div><div class="rc-ing-qty">${i.quantity||''}</div></div>`
  ).join('');
  return `
    <div class="recipe-card">
      <div class="rc-header">
        <div>
          <div class="rc-name">${recipe.name}</div>
          <div class="rc-desc">${recipe.description||''} · ${recipe.prepTime||''}</div>
        </div>
        <button class="rc-shuffle-btn" id="shuf-${blockIdx}" onclick="shuffleMeal('${slot}',${blockIdx})">↺ Shuffle</button>
      </div>

        <div class="mf-label">Macro contribution</div>
        <div class="mf-rows">
          <div class="mf-row"><div class="mf-name">Protein</div><div class="mf-bar-wrap"><div class="mf-bar p" style="width:${pct(recipe.protein,mealTarget.protein)}%"></div></div><div class="mf-val">${recipe.protein}g</div></div>
          <div class="mf-row"><div class="mf-name">Carbs</div><div class="mf-bar-wrap"><div class="mf-bar c" style="width:${pct(recipe.carbs||0,mealTarget.carbs)}%"></div></div><div class="mf-val">${recipe.carbs||0}g</div></div>
          <div class="mf-row"><div class="mf-name">Fat</div><div class="mf-bar-wrap"><div class="mf-bar f" style="width:${pct(recipe.fat||0,mealTarget.fat)}%"></div></div><div class="mf-val">${recipe.fat||0}g</div></div>
          <div class="mf-row"><div class="mf-name">Calories</div><div class="mf-bar-wrap"><div class="mf-bar k" style="width:${pct(recipe.calories,mealTarget.calories)}%"></div></div><div class="mf-val">${recipe.calories}</div></div>
        </div>

      <div class="rc-ingredients">
        <div class="rc-ing-label">Ingredients</div>

function deviationLoggerHTML(slot, blockIdx, recipe) {
  const eaten = _macroState && _macroState.meals[slot];
  if (eaten && eaten.logged) {
    return `<div class="dev-logger">
      <div class="dev-label">Logged ✓</div>
      <div class="dev-result">
        <strong>${eaten.prot}g P · ${eaten.carbs}g C · ${eaten.fat}g F · ${eaten.kcal} kcal</strong><br>
        ${eaten.note||''}
      </div>
      <button class="meal-action-btn" style="margin-top:8px;" onclick="clearMealLog('${slot}')">Clear log</button>
    </div>`;
  }
  return `<div class="dev-logger">
    <div class="dev-label">Log what you ate</div>
    <textarea class="dev-input" id="dev-input-${blockIdx}" rows="2"
      placeholder="e.g. 'Had the meal as planned' or 'Skipped — had a chicken wrap instead' or 'Ate half of it'"></textarea>
    <button class="dev-send" id="dev-send-${blockIdx}"
      onclick="logMeal('${slot}', ${blockIdx}, ${JSON.stringify({p:recipe.protein,c:recipe.carbs||0,f:recipe.fat||0,k:recipe.calories}).replace(/"/g,'&quot;')})">
      Estimate macros →
    </button>
    <div id="dev-result-${blockIdx}" style="display:none;" class="dev-result"></div>
  </div>`;
}

async function logMeal(slot, blockIdx, planMacros) {
  const input = document.getElementById('dev-input-'+blockIdx);
  const btn   = document.getElementById('dev-send-'+blockIdx);
  const result= document.getElementById('dev-result-'+blockIdx);
  const text  = input ? input.value.trim() : '';
  if (!text || !btn) return;

  btn.disabled = true;
  btn.textContent = 'Estimating…';

  const p = _profile;
  // If they say "as planned" or "the meal" just use the plan macros
  const isOnPlan = /as planned|the meal|as above|had it|ate it|all of it/i.test(text);
  if (isOnPlan) {
    const macros = { prot: planMacros.p, carbs: planMacros.c, fat: planMacros.f, kcal: planMacros.k, logged:true, note:'On plan' };
    saveMealLog(slot, macros);
    if (result) { result.style.display='block'; result.innerHTML = `<strong>${macros.prot}g P · ${macros.carbs}g C · ${macros.fat}g F · ${macros.kcal} kcal</strong><br>On plan — nice.`; }
    btn.style.display='none';
    updateRemainingMeals();
    return;
  }

  try {
    const res = await fetch(API, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ model:MODEL, max_tokens:120,
        system:'You are a nutrition estimator. Return only valid JSON.',
        messages:[{role:'user',content:`Estimate macros for: "${text}"
Person: ${p.weight||80}kg, ${p.sex||'male'}.
Return JSON only: {"protein":0,"carbs":0,"fat":0,"calories":0,"note":"one sentence on your estimate"}`}]})
    });
    const data = await res.json();
    const raw  = (data.content||[]).map(b=>b.text||'').join('').trim();
    const match= raw.match(/\{[\s\S]*\}/);
    if (!match) throw new Error('No JSON');
    const est  = JSON.parse(match[0]);
    const macros = { prot:est.protein||0, carbs:est.carbs||0, fat:est.fat||0, kcal:est.calories||0, logged:true, note:est.note||'' };
    saveMealLog(slot, macros);
    if (result) {
      result.style.display='block';
      result.innerHTML = `<strong>${macros.prot}g P · ${macros.carbs}g C · ${macros.fat}g F · ${macros.kcal} kcal</strong><br>${macros.note}`;
    }
    btn.style.display='none';
    updateRemainingMeals();
  } catch(e) {
    if (btn) { btn.disabled=false; btn.textContent='Estimate macros →'; }
    if (result) { result.style.display='block'; result.innerHTML='Could not estimate — try again.'; }
  }
}

function saveMealLog(slot, macros) {
  if (!_macroState) return;
  _macroState.meals[slot] = macros;
  // Recompute eaten totals
  _macroState.eaten = { kcal:0, prot:0, carbs:0, fat:0 };
  Object.values(_macroState.meals).forEach(m => {
    if (m.logged) {
      _macroState.eaten.kcal  += m.kcal  || 0;
      _macroState.eaten.prot  += m.prot  || 0;
      _macroState.eaten.carbs += m.carbs || 0;
      _macroState.eaten.fat   += m.fat   || 0;
    }
  });
  saveMacroState();
  refreshMacroCup();
  // Update meal block visual
  const block = document.querySelector(`[data-slot="${slot}"]`);
  if (block) block.classList.add('eaten');
}

function clearMealLog(slot) {
  if (!_macroState || !_macroState.meals[slot]) return;
  delete _macroState.meals[slot];
  _macroState.eaten = { kcal:0, prot:0, carbs:0, fat:0 };
  Object.values(_macroState.meals).forEach(m => {
    if (m.logged) {
      _macroState.eaten.kcal  += m.kcal  || 0;
      _macroState.eaten.prot  += m.prot  || 0;
      _macroState.eaten.carbs += m.carbs || 0;
      _macroState.eaten.fat   += m.fat   || 0;
    }
  });
  saveMacroState();
  refreshMacroCup();
}

function updateRemainingMeals() {
  // Called after each meal log — shows adjusted targets on remaining meals
  if (!_macroState) return;
  const remaining = {
    prot:  _macroState.target.prot  - _macroState.eaten.prot,
    carbs: _macroState.target.carbs - _macroState.eaten.carbs,
    fat:   _macroState.target.fat   - _macroState.eaten.fat,
    kcal:  _macroState.target.kcal  - _macroState.eaten.kcal,
  };
  // Count unlogged meal slots
  const unloggedSlots = (window._blocks||[]).filter(b => b.mealSlot && !(_macroState.meals[b.mealSlot]&&_macroState.meals[b.mealSlot].logged));
  if (unloggedSlots.length > 0) {
    const perMeal = {
      prot:  Math.round(Math.max(0,remaining.prot)  / unloggedSlots.length),
      carbs: Math.round(Math.max(0,remaining.carbs) / unloggedSlots.length),
      fat:   Math.round(Math.max(0,remaining.fat)   / unloggedSlots.length),
      kcal:  Math.round(Math.max(0,remaining.kcal)  / unloggedSlots.length),
    };
    unloggedSlots.forEach(b => {
      const el = document.querySelector(`[data-slot="${b.mealSlot}"] .tl-subtitle`);
      if (el && perMeal.prot > 0) {
        el.textContent = `Adjusted target: ${perMeal.prot}g P · ${perMeal.kcal} kcal`;
        el.style.color = 'var(--amber)';
      }
    });
  }
}

// ── OPEN MEAL IN RIGHT PANEL ──────────────────────────
async function openMealPanel(blockIdx, block) {
  const p      = _profile;
  const prot   = Math.round((p.protein||140) / (p.mealCount||4));
  const kcal   = Math.round((_today.isTraining ? (_today.plan.kcal||p.calories||2000) : Math.round((p.calories||2000)*0.91)) / (p.mealCount||4));
  const mealTarget = { calories:kcal, protein:prot, carbs:Math.round((p.carbs||160)*0.25), fat:Math.round((p.fat||60)*0.25) };

  showRightPanel(block.title, block.subtitle||'Recipe + macro log', `<div class="fp-loading"><div class="fp-spinner"></div></div>`);

  try {
    const recipe = await fetchRecipe(block.mealSlot||block.title, block.title, mealTarget, false);
    const html   = recipeCardHTML(recipe, mealTarget, block.mealSlot||block.title, blockIdx);
    document.getElementById('rpb').innerHTML = html;
  } catch(e) {
    document.getElementById('rpb').innerHTML = `<div style="padding:20px;color:var(--dk-3);font-size:13px;">Could not load recipe — <button onclick="openMealPanel(${blockIdx},window._blocks[${blockIdx}])" style="color:var(--amber);background:none;border:none;cursor:pointer;text-decoration:underline;">try again</button></div>`;
  }
}

async function shuffleMeal(slot, blockIdx) {
  const btn = document.getElementById('shuf-'+blockIdx);
  if (btn) { btn.disabled=true; btn.textContent='Shuffling…'; }
  delete _recipeCache[slot];
  const p = _profile;
  const prot = Math.round((p.protein||140) / (p.mealCount||4));
  const kcal = Math.round((_today.isTraining ? (_today.plan.kcal||p.calories||2000) : Math.round((p.calories||2000)*0.91)) / (p.mealCount||4));
  const mealTarget = { calories:kcal, protein:prot, carbs:Math.round((p.carbs||160)*0.25), fat:Math.round((p.fat||60)*0.25) };
  try {
    const recipe = await fetchRecipe(slot, window._blocks[blockIdx].title, mealTarget, true);
    document.getElementById('rpb').innerHTML = recipeCardHTML(recipe, mealTarget, slot, blockIdx);
  } catch(e) {
    if (btn) { btn.disabled=false; btn.textContent='↺ Shuffle'; }
  }
}

// ── SESSION IN RIGHT PANEL ────────────────────────────
function openSessionPanel(blockIdx, block) {
  const p = _profile;
  const isFemale = (p.sex||'').toLowerCase() === 'female';
  const age = p.age || 35;
  const weight = p.weight || 75;
  const injuries = p.injuryAssessments || p.injuries || [];
  const exercises = (block.items||[]).filter(e => e.name !== 'Track loads');

  const exHTML = exercises.map((ex, i) => {
    const parsed = parseExercise(ex.name);
    const std = getStandard(parsed.name, weight, isFemale, age);
    const injMatch = injuries.find(inj =>
      ['knee','back','shoulder','hip','elbow'].some(j =>
        (inj.location||'').toLowerCase().includes(j) && parsed.name.toLowerCase().includes(j.slice(0,4))
      )
    );
    const reps = parseInt((parsed.reps||'10').split('-')[0]);
    const rpe = reps <= 5 ? '8-9' : reps <= 8 ? '7-9' : '7-8';

    const benchHTML = std ? `
      <div class="bench-strip">
        <div class="bench-label">${age}yr ${isFemale?'female':'male'} · ${weight}kg · age-adjusted</div>
        <div class="bench-values">
          <div>${std.beginner}kg</div>
          <div class="you">${std.intermediate}kg</div>
          <div>${std.advanced}kg</div>
        </div>
        <div class="bench-track">
          <div class="bench-fill" style="width:66%"></div>
          <div class="bench-marker" style="left:66%"></div>
        </div>
        <div class="bench-labels"><div>Beginner</div><div style="text-align:center">You</div><div style="text-align:right">Advanced</div></div>
        <div class="bench-age-note">${getAgeNote(age, isFemale)}</div>
      </div>` : '';

    const sets = [];
    for (let s=1; s<=parsed.sets; s++) {
      const isLast = s===parsed.sets;
      const txt = s===1 ? 'Warm-up: −20% load, lock in technique' : isLast ? `Working set: RPE ${rpe} — ${parsed.reps} reps, 1-3 from failure` : `Build set: increase load, RPE ${parseInt(rpe)-1}`;
      sets.push(`<div class="set-row"><div class="set-num">S${s}</div><div class="set-detail">${txt}</div></div>`);
    }

    return `<div class="ex-card" id="exc-${i}">
      <div class="ex-card-head" onclick="document.getElementById('exc-${i}').classList.toggle('open')">
        <div>
          <div class="ex-name">${parsed.name}</div>
        </div>
        <div class="ex-schema">${parsed.schema}</div>
        <div class="ex-rpe">RPE ${rpe}</div>
        <span class="ex-chevron">▾</span>
      </div>
      <div class="ex-body">
        ${injMatch ? `<div class="ex-injury-note"><span>⚠ ${injMatch.location}:</span> ${(injMatch.safeAlternatives||[]).length?'Safe alternatives: '+(injMatch.safeAlternatives||[]).slice(0,2).join(', '):'Perform with reduced range of motion.'}</div>` : ''}
        ${benchHTML}
        <div style="font-size:9px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:var(--dk-3);margin-bottom:7px;">Set guide</div>
        <div class="sets-guide">${sets.join('')}</div>
        <div style="font-size:11px;font-weight:300;color:var(--dk-3);padding-top:7px;border-top:1px solid var(--bd);">Rest: ${reps<=5?'3-4 min':reps<=8?'2-3 min':'90 sec'} between sets</div>
      </div>
    </div>`;
  }).join('');

  showRightPanel(block.title, block.subtitle||'Today\'s session', `<div class="session-panel">${exHTML}</div>`);
}

// ── ASK HANDLER ───────────────────────────────────────
let _askInFlight = false;

function sendAsk(text) {
  const input  = document.getElementById('ask-input');
  const answer = document.getElementById('ask-answer');
  const sendBtn= document.getElementById('ask-send');
  const msg    = text || (input ? input.value.trim() : '');
  if (!msg || _askInFlight) return;
  if (input && !text) input.value = '';
  _askInFlight = true;
  if (sendBtn) sendBtn.disabled = true;

  answer.style.display = 'block';
  answer.innerHTML = '<div class="loading-spinner" style="width:18px;height:18px;margin:8px 0;border-top-color:var(--jade);"></div>';

  const p = _profile;
  const isFemale = (p.sex||'').toLowerCase() === 'female';
  const injuries = p.injuryAssessments || p.injuries || [];

  fetch(API, {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ model:MODEL, max_tokens:280,
      system:`You are the BodyLens coach. Speaking with ${p.name}. Today: ${_today.name} — ${_today.isTraining?'TRAINING ('+_today.plan.type+')':'REST DAY'}. Calories: ${p.calories}. Protein: ${p.protein}g. ${injuries.length?'Injuries: '+injuries.map(i=>i.location||i).join(', ')+'.':''} ${isFemale?'Female.':''} Be direct, personal, under 120 words. Flowing prose, no bullets.`,
      messages:[{role:'user',content:msg}]
    })
  })
  .then(r=>r.json())
  .then(data => {
    const text = (data.content||[]).map(b=>b.text||'').join('').trim();
    answer.innerHTML = text.split(/\n\n+/).map(p=>`<p>${p.trim()}</p>`).join('');
  })
  .catch(() => { answer.innerHTML = '<p style="color:var(--dk-3)">Something went wrong — try again</p>'; })
  .finally(() => {
    _askInFlight = false;
    if (sendBtn) sendBtn.disabled = false;
  });
}

// ── MEAL ENRICHMENT ───────────────────────────────────
function enrichMeals(profile, today) {
  const mealSlots = document.querySelectorAll('[data-slot]');
  if (!mealSlots.length) return;
  const p = profile;
  const prompt = `Meal names for ${p.name}. Return JSON only.
Diet: ${p.dietType||'flexible'} | Exclude: ${(p.foodExclusions||[]).join(',')||'none'} | Cuisine: ${(p.cuisinePrefs||[]).join(',')||'neutral'}
Today: ${today.isTraining ? 'training ('+today.plan.type+')' : 'rest day'}
Return: {"pre-training":"name","post-training":"name","midday":"name","afternoon":"name","evening":"name"}
Short names only. Only include applicable slots.`;
  fetch(API,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:MODEL,max_tokens:100,system:'Return only valid JSON.',messages:[{role:'user',content:prompt}]})})
  .then(r=>r.json()).then(data=>{
    const text=(data.content||[]).map(b=>b.text||'').join('').trim();
    const m=text.match(/\{[\s\S]*\}/);
    if(!m)return;
    const meals=JSON.parse(m[0]);
    Object.entries(meals).forEach(([slot,name])=>{
      const block=document.querySelector(`[data-slot="${slot}"] .tl-title`);
      if(block&&name)block.textContent=name;
    });
  }).catch(()=>{});
}

// ── ACCELERATOR ───────────────────────────────────────
function pickAccelerator(profile, today) {
  const goal = (profile.goal||'').toLowerCase();
  const age  = profile.age||35;
  const cands = [];
  if (!today.isTraining) {
    cands.push({name:'Extended overnight fast',why:'Rest day — ideal window. No performance cost. Fat oxidation elevated all morning.',url:'bodylens-accelerators.html'});
    cands.push({name:'NSDR session today',why:'20 minutes of yoga nidra raises dopamine 65% and restores focus as well as 90 min of sleep.',url:'bodylens-accelerators.html'});
  } else {
    cands.push({name:'Post-training walk',why:'10 min after your post-session meal drops glucose 20-30% and keeps GLP-1 elevated.',url:'bodylens-accelerators.html'});
    cands.push({name:'Dopamine scheduling',why:'No social media before training. The contrast makes the session dopamine hit land harder.',url:'bodylens-accelerators.html'});
  }
  if (goal.includes('fat')||goal.includes('los')) cands.unshift({name:'NEAT target: +3,000 steps',why:'Easiest caloric deficit available. 3,000 extra steps = ~150 kcal without touching food or training.',url:'bodylens-accelerators.html'});
  if (age >= 40) cands.push({name:'Zone 2 cardio — 20 min today',why:`At ${age}, VO₂max is the primary longevity lever. 20 min at conversational pace today.`,url:'bodylens-accelerators.html'});
  return cands[0];
}

// ── REGENERATE ────────────────────────────────────────
window.regenerate = function() {
  try { localStorage.removeItem(_today.cacheKey); } catch(e){}
  location.reload();
};

window.sendAsk = sendAsk;

// ── MAIN ──────────────────────────────────────────────
const _profile = loadProfile();

if (!_profile) {
  document.getElementById('day-root').innerHTML = `
    <div style="text-align:center;padding:80px 24px;">
      <div style="font-size:44px;margin-bottom:16px;">💪</div>
      <div style="font-family:var(--serif);font-size:28px;font-weight:300;color:var(--dk-1);margin-bottom:10px;">Let's build your programme</div>
      <div style="font-size:14px;font-weight:300;color:var(--dk-2);margin-bottom:28px;">Answer a few questions and your personalised daily plan will be ready in minutes.</div>
      <a href="bodylens-onboard.html" style="display:inline-block;background:var(--jade);color:var(--ink);padding:12px 28px;border-radius:6px;font-size:13px;font-weight:600;text-decoration:none;">Get started →</a>
    </div>`;
  document.getElementById('week-strip').style.display = 'none';
} else {
  // Nav
  const nm = document.getElementById('nav-meta');
  if (nm) nm.innerHTML = `<span class="nav-tag nt-jade">${_profile.name}</span>`;

  // Today context — declared BEFORE anything uses it
  const _today = getTodayContext(_profile);
  window._today = _today;

  // Programme week indicator
  const progCtx = getWeekProgrammeContext(_profile);

  // Init macro state
  initMacroState(_profile, _today);

  // Week strip
  renderWeekStrip(_profile, _today);

  // Cache check
  let plan = null;
  try {
    const cached = localStorage.getItem(_today.cacheKey);
    if (cached) plan = JSON.parse(cached);
  } catch(e) {}

  if (!plan || !plan.blocks || plan.blocks.length < 3) {
    plan = buildPlan(_profile, _today);
    try { localStorage.setItem(_today.cacheKey, JSON.stringify(plan)); } catch(e){}
  }

  // Render
  renderPlan(plan);

  // Programme week strip (inject after render)
  const accSlot = document.getElementById('acc-strip-here');
  if (accSlot) {
    const dots = [1,2,3,4].map(w=>`<div class="wps-dot ${w<progCtx.weekNum?'done':w===progCtx.weekNum?'current':''}"></div>`).join('');
    accSlot.innerHTML = `
      <div class="week-prog-strip">
        <div>
          <div class="wps-label">Programme progress</div>
          <div class="wps-dots">${dots}</div>
        </div>
        <div style="text-align:right">
          <div class="wps-week">Week ${progCtx.weekNum} of 4</div>
          <div class="wps-phase">${progCtx.phase} phase</div>
        </div>
      </div>`;
    // Accelerator
    const acc = pickAccelerator(_profile, _today);
    if (acc) {
      accSlot.innerHTML += `<div class="acc-strip">
        <div><div class="as-eyebrow">💡 Accelerator — optional</div><div class="as-title">${acc.name}</div><div class="as-why">${acc.why}</div></div>
        <a href="${acc.url}" class="as-btn">More →</a>
      </div>`;
    }
  }

  // Chips + ask bar
  setupChips(_profile, _today);
  const askInput = document.getElementById('ask-input');
  const askSend  = document.getElementById('ask-send');
  if (askSend) askSend.addEventListener('click', () => sendAsk());
  if (askInput) askInput.addEventListener('keydown', e => { if (e.key==='Enter') sendAsk(); });

  // Meal name enrichment (background)
  enrichMeals(_profile, _today);
}
</script>
