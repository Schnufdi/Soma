<style>
body { background:var(--ink); color:var(--dk-1); }
.page { max-width:720px; margin:0 auto; padding:0 24px 120px; }

/* Hero */
.day-hero { padding:36px 0 24px; border-bottom:1px solid var(--bd); margin-bottom:24px; }
.day-kicker { font-size:10px; font-weight:600; letter-spacing:0.2em; text-transform:uppercase; color:var(--jade); margin-bottom:8px; }
.day-title { font-family:var(--serif); font-size:42px; font-weight:300; line-height:1; letter-spacing:-0.02em; color:var(--dk-1); margin-bottom:8px; }
.day-brief { font-size:13px; font-weight:300; color:var(--dk-2); line-height:1.7; margin-bottom:12px; }
.day-priority { display:inline-flex; align-items:center; gap:8px; font-size:11px; font-weight:500; color:var(--jade); background:var(--jade-dim); border:1px solid var(--jade-br); padding:5px 12px; border-radius:20px; }
.day-priority::before { content:'→'; }

/* Macro strip */
.day-macros { display:grid; grid-template-columns:repeat(4,1fr); gap:1px; background:var(--bd); border-radius:8px; overflow:hidden; margin-bottom:16px; }
.dm { background:var(--ink-2); padding:14px 10px; text-align:center; }
.dm-val { font-family:var(--mono); font-size:20px; font-weight:500; color:var(--dk-1); margin-bottom:3px; }
.dm-val.jade { color:var(--jade); }
.dm-val.amber { color:var(--amber); }
.dm-label { font-size:9px; font-weight:600; letter-spacing:0.1em; text-transform:uppercase; color:var(--dk-3); }
.water-strip { font-size:11px; font-weight:300; color:rgba(100,180,220,0.7); background:rgba(74,143,168,0.07); border:1px solid rgba(74,143,168,0.15); border-radius:4px; padding:7px 12px; margin-bottom:24px; }

/* Timeline */
.tl-label { font-size:9px; font-weight:600; letter-spacing:0.18em; text-transform:uppercase; color:var(--dk-3); margin-bottom:12px; display:flex; align-items:center; gap:10px; }
.tl-label::after { content:''; flex:1; height:1px; background:var(--bd); }

.tl-block {
  background:var(--ink-2); border:1px solid var(--bd); border-radius:8px;
  margin-bottom:8px; overflow:hidden; cursor:pointer;
  transition:border-color 0.15s;
}
.tl-block:hover { border-color:var(--bd-2); }
.tl-block.open { border-color:var(--bd-2); }

/* Type accents */
.tl-block.type-wake    { border-left:3px solid var(--jade); }
.tl-block.type-supp    { border-left:3px solid var(--gold); }
.tl-block.type-meal    { border-left:3px solid var(--amber); }
.tl-block.type-training { border-left:3px solid var(--jade); background:rgba(0,200,160,0.03); }
.tl-block.type-recovery { border-left:3px solid var(--dk-3); }
.tl-block.type-sleep   { border-left:3px solid #4a6070; }
.tl-block.type-hydration { border-left:3px solid rgba(74,143,168,0.6); }

.tl-head { display:flex; align-items:center; gap:12px; padding:13px 16px; }
.tl-time { font-family:var(--mono); font-size:12px; font-weight:500; color:var(--dk-3); width:44px; flex-shrink:0; }
.tl-main { flex:1; min-width:0; }
.tl-title { font-size:14px; font-weight:500; color:var(--dk-1); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.tl-block.type-training .tl-title { color:var(--jade); }
.tl-subtitle { font-size:11px; font-weight:300; color:var(--dk-3); margin-top:1px; }
.tl-tag { font-size:9px; font-weight:600; letter-spacing:0.06em; text-transform:uppercase; padding:3px 9px; border-radius:10px; flex-shrink:0; }
.tl-tag.jade  { color:var(--jade);  background:var(--jade-dim);               border:1px solid var(--jade-br); }
.tl-tag.amber { color:var(--amber); background:rgba(196,124,24,0.08);         border:1px solid var(--amber-br); }
.tl-tag.gold  { color:var(--gold);  background:rgba(200,148,30,0.08);         border:1px solid rgba(200,148,30,0.2); }
.tl-tag.slate { color:var(--dk-3);  background:var(--ink-3,var(--ink-1));     border:1px solid var(--bd); }
.tl-tag.blue  { color:rgba(100,180,220,0.8); background:rgba(74,143,168,0.08); border:1px solid rgba(74,143,168,0.2); }
.tl-chevron { font-size:11px; color:var(--dk-3); flex-shrink:0; transition:transform 0.18s; }
.tl-block.open .tl-chevron { transform:rotate(180deg); }

.tl-body { display:none; padding:0 16px 14px 72px; }
.tl-block.open .tl-body { display:block; }
.tl-detail { font-size:13px; font-weight:300; color:var(--dk-2); line-height:1.8; margin-bottom:10px; }
.tl-science { font-size:11px; font-weight:300; color:var(--dk-3); line-height:1.65; padding:8px 12px; background:var(--ink-3,var(--ink-1)); border-radius:4px; border-left:2px solid var(--bd); margin-bottom:10px; }
.tl-items { display:flex; flex-wrap:wrap; gap:6px; }
.tl-item { background:var(--ink-1); border:1px solid var(--bd); border-radius:4px; padding:5px 10px; }
.tl-item-name { font-size:11px; font-weight:500; color:var(--dk-1); }
.tl-item-meta { font-size:10px; font-weight:300; color:var(--dk-3); margin-left:4px; }

/* Ask bar */
.ask-wrap { margin-top:28px; }
.ask-sec { font-size:9px; font-weight:600; letter-spacing:0.18em; text-transform:uppercase; color:var(--dk-3); margin-bottom:10px; display:flex; align-items:center; gap:10px; }
.ask-sec::after { content:''; flex:1; height:1px; background:var(--bd); }
.ask-chips { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:10px; }
.ask-chip { background:var(--ink-2); border:1px solid var(--bd); border-radius:20px; padding:6px 14px; font-size:11px; font-weight:400; color:var(--dk-3); cursor:pointer; transition:all 0.12s; }
.ask-chip:hover { border-color:rgba(0,200,160,0.4); color:var(--jade); }
.ask-input-row { display:flex; gap:8px; }
.ask-input { flex:1; background:var(--ink-2); border:1px solid var(--bd); border-radius:8px; padding:10px 14px; font-size:13px; font-family:var(--sans); color:var(--dk-1); outline:none; transition:border-color 0.12s; }
.ask-input:focus { border-color:rgba(0,200,160,0.35); }
.ask-input::placeholder { color:var(--dk-3); }
.ask-send { width:38px; height:38px; background:var(--jade); border:none; border-radius:8px; cursor:pointer; font-size:16px; font-weight:700; color:var(--ink); flex-shrink:0; transition:opacity 0.12s; }
.ask-send:hover { opacity:0.85; }
.ask-answer { margin-top:12px; padding:14px 16px; background:var(--ink-2); border:1px solid var(--bd); border-left:3px solid var(--jade); border-radius:0 6px 6px 0; font-size:13px; font-weight:300; color:var(--dk-2); line-height:1.8; display:none; }
.ask-answer p { margin:0 0 8px; }
.ask-answer p:last-child { margin:0; }
.ask-answer ul { margin:6px 0; padding-left:18px; }
.ask-answer li { margin-bottom:4px; }
.ask-answer strong { color:var(--dk-1); font-weight:500; }

/* Loading */
.loading-state { padding:60px 0; text-align:center; }
.loading-spinner { width:32px; height:32px; border:2px solid var(--bd); border-top-color:var(--jade); border-radius:50%; animation:spin 0.8s linear infinite; margin:0 auto 16px; }
@keyframes spin { to { transform:rotate(360deg); } }
.loading-text { font-size:13px; font-weight:300; color:var(--dk-3); }

/* Regen */
.fp-spinner { width:24px; height:24px; border:2px solid var(--bd); border-top-color:var(--amber); border-radius:50%; animation:spin 0.8s linear infinite; margin:8px auto; }
.fp-loading { padding:24px 0; text-align:center; }
.fp-load-text { font-size:11px; font-weight:300; color:var(--dk-3); margin-top:8px; }

.regen-btn { background:transparent; border:1px solid var(--bd); color:var(--dk-3); padding:7px 16px; border-radius:20px; font-size:10px; font-weight:500; letter-spacing:0.04em; cursor:pointer; font-family:var(--sans); margin-top:20px; transition:all 0.12s; }

  .day-title { font-size:32px; }

<script>
// ════════════════════════════════════════════════════════
//  bodylens-dailyplan.html
//  Pure JS daily plan — no BL_GENERATOR, no complex state
//  All variables declared before use
// ════════════════════════════════════════════════════════

const API   = '/api/chat';
const MODEL = 'claude-sonnet-4-20250514';

// ── 1. LOAD PROFILE ───────────────────────────────────
function loadProfile() {
  try { return JSON.parse(localStorage.getItem('bl_profile') || 'null'); }
  catch(e) { return null; }
}

// ── 2. WORK OUT TODAY ─────────────────────────────────
function getTodayContext(profile) {
  const DAY_NAMES = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
  const DAY_MAP   = {0:6, 1:0, 2:1, 3:2, 4:3, 5:4, 6:5};
  const idx       = DAY_MAP[new Date().getDay()];
  const name      = DAY_NAMES[idx];
  const plan      = (profile.weekPlan || [])[idx] || { type:'Rest', focus:'Recovery', priority:'rest' };
  const isTraining = plan.priority === 'training';
  const cacheKey  = 'dayplan_v3_' + new Date().toISOString().slice(0, 10);
  return { idx, name, plan, isTraining, cacheKey };
}

// ── 3. BUILD PLAN FROM PROFILE ────────────────────────
function buildPlan(profile, today) {
  const p = profile;
  const { name, plan, isTraining } = today;

  // Time helper
  const wake = p.wakeTime || '07:00';
  const [wHr, wMin] = wake.split(':').map(Number);
  const wMins = wHr * 60 + wMin;
  const fmt = (totalMins) => {
    const h = Math.floor(totalMins / 60) % 24;
    const m = totalMins % 60;
    return String(h).padStart(2,'0') + ':' + String(m).padStart(2,'0');
  };

  // Derived times
  const coffeeTime  = fmt(wMins + 90);
  const isFemale    = (p.sex||'').toLowerCase() === 'female';
  const injuries    = p.injuryAssessments || p.injuries || [];
  const supps       = p.supplements || [];
  const kcal        = plan.kcal || p.calories || 2000;
  const prot        = p.protein || 140;
  const carbs       = p.carbs   || 160;
  const fat         = p.fat     || 60;
  const water       = Math.round((p.weight || 75) * 35 + (isTraining ? 500 : 0));
  const window_str  = p.actualEatingWindow || p.fastingWindow || p.eatingWindow || 'flexible';
  const mealCount   = p.mealCount || 3;

  // Training time
  const trainTimeStr = (p.trainingTime || 'Morning').toLowerCase();
  const trainMins =
    trainTimeStr.includes('early')    ? wMins + 60  :
    trainTimeStr.includes('morning')  ? wMins + 120 :
    trainTimeStr.includes('lunch')    ? 12 * 60     :
    trainTimeStr.includes('afternoon')? 15 * 60     :
    trainTimeStr.includes('evening')  ? 18 * 60     : wMins + 120;

  // Supplements by timing
  const mornSupps  = supps.filter(s => /morning|wake|before train/i.test(s.timing||''));
  const nightSupps = supps.filter(s => /night|sleep|evening|bed/i.test(s.timing||''));

  // Bedtime
  const bed = p.bedtime || '';
  const bedMins =
    bed.includes('Before 10') ? 21*60+30 :
    bed.includes('10–11')     ? 22*60    :
    bed.includes('11')        ? 22*60+30 :
    bed.includes('midnight')  ? 23*60+30 : 22*60;

  const blocks = [];

  // WAKE
  blocks.push({
    time: wake, type: 'wake', tag: 'Wake', tagColor: 'jade',
    title: 'Morning ignition',
    subtitle: 'Cortisol peak · Circadian set',
    detail: 'No phone for 5 minutes. 500ml water immediately — you\'ve been fasting 7-8 hours.\n\nOutside for 10 minutes: morning light sets your circadian clock and determines tonight\'s melatonin timing.' + (isTraining && trainMins - wMins <= 90 ? '\n\nCollagen + Vit C at ' + fmt(trainMins - 45) + ' — 45 min before training.' : ''),
    science: 'Cortisol peaks 30-45 min post-wake. It\'s doing caffeine\'s job — don\'t double up.',
    items: [{ name:'Water', meta:'500ml immediately' }, { name:'Sunlight', meta:'10 min outside' }]
  });

  // COFFEE + MORNING SUPPS
  blocks.push({
    time: coffeeTime, type: 'supp', tag: 'Supps', tagColor: 'gold',
    title: 'Coffee & morning supplements',
    subtitle: '90 min post-wake — after cortisol peak',

    science: 'Protein every 3-4 hours sustains MPS throughout the day.',

  // AFTERNOON (if 4+ meals)

  // EVENING MEAL
  const eveningMins = Math.max(middayMins + 210, 18*60);

    window_str.includes('20:') ? 20*60 :

  blocks.push({
    time: fmt(eveningMins), type: 'meal', tag: 'Eat', tagColor: 'amber',

      ((p.recoveryTools||[]).length ? '\nRecovery: ' + (p.recoveryTools||[]).slice(0,2).join(', ') + ' if available.' : ''),
    science: 'Core temperature drop signals sleep onset. Magnesium activates GABA for sleep transition.',

      ...nightSupps.map(s => ({ name:s.name, meta:s.dose })),

  blocks.push({

  return {

      : 'Recovery day. The adaptation from your last session is happening now. Protein + sleep.',

// ── STRENGTH BENCHMARKS ──────────────────────────────
// Based on Symmetric Strength / ExRx standards
// Returns { beginner, intermediate, advanced } as % of bodyweight
const STRENGTH_STANDARDS = {
  // { m: [beg, int, adv], f: [beg, int, adv] } as bodyweight multipliers
  'bench press':    { m:[0.5,1.0,1.5], f:[0.25,0.6,1.0] },
  'squat':          { m:[0.75,1.25,1.75], f:[0.5,1.0,1.5] },
  'deadlift':       { m:[1.0,1.5,2.0], f:[0.75,1.25,1.75] },
  'overhead press': { m:[0.3,0.65,1.0], f:[0.15,0.4,0.65] },
  'ohp':            { m:[0.3,0.65,1.0], f:[0.15,0.4,0.65] },
  'row':            { m:[0.5,0.9,1.3], f:[0.3,0.6,0.9] },
  'barbell row':    { m:[0.5,0.9,1.3], f:[0.3,0.6,0.9] },
  'pull-up':        { m:[0,0.2,0.5],   f:[0,0.1,0.35] }, // extra plates as fraction
  'pull up':        { m:[0,0.2,0.5],   f:[0,0.1,0.35] },
  'romanian deadlift':{ m:[0.7,1.1,1.6], f:[0.5,0.8,1.2] },
  'rdl':            { m:[0.7,1.1,1.6], f:[0.5,0.8,1.2] },
  'hip thrust':     { m:[0.9,1.4,1.9], f:[0.7,1.2,1.7] },
  'lateral raise':  { m:[0.06,0.12,0.2], f:[0.04,0.08,0.14] },
  'bicep curl':     { m:[0.2,0.4,0.6], f:[0.1,0.2,0.4] },
  'tricep':         { m:[0.15,0.35,0.55], f:[0.08,0.2,0.35] },
  'leg press':      { m:[1.5,2.5,3.5], f:[1.0,1.8,2.6] },
  'leg curl':       { m:[0.3,0.55,0.8], f:[0.2,0.4,0.65] },
  'calf raise':     { m:[0.8,1.4,2.0], f:[0.6,1.0,1.5] },
};

function getStandard(exerciseName, weight, isFemale, age) {
  const name = exerciseName.toLowerCase();
  let std = null;
  for (const [key, val] of Object.entries(STRENGTH_STANDARDS)) {
    if (name.includes(key)) { std = val; break; }
  }
  if (!std) return null;

  // Age adjustment factor (Wilks-inspired) — strength peaks ~28-35
  const ageFactor = age < 30 ? 0.95 : age < 40 ? 1.0 : age < 50 ? 0.93 : age < 60 ? 0.85 : 0.78;

  const mults = isFemale ? std.f : std.m;
  return {
    beginner:     Math.round(mults[0] * weight * ageFactor),
    intermediate: Math.round(mults[1] * weight * ageFactor),
    advanced:     Math.round(mults[2] * weight * ageFactor),
  };
}

// Age-specific performance note
function getAgeNote(age, isFemale) {
  if (age < 35) return 'Prime neurological adaptation. Focus on technique now — it compounds.';
  if (age < 45) return `At ${age}, recovery takes 72h for heavy sessions. The strength response is unchanged — the timeline isn't.`;
  if (age < 55) return `At ${age}, progressive overload works identically. Deloads matter more. Sleep is the primary recovery lever.`;
  return `At ${age}, the training stimulus is as effective as ever. ${isFemale ? 'Resistance training is protecting bone density and insulin sensitivity as oestrogen shifts.' : 'GH pulses are smaller — sleep quality is the biggest performance lever available.'}`;
}

// Parse exercise string like "Bench press 4x8-10" or "OHP 3x10"
function parseExercise(str) {
  const schemaMatch = str.match(/(\d+)\s*[xX×]\s*([\d\-]+)/);
  const name = str.replace(/\d+\s*[xX×]\s*[\d\-]+.*/, '').trim();
  return {
    name,
    raw: str,
    sets: schemaMatch ? parseInt(schemaMatch[1]) : 3,
    reps: schemaMatch ? schemaMatch[2] : '8-12',
    schema: schemaMatch ? schemaMatch[0] : '3×8-12',
  };
}

// ── RECIPE DATA (cached per slot+day) ─────────────────
const _recipeCache = {};

async function fetchRecipe(slot, mealName, mealTarget) {
  const cacheKey = slot + '_' + new Date().toISOString().slice(0,10);
  if (_recipeCache[cacheKey]) return _recipeCache[cacheKey];

  const p = _profile;
  const exclusions = (p.foodExclusions||[]).join(', ')||'none';
  const cuisines   = (p.cuisinePrefs||[]).join(', ')||'neutral';

  const prompt = `Give a specific recipe for "${mealName}" for ${p.name}.
Target: ${mealTarget.calories} kcal, ${mealTarget.protein}g protein, ${mealTarget.carbs}g carbs, ${mealTarget.fat}g fat.
Diet: ${p.dietType||'flexible'} | Exclude: ${exclusions} | Cuisine: ${cuisines}
Complexity: ${p.recipeComplexity||'standard'}
${p.recipeComplexity&&p.recipeComplexity.includes('5')?'MAX 5 ingredients.':''}

Return ONLY JSON:
{"name":"exact dish name","description":"one line","calories":0,"protein":0,"carbs":0,"fat":0,
"prepTime":"10 min","servings":1,
"ingredients":[{"name":"ingredient","quantity":"200g"}],
"method":"2-3 sentences, practical prep instructions"}`;

  const res = await fetch('/api/chat', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ model:'claude-sonnet-4-20250514', max_tokens:400,
      system:'Return only valid JSON. No markdown. No preamble.',
      messages:[{role:'user',content:prompt}]
    })
  });
  const data = await res.json();
  const text = (data.content||[]).map(b=>b.text||'').join('').trim();
  const match = text.match(/\{[\s\S]*\}/);
  if (!match) throw new Error('No JSON');
  const recipe = JSON.parse(match[0]);
  _recipeCache[cacheKey] = recipe;
  return recipe;
}

  return `<div class="recipe-card">
    <div class="rc-head">
      <div>
        <div class="rc-meal-name">${recipe.name}</div>
        <div class="rc-meal-desc">${recipe.description||''} · ${recipe.prepTime||''}</div>
      </div>
      <button class="rc-shuffle-btn" id="shuffle-${blockIdx}" onclick="shuffleMeal('${slot}',${blockIdx},this)">↺ Shuffle</button>
    </div>
    <div class="macro-fit">
      <div class="mf-label">How this meal fits your day</div>
      <div class="mf-bars">
        <div class="mf-row">
          <div class="mf-name">Protein</div>
          <div class="mf-bar-wrap"><div class="mf-bar-fill prot" style="width:${pPct}%"></div></div>
          <div class="mf-val">${recipe.protein}g</div>
        </div>
        <div class="mf-row">
          <div class="mf-name">Carbs</div>
          <div class="mf-bar-wrap"><div class="mf-bar-fill carb" style="width:${cPct}%"></div></div>
          <div class="mf-val">${recipe.carbs||0}g</div>
        </div>
        <div class="mf-row">
          <div class="mf-name">Fat</div>
          <div class="mf-bar-wrap"><div class="mf-bar-fill fat" style="width:${fPct}%"></div></div>
          <div class="mf-val">${recipe.fat||0}g</div>
        </div>
        <div class="mf-row">
          <div class="mf-name">Calories</div>
          <div class="mf-bar-wrap"><div class="mf-bar-fill" style="width:${Math.min(100,Math.round(recipe.calories/mealTarget.calories*100))}%;background:rgba(200,200,200,0.3)"></div></div>
          <div class="mf-val">${recipe.calories}</div>
        </div>
      </div>
    </div>
    <div class="rc-ingredients">
      <div class="rc-ing-label">Ingredients</div>
      <div class="rc-ing-list">
        ${(recipe.ingredients||[]).map(ing=>`
          <div class="rc-ing-row">
            <div class="rc-ing-name">${ing.name}</div>
            <div class="rc-ing-qty">${ing.quantity||''}</div>
          </div>`).join('')}
      </div>
    </div>
    <div class="rc-method">
      <div class="rc-method-label">Method</div>
      ${recipe.method||'Prepare as per your usual approach.'}
    </div>
  </div>`;
}

async function expandMealBlock(blockIdx, block) {
  const expandEl = document.getElementById('meal-expand-'+blockIdx);
  if (!expandEl) return;

  if (expandEl.dataset.loaded === 'true') {
    expandEl.style.display = expandEl.style.display === 'none' ? 'block' : 'none';
    return;
  }

  expandEl.style.display = 'block';
  expandEl.innerHTML = '<div class="fp-loading" style="padding:20px 0;"><div class="fp-spinner" style="border-top-color:var(--amber);"></div><div class="fp-load-text">Building recipe…</div></div>';

  try {
    const p = _profile;
    const pPerMeal = Math.round((p.protein||140) / (p.mealCount||4));
    const kPerMeal = Math.round(((window._todayCtx&&window._todayCtx.isTraining ? (window._todayCtx.plan.kcal||p.calories||2000) : Math.round((p.calories||2000)*0.91))) / (p.mealCount||4));
    const mealTarget = { calories: kPerMeal, protein: pPerMeal, carbs: Math.round((p.carbs||160)*0.25), fat: Math.round((p.fat||60)*0.25) };

    const recipe = await fetchRecipe(block.mealSlot||block.title, block.title, mealTarget);
    expandEl.innerHTML = renderRecipeCard(recipe, mealTarget, block.mealSlot||block.title, blockIdx);
    expandEl.dataset.loaded = 'true';
  } catch(e) {
    expandEl.innerHTML = '<div style="padding:16px;color:var(--dk-3);font-size:12px;">Could not load recipe — <button onclick="expandMealBlock('+blockIdx+',window._blocks['+blockIdx+'])" style="color:var(--amber);background:none;border:none;cursor:pointer;">try again</button></div>';
  }
}

async function shuffleMeal(slot, blockIdx, btn) {
  btn.disabled = true;
  btn.innerHTML = '<span class="shuffle-loading"></span>Shuffling…';
  const expandEl = document.getElementById('meal-expand-'+blockIdx);
  if (expandEl) {
    const cacheKey = slot + '_' + new Date().toISOString().slice(0,10);
    delete _recipeCache[cacheKey];
    expandEl.dataset.loaded = 'false';
    await expandMealBlock(blockIdx, window._blocks[blockIdx]);
  }
  btn.disabled = false;
  btn.textContent = '↺ Shuffle';
}

// ── EXERCISE SESSION RENDERER ─────────────────────────
function renderSessionBlock(block) {
  const p = _profile;
  const isFemale = (p.sex||'').toLowerCase() === 'female';
  const age = p.age || 35;
  const weight = p.weight || 75;
  const injuries = p.injuryAssessments || p.injuries || [];
  const exercises = (block.items||[]).filter(e => e.name !== 'Track loads');

  const exCards = exercises.map((ex, i) => {
    const parsed = parseExercise(ex.name);
    const std = getStandard(parsed.name, weight, isFemale, age);
    const injuryMatch = injuries.find(inj =>
      ['knee','back','shoulder','hip','elbow'].some(j =>
        (inj.location||'').toLowerCase().includes(j) &&
        parsed.name.toLowerCase().match(new RegExp(j.slice(0,4)))
      )
    );

    // Determine RPE from schema
    const reps = parseInt((parsed.reps||'10').split('-')[0]);
    const rpe = reps <= 5 ? '8-9' : reps <= 8 ? '7-9' : '7-8';

    const benchHTML = std ? `
      <div class="bench-strip">
        <div class="bench-label">Age-adjusted strength standard — ${age}yr ${isFemale?'female':'male'} · ${weight}kg</div>
        <div class="bench-values">
          <div>${std.beginner}kg</div>
          <div class="you">${std.intermediate}kg ← you</div>
          <div>${std.advanced}kg</div>
        </div>
        <div class="bench-track">
          <div class="bench-fill" style="width:66%"></div>
          <div class="bench-marker" style="left:66%"></div>
        </div>
        <div class="bench-labels">
          <div>Beginner</div>
          <div style="text-align:center">Intermediate</div>
          <div style="text-align:right">Advanced</div>
        </div>
        <div class="bench-age-note">${getAgeNote(age, isFemale)}</div>
      </div>` : '';

    const setsHTML = (() => {
      const rows = [];
      for (let s = 1; s <= parsed.sets; s++) {
        const isLast = s === parsed.sets;
        const intensity = s === 1 ? 'Warm-up: −20% load, focus technique' : isLast ? `Working set: RPE ${rpe} — ${parsed.reps} reps, 1-3 reps from failure` : `Build set: increase load, RPE ${parseInt(rpe)-1}`;
        rows.push(`<div class="set-row"><div class="set-num">Set ${s}</div><div class="set-detail">${intensity}</div></div>`);
      }
      return rows.join('');
    })();

    return `<div class="ex-card" id="ex-${i}">
      <div class="ex-card-head" onclick="document.getElementById('ex-${i}').classList.toggle('open')">
        <div>
          <div class="ex-name">${parsed.name}</div>
        </div>
        <div class="ex-schema">${parsed.schema}</div>
        <div class="ex-rpe">RPE ${rpe}</div>
        <span class="ex-chevron">▾</span>
      </div>
      <div class="ex-body">
        ${injuryMatch ? `<div class="ex-injury-note"><span>⚠ Injury note:</span> ${injuryMatch.location} — ${(injuryMatch.avoidMovements||[]).some(m=>parsed.name.toLowerCase().includes(m.toLowerCase())) ? 'Substitute with: '+(injuryMatch.safeAlternatives||[]).slice(0,2).join(', ') : 'Perform with caution and reduced range of motion.'}</div>` : ''}
        ${benchHTML}
        <div style="font-size:9px;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;color:var(--dk-3);margin-bottom:8px;">Set guide</div>
        <div class="sets-guide">${setsHTML}</div>
        <div style="font-size:11px;font-weight:300;color:var(--dk-3);padding-top:8px;border-top:1px solid var(--bd);">Rest: ${reps<=5?'3-4 min':reps<=8?'2-3 min':'90 sec-2 min'} between sets</div>
      </div>
    </div>`;
  }).join('');

  return `<div class="session-expanded">
    <div class="session-header">
      <div>
        <div class="session-title">${block.title}</div>
        <div class="session-meta">${exercises.length} exercises · ${((window._todayCtx&&window._todayCtx.plan.focus)||'')}</div>
      </div>
    </div>
    ${exCards}
    <div style="margin-top:12px;padding:10px 14px;background:rgba(0,200,160,0.04);border:1px solid var(--jade-br);border-radius:4px;font-size:12px;font-weight:300;color:var(--dk-2);line-height:1.7;">
      ${block.science||'Track every set. Progressive overload — adding load, reps, or density week to week — is the mechanism.'}
    </div>
  </div>`;
}

          <div class="tl-time">${b.time||''}</div>
          <div class="tl-main"><div class="tl-title">${b.title||''}</div>${b.subtitle?`<div class="tl-subtitle">${b.subtitle}</div>`:''}</div>
          ${b.tag?`<span class="tl-tag ${b.tagColor||'slate'}">${b.tag}</span>`:''}
          <span class="tl-chevron">▾</span>
        </div>
        <div class="tl-body">
          ${b.detail?`<div class="tl-detail">${detailHtml}</div>`:''}
          ${b.science?`<div class="tl-science">${b.science}</div>`:''}
          ${itemsHtml?`<div class="tl-items">${itemsHtml}</div>`:''}
        </div>
      </div>`;
    }

    // Meal blocks — tap header to toggle, has recipe expansion below
    if (isMeal) {
      const itemsHtml = (b.items||[]).map(it=>`<div class="tl-item"><span class="tl-item-name">${it.name}</span>${it.meta?`<span class="tl-item-meta">${it.meta}</span>`:''}</div>`).join('');
      return `<div class="tl-block type-meal">
        <div class="tl-head" onclick="toggleMealExpand(${i})">
          <div class="tl-time">${b.time||''}</div>
          <div class="tl-main"><div class="tl-title">${b.title||''}</div>${b.subtitle?`<div class="tl-subtitle">${b.subtitle}</div>`:''}</div>
          <span class="tl-tag amber">Eat</span>
          <span class="tl-chevron" id="meal-chev-${i}">▾</span>
        </div>
        <div class="tl-body" id="meal-body-${i}" style="display:none;">
          <div class="tl-detail"><p>${b.detail||''}</p></div>
          ${itemsHtml?`<div class="tl-items">${itemsHtml}</div>`:''}
          <button style="margin-top:12px;background:transparent;border:1px solid var(--amber-br,rgba(196,124,24,0.3));color:var(--amber);padding:5px 14px;border-radius:14px;font-size:10px;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;cursor:pointer;font-family:var(--sans);"
            onclick="expandMealBlock(${i},window._blocks[${i}])">🍳 View recipe & macros</button>
        </div>
        <div class="recipe-expanded" id="meal-expand-${i}" style="display:none;"></div>
      </div>`;
    }

    // Training block
    if (isTraining) {
      return `<div class="tl-block type-training">
        <div class="tl-head" onclick="toggleSessionExpand(${i})">
          <div class="tl-time">${b.time||''}</div>
          <div class="tl-main"><div class="tl-title">${b.title||''}</div>${b.subtitle?`<div class="tl-subtitle">${b.subtitle}</div>`:''}</div>
          <span class="tl-tag jade">Train</span>
          <span class="tl-chevron" id="sess-chev-${i}">▾</span>
        </div>
        <div class="session-expanded" id="sess-expand-${i}" style="display:none;">
          ${renderSessionBlock(b)}
        </div>
      </div>`;
    }
  }).join('');

  const d = new Date();
  const dateStr = d.toLocaleDateString('en-GB', { weekday:'long', day:'numeric', month:'long' });

  root.innerHTML = `
    <div class="day-hero">
      <div class="day-kicker">${dateStr}</div>
      <div class="day-title">${plan.dayTitle}</div>
      <div class="day-brief">${plan.dayBrief}</div>
      ${plan.priority ? `<div class="day-priority">${plan.priority}</div>` : ''}
    </div>
    <div class="day-macros">
      <div class="dm"><div class="dm-val">${plan.macros.kcal}</div><div class="dm-label">Calories</div></div>
      <div class="dm"><div class="dm-val jade">${plan.macros.prot}g</div><div class="dm-label">Protein</div></div>
      <div class="dm"><div class="dm-val amber">${plan.macros.carbs}g</div><div class="dm-label">Carbs</div></div>
      <div class="dm"><div class="dm-val">${plan.macros.fat}g</div><div class="dm-label">Fat</div></div>
    </div>
    <div class="water-strip">💧 Water target: ${plan.macros.water} — spread across the day</div>
    <div class="tl-label">Your day</div>
    ${blocksHtml}
    <button class="regen-btn" onclick="regenerate()">↺ Regenerate today</button>
    <div class="ask-wrap">
      <div class="ask-sec">Ask your coach</div>
      <div class="ask-chips" id="ask-chips"></div>
      <div class="ask-input-row">
        <input class="ask-input" id="ask-input" type="text" placeholder="Ask anything about today…">
        <button class="ask-send" id="ask-send">↑</button>
      </div>
      <div class="ask-answer" id="ask-answer"></div>
    </div>`;
}

function toggleMealExpand(i) {
  const body = document.getElementById('meal-body-'+i);
  const chev = document.getElementById('meal-chev-'+i);
  if (!body) return;
  const isOpen = body.style.display !== 'none';
  body.style.display = isOpen ? 'none' : 'block';
  if (chev) chev.style.transform = isOpen ? '' : 'rotate(180deg)';
}

function toggleSessionExpand(i) {
  const el  = document.getElementById('sess-expand-'+i);
  const chev = document.getElementById('sess-chev-'+i);
  if (!el) return;
  const isOpen = el.style.display !== 'none';
  el.style.display = isOpen ? 'none' : 'block';
  if (chev) chev.style.transform = isOpen ? '' : 'rotate(180deg)';
}


// ── 5. ASK CHIPS ─────────────────────────────────────
function setupChips(profile, today) {
  const chipsEl = document.getElementById('ask-chips');
  if (!chipsEl) return;

  const injuries = profile.injuryAssessments || profile.injuries || [];
  const isTraining = today.isTraining;
  const chips = isTraining ? [
    'How hard should I push today?',
    'What\'s the most important meal today?',
    injuries.length ? 'My ' + (injuries[0].location||'injury') + ' is niggly' : 'Am I recovered enough?',
    'Swap for one of today\'s exercises?'
  ] : [
    'Rest day — should I do anything?',
    'Same calories on rest days?',
    'How do I make the most of today?',
    'Can I train anyway?'
  ];

  chipsEl.innerHTML = chips.map(c =>
    `<div class="ask-chip" onclick="sendAsk(${JSON.stringify(c)})">${c}</div>`
  ).join('');
}

// ── 6. ASK HANDLER ────────────────────────────────────
let askInFlight = false;

function sendAsk(text) {
  const input  = document.getElementById('ask-input');
  const answer = document.getElementById('ask-answer');
  const send   = document.getElementById('ask-send');
  const msg    = text || (input ? input.value.trim() : '');
  if (!msg || askInFlight) return;
  if (input && !text) input.value = '';
  askInFlight = true;
  if (send) send.disabled = true;

  answer.style.display = 'block';
  answer.innerHTML = '<div class="loading-spinner" style="width:20px;height:20px;margin:8px auto;"></div>';

  const p = _profile;
  const today = _today;
  const isFemale = (p.sex||'').toLowerCase() === 'female';
  const injuries = p.injuryAssessments || p.injuries || [];
  const system = `You are the BodyLens coach — senior performance coach. Speaking with ${p.name}.
Profile: ${p.age}yo ${p.sex}, ${p.weight}kg, goal: ${p.goal}, training ${p.trainingDays}x/week.
Today: ${today.name} — ${today.isTraining ? 'TRAINING ('+today.plan.type+': '+today.plan.focus+')' : 'REST DAY'}.
Calories: ${p.calories} | Protein: ${p.protein}g | Carbs: ${p.carbs}g | Fat: ${p.fat}g.
${injuries.length ? 'Injuries: '+injuries.map(i=>i.location||i).join(', ')+'.' : ''}
${isFemale ? 'Female — apply female physiology where relevant.' : ''}
Be direct and specific. Reference their actual numbers. Use **bold** for key points. Keep under 150 words.`;

  fetch(API, {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({
      model: MODEL, max_tokens: 300,
      system,
      messages:[{ role:'user', content: msg }]
    })
  })
  .then(r => r.json())
  .then(data => {
    if (data.error) throw new Error(data.error.message);
    const text = (data.content||[]).map(b=>b.text||'').join('').trim();
    answer.innerHTML = formatAnswer(text);
  })
  .catch(err => {
    answer.innerHTML = '<p style="color:var(--dk-3)">Something went wrong — try again</p>';
  })
  .finally(() => {
    askInFlight = false;
    if (send) send.disabled = false;
  });
}

function formatAnswer(text) {
  return text
    .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
    .replace(/^[•\-] (.+)$/gm, '<li>$1</li>')
    .replace(/((?:<li>.*<\/li>\n?)+)/g, '<ul>$1</ul>')
    .split(/\n\n+/)
    .map(p => {
      const t = p.trim();
      if (!t || t.startsWith('<ul') || t.startsWith('<li')) return t;
      return `<p>${t}</p>`;
    })
    .join('') || `<p>${text}</p>`;
}

// ── 7. MEAL ENRICHMENT ────────────────────────────────
function enrichMeals(profile, today) {
  const mealSlots = document.querySelectorAll('[data-slot]');
  if (!mealSlots.length) return;

  const p = profile;
  const prompt = `Give specific meal names for ${p.name}. Return ONLY a JSON object, no other text.
Diet: ${p.dietType||'flexible'} | Exclude: ${(p.foodExclusions||[]).join(', ')||'none'}
Cuisine: ${(p.cuisinePrefs||[]).join(', ')||'neutral'} | Complexity: ${p.recipeComplexity||'standard'}
Today: ${today.isTraining ? 'training ('+today.plan.type+')' : 'rest day'}
Calories: ${p.calories} | Protein: ${p.protein}g

Return: {"pre-training":"meal name","post-training":"meal name","midday":"meal name","afternoon":"meal name","evening":"meal name"}
Only include applicable slots. Short meal names only. No descriptions.`;

  fetch(API, {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({
      model: MODEL, max_tokens: 120,
      system: 'Return only valid JSON. No markdown. No preamble.',
      messages:[{ role:'user', content: prompt }]
    })
  })
  .then(r => r.json())
  .then(data => {
    const text = (data.content||[]).map(b=>b.text||'').join('').trim();
    const match = text.match(/\{[\s\S]*\}/);
    if (!match) return;
    const meals = JSON.parse(match[0]);
    Object.entries(meals).forEach(([slot, mealName]) => {
      const block = document.querySelector(`[data-slot="${slot}"]`);
      if (!block || !mealName) return;
      const titleEl = block.querySelector('.tl-title');
      if (titleEl) titleEl.textContent = mealName;
    });
  })
  .catch(() => {}); // fail silently — generic titles are fine
}

// ── 8. REGENERATE ─────────────────────────────────────
function regenerate() {
  try { localStorage.removeItem(_today.cacheKey); } catch(e) {}
  location.reload();
}

// ── 9. MAIN ───────────────────────────────────────────
// All variables declared here, in order, before anything runs
const _profile = loadProfile();

if (!_profile) {
  document.getElementById('day-root').innerHTML = `
    <div style="text-align:center;padding:80px 24px;">
      <div style="font-size:44px;margin-bottom:16px;">💪</div>
      <div style="font-family:var(--serif);font-size:28px;font-weight:300;color:var(--dk-1);margin-bottom:10px;">Let's build your programme</div>
      <div style="font-size:14px;font-weight:300;color:var(--dk-2);margin-bottom:28px;">Answer a few questions and your personalised daily plan will be ready in minutes.</div>
      <a href="bodylens-onboard.html" style="display:inline-block;background:var(--jade);color:var(--ink);padding:12px 28px;border-radius:6px;font-size:13px;font-weight:600;letter-spacing:0.04em;text-decoration:none;">Get started →</a>
    </div>`;
} else {
  // Set nav name
  const nm = document.getElementById('nav-meta');
  if (nm) nm.innerHTML = `<span class="nav-tag nt-jade">${_profile.name}</span>`;

  // Get today context — AFTER profile is loaded
  const _today = getTodayContext(_profile);
  window._todayCtx = _today; // expose for render functions

  // Check cache
  let plan = null;
  try {
    const cached = localStorage.getItem(_today.cacheKey);
    if (cached) plan = JSON.parse(cached);
  } catch(e) {}

  if (!plan || !plan.blocks || plan.blocks.length < 3) {
    // Build from profile
    plan = buildPlan(_profile, _today);
    try { localStorage.setItem(_today.cacheKey, JSON.stringify(plan)); } catch(e) {}
  }

  // ── PICK TODAY'S ACCELERATOR ──────────────────────
  function pickAccelerator(profile, today) {
    const goal = (profile.goal||'').toLowerCase();
    const isTraining = today.isTraining;
    const age = profile.age || 35;
    const isFemale = (profile.sex||'').toLowerCase() === 'female';
    const dayOfWeek = new Date().getDay(); // 0=Sun
    const stress = (profile.stressLevel||'').toLowerCase();
    const saved = profile.accelerators || [];

    // Candidates — picked contextually based on day type, goal, profile
    const candidates = [];

    if (!isTraining) {
      // Rest day — fasting and recovery accelerators
      candidates.push({ name:'Extended overnight fast', why:'Rest day tomorrow — ideal window for a 16-hour fast. No performance cost. Fat oxidation elevated all morning.', url:'bodylens-accelerators.html#fast-16-8' });
      candidates.push({ name:'NSDR session this afternoon', why:'Rest day recovery. 20 minutes of yoga nidra raises dopamine 65% and restores cognitive function as well as 90 minutes of sleep.', url:'bodylens-accelerators.html#nsdr' });
    } else {
      // Training day
      candidates.push({ name:'Post-training walks', why:'A 10-minute walk after your post-training meal today drops glucose by 20-30% and elevates GLP-1 for appetite control.', url:'bodylens-accelerators.html#post-meal-walks' });
      candidates.push({ name:'Dopamine scheduling before training', why:'Hold off on social media and news until after your session. The contrast effect means the training dopamine release lands harder.', url:'bodylens-accelerators.html#dopamine-scheduling' });
    }

    if (goal.includes('fat')||goal.includes('los')||goal.includes('cut')) {
      if (!isTraining) candidates.unshift({ name:'Extended overnight fast', why:'You're in a fat loss phase. A 16-hour fast on your rest day adds meaningful fat oxidation time with zero muscle cost if protein stays high.', url:'bodylens-accelerators.html#fast-16-8' });
      candidates.push({ name:'NEAT maximisation today', why:'3,000 extra steps is roughly 150 kcal. Over a week that's a meaningful deficit without touching training or food.', url:'bodylens-accelerators.html#neat' });
    }

    if (goal.includes('muscle')||goal.includes('build')) {
      candidates.push({ name:'Training log tonight', why:'Write every set before you forget. Next week's progressive overload depends on knowing today's exact numbers.', url:'bodylens-accelerators.html#training-log' });
    }

    if (age >= 40) {
      if (dayOfWeek === 3 || dayOfWeek === 6) { // Wed or Sat
        candidates.push({ name:'Zone 2 cardio today', why:`At ${age}, VO₂max is the primary longevity lever. Even 20 minutes at conversational pace builds the mitochondrial base that determines how you feel at 60.`, url:'bodylens-accelerators.html#zone2' });
      }
    }

    if (stress.includes('high')) {
      candidates.push({ name:'NSDR — 20 min today', why:'Your stress level is high. A single NSDR session drops cortisol meaningfully and partially reverses the hormonal cost of chronic stress.', url:'bodylens-accelerators.html#nsdr' });
    }

    // Filter out already-saved ones after first 3 uses
    const unseen = candidates.filter(c => !saved.includes(c.url?.split('#')[1]||''));
    return (unseen.length ? unseen : candidates)[0] || null;
  }

  // ── RENDER ────────────────────────────────────────
  const _acc = pickAccelerator(_profile, _today);
  // Render
  renderPlan(plan, _today.name);

  // Inject accelerator strip after water-strip
  if (_acc) {
    const waterStrip = document.querySelector('.water-strip');
    if (waterStrip) {
      const stripEl = document.createElement('div');
      stripEl.className = 'acc-strip';
      stripEl.innerHTML = `
        <div class="as-left">
          <div class="as-eyebrow">💡 Accelerator — optional for today</div>
          <div class="as-title">${_acc.name}</div>
          <div class="as-why">${_acc.why}</div>
        </div>
        <a href="bodylens-accelerators.html" class="as-btn">Read more →</a>`;
      waterStrip.parentNode.insertBefore(stripEl, waterStrip.nextSibling);
    }
  }
  setupChips(_profile, _today);

  // Wire up ask bar
  const askInput = document.getElementById('ask-input');
  const askSend  = document.getElementById('ask-send');
  if (askSend) askSend.addEventListener('click', () => sendAsk());
  if (askInput) askInput.addEventListener('keydown', e => {
    if (e.key === 'Enter') sendAsk();
  });

  // Enrich meals async (background, non-blocking)
  enrichMeals(_profile, _today);

  // Make regenerate work with correct scope
  window.regenerate = function() {
    try { localStorage.removeItem(_today.cacheKey); } catch(e) {}
    location.reload();
  };
  window.sendAsk = sendAsk;
}
</script>
