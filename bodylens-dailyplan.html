];

let _quizAnswers = [], _currentQ = 0, _quizBlockIdx = 0;

function getLevelResult(score) {
  if (score < 0.25) return {label:'Beginner',           desc:'Programme focuses on patterns and capacity. Loads conservative — technique first. Rapid early gains ahead.',                                tier:'beginner'};
  if (score < 0.42) return {label:'Low-intermediate',   desc:'You have the basics. Lifts established, loads building. Good gains with progressive overload.',                                              tier:'intermediate'};
  if (score < 0.60) return {label:'Intermediate',       desc:'Solid base across main movements. Proper periodisation applied. Gains require deliberate effort from here.',                                 tier:'intermediate'};
  if (score < 0.75) return {label:'Upper-intermediate', desc:'Strong foundation with real training history. High intensity with managed volume for recovery.',                                              tier:'advanced'};
  return              {label:'Advanced',                desc:"You've been doing this a while. High intensity, assumes good technique, focuses on the details that matter.",                                tier:'advanced'};
}

function renderQuizPanel() {
  const q = QUIZ_QUESTIONS[_currentQ];
  const total = QUIZ_QUESTIONS.length;
  const hasAns = !!_quizAnswers[_currentQ];
  const isLast = _currentQ === total - 1;

  const dots = QUIZ_QUESTIONS.map((_,i) =>
    `<div class="lq-prog-dot ${i<_currentQ?'done':i===_currentQ?'current':''}"></div>`
  ).join('');

  const opts = q.opts.map((opt,i) => `
    <div class="lq-opt ${hasAns && _quizAnswers[_currentQ]===opt?'selected':''}"
      onclick="window.quizSelect(${i})">
      <div class="lq-opt-label">${opt.label}</div>
      <div class="lq-opt-val">${opt.note}</div>
    </div>`).join('');

  document.getElementById('rph-title').textContent = 'Strength assessment';
  document.getElementById('rph-sub').textContent   = 'Q' + (_currentQ+1) + ' of ' + total + ' — takes 2 minutes';
  document.getElementById('day-right').classList.add('open');
  document.getElementById('rpb').innerHTML = `
    <div class="lq-header">
      <div class="lq-kicker">One-time · sets your benchmark accurately</div>
      <div class="lq-title">Where are you right now?</div>
      <div class="lq-sub">5 questions. Benchmark marker placed correctly on every exercise.</div>
    </div>
    <div class="lq-progress">${dots}</div>
    <div class="lq-body">
      <div class="lq-q-text">${q.q}</div>
      <div class="lq-q-note">${q.note}</div>
      <div class="lq-options">${opts}</div>
      <div class="lq-nav">
        ${_currentQ>0?'<button class="lq-back" onclick="window.quizBack()">&#8592; Back</button>':''}
        <button class="lq-next${hasAns?' ready':''}" id="lq-next"
          onclick="${hasAns?(isLast?'window.quizFinish()':'window.quizNext()'):''}">
          ${isLast ? 'See my level &#8594;' : 'Next &#8594;'}
        </button>
      </div>
    </div>`;
}

window.quizSelect = function(i) {
  _quizAnswers[_currentQ] = QUIZ_QUESTIONS[_currentQ].opts[i];
  document.querySelectorAll('.lq-opt').forEach((el,j) => el.classList.toggle('selected', j===i));
  const btn = document.getElementById('lq-next');
  if (btn) {
    btn.classList.add('ready');
    const isLast = _currentQ === QUIZ_QUESTIONS.length - 1;
    btn.setAttribute('onclick', isLast ? 'window.quizFinish()' : 'window.quizNext()');
  }
};
window.quizNext = function() {
  if (!_quizAnswers[_currentQ]) return;
  _currentQ++;
  renderQuizPanel();
};
window.quizBack = function() {
  if (_currentQ > 0) { _currentQ--; renderQuizPanel(); }
};
window.quizFinish = function() {
  if (!_quizAnswers[_currentQ]) return;
  const base = _quizAnswers.slice(0,3).reduce((s,a)=>s+(a?a.score:0),0)/3;
  const mod  = _quizAnswers.slice(3).reduce((s,a)=>s+(a?a.score:0),0);
  const score = Math.min(1, Math.max(0, base + mod));
  const result = getLevelResult(score);
  const pct = Math.round(score*100);
  try {
    const raw = localStorage.getItem('bl_profile');
    if (raw) {
      const p = JSON.parse(raw);
      p.fitnessLevel=score; p.fitnessLevelLabel=result.label;
      p.fitnessLevelTier=result.tier; p.fitnessLevelDate=new Date().toISOString().slice(0,10);
      localStorage.setItem('bl_profile', JSON.stringify(p));
      _profile.fitnessLevel=score; _profile.fitnessLevelLabel=result.label;
      _profile.fitnessLevelTier=result.tier;
    }
  } catch(e){}
  document.getElementById('rpb').innerHTML = `
    <div class="lq-result">
      <div style="font-size:9px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:var(--gold);margin-bottom:6px;">Your level</div>
      <div class="lr-title">${result.label}</div>
      <div class="lr-desc">${result.desc}</div>
      <div class="lr-level-bar">
        <div class="lr-track"><div class="lr-fill" style="width:${pct}%"></div><div class="lr-marker" style="left:${pct}%"></div></div>
        <div class="lr-scale"><span>Beginner</span><span style="text-align:center">Intermediate</span><span>Advanced</span></div>
      </div>
      <div class="lr-actions">
        <button class="lr-save" onclick="openSessionPanel(${_quizBlockIdx},window._blocks[${_quizBlockIdx}])">See my session &#8594;</button>
        <button class="lr-redo" onclick="window.startQuiz(${_quizBlockIdx},window._blocks[${_quizBlockIdx}])">Retake</button>
      </div>
    </div>`;
};
window.startQuiz = function(blockIdx, block) {
  _quizAnswers=[]; _currentQ=0; _quizBlockIdx=blockIdx;
  renderQuizPanel();
};

// ── RENDER PLAN ───────────────────────────────────────
function renderPlan(plan) {
  const root = document.getElementById('day-root');
  window._blocks = plan.blocks;

  const blocksHtml = plan.blocks.map((b, i) => {
    const isMeal     = b.mealSlot;
    const isTraining = b.type === 'training';

    // Non-meal, non-training: expand inline
    if (!isMeal && !isTraining) {
      const det = (b.detail||'').split('\n').map(l=>l.trim()?`<p>${l}</p>`:'').join('');
      const its = (b.items||[]).map(it=>`<div class="tl-item"><span class="tl-item-name">${it.name}</span>${it.meta?`<span class="tl-item-meta">${it.meta}</span>`:''}</div>`).join('');
      return `<div class="tl-block type-${b.type||'supp'}" onclick="this.classList.toggle('open')">
        <div class="tl-head">
          <div class="tl-time">${b.time||''}</div>
          <div class="tl-main"><div class="tl-title">${b.title}</div>${b.subtitle?`<div class="tl-subtitle">${b.subtitle}</div>`:''}</div>
          ${b.tag?`<span class="tl-tag ${b.tagColor||'slate'}">${b.tag}</span>`:''}
          <span class="tl-chevron">&#9662;</span>
        </div>
        <div class="tl-body">${det?`<div class="tl-detail">${det}</div>`:''}${b.science?`<div class="tl-science">${b.science}</div>`:''}${its?`<div class="tl-items">${its}</div>`:''}</div>
      </div>`;
    }

    // Meal blocks — inline expand with tick
    if (isMeal) {
      const slot = b.mealSlot;
      const eaten = _macroState && _macroState.meals[slot] && _macroState.meals[slot].logged;
      const cached = _recipeCache[slot];
      const recipeSection = cached
        ? inlineRecipeHTML(cached, slot, i)
        : `<button class="meal-log-btn show-recipe" onclick="loadInlineRecipe('${slot}',${i},this)">&#127859; Load recipe</button>`;
      return `<div class="tl-block type-meal ${eaten?'eaten':''}" data-slot="${slot}" id="meal-block-${i}">
        <div class="tl-head" onclick="toggleMealInline(${i})">
          <div class="tl-time">${b.time||''}</div>
          <div class="tl-main">
            <div class="tl-title">${b.title}</div>
            <div class="tl-subtitle" id="sub-${slot}">${b.subtitle||''}</div>
          </div>
          <div style="display:flex;align-items:center;gap:7px;">
            <div class="meal-tick${eaten?' ticked':''}" onclick="event.stopPropagation();quickTick('${slot}',${i})" title="Ate this">${eaten?'&#10003;':''}</div>
            <span class="tl-tag amber">${eaten?'&#10003; Eaten':'Eat'}</span>
            <span class="tl-chevron" id="meal-chev-${i}">&#9662;</span>
          </div>
        </div>
        <div class="meal-inline-body" id="meal-inline-${i}">
          <div class="meal-actions-row">
            <div class="meal-tick${eaten?' ticked':''}" onclick="quickTick('${slot}',${i})" title="Ate this">${eaten?'&#10003;':''}</div>
            <button class="meal-log-btn" onclick="showDeviationLogger('${slot}',${i})">I had something different</button>
          </div>
          <div id="dev-zone-${i}"></div>
          <div id="recipe-zone-${i}">${recipeSection}</div>
        </div>
      </div>`;
    }

    // Training block — quiz first if no level, else session
    if (isTraining) {
      const hasLevel = _profile.fitnessLevel !== undefined;
      const lvlLabel = hasLevel ? (_profile.fitnessLevelLabel||'Intermediate') : null;
      return `<div class="tl-block type-training">
        <div class="tl-head" onclick="${hasLevel?`openSessionPanel(${i},window._blocks[${i}])`:`window.startQuiz(${i},window._blocks[${i}])`}">
          <div class="tl-time">${b.time||''}</div>
          <div class="tl-main">
            <div class="tl-title">${b.title}</div>
            <div class="tl-subtitle">${hasLevel?lvlLabel+' prescription':'Tap to assess your level first'}</div>
          </div>
          <span class="tl-tag jade">${hasLevel?'Session &#8594;':'Assess &#8594;'}</span>
        </div>
      </div>`;
    }
  }).join('');

  const d = new Date();
  const dateStr = d.toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long'});
  const wp = _profile.weeklyProgression;
  const progCtx = getWeekProgrammeContext(_profile);
  const weekTabsHTML = wp ? (() => {
    const tabs = ['week1','week2','week3','week4'].map((wk,i) => {
      const w = wp[wk]; if (!w) return '';
      const wNum = i+1;
      const isDone = wNum < progCtx.weekNum;
      const isCur  = wNum === progCtx.weekNum;
      return `<div class="wt ${isCur?'active':isDone?'done':''}" onclick="showWeekDetail('${wk}')">
        <div class="wt-num">W${wNum}${isDone?' &#10003;':''}</div>
        <div class="wt-phase">${w.phase}</div>
        <div class="wt-note">${(w.keyFocus||w.volumeNote||'').slice(0,50)}</div>
      </div>`;
    }).join('');
    return `<div class="week-tabs">${tabs}</div><div class="week-detail-panel" id="week-detail"></div>`;
  })() : '';

  root.innerHTML = `
    <div class="sticky-macros" id="sticky-macros">${getStickyMacrosHTML()}</div>
    <div class="day-hero">
      <div class="day-kicker">${dateStr}</div>
      <div class="day-title">${plan.dayTitle}</div>
      <div class="day-brief">${plan.dayBrief}</div>
      ${plan.priority?`<div class="day-priority">${plan.priority}</div>`:''}
    </div>
    ${weekTabsHTML}
    <div class="day-macros">
      <div class="dm"><div class="dm-val">${plan.macros.kcal}</div><div class="dm-label">Calories</div></div>
      <div class="dm"><div class="dm-val jade">${plan.macros.prot}g</div><div class="dm-label">Protein</div></div>
      <div class="dm"><div class="dm-val amber">${plan.macros.carbs}g</div><div class="dm-label">Carbs</div></div>
      <div class="dm"><div class="dm-val">${plan.macros.fat}g</div><div class="dm-label">Fat</div></div>
    </div>
    <div class="water-strip">&#128166; ${plan.macros.water} — spread across the day</div>
    <div id="acc-strip-here"></div>
    <div class="tl-label">Your day</div>
    ${blocksHtml}
    <button class="regen-btn" onclick="window.regenerate()">&#8635; Rebuild today</button>
    <div class="ask-wrap">
      <div class="ask-sec">Quick question</div>
      <div class="ask-chips" id="ask-chips"></div>
      <div class="ask-input-row">
        <input class="ask-input" id="ask-input" type="text" placeholder="Ask anything about today&#8230;">
        <button class="ask-send" id="ask-send">&#8593;</button>
      </div>
      <div class="ask-answer" id="ask-answer"></div>
    </div>`;
}

function toggleMealInline(i) {
  const block = document.getElementById('meal-block-'+i);
  const chev  = document.getElementById('meal-chev-'+i);
  if (!block) return;
  const isOpen = block.classList.contains('meal-open');
  block.classList.toggle('meal-open', !isOpen);
  if (chev) chev.innerHTML = isOpen ? '&#9662;' : '&#9652;';
}

function inlineRecipeHTML(recipe, slot, blockIdx) {
  function pct(v,m){return Math.min(100,Math.round(v/Math.max(1,m)*100));}
  const p=_profile;
  const prot=Math.round((p.protein||140)/(p.mealCount||4));
  const carbs=Math.round((p.carbs||160)*0.25);
  const fat=Math.round((p.fat||60)*0.25);
  const kcal=Math.round((_today&&_today.isTraining?(_today.plan.kcal||p.calories||2000):Math.round((p.calories||2000)*0.91))/(p.mealCount||4));
  const ings=(recipe.ingredients||[]).map(i=>`<div class="ir-ing"><span class="ir-ing-name">${i.name}</span><span class="ir-ing-qty">${i.quantity||''}</span></div>`).join('');
  return `<div class="inline-recipe">
    <div class="ir-header">
      <div><div class="ir-name">${recipe.name}</div><div class="ir-desc">${recipe.description||''} &middot; ${recipe.prepTime||''}</div></div>
      <button class="ir-shuffle" id="shuf-${blockIdx}" onclick="shuffleMeal('${slot}',${blockIdx})">&#8635; Shuffle</button>
    </div>
    <div class="ir-macros">
      <div class="ir-mac-row"><div class="ir-mac-label">Protein</div><div class="ir-mac-bar-wrap"><div class="ir-mac-bar p" style="width:${pct(recipe.protein,prot)}%"></div></div><div class="ir-mac-val">${recipe.protein}g</div></div>
      <div class="ir-mac-row"><div class="ir-mac-label">Carbs</div><div class="ir-mac-bar-wrap"><div class="ir-mac-bar c" style="width:${pct(recipe.carbs||0,carbs)}%"></div></div><div class="ir-mac-val">${recipe.carbs||0}g</div></div>
      <div class="ir-mac-row"><div class="ir-mac-label">Fat</div><div class="ir-mac-bar-wrap"><div class="ir-mac-bar f" style="width:${pct(recipe.fat||0,fat)}%"></div></div><div class="ir-mac-val">${recipe.fat||0}g</div></div>
    </div>
    <div class="ir-ingredients">${ings}</div>
    <div class="ir-method">${recipe.method||''}</div>
  </div>`;
}



async function loadInlineRecipe(slot, blockIdx, btn) {
  if (btn) { btn.textContent='Loading…'; btn.disabled=true; }
  const p=_profile;
  const prot=Math.round((p.protein||140)/(p.mealCount||4));
  const kcal=Math.round((_today.isTraining?(_today.plan.kcal||p.calories||2000):Math.round((p.calories||2000)*0.91))/(p.mealCount||4));
  try {
    const recipe = await fetchRecipe(slot, (window._blocks[blockIdx]||{}).title||slot, {calories:kcal,protein:prot,carbs:Math.round((p.carbs||160)*0.25),fat:Math.round((p.fat||60)*0.25)}, false);
    const zone = btn ? btn.parentElement : document.querySelector(`[data-slot="${slot}"] .meal-inline-body`);
    if (zone) zone.innerHTML = inlineRecipeHTML(recipe, slot, blockIdx);
  } catch(e) {
    if (btn) { btn.textContent='Try again'; btn.disabled=false; }
  }
}

function quickTick(slot, blockIdx) {
  // One-tap "ate as planned" — uses recipe macros if cached, else plan macros
  const recipe = _recipeCache[slot];
  const p = _profile;
  const prot = Math.round((p.protein||140)/(p.mealCount||4));
  const kcal = Math.round((_today.isTraining?(_today.plan.kcal||p.calories||2000):Math.round((p.calories||2000)*0.91))/(p.mealCount||4));
  const macros = {
    prot:  recipe ? recipe.protein  : prot,
    carbs: recipe ? (recipe.carbs||0) : Math.round((p.carbs||160)*0.25),
    fat:   recipe ? (recipe.fat||0)  : Math.round((p.fat||60)*0.25),
    kcal:  recipe ? recipe.calories : kcal,
    logged:true, note:'Ate as planned'
  };
  saveMealLog(slot, macros);
  // Update tick visual
  document.querySelectorAll(`[data-slot="${slot}"] .meal-tick`).forEach(el => {
    el.classList.add('ticked'); el.textContent='✓';
  });
  document.querySelectorAll(`[data-slot="${slot}"] .tl-tag`).forEach(el => {
    if (el.classList.contains('amber')) { el.textContent='✓ Eaten'; }
  });
  document.getElementById('meal-block-'+blockIdx)?.classList.add('eaten');
  updateRemainingMeals();
}

function showDeviationLogger(slot, blockIdx) {
  const zone = document.getElementById('dev-zone-'+blockIdx);
  if (!zone) return;
  const existing = zone.querySelector('.dev-inline');
  if (existing) { zone.innerHTML=''; return; }
  zone.innerHTML = `<div class="dev-inline">
    <div class="dev-inline-label">What did you actually have?</div>
    <textarea class="dev-inline-input" id="dvi-${blockIdx}" rows="2"
      placeholder="e.g. chicken wrap from Pret, or bowl of pasta, or just skipped it…"></textarea>
    <button class="dev-inline-send" onclick="submitDeviation('${slot}',${blockIdx})">Estimate macros ↑</button>
    <div id="dvi-result-${blockIdx}"></div>
  </div>`;
}

async function submitDeviation(slot, blockIdx) {
  const input  = document.getElementById('dvi-'+blockIdx);
  const result = document.getElementById('dvi-result-'+blockIdx);
  const btn    = input ? input.parentElement.querySelector('.dev-inline-send') : null;
  const text   = input ? input.value.trim() : '';
  if (!text) return;
  if (btn) { btn.disabled=true; btn.textContent='Estimating…'; }

  const isOnPlan = /as planned|the meal|all of it|had it/i.test(text);
  if (isOnPlan) {
    quickTick(slot, blockIdx);
    if (result) result.innerHTML=`<div class="dev-inline-result"><strong>On plan</strong> — nice.</div>`;
    return;
  }

  try {
    const p = _profile;
    const res = await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:100,
        system:'Nutrition estimator. Return only valid JSON.',
        messages:[{role:'user',content:`Estimate macros: "${text}". Person: ${p.weight||80}kg ${p.sex||'male'}.
Return: {"protein":0,"carbs":0,"fat":0,"calories":0,"note":"brief"}`}]})});
    const data = await res.json();
    const raw  = (data.content||[]).map(b=>b.text||'').join('').trim();
    const match= raw.match(/\{[\s\S]*\}/);
    if (!match) throw new Error('No JSON');
    const est = JSON.parse(match[0]);
    const macros = {prot:est.protein||0,carbs:est.carbs||0,fat:est.fat||0,kcal:est.calories||0,logged:true,note:est.note||''};
    saveMealLog(slot, macros);
    if (result) result.innerHTML=`<div class="dev-inline-result"><strong>${macros.prot}g P · ${macros.carbs}g C · ${macros.fat}g F · ${macros.kcal} kcal</strong><br>${macros.note}</div>`;
    if (btn) btn.style.display='none';
    document.getElementById('meal-block-'+blockIdx)?.classList.add('eaten');
    updateRemainingMeals();
  } catch(e) {
    if (btn) { btn.disabled=false; btn.textContent='Estimate macros ↑'; }
    if (result) result.innerHTML=`<div class="dev-inline-result">Could not estimate — try again</div>`;
  }
}

function getStickyMacrosHTML() {
  if (!_macroState) return '<div style="font-size:10px;color:var(--dk-3);padding:2px 0;">Loading…</div>';
  const {target,eaten} = _macroState;
  function pct(v,m) { return Math.min(100,Math.round(v/Math.max(1,m)*100)); }
  const kcalLeft = target.kcal - eaten.kcal;
  const cls = kcalLeft > 200 ? 'good' : kcalLeft < -100 ? 'over' : 'warn';
  return `
    <div class="sm-bar-group"><div class="sm-label">Protein</div><div class="sm-bar-wrap"><div class="sm-bar p" style="width:${pct(eaten.prot,target.prot)}%"></div></div><div class="sm-val">${eaten.prot}g</div></div>
    <div class="sm-bar-group"><div class="sm-label">Carbs</div><div class="sm-bar-wrap"><div class="sm-bar c" style="width:${pct(eaten.carbs,target.carbs)}%"></div></div><div class="sm-val">${eaten.carbs}g</div></div>
    <div class="sm-bar-group"><div class="sm-label">Fat</div><div class="sm-bar-wrap"><div class="sm-bar f" style="width:${pct(eaten.fat,target.fat)}%"></div></div><div class="sm-val">${eaten.fat}g</div></div>
    <div class="sm-kcal ${cls}">${kcalLeft > 0 ? kcalLeft+' left' : Math.abs(kcalLeft)+' over'}</div>`;
}

function refreshMacroCup() {
  const sm = document.getElementById('sticky-macros');
  if (sm) sm.innerHTML = getStickyMacrosHTML();
}

function showWeekDetail(wk) {
  const wp = _profile.weeklyProgression;
  if (!wp || !wp[wk]) return;
  const w = wp[wk];
  const panel = document.getElementById('week-detail');
  if (!panel) return;
  const isVisible = panel.classList.contains('visible') && panel.dataset.wk === wk;
  if (isVisible) { panel.classList.remove('visible'); return; }
  panel.dataset.wk = wk;
  panel.innerHTML = `
    <div class="wdp-phase">${w.phase}</div>
    <div class="wdp-focus">${w.focus}</div>
    <div class="wdp-note">${w.volumeNote}${w.keyFocus ? '<br><em style="color:var(--dk-3);">'+w.keyFocus+'</em>' : ''}</div>`;
  panel.classList.add('visible');
  // Update active tab
  document.querySelectorAll('.wt').forEach(t => t.style.borderColor = '');
}

// Update openSessionPanel to show level tabs and use LEVEL_SCHEMES


function setupChips(profile, today) {
  const chipsEl = document.getElementById('ask-chips');
  if (!chipsEl) return;
  const injuries = profile.injuryAssessments || profile.injuries || [];
  const isTraining = today.isTraining;
  const chips = isTraining ? [
    'How hard should I push today?',
    injuries.length ? 'My '+( injuries[0].location||'injury')+' feels off' : 'Am I recovered enough?',
    'What\'s the most important meal today?',
    'Swap one of today\'s exercises?',
  ] : [
    'Rest day — active or completely off?',
    'Same calories today?',
    'How do I make today count?',
    'Can I train anyway?',
  ];
  chipsEl.innerHTML = chips.map(c=>
    `<div class="ask-chip" data-msg="${c.replace(/"/g,'&quot;').replace(/'/g,'&#39;')}">${c}</div>`
  ).join('');
  chipsEl.querySelectorAll('.ask-chip').forEach(chip => {
    chip.addEventListener('click', () => sendAsk(chip.dataset.msg));
  });
}

// ── ASK HANDLER ───────────────────────────────────────
let _askInFlight = false;

function sendAsk(text) {
  const input  = document.getElementById('ask-input');
  const answer = document.getElementById('ask-answer');
  const sendBtn= document.getElementById('ask-send');
  const msg    = text || (input ? input.value.trim() : '');
  if (!msg || _askInFlight) return;
  if (input && !text) input.value = '';
  _askInFlight = true;
  if (sendBtn) sendBtn.disabled = true;

  answer.style.display = 'block';
  answer.innerHTML = '<div class="loading-spinner" style="width:18px;height:18px;margin:8px 0;border-top-color:var(--jade);"></div>';

  const p = _profile;
  const isFemale = (p.sex||'').toLowerCase() === 'female';
  const injuries = p.injuryAssessments || p.injuries || [];

  fetch(API, {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ model:MODEL, max_tokens:280,
      system:`You are the BodyLens coach. Speaking with ${p.name}. Today: ${_today.name} — ${_today.isTraining?'TRAINING ('+_today.plan.type+')':'REST DAY'}. Calories: ${p.calories}. Protein: ${p.protein}g. ${injuries.length?'Injuries: '+injuries.map(i=>i.location||i).join(', ')+'.':''} ${isFemale?'Female.':''} Be direct, personal, under 120 words. Flowing prose, no bullets.`,
      messages:[{role:'user',content:msg}]
    })
  })
  .then(r=>r.json())
  .then(data => {
    const text = (data.content||[]).map(b=>b.text||'').join('').trim();
    answer.innerHTML = text.split(/\n\n+/).map(p=>`<p>${p.trim()}</p>`).join('');
  })
  .catch(() => { answer.innerHTML = '<p style="color:var(--dk-3)">Something went wrong — try again</p>'; })
  .finally(() => {
    _askInFlight = false;
    if (sendBtn) sendBtn.disabled = false;
  });
}

// ── MEAL ENRICHMENT ───────────────────────────────────
function enrichMeals(profile, today) {
  const mealSlots = document.querySelectorAll('[data-slot]');
  if (!mealSlots.length) return;
  const p = profile;
  const prompt = `Meal names for ${p.name}. Return JSON only.
Diet: ${p.dietType||'flexible'} | Exclude: ${(p.foodExclusions||[]).join(',')||'none'} | Cuisine: ${(p.cuisinePrefs||[]).join(',')||'neutral'}
Today: ${today.isTraining ? 'training ('+today.plan.type+')' : 'rest day'}
Return: {"pre-training":"name","post-training":"name","midday":"name","afternoon":"name","evening":"name"}
Short names only. Only include applicable slots.`;
  fetch(API,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:MODEL,max_tokens:100,system:'Return only valid JSON.',messages:[{role:'user',content:prompt}]})})
  .then(r=>r.json()).then(data=>{
    const text=(data.content||[]).map(b=>b.text||'').join('').trim();
    const m=text.match(/\{[\s\S]*\}/);
    if(!m)return;
    const meals=JSON.parse(m[0]);
    Object.entries(meals).forEach(([slot,name])=>{
      const block=document.querySelector(`[data-slot="${slot}"] .tl-title`);
      if(block&&name)block.textContent=name;
    });
  }).catch(()=>{});
}

// ── ACCELERATOR ───────────────────────────────────────
function pickAccelerator(profile, today) {
  const goal = (profile.goal||'').toLowerCase();
  const age  = profile.age||35;
  const cands = [];
  if (!today.isTraining) {
    cands.push({name:'Extended overnight fast',why:'Rest day — ideal window. No performance cost. Fat oxidation elevated all morning.',url:'bodylens-accelerators.html'});
    cands.push({name:'NSDR session today',why:'20 minutes of yoga nidra raises dopamine 65% and restores focus as well as 90 min of sleep.',url:'bodylens-accelerators.html'});
  } else {
    cands.push({name:'Post-training walk',why:'10 min after your post-session meal drops glucose 20-30% and keeps GLP-1 elevated.',url:'bodylens-accelerators.html'});
    cands.push({name:'Dopamine scheduling',why:'No social media before training. The contrast makes the session dopamine hit land harder.',url:'bodylens-accelerators.html'});
  }
  if (goal.includes('fat')||goal.includes('los')) cands.unshift({name:'NEAT target: +3,000 steps',why:'Easiest caloric deficit available. 3,000 extra steps = ~150 kcal without touching food or training.',url:'bodylens-accelerators.html'});
  if (age >= 40) cands.push({name:'Zone 2 cardio — 20 min today',why:`At ${age}, VO₂max is the primary longevity lever. 20 min at conversational pace today.`,url:'bodylens-accelerators.html'});
  return cands[0];
}

// ── REGENERATE ────────────────────────────────────────
window.regenerate = function() {
  try { localStorage.removeItem(_today.cacheKey); } catch(e){}
  location.reload();
};

window.sendAsk = sendAsk;

// ── MAIN ──────────────────────────────────────────────
const _profile = loadProfile();

if (!_profile) {
  document.getElementById('day-root').innerHTML = `
    <div style="text-align:center;padding:80px 24px;">
      <div style="font-size:44px;margin-bottom:16px;">💪</div>
      <div style="font-family:var(--serif);font-size:28px;font-weight:300;color:var(--dk-1);margin-bottom:10px;">Let's build your programme</div>
      <div style="font-size:14px;font-weight:300;color:var(--dk-2);margin-bottom:28px;">Answer a few questions and your personalised daily plan will be ready in minutes.</div>
      <a href="bodylens-onboard.html" style="display:inline-block;background:var(--jade);color:var(--ink);padding:12px 28px;border-radius:6px;font-size:13px;font-weight:600;text-decoration:none;">Get started →</a>
    </div>`;
  document.getElementById('week-strip').style.display = 'none';
} else {
  // Nav
  const nm = document.getElementById('nav-meta');
  if (nm) nm.innerHTML = `<span class="nav-tag nt-jade">${_profile.name}</span>`;

  // Today context — declared BEFORE anything uses it
  const _today = getTodayContext(_profile);
  window._today = _today;

  // Programme week indicator
  const progCtx = getWeekProgrammeContext(_profile);

  // Init macro state
  initMacroState(_profile, _today);

  // Week strip
  renderWeekStrip(_profile, _today);

  // Profile validation — if re-done profile has 0 calories, show a useful message
  const hasValidProfile = _profile.calories > 0 && _profile.weekPlan && _profile.weekPlan.length === 7;
  if (!hasValidProfile) {
    document.getElementById('day-root').innerHTML = `
      <div style="text-align:center;padding:60px 24px;max-width:500px;margin:0 auto;">
        <div style="font-size:36px;margin-bottom:14px;">⚙️</div>
        <div style="font-family:var(--serif);font-size:26px;font-weight:300;color:var(--dk-1);margin-bottom:10px;">Profile incomplete</div>
        <div style="font-size:13px;font-weight:300;color:var(--dk-2);line-height:1.75;margin-bottom:24px;">
          Your profile was found but the programme data is missing — the onboarding may not have completed fully. You can re-run it (takes 5 minutes) or go to the Report page to rebuild from what was saved.
        </div>
        <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap;">
          <a href="bodylens-onboard.html" style="display:inline-block;background:var(--jade);color:var(--ink);padding:11px 24px;border-radius:6px;font-size:12px;font-weight:600;text-decoration:none;letter-spacing:0.04em;">Re-do onboarding</a>
          <a href="bodylens-instructions.html" style="display:inline-block;background:transparent;border:1px solid var(--bd);color:var(--dk-2);padding:11px 24px;border-radius:6px;font-size:12px;font-weight:600;text-decoration:none;letter-spacing:0.04em;">Rebuild report →</a>
        </div>
      </div>`;
    document.getElementById('week-strip').style.display = 'none';
    const nm = document.getElementById('nav-meta');
    if (nm) nm.innerHTML = `<span class="nav-tag nt-jade">${_profile.name}</span>`;
    return;
  }

  // Cache check
  let plan = null;
  try {
    const cached = localStorage.getItem(_today.cacheKey);
    if (cached) plan = JSON.parse(cached);
  } catch(e) {}

  if (!plan || !plan.blocks || plan.blocks.length < 3) {
    try {
      plan = buildPlan(_profile, _today);
      try { localStorage.setItem(_today.cacheKey, JSON.stringify(plan)); } catch(e){}
    } catch(buildErr) {
      console.error('buildPlan error:', buildErr);
      document.getElementById('day-root').innerHTML = `
        <div style="text-align:center;padding:60px 24px;">
          <div style="font-size:13px;font-weight:300;color:var(--dk-3);margin-bottom:16px;">Something went wrong building today's plan.</div>
          <button onclick="location.reload()" style="background:transparent;border:1px solid var(--bd);color:var(--dk-2);padding:8px 18px;border-radius:4px;font-size:12px;cursor:pointer;font-family:var(--sans);">Try again</button>
        </div>`;
      return;
    }
  }

  // Render
  renderPlan(plan);

  // Programme week strip (inject after render)
  const accSlot = document.getElementById('acc-strip-here');
  if (accSlot) {
    const dots = [1,2,3,4].map(w=>`<div class="wps-dot ${w<progCtx.weekNum?'done':w===progCtx.weekNum?'current':''}"></div>`).join('');
    accSlot.innerHTML = `
      <div class="week-prog-strip">
        <div>
          <div class="wps-label">Programme progress</div>
          <div class="wps-dots">${dots}</div>
        </div>
        <div style="text-align:right">
          <div class="wps-week">Week ${progCtx.weekNum} of 4</div>
          <div class="wps-phase">${progCtx.phase} phase</div>
        </div>
      </div>`;
    // Accelerator
    const acc = pickAccelerator(_profile, _today);
    if (acc) {
      accSlot.innerHTML += `<div class="acc-strip">
        <div><div class="as-eyebrow">💡 Accelerator — optional</div><div class="as-title">${acc.name}</div><div class="as-why">${acc.why}</div></div>
        <a href="${acc.url}" class="as-btn">More →</a>
      </div>`;
    }
  }

  // Chips + ask bar
  setupChips(_profile, _today);
  const askInput = document.getElementById('ask-input');
  const askSend  = document.getElementById('ask-send');
  if (askSend) askSend.addEventListener('click', () => sendAsk());
  if (askInput) askInput.addEventListener('keydown', e => { if (e.key==='Enter') sendAsk(); });

  // Meal name enrichment (background)
  enrichMeals(_profile, _today);
}
</script>
