<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#0c1010">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="BodyLens">
<link rel="apple-touch-icon" href="/icons/icon-180.png">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta name="bl-page" content="checkin">
<title>BodyLens — Week Review</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=Space+Grotesk:wght@300;400;500;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
body{background:var(--ink);color:var(--dk-1);}
.page{max-width:900px;margin:0 auto;padding:0 28px 100px;}
.wr-hero{padding:44px 0 32px;border-bottom:1px solid var(--bd);margin-bottom:32px;}
.wr-kicker{font-size:10px;font-weight:600;letter-spacing:.2em;text-transform:uppercase;color:var(--jade);margin-bottom:12px;display:flex;align-items:center;gap:10px;}
.wr-kicker::before{content:'';width:18px;height:1px;background:var(--jade);}
.wr-title{font-family:var(--serif);font-size:52px;font-weight:300;line-height:.93;letter-spacing:-.025em;color:var(--dk-1);margin-bottom:12px;}
.wr-title em{font-style:italic;color:var(--dk-3);}
.wr-sub{font-size:13px;font-weight:300;color:var(--dk-2);line-height:1.7;max-width:480px;}
.wr-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:28px;}
.ws-cell{background:var(--ink-2);border:1px solid var(--bd);border-radius:7px;padding:14px 12px;text-align:center;}
.ws-val{font-family:var(--mono);font-size:22px;font-weight:500;color:var(--jade);margin-bottom:3px;}
.ws-val.amber{color:var(--amber);}.ws-val.red{color:rgba(220,80,60,.85);}
.ws-label{font-size:9px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--dk-3);}
.wr-sec{font-size:9px;font-weight:600;letter-spacing:.18em;text-transform:uppercase;color:var(--dk-3);margin:0 0 12px;display:flex;align-items:center;gap:10px;}
.wr-sec::after{content:'';flex:1;height:1px;background:var(--bd);}
.wr-day-row{background:var(--ink-2);border:1px solid var(--bd);border-radius:8px;padding:14px 16px;margin-bottom:4px;display:grid;grid-template-columns:100px 80px 1fr 90px;gap:12px;align-items:center;cursor:pointer;transition:border-color .12s;}
.wr-day-row:hover{border-color:rgba(255,255,255,.1);}
.wr-day-row.training{border-left:3px solid var(--jade);}
.wr-day-row.rest{border-left:3px solid var(--bd);}
.wr-day-row.today{border-color:rgba(0,200,160,.25);}
.wr-day-row.future{opacity:.45;}
.wr-day-row.expanded{border-bottom-left-radius:0;border-bottom-right-radius:0;border-color:rgba(0,200,160,.2);}
.wdr-day{font-size:12px;font-weight:600;color:var(--dk-1);}
.wdr-type{font-size:10px;font-weight:300;color:var(--dk-3);margin-top:1px;}
.wdr-macro-row{display:flex;align-items:center;gap:5px;margin-bottom:3px;}
.wdr-macro-label{font-size:9px;color:var(--dk-3);width:10px;}
.wdr-macro-bar{flex:1;height:3px;background:var(--bd);border-radius:2px;overflow:hidden;}
.wdr-macro-fill{height:100%;border-radius:2px;transition:width .5s;}
.wdr-macro-val{font-size:9px;font-family:var(--mono);width:60px;text-align:right;}
.wdr-stars{font-size:13px;}
.wdr-note{font-size:10px;font-weight:300;color:var(--dk-3);font-style:italic;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:88px;margin-top:2px;}
.wr-day-detail{background:var(--ink-1);border:1px solid rgba(0,200,160,.15);border-top:none;border-radius:0 0 8px 8px;padding:16px;margin-bottom:6px;display:none;}
.wr-day-detail.open{display:block;}
.wdd-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;}
.wdd-block{background:var(--ink-2);border:1px solid var(--bd);border-radius:6px;padding:12px 14px;}
.wdd-label{font-size:9px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--dk-3);margin-bottom:8px;}
.wdd-row{display:flex;justify-content:space-between;align-items:center;padding:4px 0;border-bottom:1px solid var(--bd);font-size:12px;}
.wdd-row:last-child{border-bottom:none;}
.wdd-key{font-weight:300;color:var(--dk-2);}
.wdd-val{font-family:var(--mono);font-weight:500;}
.wdd-val.jade{color:var(--jade);}.wdd-val.amber{color:var(--amber);}.wdd-val.red{color:rgba(220,80,60,.85);}
.wci-label{font-size:9px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--jade);margin-bottom:8px;}
.wci-btn{padding:5px 12px;border-radius:12px;font-size:11px;font-weight:600;cursor:pointer;font-family:var(--sans);transition:all .12s;background:transparent;border:1px solid var(--bd);color:var(--dk-3);}
.wci-btn.active-done{background:var(--jade);color:var(--ink);border-color:var(--jade);}
.wci-btn.active-modified{background:var(--amber);color:var(--ink);border-color:var(--amber);}
.wci-btn.active-skipped{background:rgba(220,80,60,.85);color:#fff;border-color:rgba(220,80,60,.85);}
.wr-analysis{background:var(--ink-2);border:1px solid var(--bd);border-left:3px solid rgba(0,200,160,.4);border-radius:0 8px 8px 0;padding:18px 22px;margin-bottom:28px;}
.wra-kicker{font-size:9px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--jade);margin-bottom:10px;opacity:.7;}
.wra-body{font-size:14px;font-weight:300;color:var(--dk-2);line-height:1.85;}
.wra-body p{margin:0 0 10px;}.wra-body p:last-child{margin:0;}
.wra-refresh{background:none;border:none;color:var(--dk-3);font-size:10px;cursor:pointer;font-family:var(--sans);text-decoration:underline;padding:10px 0 0;display:block;}
.wr-weeks{display:flex;gap:6px;margin-bottom:24px;overflow-x:auto;padding-bottom:4px;}
.wrw-btn{flex-shrink:0;padding:6px 14px;border-radius:14px;font-size:11px;font-weight:600;cursor:pointer;font-family:var(--sans);background:transparent;border:1px solid var(--bd);color:var(--dk-3);transition:all .12s;}
.wrw-btn.active{background:var(--jade-dim);border-color:var(--jade-br);color:var(--jade);}
@media(max-width:600px){.wr-title{font-size:36px;}.wr-stats{grid-template-columns:repeat(2,1fr);}.wr-day-row{grid-template-columns:85px 60px 1fr;gap:8px;}.wdr-macro-val{display:none;}.page{padding:0 16px 80px;}.wdd-grid{grid-template-columns:1fr;}}
</style>
</head>
<body>
<script src="nav.js"></script>
<div class="page">
  <div class="wr-hero">
    <div class="wr-kicker">Progress tracking</div>
    <div class="wr-title">Week<br><em>review.</em></div>
    <div class="wr-sub" id="wr-sub">Planned vs actual. Your decisions mapped against your progress.</div>
  </div>
  <div id="wr-content"></div>
</div>
<script>
var API='/api/chat', MODEL='claude-sonnet-4-20250514';
var DAY_NAMES=['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
var _expandedDay=null, _currentWeekStart=null, _lastDays=null, _lastProfile=null;

function getProfile(){try{return JSON.parse(localStorage.getItem('bl_profile')||'null');}catch(e){return null;}}
function loadDayLog(ds){try{var r=localStorage.getItem('bl_daylog_'+ds);return r?JSON.parse(r):null;}catch(e){return null;}}
function saveDayLog(log){try{log.updatedAt=new Date().toISOString();if(!log.loggedAt)log.loggedAt=log.updatedAt;localStorage.setItem('bl_daylog_'+log.date,JSON.stringify(log));}catch(e){}}
function dateStr(d){return d.toISOString().slice(0,10);}
function addDays(d,n){var r=new Date(d);r.setDate(d.getDate()+n);return r;}
function getMondayOf(d){var day=d.getDay(),diff=day===0?-6:1-day,mon=new Date(d);mon.setDate(d.getDate()+diff);return mon;}

function getWeeks(){
  var today=new Date(),mon=getMondayOf(today),weeks=[];
  for(var i=0;i<5;i++){
    var start=addDays(mon,-i*7),end=addDays(start,6);
    var hasDays=false;
    for(var j=0;j<7;j++){if(loadDayLog(dateStr(addDays(start,j)))){hasDays=true;break;}}
    if(i===0||hasDays) weeks.push({start:start,end:end,label:i===0?'This week':'w/c '+start.toLocaleDateString('en-GB',{day:'numeric',month:'short'})});
  }
  return weeks;
}

function render(weekStart){
  var p=getProfile();
  if(!p){document.getElementById('wr-content').innerHTML='<div style="text-align:center;padding:60px;"><div style="font-size:13px;color:var(--dk-3);">No profile found.</div></div>';return;}
  _currentWeekStart=weekStart;
  var today=new Date(),todayStr=dateStr(today);

  var days=[];
  for(var i=0;i<7;i++){
    var d=addDays(weekStart,i),ds=dateStr(d);
    var wp=(p.weekPlan||[])[i]||{type:'Rest',priority:'rest'};
    var isTraining=wp.priority==='training';
    var log=loadDayLog(ds);
    var isPast=ds<todayStr,isToday=ds===todayStr,isFuture=ds>todayStr;
    days.push({d:d,ds:ds,weekIdx:i,wp:wp,isTraining:isTraining,log:log,isPast:isPast,isToday:isToday,isFuture:isFuture});
  }
  _lastDays=days; _lastProfile=p;

  var trainDays=days.filter(function(x){return x.isTraining;});
  var pastTrainDays=trainDays.filter(function(x){return !x.isFuture;});
  var trainDone=pastTrainDays.filter(function(x){return x.log&&x.log.trainStatus==='done';}).length;
  var trainModified=pastTrainDays.filter(function(x){return x.log&&x.log.trainStatus==='modified';}).length;
  var trainSkipped=pastTrainDays.filter(function(x){return x.log&&x.log.trainStatus==='skipped';}).length;
  var loggedDays=days.filter(function(x){return x.log&&x.log.actual&&x.log.actual.prot>0;});
  var avgProtPct=loggedDays.length?Math.round(loggedDays.reduce(function(s,x){var pl=x.log.plan||{},ac=x.log.actual||{};return s+(pl.prot>0?(ac.prot/pl.prot*100):0);},0)/loggedDays.length):0;
  var avgKcalPct=loggedDays.length?Math.round(loggedDays.reduce(function(s,x){var pl=x.log.plan||{},ac=x.log.actual||{};return s+(pl.kcal>0?(ac.kcal/pl.kcal*100):0);},0)/loggedDays.length):0;

  // Sleep and energy averages from new fields
  var sleepDays=days.filter(function(x){return x.log&&x.log.sleepActual>0;});
  var avgSleep=sleepDays.length?Math.round(sleepDays.reduce(function(s,x){return s+x.log.sleepActual;},0)/sleepDays.length*10)/10:0;
  var energyDays=days.filter(function(x){return x.log&&x.log.energy>0;});
  var avgEnergy=energyDays.length?Math.round(energyDays.reduce(function(s,x){return s+x.log.energy;},0)/energyDays.length*10)/10:0;

  var trainCol=trainSkipped>1?'red':trainDone>=pastTrainDays.length*0.8?'':'amber';
  var protCol=avgProtPct>=90?'':avgProtPct>=70?'amber':'red';
  var kcalCol=avgKcalPct>110?'amber':avgKcalPct<80?'amber':'';
  var sleepCol=avgSleep>=7?'':avgSleep>0&&avgSleep<6?'red':avgSleep>0?'amber':'';

  var weeks=getWeeks();
  var weekSelHtml='<div class="wr-weeks">'+weeks.map(function(w){
    var active=dateStr(w.start)===dateStr(weekStart);
    return '<button class="wrw-btn'+(active?' active':'')+'" onclick="render(new Date(\''+w.start.toISOString()+'\'))">'+w.label+'</button>';
  }).join('')+'</div>';

  var statsHtml='<div class="wr-stats">'
    +'<div class="ws-cell"><div class="ws-val '+trainCol+'">'+trainDone+'/'+pastTrainDays.length+'</div><div class="ws-label">Sessions done</div></div>'
    +'<div class="ws-cell"><div class="ws-val '+(trainModified>0?'amber':'')+'">'+trainModified+'</div><div class="ws-label">Modified</div></div>'
    +'<div class="ws-cell"><div class="ws-val '+(trainSkipped>0?'red':'')+'">'+trainSkipped+'</div><div class="ws-label">Skipped</div></div>'
    +'<div class="ws-cell"><div class="ws-val '+protCol+'">'+(loggedDays.length?avgProtPct+'%':'—')+'</div><div class="ws-label">Protein vs target</div></div>'
    +'<div class="ws-cell"><div class="ws-val '+sleepCol+'">'+(avgSleep?avgSleep+'h':'—')+'</div><div class="ws-label">Avg sleep</div></div>'
    +'<div class="ws-cell"><div class="ws-val '+(avgEnergy>=4?'jade':avgEnergy>0&&avgEnergy<3?'amber':'')+'">'+( avgEnergy?avgEnergy+'/5':'—')+'</div><div class="ws-label">Avg energy</div></div>'
    +'</div>';

  var daysHtml=days.map(function(x,i){
    var log=x.log,isT=x.isTraining;
    var trainIcon='—',trainLabel='Rest',trainColor='var(--dk-3)';
    if(isT){
      var ts=log&&log.trainStatus;
      if(!log||ts==='pending'){trainIcon=x.isFuture?'·':'?';trainLabel=x.isFuture?'Planned':'Not logged';}
      else if(ts==='done'){trainIcon='✓';trainLabel='Done';trainColor='var(--jade)';}
      else if(ts==='modified'){trainIcon='~';trainLabel='Modified';trainColor='var(--amber)';}
      else if(ts==='skipped'){trainIcon='✗';trainLabel='Skipped';trainColor='rgba(220,80,60,.85)';}
    }
    var plan=log?(log.plan||{}):{},actual=log?(log.actual||{}):{};
    var pProt=plan.prot||(p.protein||140),pKcal=plan.kcal||(p.calories||2000);
    var aProt=actual.prot||0,aKcal=actual.kcal||0;
    var protPct=Math.min(130,pProt>0?Math.round(aProt/pProt*100):0);
    var kcalPct=Math.min(130,pKcal>0?Math.round(aKcal/pKcal*100):0);
    var pBC=!log||aProt===0?'var(--bd)':protPct>=90?'var(--jade)':protPct>=70?'var(--amber)':'rgba(220,80,60,.7)';
    var kBC=!log||aKcal===0?'var(--bd)':kcalPct>108?'var(--amber)':'var(--jade)';
    var macrosHtml='<div>'
      +'<div class="wdr-macro-row"><div class="wdr-macro-label" style="color:var(--jade);">P</div>'
        +'<div class="wdr-macro-bar"><div class="wdr-macro-fill" style="width:'+Math.min(100,protPct)+'%;background:'+pBC+';"></div></div>'
        +'<div class="wdr-macro-val" style="color:'+pBC+';">'+(aProt>0?aProt+'g':'—')+'<span style="color:var(--dk-3);opacity:.6;">/'+pProt+'g</span></div></div>'
      +'<div class="wdr-macro-row"><div class="wdr-macro-label" style="color:var(--amber);">K</div>'
        +'<div class="wdr-macro-bar"><div class="wdr-macro-fill" style="width:'+Math.min(100,kcalPct)+'%;background:'+kBC+';"></div></div>'
        +'<div class="wdr-macro-val" style="color:'+kBC+';">'+(aKcal>0?aKcal:'—')+'<span style="color:var(--dk-3);opacity:.6;">/'+pKcal+'</span></div></div>'
      +'</div>';
    var r=log&&log.rating||0;
    var stars='<div class="wdr-stars">'+'<span style="color:var(--amber);">'+'★'.repeat(r)+'</span>'+'<span style="color:var(--bd);">'+'★'.repeat(5-r)+'</span></div>';
    var notePreview=log&&log.dayNote?'<div class="wdr-note">'+log.dayNote.slice(0,28)+(log.dayNote.length>28?'…':'')+'</div>':'';
    var isExp=_expandedDay===x.ds;
    var rowClass='wr-day-row '+(isT?'training':'rest')+(x.isToday?' today':'')+(x.isFuture?' future':'')+(isExp?' expanded':'');
    var row='<div class="'+rowClass+'" onclick="toggleDay(\''+x.ds+'\')">'
      +'<div><div class="wdr-day">'+DAY_NAMES[i].slice(0,3)+(x.isToday?' <span style="font-size:9px;color:var(--jade);">today</span>':'')+'</div><div class="wdr-type">'+(x.wp.type||'Rest')+'</div></div>'
      +'<div style="text-align:center;color:'+trainColor+'"><div style="font-size:16px;">'+trainIcon+'</div><div style="font-size:9px;font-weight:300;color:var(--dk-3);margin-top:2px;">'+trainLabel+'</div></div>'
      +macrosHtml
      +'<div>'+stars+notePreview+'</div>'
      +'</div>';
    var detail=buildDetail(x,p,isExp);
    return row+detail;
  }).join('');

  var analysisHtml='<div class="wr-analysis" id="wr-analysis">'
    +'<div class="wra-kicker">Coach analysis</div>'
    +'<div id="wra-body"><div style="display:flex;align-items:center;gap:8px;color:var(--dk-3);font-size:12px;"><div class="spin" style="width:14px;height:14px;flex-shrink:0;display:inline-block;"></div>Reading your week…</div></div>'
    +'</div>';

  document.getElementById('wr-content').innerHTML=weekSelHtml+statsHtml
    +'<div class="wr-sec">Day by day</div>'
    +'<div>'+daysHtml+'</div>'
    +analysisHtml;

  generateWeekAnalysis(days,p);
}

function buildDetail(x,p,isOpen){
  if(!isOpen) return '<div class="wr-day-detail" id="detail-'+x.ds+'"></div>';
  var log=x.log,plan=log?(log.plan||{}):{},actual=log?(log.actual||{}):{};

  var trainBlock='';
  if(x.isTraining){
    var ts=log&&log.trainStatus;
    var tsLabel=ts==='done'?'✓ Completed':ts==='skipped'?'✗ Skipped':ts==='modified'?'~ Modified':'? Not logged';
    var tsCol=ts==='done'?'jade':ts==='skipped'?'red':ts==='modified'?'amber':'';
    trainBlock='<div class="wdd-block">'
      +'<div class="wdd-label">Training</div>'
      +'<div class="wdd-row"><div class="wdd-key">Planned</div><div class="wdd-val">'+(x.wp.type||'Session')+'</div></div>'
      +'<div class="wdd-row"><div class="wdd-key">Status</div><div class="wdd-val '+tsCol+'">'+tsLabel+'</div></div>'
      +(log&&log.trainNote?'<div class="wdd-row"><div class="wdd-key">Note</div><div class="wdd-val" style="font-size:11px;font-weight:300;">'+log.trainNote+'</div></div>':'');

    // Per-exercise breakdown
    var exLogs = log&&log.exercises||{};
    var exKeys = Object.keys(exLogs);
    if(exKeys.length) {
      trainBlock += '<div style="margin-top:8px;border-top:1px solid var(--bd);padding-top:8px;">'
        +'<div style="font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--dk-3);margin-bottom:6px;">Exercises</div>';
      exKeys.forEach(function(k){
        var ex = exLogs[k];
        var col = ex.status==='done'?'var(--jade)':ex.status==='modified'?'var(--amber)':'rgba(220,80,60,.7)';
        var icon = ex.status==='done'?'✓':ex.status==='modified'?'~':'✗';
        trainBlock += '<div style="display:flex;gap:8px;align-items:baseline;padding:3px 0;border-bottom:1px solid rgba(255,255,255,.04);">'
          +'<span style="font-size:10px;font-weight:700;color:'+col+';flex-shrink:0;">'+icon+'</span>'
          +'<span style="font-size:12px;font-weight:300;color:var(--dk-2);flex:1;">'+ex.name+'</span>'
          +(ex.note?'<span style="font-size:10px;font-weight:300;color:var(--dk-3);font-style:italic;">'+ex.note+'</span>':'')
          +'</div>';
      });
      trainBlock += '</div>';
    }
    trainBlock += '</div>';
  }

  // Sleep + energy block
  var recoveryBlock='';
  if(log&&(log.sleepActual||log.energy||log.rating)){
    recoveryBlock='<div class="wdd-block">'
      +'<div class="wdd-label">Recovery</div>'
      +(log.sleepActual?'<div class="wdd-row"><div class="wdd-key">Sleep</div><div class="wdd-val '+(log.sleepActual>=7?'jade':log.sleepActual<6?'red':'amber')+'">'+log.sleepActual+'h '+(log.sleepActual>=7?'✓ Good':log.sleepActual<6?'⚠ Short':'OK')+'</div></div>':'')
      +(log.energy?'<div class="wdd-row"><div class="wdd-key">Energy</div><div class="wdd-val '+(log.energy>=4?'jade':log.energy<=2?'amber':'')+'">'+log.energy+'/5</div></div>':'')
      +(log.rating?'<div class="wdd-row"><div class="wdd-key">Day rating</div><div class="wdd-val amber">'+'★'.repeat(log.rating)+'</div></div>':'')
      +'</div>';
  }

  var macroBlock='';
  if(actual.kcal>0||actual.prot>0){
    var pP=plan.prot||(p.protein||140),pK=plan.kcal||(p.calories||2000);
    var dP=(actual.prot||0)-pP,dK=(actual.kcal||0)-pK;
    var pDC=Math.abs(dP)<pP*0.1?'jade':dP<0?'red':'amber';
    var kDC=Math.abs(dK)<pK*0.05?'jade':'amber';
    macroBlock='<div class="wdd-block">'
      +'<div class="wdd-label">Nutrition</div>'
      +'<div class="wdd-row"><div class="wdd-key">Protein</div><div class="wdd-val '+pDC+'">'+(actual.prot||0)+'g <span style="font-size:9px;opacity:.6;">target '+pP+'g ('+( dP>=0?'+':'')+dP+'g)</span></div></div>'
      +'<div class="wdd-row"><div class="wdd-key">Calories</div><div class="wdd-val '+kDC+'">'+(actual.kcal||0)+' <span style="font-size:9px;opacity:.6;">target '+pK+' ('+(dK>=0?'+':'')+dK+')</span></div></div>'
      +'<div class="wdd-row"><div class="wdd-key">Carbs / Fat</div><div class="wdd-val">'+(actual.carbs||0)+'g / '+(actual.fat||0)+'g</div></div>'
      +'</div>';
  }

  var noteHtml=log&&log.dayNote
    ?'<div style="font-size:12px;font-weight:300;color:var(--dk-2);line-height:1.65;font-style:italic;padding:8px 0 4px;">"'+log.dayNote+'"</div>'
    :(!log&&!x.isFuture?'<div style="font-size:11px;color:var(--dk-3);padding:6px 0;">No data logged yet.</div>':'');

  var captureHtml='';
  if(x.isToday){
    var ts2=log&&log.trainStatus;
    captureHtml='<div style="margin-top:12px;padding-top:12px;border-top:1px solid var(--bd);">'
      +'<div class="wci-label">Update today</div>'
      +(x.isTraining?'<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;">'
        +['done','modified','skipped'].map(function(s){
          var L={done:'✓ Done',modified:'~ Modified',skipped:'✗ Skipped'};
          var ac=ts2===s?' active-'+s:'';
          return '<button class="wci-btn'+ac+'" onclick="event.stopPropagation();updateTrain(\''+s+'\')">'+L[s]+'</button>';
        }).join('')+'</div>':'')
      +'<textarea rows="2" placeholder="Note anything — off plan meals, missed sleep, stress, wins…" '
        +'style="width:100%;background:var(--ink-2);border:1px solid var(--bd);border-radius:6px;padding:8px 10px;font-size:11px;color:var(--dk-1);font-family:var(--sans);resize:none;outline:none;" '
        +'onblur="updateDayNote(this.value)">'+(log&&log.dayNote?log.dayNote:'')+'</textarea>'
      +'<div style="display:flex;gap:4px;margin-top:8px;">'
      +[1,2,3,4,5].map(function(n){
        var f=log&&log.rating>=n;
        return '<span onclick="event.stopPropagation();updateRating('+n+')" style="font-size:18px;cursor:pointer;color:'+(f?'var(--amber)':'var(--bd)')+';">★</span>';
      }).join('')
      +'</div></div>';
  }

  var noData=x.isFuture?'<div style="font-size:11px;color:var(--dk-3);padding:4px 0;">Planned: '+(x.isTraining?(x.wp.type||'Training'):('Rest'))+(x.isTraining&&x.wp.focus?' — '+x.wp.focus:'')+'</div>':'';

  return '<div class="wr-day-detail open" id="detail-'+x.ds+'">'
    +(x.isFuture?noData:'<div class="wdd-grid">'+trainBlock+macroBlock+recoveryBlock+'</div>'+noteHtml)
    +captureHtml
    +'</div>';
}

function toggleDay(ds){
  _expandedDay=_expandedDay===ds?null:ds;
  render(_currentWeekStart);
}

function updateTrain(status){
  var ts=new Date().toISOString().slice(0,10);
  var log=loadDayLog(ts); if(!log)return;
  log.trainStatus=status; saveDayLog(log);
  render(_currentWeekStart); _expandedDay=ts;
}
function updateDayNote(note){
  var ts=new Date().toISOString().slice(0,10);
  var log=loadDayLog(ts); if(!log)return;
  log.dayNote=note; saveDayLog(log);
}
function updateRating(r){
  var ts=new Date().toISOString().slice(0,10);
  var log=loadDayLog(ts); if(!log)return;
  log.rating=r; saveDayLog(log);
  render(_currentWeekStart); _expandedDay=ts;
}

async function generateWeekAnalysis(days,p){
  var el=document.getElementById('wra-body'); if(!el)return;
  var logged=days.filter(function(x){return x.log&&!x.isFuture;});
  if(!logged.length){
    el.innerHTML='<div style="font-size:12px;font-weight:300;color:var(--dk-3);">Log some days first — the analysis builds as you go through the week.</div>';
    return;
  }

  // Build rich data summary for each logged day
  var summary = logged.map(function(x){
    var l=x.log, pl=l.plan||{}, ac=l.actual||{};
    var exLogs = l.exercises||{};
    var exDone = Object.values(exLogs).filter(function(e){return e.status==='done';}).length;
    var exMod  = Object.values(exLogs).filter(function(e){return e.status==='modified';}).length;
    var exSkip = Object.values(exLogs).filter(function(e){return e.status==='skipped';}).length;
    var exNotes= Object.values(exLogs).filter(function(e){return e.note;}).map(function(e){return e.name+': '+e.note;}).join('; ');
    var line = DAY_NAMES[x.weekIdx]+' ('+( x.wp.type||'Rest')+'): ';
    line += 'session='+( l.trainStatus||'not logged');
    if(exDone||exMod||exSkip) line += ' [ex: '+exDone+' done, '+exMod+' modified, '+exSkip+' skipped]';
    if(exNotes) line += ' | deviations: '+exNotes;
    if(ac.prot>0) line += ' | prot='+ac.prot+'g/'+( pl.prot||p.protein||174)+'g ('+Math.round(ac.prot/(pl.prot||174)*100)+'%)';
    if(ac.kcal>0) line += ' | kcal='+ac.kcal+'/'+(pl.kcal||p.trainingKcal||2769);
    if(l.sleepActual) line += ' | sleep='+l.sleepActual+'h';
    if(l.energy) line += ' | energy='+l.energy+'/5';
    if(l.rating) line += ' | rating='+l.rating+'/5';
    if(l.dayNote) line += ' | note: "'+l.dayNote+'"';
    return line;
  }).join('\n');

  var future=days.filter(function(x){return x.isFuture&&x.isTraining;});
  var futureLine=future.length?'\nRemaining training this week: '+future.map(function(x){return DAY_NAMES[x.weekIdx]+' ('+x.wp.type+')';}).join(', '):'';

  // Compute pattern signals to include
  var trainDone   = logged.filter(function(x){return x.log&&x.log.trainStatus==='done';}).length;
  var trainSkipped= logged.filter(function(x){return x.log&&x.log.trainStatus==='skipped';}).length;
  var trainMod    = logged.filter(function(x){return x.log&&x.log.trainStatus==='modified';}).length;
  var sleepDays   = logged.filter(function(x){return x.log&&x.log.sleepActual>0;});
  var avgSleep    = sleepDays.length ? (sleepDays.reduce(function(s,x){return s+x.log.sleepActual;},0)/sleepDays.length).toFixed(1) : null;
  var energyDays  = logged.filter(function(x){return x.log&&x.log.energy>0;});
  var avgEnergy   = energyDays.length ? (energyDays.reduce(function(s,x){return s+x.log.energy;},0)/energyDays.length).toFixed(1) : null;
  var protDays    = logged.filter(function(x){return x.log&&x.log.actual&&x.log.actual.prot>0;});
  var avgProtPct  = protDays.length ? Math.round(protDays.reduce(function(s,x){var pl=x.log.plan||{};return s+(x.log.actual.prot/(pl.prot||p.protein||174)*100);},0)/protDays.length) : null;

  var contextLine = 'Goal: '+( p.goal||'body recomposition')+'. Week '+( Math.min(4,Math.ceil((new Date()-new Date(p.generatedAt||Date.now()))/(1000*60*60*24*7))))+' of 4-week block (phase: Foundation/Build/Peak/Deload).';
  var statsLine = [
    trainDone+' sessions completed, '+trainMod+' modified, '+trainSkipped+' skipped',
    avgSleep ? 'avg sleep '+avgSleep+'h' : null,
    avgEnergy ? 'avg energy '+avgEnergy+'/5' : null,
    avgProtPct ? 'avg protein '+avgProtPct+'% of target' : null
  ].filter(Boolean).join(' | ');

  var prompt = 'You are a performance coach reviewing '+p.name+'\'s week in BodyLens.\n'
    +p.name+' is '+( p.age||44)+'yo, '+(p.weight||87)+'kg, '+(p.sex||'male')+'. '
    +contextLine+'\n\nWeek summary: '+statsLine+'\n\nDay-by-day data:\n'+summary+futureLine
    +'\n\nWrite a coach review in EXACTLY this structure — use these exact section labels:\n\n'
    +'WHAT HAPPENED\n[2-3 sentences. Specific numbers. What actually occurred this week — sessions, protein, sleep, energy. Be precise.]\n\n'
    +'DEVIATION IMPACT\n[2-3 sentences. For any deviations (skipped sessions, low protein, poor sleep) explain the actual physiological consequence for their specific goal. Cause-effect, not moralising. If no deviations, say so and note what that means.]\n\n'
    +(future.length
      ? 'REMAINING DAYS\n[1-2 sentences. The single highest-leverage thing to do before the week closes. Specific.]\n\n'
      : 'PATTERN SIGNAL\n[1-2 sentences. What this week reveals. One thing to watch or change next week.]\n\n')
    +'COACH NOTE\n[1 sentence. Honest. No filler. Something they will actually remember.]\n\n'
    +'Tone: direct, data-grounded, respectful. No bullet points. Under 200 words total.';

  try{
    var res=await fetch(API,{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:MODEL,max_tokens:350,
        system:'Performance coach. Structure your response exactly as requested with bold section headers. Direct, data-led, no filler.',
        messages:[{role:'user',content:prompt}]})});
    var data=await res.json();
    var text=(data.content||[]).map(function(b){return b.text||'';}).join('').trim();

    // Parse sections
    var sections = ['WHAT HAPPENED','DEVIATION IMPACT','REMAINING DAYS','PATTERN SIGNAL','COACH NOTE'];
    var html = '';
    sections.forEach(function(sec) {
      var re = new RegExp(sec+'\\s*\\n([\\s\\S]*?)(?=(?:'+sections.join('|')+')|$)','i');
      var m = text.match(re);
      if (m) {
        var body = m[1].trim();
        var isCoachNote = sec === 'COACH NOTE';
        var labelColor = sec==='DEVIATION IMPACT' ? 'var(--amber)' : sec==='COACH NOTE' ? 'var(--jade)' : 'var(--dk-3)';
        html += '<div style="margin-bottom:14px;">'
          +'<div style="font-size:8px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:'+labelColor+';margin-bottom:5px;">'+sec+'</div>'
          +'<div style="font-family:'+(isCoachNote?'var(--serif)':'inherit')+';font-size:'+(isCoachNote?'15':'12')+'px;font-weight:300;color:'+(isCoachNote?'var(--dk-1)':'var(--dk-2)')+';line-height:1.75;'+(isCoachNote?'font-style:italic;border-left:2px solid var(--jade);padding-left:12px;':'')+'">'+body+'</div>'
          +'</div>';
      }
    });

    // Fallback: if parsing fails, show as paragraphs
    if (!html) {
      html = text.split(/\n+/).filter(Boolean).map(function(s){return '<p style="font-size:12px;font-weight:300;color:var(--dk-2);line-height:1.75;margin-bottom:10px;">'+s+'</p>';}).join('');
    }

    el.innerHTML='<div class="wra-body">'+html+'</div>'
      +'<div style="display:flex;gap:8px;margin-top:12px;">'
      +'<button class="wra-refresh" onclick="generateWeekAnalysis(_lastDays,_lastProfile)">↺ Regenerate</button>'
      +'<button class="wra-refresh" onclick="copyWeekReview()" style="background:transparent;border:1px solid var(--bd);color:var(--dk-3);">Copy review</button>'
      +'</div>';
  }catch(e){
    el.innerHTML='<div style="font-size:11px;color:var(--dk-3);">Could not load — <button style="background:none;border:none;color:var(--dk-3);cursor:pointer;text-decoration:underline;font-size:11px;" onclick="generateWeekAnalysis(_lastDays,_lastProfile)">try again</button></div>';
  }
}

function copyWeekReview() {
  var el = document.getElementById('wra-body');
  if (!el) return;
  var text = el.innerText || el.textContent;
  navigator.clipboard.writeText(text).catch(function(){});
  var btns = document.querySelectorAll('.wra-refresh');
  btns.forEach(function(b){ if(b.textContent.includes('Copy')) { b.textContent = '✓ Copied'; setTimeout(function(){ b.textContent = 'Copy review'; }, 2000); } });
}

var p=getProfile();
if(p){var m=document.getElementById('nav-meta');if(m)m.innerHTML='<span class="nav-tag nt-jade">'+p.name+'</span>';
document.getElementById('wr-sub').textContent=p.name+' · '+new Date().toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'})+'. Planned vs actual.';}
_currentWeekStart=getMondayOf(new Date());

// Expose on window so nav.js / profile-manager re-runs can't lose the reference
window._wrRender = function(){ render(_currentWeekStart); };
window._wrWeekStart = _currentWeekStart;

// Initial render
render(_currentWeekStart);

// Re-run after external scripts (nav.js/supabase-auth/profile-manager) have settled
// This defeats the race condition where injectNavButtons() at 800ms wipes wr-content
window.addEventListener('load', function(){
  setTimeout(function(){
    if(!document.getElementById('wr-content').innerHTML.trim()){
      render(_currentWeekStart);
    }
  }, 900);
});
</script>
