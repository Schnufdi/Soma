<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>BodyLens — Sign In</title>
<link rel="stylesheet" href="style.css">
<style>
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
.login-card{background:var(--ink-2);border:1px solid var(--bd);border-radius:16px;padding:48px 40px;max-width:420px;width:100%;text-align:center;}
.login-brand{font-family:var(--serif);font-size:32px;font-weight:900;color:var(--dk-1);margin-bottom:8px;}
.login-brand em{color:var(--jade);font-style:normal;}
.login-tagline{font-size:14px;font-weight:300;color:var(--dk-3);margin-bottom:40px;line-height:1.6;}
.login-google-btn{display:flex;align-items:center;justify-content:center;gap:12px;width:100%;padding:14px 20px;background:#fff;border:none;border-radius:10px;font-size:15px;font-weight:600;color:#1a1a1a;cursor:pointer;transition:opacity 0.15s;margin-bottom:20px;}
.login-google-btn:hover{opacity:0.9;}
.login-google-btn svg{width:20px;height:20px;flex-shrink:0;}
.login-divider{display:flex;align-items:center;gap:12px;margin-bottom:20px;}
.login-divider-line{flex:1;height:1px;background:var(--bd);}
.login-divider-text{font-size:11px;color:var(--dk-3);}
.login-new-btn{display:block;width:100%;padding:13px;background:var(--jade-dim);border:1px solid var(--jade-br);border-radius:10px;color:var(--jade);font-size:14px;font-weight:600;text-decoration:none;cursor:pointer;}
.login-new-btn:hover{background:rgba(0,196,160,0.12);}
.login-footer{margin-top:32px;font-size:11px;color:var(--dk-3);line-height:1.6;}
</style>
</head>
<body>
<div class="login-wrap">
  <div class="login-card">
    <div class="login-brand">Body<em>Lens</em></div>
    <div class="login-tagline">Your personalised health intelligence.<br>Sign in to access your programme on any device.</div>

    <button class="login-google-btn" onclick="window.BL && window.BL.signInWithGoogle()">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
      </svg>
      Continue with Google
    </button>

    <div class="login-divider">
      <div class="login-divider-line"></div>
      <div class="login-divider-text">or</div>
      <div class="login-divider-line"></div>
    </div>

    <span class="login-new-btn" style="opacity:0.4;cursor:default;pointer-events:none;">Create new profile</span>

    <div class="login-footer">
      By signing in you agree to BodyLens storing your health profile<br>
      to personalise your programme across devices.
    </div>
  </div>
</div>
<script src="supabase-auth.js"></script>
<script>
// If already logged in, redirect to daily plan
if (typeof window.BL !== 'undefined') {
  // Check handled by supabase-auth.js init
}
</script>
</body>
</html>
