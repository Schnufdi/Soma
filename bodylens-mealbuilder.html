<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#0c1010">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="BodyLens">
<link rel="apple-touch-icon" href="/icons/icon-180.png">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>BodyLens — Meals</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&family=Space+Grotesk:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
body{background:var(--ink);color:var(--dk-1);}
.mp-page{max-width:860px;margin:0 auto;padding:0 28px 100px;}
.mp-hero{padding:32px 0 20px;border-bottom:1px solid var(--bd);margin-bottom:0;}
.mp-kicker{font-size:10px;font-weight:700;letter-spacing:.22em;text-transform:uppercase;color:var(--dk-3);margin-bottom:8px;}
.mp-title{font-family:var(--serif);font-size:48px;font-weight:300;line-height:.93;letter-spacing:-.025em;color:var(--dk-1);margin-bottom:8px;}
.mp-title em{font-style:italic;color:var(--dk-3);}
.mp-sub{font-size:12px;font-weight:300;color:var(--dk-2);line-height:1.7;max-width:480px;}
.mp-tabs{display:flex;gap:0;border-bottom:1px solid var(--bd);margin-bottom:28px;}
.mp-tab{padding:12px 20px;font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--dk-3);background:none;border:none;cursor:pointer;font-family:var(--sans);border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .12s;}
.mp-tab:hover{color:var(--dk-2);}
.mp-tab.active{color:var(--dk-1);border-bottom-color:var(--jade);}
.wp-gen-bar{display:flex;align-items:center;justify-content:space-between;padding:14px 0 20px;gap:12px;flex-wrap:wrap;}
.wp-gen-btn{background:var(--jade);border:none;color:var(--ink);padding:11px 24px;border-radius:8px;font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;font-family:var(--sans);transition:opacity .12s;display:inline-flex;align-items:center;gap:8px;}
.wp-gen-btn:hover{opacity:.88;}
.wp-gen-btn:disabled{opacity:.4;cursor:not-allowed;}
.wp-gen-meta{font-size:11px;font-weight:300;color:var(--dk-3);}
.wp-day{border:1px solid var(--bd);border-radius:10px;margin-bottom:8px;overflow:hidden;transition:border-color .12s;}
.wp-day.open{border-color:rgba(0,200,160,.2);}
.wp-day.training{border-left:2px solid var(--jade);}
.wp-day.rest{border-left:2px solid rgba(255,255,255,.06);}
.wp-day-hd{display:flex;align-items:center;gap:12px;padding:12px 16px;cursor:pointer;background:var(--ink-1);transition:background .1s;}
.wp-day-hd:hover{background:var(--ink-2);}
.wp-day.open .wp-day-hd{background:var(--ink-2);}
.wp-day-name{font-size:13px;font-weight:600;color:var(--dk-1);min-width:90px;}
.wp-day-type{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:3px 9px;border-radius:10px;}
.wp-day.training .wp-day-type{background:rgba(0,200,160,.08);color:var(--jade);border:1px solid var(--jade-br);}
.wp-day.rest .wp-day-type{background:rgba(255,255,255,.04);color:var(--dk-3);border:1px solid var(--bd);}
.wp-day-macros{flex:1;display:flex;gap:10px;align-items:center;margin-left:8px;}
.wp-macro-mini{display:flex;align-items:center;gap:4px;font-size:10px;}
.wp-macro-mini-val{font-weight:600;color:var(--dk-1);}
.wp-macro-mini-label{font-weight:300;color:var(--dk-3);}
.wp-macro-bar{flex:1;height:3px;background:rgba(255,255,255,.06);border-radius:2px;max-width:80px;overflow:hidden;}
.wp-macro-fill{height:100%;border-radius:2px;transition:width .3s;}
.wp-day-chevron{color:var(--dk-3);font-size:10px;flex-shrink:0;transition:transform .15s;}
.wp-day.open .wp-day-chevron{transform:rotate(180deg);color:var(--jade);}
.wp-day-body{display:none;padding:0;}
.wp-day.open .wp-day-body{display:block;}
.wp-slot{display:flex;align-items:flex-start;gap:12px;padding:12px 16px;border-top:1px solid rgba(255,255,255,.04);}
.wp-slot:hover{background:rgba(255,255,255,.01);}
.wp-slot-label{font-size:9px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--dk-3);min-width:70px;padding-top:2px;flex-shrink:0;}
.wp-slot-meal{flex:1;min-width:0;}
.wp-slot-empty{font-size:12px;font-weight:300;color:rgba(255,255,255,.12);font-style:italic;padding:2px 0;}
.wp-meal-name{font-size:13px;font-weight:400;color:var(--dk-1);margin-bottom:3px;line-height:1.35;}
.wp-meal-macros{display:flex;gap:8px;flex-wrap:wrap;}
.wp-meal-macro{font-size:10px;font-weight:300;color:var(--dk-3);}
.wp-meal-macro strong{font-weight:600;color:var(--dk-2);}
.wp-slot-actions{display:flex;gap:4px;flex-shrink:0;align-items:flex-start;padding-top:2px;}
.wp-slot-btn{background:transparent;border:1px solid var(--bd);color:var(--dk-3);width:28px;height:28px;border-radius:7px;cursor:pointer;font-size:11px;font-family:var(--sans);display:flex;align-items:center;justify-content:center;transition:all .1s;flex-shrink:0;}
.wp-slot-btn:hover{border-color:rgba(255,255,255,.12);color:var(--dk-2);}
.wp-slot-btn.locked{background:rgba(0,200,160,.06);border-color:var(--jade-br);color:var(--jade);}
.wp-day-total{display:flex;align-items:center;gap:10px;padding:10px 16px;background:var(--ink-2);border-top:1px solid var(--bd);}
.wp-total-label{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--dk-3);min-width:70px;}
.wp-total-bars{flex:1;display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.wp-total-macro{display:flex;align-items:center;gap:6px;}
.wp-total-track{width:60px;height:4px;background:rgba(255,255,255,.06);border-radius:2px;overflow:hidden;}
.wp-total-fill{height:100%;border-radius:2px;transition:width .4s;}
.wp-total-val{font-size:10px;font-weight:600;color:var(--dk-1);min-width:40px;}
.wp-total-target{font-size:9px;font-weight:300;color:var(--dk-3);}
.wp-save-bar{position:sticky;bottom:0;background:var(--ink);border-top:1px solid var(--bd);padding:14px 0;margin-top:20px;display:flex;align-items:center;justify-content:space-between;gap:12px;}
.wp-save-btn{background:var(--jade);border:none;color:var(--ink);padding:12px 28px;border-radius:8px;font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;font-family:var(--sans);}
.wp-save-note{font-size:11px;font-weight:300;color:var(--dk-3);}
.wp-loading{display:flex;align-items:center;gap:12px;padding:32px 16px;color:var(--dk-3);font-size:12px;font-weight:300;}
.mb-ctx-row{display:flex;gap:6px;flex-wrap:wrap;padding:14px 0 20px;border-bottom:1px solid var(--bd);margin-bottom:24px;}
.mb-ctx-chip{padding:6px 14px;border-radius:14px;border:1px solid var(--bd);background:transparent;font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--dk-3);cursor:pointer;font-family:var(--sans);transition:all .1s;}
.mb-ctx-chip.active{background:var(--jade-dim);border-color:var(--jade-br);color:var(--jade);}
.mb-sec{font-size:9px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--dk-3);margin:24px 0 12px;display:flex;align-items:center;gap:10px;}
.mb-sec::after{content:'';flex:1;height:1px;background:var(--bd);}
.mb-sec.amber{color:var(--amber);}
.mb-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:8px;margin-bottom:4px;}
.mb-option{background:var(--ink-1);border:1px solid var(--bd);border-radius:9px;padding:12px 14px;cursor:pointer;transition:all .12s;}
.mb-option:hover{border-color:rgba(255,255,255,.1);}
.mb-option.selected{background:rgba(0,200,160,.05);border-color:var(--jade-br);}
.mb-option-name{font-size:12px;font-weight:500;color:var(--dk-1);margin-bottom:3px;}
.mb-option-sub{font-size:10px;font-weight:300;color:var(--dk-3);line-height:1.4;}
.mb-option.selected .mb-option-name{color:var(--jade);}
.mb-generate-btn{width:100%;background:var(--jade);border:none;color:var(--ink);padding:13px;border-radius:9px;font-size:12px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;font-family:var(--sans);margin-top:20px;}
.mb-meals-grid{display:flex;flex-direction:column;gap:8px;margin-top:4px;}
.mb-meal-card{background:var(--ink-1);border:1px solid var(--bd);border-radius:10px;overflow:hidden;transition:border-color .12s;}
.mb-meal-card.open{border-color:rgba(200,148,30,.25);}
.mb-meal-hd{display:flex;gap:12px;align-items:center;padding:14px 16px;cursor:pointer;}
.mb-meal-num{width:24px;height:24px;border-radius:50%;background:var(--ink-2);border:1px solid var(--bd);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;color:var(--dk-3);flex-shrink:0;}
.mb-meal-info{flex:1;min-width:0;}
.mb-meal-style{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--dk-3);margin-bottom:2px;}
.mb-meal-name{font-size:13px;font-weight:500;color:var(--dk-1);margin-bottom:2px;}
.mb-meal-why{font-size:11px;font-weight:300;color:var(--dk-3);line-height:1.4;}
.mb-meal-macros-row{display:flex;gap:8px;flex-shrink:0;align-items:center;}
.mb-macro-pill{font-size:10px;font-weight:600;padding:3px 8px;border-radius:8px;background:var(--ink-2);border:1px solid var(--bd);color:var(--dk-2);}
.mb-macro-pill.p{color:var(--jade);border-color:var(--jade-br);}
.mb-meal-body{display:none;padding:0 16px 16px;border-top:1px solid var(--bd);}
.mb-meal-card.open .mb-meal-body{display:block;}
.mb-ings{display:flex;gap:6px;flex-wrap:wrap;margin:12px 0 8px;}
.mb-ing{font-size:10px;font-weight:400;background:var(--ink-2);border:1px solid var(--bd);border-radius:7px;padding:4px 10px;color:var(--dk-2);}
.mb-method{font-size:12px;font-weight:300;color:var(--dk-2);line-height:1.65;padding:8px 0;border-top:1px solid rgba(255,255,255,.04);margin-top:4px;}
.mb-swaps{display:flex;flex-direction:column;gap:4px;margin-top:8px;}
.mb-swap{font-size:10px;font-weight:300;color:var(--dk-3);padding:4px 0;}
.mb-swap::before{content:'\u21d4 ';opacity:.5;}
.mb-use-btn{display:block;width:100%;background:var(--jade);border:none;color:var(--ink);padding:11px;border-radius:8px;font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;font-family:var(--sans);margin-top:12px;}
.mb-loading{display:flex;align-items:center;gap:12px;padding:40px 0;color:var(--dk-3);font-size:12px;font-weight:300;}
.mb-spin{width:18px;height:18px;border-radius:50%;border:2px solid rgba(255,255,255,.08);border-top-color:var(--jade);animation:mbspin .7s linear infinite;flex-shrink:0;}
@keyframes mbspin{to{transform:rotate(360deg)}}
.slot-picker-overlay{position:fixed;inset:0;background:rgba(8,14,13,.85);backdrop-filter:blur(8px);z-index:500;display:none;align-items:flex-end;justify-content:center;}
.slot-picker-overlay.open{display:flex;}
.slot-picker-panel{background:var(--ink-1);border:1px solid var(--bd);border-radius:16px 16px 0 0;width:100%;max-width:600px;padding:20px;}
.slot-picker-title{font-size:14px;font-weight:600;color:var(--dk-1);margin-bottom:16px;}
.slot-picker-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:14px;}
.slot-day-btn{background:var(--ink-2);border:1px solid var(--bd);border-radius:8px;padding:8px 10px;cursor:pointer;font-family:var(--sans);text-align:center;transition:all .1s;}
.slot-day-btn:hover{border-color:rgba(255,255,255,.1);}
.slot-day-btn.active{background:rgba(0,200,160,.06);border-color:var(--jade-br);}
.slot-day-name{font-size:11px;font-weight:600;color:var(--dk-1);margin-bottom:1px;}
.slot-day-type{font-size:9px;font-weight:300;color:var(--dk-3);}
.slot-row{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap;}
.slot-btn{padding:8px 16px;border-radius:8px;border:1px solid var(--bd);background:transparent;font-size:11px;font-weight:600;color:var(--dk-3);cursor:pointer;font-family:var(--sans);transition:all .1s;}
.slot-btn.active{background:var(--jade-dim);border-color:var(--jade-br);color:var(--jade);}
.slot-confirm-btn{width:100%;background:var(--jade);border:none;color:var(--ink);padding:12px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;font-family:var(--sans);}
</style>
</head>
<body>
<script src="nav.js"></script>
<div class="mp-page">
  <div class="mp-hero">
    <div class="mp-kicker">Food planning</div>
    <div class="mp-title">Your week of<br><em>meals.</em></div>
    <div class="mp-sub">Generate a full week built around your training schedule. Breakfasts and snacks repeat for easy prep — lunches and dinners stay varied. Every day shows macros vs your targets.</div>
  </div>
  <div class="mp-tabs">
    <button class="mp-tab active" onclick="switchTab('week',this)">Week planner</button>
    <button class="mp-tab" onclick="switchTab('builder',this)">Custom meal</button>
  </div>
  <div id="pane-week"></div>
  <div id="pane-builder" style="display:none;"></div>
</div>
<div class="slot-picker-overlay" id="slot-picker">
  <div class="slot-picker-panel">
    <div class="slot-picker-title">Add to which day & slot?</div>
    <div style="font-size:9px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--dk-3);margin-bottom:8px;">Day</div>
    <div class="slot-picker-grid" id="sp-days"></div>
    <div style="font-size:9px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--dk-3);margin-bottom:8px;">Slot</div>
    <div class="slot-row" id="sp-slots"></div>
    <button class="slot-confirm-btn" onclick="confirmSlotPick()">Add to week \u2192</button>
    <button onclick="closeSlotPicker()" style="width:100%;background:none;border:none;color:var(--dk-3);padding:10px;font-size:11px;cursor:pointer;font-family:var(--sans);margin-top:4px;">Cancel</button>
  </div>
</div>
<script>
var API='/api/chat',MODEL='claude-sonnet-4-20250514';
var DAY_NAMES=['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
var SLOT_LABELS={breakfast:'Breakfast',lunch:'Lunch',dinner:'Dinner',snack:'Snack'};
var SLOT_ORDER=['breakfast','lunch','dinner','snack'];

function getProfile(){try{return JSON.parse(localStorage.getItem('bl_profile')||'null');}catch(e){return null;}}

function _weekKey(){var d=new Date(),mon=new Date(d),day=d.getDay();mon.setDate(d.getDate()-(day===0?6:day-1));return 'bl_weekly_meals_'+mon.toISOString().slice(0,10);}
function loadWeeklyMeals(){try{var r=localStorage.getItem(_weekKey());return r?JSON.parse(r):null;}catch(e){return null;}}
function saveWeeklyMeals(data){try{localStorage.setItem(_weekKey(),JSON.stringify(data));}catch(e){}}

function switchTab(id,btn){
  document.querySelectorAll('.mp-tab').forEach(function(b){b.classList.remove('active');});
  btn.classList.add('active');
  document.getElementById('pane-week').style.display=id==='week'?'':'none';
  document.getElementById('pane-builder').style.display=id==='builder'?'':'none';
  if(id==='builder'&&!document.getElementById('mb-root'))renderBuilder();
}

var WP={plan:null,locked:{},generating:false,openDay:null};

function wpInit(){
  var p=getProfile();
  var root=document.getElementById('pane-week');
  if(!root)return;
  if(!p){root.innerHTML='<div style="text-align:center;padding:60px 0;"><div style="font-size:40px;margin-bottom:16px;">\u{1F464}</div><div style="font-size:16px;font-weight:300;color:var(--dk-2);margin-bottom:8px;">Profile needed</div><div style="font-size:12px;font-weight:300;color:var(--dk-3);">Complete onboarding first.</div></div>';return;}
  var ex=loadWeeklyMeals();
  if(ex&&ex.days){WP.plan=ex;WP.locked=ex.locked||{};}
  var nm=document.getElementById('nav-meta');
  if(nm)nm.innerHTML='<span class="nav-tag nt-jade">'+p.name+'</span>';
  var todayIdx=[6,0,1,2,3,4,5][new Date().getDay()];
  WP.openDay=DAY_NAMES[todayIdx]||'Monday';
  wpRender(p);
}

function wpRender(p){
  p=p||getProfile();
  var root=document.getElementById('pane-week');
  if(!root||!p)return;
  var hasWeek=WP.plan&&Object.keys(WP.plan.days||{}).length>0;
  var genDate=WP.plan&&WP.plan.generatedAt?new Date(WP.plan.generatedAt).toLocaleDateString('en-GB',{day:'numeric',month:'short'}):null;
  var genBtnLabel=WP.generating?'<div class="mb-spin"></div> Building your week\u2026':(hasWeek?'\u21ba Regenerate week':'\u2736 Generate my week');
  var genBtnAttr=WP.generating?' disabled':'';
  var html='<div class="wp-gen-bar">'
    +'<div>'
      +'<button class="wp-gen-btn" id="wp-gen-btn" onclick="wpGenerate()"'+genBtnAttr+'>'
      +genBtnLabel
      +'</button>'
    +'</div>'
    +(genDate?'<div class="wp-gen-meta">Generated '+genDate+' \u00b7 <button onclick="wpClearAndRegen()" style="background:none;border:none;color:var(--dk-3);font-size:11px;cursor:pointer;text-decoration:underline;font-family:var(--sans);">Start fresh</button></div>':'')
  +'</div>';

  if(WP.generating){
    html+='<div class="wp-loading"><div class="mb-spin"></div>Building meals around your training schedule\u2026</div>';
    root.innerHTML=html;return;
  }
  if(!hasWeek){
    html+='<div style="text-align:center;padding:48px 20px;border:1px dashed rgba(255,255,255,.08);border-radius:10px;color:var(--dk-3);"><div style="font-size:32px;margin-bottom:12px;">\uD83C\uDF7D</div><div style="font-size:14px;font-weight:300;color:var(--dk-2);margin-bottom:6px;">No meal plan yet</div><div style="font-size:12px;font-weight:300;line-height:1.65;">Tap Generate to build a full week of meals around your training schedule \u2014 Breakfast, Lunch, Dinner and Snacks for all 7 days, with macros synced to each day\'s targets.</div></div>';
    root.innerHTML=html;return;
  }

  html+=DAY_NAMES.map(function(day,idx){
    var dp=(p.weekPlan||[])[idx]||{type:'Rest',priority:'rest'};
    var isTr=dp.priority==='training';
    var dayMeals=(WP.plan.days||{})[day]||{};
    var isOpen=WP.openDay===day;
    var dayKcal=isTr?(p.trainingKcal||p.calories||2700):(p.restKcal||Math.round((p.calories||2500)*0.91));
    var dayProt=p.protein||140;
    var totKcal=0,totProt=0,totCarbs=0,totFat=0;
    SLOT_ORDER.forEach(function(s){var m=dayMeals[s];if(m){totKcal+=m.calories||0;totProt+=m.protein||0;totCarbs+=m.carbs||0;totFat+=m.fat||0;}});
    var protPct=Math.min(100,dayProt>0?Math.round(totProt/dayProt*100):0);
    var protColor=protPct>=90?'var(--jade)':protPct>=70?'var(--amber)':'rgba(220,80,60,.7)';

    return '<div class="wp-day '+(isOpen?'open ':'')+( isTr?'training':'rest')+'" id="wpday-'+day+'">'
      +'<div class="wp-day-hd" onclick="wpToggleDay(\''+day+'\')">'
        +'<div class="wp-day-name">'+day+'</div>'
        +'<div class="wp-day-type">'+(isTr?(dp.type||'Training'):'Rest')+'</div>'
        +'<div class="wp-day-macros">'
          +(totProt>0
            ?'<div class="wp-macro-mini"><span class="wp-macro-mini-val" style="color:var(--jade);">'+totProt+'g</span><span class="wp-macro-mini-label"> P</span></div>'
             +'<div class="wp-macro-bar"><div class="wp-macro-fill" style="width:'+protPct+'%;background:'+protColor+';"></div></div>'
             +'<div class="wp-macro-mini"><span class="wp-macro-mini-val">'+totKcal+'</span><span class="wp-macro-mini-label"> kcal</span></div>'
            :'<div style="font-size:10px;font-weight:300;color:rgba(255,255,255,.12);">No meals yet</div>')
        +'</div>'
        +'<div class="wp-day-chevron">\u25be</div>'
      +'</div>'
      +'<div class="wp-day-body">'
        +SLOT_ORDER.map(function(slot){
          var m=dayMeals[slot];
          var lk=WP.locked[day+'_'+slot];
          return '<div class="wp-slot">'
            +'<div class="wp-slot-label">'+SLOT_LABELS[slot]+'</div>'
            +'<div class="wp-slot-meal">'
              +(m
                ?'<div class="wp-meal-name">'+m.name+'</div>'
                 +'<div class="wp-meal-macros">'
                   +'<span class="wp-meal-macro"><strong style="color:var(--jade);">'+(m.protein||0)+'g</strong> P</span>'
                   +'<span class="wp-meal-macro"><strong>'+(m.carbs||0)+'g</strong> C</span>'
                   +'<span class="wp-meal-macro"><strong>'+(m.fat||0)+'g</strong> F</span>'
                   +'<span class="wp-meal-macro"><strong>'+(m.calories||0)+'</strong> kcal</span>'
                   +(m.prepTime?'<span class="wp-meal-macro" style="color:var(--dk-3);">\u00b7 '+m.prepTime+'</span>':'')
                 +'</div>'
                :'<div class="wp-slot-empty">Not set</div>')
            +'</div>'
            +'<div class="wp-slot-actions">'
              +'<button class="wp-slot-btn '+(lk?'locked':'')+'" title="'+(lk?'Unlock':'Lock')+'" onclick="wpToggleLock(\''+day+'\',\''+slot+'\',this)">'+(lk?'\uD83D\uDD12':'\uD83D\uDD13')+'</button>'
              +(!lk?'<button class="wp-slot-btn" title="Swap" onclick="wpSwapSlot(\''+day+'\',\''+slot+'\')">\u21bb</button>':'')
            +'</div>'
          +'</div>';
        }).join('')
        +'<div class="wp-day-total">'
          +'<div class="wp-total-label">Day total</div>'
          +'<div class="wp-total-bars">'
            +[{label:'P',val:totProt,target:dayProt,color:'var(--jade)'},{label:'kcal',val:totKcal,target:dayKcal,color:'var(--amber)'}].map(function(m){
              var pct=Math.min(100,m.target>0?Math.round(m.val/m.target*100):0);
              var col=pct>=90&&pct<=112?m.color:pct<80?'rgba(220,80,60,.7)':'var(--amber)';
              return '<div class="wp-total-macro">'
                +'<div class="wp-total-track"><div class="wp-total-fill" style="width:'+pct+'%;background:'+col+';"></div></div>'
                +'<div class="wp-total-val" style="color:'+col+';">'+m.val+(m.label==='P'?'g':'')+' '+m.label+'</div>'
                +'<div class="wp-total-target">/ '+m.target+(m.label==='P'?'g':'')+'</div>'
              +'</div>';
            }).join('')
          +'</div>'
        +'</div>'
      +'</div>'
    +'</div>';
  }).join('');

  html+='<div class="wp-save-bar"><div class="wp-save-note">Saves to your daily plan. Today reads from this immediately.</div><button class="wp-save-btn" onclick="wpSave()">Save week \u2192</button></div>';
  root.innerHTML=html;
}

function wpToggleDay(day){WP.openDay=WP.openDay===day?null:day;wpRender();}

function wpToggleLock(day,slot){
  var key=day+'_'+slot;WP.locked[key]=!WP.locked[key];
  if(WP.plan)WP.plan.locked=WP.locked;saveWeeklyMeals(WP.plan);wpRender();
}

async function wpSwapSlot(day,slot){
  var p=getProfile();if(!p)return;
  var idx=DAY_NAMES.indexOf(day);
  var dp=(p.weekPlan||[])[idx>=0?idx:0]||{priority:'rest',type:'Rest'};
  var isTr=dp.priority==='training';
  var dayKcal=isTr?(p.trainingKcal||2700):(p.restKcal||2400);
  var splits={breakfast:.28,lunch:.32,dinner:.30,snack:.10};
  var f=splits[slot]||.25;
  var prompt='Performance nutrition coach.\nUser: '+p.age+'yo, '+p.weight+'kg, goal: '+(p.goal||'recomposition')+'\n'
    +'Cuisine: '+((p.cuisinePrefs||[]).join(',')||'flexible')+' | Exclude: '+((p.foodExclusions||[]).join(',')||'none')+'\n'
    +'Day: '+day+' ('+(isTr?dp.type+' training':'rest day')+')\n'
    +'Slot: '+SLOT_LABELS[slot]+' | Target: ~'+Math.round(dayKcal*f)+' kcal, ~'+Math.round((p.protein||140)/4)+'g protein\n\n'
    +'Return ONE meal as JSON only:\n{"name":"Recipe","calories":0,"protein":0,"carbs":0,"fat":0,"prepTime":"10 min","ingredients":[{"name":"","quantity":""}],"method":"One sentence."}';
  var swapEl=document.querySelector('#wpday-'+day+' .wp-day-body');
  if(swapEl){var prev=swapEl.innerHTML;swapEl.style.opacity='.4';}
  try{
    var res=await fetch(API,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:MODEL,max_tokens:400,system:'Return ONLY valid JSON.',messages:[{role:'user',content:prompt}]})});
    var data=await res.json();
    var text=(data.content||[]).map(function(b){return b.text||'';}).join('').trim();
    var m=text.match(/\{[\s\S]*\}/);
    if(!m)throw new Error('no json');
    var meal=JSON.parse(m[0]);
    if(!WP.plan)WP.plan={days:{},locked:{}};
    if(!WP.plan.days[day])WP.plan.days[day]={};
    WP.plan.days[day][slot]=meal;
    WP.plan.locked=WP.locked;
    saveWeeklyMeals(WP.plan);
  }catch(e){}
  if(swapEl)swapEl.style.opacity='';
  wpRender();
}

function wpSave(){
  if(!WP.plan)return;
  WP.plan.locked=WP.locked;saveWeeklyMeals(WP.plan);
  var btn=document.querySelector('.wp-save-btn');
  if(btn){btn.textContent='\u2713 Saved';btn.style.opacity='.6';setTimeout(function(){btn.textContent='Save week \u2192';btn.style.opacity='';},2000);}
}
function wpClearAndRegen(){
  if(!confirm('Clear this week\'s plan and generate a new one?'))return;
  WP.plan=null;WP.locked={};try{localStorage.removeItem(_weekKey());}catch(e){}wpRender();
}

async function wpGenerate(){
  var p=getProfile();if(!p)return;
  WP.generating=true;wpRender(p);
  var ex=(p.foodExclusions||[]).join(',')||'none';
  var cu=(p.cuisinePrefs||[]).join(',')||'flexible';
  var tKcal=p.trainingKcal||(p.calories||2700);
  var rKcal=p.restKcal||Math.round((p.calories||2500)*0.91);
  var prot=p.protein||140;
  var sched=DAY_NAMES.map(function(name,i){
    var dp=(p.weekPlan||[])[i]||{type:'Rest',priority:'rest'};
    return name+': '+(dp.priority==='training'?dp.type+' training day | kcal '+tKcal:'rest day | kcal '+rKcal);
  }).join('\n');
  var prompt='Performance nutritionist. Build a 7-day meal plan for '+p.name+'.\n'
    +'Profile: '+p.age+'yo '+(p.sex||'male')+', '+p.weight+'kg, goal: '+(p.goal||'body recomposition')+'\n'
    +'Daily protein: '+prot+'g | Cuisine: '+cu+' | Exclude: '+ex+' | Complexity: '+(p.recipeComplexity||'standard')+'\n\n'
    +'Schedule:\n'+sched+'\n\n'
    +'RULES:\n'
    +'- Breakfast & Snack: same meal Mon+Wed+Fri (group A), same meal Tue+Thu+Sat (group B), unique Sunday\n'
    +'- Lunch & Dinner: unique every day\n'
    +'- Training days: higher carbs (especially breakfast/lunch)\n'
    +'- Rest days: slightly lower carbs, same protein\n'
    +'- Calorie splits: breakfast 28%, lunch 32%, dinner 30%, snack 10%\n\n'
    +'Return ONLY valid compact JSON:\n'
    +'{"days":{"Monday":{"breakfast":{"name":"Specific Recipe Name","calories":0,"protein":0,"carbs":0,"fat":0,"prepTime":"10 min","ingredients":[{"name":"item","quantity":"200g"}],"method":"One sentence."},"lunch":{same schema},"dinner":{same schema},"snack":{same schema}},"Tuesday":{...},"Wednesday":{...},"Thursday":{...},"Friday":{...},"Saturday":{...},"Sunday":{...}}}\n'
    +'All 7 days required. All 4 slots per day required. Accurate macros that sum close to the daily kcal targets.';
  try{
    var res=await fetch(API,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:MODEL,max_tokens:4000,system:'Return ONLY valid compact JSON. No markdown, no preamble.',messages:[{role:'user',content:prompt}]})});
    var data=await res.json();
    var text=(data.content||[]).map(function(b){return b.text||'';}).join('').trim();
    var match=text.match(/\{[\s\S]*\}/);
    if(!match)throw new Error('no json');
    var parsed=JSON.parse(match[0]);
    WP.plan={weekKey:_weekKey(),generatedAt:new Date().toISOString(),days:parsed.days||{},locked:{}};
    WP.locked={};saveWeeklyMeals(WP.plan);
  }catch(e){console.error('Meal plan failed:',e);}
  WP.generating=false;
  var ti=[6,0,1,2,3,4,5][new Date().getDay()];
  WP.openDay=DAY_NAMES[ti]||'Monday';
  wpRender(p);
}

// CUSTOM MEAL BUILDER
var MB={context:'training',protein:null,carb:null,veg:[],extra:null,step:1,meals:[],loading:false,pendingMeal:null,pickerDay:'Monday',pickerSlot:'lunch',openMeal:null};
var PROTEINS=[{id:'chicken-breast',name:'Chicken breast',note:'Lean, versatile'},{id:'salmon',name:'Salmon',note:'Omega-3 rich'},{id:'beef-mince',name:'Lean beef mince',note:'High iron'},{id:'eggs',name:'Eggs',note:'Complete protein'},{id:'greek-yogurt',name:'Greek yogurt',note:'Casein + cultures'},{id:'tuna',name:'Tuna',note:'Fast, easy'},{id:'turkey-mince',name:'Turkey mince',note:'Lean, mild'},{id:'tofu',name:'Tofu',note:'Plant-based'},{id:'cottage-cheese',name:'Cottage cheese',note:'Slow-digest casein'},{id:'cod',name:'Cod / white fish',note:'Very lean'}];
var CARBS=[{id:'white-rice',name:'White rice',note:'Fast-digesting'},{id:'sweet-potato',name:'Sweet potato',note:'High micronutrients'},{id:'oats',name:'Oats',note:'Slow release'},{id:'pasta',name:'Pasta',note:'Satisfying'},{id:'quinoa',name:'Quinoa',note:'Protein + carb'},{id:'sourdough',name:'Sourdough',note:'Gut-friendly'},{id:'nocarb',name:'No carb',note:'Low-carb meal'}];
var VEGS=[{id:'broccoli',name:'Broccoli'},{id:'spinach',name:'Spinach'},{id:'asparagus',name:'Asparagus'},{id:'courgette',name:'Courgette'},{id:'peppers',name:'Mixed peppers'},{id:'kale',name:'Kale'},{id:'cucumber',name:'Cucumber'},{id:'tomatoes',name:'Tomatoes'}];
var EXTRAS=[{id:'garlic-herb',name:'Garlic & herbs',note:'Classic'},{id:'asian-ginger',name:'Ginger & soy',note:'Asian-inspired'},{id:'lemon-caper',name:'Lemon & capers',note:'Mediterranean'},{id:'harissa',name:'Harissa',note:'North African heat'},{id:'miso',name:'Miso glaze',note:'Umami depth'},{id:'plain',name:'Plain / flexible',note:'No strong flavour'}];

function renderBuilder(){
  var p=getProfile();var root=document.getElementById('pane-builder');
  if(!root||!p)return;
  if(!document.getElementById('mb-root'))root.innerHTML='<div id="mb-root"></div>';
  renderMB(p);
}
function renderMB(p){
  p=p||getProfile();var root=document.getElementById('mb-root');
  if(!root||!p)return;
  var ctxs=[{id:'training',label:'Training day'},{id:'rest',label:'Rest day'},{id:'postworkout',label:'Post-workout'},{id:'light',label:'Light meal'}];
  var html='<div class="mb-ctx-row">'+ctxs.map(function(c){return '<button class="mb-ctx-chip '+(MB.context===c.id?'active':'')+'" onclick="MB.context=\''+c.id+'\';renderMB()">'+c.label+'</button>';}).join('')+'</div>';
  if(MB.loading){html+='<div class="mb-loading"><div class="mb-spin"></div>Building your meal options\u2026</div>';root.innerHTML=html;return;}
  if(MB.step<=4){
    html+='<div class="mb-sec">1 \u2014 Protein</div><div class="mb-grid">'+PROTEINS.map(function(x){return '<div class="mb-option '+(MB.protein===x.id?'selected':'')+'" onclick="MB.protein=\''+x.id+'\';renderMB()"><div class="mb-option-name">'+x.name+'</div><div class="mb-option-sub">'+x.note+'</div></div>';}).join('')+'</div>';
    if(MB.protein){html+='<div class="mb-sec">2 \u2014 Carbohydrate</div><div class="mb-grid">'+CARBS.map(function(x){return '<div class="mb-option '+(MB.carb===x.id?'selected':'')+'" onclick="MB.carb=\''+x.id+'\';renderMB()"><div class="mb-option-name">'+x.name+'</div><div class="mb-option-sub">'+x.note+'</div></div>';}).join('')+'</div>';}
    if(MB.protein&&MB.carb){
      html+='<div class="mb-sec">3 \u2014 Vegetables <span style="font-size:9px;font-weight:300;color:var(--dk-3);letter-spacing:.04em;text-transform:lowercase;">(1\u20133 or skip)</span></div><div class="mb-grid">'+VEGS.map(function(x){return '<div class="mb-option '+(MB.veg.indexOf(x.id)>=0?'selected':'')+'" onclick="mbToggleVeg(\''+x.id+'\')"><div class="mb-option-name">'+x.name+'</div></div>';}).join('')+'</div>';
      html+='<div class="mb-sec">4 \u2014 Flavour</div><div class="mb-grid">'+EXTRAS.map(function(x){return '<div class="mb-option '+(MB.extra===x.id?'selected':'')+'" onclick="MB.extra=\''+x.id+'\';renderMB()"><div class="mb-option-name">'+x.name+'</div><div class="mb-option-sub">'+x.note+'</div></div>';}).join('')+'</div>';
    }
    if(MB.protein&&MB.carb&&MB.extra){html+='<button class="mb-generate-btn" onclick="mbGenerate()">Generate 5 meal combinations \u2192</button>';}
  }
  if(MB.step===5&&MB.meals.length){
    html+='<div class="mb-sec amber">Your 5 meal combinations</div>'
      +'<div style="margin-bottom:12px;display:flex;gap:8px;">'
        +'<button onclick="mbGenerate()" style="background:transparent;border:1px solid var(--bd);color:var(--dk-3);padding:7px 14px;border-radius:7px;font-size:10px;font-weight:600;cursor:pointer;font-family:var(--sans);">\u21ba Regenerate</button>'
        +'<button onclick="MB.step=1;MB.meals=[];renderMB()" style="background:transparent;border:1px solid var(--bd);color:var(--dk-3);padding:7px 14px;border-radius:7px;font-size:10px;font-weight:600;cursor:pointer;font-family:var(--sans);">\u2190 New selection</button>'
      +'</div>'
      +'<div class="mb-meals-grid">'+MB.meals.map(function(meal,i){
        var isOpen=MB.openMeal===i;
        return '<div class="mb-meal-card '+(isOpen?'open':'')+'" id="mbm-'+i+'">'
          +'<div class="mb-meal-hd" onclick="MB.openMeal=MB.openMeal==='+i+'?null:'+i+';renderMB()">'
            +'<div class="mb-meal-num">'+(i+1)+'</div>'
            +'<div class="mb-meal-info"><div class="mb-meal-style">'+(meal.style||'')+'</div><div class="mb-meal-name">'+meal.title+'</div><div class="mb-meal-why">'+(meal.why||'')+'</div></div>'
            +'<div class="mb-meal-macros-row"><div class="mb-macro-pill p">'+(meal.protein_g||0)+'g P</div><div class="mb-macro-pill">'+(meal.kcal||0)+' kcal</div></div>'
          +'</div>'
          +(isOpen?'<div class="mb-meal-body">'
            +'<div class="mb-ings">'+(meal.ingredients||[]).map(function(ing){return '<div class="mb-ing">'+ing.name+' <em>'+ing.portion+'</em></div>';}).join('')+'</div>'
            +'<div class="mb-method">'+(meal.method||'')+'</div>'
            +((meal.swaps||[]).length?'<div class="mb-swaps">'+meal.swaps.map(function(s){return '<div class="mb-swap">'+s+'</div>';}).join('')+'</div>':'')
            +'<button class="mb-use-btn" onclick="mbOpenSlotPicker('+i+')">+ Add to week \u2192</button>'
          +'</div>':'')
        +'</div>';
      }).join('')+'</div>';
  }
  root.innerHTML=html;
}
function mbToggleVeg(id){var idx=MB.veg.indexOf(id);if(idx>=0)MB.veg.splice(idx,1);else if(MB.veg.length<3)MB.veg.push(id);renderMB();}
async function mbGenerate(){
  var p=getProfile();if(!p)return;MB.loading=true;renderMB(p);
  var pi=PROTEINS.find(function(x){return x.id===MB.protein;})||{name:MB.protein};
  var ci=CARBS.find(function(x){return x.id===MB.carb;})||{name:MB.carb};
  var vns=MB.veg.map(function(id){var v=VEGS.find(function(x){return x.id===id;});return v?v.name:'';}).filter(Boolean);
  var ei=EXTRAS.find(function(x){return x.id===MB.extra;})||{name:MB.extra};
  var isTr=MB.context==='training'||MB.context==='postworkout';
  var dayKcal=isTr?(p.trainingKcal||2700):(p.restKcal||2400);
  var perMeal=Math.round(dayKcal/(p.mealCount||4));
  var pPerMeal=Math.round((p.protein||140)/(p.mealCount||4));
  var prompt='Performance nutrition coach. Create 5 personalised meal combinations.\nUser: '+p.name+', '+p.age+'yo, '+p.weight+'kg, goal: '+(p.goal||'body recomposition')+'\nContext: '+MB.context+' | Cuisine: '+((p.cuisinePrefs||[]).join(',')||'flexible')+'\nExclude: '+((p.foodExclusions||[]).join(',')||'none')+'\nTarget: ~'+perMeal+' kcal, ~'+pPerMeal+'g protein per meal\n\nIngredients: '+pi.name+' + '+(ci.name||'no carb')+(vns.length?' + '+vns.join(', '):'') +' + '+ei.name+'\n\nCreate 5 distinct meals. Vary cuisine, texture, cooking method.\nReturn ONLY valid JSON:\n{"meals":[{"title":"Name","style":"Style","why":"Why this works","protein_g":0,"carbs_g":0,"fat_g":0,"kcal":0,"ingredients":[{"name":"","portion":""}],"method":"One sentence.","swaps":["swap 1","swap 2"]}]}';
  try{
    var res=await fetch(API,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:MODEL,max_tokens:2000,system:'Return ONLY valid JSON.',messages:[{role:'user',content:prompt}]})});
    var data=await res.json();var text=(data.content||[]).map(function(b){return b.text||'';}).join('').trim();
    var m=text.match(/\{[\s\S]*\}/);if(!m)throw new Error('no json');
    MB.meals=JSON.parse(m[0]).meals||[];
  }catch(e){MB.meals=[];}
  MB.loading=false;MB.step=5;MB.openMeal=null;renderMB();
}
function mbOpenSlotPicker(i){MB.pendingMeal=MB.meals[i];MB.pickerDay='Monday';MB.pickerSlot='lunch';renderSlotPicker();document.getElementById('slot-picker').classList.add('open');}
function closeSlotPicker(){document.getElementById('slot-picker').classList.remove('open');MB.pendingMeal=null;}
function renderSlotPicker(){
  var p=getProfile();if(!p)return;
  var de=document.getElementById('sp-days');var se=document.getElementById('sp-slots');if(!de||!se)return;
  de.innerHTML=DAY_NAMES.map(function(day,i){
    var dp=(p.weekPlan||[])[i]||{type:'Rest',priority:'rest'};
    return '<button class="slot-day-btn '+(MB.pickerDay===day?'active':'')+'" onclick="MB.pickerDay=\''+day+'\';renderSlotPicker()"><div class="slot-day-name">'+day.slice(0,3)+'</div><div class="slot-day-type">'+(dp.priority==='training'?dp.type:'Rest')+'</div></button>';
  }).join('');
  se.innerHTML=SLOT_ORDER.map(function(slot){return '<button class="slot-btn '+(MB.pickerSlot===slot?'active':'')+'" onclick="MB.pickerSlot=\''+slot+'\';renderSlotPicker()">'+SLOT_LABELS[slot]+'</button>';}).join('');
}
function confirmSlotPick(){
  var meal=MB.pendingMeal;if(!meal)return;
  if(!WP.plan)WP.plan={days:{},locked:{}};
  if(!WP.plan.days[MB.pickerDay])WP.plan.days[MB.pickerDay]={};
  WP.plan.days[MB.pickerDay][MB.pickerSlot]={name:meal.title,calories:meal.kcal||0,protein:meal.protein_g||0,carbs:meal.carbs_g||0,fat:meal.fat_g||0,prepTime:'15 min',ingredients:meal.ingredients||[],method:meal.method||''};
  WP.plan.locked=WP.locked;saveWeeklyMeals(WP.plan);closeSlotPicker();
  WP.openDay=MB.pickerDay;
  var weekTab=document.querySelector('.mp-tab');if(weekTab)switchTab('week',weekTab);
  wpRender();
}

wpInit();
</script>
