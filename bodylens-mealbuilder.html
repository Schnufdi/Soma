<link rel="manifest" href="/manifest.json">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="BodyLens">

<title>BodyLens — Meal Builder</title>

<style>
body { background:var(--ink); color:var(--dk-1); }
.mb-page { max-width:860px; margin:0 auto; padding:0 28px 100px; }

/* ── HERO ─────────────────────────────────────── */
.mb-hero { padding:40px 0 32px; }
.mb-kicker { font-size:10px; font-weight:700; letter-spacing:.22em; text-transform:uppercase; color:var(--dk-3); margin-bottom:10px; }
.mb-title { font-family:var(--serif); font-size:52px; font-weight:300; line-height:.93; letter-spacing:-.025em; color:var(--dk-1); margin-bottom:12px; }
.mb-title em { font-style:italic; color:var(--dk-3); }
.mb-sub { font-size:13px; font-weight:300; color:var(--dk-2); line-height:1.7; max-width:480px; margin-bottom:0; }

/* ── CONTEXT BAR ──────────────────────────────── */
.mb-context {
  display:flex; gap:6px; flex-wrap:wrap;
  padding:12px 0 24px;
  border-bottom:1px solid var(--bd);
  margin-bottom:28px;
}
.mb-ctx-pill {
  display:flex; align-items:center; gap:5px;
  background:var(--ink-1); border:1px solid var(--bd);
  border-radius:16px; padding:4px 12px;
  font-size:10px; font-weight:500; color:var(--dk-3);
}
.mb-ctx-pill strong { color:var(--dk-1); font-weight:600; }
.mb-ctx-pill.training { border-color:var(--jade-br); }
.mb-ctx-pill.training strong { color:var(--jade); }
.mb-ctx-pill.goal { border-color:rgba(200,148,30,.25); }
.mb-ctx-pill.goal strong { color:var(--amber); }

/* ── STEP FLOW ────────────────────────────────── */
.mb-steps {
  display:flex; align-items:center; gap:0;
  margin-bottom:28px; overflow-x:auto;
  padding-bottom:2px;
}
.mb-steps::-webkit-scrollbar { display:none; }
.mb-step {
  display:flex; align-items:center; gap:0;
  flex-shrink:0;
}
.mb-step-pill {
  display:flex; align-items:center; gap:7px;
  padding:7px 14px; border-radius:20px;
  font-size:10px; font-weight:600; letter-spacing:.06em; text-transform:uppercase;
  color:var(--dk-3); background:transparent;
  border:1px solid var(--bd); transition:all .15s;
  white-space:nowrap;
}
.mb-step-pill.done {
  background:var(--ink-1); border-color:var(--jade-br); color:var(--jade);
}
.mb-step-pill.active {
  background:var(--jade); color:var(--ink); border-color:var(--jade);
}
.mb-step-num {
  width:18px; height:18px; border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  font-size:9px; font-weight:700;
  background:rgba(255,255,255,.1);
}
.mb-step-pill.done .mb-step-num { background:rgba(0,200,160,.2); }
.mb-step-pill.active .mb-step-num { background:rgba(0,0,0,.2); }
.mb-step-arrow {
  width:24px; height:1px; background:var(--bd); flex-shrink:0;
}
.mb-step-arrow.done { background:var(--jade-br); }

/* ── SECTION LABEL ────────────────────────────── */
.mb-sec {
  font-size:9px; font-weight:700; letter-spacing:.18em; text-transform:uppercase;
  color:var(--dk-3); margin:0 0 14px;
  display:flex; align-items:center; gap:10px;
}
.mb-sec::after { content:''; flex:1; height:1px; background:var(--bd); }
.mb-sec.jade { color:var(--jade); }
.mb-sec.amber { color:var(--amber); }

/* ── CHOICE GRID ──────────────────────────────── */
.mb-grid {
  display:grid; grid-template-columns:repeat(auto-fill, minmax(130px, 1fr));
  gap:8px; margin-bottom:24px;
}
.mb-choice {
  background:var(--ink-1); border:1px solid var(--bd);
  border-radius:8px; padding:14px 12px;
  cursor:pointer; transition:all .15s;
  display:flex; flex-direction:column; align-items:center;
  gap:6px; text-align:center;
  animation:mbFadeIn .2s ease both;
}
.mb-choice:hover { border-color:rgba(255,255,255,.12); transform:translateY(-1px); }
.mb-choice.selected {
  border-color:var(--jade); background:rgba(0,200,160,.04);
}
.mb-choice.disabled { opacity:.35; cursor:not-allowed; pointer-events:none; }
@keyframes mbFadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
.mb-choice-icon { font-size:22px; line-height:1; }
.mb-choice-name { font-size:12px; font-weight:600; color:var(--dk-1); line-height:1.2; }
.mb-choice-meta { font-size:9px; font-weight:400; color:var(--dk-3); }
.mb-choice.selected .mb-choice-name { color:var(--jade); }

/* ── MEAL CONTEXT TOGGLE ──────────────────────── */
.mb-toggle-row {
  display:flex; gap:6px; margin-bottom:20px; flex-wrap:wrap;
}
.mb-toggle {
  padding:6px 14px; border-radius:16px;
  font-size:10px; font-weight:600; letter-spacing:.05em; text-transform:uppercase;
  border:1px solid var(--bd); background:transparent;
  color:var(--dk-3); cursor:pointer; font-family:var(--sans);
  transition:all .12s;
}
.mb-toggle.active { background:var(--amber); border-color:var(--amber); color:var(--ink); }

/* ── SELECTED SUMMARY BAR ─────────────────────── */
.mb-summary-bar {
  display:flex; gap:6px; align-items:center; flex-wrap:wrap;
  padding:10px 14px; background:var(--ink-1); border:1px solid var(--bd);
  border-radius:8px; margin-bottom:20px;
  font-size:11px; font-weight:300; color:var(--dk-3);
}
.mb-summary-item {
  display:flex; align-items:center; gap:5px;
  background:rgba(0,200,160,.06); border:1px solid var(--jade-br);
  border-radius:12px; padding:3px 10px;
  font-size:10px; font-weight:600; color:var(--jade);
}
.mb-summary-sep { color:var(--bd); font-size:14px; }
.mb-summary-btn {
  margin-left:auto; background:transparent; border:1px solid var(--bd);
  border-radius:12px; padding:3px 10px; font-size:9px; font-weight:600;
  letter-spacing:.06em; text-transform:uppercase; color:var(--dk-3);
  cursor:pointer; font-family:var(--sans); transition:all .1s;
}
.mb-summary-btn:hover { border-color:rgba(255,255,255,.1); color:var(--dk-2); }

/* ── MEAL CARDS ───────────────────────────────── */
.mb-meals { display:flex; flex-direction:column; gap:12px; }
.mb-meal {
  background:var(--ink-1); border:1px solid var(--bd);
  border-radius:10px; overflow:hidden;
  animation:mbFadeIn .25s ease both;
  cursor:pointer; transition:border-color .12s;
}
.mb-meal:hover { border-color:rgba(255,255,255,.1); }
.mb-meal.open { border-color:rgba(200,148,30,.3); }
.mb-meal-hd {
  display:flex; align-items:center; gap:12px;
  padding:16px 18px;
}
.mb-meal-num {
  font-family:var(--serif); font-size:32px; font-weight:300;
  color:var(--dk-3); line-height:1; flex-shrink:0; width:32px;
}
.mb-meal.open .mb-meal-num { color:var(--amber); }
.mb-meal-info { flex:1; min-width:0; }
.mb-meal-title { font-size:15px; font-weight:600; color:var(--dk-1); margin-bottom:3px; }
.mb-meal.open .mb-meal-title { color:var(--dk-1); }
.mb-meal-style { font-size:10px; font-weight:600; letter-spacing:.08em; text-transform:uppercase; color:var(--amber); margin-bottom:4px; }
.mb-meal-preview { font-size:11px; font-weight:300; color:var(--dk-3); line-height:1.4; }
.mb-meal-macros {
  display:flex; gap:8px; align-items:center; flex-shrink:0;
}
.mb-macro-badge {
  text-align:center;
  background:var(--ink-2); border:1px solid var(--bd);
  border-radius:5px; padding:5px 8px;
  min-width:40px;
}
.mb-macro-badge-val { font-family:var(--mono); font-size:12px; font-weight:600; color:var(--dk-1); line-height:1; }
.mb-macro-badge-val.p { color:var(--jade); }
.mb-macro-badge-val.c { color:var(--amber); }
.mb-macro-badge-label { font-size:7px; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:var(--dk-3); margin-top:2px; }
.mb-meal-chevron { color:var(--dk-3); font-size:10px; transition:transform .15s; flex-shrink:0; }
.mb-meal.open .mb-meal-chevron { transform:rotate(180deg); color:var(--amber); }

/* Meal body */
.mb-meal-body {
  display:none; border-top:1px solid var(--bd);
  background:var(--ink-2);
}
.mb-meal.open .mb-meal-body { display:block; }
.mb-meal-section { padding:14px 18px; border-bottom:1px solid var(--bd); }
.mb-meal-section:last-child { border-bottom:none; }
.mb-meal-section-label {
  font-size:8px; font-weight:700; letter-spacing:.16em; text-transform:uppercase;
  color:var(--dk-3); margin-bottom:8px;
}
.mb-ing-list { display:flex; flex-direction:column; gap:4px; }
.mb-ing {
  display:flex; align-items:baseline; justify-content:space-between;
  font-size:12px; font-weight:300; color:var(--dk-2);
  padding:3px 0; border-bottom:1px solid rgba(255,255,255,.04);
}
.mb-ing:last-child { border-bottom:none; }
.mb-ing-portion { font-family:var(--mono); font-size:11px; color:var(--dk-3); }
.mb-ing.free { color:var(--dk-3); font-style:italic; }
.mb-ing.free .mb-ing-portion { color:rgba(100,180,100,.6); }
.mb-why-text { font-family:var(--serif); font-size:14px; font-weight:300; color:var(--dk-2); line-height:1.8; }
.mb-swap-list { display:flex; flex-wrap:wrap; gap:6px; }
.mb-swap {
  background:var(--ink-1); border:1px solid var(--bd);
  border-radius:12px; padding:4px 11px;
  font-size:10px; font-weight:500; color:var(--dk-3);
}

/* Save button */
.mb-meal-save {
  display:block; width:calc(100% - 36px); margin:0 18px 14px;
  background:var(--amber); border:none; color:var(--ink);
  border-radius:7px; padding:10px; font-size:11px; font-weight:700;
  letter-spacing:.06em; text-transform:uppercase; cursor:pointer;
  font-family:var(--sans); transition:opacity .12s;
}
.mb-meal-save:hover { opacity:.9; }
.mb-meal-save.saved { background:var(--jade); }

/* ── REBUILD / GENERATE BAR ───────────────────── */
.mb-gen-bar {
  display:flex; align-items:center; gap:10px;
  padding:12px 16px; background:rgba(200,148,30,.04);
  border:1px solid rgba(200,148,30,.2); border-radius:8px;
  margin-bottom:20px;
}
.mb-gen-text { flex:1; font-size:12px; font-weight:300; color:var(--dk-2); }
.mb-gen-btn {
  flex-shrink:0; background:var(--amber); border:none; color:var(--ink);
  padding:8px 16px; border-radius:6px; font-size:10px; font-weight:700;
  letter-spacing:.06em; text-transform:uppercase; cursor:pointer;
  font-family:var(--sans); white-space:nowrap;
}

/* Loading */
.mb-loading {
  display:flex; flex-direction:column; align-items:center;
  padding:40px 0; gap:12px;
}
.mb-loading-text { font-size:12px; font-weight:300; color:var(--dk-3); }
.mb-spin { width:20px; height:20px; border:2px solid rgba(255,255,255,.08); border-top-color:var(--amber); border-radius:50%; animation:mbSpin .7s linear infinite; }
@keyframes mbSpin { to{transform:rotate(360deg)} }

/* Empty state */
.mb-empty { text-align:center; padding:48px 0; }
.mb-empty-icon { font-size:32px; margin-bottom:12px; }
.mb-empty-title { font-family:var(--serif); font-size:22px; font-weight:300; color:var(--dk-1); margin-bottom:6px; }
.mb-empty-body { font-size:12px; font-weight:300; color:var(--dk-3); line-height:1.7; }

/* Responsive */
@media(max-width:600px) {
  .mb-page { padding:0 16px 80px; }
  .mb-title { font-size:40px; }
  .mb-grid { grid-template-columns:repeat(3,1fr); }
  .mb-meal-macros { display:none; }
}
</style>
</head>

    { id:'rice',      icon:'🍚', name:'Basmati rice',  meta:'~45g carb / 150g cooked', carbs:45, kcal:195 },
    { id:'quinoa',    icon:'🌾', name:'Quinoa',        meta:'~30g carb / 100g cooked', carbs:30, kcal:150 },
    { id:'nocarb',    icon:'🥗', name:'No carb',       meta:'Keto-friendly option',    carbs:0,  kcal:0   },
  ],

// ── Get extras based on profile cuisine prefs ─────────
function getExtras(p) {
  var prefs = (p && p.cuisinePrefs) || [];
  var prefStr = prefs.join(' ').toLowerCase();
  if (prefStr.includes('asian') || prefStr.includes('chinese') || prefStr.includes('japanese') || prefStr.includes('thai')) {
    return EXTRAS_BY_CONTEXT.asian;
  }
  if (prefStr.includes('mediterr') || prefStr.includes('middle') || prefStr.includes('greek') || prefStr.includes('turkish') || prefStr.includes('lebanese')) {
    return EXTRAS_BY_CONTEXT.mediterranean;
  }
  // Default: show all
  var all = [];
  var seen = {};
  Object.values(EXTRAS_BY_CONTEXT).forEach(function(arr) {
    arr.forEach(function(e) { if (!seen[e.id]) { all.push(e); seen[e.id]=1; } });
  });
  return all.slice(0, 8);
}

// ── Personalisation: infer cuisine from profile ───────
function inferCuisine(p) {
  if (!p) return 'versatile';
  var prefs = (p.cuisinePrefs || []).join(' ').toLowerCase();
  if (prefs.includes('mediterr') || prefs.includes('greek') || prefs.includes('middle')) return 'mediterranean';
  if (prefs.includes('asian') || prefs.includes('japanese') || prefs.includes('thai')) return 'asian';
  if (prefs.includes('british') || prefs.includes('simple')) return 'simple';
  return 'versatile';
}

// ── Macro target per meal ─────────────────────────────
function getMealTarget(p, context) {
  if (!p) return { kcal:600, prot:40, carbs:60, fat:20 };
  var dayKcal = context === 'rest' ? (p.restKcal||2400) : (p.trainingKcal||2700);
  var meals = p.mealCount || 3;
  return {
    kcal:  Math.round(dayKcal / meals),
    prot:  Math.round((p.protein||140) / meals),
    carbs: Math.round((p.carbs||160) * (context === 'rest' ? 0.22 : 0.28)),
    fat:   Math.round((p.fat||60) / meals),
  };
}

// ── Generate meals via AI ─────────────────────────────
async function generateMeals() {
  var p = getProfile();
  if (!p) return;

  STATE.loading = true;
  renderRoot();

  var proteinItem = PROTEINS.find(function(x){ return x.id === STATE.protein; }) || {};
  var carbItem    = (CARBS_BY_PROTEIN[STATE.protein] || []).find(function(x){ return x.id === STATE.carb; }) || {};
  var vegItems    = VEG_OPTIONS.filter(function(v){ return STATE.veg.indexOf(v.id) >= 0; });
  var allExtras   = getExtras(p);
  var extraItem   = allExtras.find(function(x){ return x.id === STATE.extra; }) || {};
  var target      = getMealTarget(p, STATE.mealContext);
  var cuisine     = inferCuisine(p);

  var exclusions  = (p.foodExclusions || []).join(', ') || 'none';
  var goalStr     = p.goal || 'body recomposition';
  var cuisinePrefs = (p.cuisinePrefs || []).join(', ') || 'no strong preference';
  var complexity  = p.recipeComplexity || 'standard';
  var context     = STATE.mealContext;

  var prompt = `You are a performance nutrition coach. Create 5 personalised meal combinations.

USER PROFILE:
- Name: ${p.name||'User'}, Goal: ${goalStr}, Age: ${p.age||35}, Weight: ${p.weight||80}kg
- Cuisine preferences: ${cuisinePrefs}
- Foods to avoid/exclude: ${exclusions}
- Cooking complexity: ${complexity}
- Meal context: ${context} day

MACRO TARGET PER MEAL:
- Calories: ~${target.kcal} kcal
- Protein: ~${target.prot}g
- Carbs: ~${target.carbs}g  
- Fat: ~${target.fat}g

CHOSEN INGREDIENTS:
- Protein: ${proteinItem.name||STATE.protein}
- Carb: ${carbItem.name || (STATE.carb==='nocarb'?'None — low carb meal':STATE.carb)}
- Vegetables: ${vegItems.map(function(v){return v.name;}).join(', ')||'flexible'}
- Flavour/extra: ${extraItem.name||STATE.extra||'flexible'}

INSTRUCTIONS:
1. Create 5 distinct meal paths using these core ingredients
2. Each must match the macro targets as closely as possible
3. Style should vary across the 5 options — different cuisines, textures, cooking methods
4. Keep recipes practical: 1–3 cooking steps, real portion sizes
5. Each must feel personally suited to this user, not generic

Return ONLY valid JSON (no markdown, no explanation):
{
  "meals": [
    {
      "title": "Meal Name",
      "style": "Cuisine / Style",
      "why": "One sentence: why this works for this person's goal and context",
      "protein_g": 0,
      "carbs_g": 0,
      "fat_g": 0,
      "kcal": 0,
      "ingredients": [
        {"name": "Ingredient", "portion": "200g", "note": "optional short note", "free": false}
      ],
      "method": "One sentence cooking instruction",
      "swaps": ["Swap suggestion 1", "Swap suggestion 2"]
    }
  ]
}`;

  try {
    var res = await fetch(API, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: MODEL,
        max_tokens: 2000,
        system: 'Nutrition coach. Return ONLY valid compact JSON. No markdown, no preamble.',
        messages: [{ role: 'user', content: prompt }]
      })
    });
    var data = await res.json();
    var text = (data.content || []).map(function(b){ return b.text||''; }).join('').trim();
    var match = text.match(/\{[\s\S]*\}/);
    if (!match) throw new Error('no json');
    var parsed = JSON.parse(match[0]);
    STATE.meals = parsed.meals || [];
  } catch(e) {
    STATE.meals = getFallbackMeals(proteinItem, carbItem, vegItems, target);
  }

  STATE.loading = false;
  STATE.step = 5;
  renderRoot();
}

// ── Fallback meals if API fails ───────────────────────
function getFallbackMeals(prot, carb, veg, target) {
  var vegNames = veg.map(function(v){ return v.name; }).slice(0, 3).join(', ') || 'mixed veg';
  var carbName = carb.name || 'no carb';
  var protName = prot.name || 'protein';
  return [
    {
      title: 'Classic Performance Bowl',
      style: 'Clean / High-protein',
      why: 'Simple, reliable, and hits protein target reliably for any goal.',
      protein_g: target.prot,
      carbs_g: target.carbs,
      fat_g: target.fat,
      kcal: target.kcal,
      ingredients: [
        { name: protName, portion: '200g', note: 'Grilled or baked', free: false },
        { name: carbName, portion: '150g cooked', note: '', free: false },
        { name: vegNames, portion: '200g', note: 'Unlimited', free: true },
        { name: 'Olive oil', portion: '1 tbsp', note: '', free: false },
      ],
      method: 'Grill the protein, cook the carb, steam or roast the veg, dress with olive oil.',
      swaps: ['Swap carb for sweet potato', 'Add a yogurt-based sauce for more flavour']
    }
  ];
}

// ── RENDER ────────────────────────────────────────────
function renderRoot() {
  var p = getProfile();
  var root = document.getElementById('mb-root');
  if (!root) return;

  if (!p) {
    root.innerHTML = '<div class="mb-empty"><div class="mb-empty-icon">👤</div><div class="mb-empty-title">Profile needed</div><div class="mb-empty-body">Complete onboarding to use the meal builder — it needs your macro targets and food preferences.</div></div>';
    return;
  }

  var target = getMealTarget(p, STATE.mealContext);
  var todayCtx = STATE.mealContext === 'training' ? '🏋️ Training day' : STATE.mealContext === 'rest' ? '🛋 Rest day' : STATE.mealContext === 'postworkout' ? '💪 Post-workout' : '🌙 Light meal';

  var html = '';

  // Hero
  html += '<div class="mb-hero">'
    + '<div class="mb-kicker">Personalised for ' + p.name + '</div>'
    + '<div class="mb-title">Build your<br><em>meal.</em></div>'
    + '<div class="mb-sub">Start with a protein and the flow builds around your macros, preferences, and today\'s training context.</div>'
    + '</div>';

  // Context bar
  html += '<div class="mb-context">'
    + '<div class="mb-ctx-pill training"><strong>' + todayCtx + '</strong></div>'
    + '<div class="mb-ctx-pill goal"><strong>' + target.kcal + ' kcal</strong> per meal</div>'
    + '<div class="mb-ctx-pill"><strong>' + target.prot + 'g</strong> protein</div>'
    + '<div class="mb-ctx-pill"><strong>' + target.carbs + 'g</strong> carbs</div>'
    + '<div class="mb-ctx-pill"><strong>' + target.fat + 'g</strong> fat</div>'
    + '</div>';

  // Step flow
  var steps = ['Protein','Carb','Veg','Flavour','Meals'];
  html += '<div class="mb-steps">';
  steps.forEach(function(s, i) {
    var num = i + 1;
    var cls = num < STATE.step ? 'done' : num === STATE.step ? 'active' : '';
    var icon = num < STATE.step ? '✓' : num;
    html += '<div class="mb-step">';
    html += '<div class="mb-step-pill ' + cls + '" onclick="goToStep(' + num + ')">'
      + '<div class="mb-step-num">' + icon + '</div>'
      + s
      + '</div>';
    if (i < steps.length - 1) {
      html += '<div class="mb-step-arrow ' + (num < STATE.step ? 'done' : '') + '"></div>';
    }
    html += '</div>';
  });
  html += '</div>';

  // Meal context toggle
  if (STATE.step <= 4) {
    html += '<div class="mb-toggle-row">'
      + ['training','rest','postworkout','light'].map(function(c) {
          var labels = { training:'Training day', rest:'Rest day', postworkout:'Post-workout', light:'Light meal' };
          return '<button class="mb-toggle' + (STATE.mealContext===c?' active':'') + '" onclick="setContext(\'' + c + '\')">' + labels[c] + '</button>';
        }).join('')
      + '</div>';
  }

  // Selected summary bar
  if (STATE.step >= 2) {
    html += '<div class="mb-summary-bar">';
    if (STATE.protein) html += '<div class="mb-summary-item">' + PROTEINS.find(function(x){return x.id===STATE.protein;})?.icon + ' ' + PROTEINS.find(function(x){return x.id===STATE.protein;})?.name + '</div>';
    if (STATE.carb)    {
      var carbPick = (CARBS_BY_PROTEIN[STATE.protein]||[]).find(function(x){return x.id===STATE.carb;});
      if (carbPick) html += '<div class="mb-summary-sep">+</div><div class="mb-summary-item">' + carbPick.icon + ' ' + carbPick.name + '</div>';
    }
    if (STATE.veg.length) html += '<div class="mb-summary-sep">+</div><div class="mb-summary-item">🥦 ' + STATE.veg.length + ' veg</div>';
    if (STATE.extra) {
      var extPick = getExtras(p).find(function(x){return x.id===STATE.extra;});
      if (extPick) html += '<div class="mb-summary-sep">+</div><div class="mb-summary-item">' + extPick.icon + ' ' + extPick.name + '</div>';
    }
    html += '<button class="mb-summary-btn" onclick="resetFlow()">↺ Start over</button>';
    html += '</div>';
  }

  // Step content
  if (STATE.loading) {
    html += '<div class="mb-loading"><div class="mb-spin"></div><div class="mb-loading-text">Building your meal combinations…</div></div>';
  } else if (STATE.step === 1) {
    html += renderStep1(p);
  } else if (STATE.step === 2) {
    html += renderStep2(p);
  } else if (STATE.step === 3) {
    html += renderStep3(p);
  } else if (STATE.step === 4) {
    html += renderStep4(p);
  } else if (STATE.step === 5) {
    html += renderStep5(p);
  }

  root.innerHTML = html;
}

// ── Interaction handlers ──────────────────────────────
function setContext(ctx) {
  STATE.mealContext = ctx;
  renderRoot();
}

function selectProtein(id) {
  STATE.protein = id;
  STATE.carb = null;
  STATE.veg = [];
  STATE.extra = null;
  STATE.meals = [];
  STATE.step = 2;
  renderRoot();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function selectCarb(id) {
  STATE.carb = id;
  STATE.step = 3;
  renderRoot();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function toggleVeg(id) {
  var idx = STATE.veg.indexOf(id);
  if (idx >= 0) STATE.veg.splice(idx, 1);
  else STATE.veg.push(id);
  renderRoot();
}

function skipVeg() {
  STATE.step = 4;
  renderRoot();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function continueToStep4() {
  STATE.step = 4;
  renderRoot();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function selectExtra(id) {
  STATE.extra = id;
  generateMeals();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function skipExtra() {
  STATE.extra = null;
  generateMeals();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function toggleMeal(idx) {
  STATE.openMeal = STATE.openMeal === idx ? null : idx;
  renderRoot();
  // Scroll to opened meal
  if (STATE.openMeal === idx) {
    setTimeout(function() {
      var el = document.getElementById('meal-' + idx);
      if (el) el.scrollIntoView({ behavior:'smooth', block:'nearest' });
    }, 50);
  }
}

function goToStep(n) {
  if (n >= STATE.step) return; // can only go back
  STATE.step = n;
  if (n <= 1) STATE.protein = null;
  if (n <= 2) STATE.carb = null;
  if (n <= 3) { STATE.veg = []; }
  if (n <= 4) STATE.extra = null;
  STATE.meals = [];
  renderRoot();
}

function resetFlow() {
  STATE.step = 1;
  STATE.protein = null;
  STATE.carb = null;
  STATE.veg = [];
  STATE.extra = null;
  STATE.meals = [];
  STATE.openMeal = null;
  renderRoot();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ── Save meal to today's log ──────────────────────────
function isMealSaved(title) {
  try {
    var today = new Date().toISOString().slice(0,10);
    var saved = JSON.parse(localStorage.getItem('bl_saved_meals_'+today) || '[]');
    return saved.some(function(m){ return m.title === title; });
  } catch(e) { return false; }
}

function saveMeal(idx, btn) {
  var meal = STATE.meals[idx];
  if (!meal) return;
  try {
    var today = new Date().toISOString().slice(0,10);
    var key = 'bl_saved_meals_' + today;
    var saved = JSON.parse(localStorage.getItem(key) || '[]');
    if (!saved.some(function(m){ return m.title === meal.title; })) {
      saved.push({ title: meal.title, kcal: meal.kcal, protein_g: meal.protein_g, carbs_g: meal.carbs_g, fat_g: meal.fat_g, savedAt: new Date().toISOString() });
      localStorage.setItem(key, JSON.stringify(saved));
    }
    if (btn) { btn.textContent = '✓ Saved to today'; btn.classList.add('saved'); }
  } catch(e) {}
}

// ── Init ──────────────────────────────────────────────
var _p = getProfile();
if (_p) {
  var nm = document.getElementById('nav-meta');
  if (nm) nm.innerHTML = '<span class="nav-tag nt-jade">' + _p.name + '</span>';
}
renderRoot();
</script>
