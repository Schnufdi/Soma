<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="bl-page" content="programme">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Soma — My Programme</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=Space+Grotesk:wght@300;400;500;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
body { background:var(--ink); color:var(--dk-1); }
.page { max-width:900px; margin:0 auto; padding:0 32px 100px; }

/* Hero */
.prog-hero {
  padding:44px 0 36px;
  border-bottom:1px solid var(--bd);
  margin-bottom:36px;
  display:flex; justify-content:space-between; align-items:flex-end; gap:24px;
}
.prog-name {
  font-family:var(--serif);
  font-size:60px; font-weight:300;
  line-height:0.92; letter-spacing:-0.03em;
  color:var(--dk-1);
}
.prog-name em { font-style:italic; color:var(--dk-3); }
.prog-goal {
  font-size:14px; font-weight:300; color:var(--dk-2);
  line-height:1.6; margin-top:10px; max-width:440px;
}
.prog-hero-actions { display:flex; flex-direction:column; gap:8px; align-items:flex-end; flex-shrink:0; }
.prog-meta { font-size:10px; font-weight:300; color:var(--dk-3); }

/* Stat strip */
.prog-stats {
  display:grid; grid-template-columns:repeat(5,1fr);
  gap:1px; background:var(--bd);
  border:1px solid var(--bd); border-radius:6px;
  overflow:hidden; margin-bottom:32px;
}
.prog-stat { background:var(--ink-2); padding:14px 10px; text-align:center; }
.prog-stat-val { font-family:var(--mono); font-size:22px; font-weight:500; color:var(--jade); line-height:1; margin-bottom:4px; }
.prog-stat-val.amber { color:var(--amber); }
.prog-stat-val.slate { color:var(--dk-2); }
.prog-stat-label { font-size:9px; font-weight:600; letter-spacing:0.1em; text-transform:uppercase; color:var(--dk-3); }

/* Section label */
.prog-sec {
  font-size:9px; font-weight:600; letter-spacing:0.18em; text-transform:uppercase;
  color:var(--dk-3); margin:0 0 12px;
  display:flex; align-items:center; gap:10px;
}
.prog-sec::after { content:''; flex:1; height:1px; background:var(--bd); }
.prog-sec.jade  { color:var(--jade); }
.prog-sec.amber { color:var(--amber); }
.prog-sec.gold  { color:var(--gold); }

/* Coach summary */
.prog-coach {
  background:var(--ink-2); border:1px solid var(--jade-br);
  border-radius:6px; padding:20px 24px; margin-bottom:28px;
  font-family:var(--serif); font-size:16px; font-weight:300;
  font-style:italic; color:var(--dk-2); line-height:1.82;
  border-left:3px solid var(--jade-br);
}

/* Tabs */
.prog-tabs {
  display:flex; gap:0; border-bottom:1px solid var(--bd); margin-bottom:28px;
  overflow-x:auto; -webkit-overflow-scrolling:touch;
}
.prog-tab {
  font-size:11px; font-weight:600; letter-spacing:0.08em; text-transform:uppercase;
  padding:12px 18px; border:none; background:transparent;
  color:var(--dk-3); cursor:pointer; font-family:var(--sans);
  border-bottom:2px solid transparent; margin-bottom:-1px;
  white-space:nowrap; transition:all 0.12s; flex-shrink:0;
}
.prog-tab:hover { color:var(--dk-2); }
.prog-tab.active { color:var(--jade); border-bottom-color:var(--jade); }

.prog-pane { display:none; }
.prog-pane.active { display:block; }

/* Cards */
.prog-card {
  background:var(--ink-2); border:1px solid var(--bd); border-radius:6px;
  overflow:hidden; margin-bottom:10px;
}
.prog-card.jade  { border-top:2px solid var(--jade); }
.prog-card.amber { border-top:2px solid var(--amber); }
.prog-card.gold  { border-top:2px solid var(--gold); }
.prog-card.red   { border-top:2px solid var(--red); }

.prog-card-head {
  padding:14px 18px; background:var(--ink-1);
  border-bottom:1px solid var(--bd);
  display:flex; justify-content:space-between; align-items:center;
}
.prog-card-title { font-size:11px; font-weight:600; letter-spacing:0.08em; text-transform:uppercase; color:var(--dk-3); }
.prog-card.jade  .prog-card-title { color:var(--jade); }
.prog-card.amber .prog-card-title { color:var(--amber); }
.prog-card.gold  .prog-card-title { color:var(--gold); }

/* Row */
.prog-row {
  display:flex; justify-content:space-between; align-items:baseline;
  padding:10px 18px; border-bottom:1px solid var(--bd);
  font-size:12px; gap:16px;
}
.prog-row:last-child { border-bottom:none; }
.prog-row-label { font-weight:400; color:var(--dk-3); flex-shrink:0; }
.prog-row-val   { font-weight:500; color:var(--dk-1); text-align:right; line-height:1.4; }
.prog-row-val.jade  { color:var(--jade); }
.prog-row-val.amber { color:var(--amber); }
.prog-row-val.red   { color:var(--red); }

/* Macro grid */
.prog-macros {
  display:grid; grid-template-columns:repeat(4,1fr);
  gap:1px; background:var(--bd);
}
.prog-macro { background:var(--ink-1); padding:16px 10px; text-align:center; }
.prog-macro-val { font-family:var(--mono); font-size:24px; font-weight:500; color:var(--jade); line-height:1; margin-bottom:4px; }
.prog-macro-val.amber { color:var(--amber); }
.prog-macro-val.slate { color:var(--dk-2); }
.prog-macro-label { font-size:9px; font-weight:600; letter-spacing:0.1em; text-transform:uppercase; color:var(--dk-3); }

/* Week plan */
.prog-day {
  display:grid; grid-template-columns:100px 1fr;
  padding:14px 18px; border-bottom:1px solid var(--bd); gap:16px;
  align-items:start;
}
.prog-day:last-child { border-bottom:none; }
.prog-day.training-day { background:rgba(0,200,160,.015); }
.prog-day-name { font-size:11px; font-weight:700; letter-spacing:.06em; text-transform:uppercase; color:var(--dk-3); padding-top:2px; }
.prog-day-name.training { color:var(--jade); }
.prog-day-type { font-size:13px; font-weight:600; color:var(--dk-1); margin-bottom:3px; line-height:1.2; }
.prog-day-focus { font-size:11px; font-weight:300; color:var(--dk-3); margin-bottom:6px; }
.prog-day-exs {
  display:flex; flex-direction:column; gap:3px; margin-top:4px;
}
.prog-day-ex {
  font-size:11px; font-weight:300; color:var(--dk-2);
  display:flex; align-items:baseline; gap:6px;
  padding:3px 0; border-bottom:1px solid rgba(255,255,255,.04);
}
.prog-day-ex:last-child { border-bottom:none; }
.prog-day-ex::before { content:'·'; color:var(--jade); font-weight:700; flex-shrink:0; }
.prog-day-note { font-size:10px; font-style:italic; color:var(--dk-3); margin-top:6px; padding-top:6px; border-top:1px solid rgba(255,255,255,.04); line-height:1.5; }
.prog-day-rest-label { font-size:11px; font-weight:300; color:var(--dk-3); line-height:1.6; }

/* Injury */
.prog-injury {
  padding:14px 18px; border-bottom:1px solid var(--bd);
  border-left:3px solid var(--gold);
}
.prog-injury:last-child { border-bottom:none; }
.prog-injury-loc { font-size:12px; font-weight:600; color:var(--gold); margin-bottom:4px; }
.prog-injury-text { font-size:12px; font-weight:300; color:var(--dk-2); line-height:1.65; }
.prog-injury-rules { margin-top:8px; font-size:11px; font-weight:300; color:var(--dk-3); line-height:1.7; }

/* Supplement */
.prog-supp {
  display:grid; grid-template-columns:1fr 80px 120px;
  padding:10px 18px; border-bottom:1px solid var(--bd);
  font-size:12px; gap:12px; align-items:baseline;
}
.prog-supp:last-child { border-bottom:none; }
.prog-supp.head { background:var(--ink-1); }
.prog-supp.head div { font-size:9px; font-weight:600; letter-spacing:0.1em; text-transform:uppercase; color:var(--dk-3); }
.prog-supp-name { font-weight:500; color:var(--dk-1); }
.prog-supp-dose { font-family:var(--mono); font-weight:300; color:var(--amber); }
.prog-supp-time { font-weight:300; color:var(--dk-3); }

/* Instructions */
.prog-instructions {
  padding:20px 18px;
  font-family:var(--mono); font-size:12px; font-weight:300;
  color:var(--dk-2); line-height:1.9; white-space:pre-wrap;
  word-break:break-word; max-height:60vh; overflow-y:auto;
  background:var(--ink-1);
}

/* Actions */
.prog-actions { display:flex; gap:8px; flex-wrap:wrap; margin-top:24px; }
.prog-btn {
  padding:10px 20px; background:transparent;
  border:1px solid var(--bd-2); border-radius:4px;
  font-family:var(--sans); font-size:10px; font-weight:600;
  letter-spacing:0.08em; text-transform:uppercase;
  color:var(--dk-3); cursor:pointer; transition:all 0.15s;
  text-decoration:none; display:inline-block;
}
.prog-btn:hover { color:var(--jade); border-color:var(--jade-br); }
.prog-btn.jade {
  background:var(--jade); border-color:var(--jade); color:var(--ink);
}
.prog-btn.jade:hover { background:var(--jade-hi); }
.prog-btn.red { color:var(--red); border-color:var(--red-br); }
.prog-btn.amber { background:var(--amber); border-color:var(--amber); color:var(--ink); }
.prog-btn.amber:hover { opacity:.9; }

/* Optimise week grid */
.opt-week-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin:8px 0 4px;}
.owg-day{background:var(--ink-1);border:1px solid var(--bd);border-radius:6px;padding:10px 6px 8px;text-align:center;}
.owg-day.training{border-top:2px solid var(--jade);}
.owg-day.rest{border-top:2px solid var(--bd);}
.owg-header{margin-bottom:8px;}
.owg-dayname{font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--dk-2);}
.owg-type{font-size:9px;font-weight:300;color:var(--dk-3);margin-top:1px;}
.owg-day.training .owg-type{color:var(--jade);opacity:.7;}
.owg-chips{display:flex;flex-wrap:wrap;gap:2px;justify-content:center;min-height:24px;margin-bottom:6px;}
.owg-chip{font-size:14px;cursor:help;line-height:1;padding:1px;}
.owg-empty{font-size:11px;color:var(--dk-3);padding:4px 0;}
.owg-count{font-size:9px;font-weight:300;color:var(--dk-3);}
.owg-day.training .owg-count{color:var(--jade);opacity:.6;}
@media(max-width:600px){.opt-week-grid{grid-template-columns:repeat(4,1fr);}}
.prog-note-row:last-of-type { border-bottom:none; }
.prog-note-icon { font-size:20px; flex-shrink:0; width:28px; text-align:center; margin-top:2px; }
.prog-note-body { flex:1; min-width:0; }
.prog-note-name { font-size:13px; font-weight:600; color:var(--dk-1); margin-bottom:3px; }
.prog-note-desc { font-size:12px; font-weight:300; color:var(--dk-3); line-height:1.6; }
.prog-note-remove { flex-shrink:0; background:transparent; border:1px solid var(--bd); border-radius:4px; padding:4px 10px; font-size:10px; font-weight:600; letter-spacing:.05em; text-transform:uppercase; color:var(--dk-3); cursor:pointer; font-family:var(--sans); transition:all .12s; }
.prog-note-remove:hover { border-color:rgba(220,80,60,.4); color:rgba(220,80,60,.8); }

/* No profile */
.no-profile { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:60vh; text-align:center; padding:48px; gap:14px; }
.no-profile h2 { font-family:var(--serif); font-size:30px; font-weight:300; }

/* Preference chips */
.prog-pref-chip {
  padding:5px 12px; border-radius:14px;
  border:1px solid var(--bd); background:var(--ink-2);
  font-size:10px; font-weight:500; color:var(--dk-3);
  cursor:pointer; font-family:var(--sans); transition:all .1s;
}
.prog-pref-chip:hover { border-color:rgba(255,255,255,.1); color:var(--dk-2); }
.prog-pref-chip.active { background:rgba(196,124,24,.08); border-color:rgba(196,124,24,.3); color:var(--amber); }
.no-profile p  { font-size:14px; font-weight:300; color:var(--dk-2); max-width:360px; line-height:1.7; }
.no-profile a  { display:inline-block; padding:12px 28px; background:var(--jade); border-radius:6px; font-size:13px; font-weight:600; letter-spacing:0.06em; text-transform:uppercase; color:var(--ink); text-decoration:none; }

@media(max-width:860px){
  .prog-hero { flex-direction:column; gap:16px; align-items:flex-start; }
  .prog-hero-actions { align-items:flex-start; }
  .prog-stats { grid-template-columns:repeat(3,1fr); }
}
@media(max-width:600px){
  .page { padding:0 16px 80px; }
  .prog-name { font-size:44px; }
  .prog-stats { grid-template-columns:repeat(2,1fr); }
  .prog-macros { grid-template-columns:repeat(2,1fr); }
  .prog-supp { grid-template-columns:1fr 70px; }
  .prog-supp-time { display:none; }
  .prog-day { grid-template-columns:70px 1fr; }
}
</style>
</head>

<script>
const profile = getProfile();

if (!profile) {
  document.getElementById('main').innerHTML = `
    <div class="no-profile">
      <div style="font-size:44px;">💪</div>
      <h2>No programme yet</h2>
      <p>Complete the onboarding and your full programme will appear here.</p>
      <a href="bodylens-onboard.html">Get started →</a>
    </div>`;
} else {
  document.getElementById('nav-meta').innerHTML =
    `<span class="nav-tag nt-jade">${profile.name}</span>`;
  render(profile);
}


function buildNutritionNarrative(p) {
  const weight = p.weight || 87;
  const goal = (p.goal || '').toLowerCase();
  const isRecomp = goal.includes('recomp');
  const isLoss = goal.includes('loss') || goal.includes('cut');
  const isMuscle = goal.includes('muscle') || goal.includes('bulk') || goal.includes('gain');
  const trainingDays = p.trainingDays || 4;
  const tdee = p.tdee || Math.round(weight * 28);
  const trainingKcal = p.trainingKcal || p.calories || tdee;
  const restKcal = p.restKcal || Math.round(trainingKcal * 0.9);
  const protein = p.protein || Math.round(weight * 2.0);
  const fat = p.fat || Math.round(trainingKcal * 0.28 / 9);
  const carbs = p.carbs || Math.round((trainingKcal - (protein * 4) - (fat * 9)) / 4);

  const deficit = tdee - trainingKcal;
  const deficitLine = deficit > 50
    ? `${deficit} kcal below TDEE — a controlled deficit that preserves muscle while reducing fat.`
    : deficit < -50
    ? `${Math.abs(deficit)} kcal above TDEE — a modest surplus that supports muscle synthesis.`
    : `At maintenance — supporting recomposition without a clear deficit or surplus.`;

  const proteinRationale = protein >= weight * 2.0
    ? `${protein}g is set at 2g per kg of bodyweight — the minimum threshold for muscle preservation during a deficit. At ${weight}kg, this is non-negotiable.`
    : `${protein}g provides sufficient amino acid availability for your training volume. Every gram above 1.6g per kg adds marginal benefit — this sits at the practical optimum.`;

  const carbRationale = isRecomp || isLoss
    ? `${carbs}g of carbohydrates are timed around training to fuel performance without excess — higher on training days to refuel muscle glycogen, lower on rest days.`
    : `${carbs}g provides fuel for ${trainingDays} weekly training sessions. Carbohydrates are your primary performance substrate — this allocation reflects your training load.`;

  const fatRationale = `${fat}g of dietary fat covers hormonal production (testosterone, cortisol regulation) and fat-soluble vitamin absorption. Below 0.7g/kg and hormonal function is compromised.`;

  const trainingVsRest = (trainingKcal !== restKcal)
    ? `<br><strong>Training days:</strong> ${trainingKcal} kcal &nbsp;·&nbsp; <strong>Rest days:</strong> ${restKcal} kcal — periodised to match energy expenditure.`
    : '';

  return `<div style="font-size:9px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--amber);margin-bottom:10px;">Why these numbers</div>
    <div style="font-size:12px;font-weight:300;color:var(--dk-2);line-height:1.8;">
      <div style="margin-bottom:8px;"><strong style="color:var(--dk-1);font-weight:600;">Calories — ${trainingKcal} kcal</strong><br>${deficitLine}${trainingVsRest}</div>
      <div style="margin-bottom:8px;"><strong style="color:var(--jade);font-weight:600;">Protein — ${protein}g</strong><br>${proteinRationale}</div>
      <div style="margin-bottom:8px;"><strong style="color:var(--amber);font-weight:600;">Carbs — ${carbs}g</strong><br>${carbRationale}</div>
      <div><strong style="color:var(--dk-2);font-weight:600;">Fat — ${fat}g</strong><br>${fatRationale}</div>
    </div>`;
}

function render(p) {
  const injuries  = p.injuryAssessments || [];
  const supps     = p.supplements || [];
  const weekPlan  = p.weekPlan || [];
  const genDate   = p.generatedAt
    ? new Date(p.generatedAt).toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'})
    : '—';
  const isFemale  = (p.sex||'').toLowerCase() === 'female';

  document.getElementById('main').innerHTML = `

    <div class="prog-hero">
      <div>
        <div class="prog-name">${p.name}<br><em>programme.</em></div>
        <div class="prog-goal">${p.goal||''} ${p.target ? '— ' + p.target : ''}</div>
      </div>
      <div class="prog-hero-actions">
        <div class="prog-meta">Generated ${genDate}</div>
        <div style="display:flex;gap:8px;flex-wrap:wrap;">
          <a href="bodylens-dailyplan.html" class="prog-btn jade">Today's plan →</a>
          <a href="bodylens-checkin.html" class="prog-btn" style="background:transparent;border:1px solid var(--bd);color:var(--dk-2);">Week review →</a>
          <button onclick="location.href='bodylens-reset.html'" class="prog-btn red">Reset</button>
        </div>
      </div>
    </div>

    <!-- Stats -->
    <div class="prog-stats">
      <div class="prog-stat">
        <div class="prog-stat-val">${p.age||'—'}</div>
        <div class="prog-stat-label">Age</div>
      </div>
      <div class="prog-stat">
        <div class="prog-stat-val slate">${p.weight||'—'}kg</div>
        <div class="prog-stat-label">Weight</div>
      </div>
      <div class="prog-stat">
        <div class="prog-stat-val jade">${p.calories||'—'}</div>
        <div class="prog-stat-label">Kcal/day</div>
      </div>
      <div class="prog-stat">
        <div class="prog-stat-val jade">${p.protein||'—'}g</div>
        <div class="prog-stat-label">Protein</div>
      </div>
      <div class="prog-stat">
        <div class="prog-stat-val amber">${p.trainingDays||'—'}</div>
        <div class="prog-stat-label">Train days</div>
      </div>
    </div>

    ${p.coachSummary ? `<div class="prog-coach">${p.coachSummary}</div>` : ''}

    <!-- Tabs -->
    <div class="prog-tabs">
      <button class="prog-tab active" onclick="switchTab('overview',this)">Overview</button>
      <button class="prog-tab" onclick="switchTab('week',this)">Week plan</button>
      <button class="prog-tab" onclick="switchTab('nutrition',this)">Nutrition</button>
      <button class="prog-tab" onclick="switchTab('supplements',this)">Stack</button>
      ${injuries.length ? `<button class="prog-tab" onclick="switchTab('injuries',this)">Injuries</button>` : ''}
      <button class="prog-tab" onclick="switchTab('instructions',this)">Coaching brief</button>
      <button class="prog-tab" onclick="switchTab('notes',this)">Optimise</button>
      <button class="prog-tab" onclick="switchTab('data',this)">Data</button>
      <button class="prog-tab" onclick="switchTab('settings',this)">Settings</button>
    </div>

    <!-- OVERVIEW -->
    <div class="prog-pane active" id="pane-overview">

      <div class="prog-card jade">
        <div class="prog-card-head"><div class="prog-card-title jade">Your baseline</div></div>
        <div class="prog-row"><span class="prog-row-label">Name</span><span class="prog-row-val jade">${p.name}</span></div>
        <div class="prog-row"><span class="prog-row-label">Age / Sex</span><span class="prog-row-val">${p.age||'—'} · ${p.sex||'—'}</span></div>
        <div class="prog-row"><span class="prog-row-label">Height / Weight</span><span class="prog-row-val">${p.height||'—'}cm · ${p.weight||'—'}kg</span></div>
        <div class="prog-row"><span class="prog-row-label">Body fat</span><span class="prog-row-val">${p.bodyFat||'—'}%</span></div>
        <div class="prog-row"><span class="prog-row-label">Fat storage</span><span class="prog-row-val">${p.fatStorage||'—'}</span></div>
        <div class="prog-row"><span class="prog-row-label">Goal</span><span class="prog-row-val">${p.goal||'—'}</span></div>
        <div class="prog-row"><span class="prog-row-label">Wake time</span><span class="prog-row-val">${p.wakeTime||'—'}</span></div>
        <div class="prog-row"><span class="prog-row-label">Sleep</span><span class="prog-row-val">${p.sleep||'—'}</span></div>
        <div class="prog-row"><span class="prog-row-label">Gym</span><span class="prog-row-val">${p.gymAccess||'—'}</span></div>
        <div class="prog-row"><span class="prog-row-label">Recovery</span><span class="prog-row-val">${(p.recoveryTools||[]).join(', ')||'None'}</span></div>
        <div class="prog-row"><span class="prog-row-label">Alcohol</span><span class="prog-row-val">${p.alcoholHabit||'—'}</span></div>

        const savedIds = new Set([
          ...(p.accelerators || []),
          ...(p.optimisations || []).map(o => typeof o === 'string' ? o : o.id)
        ]);

        const weekPlan = p.weekPlan || [];
        const DAY_NAMES_FULL = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
        const DAY_SHORT = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];

        if (!savedIds.size) return `
          <div class="prog-card">
            <div style="padding:32px 24px;text-align:center;">
              <div style="font-size:36px;margin-bottom:14px;">⚡</div>
              <div style="font-size:16px;font-weight:300;color:var(--dk-1);margin-bottom:8px;">No optimisations active yet</div>
              <div style="font-size:13px;font-weight:300;color:var(--dk-2);line-height:1.7;max-width:420px;margin:0 auto 24px;">
                Browse Accelerators, Science, or Food pages and add concepts to your programme. They appear in your daily timeline on the right days automatically.
              </div>
              <div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap;">
                <a href="bodylens-accelerators.html" class="prog-btn jade">Accelerators →</a>
                <a href="bodylens-science.html" class="prog-btn">Science →</a>
                <a href="bodylens-food.html" class="prog-btn">Food →</a>
              </div>
            </div>
          </div>`;

        // Build per-day data
        const days = DAY_SHORT.map(function(dayName, i) {
          const dp = weekPlan[i] || { type:'Rest', priority:'rest', keyExercises:[] };
          const isTraining = dp.priority === 'training';
          const isMonday = i === 0;
          const active = [];
          savedIds.forEach(function(id) {
            const opt = OPT_MAP[id]; if (!opt) return;
            if (opt.days === 'all') active.push(id);
            else if (opt.days === 'training' && isTraining) active.push(id);
            else if (opt.days === 'rest' && !isTraining) active.push(id);
            else if (opt.days === 'monday' && isMonday) active.push(id);
          });
          // Group by slot
          const bySlot = {};
          active.forEach(function(id) {
            const opt = OPT_MAP[id]; if (!opt) return;
            if (!bySlot[opt.slot]) bySlot[opt.slot] = [];
            bySlot[opt.slot].push(id);
          });
          return { dayName, fullName: DAY_NAMES_FULL[i], dp, isTraining, active, bySlot };
        });

        // Render each day as a two-column row
        const dayRows = days.map(function(day, i) {
          const exercises = (day.dp.keyExercises || []).slice(0, 4);
          const baseCol = day.isTraining
            ? `<div style="font-size:9px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--jade);margin-bottom:6px;">${day.dp.type||'Training'}</div>`
              + (day.dp.focus ? `<div style="font-size:11px;font-weight:300;color:var(--dk-3);margin-bottom:6px;">${day.dp.focus}</div>` : '')
              + exercises.map(function(ex){ return `<div style="font-size:11px;color:var(--dk-2);padding:2px 0;border-bottom:1px solid var(--bd);">· ${ex}</div>`; }).join('')
            : `<div style="font-size:9px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--dk-3);margin-bottom:6px;">Rest</div>`
              + `<div style="font-size:11px;font-weight:300;color:var(--dk-3);">Recovery · MPS runs 24–48h</div>`;

          // Overlay column — group by slot with color coding
          const overlaySlotOrder = ['wake','supp','meal','training','new','sleep'];
          const overlayCol = day.active.length === 0
            ? `<div style="font-size:11px;font-weight:300;color:var(--dk-3);font-style:italic;">Base plan only</div>`
            : overlaySlotOrder.filter(function(slot){ return day.bySlot[slot]; }).map(function(slot) {
                const ids = day.bySlot[slot];
                const col = SLOT_COLORS[slot] || 'var(--dk-3)';
                const label = SLOT_LABELS[slot] || slot;
                return `<div style="margin-bottom:6px;">`
                  + `<div style="font-size:8px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:${col};opacity:.8;margin-bottom:3px;">${label}</div>`
                  + ids.map(function(id) {
                      const opt = OPT_MAP[id] || {};
                      return `<div style="display:flex;align-items:center;gap:5px;font-size:11px;color:var(--dk-2);margin-bottom:2px;">`
                        + `<span style="flex-shrink:0;">${opt.icon||'⚡'}</span>`
                        + `<span style="font-weight:300;">${opt.fires||opt.name}</span>`
                        + `</div>`;
                    }).join('')
                  + `</div>`;
              }).join('');

          return `<div style="display:grid;grid-template-columns:90px 1fr 1fr;gap:0;border-bottom:1px solid var(--bd);">
            <!-- Day label -->
            <div style="padding:12px 10px;border-right:1px solid var(--bd);background:${day.isTraining?'rgba(0,200,160,.03)':'var(--ink-1)'};">
              <div style="font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:${day.isTraining?'var(--jade)':'var(--dk-3)'};">${day.dayName}</div>
              <div style="font-size:9px;font-weight:300;color:var(--dk-3);margin-top:2px;">${day.active.length > 0 ? day.active.length + ' overlays' : 'base'}</div>
            </div>
            <!-- Base plan -->
            <div style="padding:12px 12px;border-right:1px solid var(--bd);">${baseCol}</div>
            <!-- Overlays -->
            <div style="padding:12px 12px;">${overlayCol}</div>
          </div>`;
        }).join('');

        // Manage list — compact, below the grid
        const allOpts = Array.from(savedIds).map(function(id) {
          return OPT_MAP[id] ? { id, ...OPT_MAP[id] } : { id, icon:'⚡', name:id, cat:'Other', days:'all', fires:'Daily' };
        });

        const manageList = allOpts.map(function(opt) {
          return `<div class="prog-note-row" id="note-${opt.id}" style="padding:8px 0;">
            <div class="prog-note-icon" style="font-size:16px;">${opt.icon}</div>
            <div class="prog-note-body">
              <div class="prog-note-name" style="font-size:12px;">${opt.name}</div>
            </div>
            <button class="prog-note-remove" onclick="removeOpt('${opt.id}')">✕</button>
          </div>`;
        }).join('');

        return `
          <!-- Header labels -->
          <div class="prog-card" style="padding:0;overflow:hidden;margin-bottom:14px;">
            <div style="display:grid;grid-template-columns:90px 1fr 1fr;background:var(--ink-1);border-bottom:1px solid var(--bd);">
              <div style="padding:8px 10px;font-size:8px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--dk-3);">Day</div>
              <div style="padding:8px 12px;border-left:1px solid var(--bd);font-size:8px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--dk-3);">Base plan</div>
              <div style="padding:8px 12px;border-left:1px solid var(--bd);font-size:8px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--jade);">Overlays</div>
            </div>
            ${dayRows}
          </div>

          <!-- Manage — compact remove list -->
          <div class="prog-card" style="margin-bottom:14px;">
            <div class="prog-card-head">
              <div class="prog-card-title" style="font-size:12px;">${savedIds.size} active optimisation${savedIds.size !== 1 ? 's' : ''}</div>
              <div style="display:flex;gap:8px;flex-wrap:wrap;">
                <a href="bodylens-accelerators.html" class="prog-btn jade" style="font-size:10px;padding:5px 12px;">+ Accelerators</a>
                <a href="bodylens-science.html" class="prog-btn" style="font-size:10px;padding:5px 12px;">+ Science</a>
                <a href="bodylens-food.html" class="prog-btn" style="font-size:10px;padding:5px 12px;">+ Food</a>
              </div>
            </div>
            <div style="display:flex;flex-wrap:wrap;gap:6px;padding:4px 0;">
              ${allOpts.map(function(opt) {
                return `<div id="note-${opt.id}" style="display:inline-flex;align-items:center;gap:5px;background:var(--ink-1);border:1px solid var(--bd);border-radius:14px;padding:4px 10px;font-size:11px;font-weight:500;color:var(--dk-2);">
                  <span>${opt.icon}</span><span>${opt.name}</span>
                  <button onclick="removeOpt('${opt.id}')" style="background:none;border:none;color:var(--dk-3);cursor:pointer;font-size:11px;padding:0 0 0 2px;line-height:1;">✕</button>
                </div>`;
              }).join('')}
            </div>
          </div>
        `;
      })()}
    </div>

    <!-- DATA (export / import) -->
    <div class="prog-pane" id="pane-data">
      <div class="prog-card" style="margin-bottom:16px;">
        <div class="prog-card-head">
          <div class="prog-card-title jade">Export profile</div>
          <div style="font-size:11px;font-weight:300;color:var(--dk-3);">Download your full profile as a JSON file. Use this to back up your data or restore it in a new browser.</div>
        </div>
        <div style="padding:16px 18px;">
          <button onclick="exportProfile()" class="prog-btn jade">↓ Download profile.json</button>
        </div>
      </div>

      <div class="prog-card">
        <div class="prog-card-head">
          <div class="prog-card-title amber">Import profile</div>
          <div style="font-size:11px;font-weight:300;color:var(--dk-3);">Restore a previously exported profile JSON. This will replace your current programme.</div>
        </div>
        <div style="padding:16px 18px;">
          <div style="margin-bottom:16px;">
            <label style="font-size:9px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--dk-3);display:block;margin-bottom:8px;">Upload a JSON file</label>
            <input type="file" id="import-file" accept=".json,application/json" onchange="handleImportFile(event)"
              style="display:block;font-size:12px;color:var(--dk-2);background:var(--ink-1);border:1px solid var(--bd);border-radius:6px;padding:8px 12px;width:100%;box-sizing:border-box;cursor:pointer;">
          </div>
          <div style="display:flex;align-items:center;gap:12px;margin:16px 0;">
            <div style="flex:1;height:1px;background:var(--bd);"></div>
            <div style="font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--dk-3);">or paste JSON</div>
            <div style="flex:1;height:1px;background:var(--bd);"></div>
          </div>
          <textarea id="import-json" placeholder='Paste your profile JSON here…' rows="6"
            style="display:block;width:100%;box-sizing:border-box;background:var(--ink-1);border:1px solid var(--bd);border-radius:6px;padding:12px;font-size:12px;font-family:var(--mono);color:var(--dk-2);resize:vertical;outline:none;transition:border-color .12s;"
            onfocus="this.style.borderColor='rgba(196,124,24,.4)'" onblur="this.style.borderColor='var(--bd)'"></textarea>
          <div style="margin-top:12px;display:flex;gap:8px;align-items:center;">
            <button onclick="importProfile()" class="prog-btn amber">↑ Import & restore</button>
            <div id="import-status" style="font-size:12px;font-weight:300;color:var(--dk-3);"></div>
          </div>
          <div style="margin-top:16px;padding:12px 14px;background:rgba(220,80,60,0.04);border:1px solid rgba(220,80,60,0.15);border-radius:6px;">
            <div style="font-size:11px;font-weight:300;color:var(--dk-3);line-height:1.65;"><strong style="color:rgba(220,80,60,.7);font-weight:600;">⚠ Warning:</strong> Importing will overwrite your current programme. Export a backup first if you want to keep it.</div>
          </div>
        </div>
      </div>
    </div>

    <!-- SETTINGS -->
    <div class="prog-pane" id="pane-settings">
      ${(function() {
        var notif = p.notifications || {};
        var enabled = notif.enabled !== false ? notif.enabled : false;

        function toggle(field, label, sub, currentVal) {
          var isOn = currentVal !== false && currentVal !== undefined ? !!currentVal : false;
          return `<div style="display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--bd);">
            <div>
              <div style="font-size:13px;font-weight:500;color:var(--dk-1);margin-bottom:2px;">${label}</div>
              ${sub ? `<div style="font-size:11px;font-weight:300;color:var(--dk-3);">${sub}</div>` : ''}
            </div>
            <button onclick="saveNotifPref('${field}',${isOn ? 'false' : 'true'},this)"
              style="width:44px;height:24px;border-radius:12px;border:none;cursor:pointer;
              background:${isOn ? 'var(--jade)' : 'rgba(255,255,255,.1)'};transition:background .15s;
              position:relative;flex-shrink:0;" title="${isOn ? 'On — tap to disable' : 'Off — tap to enable'}">
              <div style="width:18px;height:18px;border-radius:50%;background:#fff;position:absolute;top:3px;
                transition:left .15s;left:${isOn ? '23px' : '3px'};box-shadow:0 1px 4px rgba(0,0,0,.3);"></div>
            </button>
          </div>`;
        }

        return `
        <div class="prog-card" style="margin-bottom:12px;">
          <div class="prog-card-head">
            <div class="prog-card-title">Notifications &amp; coaching</div>
          </div>
          <div style="padding:0 18px;">

            <div style="padding:14px 0;border-bottom:1px solid var(--bd);">
              <div style="font-size:9px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--dk-3);margin-bottom:10px;">Notifications</div>
              ${toggle('enabled', 'Enable notifications', 'In-app toasts + browser notifications where permitted', enabled)}
              ${toggle('trainingReminder', 'Training day reminder', 'Gentle nudge at 9am on your training days', notif.trainingReminder !== false)}
              ${toggle('postMealWalk', 'Post-meal walk prompt', '20 minutes after you tick a meal — a short walk reminder', notif.postMealWalk !== false)}
              ${toggle('debrief', 'Evening debrief prompt', '8pm nudge if your day isn\'t fully logged', notif.debrief !== false)}
            </div>

            <div style="padding:14px 0;border-bottom:1px solid var(--bd);">
              <div style="font-size:9px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--dk-3);margin-bottom:10px;">Quiet hours</div>
              <div style="display:flex;gap:12px;align-items:center;">
                <div style="flex:1;">
                  <div style="font-size:10px;color:var(--dk-3);margin-bottom:4px;">No notifications from</div>
                  <select onchange="saveNotifPref('quietStart',this.value,null)"
                    style="width:100%;background:var(--ink-2);border:1px solid var(--bd);border-radius:6px;padding:8px 10px;font-size:12px;color:var(--dk-1);font-family:var(--sans);outline:none;">
                    ${[20,21,22,23].map(h => `<option value="${h}" ${(notif.quietStart||22)==h?'selected':''}>${h}:00</option>`).join('')}
                  </select>
                </div>
                <div style="color:var(--dk-3);font-size:12px;padding-top:18px;">until</div>
                <div style="flex:1;">
                  <div style="font-size:10px;color:var(--dk-3);margin-bottom:4px;">Resume at</div>
                  <select onchange="saveNotifPref('quietEnd',this.value,null)"
                    style="width:100%;background:var(--ink-2);border:1px solid var(--bd);border-radius:6px;padding:8px 10px;font-size:12px;color:var(--dk-1);font-family:var(--sans);outline:none;">
                    ${[6,7,8,9].map(h => `<option value="${h}" ${(notif.quietEnd||7)==h?'selected':''}>${h}:00</option>`).join('')}
                  </select>
                </div>
              </div>
            </div>

            <div style="padding:14px 0;">
              <div style="font-size:9px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--dk-3);margin-bottom:10px;">Coaching features</div>
              ${toggle('gymCoach', 'Live gym coach', 'Session-by-session coach mode on training days', notif.gymCoach !== false)}
              ${toggle('debriefAuto', 'Auto-detect missing logs', 'Coach notices incomplete days and offers a quick debrief', notif.debriefAuto !== false)}
            </div>

          </div>
        </div>
        <div style="font-size:10px;font-weight:300;color:var(--dk-3);line-height:1.65;padding:0 2px;">
          Notifications are in-app only until you grant browser permission. No data leaves your device. All preferences save instantly.
        </div>`;
      })()}
    </div>

  `; // end render innerHTML
}

function switchTab(id, btn) {
  document.querySelectorAll('.prog-tab').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.prog-pane').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('pane-' + id).classList.add('active');
}

function saveNotifPref(field, value, btn) {
  try {
    var p = JSON.parse(localStorage.getItem('bl_profile') || 'null');
    if (!p) return;
    if (!p.notifications) p.notifications = {};
    // Parse value — handle booleans passed as strings from onclick
    var parsed = value === 'true' ? true : value === 'false' ? false : value;
    p.notifications[field] = parsed;
    localStorage.setItem('bl_profile', JSON.stringify(p));
    // Update toggle visual in place without full re-render
    if (btn) {
      var isOn = !!parsed;
      btn.style.background = isOn ? 'var(--jade)' : 'rgba(255,255,255,.1)';
      var knob = btn.querySelector('div');
      if (knob) knob.style.left = isOn ? '23px' : '3px';
      // Update the onclick to reflect new state
      btn.setAttribute('onclick', "saveNotifPref('" + field + "'," + (isOn ? 'false' : 'true') + ",this)");
    }
  } catch(e) {}
}

function _savePrefField(field, value) {
  try {
    var p = JSON.parse(localStorage.getItem('bl_profile') || 'null');
    if (!p) return;
    p[field] = value;
    p.lastModified = new Date().toISOString();
    localStorage.setItem('bl_profile', JSON.stringify(p));
  } catch(e) {}
}

function togglePref(field, value, btn) {
  try {
    var p = JSON.parse(localStorage.getItem('bl_profile') || 'null');
    if (!p) return;
    var arr = p[field] || [];
    var idx = arr.indexOf(value);
    if (idx >= 0) arr.splice(idx, 1);
    else arr.push(value);
    p[field] = arr;
    localStorage.setItem('bl_profile', JSON.stringify(p));
    btn.classList.toggle('active', arr.includes(value));
  } catch(e) {}
}

function setSinglePref(field, value, btn) {
  _savePrefField(field, value);
  btn.closest('div').querySelectorAll('.prog-pref-chip').forEach(function(b) {
    b.classList.toggle('active', b === btn);
  });
}

function saveFoodExclusions(val) {
  var arr = val.split(',').map(function(s){ return s.trim(); }).filter(Boolean);
  _savePrefField('foodExclusions', arr);
}

function removeAcc(id) {
  removeOpt(id);
}

function removeOpt(id) {
  try {
    const p = JSON.parse(localStorage.getItem('bl_profile') || 'null');
    if (!p) return;
    p.accelerators = (p.accelerators || []).filter(a => a !== id);
    p.optimisations = (p.optimisations || []).filter(o => (typeof o === 'string' ? o : o.id) !== id);
    p.lastModified = new Date().toISOString();
    localStorage.setItem('bl_profile', JSON.stringify(p));
    const row = document.getElementById('note-' + id);
    if (row) { row.style.opacity = '0'; row.style.transition = 'opacity .2s'; setTimeout(() => { row.remove(); }, 200); }
  } catch(e) {}
}

function exportProfile() {
  try {
    const raw = localStorage.getItem('bl_profile');
    if (!raw) return;
    const blob = new Blob([JSON.stringify(JSON.parse(raw), null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'bodylens-profile.json';
    a.click();
    URL.revokeObjectURL(url);
  } catch(e) {
    alert('Could not export profile.');
  }
}

function handleImportFile(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    document.getElementById('import-json').value = e.target.result;
  };
  reader.readAsText(file);
}

function importProfile() {
  const raw = document.getElementById('import-json').value.trim();
  const status = document.getElementById('import-status');
  if (!raw) { status.textContent = 'Nothing to import.'; status.style.color = 'var(--dk-3)'; return; }
  try {
    const p = JSON.parse(raw);
    if (!p.name || !p.calories) {
      status.textContent = '⚠ Doesn\'t look like a valid BodyLens profile.';
      status.style.color = 'rgba(220,80,60,.8)';
      return;
    }
    localStorage.setItem('bl_profile', JSON.stringify(p));
    // Clear any stale plan caches
    Object.keys(localStorage).forEach(function(k) {
      if (k.startsWith('dayplan_') || k.startsWith('bl_recipe_') || k.startsWith('bl_macros_')) {
        localStorage.removeItem(k);
      }
    });
    status.textContent = '✓ Profile restored. Reloading…';
    status.style.color = 'var(--jade)';
    setTimeout(() => location.reload(), 800);
  } catch(e) {
    status.textContent = '⚠ Invalid JSON — check the file and try again.';
    status.style.color = 'rgba(220,80,60,.8)';
  }
}
</script>
<script src="coach.js"></script>
</body>
