<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="bl-page" content="programme">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>BodyLens — My Programme</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=Space+Grotesk:wght@300;400;500;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
body { background:var(--ink); color:var(--dk-1); }
.page { max-width:900px; margin:0 auto; padding:0 32px 100px; }

/* Hero */
.prog-hero {
  padding:44px 0 36px;
  border-bottom:1px solid var(--bd);
  margin-bottom:36px;
  display:flex; justify-content:space-between; align-items:flex-end; gap:24px;
}
.prog-name {
  font-family:var(--serif);
  font-size:60px; font-weight:300;
  line-height:0.92; letter-spacing:-0.03em;
  color:var(--dk-1);
}
.prog-name em { font-style:italic; color:var(--dk-3); }
.prog-goal {
  font-size:14px; font-weight:300; color:var(--dk-2);
  line-height:1.6; margin-top:10px; max-width:440px;
}
.prog-hero-actions { display:flex; flex-direction:column; gap:8px; align-items:flex-end; flex-shrink:0; }
.prog-meta { font-size:10px; font-weight:300; color:var(--dk-3); }

/* Stat strip */
.prog-stats {
  display:grid; grid-template-columns:repeat(5,1fr);
  gap:1px; background:var(--bd);
  border:1px solid var(--bd); border-radius:6px;
  overflow:hidden; margin-bottom:32px;
}
.prog-stat { background:var(--ink-2); padding:14px 10px; text-align:center; }
.prog-stat-val { font-family:var(--mono); font-size:22px; font-weight:500; color:var(--jade); line-height:1; margin-bottom:4px; }
.prog-stat-val.amber { color:var(--amber); }
.prog-stat-val.slate { color:var(--dk-2); }
.prog-stat-label { font-size:9px; font-weight:600; letter-spacing:0.1em; text-transform:uppercase; color:var(--dk-3); }

/* Section label */
.prog-sec {
  font-size:9px; font-weight:600; letter-spacing:0.18em; text-transform:uppercase;
  color:var(--dk-3); margin:0 0 12px;
  display:flex; align-items:center; gap:10px;
}
.prog-sec::after { content:''; flex:1; height:1px; background:var(--bd); }
.prog-sec.jade  { color:var(--jade); }
.prog-sec.amber { color:var(--amber); }
.prog-sec.gold  { color:var(--gold); }

/* Coach summary */
.prog-coach {
  background:var(--ink-2); border:1px solid var(--jade-br);
  border-radius:6px; padding:20px 24px; margin-bottom:28px;
  font-family:var(--serif); font-size:16px; font-weight:300;
  font-style:italic; color:var(--dk-2); line-height:1.82;
  border-left:3px solid var(--jade-br);
}

/* Tabs */
.prog-tabs {
  display:flex; gap:0; border-bottom:1px solid var(--bd); margin-bottom:28px;
  overflow-x:auto; -webkit-overflow-scrolling:touch;
}
.prog-tab {
  font-size:11px; font-weight:600; letter-spacing:0.08em; text-transform:uppercase;
  padding:12px 18px; border:none; background:transparent;
  color:var(--dk-3); cursor:pointer; font-family:var(--sans);
  border-bottom:2px solid transparent; margin-bottom:-1px;
  white-space:nowrap; transition:all 0.12s; flex-shrink:0;
}
.prog-tab:hover { color:var(--dk-2); }
.prog-tab.active { color:var(--jade); border-bottom-color:var(--jade); }

.prog-pane { display:none; }
.prog-pane.active { display:block; }

/* Cards */
.prog-card {
  background:var(--ink-2); border:1px solid var(--bd); border-radius:6px;
  overflow:hidden; margin-bottom:10px;
}
.prog-card.jade  { border-top:2px solid var(--jade); }
.prog-card.amber { border-top:2px solid var(--amber); }
.prog-card.gold  { border-top:2px solid var(--gold); }
.prog-card.red   { border-top:2px solid var(--red); }

.prog-card-head {
  padding:14px 18px; background:var(--ink-1);
  border-bottom:1px solid var(--bd);
  display:flex; justify-content:space-between; align-items:center;
}
.prog-card-title { font-size:11px; font-weight:600; letter-spacing:0.08em; text-transform:uppercase; color:var(--dk-3); }
.prog-card.jade  .prog-card-title { color:var(--jade); }
.prog-card.amber .prog-card-title { color:var(--amber); }
.prog-card.gold  .prog-card-title { color:var(--gold); }

/* Row */
.prog-row {
  display:flex; justify-content:space-between; align-items:baseline;
  padding:10px 18px; border-bottom:1px solid var(--bd);
  font-size:12px; gap:16px;
}
.prog-row:last-child { border-bottom:none; }
.prog-row-label { font-weight:400; color:var(--dk-3); flex-shrink:0; }
.prog-row-val   { font-weight:500; color:var(--dk-1); text-align:right; line-height:1.4; }
.prog-row-val.jade  { color:var(--jade); }
.prog-row-val.amber { color:var(--amber); }
.prog-row-val.red   { color:var(--red); }

/* Macro grid */
.prog-macros {
  display:grid; grid-template-columns:repeat(4,1fr);
  gap:1px; background:var(--bd);
}
.prog-macro { background:var(--ink-1); padding:16px 10px; text-align:center; }
.prog-macro-val { font-family:var(--mono); font-size:24px; font-weight:500; color:var(--jade); line-height:1; margin-bottom:4px; }
.prog-macro-val.amber { color:var(--amber); }
.prog-macro-val.slate { color:var(--dk-2); }
.prog-macro-label { font-size:9px; font-weight:600; letter-spacing:0.1em; text-transform:uppercase; color:var(--dk-3); }

/* Week plan */
.prog-day {
  display:grid; grid-template-columns:90px 1fr;
  padding:13px 18px; border-bottom:1px solid var(--bd); gap:12px;
}
.prog-day:last-child { border-bottom:none; }
.prog-day-name { font-size:12px; font-weight:600; color:var(--dk-3); }
.prog-day-name.training { color:var(--jade); }
.prog-day-type { font-size:12px; font-weight:500; color:var(--dk-1); margin-bottom:2px; }
.prog-day-focus { font-size:11px; font-weight:300; color:var(--dk-3); }
.prog-day-exs { font-size:10px; font-weight:300; color:var(--dk-3); margin-top:2px; }
.prog-day-note { font-size:10px; font-style:italic; color:var(--dk-3); margin-top:2px; }

/* Injury */
.prog-injury {
  padding:14px 18px; border-bottom:1px solid var(--bd);
  border-left:3px solid var(--gold);
}
.prog-injury:last-child { border-bottom:none; }
.prog-injury-loc { font-size:12px; font-weight:600; color:var(--gold); margin-bottom:4px; }
.prog-injury-text { font-size:12px; font-weight:300; color:var(--dk-2); line-height:1.65; }
.prog-injury-rules { margin-top:8px; font-size:11px; font-weight:300; color:var(--dk-3); line-height:1.7; }

/* Supplement */
.prog-supp {
  display:grid; grid-template-columns:1fr 80px 120px;
  padding:10px 18px; border-bottom:1px solid var(--bd);
  font-size:12px; gap:12px; align-items:baseline;
}
.prog-supp:last-child { border-bottom:none; }
.prog-supp.head { background:var(--ink-1); }
.prog-supp.head div { font-size:9px; font-weight:600; letter-spacing:0.1em; text-transform:uppercase; color:var(--dk-3); }
.prog-supp-name { font-weight:500; color:var(--dk-1); }
.prog-supp-dose { font-family:var(--mono); font-weight:300; color:var(--amber); }
.prog-supp-time { font-weight:300; color:var(--dk-3); }

/* Instructions */
.prog-instructions {
  padding:20px 18px;
  font-family:var(--mono); font-size:12px; font-weight:300;
  color:var(--dk-2); line-height:1.9; white-space:pre-wrap;
  word-break:break-word; max-height:60vh; overflow-y:auto;
  background:var(--ink-1);
}

/* Actions */
.prog-actions { display:flex; gap:8px; flex-wrap:wrap; margin-top:24px; }
.prog-btn {
  padding:10px 20px; background:transparent;
  border:1px solid var(--bd-2); border-radius:4px;
  font-family:var(--sans); font-size:10px; font-weight:600;
  letter-spacing:0.08em; text-transform:uppercase;
  color:var(--dk-3); cursor:pointer; transition:all 0.15s;
  text-decoration:none; display:inline-block;
}
.prog-btn:hover { color:var(--jade); border-color:var(--jade-br); }
.prog-btn.jade {
  background:var(--jade); border-color:var(--jade); color:var(--ink);
}
.prog-btn.jade:hover { background:var(--jade-hi); }
.prog-btn.red { color:var(--red); border-color:var(--red-br); }
.prog-btn.amber { background:var(--amber); border-color:var(--amber); color:var(--ink); }
.prog-btn.amber:hover { opacity:.9; }

/* Optimise week grid */
.opt-week-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin:8px 0 4px;}
.owg-day{background:var(--ink-1);border:1px solid var(--bd);border-radius:6px;padding:10px 6px 8px;text-align:center;}
.owg-day.training{border-top:2px solid var(--jade);}
.owg-day.rest{border-top:2px solid var(--bd);}
.owg-header{margin-bottom:8px;}
.owg-dayname{font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--dk-2);}
.owg-type{font-size:9px;font-weight:300;color:var(--dk-3);margin-top:1px;}
.owg-day.training .owg-type{color:var(--jade);opacity:.7;}
.owg-chips{display:flex;flex-wrap:wrap;gap:2px;justify-content:center;min-height:24px;margin-bottom:6px;}
.owg-chip{font-size:14px;cursor:help;line-height:1;padding:1px;}
.owg-empty{font-size:11px;color:var(--dk-3);padding:4px 0;}
.owg-count{font-size:9px;font-weight:300;color:var(--dk-3);}
.owg-day.training .owg-count{color:var(--jade);opacity:.6;}
@media(max-width:600px){.opt-week-grid{grid-template-columns:repeat(4,1fr);}}
.prog-note-row:last-of-type { border-bottom:none; }
.prog-note-icon { font-size:20px; flex-shrink:0; width:28px; text-align:center; margin-top:2px; }
.prog-note-body { flex:1; min-width:0; }
.prog-note-name { font-size:13px; font-weight:600; color:var(--dk-1); margin-bottom:3px; }
.prog-note-desc { font-size:12px; font-weight:300; color:var(--dk-3); line-height:1.6; }
.prog-note-remove { flex-shrink:0; background:transparent; border:1px solid var(--bd); border-radius:4px; padding:4px 10px; font-size:10px; font-weight:600; letter-spacing:.05em; text-transform:uppercase; color:var(--dk-3); cursor:pointer; font-family:var(--sans); transition:all .12s; }
.prog-note-remove:hover { border-color:rgba(220,80,60,.4); color:rgba(220,80,60,.8); }

/* No profile */
.no-profile { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:60vh; text-align:center; padding:48px; gap:14px; }
.no-profile h2 { font-family:var(--serif); font-size:30px; font-weight:300; }
.no-profile p  { font-size:14px; font-weight:300; color:var(--dk-2); max-width:360px; line-height:1.7; }
.no-profile a  { display:inline-block; padding:12px 28px; background:var(--jade); border-radius:6px; font-size:13px; font-weight:600; letter-spacing:0.06em; text-transform:uppercase; color:var(--ink); text-decoration:none; }

@media(max-width:860px){
  .prog-hero { flex-direction:column; gap:16px; align-items:flex-start; }
  .prog-hero-actions { align-items:flex-start; }
  .prog-stats { grid-template-columns:repeat(3,1fr); }
}
@media(max-width:600px){
  .page { padding:0 16px 80px; }
  .prog-name { font-size:44px; }
  .prog-stats { grid-template-columns:repeat(2,1fr); }
  .prog-macros { grid-template-columns:repeat(2,1fr); }
  .prog-supp { grid-template-columns:1fr 70px; }
  .prog-supp-time { display:none; }
  .prog-day { grid-template-columns:70px 1fr; }
}
</style>
</head>

  <div class="nav-brand">Body<em>Lens</em></div>
  <div class="nav-links">
    <a class="nav-link nav-daily" href="bodylens-dailyplan.html">Today</a>
    <a class="nav-link nav-food" href="bodylens-magazine-food.html">Food</a>
    <a class="nav-link active" href="bodylens-programme.html">Programme</a>
    <a class="nav-link" href="bodylens-science.html">Science</a>
  </div>
  <div class="nav-right-group">
    <a class="nav-link nav-right" href="bodylens-howitworks.html">How it works</a>
    <div class="nav-meta" id="nav-meta"></div>
  </div>
</nav>

<div class="page" id="main"></div>

<script src="nav.js"></script>
<script>
const profile = getProfile();

if (!profile) {
  document.getElementById('main').innerHTML = `
    <div class="no-profile">
      <div style="font-size:44px;">💪</div>
      <h2>No programme yet</h2>
      <p>Complete the onboarding and your full programme will appear here.</p>
      <a href="bodylens-onboard.html">Get started →</a>
    </div>`;
} else {
  document.getElementById('nav-meta').innerHTML =
    `<span class="nav-tag nt-jade">${profile.name}</span>`;
  render(profile);
}

function render(p) {
  const injuries  = p.injuryAssessments || [];
  const supps     = p.supplements || [];
  const weekPlan  = p.weekPlan || [];
  const genDate   = p.generatedAt
    ? new Date(p.generatedAt).toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'})
    : '—';
  const isFemale  = (p.sex||'').toLowerCase() === 'female';

  document.getElementById('main').innerHTML = `

    <div class="prog-hero">
      <div>
        <div class="prog-name">${p.name}<br><em>programme.</em></div>
        <div class="prog-goal">${p.goal||''} ${p.target ? '— ' + p.target : ''}</div>
      </div>
      <div class="prog-hero-actions">
        <div class="prog-meta">Generated ${genDate}</div>
        <div style="display:flex;gap:8px;flex-wrap:wrap;">
          <a href="bodylens-day.html" class="prog-btn jade">Today's plan →</a>
          <button onclick="location.href='bodylens-reset.html'" class="prog-btn red">Reset</button>
        </div>
      </div>
    </div>

    <!-- Stats -->
    <div class="prog-stats">
      <div class="prog-stat">
        <div class="prog-stat-val">${p.age||'—'}</div>
        <div class="prog-stat-label">Age</div>
      </div>
      <div class="prog-stat">
        <div class="prog-stat-val slate">${p.weight||'—'}kg</div>
        <div class="prog-stat-label">Weight</div>
      </div>
      <div class="prog-stat">
        <div class="prog-stat-val jade">${p.calories||'—'}</div>
        <div class="prog-stat-label">Kcal/day</div>
      </div>
      <div class="prog-stat">
        <div class="prog-stat-val jade">${p.protein||'—'}g</div>
        <div class="prog-stat-label">Protein</div>
      </div>
      <div class="prog-stat">
        <div class="prog-stat-val amber">${p.trainingDays||'—'}</div>
        <div class="prog-stat-label">Train days</div>
      </div>
    </div>

    ${p.coachSummary ? `<div class="prog-coach">${p.coachSummary}</div>` : ''}

    <!-- Tabs -->
    <div class="prog-tabs">
      <button class="prog-tab active" onclick="switchTab('overview',this)">Overview</button>
      <button class="prog-tab" onclick="switchTab('week',this)">Week plan</button>
      <button class="prog-tab" onclick="switchTab('nutrition',this)">Nutrition</button>
      <button class="prog-tab" onclick="switchTab('supplements',this)">Supplements</button>
      ${injuries.length ? `<button class="prog-tab" onclick="switchTab('injuries',this)">Injuries</button>` : ''}
      <button class="prog-tab" onclick="switchTab('instructions',this)">Instructions</button>
      <button class="prog-tab" onclick="switchTab('notes',this)">Optimise</button>
      <button class="prog-tab" onclick="switchTab('data',this)">Data</button>
    </div>

    <!-- OVERVIEW -->
    <div class="prog-pane active" id="pane-overview">

      <div class="prog-card jade">
        <div class="prog-card-head"><div class="prog-card-title jade">Your baseline</div></div>
        <div class="prog-row"><span class="prog-row-label">Name</span><span class="prog-row-val jade">${p.name}</span></div>
        <div class="prog-row"><span class="prog-row-label">Age / Sex</span><span class="prog-row-val">${p.age||'—'} · ${p.sex||'—'}</span></div>
        <div class="prog-row"><span class="prog-row-label">Height / Weight</span><span class="prog-row-val">${p.height||'—'}cm · ${p.weight||'—'}kg</span></div>
        <div class="prog-row"><span class="prog-row-label">Body fat</span><span class="prog-row-val">${p.bodyFat||'—'}%</span></div>
        <div class="prog-row"><span class="prog-row-label">Fat storage</span><span class="prog-row-val">${p.fatStorage||'—'}</span></div>
        <div class="prog-row"><span class="prog-row-label">Goal</span><span class="prog-row-val">${p.goal||'—'}</span></div>
        <div class="prog-row"><span class="prog-row-label">Wake time</span><span class="prog-row-val">${p.wakeTime||'—'}</span></div>
        <div class="prog-row"><span class="prog-row-label">Sleep</span><span class="prog-row-val">${p.sleep||'—'}</span></div>
        <div class="prog-row"><span class="prog-row-label">Gym</span><span class="prog-row-val">${p.gymAccess||'—'}</span></div>
        <div class="prog-row"><span class="prog-row-label">Recovery</span><span class="prog-row-val">${(p.recoveryTools||[]).join(', ')||'None'}</span></div>
        <div class="prog-row"><span class="prog-row-label">Alcohol</span><span class="prog-row-val">${p.alcoholHabit||'—'}</span></div>
        ${(p.nonNegotiables||[]).length ? `<div class="prog-row"><span class="prog-row-label">Non-negotiables</span><span class="prog-row-val">${p.nonNegotiables.join(', ')}</span></div>` : ''}
      </div>

      <div class="prog-actions">
        <a href="bodylens-day.html" class="prog-btn jade">Today's plan →</a>
        <a href="bodylens-week.html" class="prog-btn">Week view</a>
        <button onclick="location.reload()" class="prog-btn">Regenerate science pages</button>
        <a href="bodylens-checkin.html" class="prog-btn" style="background:rgba(200,148,30,0.1);border-color:rgba(200,148,30,0.3);color:var(--gold);">4-week check-in →</a>
        <button onclick="location.href='bodylens-reset.html'" class="prog-btn red">Reset all data</button>
      </div>

    </div>

    <!-- WEEK -->
    <div class="prog-pane" id="pane-week">
      <div class="prog-card jade">
        <div class="prog-card-head">
          <div class="prog-card-title jade">Your ${p.trainingDays||4}-day split</div>
          <div style="font-size:11px;font-weight:300;color:var(--dk-3);">${weekPlan.filter(d=>d.priority==='training').map(d=>d.day).join(', ')}</div>
        </div>
        ${weekPlan.map((day,i) => {
          const DAY_MAP = {0:6,1:0,2:1,3:2,4:3,5:4,6:5};
          const todayIdx = DAY_MAP[new Date().getDay()];
          const isToday = i === todayIdx;
          return `
          <div class="prog-day" style="${isToday?'background:rgba(0,200,160,0.03);':''}">
            <div>
              <div class="prog-day-name ${day.priority==='training'?'training':''}">${day.day.slice(0,3)}${isToday?' <span style="font-size:8px;color:var(--jade);background:var(--jade-dim);border:1px solid var(--jade-br);padding:1px 6px;border-radius:10px;letter-spacing:0.06em;">TODAY</span>':''}</div>
            </div>
            <div>
              <div class="prog-day-type">${day.type}</div>
              <div class="prog-day-focus">${day.focus||''}</div>
              ${day.keyExercises&&day.keyExercises.length?`<div class="prog-day-exs">${day.keyExercises.slice(0,3).join(' · ')}</div>`:''}
              ${day.coachNote?`<div class="prog-day-note">${day.coachNote}</div>`:''}
            </div>
          </div>`;
        }).join('')}
      </div>
    </div>

    <!-- NUTRITION -->
    <div class="prog-pane" id="pane-nutrition">
      <div class="prog-card amber">
        <div class="prog-card-head"><div class="prog-card-title amber">Daily targets</div></div>
        <div class="prog-macros">
          <div class="prog-macro"><div class="prog-macro-val">${p.calories||'—'}</div><div class="prog-macro-label">Calories</div></div>
          <div class="prog-macro"><div class="prog-macro-val jade">${p.protein||'—'}g</div><div class="prog-macro-label">Protein</div></div>
          <div class="prog-macro"><div class="prog-macro-val amber">${p.carbs||'—'}g</div><div class="prog-macro-label">Carbs</div></div>
          <div class="prog-macro"><div class="prog-macro-val slate">${p.fat||'—'}g</div><div class="prog-macro-label">Fat</div></div>
        </div>
        ${p.calorieReasoning?`<div style="padding:14px 18px;font-size:12px;font-weight:300;color:var(--dk-2);line-height:1.75;font-style:italic;border-top:1px solid var(--bd);">${p.calorieReasoning}</div>`:''}
        <div class="prog-row"><span class="prog-row-label">TDEE</span><span class="prog-row-val">${p.tdee||'—'} kcal</span></div>
        <div class="prog-row"><span class="prog-row-label">Eating window</span><span class="prog-row-val">${p.fastingWindow||p.eatingWindow||'Flexible'}</span></div>
        <div class="prog-row"><span class="prog-row-label">Meals / day</span><span class="prog-row-val">${p.mealCount||4}</span></div>
        <div class="prog-row"><span class="prog-row-label">Diet</span><span class="prog-row-val">${p.dietType||'—'}</span></div>
        ${(p.foodExclusions||[]).length?`<div class="prog-row"><span class="prog-row-label">Avoid</span><span class="prog-row-val red">${p.foodExclusions.join(', ')}</span></div>`:''}
        ${p.triggerFoods&&!p.triggerFoods.includes('None')?`<div class="prog-row"><span class="prog-row-label">Trigger foods</span><span class="prog-row-val red">${p.triggerFoods}</span></div>`:''}
      </div>
      <div style="margin-top:12px;">
        <a href="bodylens-fuel.html" class="prog-btn">Food system & meal ideas →</a>
      </div>
    </div>

    <!-- SUPPLEMENTS -->
    <div class="prog-pane" id="pane-supplements">
      ${supps.length ? `
      <div class="prog-card gold">
        <div class="prog-card-head"><div class="prog-card-title gold">Your stack — ${supps.length} supplements</div></div>
        <div class="prog-supp head">
          <div>Supplement</div><div>Dose</div><div>Timing</div>
        </div>
        ${supps.map(s=>`
        <div class="prog-supp">
          <div class="prog-supp-name">${s.name}</div>
          <div class="prog-supp-dose">${s.dose}</div>
          <div class="prog-supp-time">${s.timing}</div>
        </div>`).join('')}
      </div>
      <div style="margin-top:12px;">
        <a href="bodylens-howitworks.html" class="prog-btn">Supplement science →</a>
      </div>` : '<div style="color:var(--dk-3);font-size:13px;padding:20px 0;">No supplement stack generated.</div>'}
    </div>

    <!-- INJURIES -->
    ${injuries.length ? `
    <div class="prog-pane" id="pane-injuries">
      <div class="prog-card gold">
        <div class="prog-card-head"><div class="prog-card-title gold">${injuries.length} injury note${injuries.length>1?'s':''}</div></div>
        ${injuries.map(inj=>`
        <div class="prog-injury">
          <div class="prog-injury-loc">${inj.location}</div>
          <div class="prog-injury-text">${inj.assessment||inj.detail||''}</div>
          ${inj.avoidMovements&&inj.avoidMovements.length?`
          <div class="prog-injury-rules">
            <strong style="color:var(--red);">Avoid:</strong> ${inj.avoidMovements.join(', ')}<br>
            <strong style="color:var(--jade);">Instead:</strong> ${(inj.safeAlternatives||[]).join(', ')}<br>
            ${inj.rehabilitationNotes?`<strong style="color:var(--gold);">Long term:</strong> ${inj.rehabilitationNotes}`:''}
          </div>`:''}
        </div>`).join('')}
      </div>
    </div>` : ''}

    <!-- INSTRUCTIONS -->
    <div class="prog-pane" id="pane-instructions">
      <div class="prog-card">
        <div class="prog-card-head">
          <div class="prog-card-title">Coaching brief</div>
          <div style="font-size:10px;font-weight:300;color:var(--dk-3);">Generated ${genDate}</div>
        </div>
        <div class="prog-instructions">${(p.instructions||'No instructions generated.').replace(/</g,'&lt;').replace(/>/g,'&gt;')}</div>
      </div>
    </div>

    <!-- OPTIMISE (week view + manage) -->
    <div class="prog-pane" id="pane-notes">
      ${(function() {

        // Master optimisation registry — covers all sources
        const OPT_MAP = {
          // ACCELERATORS — nutrition
          'fast-16-8':           { icon:'⏰', name:'Extended overnight fast',        cat:'Nutrition',  days:'all',      fires:'Every day — eating window note' },
          'psmf':                { icon:'🧬', name:'Protein-sparing modified fast',  cat:'Nutrition',  days:'rest',     fires:'Rest days — PSMF day note' },
          'carb-backload':       { icon:'⚡', name:'Carb back-loading',              cat:'Nutrition',  days:'training', fires:'Training days — meal timing override' },
          'diet-break':          { icon:'🔄', name:'Diet break week',                cat:'Nutrition',  days:'all',      fires:'Every day — calorie note' },
          'fasted-coffee':       { icon:'☕', name:'Fasted morning training',        cat:'Nutrition',  days:'training', fires:'Training days — wake + pre-training note' },
          'monthly-36h':         { icon:'🌙', name:'Monthly 36-hour fast',           cat:'Nutrition',  days:'rest',     fires:'Designated rest day — fast note' },
          // ACCELERATORS — training
          'zone2':               { icon:'🫀', name:'Zone 2 cardio',                  cat:'Training',   days:'rest',     fires:'Rest days — Zone 2 block added' },
          'vo2max-intervals':    { icon:'🔥', name:'VO₂max intervals',              cat:'Training',   days:'training', fires:'One training day/week — add-on note' },
          'post-meal-walks':     { icon:'🚶', name:'Post-meal walks',                cat:'Training',   days:'all',      fires:'Every day — note on each meal' },
          'neat':                { icon:'📈', name:'NEAT maximisation',              cat:'Training',   days:'all',      fires:'Every day — step target note' },
          'loaded-stretch':      { icon:'🧘', name:'Loaded stretching',             cat:'Training',   days:'training', fires:'Training days — stretch block added' },
          'bfr':                 { icon:'🩸', name:'BFR training',                  cat:'Training',   days:'training', fires:'Training days — training note' },
          // ACCELERATORS — recovery
          'sauna':               { icon:'🔥', name:'Sauna protocol',                 cat:'Recovery',  days:'rest',     fires:'Rest days — sauna block added' },
          'contrast':            { icon:'🧊', name:'Cold–hot contrast cycling',      cat:'Recovery',  days:'rest',     fires:'Rest days — contrast block added' },
          'nsdr':                { icon:'🌊', name:'NSDR / Yoga Nidra',             cat:'Recovery',  days:'rest',     fires:'Rest days — NSDR block added' },
          'sleep-extension':     { icon:'😴', name:'Sleep extension',               cat:'Recovery',  days:'all',      fires:'Every day — sleep block note' },
          'creatine-load':       { icon:'💊', name:'Creatine loading',              cat:'Recovery',  days:'all',      fires:'Every day — supplement note' },
          'morning-protocol':    { icon:'☀️', name:'Morning light + cold finish',   cat:'Behaviour', days:'all',      fires:'Every day — wake block note' },
          // ACCELERATORS — behaviour
          'implementation-intent':{ icon:'🎯', name:'Implementation intentions',     cat:'Behaviour', days:'training', fires:'Training days — training note' },
          'dopamine-scheduling': { icon:'🧠', name:'Dopamine scheduling',           cat:'Behaviour', days:'training', fires:'Training days — pre-session note' },
          'two-minute-rule':     { icon:'👟', name:'Two-minute rule',               cat:'Behaviour', days:'training', fires:'Training days — training note' },
          'training-log':        { icon:'📓', name:'Training log',                  cat:'Behaviour', days:'training', fires:'Training days — training note' },
          'body-composition-check':{ icon:'📊', name:'Weekly body composition',     cat:'Behaviour', days:'monday',   fires:'Mondays only — check-in block added' },
          'comfort-expansion':   { icon:'🌡️', name:'Deliberate discomfort',        cat:'Behaviour', days:'all',      fires:'Every day — daily note' },
          // FOOD / SCIENCE — manual additions
          'food-ordering':       { icon:'🥗', name:'Protein-first food ordering',   cat:'Nutrition',  days:'all',      fires:'Every day — note on each meal' },
          'vinegar':             { icon:'🥤', name:'Vinegar before meals',          cat:'Nutrition',  days:'all',      fires:'Every day — note on each meal' },
          'fibre-30g':           { icon:'🌿', name:'30g daily fibre target',        cat:'Nutrition',  days:'all',      fires:'Every day — meal notes' },
        };

        // Collect all saved IDs — merge legacy accelerators + optimisations
        const savedIds = new Set([
          ...(p.accelerators || []),
          ...(p.optimisations || []).map(o => typeof o === 'string' ? o : o.id)
        ]);

        const weekPlan = p.weekPlan || [];
        const DAY_NAMES = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];

        // Build week grid data — for each day, what fires
        const weekGrid = DAY_NAMES.map(function(dayName, i) {
          const dp = weekPlan[i] || { type:'Rest', priority:'rest' };
          const isTraining = dp.priority === 'training';
          const isMonday = i === 0;
          const active = [];
          savedIds.forEach(function(id) {
            const opt = OPT_MAP[id]; if (!opt) return;
            if (opt.days === 'all') active.push(id);
            else if (opt.days === 'training' && isTraining) active.push(id);
            else if (opt.days === 'rest' && !isTraining) active.push(id);
            else if (opt.days === 'monday' && isMonday) active.push(id);
          });
          return { dayName, type: dp.type || 'Rest', isTraining, active };
        });

        if (!savedIds.size) return `
          <div class="prog-card">
            <div style="padding:32px 24px;text-align:center;">
              <div style="font-size:36px;margin-bottom:14px;">⚡</div>
              <div style="font-size:16px;font-weight:300;color:var(--dk-1);margin-bottom:8px;">No optimisations active yet</div>
              <div style="font-size:13px;font-weight:300;color:var(--dk-2);line-height:1.7;max-width:420px;margin:0 auto 24px;">
                Browse Accelerators, Science, or Food pages and add concepts to your programme. They'll appear in your daily timeline on the right days automatically.
              </div>
              <div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap;">
                <a href="bodylens-accelerators.html" class="prog-btn jade">Accelerators →</a>
                <a href="bodylens-science.html" class="prog-btn">Science →</a>
                <a href="bodylens-food.html" class="prog-btn">Food →</a>
              </div>
            </div>
          </div>`;

        // Group saved optimisations by category
        const byCategory = {};
        savedIds.forEach(function(id) {
          const opt = OPT_MAP[id] || { icon:'⚡', name:id, cat:'Other', days:'all', fires:'Daily' };
          if (!byCategory[opt.cat]) byCategory[opt.cat] = [];
          byCategory[opt.cat].push({ id, ...opt });
        });

        const catColors = { Nutrition:'amber', Training:'jade', Recovery:'slate', Behaviour:'gold', Other:'slate' };

        return `
          <!-- Week grid -->
          <div class="prog-card" style="margin-bottom:14px;">
            <div class="prog-card-head">
              <div class="prog-card-title jade">Your optimised week</div>
              <div style="font-size:11px;font-weight:300;color:var(--dk-3);">Every active optimisation mapped to the day it fires. This is what your daily plan includes.</div>
            </div>
            <div class="opt-week-grid">
              ${weekGrid.map(function(day) {
                return `<div class="owg-day ${day.isTraining ? 'training' : 'rest'}">
                  <div class="owg-header">
                    <div class="owg-dayname">${day.dayName}</div>
                    <div class="owg-type">${day.type}</div>
                  </div>
                  <div class="owg-chips">
                    ${day.active.length ? day.active.map(function(id) {
                      const opt = OPT_MAP[id] || {};
                      return `<div class="owg-chip" title="${opt.fires||id}">${opt.icon||'⚡'}</div>`;
                    }).join('') : '<div class="owg-empty">—</div>'}
                  </div>
                  <div class="owg-count">${day.active.length ? day.active.length + ' active' : 'base plan'}</div>
                </div>`;
              }).join('')}
            </div>
            <div style="margin-top:8px;padding:10px 0 0;border-top:1px solid var(--bd);font-size:10px;font-weight:300;color:var(--dk-3);">
              Hover or tap any icon to see what it does. Each fires automatically in your daily plan on the right days.
            </div>
          </div>

          <!-- Active optimisations by category -->
          ${Object.keys(byCategory).map(function(cat) {
            const items = byCategory[cat];
            const col = catColors[cat] || 'slate';
            return `<div class="prog-card" style="margin-bottom:10px;">
              <div class="prog-card-head">
                <div class="prog-card-title ${col}">${cat}</div>
                <div style="font-size:10px;font-weight:300;color:var(--dk-3);">${items.length} active</div>
              </div>
              ${items.map(function(opt) {
                return `<div class="prog-note-row" id="note-${opt.id}">
                  <div class="prog-note-icon">${opt.icon}</div>
                  <div class="prog-note-body">
                    <div class="prog-note-name">${opt.name}</div>
                    <div class="prog-note-desc">${opt.fires}</div>
                  </div>
                  <button class="prog-note-remove" onclick="removeOpt('${opt.id}')">Remove</button>
                </div>`;
              }).join('')}
            </div>`;
          }).join('')}

          <!-- Add more -->
          <div style="padding:16px 0 4px;">
            <div style="font-size:9px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--dk-3);margin-bottom:12px;">Add from</div>
            <div style="display:flex;gap:8px;flex-wrap:wrap;">
              <a href="bodylens-accelerators.html" class="prog-btn jade">Accelerators →</a>
              <a href="bodylens-science.html" class="prog-btn">Science →</a>
              <a href="bodylens-food.html" class="prog-btn">Food →</a>
            </div>
          </div>
        `;
      })()}
    </div>

    <!-- DATA (export / import) -->
    <div class="prog-pane" id="pane-data">
      <div class="prog-card" style="margin-bottom:16px;">
        <div class="prog-card-head">
          <div class="prog-card-title jade">Export profile</div>
          <div style="font-size:11px;font-weight:300;color:var(--dk-3);">Download your full profile as a JSON file. Use this to back up your data or restore it in a new browser.</div>
        </div>
        <div style="padding:4px 0 16px;">
          <button onclick="exportProfile()" class="prog-btn jade">↓ Download profile.json</button>
        </div>
      </div>

      <div class="prog-card">
        <div class="prog-card-head">
          <div class="prog-card-title amber">Import profile</div>
          <div style="font-size:11px;font-weight:300;color:var(--dk-3);">Restore a previously exported profile JSON. This will replace your current programme.</div>
        </div>
        <div style="padding:4px 0 8px;">
          <div style="margin-bottom:12px;">
            <label style="font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--dk-3);display:block;margin-bottom:8px;">Upload a JSON file</label>
            <input type="file" id="import-file" accept=".json,application/json" onchange="handleImportFile(event)"
              style="font-size:12px;color:var(--dk-2);background:var(--ink-1);border:1px solid var(--bd);border-radius:6px;padding:8px 12px;width:100%;cursor:pointer;">
          </div>
          <div style="display:flex;align-items:center;gap:12px;margin:16px 0;color:var(--dk-3);">
            <div style="flex:1;height:1px;background:var(--bd);"></div>
            <div style="font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;">or paste JSON</div>
            <div style="flex:1;height:1px;background:var(--bd);"></div>
          </div>
          <textarea id="import-json" placeholder='Paste your profile JSON here…' rows="6"
            style="width:100%;background:var(--ink-1);border:1px solid var(--bd);border-radius:6px;padding:12px;font-size:12px;font-family:var(--mono);color:var(--dk-2);resize:vertical;outline:none;transition:border-color .12s;"
            onfocus="this.style.borderColor='rgba(196,124,24,.4)'" onblur="this.style.borderColor='var(--bd)'"></textarea>
          <div style="margin-top:10px;display:flex;gap:8px;align-items:center;">
            <button onclick="importProfile()" class="prog-btn amber">↑ Import & restore</button>
            <div id="import-status" style="font-size:12px;font-weight:300;color:var(--dk-3);"></div>
          </div>
        </div>
        <div style="margin-top:16px;padding:12px 14px;background:rgba(220,80,60,0.04);border:1px solid rgba(220,80,60,0.15);border-radius:6px;">
          <div style="font-size:11px;font-weight:300;color:var(--dk-3);line-height:1.65;"><strong style="color:rgba(220,80,60,.7);font-weight:600;">⚠ Warning:</strong> Importing will overwrite your current programme. Export a backup first if you want to keep it.</div>
        </div>
      </div>
    </div>

  `; // end render innerHTML
}

function switchTab(id, btn) {
  document.querySelectorAll('.prog-tab').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.prog-pane').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('pane-' + id).classList.add('active');
}

function removeAcc(id) {
  removeOpt(id);
}

function removeOpt(id) {
  try {
    const p = JSON.parse(localStorage.getItem('bl_profile') || 'null');
    if (!p) return;
    p.accelerators = (p.accelerators || []).filter(a => a !== id);
    p.optimisations = (p.optimisations || []).filter(o => (typeof o === 'string' ? o : o.id) !== id);
    localStorage.setItem('bl_profile', JSON.stringify(p));
    const row = document.getElementById('note-' + id);
    if (row) { row.style.opacity = '0'; row.style.transition = 'opacity .2s'; setTimeout(() => { row.remove(); }, 200); }
  } catch(e) {}
}

function exportProfile() {
  try {
    const raw = localStorage.getItem('bl_profile');
    if (!raw) return;
    const blob = new Blob([JSON.stringify(JSON.parse(raw), null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'bodylens-profile.json';
    a.click();
    URL.revokeObjectURL(url);
  } catch(e) {
    alert('Could not export profile.');
  }
}

function handleImportFile(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    document.getElementById('import-json').value = e.target.result;
  };
  reader.readAsText(file);
}

function importProfile() {
  const raw = document.getElementById('import-json').value.trim();
  const status = document.getElementById('import-status');
  if (!raw) { status.textContent = 'Nothing to import.'; status.style.color = 'var(--dk-3)'; return; }
  try {
    const p = JSON.parse(raw);
    if (!p.name || !p.calories) {
      status.textContent = '⚠ Doesn\'t look like a valid BodyLens profile.';
      status.style.color = 'rgba(220,80,60,.8)';
      return;
    }
    localStorage.setItem('bl_profile', JSON.stringify(p));
    // Clear any stale plan caches
    Object.keys(localStorage).forEach(function(k) {
      if (k.startsWith('dayplan_') || k.startsWith('bl_recipe_') || k.startsWith('bl_macros_')) {
        localStorage.removeItem(k);
      }
    });
    status.textContent = '✓ Profile restored. Reloading…';
    status.style.color = 'var(--jade)';
    setTimeout(() => location.reload(), 800);
  } catch(e) {
    status.textContent = '⚠ Invalid JSON — check the file and try again.';
    status.style.color = 'rgba(220,80,60,.8)';
  }
}
</script>
<script src="coach.js"></script>
</body>
</html>
