<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#0c1010">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>BodyLens — Podcast</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=Space+Grotesk:wght@300;400;500;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
body { background:var(--ink); color:var(--dk-1); }
.pod-page { max-width:800px; margin:0 auto; padding:0 28px 100px; }

/* ── HERO ─────────────────────────────────────── */
.pod-hero { padding:44px 0 32px; border-bottom:1px solid var(--bd); margin-bottom:32px; }
.pod-kicker { font-size:10px; font-weight:700; letter-spacing:.22em; text-transform:uppercase; color:var(--dk-3); margin-bottom:10px; }
.pod-title { font-family:var(--serif); font-size:56px; font-weight:300; line-height:.92; letter-spacing:-.025em; color:var(--dk-1); margin-bottom:14px; }
.pod-title em { font-style:italic; color:var(--dk-3); }
.pod-sub { font-size:13px; font-weight:300; color:var(--dk-2); line-height:1.75; max-width:520px; }

/* ── HOSTS ────────────────────────────────────── */
.pod-hosts { display:flex; gap:14px; margin-bottom:28px; }
.pod-host {
  flex:1; background:var(--ink-1); border:1px solid var(--bd);
  border-radius:8px; padding:14px 16px;
  display:flex; gap:12px; align-items:flex-start;
}
.pod-host-avatar {
  width:40px; height:40px; border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  font-size:18px; flex-shrink:0;
  background:var(--ink-2); border:1px solid var(--bd);
}
.pod-host.dr .pod-host-avatar { background:rgba(0,200,160,.08); border-color:var(--jade-br); }
.pod-host.you .pod-host-avatar { background:rgba(200,148,30,.08); border-color:rgba(200,148,30,.25); }
.pod-host-name { font-size:12px; font-weight:600; color:var(--dk-1); margin-bottom:2px; }
.pod-host.dr .pod-host-name { color:var(--jade); }
.pod-host.you .pod-host-name { color:var(--amber); }
.pod-host-role { font-size:10px; font-weight:300; color:var(--dk-3); line-height:1.4; }

/* ── TOPIC BUILDER ────────────────────────────── */
.pod-builder {
  background:var(--ink-1); border:1px solid var(--bd);
  border-radius:10px; overflow:hidden; margin-bottom:24px;
}
.pod-builder-hd {
  padding:16px 20px; border-bottom:1px solid var(--bd);
  display:flex; align-items:center; gap:10px;
}
.pod-builder-icon { font-size:18px; }
.pod-builder-label { font-size:11px; font-weight:600; letter-spacing:.08em; text-transform:uppercase; color:var(--dk-2); }
.pod-builder-body { padding:18px 20px; }

/* Topic input */
.pod-input-row { display:flex; gap:8px; margin-bottom:16px; }
.pod-topic-input {
  flex:1; background:var(--ink-2); border:1px solid var(--bd);
  border-radius:8px; padding:12px 16px; font-size:14px;
  font-family:var(--sans); color:var(--dk-1); outline:none;
  transition:border-color .12s;
}
.pod-topic-input:focus { border-color:rgba(0,200,160,.4); }
.pod-topic-input::placeholder { color:var(--dk-3); }
.pod-generate-btn {
  background:var(--jade); border:none; color:var(--ink);
  padding:12px 22px; border-radius:8px;
  font-size:11px; font-weight:700; letter-spacing:.06em; text-transform:uppercase;
  cursor:pointer; font-family:var(--sans); white-space:nowrap;
  transition:opacity .12s;
}
.pod-generate-btn:hover { opacity:.9; }
.pod-generate-btn:disabled { opacity:.4; cursor:default; }

/* Context selector */
.pod-context-label { font-size:9px; font-weight:700; letter-spacing:.14em; text-transform:uppercase; color:var(--dk-3); margin-bottom:8px; }
.pod-context-chips { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:16px; }
.pod-ctx-chip {
  padding:5px 12px; border-radius:14px; border:1px solid var(--bd);
  background:transparent; font-size:10px; font-weight:500;
  color:var(--dk-3); cursor:pointer; font-family:var(--sans);
  transition:all .1s;
}
.pod-ctx-chip.active { background:var(--jade-dim); border-color:var(--jade-br); color:var(--jade); }

/* Suggested topics */
.pod-suggest-label { font-size:9px; font-weight:700; letter-spacing:.14em; text-transform:uppercase; color:var(--dk-3); margin-bottom:8px; }
.pod-suggest-chips { display:flex; gap:6px; flex-wrap:wrap; }
.pod-suggest-chip {
  padding:5px 12px; border-radius:14px; border:1px solid var(--bd);
  background:var(--ink-2); font-size:10px; font-weight:500;
  color:var(--dk-2); cursor:pointer; font-family:var(--sans);
  transition:all .1s;
}
.pod-suggest-chip:hover { border-color:rgba(255,255,255,.12); color:var(--dk-1); }

/* Duration selector */
.pod-duration-row { display:flex; gap:6px; margin-bottom:0; }
.pod-dur-btn {
  padding:5px 12px; border-radius:14px; border:1px solid var(--bd);
  background:transparent; font-size:10px; font-weight:500;
  color:var(--dk-3); cursor:pointer; font-family:var(--sans);
  transition:all .1s;
}
.pod-dur-btn.active { background:rgba(200,148,30,.08); border-color:rgba(200,148,30,.3); color:var(--amber); }

/* ── LOADING STATE ────────────────────────────── */
.pod-loading {
  background:var(--ink-1); border:1px solid var(--bd);
  border-radius:10px; padding:40px 24px; text-align:center;
}
.pod-loading-title { font-family:var(--serif); font-size:20px; font-weight:300; color:var(--dk-1); margin-bottom:8px; }
.pod-loading-sub { font-size:12px; font-weight:300; color:var(--dk-3); margin-bottom:20px; }
.pod-loading-steps { display:flex; flex-direction:column; gap:6px; max-width:280px; margin:0 auto; text-align:left; }
.pod-loading-step { font-size:11px; font-weight:300; color:var(--dk-3); display:flex; align-items:center; gap:8px; }
.pod-loading-step.done { color:var(--jade); }
.pod-loading-step.active { color:var(--dk-2); }
.pod-loading-dot { width:6px; height:6px; border-radius:50%; background:var(--bd); flex-shrink:0; }
.pod-loading-step.done .pod-loading-dot { background:var(--jade); }
.pod-loading-step.active .pod-loading-dot { background:var(--amber); animation:podPulse .8s ease infinite; }
@keyframes podPulse { 0%,100%{opacity:.4} 50%{opacity:1} }

/* ── PODCAST PLAYER ───────────────────────────── */
.pod-player {
  background:var(--ink-1); border:1px solid var(--bd);
  border-radius:10px; overflow:hidden;
  animation:podFadeIn .3s ease;
}
@keyframes podFadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

.pod-player-hd {
  padding:20px 24px 16px;
  border-bottom:1px solid var(--bd);
  background:linear-gradient(135deg, rgba(0,200,160,.04), transparent);
}
.pod-ep-label { font-size:9px; font-weight:700; letter-spacing:.18em; text-transform:uppercase; color:var(--jade); margin-bottom:6px; }
.pod-ep-title { font-family:var(--serif); font-size:28px; font-weight:300; color:var(--dk-1); line-height:1.1; margin-bottom:6px; }
.pod-ep-meta { font-size:11px; font-weight:300; color:var(--dk-3); }
.pod-ep-meta span { color:var(--dk-2); }

/* Progress bar */
.pod-progress-wrap { padding:14px 24px; border-bottom:1px solid var(--bd); }
.pod-progress-bar {
  height:3px; background:rgba(255,255,255,.07);
  border-radius:2px; overflow:hidden; cursor:pointer; margin-bottom:8px;
}
.pod-progress-fill {
  height:100%; background:var(--jade); border-radius:2px;
  transition:width .3s ease;
}
.pod-progress-times { display:flex; justify-content:space-between; font-family:var(--mono); font-size:9px; color:var(--dk-3); }

/* Controls */
.pod-controls {
  padding:14px 24px; border-bottom:1px solid var(--bd);
  display:flex; align-items:center; gap:12px;
}
.pod-play-btn {
  width:44px; height:44px; border-radius:50%;
  background:var(--jade); border:none; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  font-size:16px; flex-shrink:0; transition:opacity .12s;
}
.pod-play-btn:hover { opacity:.9; }
.pod-speed-btn {
  background:var(--ink-2); border:1px solid var(--bd);
  border-radius:10px; padding:4px 10px; font-size:10px; font-weight:600;
  color:var(--dk-3); cursor:pointer; font-family:var(--mono);
  transition:all .1s;
}
.pod-speed-btn:hover { border-color:rgba(255,255,255,.1); color:var(--dk-2); }
.pod-now-speaking {
  flex:1; font-size:11px; font-weight:300; color:var(--dk-3);
  font-style:italic; text-align:right;
}
.pod-now-speaking strong { font-style:normal; color:var(--amber); font-weight:600; }

/* ── TRANSCRIPT ───────────────────────────────── */
.pod-transcript { max-height:520px; overflow-y:auto; padding:4px 0; }
.pod-transcript::-webkit-scrollbar { width:3px; }
.pod-transcript::-webkit-scrollbar-thumb { background:var(--bd); }

.pod-line {
  display:flex; gap:14px; padding:14px 24px;
  border-bottom:1px solid rgba(255,255,255,.04);
  transition:background .15s; cursor:pointer;
}
.pod-line:last-child { border-bottom:none; }
.pod-line:hover { background:rgba(255,255,255,.02); }
.pod-line.playing { background:rgba(200,148,30,.04); }
.pod-line.playing.dr-line { background:rgba(0,200,160,.03); }

.pod-line-avatar {
  width:32px; height:32px; border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  font-size:14px; flex-shrink:0; margin-top:2px;
  background:var(--ink-2); border:1px solid var(--bd);
}
.pod-line.dr-line .pod-line-avatar { background:rgba(0,200,160,.08); border-color:var(--jade-br); }
.pod-line.you-line .pod-line-avatar { background:rgba(200,148,30,.08); border-color:rgba(200,148,30,.25); }

.pod-line-body { flex:1; min-width:0; }
.pod-line-speaker {
  font-size:9px; font-weight:700; letter-spacing:.1em; text-transform:uppercase;
  margin-bottom:5px;
}
.pod-line.dr-line .pod-line-speaker { color:var(--jade); }
.pod-line.you-line .pod-line-speaker { color:var(--amber); }
.pod-line-text {
  font-family:var(--serif); font-size:15px; font-weight:300;
  color:var(--dk-2); line-height:1.85;
}
.pod-line.playing .pod-line-text { color:var(--dk-1); }
.pod-line-time {
  font-family:var(--mono); font-size:9px; color:var(--dk-3);
  margin-top:5px; flex-shrink:0; padding-top:4px;
}

/* ── INSIGHT CARDS (key takeaways) ───────────── */
.pod-insights {
  padding:16px 24px; border-top:1px solid var(--bd);
  background:rgba(0,200,160,.02);
}
.pod-insights-label { font-size:9px; font-weight:700; letter-spacing:.14em; text-transform:uppercase; color:var(--jade); margin-bottom:10px; }
.pod-insight-chips { display:flex; flex-wrap:wrap; gap:6px; }
.pod-insight-chip {
  background:var(--ink-2); border:1px solid var(--jade-br);
  border-radius:14px; padding:4px 12px;
  font-size:10px; font-weight:500; color:var(--dk-2);
}

/* ── REGENERATE / NEW EPISODE ─────────────────── */
.pod-footer {
  padding:16px 24px; border-top:1px solid var(--bd);
  display:flex; gap:8px; align-items:center; flex-wrap:wrap;
}
.pod-footer-btn {
  background:transparent; border:1px solid var(--bd);
  border-radius:7px; padding:8px 16px; font-size:10px; font-weight:600;
  letter-spacing:.06em; text-transform:uppercase; color:var(--dk-3);
  cursor:pointer; font-family:var(--sans); transition:all .12s;
}
.pod-footer-btn:hover { border-color:rgba(255,255,255,.1); color:var(--dk-2); }
.pod-footer-btn.primary { background:var(--jade); border-color:var(--jade); color:var(--ink); }
.pod-footer-ep-count { margin-left:auto; font-size:10px; font-weight:300; color:var(--dk-3); }

/* ── EPISODE HISTORY ──────────────────────────── */
.pod-history { margin-top:24px; }
.pod-history-label { font-size:9px; font-weight:700; letter-spacing:.14em; text-transform:uppercase; color:var(--dk-3); margin-bottom:12px; display:flex; align-items:center; gap:10px; }
.pod-history-label::after { content:''; flex:1; height:1px; background:var(--bd); }
.pod-history-item {
  display:flex; align-items:center; gap:12px;
  padding:10px 14px; background:var(--ink-1); border:1px solid var(--bd);
  border-radius:7px; margin-bottom:6px; cursor:pointer;
  transition:border-color .1s;
}
.pod-history-item:hover { border-color:rgba(255,255,255,.1); }
.pod-history-ep { font-size:9px; font-weight:700; letter-spacing:.08em; color:var(--dk-3); width:28px; flex-shrink:0; }
.pod-history-title { font-size:12px; font-weight:500; color:var(--dk-1); flex:1; }
.pod-history-dur { font-family:var(--mono); font-size:10px; color:var(--dk-3); }

@media(max-width:600px) {
  .pod-page { padding:0 16px 80px; }
  .pod-title { font-size:42px; }
  .pod-hosts { flex-direction:column; }
  .pod-line-text { font-size:14px; }
}
</style>
</head>
<body>
<script src="nav.js"></script>

<div class="pod-page">
  <div id="pod-root"></div>
</div>

<script>
// ═══════════════════════════════════════════════════
//  BodyLens Podcast — AI-generated conversational audio
//  Two hosts, personalised to user context
// ═══════════════════════════════════════════════════

var API   = '/api/chat';
var MODEL = 'claude-sonnet-4-20250514';

// ── Profile ──────────────────────────────────────
function getProfile() {
  try { return JSON.parse(localStorage.getItem('bl_profile') || 'null'); }
  catch(e) { return null; }
}

// ── Podcast State ─────────────────────────────────
var POD = {
  topic: '',
  context: 'my-training',   // which lens to apply
  duration: 'medium',        // short / medium / long
  episode: null,             // { title, lines[], insights[], ep_num }
  playing: false,
  currentLine: 0,
  playInterval: null,
  episodeNum: loadEpisodeCount(),
  history: loadHistory()
};

// ── Storage helpers ───────────────────────────────
function loadEpisodeCount() {
  return parseInt(localStorage.getItem('bl_podcast_count') || '0');
}
function saveEpisodeCount(n) {
  localStorage.setItem('bl_podcast_count', String(n));
}
function loadHistory() {
  try { return JSON.parse(localStorage.getItem('bl_podcast_history') || '[]'); }
  catch(e) { return []; }
}
function saveHistory() {
  localStorage.setItem('bl_podcast_history', JSON.stringify(POD.history.slice(0,10)));
}

// ── Suggested topics (personalised to profile) ───
function getSuggestedTopics(p) {
  var base = [
    'Why sleep matters more than most training sessions',
    'Creatine — everything you actually need to know',
    'Body recomposition: losing fat and building muscle simultaneously',
    'Why you\'re not recovering as fast as you should be',
    'The science of progressive overload',
    'Protein timing — does it actually matter?',
    'How stress kills your training progress',
    'Posterior chain: the most underrated training focus',
    'Why most people under-eat for their goals',
    'The truth about caffeine and performance',
  ];

  // Add profile-specific topics
  if (p) {
    if (p.goal && p.goal.toLowerCase().includes('recomp')) {
      base.unshift('The recomposition paradox — why it\'s harder after 40');
      base.unshift('Calorie cycling: training days vs rest days explained');
    }
    if (p.supplements && p.supplements.some(function(s){ return (s.name||s).toString().toLowerCase().includes('creatine'); })) {
      base.unshift('Creatine loading vs maintenance — what the research says');
    }
    if (p.age && p.age >= 40) {
      base.unshift('Training after 40 — what changes and why');
      base.unshift('Testosterone and training: what men over 40 need to know');
    }
    if (p.weekPlan && p.weekPlan.some(function(d){ return d.type === 'Posterior Chain'; })) {
      base.unshift('Posterior chain training: hamstrings, glutes, and why they matter');
    }
  }
  return base.slice(0, 8);
}

// ── Context modes ─────────────────────────────────
var CONTEXTS = [
  { id:'my-training',  label:'Through my training',    desc:'Relate it to your 4-day programme' },
  { id:'my-goals',     label:'Through my goals',       desc:'Body recomp lens' },
  { id:'my-life',      label:'Everyday life',          desc:'Practical, no jargon' },
  { id:'deep-science', label:'Go deep on the science', desc:'Full mechanism detail' },
  { id:'quick-answer', label:'Just the key points',    desc:'Tight, no filler' },
];

// ── Duration settings ─────────────────────────────
var DURATIONS = {
  short:  { label:'5 min', exchanges: 6,  tokens: 900  },
  medium: { label:'12 min', exchanges: 14, tokens: 1800 },
  long:   { label:'20 min', exchanges: 22, tokens: 2800 },
};

// ── Build the AI prompt ───────────────────────────
function buildPrompt(p, topic, context, duration) {
  var dur = DURATIONS[duration] || DURATIONS.medium;
  var exchanges = dur.exchanges;

  // Build personalisation context
  var personalCtx = '';
  if (p) {
    personalCtx = '\nLISTENER PROFILE:\n'
      + '- Name: ' + (p.name||'the listener') + ', age ' + (p.age||'unknown') + '\n'
      + '- Goal: ' + (p.goal||'general fitness') + '\n'
      + '- Training: ' + (p.weekPlan||[]).filter(function(d){return d.priority==='training';}).map(function(d){return d.day+' ('+d.type+')';}).join(', ') + '\n'
      + '- Gym access: ' + (p.gymAccess||'gym') + '\n'
      + '- Supplements: ' + (p.supplements||[]).map(function(s){return s.name||s;}).join(', ') + '\n'
      + '- Diet: ' + (p.dietType||'flexible') + '\n'
      + '- Sleep: ' + (p.sleep||'7-8 hours') + '\n'
      + '- Protein target: ' + (p.protein||140) + 'g/day\n';
  }

  // Context instruction
  var ctxInstruction = {
    'my-training':  'Relate every key point to ' + (p&&p.name||'the listener') + '\'s specific training programme and days. Reference their push/pull/posterior chain split where relevant.',
    'my-goals':     'Frame everything through the lens of body recomposition — gaining muscle while losing fat simultaneously. This is their specific challenge.',
    'my-life':      'Keep it practical and conversational. Avoid technical jargon unless you explain it immediately. Focus on what this means day-to-day.',
    'deep-science': 'Go deep on the mechanisms. The listener is intelligent and curious. Explain the biology, the research, the why behind everything.',
    'quick-answer': 'Be efficient. Cover the key points clearly and concisely. No padding, no tangents. Just what matters most.',
  }[context] || '';

  return `You are writing a script for a two-host health and performance podcast called "BodyLens Podcast".

The podcast is personalised — it is generated specifically for one listener based on their profile.

HOSTS:
1. Dr. Alex — the expert. Knowledgeable, measured, occasionally drops in real science and research. Speaks with authority but stays accessible. Uses phrases like "what the research shows us is...", "the mechanism here is...", "and this is the part most people miss...". Gender-neutral.
2. ${(p&&p.name)||'Jamie'} — the listener made into a host. Curious, direct, occasionally pushes back. Asks the questions the real listener would ask. Personable. Uses phrases like "okay but...", "wait, so in practice...", "and that's why I noticed...", "hang on though...".
${personalCtx}
TOPIC FOR THIS EPISODE: "${topic}"

CONTEXT INSTRUCTION: ${ctxInstruction}

RULES:
1. Write EXACTLY ${exchanges} exchanges (one exchange = one line from each host)
2. Each line should be 2–5 sentences. Natural speech rhythm, not essays.
3. Make the conversation feel genuinely useful — not generic podcast filler
4. Dr. Alex should cite real mechanisms or research at least 3 times
5. ${(p&&p.name)||'Jamie'} should ask at least 2 personalised questions relating to their specific situation
6. End with a clear "what to actually do" moment from Dr. Alex
7. The conversation should build — don't just list facts, let ideas connect

Return ONLY valid JSON:
{
  "title": "Episode title (punchy, specific)",
  "tagline": "One sentence teaser",
  "insights": ["Key takeaway 1", "Key takeaway 2", "Key takeaway 3", "Key takeaway 4"],
  "lines": [
    {"speaker": "dr", "text": "..."},
    {"speaker": "you", "text": "..."}
  ]
}`;
}

// ── Generate episode ──────────────────────────────
async function generateEpisode() {
  var p = getProfile();
  var topic = POD.topic.trim();
  if (!topic) return;

  // Update UI to loading
  POD.episode = null;
  POD.playing = false;
  POD.currentLine = 0;
  render();

  var dur = DURATIONS[POD.duration] || DURATIONS.medium;
  var prompt = buildPrompt(p, topic, POD.context, POD.duration);

  try {
    var res = await fetch(API, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: MODEL,
        max_tokens: dur.tokens,
        system: 'Podcast script writer. Return ONLY valid JSON. No markdown. No preamble. No trailing commas.',
        messages: [{ role: 'user', content: prompt }]
      })
    });
    var data = await res.json();
    var text = (data.content || []).map(function(b){ return b.text||''; }).join('').trim();
    var match = text.match(/\{[\s\S]*\}/);
    if (!match) throw new Error('no json');
    var parsed = JSON.parse(match[0]);

    POD.episodeNum++;
    saveEpisodeCount(POD.episodeNum);

    POD.episode = {
      title: parsed.title || topic,
      tagline: parsed.tagline || '',
      insights: parsed.insights || [],
      lines: parsed.lines || [],
      topic: topic,
      epNum: POD.episodeNum,
      generatedAt: new Date().toISOString()
    };

    // Add to history
    POD.history.unshift({
      epNum: POD.episodeNum,
      title: POD.episode.title,
      topic: topic,
      duration: POD.duration,
      generatedAt: POD.episode.generatedAt
    });
    saveHistory();

  } catch(e) {
    POD.episode = getFallbackEpisode(topic, p);
  }

  render();
}

// ── Fallback episode ──────────────────────────────
function getFallbackEpisode(topic, p) {
  var name = p && p.name || 'Jamie';
  return {
    title: topic,
    tagline: 'A conversation about ' + topic,
    epNum: (POD.episodeNum || 1),
    topic: topic,
    generatedAt: new Date().toISOString(),
    insights: ['Generated offline — try again with connection', 'Topic: ' + topic],
    lines: [
      { speaker:'dr', text:'Welcome back. Today we\'re digging into something that matters a lot — ' + topic + '. And I think there\'s a lot of noise around this topic that we need to cut through.' },
      { speaker:'you', text:'Yeah, I\'ve been wanting to understand this properly for a while. What\'s the actual headline here?' },
      { speaker:'dr', text:'The headline is that most people overcomplicate this. The research is actually pretty clear when you look at the primary sources rather than the social media version.' },
      { speaker:'you', text:'So where should we start?' },
      { speaker:'dr', text:'Start with the mechanism. Once you understand why something happens physiologically, the what-to-do becomes obvious. That\'s the thing that sticks.' },
    ]
  };
}

// ── Playback: line-by-line auto-advance ───────────
// ── ElevenLabs Audio Playback System ─────────────────
// Replaces the text-timer system when EL is configured.
// Falls back gracefully to text-highlighting if no key.

var EL = {
  apiUrl: '/api/tts',
  enabled: false,          // toggled on when user adds key
  audioCache: {},          // lineIndex -> blob URL
  currentAudio: null,      // active Audio element
  prefetchQueue: [],
  prefetching: false,
};

// ElevenLabs TTS — key lives server-side in Vercel env vars.
// No user key needed. Narration is always available.
function elEnabled() {
  return true;
}

// Key management removed — ELEVENLABS_API_KEY is a Vercel environment variable.
// Set it in: Vercel dashboard → Project → Settings → Environment Variables

// Fetch audio for a single line from our /api/tts proxy
async function fetchLineAudio(lineIdx) {
  if (EL.audioCache[lineIdx]) return EL.audioCache[lineIdx];
  var ep = POD.episode;
  if (!ep || !ep.lines || !ep.lines[lineIdx]) return null;
  var line = ep.lines[lineIdx];

  try {
    var resp = await fetch(EL.apiUrl, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        text: line.text,
        speaker: line.speaker
      })
    });
    if (!resp.ok) throw new Error('tts failed: ' + resp.status);
    var blob = await resp.blob();
    var url = URL.createObjectURL(blob);
    EL.audioCache[lineIdx] = url;
    return url;
  } catch(e) {
    console.warn('ElevenLabs TTS failed for line', lineIdx, e.message);
    return null;
  }
}

// Prefetch the next N lines silently in background
function prefetchAhead(fromIdx, count) {
  var ep = POD.episode;
  if (!ep || !ep.lines) return;
  var limit = Math.min(fromIdx + count, ep.lines.length);
  for (var i = fromIdx; i < limit; i++) {
    if (!EL.audioCache[i]) {
      (function(idx) {
        fetchLineAudio(idx).catch(function(){});
      })(i);
    }
  }
}

// Stop any playing audio
function stopAudio() {
  if (EL.currentAudio) {
    EL.currentAudio.pause();
    EL.currentAudio.src = '';
    EL.currentAudio = null;
  }
  if (POD.playInterval) { clearTimeout(POD.playInterval); POD.playInterval = null; }
}

// Play a line — with ElevenLabs if available, else text-timer
async function playLine(idx) {
  var lines = POD.episode && POD.episode.lines || [];
  if (!POD.playing || idx >= lines.length) {
    POD.playing = false;
    stopAudio();
    updatePlayBtn();
    return;
  }

  POD.currentLine = idx;
  updateLineHighlight(idx);
  scrollToLine(idx);
  updateNowSpeaking(idx);
  updateProgress();

  // Prefetch next 3 lines while this one plays
  if (elEnabled()) prefetchAhead(idx + 1, 3);

  if (elEnabled()) {
    // Show loading indicator on play button
    updatePlayBtn('⏳');

    var audioUrl = await fetchLineAudio(idx);

    if (!POD.playing) return; // was stopped while fetching

    if (audioUrl) {
      var audio = new Audio(audioUrl);
      EL.currentAudio = audio;
      updatePlayBtn('⏸');

      audio.onended = function() {
        if (!POD.playing) return;
        playLine(idx + 1);
      };
      audio.onerror = function() {
        // Fallback to text-timer for this line
        textTimerLine(idx);
      };
      audio.play().catch(function() {
        textTimerLine(idx);
      });
    } else {
      // EL failed for this line — use text timer
      textTimerLine(idx);
    }
  } else {
    textTimerLine(idx);
  }
}

// Text-timer fallback (word-count based timing)
function textTimerLine(idx) {
  var lines = POD.episode && POD.episode.lines || [];
  var text = (lines[idx] && lines[idx].text) || '';
  var words = text.split(' ').length;
  var delay = Math.max(3500, Math.min(10000, words * 260));
  updatePlayBtn('⏸');

  POD.playInterval = setTimeout(function() {
    if (!POD.playing) return;
    playLine(idx + 1);
  }, delay);
}

function updatePlayBtn(icon) {
  var btn = document.querySelector('.pod-play-btn');
  if (btn) btn.textContent = icon || (POD.playing ? '⏸' : '▶');
}

function togglePlay() {
  POD.playing = !POD.playing;
  if (POD.playing) {
    if (POD.currentLine >= (POD.episode.lines||[]).length) {
      POD.currentLine = 0;
    }
    // Prefetch first few lines immediately
    if (elEnabled()) prefetchAhead(POD.currentLine, 3);
    playLine(POD.currentLine);
  } else {
    stopAudio();
    updatePlayBtn('▶');
  }
  updatePlayBtn();
}

function startPlayback() {
  stopAudio();
  playLine(POD.currentLine);
}

function stopPlayback() {
  stopAudio();
}

function advanceLine() {
  // Not used directly anymore — playLine handles recursion
}

function jumpToLine(idx) {
  stopAudio();
  POD.currentLine = idx;
  POD.playing = true;
  if (elEnabled()) prefetchAhead(idx, 3);
  playLine(idx);
  updatePlayBtn();
}

function updateLineHighlight(idx) {
  document.querySelectorAll('.pod-line').forEach(function(el, i) {
    el.classList.toggle('playing', i === idx);
  });
}

function scrollToLine(idx) {
  var el = document.querySelector('.pod-line[data-idx="'+idx+'"]');
  if (el) el.scrollIntoView({ behavior:'smooth', block:'center' });
}

function updateNowSpeaking(idx) {
  var el = document.querySelector('.pod-now-speaking');
  if (!el || !POD.episode) return;
  var line = POD.episode.lines[idx];
  if (!line) return;
  var p = getProfile();
  var name = line.speaker === 'dr' ? 'Dr. Alex' : ((p&&p.name)||'Jamie');
  el.innerHTML = 'Now: <strong>' + name + '</strong>';
}

function updateProgress() {
  var bar = document.querySelector('.pod-progress-fill');
  var el = document.querySelector('.pod-progress-curr');
  if (!bar || !POD.episode) return;
  var pct = Math.round((POD.currentLine / Math.max(1, POD.episode.lines.length)) * 100);
  bar.style.width = pct + '%';

  var totalMin = Math.round(POD.episode.lines.length * 0.5);
  var currMin = Math.round(POD.currentLine * 0.5);
  if (el) el.textContent = formatTime(currMin * 60);

  var timeEl = document.getElementById('pod-current-time');
  if (timeEl) timeEl.textContent = formatTime(currMin * 60);
}

function formatTime(secs) {
  var m = Math.floor(secs/60);
  var s = secs % 60;
  return m + ':' + (s<10?'0':'') + s;
}

// ── RENDER ────────────────────────────────────────
function render() {
  var p = getProfile();
  var root = document.getElementById('pod-root');
  if (!root) return;

  var html = '';

  // Hero
  html += '<div class="pod-hero">'
    + '<div class="pod-kicker">BodyLens · AI Podcast</div>'
    + '<div class="pod-title">Your personal<br><em>podcast.</em></div>'
    + '<div class="pod-sub">Type any topic. The AI generates a real two-host conversation — personalised to your training, goals, and how you see the world.</div>'
    + '</div>';

  // Hosts
  var yourName = (p && p.name) || 'You';
  html += '<div class="pod-hosts">'
    + '<div class="pod-host dr">'
      + '<div class="pod-host-avatar">🎓</div>'
      + '<div>'
        + '<div class="pod-host-name">Dr. Alex</div>'
        + '<div class="pod-host-role">Performance scientist. Breaks down the mechanism behind every claim. Cites research, stays accessible.</div>'
      + '</div>'
    + '</div>'
    + '<div class="pod-host you">'
      + '<div class="pod-host-avatar">🎙</div>'
      + '<div>'
        + '<div class="pod-host-name">' + yourName + '</div>'
        + '<div class="pod-host-role">Curious, direct, asks what you\'d actually ask. Grounds the conversation in real life and your specific situation.</div>'
      + '</div>'
    + '</div>'
    + '</div>';

  // Topic builder
  if (!POD.episode) {
    html += renderBuilder(p);
  }

  // Loading
  if (!POD.episode && POD.topic) {
    html += renderLoading();
  }

  // Episode player
  if (POD.episode) {
    html += renderPlayer(p);
  }

  // History
  if (POD.history.length > 1) {
    html += renderHistory();
  }

  root.innerHTML = html;
}

function renderBuilder(p) {
  var topics = getSuggestedTopics(p);
  var html = '<div class="pod-builder">'
    + '<div class="pod-builder-hd">'
      + '<div class="pod-builder-icon">🎙</div>'
      + '<div class="pod-builder-label">What do you want to understand?</div>'
    + '</div>'
    + '<div class="pod-builder-body">';

  // Input
  html += '<div class="pod-input-row">'
    + '<input class="pod-topic-input" id="pod-topic-inp" placeholder="e.g. &quot;creatine&quot;, &quot;why sleep matters&quot;, &quot;training after 40&quot;…" value="' + escHtml(POD.topic) + '" onkeydown="if(event.key===\'Enter\'){startPodcast()}">'
    + '<button class="pod-generate-btn" id="pod-gen-btn" onclick="startPodcast()" ' + (!POD.topic?'disabled':'' )+ '>Generate →</button>'
    + '</div>';

  // Context
  html += '<div class="pod-context-label">Frame it through…</div>'
    + '<div class="pod-context-chips">';
  CONTEXTS.forEach(function(c) {
    html += '<button class="pod-ctx-chip' + (POD.context===c.id?' active':'') + '" onclick="setContext(\'' + c.id + '\')" title="' + c.desc + '">' + c.label + '</button>';
  });
  html += '</div>';

  // Duration
  html += '<div class="pod-context-label" style="margin-top:12px;">Episode length</div>'
    + '<div class="pod-duration-row">';
  Object.entries(DURATIONS).forEach(function(entry) {
    var k = entry[0], v = entry[1];
    html += '<button class="pod-dur-btn' + (POD.duration===k?' active':'') + '" onclick="setDuration(\'' + k + '\')">' + v.label + '</button>';
  });
  html += '</div>';

  // Suggested topics
  html += '<div class="pod-suggest-label" style="margin-top:16px;">'
    + (p ? 'Suggested for ' + p.name : 'Try one of these')
    + '</div>'
    + '<div class="pod-suggest-chips">';
  topics.forEach(function(t) {
    html += '<button class="pod-suggest-chip" onclick="pickTopic(\'' + escHtml(t).replace(/'/g,"\\'") + '\')">' + t + '</button>';
  });
  html += '</div>';

  // ElevenLabs narration — always active, key is server-side
  html += '<div style="margin-top:16px;padding:14px 16px;background:rgba(0,200,160,.04);border:1px solid var(--jade-br);border-radius:8px;display:flex;align-items:center;gap:12px;">'
    + '<div style="font-size:18px;">🎙</div>'
    + '<div>'
      + '<div style="font-size:9px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--jade);margin-bottom:2px;">AI Narration — Active</div>'
      + '<div style="font-size:11px;font-weight:300;color:var(--dk-3);">Dr. Alex and ' + yourName + ' will narrate your podcast with ElevenLabs AI voices.</div>'
    + '</div>'
  + '</div>';

  html += '</div></div>'; // close builder-body, builder
  return html;
}

function renderLoading() {
  var steps = [
    { label:'Reading your training profile', done:true },
    { label:'Building personalised context', done:true },
    { label:'Writing episode script', active:true },
    { label:'Formatting conversation flow', done:false },
  ];
  return '<div class="pod-loading">'
    + '<div class="pod-loading-title">Generating your episode…</div>'
    + '<div class="pod-loading-sub">Dr. Alex and ' + ((getProfile()&&getProfile().name)||'Jamie') + ' are mid-conversation</div>'
    + '<div class="pod-loading-steps">'
    + steps.map(function(s){
        var cls = s.done ? 'done' : s.active ? 'active' : '';
        return '<div class="pod-loading-step ' + cls + '"><div class="pod-loading-dot"></div>' + s.label + '</div>';
      }).join('')
    + '</div>'
    + '</div>';
}

function renderPlayer(p) {
  var ep = POD.episode;
  var lines = ep.lines || [];
  var totalSecs = lines.length * 30;
  var currSecs = POD.currentLine * 30;
  var pct = lines.length ? Math.round(POD.currentLine / lines.length * 100) : 0;
  var yourName = (p && p.name) || 'Jamie';
  var nowSpeaker = lines[POD.currentLine] && lines[POD.currentLine].speaker === 'dr' ? 'Dr. Alex' : yourName;

  var html = '<div class="pod-player">';

  // Header
  html += '<div class="pod-player-hd">'
    + '<div class="pod-ep-label">Episode ' + ep.epNum + ' · ' + DURATIONS[POD.duration].label + '</div>'
    + '<div class="pod-ep-title">' + ep.title + '</div>'
    + (ep.tagline ? '<div class="pod-ep-meta"><span>' + ep.tagline + '</span></div>' : '')
    + '</div>';

  // Progress bar
  html += '<div class="pod-progress-wrap">'
    + '<div class="pod-progress-bar" onclick="scrubProgress(event)">'
      + '<div class="pod-progress-fill" style="width:' + pct + '%"></div>'
    + '</div>'
    + '<div class="pod-progress-times">'
      + '<span id="pod-current-time">' + formatTime(currSecs) + '</span>'
      + '<span>' + formatTime(totalSecs) + '</span>'
    + '</div>'
    + '</div>';

  // Controls
  html += '<div class="pod-controls">'
    + '<button class="pod-play-btn" onclick="togglePlay()">' + (POD.playing ? '⏸' : '▶') + '</button>'
    + '<button class="pod-speed-btn" onclick="restartEp()">↺ Restart</button>'
    + '<div class="pod-now-speaking">' + (POD.playing ? 'Now: <strong>' + nowSpeaker + '</strong>' : 'Tap ▶ to listen') + '</div>'
    + '</div>';

  // Transcript
  html += '<div class="pod-transcript">';
  lines.forEach(function(line, i) {
    var isDr = line.speaker === 'dr';
    var name = isDr ? 'Dr. Alex' : yourName;
    var avatar = isDr ? '🎓' : '🎙';
    var cls = 'pod-line ' + (isDr ? 'dr-line' : 'you-line') + (i === POD.currentLine && POD.playing ? ' playing' : '');
    html += '<div class="' + cls + '" data-idx="' + i + '" onclick="jumpToLine(' + i + ')">'
      + '<div class="pod-line-time">' + formatTime(i*30) + '</div>'
      + '<div class="pod-line-avatar">' + avatar + '</div>'
      + '<div class="pod-line-body">'
        + '<div class="pod-line-speaker">' + name + '</div>'
        + '<div class="pod-line-text">' + line.text + '</div>'
      + '</div>'
      + '</div>';
  });
  html += '</div>';

  // Insights
  if (ep.insights && ep.insights.length) {
    html += '<div class="pod-insights">'
      + '<div class="pod-insights-label">Key takeaways</div>'
      + '<div class="pod-insight-chips">'
      + ep.insights.map(function(ins){ return '<div class="pod-insight-chip">' + ins + '</div>'; }).join('')
      + '</div>'
      + '</div>';
  }

  // Footer
  html += '<div class="pod-footer">'
    + '<button class="pod-footer-btn" onclick="newEpisode()">← New topic</button>'
    + '<button class="pod-footer-btn" onclick="regenerate()">↺ Regenerate</button>'
    + '<button class="pod-footer-btn primary" onclick="copyTranscript()">Copy transcript</button>'
    + '<span style="font-size:10px;font-weight:500;color:var(--jade);padding:0 8px;">🎙 AI voices active</span>'
    + '<div class="pod-footer-ep-count">Episode ' + ep.epNum + ' of ' + POD.episodeNum + ' total</div>'
    + '</div>';

  html += '</div>'; // pod-player
  return html;
}

function renderHistory() {
  var html = '<div class="pod-history">'
    + '<div class="pod-history-label">Previous episodes</div>';
  POD.history.slice(1, 6).forEach(function(ep) {
    html += '<div class="pod-history-item">'
      + '<div class="pod-history-ep">Ep ' + ep.epNum + '</div>'
      + '<div class="pod-history-title">' + ep.title + '</div>'
      + '<div class="pod-history-dur">' + DURATIONS[ep.duration||'medium'].label + '</div>'
      + '</div>';
  });
  html += '</div>';
  return html;
}

// ── Helpers ───────────────────────────────────────
function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function setContext(id) {
  POD.context = id;
  render();
}

function setDuration(d) {
  POD.duration = d;
  render();
}

function pickTopic(topic) {
  POD.topic = topic;
  render();
  setTimeout(function() {
    var inp = document.getElementById('pod-topic-inp');
    if (inp) inp.value = topic;
    var btn = document.getElementById('pod-gen-btn');
    if (btn) btn.removeAttribute('disabled');
  }, 50);
  startPodcast();
}

function startPodcast() {
  var inp = document.getElementById('pod-topic-inp');
  var topic = inp ? inp.value.trim() : POD.topic;
  if (!topic) return;
  POD.topic = topic;
  POD.episode = null;
  render();
  generateEpisode();
}

function newEpisode() {
  stopPlayback();
  POD.episode = null;
  POD.playing = false;
  POD.currentLine = 0;
  POD.topic = '';
  render();
}

function regenerate() {
  stopPlayback();
  POD.episode = null;
  POD.playing = false;
  POD.currentLine = 0;
  render();
  generateEpisode();
}

function restartEp() {
  stopAudio();
  POD.currentLine = 0;
  POD.playing = false;
  EL.audioCache = {}; // clear cached audio when restarting
  render();
}

function scrubProgress(evt) {
  if (!POD.episode) return;
  var bar = evt.currentTarget;
  var rect = bar.getBoundingClientRect();
  var pct = (evt.clientX - rect.left) / rect.width;
  var idx = Math.round(pct * (POD.episode.lines.length - 1));
  POD.currentLine = Math.max(0, Math.min(POD.episode.lines.length-1, idx));
  stopPlayback();
  POD.playing = false;
  render();
}

function copyTranscript() {
  if (!POD.episode) return;
  var p = getProfile();
  var name = p && p.name || 'Jamie';
  var lines = POD.episode.lines || [];
  var text = 'BodyLens Podcast — Episode ' + POD.episode.epNum + '\n';
  text += POD.episode.title + '\n\n';
  lines.forEach(function(l) {
    var spk = l.speaker === 'dr' ? 'Dr. Alex' : name;
    text += spk + ': ' + l.text + '\n\n';
  });
  text += '---\nKey takeaways:\n';
  (POD.episode.insights || []).forEach(function(ins){ text += '· ' + ins + '\n'; });
  navigator.clipboard.writeText(text).catch(function(){});
  var btn = document.querySelector('.pod-footer-btn.primary');
  if (btn) { btn.textContent = '✓ Copied!'; setTimeout(function(){ btn.textContent = 'Copy transcript'; }, 2000); }
}

// Listen for input changes
document.addEventListener('input', function(e) {
  if (e.target && e.target.id === 'pod-topic-inp') {
    POD.topic = e.target.value;
    var btn = document.getElementById('pod-gen-btn');
    if (btn) {
      if (POD.topic.trim()) btn.removeAttribute('disabled');
      else btn.setAttribute('disabled', '');
    }
  }
});

// ── Init ──────────────────────────────────────────
var _p = getProfile();
if (_p) {
  var nm = document.getElementById('nav-meta');
  if (nm) nm.innerHTML = '<span class="nav-tag nt-jade">' + _p.name + '</span>';
}
render();
</script>
