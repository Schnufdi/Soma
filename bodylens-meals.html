<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#0c1010">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>BodyLens - Meals</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Space+Grotesk:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
body{background:var(--ink);color:var(--dk-1);}
.mp{max-width:1060px;margin:0 auto;padding:0 28px 100px;}
.mp-hero{padding:28px 0 20px;border-bottom:1px solid var(--bd);margin-bottom:24px;}
.mp-kicker{font-size:10px;font-weight:700;letter-spacing:.22em;text-transform:uppercase;color:var(--dk-3);margin-bottom:6px;}
.mp-title{font-family:var(--serif);font-size:44px;font-weight:300;line-height:.93;color:var(--dk-1);margin-bottom:6px;}
.mp-title em{font-style:italic;color:var(--dk-3);}
.mp-sub{font-size:12px;font-weight:300;color:var(--dk-2);line-height:1.7;}
.mp-tabs{display:flex;border-bottom:1px solid var(--bd);margin-bottom:24px;}
.mp-tab{padding:10px 20px;font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--dk-3);background:none;border:none;cursor:pointer;font-family:var(--sans);border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .12s;}
.mp-tab:hover{color:var(--dk-2);}
.mp-tab.active{color:var(--dk-1);border-bottom-color:var(--jade);}
/* Prefs */
.ps{margin-bottom:22px;}
.pl{font-size:9px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--dk-3);margin-bottom:10px;display:flex;align-items:center;gap:10px;}
.pl::after{content:'';flex:1;height:1px;background:var(--bd);}
.pl-note{font-size:9px;font-weight:300;text-transform:none;letter-spacing:0;color:var(--dk-3);margin-left:4px;}
.cr{display:flex;gap:6px;flex-wrap:wrap;}
.ch{padding:7px 14px;border-radius:18px;border:1px solid var(--bd);background:transparent;font-size:11px;font-weight:500;color:var(--dk-2);cursor:pointer;font-family:var(--sans);transition:all .12s;white-space:nowrap;}
.ch:hover{border-color:rgba(255,255,255,.12);color:var(--dk-1);}
.ch.on{background:rgba(0,200,160,.08);border-color:var(--jade-br);color:var(--jade);}
.ch.av{background:rgba(200,148,30,.07);border-color:rgba(200,148,30,.25);color:var(--amber);}
.ch.warn{background:rgba(200,148,30,.07);border-color:rgba(200,148,30,.25);color:var(--amber);}
/* Fat class chips */
.fat-lean{border-color:var(--jade-br)!important;color:var(--jade)!important;}
.fat-mod{border-color:var(--amber-br)!important;color:var(--amber)!important;}
.fat-high{border-color:rgba(220,80,60,.3)!important;color:rgba(220,80,60,.85)!important;}
.fat-dot{display:inline-block;width:6px;height:6px;border-radius:50%;margin-right:5px;vertical-align:middle;}
/* Meal structure selector */
.struct-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:4px;}
@media(max-width:600px){.struct-grid{grid-template-columns:1fr;}}
.struct-card{background:var(--ink-1);border:1px solid var(--bd);border-radius:9px;padding:12px 14px;cursor:pointer;transition:all .12s;text-align:left;}
.struct-card:hover{border-color:rgba(255,255,255,.1);}
.struct-card.sel{border-color:var(--jade-br);background:rgba(0,200,160,.05);}
.struct-card-title{font-size:12px;font-weight:600;color:var(--dk-1);margin-bottom:3px;}
.struct-card.sel .struct-card-title{color:var(--jade);}
.struct-card-sub{font-size:10px;font-weight:300;color:var(--dk-3);line-height:1.4;}
/* Generate button */
.gb{width:100%;background:var(--jade);border:none;color:var(--ink);padding:14px;border-radius:10px;font-size:12px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;font-family:var(--sans);margin-top:8px;transition:opacity .12s;}
.gb:hover{opacity:.88;}
.gb:disabled{opacity:.4;cursor:not-allowed;}
/* Loading */
.ld{display:flex;align-items:center;gap:14px;padding:48px 20px;color:var(--dk-3);font-size:13px;font-weight:300;}
.sp{width:20px;height:20px;border-radius:50%;border:2px solid rgba(255,255,255,.08);border-top-color:var(--jade);animation:sp .7s linear infinite;flex-shrink:0;}
@keyframes sp{to{transform:rotate(360deg)}}
/* Day table */
.th{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px;}
.tm{font-size:11px;font-weight:300;color:var(--dk-3);}
.ta{display:flex;gap:8px;}
.tb{background:transparent;border:1px solid var(--bd);color:var(--dk-3);padding:6px 14px;border-radius:7px;font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;font-family:var(--sans);transition:all .1s;}
.tb:hover{border-color:rgba(255,255,255,.1);color:var(--dk-2);}
.tb.jd{border-color:rgba(0,200,160,.25);color:var(--jade);}
.ww{overflow-x:auto;border-radius:10px;border:1px solid var(--bd);}
.wt{width:100%;border-collapse:collapse;min-width:700px;}
.wt th{padding:10px 12px;font-size:9px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--dk-3);border-bottom:1px solid var(--bd);text-align:left;background:var(--ink-2);white-space:nowrap;}
.wt th.mh{border-left:1px solid var(--bd);color:var(--dk-2);}
.wt td{padding:10px 12px;border-bottom:1px solid rgba(255,255,255,.04);vertical-align:top;}
.wt tr:last-child td{border-bottom:none;}
.dc{white-space:nowrap;min-width:90px;}
.dn{font-size:12px;font-weight:600;color:var(--dk-1);margin-bottom:2px;}
.db{font-size:9px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;padding:2px 7px;border-radius:8px;display:inline-block;}
.db.tr{background:rgba(0,200,160,.08);color:var(--jade);border:1px solid var(--jade-br);}
.db.rs{background:rgba(255,255,255,.04);color:var(--dk-3);border:1px solid var(--bd);}
/* Meal cell */
.mc{border-left:1px solid rgba(255,255,255,.04);position:relative;min-width:190px;}
.mc:hover{background:rgba(255,255,255,.012);}
.mn{font-size:12px;font-weight:500;color:var(--dk-1);line-height:1.3;margin-bottom:5px;}
.mm{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:4px;}
.mpill{font-size:9px;font-weight:600;color:var(--dk-3);padding:1px 6px;border-radius:6px;background:rgba(255,255,255,.04);}
.mpill.p{color:rgba(0,200,160,.8);background:rgba(0,200,160,.06);}
.mpill.f-lean{color:var(--jade);background:rgba(0,200,160,.06);border:1px solid rgba(0,200,160,.15);}
.mpill.f-mod{color:var(--amber);background:rgba(200,148,30,.06);border:1px solid rgba(200,148,30,.2);}
.mpill.f-high{color:rgba(220,80,60,.85);background:rgba(220,80,60,.06);border:1px solid rgba(220,80,60,.2);}
.mpill.kcal{color:var(--dk-2);}
/* Swap & expand */
.mc-btns{display:flex;gap:5px;opacity:0;transition:opacity .1s;margin-top:5px;}
.mc:hover .mc-btns{opacity:1;}
.mc-btn{padding:3px 9px;border-radius:6px;border:1px solid var(--bd);background:transparent;font-size:9px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:var(--dk-3);cursor:pointer;font-family:var(--sans);transition:all .1s;}
.mc-btn:hover{border-color:rgba(255,255,255,.12);color:var(--dk-2);}
.mc-btn.primary{border-color:var(--jade-br);color:var(--jade);}
/* Expanded meal detail */
.meal-detail{display:none;padding:10px 0 4px;border-top:1px solid rgba(255,255,255,.05);margin-top:8px;}
.meal-detail.open{display:block;}
.meal-detail-section{margin-bottom:8px;}
.meal-detail-label{font-size:8px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--dk-3);margin-bottom:5px;}
.ing-row{display:flex;align-items:baseline;gap:8px;padding:3px 0;border-bottom:1px solid rgba(255,255,255,.03);}
.ing-row:last-child{border-bottom:none;}
.ing-name{font-size:11px;font-weight:400;color:var(--dk-1);flex:1;}
.ing-amount{font-size:10px;font-weight:500;color:var(--dk-2);white-space:nowrap;}
.ing-guide{font-size:9px;font-weight:300;color:var(--dk-3);white-space:nowrap;}
.fat-flag{font-size:9px;font-weight:600;padding:2px 7px;border-radius:6px;white-space:nowrap;}
.fat-flag.lean{background:rgba(0,200,160,.06);color:var(--jade);border:1px solid rgba(0,200,160,.15);}
.fat-flag.moderate{background:rgba(200,148,30,.06);color:var(--amber);border:1px solid rgba(200,148,30,.2);}
.fat-flag.high{background:rgba(220,80,60,.06);color:rgba(220,80,60,.85);border:1px solid rgba(220,80,60,.2);}
.swap-suggest{font-size:10px;font-weight:300;color:var(--dk-3);line-height:1.55;padding:6px 8px;background:rgba(255,255,255,.02);border-radius:6px;border-left:2px solid var(--bd);}
.swap-suggest strong{font-weight:600;color:var(--dk-2);}
/* Snack / shake cells */
.snack-badge{font-size:8px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:2px 6px;border-radius:5px;background:rgba(255,255,255,.04);color:var(--dk-3);border:1px solid var(--bd);margin-bottom:4px;display:inline-block;}
.snack-badge.shake{background:rgba(0,200,160,.06);color:var(--jade);border-color:var(--jade-br);}
/* Totals row */
.tor td{background:var(--ink-2);border-top:1px solid var(--bd);}
.tl{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--dk-3);}
.tb2{display:flex;flex-direction:column;gap:4px;}
.br2{display:flex;align-items:center;gap:6px;}
.bt{flex:1;height:3px;background:rgba(255,255,255,.06);border-radius:2px;overflow:hidden;min-width:40px;}
.bf{height:100%;border-radius:2px;transition:width .4s;}
.bv{font-size:9px;font-weight:600;white-space:nowrap;}
/* Save bar */
.sb{position:sticky;bottom:0;background:var(--ink);border-top:1px solid var(--bd);padding:14px 0;display:flex;align-items:center;justify-content:space-between;gap:12px;margin-top:16px;}
.sbt{background:var(--jade);border:none;color:var(--ink);padding:11px 28px;border-radius:8px;font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;font-family:var(--sans);}
.sn{font-size:11px;font-weight:300;color:var(--dk-3);}
/* Shake row */
.shake-row td{background:rgba(0,200,160,.025);}
/* Custom meal */
.cmc{background:var(--ink-1);border:1px solid var(--bd);border-radius:10px;margin-bottom:10px;overflow:hidden;}
.cmh{display:flex;align-items:center;gap:12px;padding:14px 16px;cursor:pointer;}
.cmt{font-size:13px;font-weight:500;color:var(--dk-1);flex:1;}
.cmtg{font-size:10px;font-weight:600;padding:3px 8px;border-radius:8px;}
.cmtg.p{background:rgba(0,200,160,.07);border:1px solid var(--jade-br);color:var(--jade);}
.cmtg.k{background:var(--ink-2);border:1px solid var(--bd);color:var(--dk-2);}
.cmb{display:none;padding:0 16px 16px;border-top:1px solid var(--bd);}
.cmb.op{display:block;}
.ic{display:flex;gap:6px;flex-wrap:wrap;margin:10px 0 8px;}
.ig{font-size:10px;background:var(--ink-2);border:1px solid var(--bd);border-radius:6px;padding:3px 9px;color:var(--dk-2);}
.cm2{font-size:12px;font-weight:300;color:var(--dk-2);line-height:1.65;padding:8px 0;border-top:1px solid rgba(255,255,255,.04);}
/* Fat education panel */
.fat-edu{background:var(--ink-1);border:1px solid var(--bd);border-radius:10px;padding:16px 18px;margin-bottom:20px;}
.fat-edu-title{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--dk-3);margin-bottom:12px;}
.fat-edu-row{display:flex;align-items:baseline;gap:8px;padding:5px 0;border-bottom:1px solid rgba(255,255,255,.04);}
.fat-edu-row:last-child{border-bottom:none;}
.fat-edu-name{font-size:11px;font-weight:500;color:var(--dk-1);flex:1;}
.fat-edu-val{font-size:10px;font-weight:600;min-width:50px;text-align:right;}
.fat-edu-note{font-size:9px;font-weight:300;color:var(--dk-3);}

/* ── Fridge restock banner ────────────────────────────────────── */
.frb {
  background: rgba(0,200,160,.05);
  border: 1px solid rgba(0,200,160,.2);
  border-left: 3px solid var(--jade);
  border-radius: 14px; padding: 18px 20px;
  margin: 20px 0 28px; animation: fadeIn .3s ease;
}
.frb-hd { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 12px; }
.frb-left { display: flex; gap: 12px; align-items: flex-start; }
.frb-icon { font-size: 22px; flex-shrink: 0; }
.frb-title { font-size: 13px; font-weight: 600; color: var(--jade); margin-bottom: 3px; }
.frb-sub { font-size: 11px; font-weight: 300; color: var(--dk-3); }
.frb-close { background: none; border: none; color: var(--dk-3); cursor: pointer; font-size: 16px; padding: 2px 6px; }
.frb-items { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 14px; }
.frb-item {
  padding: 4px 10px; border-radius: 20px;
  background: rgba(0,200,160,.08); border: 1px solid rgba(0,200,160,.18);
  font-size: 11px; font-weight: 500; color: var(--jade);
}
.frb-item em { font-style: normal; font-weight: 300; color: var(--dk-3); }
.frb-more { font-size: 11px; font-weight: 300; color: var(--dk-3); align-self: center; }
.frb-actions { display: flex; gap: 8px; }
.frb-btn {
  padding: 9px 18px; border-radius: 10px;
  font-size: 11px; font-weight: 700; letter-spacing: .04em;
  cursor: pointer; font-family: var(--sans); transition: all .12s;
}
.frb-btn.primary { background: var(--jade); border: none; color: var(--ink); }
.frb-btn.primary:hover { opacity: .88; }
.frb-btn.secondary { background: transparent; border: 1px solid rgba(255,255,255,.1); color: var(--dk-3); }
.frb-btn.secondary:hover { border-color: rgba(255,255,255,.2); color: var(--dk-2); }
@keyframes fadeIn { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>
<div id="fridge-restock-banner" style="display:none;align-items:center;gap:12px;padding:14px 20px;background:rgba(0,200,160,.06);border-bottom:1px solid rgba(0,200,160,.15);position:sticky;top:52px;z-index:48;"></div>
<script src="nav.js"></script>
<div class="mp">
  <div class="mp-hero">
    <div class="mp-kicker">Nutrition system</div>
    <div class="mp-title">Your week of<br><em>meals.</em></div>
    <div class="mp-sub">A macro-controlled meal planner. Every meal built from real ingredient weights, fat-classified, and calibrated to your training schedule.</div>
  </div>
  <div class="mp-tabs">
    <button class="mp-tab active" id="tab-week" onclick="showTab('week')">Week planner</button>
    <button class="mp-tab" id="tab-custom" onclick="showTab('custom')">Build a meal</button>
    <button class="mp-tab" id="tab-learn" onclick="showTab('learn')">Fat guide</button>
  </div>
  <div id="pane-week"></div>
  <div id="pane-custom" style="display:none;"></div>
  <div id="pane-learn" style="display:none;"></div>
</div>
<script>

  'beef-ribeye':     {label:'Ribeye steak',               fatClass:'high',  protClass:'high',  satiety:'very-high', cal100:268, p100:21, c100:0, f100:19,  portion:'1 palm (150g)',      portionG:150, note:'Beautiful cut but 19g fat per 100g. A 200g steak = 38g fat. Save for maintenance phases or once weekly.'},
  'beef-mince-20':   {label:'Beef mince (20% fat)',        fatClass:'high',  protClass:'moderate', satiety:'very-high', cal100:254, p100:17, c100:0, f100:20, portion:'1 palm (120g)',   portionG:120, note:'Very common but high-fat. 120g = 24g fat. Swap to 5% mince or turkey to save 15-18g fat per serving.'},
  'mackerel':        {label:'Mackerel fillet',             fatClass:'high',  protClass:'high',  satiety:'very-high', cal100:205, p100:19, c100:0, f100:14,  portion:'1 fillet (120g)',    portionG:120, note:'Omega-3 rich but calorie-dense. 14g fat per 100g. Great for omega-3 but plan the fat budget.'},
  'protein-shake':   {label:'Whey protein shake',          fatClass:'lean',  protClass:'very-high', satiety:'low', cal100:380, p100:75, c100:7, f100:5, portion:'1 scoop (30g) + 300ml water', portionG:30, note:'25g protein, ~1.5g fat, ~125 kcal. Not a meal replacement but excellent protein top-up. Post-workout or between meals.'},

var DETAIL_CACHE = {};
function detailKey(day,slot){ return day+'-'+slot; }

async function loadMealDetail(day,slot){
  var key=detailKey(day,slot);
  if(DETAIL_CACHE[key]) return DETAIL_CACHE[key];
  var p=gp(); if(!p||!S.plan) return null;
  var meal=S.plan.days[day]&&S.plan.days[day][slot];
  if(!meal) return null;
  var idx=DNS.indexOf(day);
  var dp=(p.weekPlan||[])[idx]||{type:'Rest',priority:'rest'};
  var isT=dp.priority==='training';
  var prompt='Nutritionist. Give cooking detail for this meal.\n'
    +'Meal: '+meal.name+' ('+meal.calories+' kcal, '+meal.protein+'g P, '+meal.carbs+'g C, '+meal.fat+'g F, '+(meal.fatClass||'lean')+' fat)\n'
    +'User: '+p.age+'yo male, '+p.weight+'kg, goal: '+(p.goal||'recomposition')+'\n'
    +'Day: '+day+' ('+(isT?dp.type+' training':'rest day')+')\n\n'
    +'Return ONLY: {"portionGuide":"e.g. 1 palm protein + 1 cupped hand carb","ingredients":[{"name":"","grams":0,"portion_visual":""}],"swapNote":"leaner or higher-protein alternative in one sentence","whyThisWorks":"why this fits this day in one sentence"}';
  try{
    var res=await fetch(API,{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:MDL,max_tokens:350,system:'Nutritionist. Return ONLY valid compact JSON.',messages:[{role:'user',content:prompt}]})});
    var data=await res.json();
    var text=(data.content||[]).map(function(b){return b.text||'';}).join('').trim();
    var m=text.match(/\{[\s\S]*\}/);
    if(!m) return null;
    var detail=JSON.parse(m[0]);
    DETAIL_CACHE[key]=detail;
    return detail;
  }catch(e){ return null; }
}

  }).join('\n');

  var mealSlots=slots.filter(function(s){return SLOT_TYPES[s]==='meal';});
  var slotProt=Math.round((prot-(shakeSlot?25:0)-(snackCount*20))/mealSlots.length);
  var slotKcal=Math.round((tK-(shakeSlot?130:0)-(snackCount*200))/mealSlots.length);

  }).join(' | ');

  // PHASE 1: Fast table -- names + 5 macros + fatClass only
  // max_tokens:2000 keeps this under Vercel 10s timeout

    +'Proteins: '+prots+' | Cuisine: '+cuis+' | Avoid: '+avds+'\n'
    +'Slots: '+slotDesc+'\n'
    +'Schedule:\n'+sched+'\n\n'
    +(window._fridgeRestockItems && window._fridgeRestockItems.length
      ? '\nFRIDGE ITEMS AVAILABLE (from fridge scan — use these as primary ingredients where possible):\n'
        + window._fridgeRestockItems.map(function(i){return '- '+i.name+(i.quantity?' ('+i.quantity+')':'');}).join('\n') + '\n\n'
      : '')
    +'MACRO ACCURACY (calculate from real weights):\n'
    +'150g cooked chicken=46g P,5g F,240kcal | 150g salmon=30g P,20g F,297kcal | 1 egg=6g P,5g F,70kcal\n'
    +'200g yogurt 0%=20g P,0.4g F,114kcal | 150g white fish=27g P,1g F,123kcal\n'
    +'Do NOT inflate protein. Conservative and accurate.\n'
    +'Breakfast repeats: Mon+Wed+Fri same, Tue+Thu+Sat same. Lunches and dinners unique each day.\n'
    +'fatClass: lean=under 10g fat total, moderate=10-20g, high=over 20g\n\n'
    +'Return ONLY compact JSON (no markdown):\n'
    +'{"days":{"Monday":{"breakfast":{"name":"","calories":0,"protein":0,"carbs":0,"fat":0,"fatClass":"lean"},"lunch":{"name":"","calories":0,"protein":0,"carbs":0,"fat":0,"fatClass":"lean"},"dinner":{"name":"","calories":0,"protein":0,"carbs":0,"fat":0,"fatClass":"lean"}},"Tuesday":{...},"Wednesday":{...},"Thursday":{...},"Friday":{...},"Saturday":{...},"Sunday":{...}}}';

  try{
    var res=await fetch(API,{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:MDL,max_tokens:2000,
        system:'Expert nutritionist. Return ONLY valid compact JSON. No markdown. Macro accuracy critical.',
        messages:[{role:'user',content:prompt}]})});
    if(!res.ok) throw new Error('API '+res.status);
    var data=await res.json();
    var text=(data.content||[]).map(function(b){return b.text||'';}).join('').trim();
    var m=text.match(/\{[\s\S]*\}/);
    if(!m) throw new Error('No JSON in response');
    var parsed=JSON.parse(m[0]);
    if(!parsed.days) throw new Error('Missing days');
    // Fill in fatClass if AI omitted it
    DNS.forEach(function(day){
      var dm=parsed.days[day]||{};
      slots.forEach(function(slot){
        var meal=dm[slot];
        if(meal&&!meal.fatClass) meal.fatClass=meal.fat<10?'lean':meal.fat<20?'moderate':'high';
      });
    });
    S.plan={days:parsed.days,prefs:JSON.parse(JSON.stringify(S.prefs)),generatedAt:new Date().toISOString()};

    renderTable(gp());

      +'</div>';

  }

    var text=(data.content||[]).map(function(b){return b.text||'';}).join('').trim();
    var match=text.match(/\{[\s\S]*\}/);
    if(!match)throw new Error('no json');
    var meal=JSON.parse(match[0]);
    if(!S.plan.days[day])S.plan.days[day]={};
    S.plan.days[day][slot]=meal;
    sp(S.plan);
  }catch(e){console.error(e);}
  S.swapping=null;
  renderTable(gp());
}

/* ---- RENDER TABLE ---- */
function renderTable(p){
  var root=document.getElementById('pane-week');
  if(!root||!p)return;
  var plan=S.plan;
  if(!plan||!plan.days){renderPrefs(p);return;}
  var slots=SLOTS_BY_STRUCT[plan.prefs.mealStructure||'3-meals'];
  var tK=p.trainingKcal||p.calories||2769;
  var rK=p.restKcal||Math.round((p.calories||2769)*.9);
  var prot=p.protein||174;
  var gd=plan.generatedAt?new Date(plan.generatedAt).toLocaleDateString('en-GB',{day:'numeric',month:'short'}):'';

  var html='<div class="th">'
    +'<div class="tm">'+(gd?'Generated '+gd:'')+' &middot; Hover a cell to swap &middot; Click a cell to expand</div>'
    +'<div class="ta"><button class="tb jd" onclick="editPrefs()">Change prefs</button>'
    +'<button class="tb" onclick="generate()">Regenerate</button></div></div>'
    +'<div class="ww"><table class="wt"><thead><tr><th>Day</th>'
    +slots.map(function(s){return '<th class="mh">'+SLOT_LABELS[s]+'</th>';}).join('')
    +'</tr></thead><tbody>';

  DNS.forEach(function(day,i){
    var dp=(p.weekPlan||[])[i]||{type:'Rest',priority:'rest'};
    var isT=dp.priority==='training';
    var dm=(plan.days||{})[day]||{};
    var dK=isT?tK:rK;
    var totK=0,totP=0,totF=0;
    slots.forEach(function(s){var m=dm[s];if(m){totK+=m.calories||0;totP+=m.protein||0;totF+=m.fat||0;}});

    html+='<tr>';
    html+='<td class="dc"><div class="dn">'+day.slice(0,3)+'</div>'
      +'<div class="db '+(isT?'tr':'rs')+'">'+(isT?(dp.type||'Train'):'Rest')+'</div></td>';

    slots.forEach(function(slot){
      var m=dm[slot];
      var cid='mc-'+day+'-'+slot;
      var loading=S.swapping&&S.swapping.day===day&&S.swapping.slot===slot;
      var stype=SLOT_TYPES[slot]||'meal';
      var isShake=stype==='shake';
      var isSnack=stype==='snack';

      html+='<td class="mc'+(isShake?' shake-td':'')+'" id="'+cid+'" onclick="toggleExpand(this)">';
      if(loading){
        html+='<div style="color:var(--dk-3);font-size:11px;">Swapping...</div>';
      } else if(m) {
        var fc=m.fatClass||'lean';
        var fcLabel=FAT_LABELS[fc]||'Low fat';
        var fcColor=FAT_COLORS[fc]||'var(--jade)';

        if(isShake){html+='<div class="snack-badge shake">Shake</div>';}
        else if(isSnack){html+='<div class="snack-badge">Snack</div>';}

        html+='<div class="mn">'+m.name+'</div>'
          +'<div class="mm">'
            +'<span class="mpill p">'+(m.protein||0)+'g P</span>'
            +'<span class="mpill">'+(m.carbs||0)+'g C</span>'
            +'<span class="mpill f-'+fc+'">'+fatDot(fc)+fcLabel+'</span>'
            +'<span class="mpill kcal">'+(m.calories||0)+' kcal</span>'
          +'</div>';

        // Expandable detail -- lazy loaded on first click
        var detailId='det-'+day+'-'+slot;
        html+='<div class="meal-detail" id="'+detailId+'" data-day="'+day+'" data-slot="'+slot+'">'
          +'<div class="meal-detail-loading" style="font-size:10px;font-weight:300;color:var(--dk-3);padding:6px 0;">Tap to load details...</div>'
          +'</div>';

        // Buttons
        html+='<div class="mc-btns">'
          +'<button class="mc-btn primary" onclick="event.stopPropagation();swapMeal(\''+day+'\',\''+slot+'\')">Swap</button>'
        +'</div>';
      } else {
        html+='<div style="color:rgba(255,255,255,.1);font-size:11px;">-</div>';
      }
      html+='</td>';
    });

    html+='</tr>';

    // Totals row
    var pPct=Math.min(100,prot>0?Math.round(totP/prot*100):0);
    var kPct=Math.min(100,dK>0?Math.round(totK/dK*100):0);
    var fPct=Math.min(100,(p.fat||87)>0?Math.round(totF/(p.fat||87)*100):0);
    var pCol=pPct>=90?'var(--jade)':pPct>=70?'var(--amber)':'rgba(220,80,60,.7)';
    var kCol=kPct>=90&&kPct<=112?'var(--jade)':kPct<80?'rgba(220,80,60,.7)':'var(--amber)';
    var fCol=fPct<=110?'var(--jade)':fPct<=130?'var(--amber)':'rgba(220,80,60,.7)';

    html+='<tr class="tor"><td><div class="tl">Total</div></td>'
      +'<td class="mc" style="border-left:1px solid rgba(255,255,255,.04);" colspan="'+slots.length+'">'
        +'<div class="tb2">'
          +'<div class="br2"><div class="bt"><div class="bf" style="width:'+pPct+'%;background:'+pCol+'"></div></div>'
            +'<div class="bv" style="color:'+pCol+'">'+totP+'g P / '+prot+'g</div></div>'
          +'<div class="br2"><div class="bt"><div class="bf" style="width:'+kPct+'%;background:'+kCol+'"></div></div>'
            +'<div class="bv" style="color:'+kCol+'">'+totK+' / '+dK+' kcal</div></div>'
          +'<div class="br2"><div class="bt"><div class="bf" style="width:'+fPct+'%;background:'+fCol+'"></div></div>'
            +'<div class="bv" style="color:'+fCol+'">'+totF+'g F / '+(p.fat||87)+'g</div></div>'
        +'</div>'
      +'</td></tr>';
  });

  html+='</tbody></table></div>'
    +'<div class="sb"><div class="sn">Saved automatically. Protein, kcal and fat tracked per day.</div>'
    +'<button class="sbt" id="sbt" onclick="doSave()">Save week</button></div>';
  root.innerHTML=html;
}

async function toggleExpand(tdEl){
  var det=tdEl.querySelector('.meal-detail');
  if(!det)return;
  var day=det.getAttribute('data-day');
  var slot=det.getAttribute('data-slot');
  var isOpen=det.classList.contains('open');

  if(isOpen){det.classList.remove('open');return;}

  det.classList.add('open');

  // If already loaded, just show
  if(det.querySelector('.ing-row')||det.querySelector('.swap-suggest')) return;

  // Check DETAIL_CACHE
  if(day&&slot){
    var cached=DETAIL_CACHE&&DETAIL_CACHE[day+'-'+slot];
    if(cached){renderDetailInto(det,cached);return;}

    // Show loading spinner
    det.innerHTML='<div style="display:flex;align-items:center;gap:8px;padding:8px 0;color:var(--dk-3);font-size:10px;">'
      +'<div style="width:12px;height:12px;border-radius:50%;border:1.5px solid rgba(255,255,255,.08);border-top-color:var(--jade);animation:sp .7s linear infinite;flex-shrink:0;"></div>'
      +'Loading portion guide...</div>';

    var detail=await loadMealDetail(day,slot);
    if(detail){renderDetailInto(det,detail);}
    else{det.innerHTML='<div style="font-size:10px;font-weight:300;color:var(--dk-3);padding:6px 0;">Could not load detail.</div>';}
  }
}

function renderDetailInto(det,d){
  var html='';

    html+='<div class="meal-detail-section"><div class="meal-detail-label">Portion</div>'
      +'<div style="font-size:11px;font-weight:300;color:var(--dk-2);">'+d.portionGuide+'</div></div>';

        +'<div class="ing-guide">'+((ing.portion_visual)||'')+'</div>'

async function cmGen(){
  var p=gp();if(!p)return;
  CM.busy=true;renderCM();
  var isT=CM.ctx==='Training day'||CM.ctx==='Post-workout';
  var dK=isT?(p.trainingKcal||p.calories||2769):(p.restKcal||Math.round((p.calories||2769)*.9));
  var perK=Math.round(dK/3);var perP=Math.round((p.protein||174)/3);
  var prompt='Expert nutritionist. Create 5 meal combinations with precise macro calculations.\n'
    +'User: '+p.name+', '+p.age+'yo male, '+p.weight+'kg, goal: '+(p.goal||'recomposition')+'\n'
    +'Context: '+CM.ctx+' | Target: ~'+perK+' kcal, ~'+perP+'g protein\n'
    +'Protein: '+CM.protein+' | Carb: '+(CM.carb==='No carb (low-carb day)'?'no carb':CM.carb)
    +(CM.veg.length?' | Veg: '+CM.veg.join(', '):'')
    +(CM.flavour?' | Flavour: '+CM.flavour:'')+'\n'
    +'Cuisine: '+((p.cuisinePrefs||[]).join(', ')||'flexible')+'\n\n'
    +'MACRO RULES: Calculate from ingredient weights. Do not inflate protein.\n\n'
    +'Return ONLY JSON: {"meals":[{"title":"Name","why":"Why this works for this user and day","protein_g":0,"carbs_g":0,"fat_g":0,"kcal":0,"fatClass":"lean","portionGuide":"e.g. 1 palm protein + 1 cupped hand carb","ingredients":[{"name":"","grams":0,"portion_visual":"e.g. 1 palm"}],"method":"One sentence.","swapNote":"Leaner or higher-protein alternative"}]}';
  try{
    var res=await fetch(API,{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:MDL,max_tokens:2500,system:'Expert nutritionist. Return ONLY valid JSON. Macro accuracy critical.',messages:[{role:'user',content:prompt}]})});
    var data=await res.json();
    var text=(data.content||[]).map(function(b){return b.text||'';}).join('').trim();
    var m=text.match(/\{[\s\S]*\}/);if(!m)throw new Error('no json');
    CM.meals=JSON.parse(m[0]).meals||[];
  }catch(e){CM.meals=[];}
  CM.busy=false;CM.step=5;CM.open=null;renderCM();
}

        + '<div class="frb-icon">🧊</div>'
        + '<div>'
          + '<div class="frb-title">Fridge scan' + (scannedDate ? ' · ' + scannedDate : '') + '</div>'
          + '<div class="frb-sub">Your restock list is ready — use it to inform your meal plan</div>'
        + '</div>'
      + '</div>'
      + '<button class="frb-close" onclick="dismissFridgeBanner()">✕</button>'
    + '</div>'
    + '<div class="frb-items">' + itemsHtml + moreCount + '</div>'
    + '<div class="frb-actions">'
      + '<button class="frb-btn primary" onclick="useFridgeItems()">Use this list when generating →</button>'
      + '<button class="frb-btn secondary" onclick="dismissFridgeBanner()">Dismiss</button>'
    + '</div>';

  // Insert before the main meal plan container
  var target = document.querySelector('.meal-page, .page, body > div:first-child') || document.body;
  target.insertBefore(banner, target.firstChild);
  
  // Store items for use during generation
  window._fridgeRestockItems = items;
}

function dismissFridgeBanner() {
  var banner = document.getElementById('fridge-restock-banner');
  if (banner) banner.remove();
  try { localStorage.removeItem('bl_fridge_restock'); } catch(e) {}
  window._fridgeRestockItems = null;
}

function useFridgeItems() {
  // Highlight that fridge items will be used
  var banner = document.getElementById('fridge-restock-banner');
  if (banner) {
    banner.querySelector('.frb-sub').textContent = '✓ Will be used as ingredient guidance when you generate your meal plan';
    banner.querySelector('.frb-btn.primary').textContent = '✓ Active';
    banner.querySelector('.frb-btn.primary').style.opacity = '.5';
    banner.querySelector('.frb-btn.primary').onclick = null;
  }
  // Flag will be read during generate()
  window._useFridgeItems = true;
}

function init(){
  // Check for pending fridge restock list
  try {
    var fr = localStorage.getItem('bl_fridge_restock');
    if (fr) {
      var frData = JSON.parse(fr);
      var banner = document.getElementById('fridge-restock-banner');
      if (banner && frData.items && frData.items.length) {
        var itemNames = frData.items.slice(0,5).map(function(i){return i.name;}).join(', ');
        var more = frData.items.length > 5 ? ' +' + (frData.items.length-5) + ' more' : '';
        banner.style.display = 'flex';
        banner.innerHTML = '<span style="font-size:18px">🛒</span>'
          + '<div style="flex:1">'
          + '<div style="font-size:12px;font-weight:600;color:var(--jade)">Fridge restock ready</div>'
          + '<div style="font-size:11px;font-weight:300;color:var(--dk-3)">' + itemNames + more + '</div>'
          + '</div>'
          + '<button onclick="applyFridgeRestock()" style="background:var(--jade);border:none;color:var(--ink);padding:7px 14px;border-radius:8px;font-size:11px;font-weight:700;cursor:pointer;font-family:var(--sans)">Use list</button>'
          + '<button onclick="dismissFridgeRestock()" style="background:transparent;border:none;color:var(--dk-3);padding:7px 10px;cursor:pointer;font-size:16px">×</button>';
      }
    }
  } catch(e) {}
  var p=gp();
  var nm=document.getElementById('nav-meta');
  if(nm&&p)nm.innerHTML='<span class="nav-tag nt-jade">'+p.name+'</span>';

  // ── Fridge restock: check if fridge page sent items here ──
  try {
    var restockRaw = localStorage.getItem('bl_fridge_restock');
    if (restockRaw) {
      var restock = JSON.parse(restockRaw);
      if (restock && restock.items && restock.items.length) {
        showFridgeRestockBanner(restock);
      }
    }
  } catch(e) {}
  if(!p){
    document.getElementById('pane-week').innerHTML='<div style="text-align:center;padding:60px 20px;"><div style="font-size:14px;font-weight:300;color:var(--dk-2);margin-bottom:6px;">Profile needed</div><div style="font-size:12px;font-weight:300;color:var(--dk-3);">Complete onboarding first.</div></div>';
    return;
  }
  if(p.cuisinePrefs&&p.cuisinePrefs.length){
    S.prefs.cuisines=p.cuisinePrefs.map(function(c){
      var f=CUIS.filter(function(x){return x.toLowerCase()===c.toLowerCase();});
      return f.length?f[0]:null;
    }).filter(Boolean);
  }
  if(p.foodExclusions)S.prefs.avoids=p.foodExclusions;
  var ex=lp();
  if(ex&&ex.days&&Object.keys(ex.days).length>0){
    S.plan=ex;S.prefs=ex.prefs||S.prefs;renderTable(p);
  }else{renderPrefs(p);}
}
init();
</script>

<script>
// ── Fridge restock integration ──────────────────────────────
function applyFridgeRestock() {
  try {
    var fr = JSON.parse(localStorage.getItem('bl_fridge_restock') || 'null');
    if (!fr || !fr.items) return;
    // Pre-populate the protein prefs from fridge items
    // Items with high protein get added as protein sources
    var proteinItems = fr.items.filter(function(i) {
      return /chicken|beef|fish|salmon|tuna|egg|turkey|pork|lamb|prawn|shrimp|tofu|tempeh|cottage|greek|yoghurt|yogurt/i.test(i.name);
    }).map(function(i) { return i.name.split(' ')[0]; });
    if (proteinItems.length && S.prefs) {
      S.prefs.proteins = proteinItems.slice(0, 4);
      renderPrefs();
    }
    dismissFridgeRestock();
    // Show a toast
    var t = document.createElement('div');
    t.style.cssText = 'position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--jade);color:var(--ink);padding:10px 20px;border-radius:20px;font-size:12px;font-weight:700;z-index:9999;';
    t.textContent = '✓ Fridge items applied to meal preferences';
    document.body.appendChild(t);
    setTimeout(function() { t.remove(); }, 3000);
  } catch(e) {}
}

function dismissFridgeRestock() {
  localStorage.removeItem('bl_fridge_restock');
  var b = document.getElementById('fridge-restock-banner');
  if (b) b.style.display = 'none';
}
</script>
</body>
</html>
