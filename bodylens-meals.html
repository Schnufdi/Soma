<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#0c1010">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>BodyLens - Meals</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Space+Grotesk:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
body{background:var(--ink);color:var(--dk-1);}
.mp{max-width:1040px;margin:0 auto;padding:0 28px 100px;}
.mp-hero{padding:28px 0 20px;border-bottom:1px solid var(--bd);margin-bottom:24px;}
.mp-kicker{font-size:10px;font-weight:700;letter-spacing:.22em;text-transform:uppercase;color:var(--dk-3);margin-bottom:6px;}
.mp-title{font-family:var(--serif);font-size:44px;font-weight:300;line-height:.93;color:var(--dk-1);margin-bottom:6px;}
.mp-title em{font-style:italic;color:var(--dk-3);}
.mp-sub{font-size:12px;font-weight:300;color:var(--dk-2);line-height:1.7;}
.mp-tabs{display:flex;border-bottom:1px solid var(--bd);margin-bottom:24px;}
.mp-tab{padding:10px 20px;font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--dk-3);background:none;border:none;cursor:pointer;font-family:var(--sans);border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .12s;}
.mp-tab:hover{color:var(--dk-2);}
.mp-tab.active{color:var(--dk-1);border-bottom-color:var(--jade);}
.ps{margin-bottom:22px;}
.pl{font-size:9px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--dk-3);margin-bottom:10px;display:flex;align-items:center;gap:10px;}
.pl::after{content:'';flex:1;height:1px;background:var(--bd);}
.cr{display:flex;gap:6px;flex-wrap:wrap;}
.ch{padding:7px 14px;border-radius:18px;border:1px solid var(--bd);background:transparent;font-size:11px;font-weight:500;color:var(--dk-2);cursor:pointer;font-family:var(--sans);transition:all .12s;white-space:nowrap;}
.ch:hover{border-color:rgba(255,255,255,.12);color:var(--dk-1);}
.ch.on{background:rgba(0,200,160,.08);border-color:var(--jade-br);color:var(--jade);}
.ch.av{background:rgba(200,148,30,.07);border-color:rgba(200,148,30,.25);color:var(--amber);}
.gb{width:100%;background:var(--jade);border:none;color:var(--ink);padding:14px;border-radius:10px;font-size:12px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;font-family:var(--sans);margin-top:8px;transition:opacity .12s;}
.gb:hover{opacity:.88;}
.gb:disabled{opacity:.4;cursor:not-allowed;}
.ld{display:flex;align-items:center;gap:14px;padding:48px 20px;color:var(--dk-3);font-size:13px;font-weight:300;}
.sp{width:20px;height:20px;border-radius:50%;border:2px solid rgba(255,255,255,.08);border-top-color:var(--jade);animation:sp .7s linear infinite;flex-shrink:0;}
@keyframes sp{to{transform:rotate(360deg)}}
.th{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px;}
.tm{font-size:11px;font-weight:300;color:var(--dk-3);}
.ta{display:flex;gap:8px;}
.tb{background:transparent;border:1px solid var(--bd);color:var(--dk-3);padding:6px 14px;border-radius:7px;font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;font-family:var(--sans);transition:all .1s;}
.tb:hover{border-color:rgba(255,255,255,.1);color:var(--dk-2);}
.tb.jd{border-color:rgba(0,200,160,.25);color:var(--jade);}
.ww{overflow-x:auto;border-radius:10px;border:1px solid var(--bd);}
.wt{width:100%;border-collapse:collapse;min-width:680px;}
.wt th{padding:10px 12px;font-size:9px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--dk-3);border-bottom:1px solid var(--bd);text-align:left;background:var(--ink-2);white-space:nowrap;}
.wt th.mh{border-left:1px solid var(--bd);color:var(--dk-2);}
.wt td{padding:10px 12px;border-bottom:1px solid rgba(255,255,255,.04);vertical-align:top;}
.wt tr:last-child td{border-bottom:none;}
.dc{white-space:nowrap;min-width:90px;}
.dn{font-size:12px;font-weight:600;color:var(--dk-1);margin-bottom:2px;}
.db{font-size:9px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;padding:2px 7px;border-radius:8px;display:inline-block;}
.db.tr{background:rgba(0,200,160,.08);color:var(--jade);border:1px solid var(--jade-br);}
.db.rs{background:rgba(255,255,255,.04);color:var(--dk-3);border:1px solid var(--bd);}
.mc{border-left:1px solid rgba(255,255,255,.04);position:relative;min-width:180px;}
.mc:hover{background:rgba(255,255,255,.015);}
.mn{font-size:12px;font-weight:400;color:var(--dk-1);line-height:1.35;margin-bottom:4px;}
.mm{display:flex;gap:6px;flex-wrap:wrap;}
.mp2{font-size:9px;font-weight:600;color:var(--dk-3);}
.mp2.p{color:rgba(0,200,160,.7);}
.sw{position:absolute;top:7px;right:7px;width:22px;height:22px;border-radius:5px;background:transparent;border:1px solid var(--bd);color:var(--dk-3);cursor:pointer;font-size:11px;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .1s;font-family:var(--sans);}
.mc:hover .sw{opacity:1;}
.sw:hover{border-color:rgba(255,255,255,.12);color:var(--dk-2);}
.ec{color:rgba(255,255,255,.1);font-size:11px;font-style:italic;}
.lc{color:var(--dk-3);font-size:11px;font-style:italic;}
.tor td{background:var(--ink-2);border-top:1px solid var(--bd);}
.tl{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--dk-3);}
.tb2{display:flex;flex-direction:column;gap:4px;}
.br2{display:flex;align-items:center;gap:6px;}
.bt{flex:1;height:3px;background:rgba(255,255,255,.06);border-radius:2px;overflow:hidden;min-width:40px;}
.bf{height:100%;border-radius:2px;transition:width .4s;}
.bv{font-size:9px;font-weight:600;white-space:nowrap;}
.sb{position:sticky;bottom:0;background:var(--ink);border-top:1px solid var(--bd);padding:14px 0;display:flex;align-items:center;justify-content:space-between;gap:12px;margin-top:16px;}
.sbt{background:var(--jade);border:none;color:var(--ink);padding:11px 28px;border-radius:8px;font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;font-family:var(--sans);}
.sn{font-size:11px;font-weight:300;color:var(--dk-3);}
.cmc{background:var(--ink-1);border:1px solid var(--bd);border-radius:10px;margin-bottom:10px;overflow:hidden;}
.cmh{display:flex;align-items:center;gap:12px;padding:14px 16px;cursor:pointer;}
.cmt{font-size:13px;font-weight:500;color:var(--dk-1);flex:1;}
.cmtg{font-size:10px;font-weight:600;padding:3px 8px;border-radius:8px;}
.cmtg.p{background:rgba(0,200,160,.07);border:1px solid var(--jade-br);color:var(--jade);}
.cmtg.k{background:var(--ink-2);border:1px solid var(--bd);color:var(--dk-2);}
.cmb{display:none;padding:0 16px 16px;border-top:1px solid var(--bd);}
.cmb.op{display:block;}
.ic{display:flex;gap:6px;flex-wrap:wrap;margin:10px 0 8px;}
.ig{font-size:10px;background:var(--ink-2);border:1px solid var(--bd);border-radius:6px;padding:3px 9px;color:var(--dk-2);}
.cm2{font-size:12px;font-weight:300;color:var(--dk-2);line-height:1.65;padding:8px 0;border-top:1px solid rgba(255,255,255,.04);}
</style>
</head>
<body>
<script src="nav.js"></script>
<div class="mp">
  <div class="mp-hero">
    <div class="mp-kicker">Food planning</div>
    <div class="mp-title">Your week of<br><em>meals.</em></div>
    <div class="mp-sub">Choose proteins and cuisine. We build Breakfast, Lunch and Dinner for all 7 days, calibrated to your training schedule and macro targets.</div>
  </div>
  <div class="mp-tabs">
    <button class="mp-tab active" id="tab-week" onclick="showTab('week')">Week planner</button>
    <button class="mp-tab" id="tab-custom" onclick="showTab('custom')">Custom meal</button>
  </div>
  <div id="pane-week"></div>
  <div id="pane-custom" style="display:none;"></div>
</div>
<script>
var API = '/api/chat';
var MDL = 'claude-sonnet-4-20250514';
var DNS = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
var SLS = ['breakfast','lunch','dinner'];
var SLN = {breakfast:'Breakfast',lunch:'Lunch',dinner:'Dinner'};

function gp(){try{return JSON.parse(localStorage.getItem('bl_profile')||'null');}catch(e){return null;}}

function wk(){var d=new Date(),m=new Date(d),dy=d.getDay();m.setDate(d.getDate()-(dy===0?6:dy-1));return 'bl_wmp_'+m.toISOString().slice(0,10);}
function lp(){try{var r=localStorage.getItem(wk());return r?JSON.parse(r):null;}catch(e){return null;}}
function sp(x){try{localStorage.setItem(wk(),JSON.stringify(x));}catch(e){}}
function cp(){try{localStorage.removeItem(wk());}catch(e){}}

var S={plan:null,prefs:{proteins:[],cuisines:[],avoids:[]},busy:false,swapping:null};

function showTab(id){
  document.getElementById('pane-week').style.display=id==='week'?'':'none';
  document.getElementById('pane-custom').style.display=id==='custom'?'':'none';
  document.getElementById('tab-week').className='mp-tab'+(id==='week'?' active':'');
  document.getElementById('tab-custom').className='mp-tab'+(id==='custom'?' active':'');
  if(id==='custom'&&!document.getElementById('cm-root'))renderCustom();
}

var PROTS=['Chicken breast','Salmon','Lean beef','Eggs','Tuna','Turkey mince','Tofu','Prawns','Greek yogurt','Cottage cheese','White fish','Lean pork'];
var CUIS=['British','Mediterranean','Asian','Middle Eastern','Mexican','Indian','Japanese','Italian','Flexible'];
var AVDS=['Dairy','Gluten','Nuts','Shellfish','Eggs','Nightshades','Raw fish'];

function renderPrefs(p){
  var root=document.getElementById('pane-week');
  function chips(arr,sel,fn,tp){
    return arr.map(function(item){
      var on=sel.indexOf(item)>=0;
      var cls=tp==='avoid'?(on?' av':''):(on?' on':'');
      return '<button class="ch'+cls+'" onclick="'+fn+'(\''+item.replace(/\'/g,'')+'\',this)">'+item+'</button>';
    }).join('');
  }
  root.innerHTML=
    '<div class="ps"><div class="pl">1 -- Proteins this week<span style="font-size:9px;font-weight:300;text-transform:lowercase;margin-left:6px;">(pick at least 1)</span></div>'
    +'<div class="cr">'+chips(PROTS,S.prefs.proteins,'tgP','protein')+'</div></div>'
    +'<div class="ps"><div class="pl">2 -- Cuisine style</div>'
    +'<div class="cr">'+chips(CUIS,S.prefs.cuisines,'tgC','cuisine')+'</div></div>'
    +'<div class="ps"><div class="pl">3 -- Anything to avoid?</div>'
    +'<div class="cr">'+chips(AVDS,S.prefs.avoids,'tgA','avoid')+'</div></div>'
    +'<button class="gb" id="gb" onclick="generate()" disabled>Build my week</button>';
  ugb();
}

function tgP(v,b){tga(S.prefs.proteins,v,b,'on');ugb();}
function tgC(v,b){tga(S.prefs.cuisines,v,b,'on');}
function tgA(v,b){tga(S.prefs.avoids,v,b,'av');}
function tga(arr,v,b,cls){var i=arr.indexOf(v);if(i>=0){arr.splice(i,1);b.classList.remove(cls);}else{arr.push(v);b.classList.add(cls);}}
function ugb(){var b=document.getElementById('gb');if(b)b.disabled=S.prefs.proteins.length<1;}

async function generate(){
  var p=gp();if(!p)return;
  S.busy=true;
  document.getElementById('pane-week').innerHTML='<div class="ld"><div class="sp"></div>Building your week around your training schedule...</div>';
  var tK=p.trainingKcal||2769,rK=p.restKcal||2492,pr=p.protein||174;
  var sched=DNS.map(function(day,i){
    var dp=(p.weekPlan||[])[i]||{type:'Rest',priority:'rest'};
    return day+': '+(dp.priority==='training'?dp.type+' training day | target '+tK+' kcal':'rest day | target '+rK+' kcal');
  }).join('\n');
  var prots=S.prefs.proteins.length?S.prefs.proteins.join(', '):'chicken, salmon, eggs';
  var cuis=S.prefs.cuisines.length?S.prefs.cuisines.join(', '):'flexible';
  var avds=S.prefs.avoids.length?S.prefs.avoids.join(', '):'none';
  var prompt='You are a performance nutritionist. Build a 7-day meal plan.\n\n'
    +'User: '+p.name+', '+p.age+'yo, '+p.weight+'kg, goal: '+(p.goal||'body recomposition')+'\n'
    +'Daily protein target: '+pr+'g\n'
    +'Preferred proteins: '+prots+'\n'
    +'Cuisine style: '+cuis+'\n'
    +'Foods to avoid: '+avds+'\n\n'
    +'Training schedule:\n'+sched+'\n\n'
    +'Rules:\n'
    +'- Hit '+pr+'g protein every day\n'
    +'- Training days: higher carbs especially breakfast and lunch\n'
    +'- Rest days: moderate carbs, same protein\n'
    +'- Breakfast ~30% of daily kcal, Lunch ~35%, Dinner ~35%\n'
    +'- Breakfast may repeat Mon+Wed+Fri and Tue+Thu for easy prep\n'
    +'- Lunch and Dinner must be unique each day\n\n'
    +'Return ONLY this exact JSON with no markdown:\n'
    +'{"days":{"Monday":{"breakfast":{"name":"string","calories":0,"protein":0,"carbs":0,"fat":0},'
    +'"lunch":{"name":"string","calories":0,"protein":0,"carbs":0,"fat":0},'
    +'"dinner":{"name":"string","calories":0,"protein":0,"carbs":0,"fat":0}},'
    +'"Tuesday":{"breakfast":{},"lunch":{},"dinner":{}},'
    +'"Wednesday":{"breakfast":{},"lunch":{},"dinner":{}},'
    +'"Thursday":{"breakfast":{},"lunch":{},"dinner":{}},'
    +'"Friday":{"breakfast":{},"lunch":{},"dinner":{}},'
    +'"Saturday":{"breakfast":{},"lunch":{},"dinner":{}},'
    +'"Sunday":{"breakfast":{},"lunch":{},"dinner":{}}}}';
  try{
    var res=await fetch(API,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:MDL,max_tokens:3500,system:'Nutrition coach. Return ONLY valid compact JSON. No markdown.',messages:[{role:'user',content:prompt}]})});
    var data=await res.json();
    var text=(data.content||[]).map(function(b){return b.text||'';}).join('').trim();
    var m=text.match(/\{[\s\S]*\}/);
    if(!m)throw new Error('No JSON returned');
    var parsed=JSON.parse(m[0]);
    if(!parsed.days)throw new Error('Missing days in response');
    S.plan={days:parsed.days,prefs:JSON.parse(JSON.stringify(S.prefs)),generatedAt:new Date().toISOString()};
    sp(S.plan);
    S.busy=false;
    renderTable(gp());
  }catch(err){
    S.busy=false;
    document.getElementById('pane-week').innerHTML=
      '<div style="text-align:center;padding:40px;color:var(--dk-3);">'
      +'<div style="font-size:22px;margin-bottom:10px;">Generation failed</div>'
      +'<div style="font-size:12px;margin-bottom:16px;">'+(err.message||'Unknown error')+'</div>'
      +'<button onclick="renderPrefs(gp())" style="background:var(--jade);border:none;color:var(--ink);padding:10px 24px;border-radius:8px;font-size:11px;font-weight:700;cursor:pointer;font-family:var(--sans);">Try again</button>'
      +'</div>';
    console.error('Meal plan error:',err);
  }
}

async function swapMeal(day,slot){
  var p=gp();if(!p||!S.plan)return;
  S.swapping={day:day,slot:slot};
  var cell=document.getElementById('mc-'+day+'-'+slot);
  if(cell)cell.innerHTML='<div class="lc">Swapping...</div>';
  var idx=DNS.indexOf(day);
  var dp=(p.weekPlan||[])[idx]||{type:'Rest',priority:'rest'};
  var isT=dp.priority==='training';
  var splits={breakfast:.30,lunch:.35,dinner:.35};
  var targetK=Math.round((isT?(p.trainingKcal||2769):(p.restKcal||2492))*(splits[slot]||.33));
  var targetP=Math.round((p.protein||174)/3);
  var prompt='Performance nutritionist. Give ONE '+slot+' meal.\n'
    +'User: '+p.age+'yo, goal: '+(p.goal||'recomposition')+'\n'
    +'Day: '+day+' ('+(isT?dp.type+' training':'rest day')+')\n'
    +'Target: ~'+targetK+' kcal, ~'+targetP+'g protein\n'
    +'Proteins: '+(S.plan.prefs.proteins||[]).join(', ')+'\n'
    +'Cuisine: '+(S.plan.prefs.cuisines||[]).join(', ')+'\n\n'
    +'Return ONLY: {"name":"string","calories":0,"protein":0,"carbs":0,"fat":0}';
  try{
    var res=await fetch(API,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:MDL,max_tokens:200,system:'Return ONLY valid JSON.',messages:[{role:'user',content:prompt}]})});
    var data=await res.json();
    var text=(data.content||[]).map(function(b){return b.text||'';}).join('').trim();
    var m=text.match(/\{[\s\S]*\}/);
    if(!m)throw new Error('no json');
    var meal=JSON.parse(m[0]);
    if(!S.plan.days[day])S.plan.days[day]={};
    S.plan.days[day][slot]=meal;
    sp(S.plan);
  }catch(e){}
  S.swapping=null;
  renderTable(gp());
}

function renderTable(p){
  var root=document.getElementById('pane-week');
  if(!root||!p)return;
  var plan=S.plan;
  if(!plan||!plan.days){renderPrefs(p);return;}
  var tK=p.trainingKcal||2769,rK=p.restKcal||2492,pr=p.protein||174;
  var gd=plan.generatedAt?new Date(plan.generatedAt).toLocaleDateString('en-GB',{day:'numeric',month:'short'}):'';
  var html='<div class="th">'
    +'<div class="tm">'+(gd?'Generated '+gd:'')+' &middot; Hover a meal to swap</div>'
    +'<div class="ta">'
      +'<button class="tb jd" onclick="editPrefs()">Change prefs</button>'
      +'<button class="tb" onclick="generate()">Regenerate</button>'
    +'</div></div>'
    +'<div class="ww"><table class="wt"><thead><tr>'
    +'<th>Day</th>'
    +SLS.map(function(s){return '<th class="mh">'+SLN[s]+'</th>';}).join('')
    +'</tr></thead><tbody>';
  DNS.forEach(function(day,i){
    var dp=(p.weekPlan||[])[i]||{type:'Rest',priority:'rest'};
    var isT=dp.priority==='training';
    var dm=(plan.days||{})[day]||{};
    var dK=isT?tK:rK;
    var totK=0,totP=0;
    SLS.forEach(function(s){var m=dm[s];if(m){totK+=m.calories||0;totP+=m.protein||0;}});
    html+='<tr>';
    html+='<td class="dc"><div class="dn">'+day.slice(0,3)+'</div><div class="db '+(isT?'tr':'rs')+'">'+(isT?(dp.type||'Train'):'Rest')+'</div></td>';
    SLS.forEach(function(slot){
      var m=dm[slot];
      var cid='mc-'+day+'-'+slot;
      var loading=S.swapping&&S.swapping.day===day&&S.swapping.slot===slot;
      html+='<td class="mc" id="'+cid+'">';
      if(loading){html+='<div class="lc">Swapping...</div>';}
      else if(m){
        html+='<div class="mn">'+m.name+'</div>'
          +'<div class="mm">'
            +'<span class="mp2 p">'+(m.protein||0)+'g P</span>'
            +'<span class="mp2">'+(m.carbs||0)+'g C</span>'
            +'<span class="mp2">'+(m.fat||0)+'g F</span>'
            +'<span class="mp2">'+(m.calories||0)+' kcal</span>'
          +'</div>'
          +'<button class="sw" onclick="swapMeal(\''+day+'\',\''+slot+'\')">+</button>';
      }else{html+='<div class="ec">-</div>';}
      html+='</td>';
    });
    html+='</tr>';
    var pPct=Math.min(100,pr>0?Math.round(totP/pr*100):0);
    var kPct=Math.min(100,dK>0?Math.round(totK/dK*100):0);
    var pCol=pPct>=90?'var(--jade)':pPct>=70?'var(--amber)':'rgba(220,80,60,.7)';
    var kCol=kPct>=90&&kPct<=112?'var(--jade)':kPct<80?'rgba(220,80,60,.7)':'var(--amber)';
    html+='<tr class="tor">'
      +'<td><div class="tl">Total</div></td>'
      +'<td class="mc" style="border-left:1px solid rgba(255,255,255,.04);" colspan="3">'
        +'<div class="tb2">'
          +'<div class="br2"><div class="bt"><div class="bf" style="width:'+pPct+'%;background:'+pCol+';"></div></div><div class="bv" style="color:'+pCol+';">'+totP+'g P / '+pr+'g</div></div>'
          +'<div class="br2"><div class="bt"><div class="bf" style="width:'+kPct+'%;background:'+kCol+';"></div></div><div class="bv" style="color:'+kCol+';">'+totK+' / '+dK+' kcal</div></div>'
        +'</div>'
      +'</td></tr>';
  });
  html+='</tbody></table></div>'
    +'<div class="sb"><div class="sn">Plan saves automatically. Today reads from this.</div>'
    +'<button class="sbt" id="sbt" onclick="doSave()">Save week</button></div>';
  root.innerHTML=html;
}

function doSave(){
  if(S.plan)sp(S.plan);
  var b=document.getElementById('sbt');
  if(b){b.textContent='Saved';b.style.opacity='.6';setTimeout(function(){if(b){b.textContent='Save week';b.style.opacity='';}},2000);}
}
function editPrefs(){S.plan=null;cp();renderPrefs(gp());}

var CM={ctx:'Training day',protein:null,carb:null,veg:[],flavour:null,step:1,meals:[],busy:false,open:null};
var CMP=['Chicken breast','Salmon','Lean beef','Eggs','Tuna','Greek yogurt','Tofu','White fish'];
var CMC=['White rice','Sweet potato','Oats','Pasta','Quinoa','No carb'];
var CMV=['Broccoli','Spinach','Peppers','Courgette','Kale','Tomatoes','Asparagus'];
var CMF=['Garlic and herbs','Ginger and soy','Lemon and capers','Harissa','Miso glaze','Plain'];
var CMX=['Training day','Rest day','Post-workout','Light meal'];

function renderCustom(){
  var root=document.getElementById('pane-custom');
  if(!root)return;
  root.innerHTML='<div id="cm-root"></div>';
  renderCM();
}

function renderCM(){
  var p=gp();var root=document.getElementById('cm-root');
  if(!root||!p)return;
  function ch(v,sel,fn){
    var on=Array.isArray(sel)?sel.indexOf(v)>=0:sel===v;
    return '<button class="ch'+(on?' on':'')+'" onclick="'+fn+'(\''+v.replace(/\'/g,'')+'\')">'+v+'</button>';
  }
  var html='<div class="ps" style="border-bottom:1px solid var(--bd);padding-bottom:16px;margin-bottom:20px;">'
    +'<div class="cr">'+CMX.map(function(c){return ch(c,CM.ctx,'cmX');}).join('')+'</div></div>';
  if(CM.busy){html+='<div class="ld"><div class="sp"></div>Building meal options...</div>';root.innerHTML=html;return;}
  if(CM.step<=4){
    html+='<div class="ps"><div class="pl">Protein</div><div class="cr">'+CMP.map(function(v){return ch(v,CM.protein,'cmP');}).join('')+'</div></div>';
    if(CM.protein){html+='<div class="ps"><div class="pl">Carbohydrate</div><div class="cr">'+CMC.map(function(v){return ch(v,CM.carb,'cmC');}).join('')+'</div></div>';}
    if(CM.protein&&CM.carb){
      html+='<div class="ps"><div class="pl">Vegetables<span style="font-size:9px;font-weight:300;text-transform:lowercase;margin-left:6px;">(optional)</span></div><div class="cr">'+CMV.map(function(v){return ch(v,CM.veg,'cmV');}).join('')+'</div></div>';
      html+='<div class="ps"><div class="pl">Flavour</div><div class="cr">'+CMF.map(function(v){return ch(v,CM.flavour,'cmF');}).join('')+'</div></div>';
    }
    if(CM.protein&&CM.carb&&CM.flavour){html+='<button class="gb" onclick="cmGen()">Generate 5 combinations</button>';}
  }
  if(CM.step===5&&CM.meals.length){
    html+='<div style="display:flex;gap:8px;margin-bottom:14px;">'
      +'<button onclick="cmGen()" class="tb">Regenerate</button>'
      +'<button onclick="CM.step=1;CM.meals=[];renderCM()" class="tb">New selection</button></div>';
    CM.meals.forEach(function(meal,i){
      var open=CM.open===i;
      html+='<div class="cmc"><div class="cmh" onclick="CM.open=CM.open==='+i+'?null:'+i+';renderCM()">'
        +'<div class="cmt">'+(meal.title||meal.name||'Meal '+(i+1))+'</div>'
        +'<span class="cmtg p">'+(meal.protein_g||0)+'g P</span>'
        +'<span class="cmtg k">'+(meal.kcal||0)+' kcal</span>'
        +'</div>'
        +'<div class="cmb'+(open?' op':'')+'">'
          +'<div style="font-size:11px;font-weight:300;color:var(--dk-3);padding:10px 0 6px;">'+(meal.why||'')+'</div>'
          +'<div class="ic">'+(meal.ingredients||[]).map(function(ing){return '<span class="ig">'+ing.name+' <em style="opacity:.6;">'+ing.portion+'</em></span>';}).join('')+'</div>'
          +'<div class="cm2">'+(meal.method||'')+'</div>'
        +'</div></div>';
    });
  }
  root.innerHTML=html;
}

function cmX(v){CM.ctx=v;renderCM();}
function cmP(v){CM.protein=v;renderCM();}
function cmC(v){CM.carb=v;renderCM();}
function cmF(v){CM.flavour=v;renderCM();}
function cmV(v){var i=CM.veg.indexOf(v);if(i>=0)CM.veg.splice(i,1);else if(CM.veg.length<3)CM.veg.push(v);renderCM();}

async function cmGen(){
  var p=gp();if(!p)return;
  CM.busy=true;renderCM();
  var isT=CM.ctx==='Training day'||CM.ctx==='Post-workout';
  var dK=isT?(p.trainingKcal||2769):(p.restKcal||2492);
  var perK=Math.round(dK/(p.mealCount||3));
  var perP=Math.round((p.protein||174)/(p.mealCount||3));
  var prompt='Performance nutrition coach. Create 5 personalised meal combinations.\n'
    +'User: '+p.name+', '+p.age+'yo, '+p.weight+'kg, goal: '+(p.goal||'recomposition')+'\n'
    +'Context: '+CM.ctx+' | Target: ~'+perK+' kcal, ~'+perP+'g protein\n'
    +'Ingredients: '+CM.protein+' + '+(CM.carb==='No carb'?'no carb':CM.carb)+(CM.veg.length?' + '+CM.veg.join(', '):'')+(CM.flavour?' + '+CM.flavour:'')+'\n'
    +'Cuisine: '+((p.cuisinePrefs||[]).join(', ')||'flexible')+'\n\n'
    +'Return ONLY JSON: {"meals":[{"title":"Name","why":"Why it works","protein_g":0,"carbs_g":0,"fat_g":0,"kcal":0,"ingredients":[{"name":"","portion":""}],"method":"One sentence."}]}';
  try{
    var res=await fetch(API,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:MDL,max_tokens:2000,system:'Return ONLY valid JSON.',messages:[{role:'user',content:prompt}]})});
    var data=await res.json();
    var text=(data.content||[]).map(function(b){return b.text||'';}).join('').trim();
    var m=text.match(/\{[\s\S]*\}/);
    if(!m)throw new Error('no json');
    CM.meals=JSON.parse(m[0]).meals||[];
  }catch(e){CM.meals=[];}
  CM.busy=false;CM.step=5;CM.open=null;renderCM();
}

function init(){
  var p=gp();
  var nm=document.getElementById('nav-meta');
  if(nm&&p)nm.innerHTML='<span class="nav-tag nt-jade">'+p.name+'</span>';
  if(!p){
    document.getElementById('pane-week').innerHTML='<div style="text-align:center;padding:60px 20px;"><div style="font-size:14px;font-weight:300;color:var(--dk-2);margin-bottom:6px;">Profile needed</div><div style="font-size:12px;font-weight:300;color:var(--dk-3);">Complete onboarding first.</div></div>';
    return;
  }
  if(p.cuisinePrefs&&p.cuisinePrefs.length){
    S.prefs.cuisines=p.cuisinePrefs.map(function(c){
      var f=CUIS.filter(function(x){return x.toLowerCase()===c.toLowerCase();});
      return f.length?f[0]:null;
    }).filter(Boolean);
  }
  if(p.foodExclusions)S.prefs.avoids=p.foodExclusions;
  var ex=lp();
  if(ex&&ex.days&&Object.keys(ex.days).length>0){
    S.plan=ex;S.prefs=ex.prefs||S.prefs;renderTable(p);
  }else{renderPrefs(p);}
}

init();
</script>
</body>
