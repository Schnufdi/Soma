<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>BodyLens — Instructions</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=Space+Grotesk:wght@300;400;500;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<script src="page-generator.js"></script>
<style>
body { background:var(--ink); color:var(--dk-1); }
.page { max-width:860px; margin:0 auto; padding:0 32px 100px; }

/* Hero */
.ins-hero {
  padding:48px 0 36px;
  border-bottom:1px solid var(--bd);
  margin-bottom:0;
  display:flex; justify-content:space-between; align-items:flex-end; gap:24px;
}
.ins-kicker { font-size:10px; font-weight:600; letter-spacing:0.2em; text-transform:uppercase; color:var(--jade); margin-bottom:10px; display:flex; align-items:center; gap:10px; }
.ins-kicker::before { content:''; width:18px; height:1px; background:var(--jade); }
.ins-title { font-family:var(--serif); font-size:52px; font-weight:300; line-height:0.93; letter-spacing:-0.025em; color:var(--dk-1); margin-bottom:10px; }
.ins-title em { font-style:italic; color:var(--dk-3); }
.ins-meta { font-size:12px; font-weight:300; color:var(--dk-3); }

/* Tabs */
.ins-tabs {
  display:flex; gap:0; border-bottom:1px solid var(--bd);
  margin-bottom:36px; overflow-x:auto;
  position:sticky; top:60px; background:rgba(12,16,16,0.97);
  backdrop-filter:blur(8px); z-index:50; padding-top:4px;
}
.ins-tab {
  font-size:11px; font-weight:600; letter-spacing:0.08em; text-transform:uppercase;
  padding:13px 20px; border:none; background:transparent;
  color:var(--dk-3); cursor:pointer; font-family:var(--sans);
  border-bottom:2px solid transparent; margin-bottom:-1px;
  white-space:nowrap; transition:all 0.12s; flex-shrink:0;
}
.ins-tab:hover { color:var(--dk-2); }
.ins-tab.active { color:var(--jade); border-bottom-color:var(--jade); }

.ins-pane { display:none; padding-top:8px; }
.ins-pane.active { display:block; }

/* Report styles */
.report-shell { max-width:680px; }

.report-section {
  margin-bottom:44px;
  padding-bottom:44px;
  border-bottom:1px solid var(--bd);
}
.report-section:last-child { border-bottom:none; }

.report-sec-label {
  font-size:9px; font-weight:600; letter-spacing:0.18em;
  text-transform:uppercase; color:var(--jade);
  margin-bottom:14px;
  display:flex; align-items:center; gap:10px;
}
.report-sec-label::after { content:''; flex:1; height:1px; background:var(--bd); }
.report-sec-label.amber { color:var(--amber); }
.report-sec-label.gold  { color:var(--gold); }
.report-sec-label.red   { color:var(--red); }
.report-sec-label.slate { color:var(--dk-2); }

.report-body {
  font-size:15px; font-weight:300; color:var(--dk-2);
  line-height:1.9; margin-bottom:14px;
}
.report-body strong { color:var(--dk-1); font-weight:500; }
.report-body em { color:var(--jade); font-style:italic; }

.report-body p { margin-bottom:14px; }
.report-body p:last-child { margin-bottom:0; }

/* Quick stats sidebar card */
.ins-sidebar {
  float:right; width:240px; margin:0 0 24px 28px;
  background:var(--ink-2); border:1px solid var(--jade-br);
  border-radius:6px; overflow:hidden;
}
.ins-sidebar-head {
  padding:12px 16px; background:var(--ink-1);
  border-bottom:1px solid var(--bd);
  font-size:9px; font-weight:600; letter-spacing:0.12em;
  text-transform:uppercase; color:var(--jade);
}
.ins-sidebar-row {
  display:flex; justify-content:space-between; align-items:baseline;
  padding:8px 16px; border-bottom:1px solid var(--bd);
  font-size:11px; gap:8px;
}
.ins-sidebar-row:last-child { border-bottom:none; }
.ins-sidebar-label { font-weight:400; color:var(--dk-3); }
.ins-sidebar-val   { font-weight:500; color:var(--dk-1); }
.ins-sidebar-val.jade { color:var(--jade); }

/* Data tab */
.data-grid {
  display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:24px;
}
.data-card {
  background:var(--ink-2); border:1px solid var(--bd); border-radius:6px;
  overflow:hidden;
}
.data-card.full { grid-column:1/-1; }
.data-card.jade  { border-top:2px solid var(--jade); }
.data-card.amber { border-top:2px solid var(--amber); }
.data-card.gold  { border-top:2px solid var(--gold); }
.data-card-head {
  padding:11px 16px; background:var(--ink-1);
  border-bottom:1px solid var(--bd);
  font-size:10px; font-weight:600; letter-spacing:0.08em;
  text-transform:uppercase;
}
.data-card.jade  .data-card-head { color:var(--jade); }
.data-card.amber .data-card-head { color:var(--amber); }
.data-card.gold  .data-card-head { color:var(--gold); }
.data-row {
  display:flex; justify-content:space-between; align-items:baseline;
  padding:9px 16px; border-bottom:1px solid var(--bd);
  font-size:12px; gap:12px;
}
.data-row:last-child { border-bottom:none; }
.data-label { font-weight:400; color:var(--dk-3); flex-shrink:0; }
.data-val   { font-weight:500; color:var(--dk-1); text-align:right; line-height:1.4; }
.data-val.jade { color:var(--jade); }
.data-val.amber { color:var(--amber); }
.data-val.red   { color:var(--red); }

/* Macro strip */
.macro-strip {
  display:grid; grid-template-columns:repeat(4,1fr);
  gap:1px; background:var(--bd); border-radius:6px;
  overflow:hidden; margin-bottom:12px;
}
.macro-cell { background:var(--ink-2); padding:14px 10px; text-align:center; }
.macro-val  { font-family:var(--mono); font-size:22px; font-weight:500; color:var(--jade); line-height:1; margin-bottom:3px; }
.macro-val.amber { color:var(--amber); }
.macro-val.slate { color:var(--dk-2); }
.macro-label { font-size:9px; font-weight:600; letter-spacing:0.1em; text-transform:uppercase; color:var(--dk-3); }

/* Actions */
.ins-actions { display:flex; gap:8px; flex-wrap:wrap; margin-top:28px; padding-top:20px; border-top:1px solid var(--bd); }
.ins-btn {
  padding:9px 18px; background:transparent;
  border:1px solid var(--bd-2); border-radius:4px;
  font-family:var(--sans); font-size:10px; font-weight:600;
  letter-spacing:0.08em; text-transform:uppercase;
  color:var(--dk-3); cursor:pointer; transition:all 0.15s;
}
.ins-btn:hover { color:var(--jade); border-color:var(--jade-br); }
.ins-btn.jade  { background:var(--jade); border-color:var(--jade); color:var(--ink); }
.ins-btn.red   { color:var(--red); border-color:var(--red-br); }

/* No profile */
.no-profile { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:60vh; text-align:center; padding:48px; gap:14px; }
.no-profile h2 { font-family:var(--serif); font-size:30px; font-weight:300; }
.no-profile p  { font-size:14px; font-weight:300; color:var(--dk-2); max-width:360px; line-height:1.7; }
.no-profile a  { display:inline-block; padding:12px 28px; background:var(--jade); border-radius:6px; font-size:13px; font-weight:600; letter-spacing:0.06em; text-transform:uppercase; color:var(--ink); text-decoration:none; }

@media(max-width:700px){
  .ins-hero { flex-direction:column; gap:12px; }
  .ins-sidebar { float:none; width:100%; margin:0 0 20px 0; }
  .data-grid { grid-template-columns:1fr; }
  .data-card.full { grid-column:1; }
  .page { padding:0 16px 80px; }
  .ins-title { font-size:38px; }
  .macro-strip { grid-template-columns:repeat(2,1fr); }
}
</style>
</head>
<body>

<nav class="site-nav">
  <div class="nav-brand">Body<em>Lens</em></div>
  <div class="nav-links">
    <a class="nav-link nav-daily" href="bodylens-day.html">Today</a>
    <a class="nav-link nav-food" href="bodylens-food.html">Food</a>
    <a class="nav-link" href="bodylens-programme.html">Programme</a>
    <a class="nav-link" href="bodylens-science.html">Science</a>
  </div>

  <div class="nav-breadcrumb">
    <a href="bodylens-programme.html" class="nav-bc-parent">Programme</a>
    <span class="nav-bc-sep">›</span>
    <span class="nav-bc-current">Report</span>
  </div>
  <div class="nav-right-group">
    <a class="nav-link nav-right" href="bodylens-howitworks.html">How it works</a>
    <div class="nav-meta" id="nav-meta"></div>
  </div>
</nav>

<div class="page" id="main">
  <div style="text-align:center;padding:80px 0;">
    <div style="font-size:13px;color:var(--dk-3);">Loading…</div>
  </div>
</div>

<script src="nav.js"></script>
<script>
const profile = getProfile();

if (!profile) {
  document.getElementById('main').innerHTML = `
    <div class="no-profile">
      <div style="font-size:44px;">📋</div>
      <h2>No programme yet</h2>
      <p>Complete the onboarding and your full coaching report will appear here.</p>
      <a href="bodylens-onboard.html">Get started →</a>
    </div>`;
} else {
  document.getElementById('nav-meta').innerHTML =
    `<span class="nav-tag nt-jade">${profile.name}</span>`;
  renderPage(profile);
}

function renderPage(p) {
  const genDate = p.generatedAt
    ? new Date(p.generatedAt).toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'})
    : '—';

  document.getElementById('main').innerHTML = `
    <div class="ins-hero">
      <div>
        <div class="ins-kicker">Coaching report</div>
        <div class="ins-title">${p.name}<br><em>instructions.</em></div>
        <div class="ins-meta">Generated ${genDate} · ${p.goal||'—'}</div>
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;align-self:flex-end;">
        <a href="bodylens-day.html" class="ins-btn jade">Today's plan →</a>
      </div>
    </div>

    <div class="ins-tabs">
      <button class="ins-tab active" onclick="switchTab('report',this)">Coach's report</button>
      <button class="ins-tab" onclick="switchTab('data',this)">Programme data</button>
      <button class="ins-tab" onclick="switchTab('raw',this)">Full brief</button>
    </div>

    <!-- REPORT TAB -->
    <div class="ins-pane active" id="pane-report">
      <div id="report-content">
        <div style="text-align:center;padding:60px 0;">
          <div style="font-size:36px;margin-bottom:12px;">📋</div>
          <div style="font-size:14px;font-weight:300;color:var(--dk-2);margin-bottom:20px;">
            Your coaching report — written from your session.
          </div>
          <button onclick="generateReport()"
            style="padding:12px 28px;background:var(--jade);border:none;border-radius:4px;
            font-family:var(--sans);font-size:12px;font-weight:600;letter-spacing:0.06em;
            text-transform:uppercase;color:var(--ink);cursor:pointer;">
            Generate my report →
          </button>
        </div>
      </div>
      <div class="ins-actions">
        <button id="regen-report-btn" class="ins-btn" onclick="generateReport(true)">↺ Regenerate report</button>
        <button class="ins-btn" onclick="switchTab('data', document.querySelector('[onclick*=data]'))">View programme data</button>
      </div>
    </div>

    <!-- DATA TAB -->
    <div class="ins-pane" id="pane-data">
      ${buildDataTab(p)}
    </div>

    <!-- RAW BRIEF TAB -->
    <div class="ins-pane" id="pane-raw">
      <div style="background:var(--ink-2);border:1px solid var(--bd);border-radius:6px;padding:24px 28px;">
        <div style="font-family:var(--mono);font-size:12px;font-weight:300;color:var(--dk-2);
          line-height:1.9;white-space:pre-wrap;word-break:break-word;max-height:70vh;overflow-y:auto;">
          ${(p.instructions||'No brief generated.').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
        </div>
      </div>
      <div class="ins-actions">
        <button id="regen-brief-btn" class="ins-btn" onclick="regenBrief()">↺ Regenerate brief</button>
      </div>
    </div>
  `;

  // Auto-generate report if not cached
  setTimeout(() => generateReport(false), 100);
}

function buildDataTab(p) {
  const injuries  = p.injuryAssessments || [];
  const supps     = p.supplements || [];
  const weekPlan  = p.weekPlan || [];
  const isFemale  = (p.sex||'').toLowerCase() === 'female';
  const trainingDays = weekPlan.filter(d=>d.priority==='training').map(d=>d.day).join(', ');

  return `
    <div class="data-grid">

      <div class="data-card jade">
        <div class="data-card-head">Baseline</div>
        <div class="data-row"><span class="data-label">Name</span><span class="data-val jade">${p.name}</span></div>
        <div class="data-row"><span class="data-label">Age / Sex</span><span class="data-val">${p.age||'—'} · ${p.sex||'—'}</span></div>
        <div class="data-row"><span class="data-label">Height / Weight</span><span class="data-val">${p.height||'—'}cm · ${p.weight||'—'}kg</span></div>
        <div class="data-row"><span class="data-label">Body fat</span><span class="data-val">${p.bodyFat||'—'}%</span></div>
        <div class="data-row"><span class="data-label">Fat storage</span><span class="data-val">${p.fatStorage||'—'}</span></div>
        <div class="data-row"><span class="data-label">Goal</span><span class="data-val">${p.goal||'—'}</span></div>
        <div class="data-row"><span class="data-label">Target</span><span class="data-val">${p.target||'—'}</span></div>
        ${isFemale && p.menstrualCycle ? `<div class="data-row"><span class="data-label">Cycle</span><span class="data-val">${p.menstrualCycle}</span></div>` : ''}
      </div>

      <div class="data-card amber">
        <div class="data-card-head">Training</div>
        <div class="data-row"><span class="data-label">Days/week</span><span class="data-val jade">${p.trainingDays||'—'}</span></div>
        <div class="data-row"><span class="data-label">Training days</span><span class="data-val">${trainingDays||'—'}</span></div>
        <div class="data-row"><span class="data-label">Wake time</span><span class="data-val">${p.wakeTime||'—'}</span></div>
        <div class="data-row"><span class="data-label">Train time</span><span class="data-val">${p.trainingTime||'—'}</span></div>
        <div class="data-row"><span class="data-label">Equipment</span><span class="data-val" style="font-size:11px;">${(p.equipmentUsed||[]).join(', ')||p.gymAccess||'—'}</span></div>
        <div class="data-row"><span class="data-label">Free weights</span><span class="data-val" style="font-size:11px;">${p.freeWeightComfort||'—'}</span></div>
        <div class="data-row"><span class="data-label">Recovery</span><span class="data-val" style="font-size:11px;">${(p.recoveryTools||[]).join(', ')||'None'}</span></div>
        <div class="data-row"><span class="data-label">Experience</span><span class="data-val">${p.experience||'—'}</span></div>
      </div>

      <div class="data-card amber full">
        <div class="data-card-head">Nutrition targets</div>
        <div class="macro-strip">
          <div class="macro-cell"><div class="macro-val">${p.calories||'—'}</div><div class="macro-label">Calories</div></div>
          <div class="macro-cell"><div class="macro-val jade">${p.protein||'—'}g</div><div class="macro-label">Protein</div></div>
          <div class="macro-cell"><div class="macro-val amber">${p.carbs||'—'}g</div><div class="macro-label">Carbs</div></div>
          <div class="macro-cell"><div class="macro-val slate">${p.fat||'—'}g</div><div class="macro-label">Fat</div></div>
        </div>
        ${p.calorieReasoning ? `<div style="padding:12px 16px 4px;font-size:12px;font-weight:300;color:var(--dk-2);line-height:1.75;font-style:italic;">${p.calorieReasoning}</div>` : ''}
        <div class="data-row"><span class="data-label">Eating window</span><span class="data-val">${p.fastingWindow||p.eatingWindow||'Flexible'}</span></div>
        <div class="data-row"><span class="data-label">Fasting pref.</span><span class="data-val">${p.fastingPreference||'—'}</span></div>
        <div class="data-row"><span class="data-label">Diet</span><span class="data-val">${p.dietType||'—'}</span></div>
        ${(p.foodExclusions||[]).length ? `<div class="data-row"><span class="data-label">Exclusions</span><span class="data-val red">${p.foodExclusions.join(', ')}</span></div>` : ''}
        ${p.triggerFoods && !p.triggerFoods.includes('None') ? `<div class="data-row"><span class="data-label">Triggers</span><span class="data-val red">${p.triggerFoods}</span></div>` : ''}
        <div class="data-row"><span class="data-label">Activity level</span><span class="data-val">${p.activityLevel||'—'}</span></div>
        <div class="data-row"><span class="data-label">Energy pattern</span><span class="data-val">${p.energyPattern||'—'}</span></div>
      </div>

      ${injuries.length ? `
      <div class="data-card gold full">
        <div class="data-card-head">Injuries</div>
        ${injuries.map(inj => `
          <div style="padding:14px 16px;border-bottom:1px solid var(--bd);border-left:3px solid var(--gold);">
            <div style="font-size:12px;font-weight:600;color:var(--gold);margin-bottom:4px;">${inj.location}</div>
            <div style="font-size:12px;font-weight:300;color:var(--dk-2);line-height:1.65;">${inj.assessment||''}</div>
            ${inj.avoidMovements&&inj.avoidMovements.length ? `
              <div style="font-size:11px;margin-top:6px;">
                <span style="color:var(--red);">Avoid: ${inj.avoidMovements.join(', ')}</span><br>
                <span style="color:var(--jade);">Instead: ${(inj.safeAlternatives||[]).join(', ')}</span>
              </div>` : ''}
          </div>`).join('')}
      </div>` : ''}

      ${supps.length ? `
      <div class="data-card gold full">
        <div class="data-card-head">Supplement stack</div>
        ${supps.map(s => `
          <div style="display:grid;grid-template-columns:1fr 80px 140px;padding:10px 16px;border-bottom:1px solid var(--bd);font-size:12px;gap:10px;align-items:baseline;">
            <div style="font-weight:500;color:var(--dk-1);">${s.name}</div>
            <div style="font-family:var(--mono);font-weight:300;color:var(--amber);">${s.dose}</div>
            <div style="font-weight:300;color:var(--dk-3);">${s.timing}</div>
          </div>`).join('')}
      </div>` : ''}

    </div>

    <div class="ins-actions">
      <a href="bodylens-day.html" class="ins-btn jade">Today's plan →</a>
      <button onclick="location.href='bodylens-reset.html'" class="ins-btn red">Reset all data</button>
    </div>`;
}

function switchTab(id, btn) {
  document.querySelectorAll('.ins-tab').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.ins-pane').forEach(p => p.classList.remove('active'));
  if (btn) btn.classList.add('active');
  document.getElementById('pane-' + id).classList.add('active');
}

async function generateReport(force) {
  const container = document.getElementById('report-content');
  if (!container) return;

  // Check cache
  const cacheKey = 'bl_gen_v4_coachreport_' + profile.name + '_' + (profile.generatedAt||'').slice(0,10);
  if (!force) {
    try {
      const cached = localStorage.getItem(cacheKey);
      if (cached) {
        renderReport(cached);
        return;
      }
    } catch(e) {}
  }

  // Show loading
  container.innerHTML = `
    <div style="padding:40px 0;display:flex;flex-direction:column;align-items:center;gap:12px;">
      <div style="width:32px;height:32px;border:2px solid var(--bd-2);border-top-color:var(--jade);
        border-radius:50%;animation:spin 0.8s linear infinite;"></div>
      <div style="font-size:13px;font-weight:300;color:var(--dk-3);">Writing your coaching report…</div>
      <div style="font-size:11px;font-weight:300;color:var(--dk-3);opacity:0.7;">This takes about 20 seconds.</div>
    </div>
    <style>@keyframes spin{to{transform:rotate(360deg)}}</style>`;

  const btn = document.getElementById('regen-report-btn');
  if (btn) { btn.textContent = 'Generating…'; btn.disabled = true; }

  BL_GENERATOR.generate(
    'coachreport',
    profile,
    null, // no separate loading state needed
    (html) => {
      // Cache it
      try { localStorage.setItem(cacheKey, html); } catch(e) {}
      renderReport(html);
      if (btn) { btn.textContent = '↺ Regenerate report'; btn.disabled = false; }
    },
    (err) => {
      console.error('Report error:', err);
      container.innerHTML = `
        <div style="padding:40px 0;text-align:center;color:var(--dk-3);font-size:13px;">
          Could not generate report: ${err||'unknown error'}<br><br>
          <button onclick="generateReport(true)" style="color:var(--jade);background:none;border:none;cursor:pointer;text-decoration:underline;font-size:13px;">Try again</button>
        </div>`;
      if (btn) { btn.textContent = '↺ Regenerate report'; btn.disabled = false; }
    }
  );
}

function renderReport(html) {
  const container = document.getElementById('report-content');
  if (!container) return;

  // The coachreport renderer returns formatted HTML
  // But we also need to handle raw text from the model
  // Wrap it nicely
  container.innerHTML = `
    <div class="report-shell">
      ${html}
    </div>`;
}

async function regenBrief() {
  const btn = document.getElementById('regen-brief-btn');
  if (btn) { btn.textContent = 'Generating…'; btn.disabled = true; }

  const isFemale = (profile.sex||'').toLowerCase() === 'female';
  const injuries = profile.injuryAssessments || [];
  const supps    = profile.supplements || [];
  const weekPlan = profile.weekPlan || [];
  const trainingDays = weekPlan.filter(d=>d.priority==='training').map(d=>d.day).join(', ');

  try {
    const res = await fetch('/api/chat', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:2500,
        system:'You are a senior performance coach writing a personalised coaching brief. Be direct, specific, and personal.',
        messages:[{ role:'user', content:`Write a complete coaching brief document for ${profile.name}.

PROFILE:
${profile.name}, ${profile.age}yo ${profile.sex}, ${profile.height}cm, ${profile.weight}kg
Goal: ${profile.goal} | Target: ${profile.target||'—'}
Calories: ${profile.calories} kcal | Protein: ${profile.protein}g | Carbs: ${profile.carbs}g | Fat: ${profile.fat}g
Training: ${profile.trainingDays} days/week (${trainingDays}) | Wake: ${profile.wakeTime}
Eating window: ${profile.fastingWindow||profile.eatingWindow||'flexible'}
Diet: ${profile.dietType} | Exclusions: ${(profile.foodExclusions||[]).join(', ')||'none'}
Trigger foods: ${profile.triggerFoods||'none'}
Equipment: ${(profile.equipmentUsed||[]).join(', ')||profile.gymAccess||'—'}
Free weight comfort: ${profile.freeWeightComfort||'—'}
Training time: ${profile.trainingTime||'—'}
Activity level: ${profile.activityLevel||'—'}
Injuries: ${injuries.length ? injuries.map(i=>i.location+': '+i.assessment).join('; ') : 'none'}
Non-negotiables: ${(profile.nonNegotiables||[]).join(', ')||'none'}
${isFemale && profile.menstrualCycle ? 'Cycle: '+profile.menstrualCycle : ''}
${isFemale ? 'FEMALE — all content must reflect female physiology.' : 'MALE — reflect male physiology.'}

Write sections: Workout Objective, Goals, Approach, Current Baseline, Injuries, Food Philosophy, Meal Rhythm, Supplement Stack, Efficiency Rule. Direct, specific, personalised prose.` }],
      })
    });
    const data = await res.json();
    const text = data.content?.map(b=>b.text||'').join('')||'';
    if (!text) throw new Error('Empty response');
    profile.instructions = text;
    localStorage.setItem('bl_profile', JSON.stringify(profile));
    if (btn) { btn.textContent = '✓ Done'; btn.disabled = false; }
    setTimeout(() => location.reload(), 600);
  } catch(e) {
    console.error(e);
    if (btn) { btn.textContent = 'Error — try again'; btn.disabled = false; }
  }
}
</script>
