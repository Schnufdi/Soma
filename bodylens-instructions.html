<style>
body { background:var(--ink); color:var(--dk-1); }
.page { max-width:860px; margin:0 auto; padding:0 32px 100px; }

/* Hero */
.ins-hero {
  padding:48px 0 36px;
  border-bottom:1px solid var(--bd);
  margin-bottom:0;
  display:flex; justify-content:space-between; align-items:flex-end; gap:24px;
}
.ins-kicker { font-size:10px; font-weight:600; letter-spacing:0.2em; text-transform:uppercase; color:var(--jade); margin-bottom:10px; display:flex; align-items:center; gap:10px; }
.ins-kicker::before { content:''; width:18px; height:1px; background:var(--jade); }
.ins-title { font-family:var(--serif); font-size:52px; font-weight:300; line-height:0.93; letter-spacing:-0.025em; color:var(--dk-1); margin-bottom:10px; }
.ins-title em { font-style:italic; color:var(--dk-3); }
.ins-meta { font-size:12px; font-weight:300; color:var(--dk-3); }

/* Tabs */
.ins-tabs {
  display:flex; gap:0; border-bottom:1px solid var(--bd);
  margin-bottom:36px; overflow-x:auto;
  position:sticky; top:60px; background:rgba(12,16,16,0.97);
  backdrop-filter:blur(8px); z-index:50; padding-top:4px;
}
.ins-tab {
  font-size:11px; font-weight:600; letter-spacing:0.08em; text-transform:uppercase;
  padding:13px 20px; border:none; background:transparent;
  color:var(--dk-3); cursor:pointer; font-family:var(--sans);
  border-bottom:2px solid transparent; margin-bottom:-1px;
  white-space:nowrap; transition:all 0.12s; flex-shrink:0;
}
.ins-tab:hover { color:var(--dk-2); }
.ins-tab.active { color:var(--jade); border-bottom-color:var(--jade); }

.ins-pane { display:none; padding-top:8px; }
.ins-pane.active { display:block; }

/* Report styles */
.report-shell { max-width:680px; }

.report-section {
  margin-bottom:44px;
  padding-bottom:44px;
  border-bottom:1px solid var(--bd);
}
.report-section:last-child { border-bottom:none; }

.report-sec-label {
  font-size:9px; font-weight:600; letter-spacing:0.18em;
  text-transform:uppercase; color:var(--jade);
  margin-bottom:14px;
  display:flex; align-items:center; gap:10px;
}
.report-sec-label::after { content:''; flex:1; height:1px; background:var(--bd); }
.report-sec-label.amber { color:var(--amber); }
.report-sec-label.gold  { color:var(--gold); }
.report-sec-label.red   { color:var(--red); }
.report-sec-label.slate { color:var(--dk-2); }

.report-body {
  font-size:15px; font-weight:300; color:var(--dk-2);
  line-height:1.9; margin-bottom:14px;
}
.report-body strong { color:var(--dk-1); font-weight:500; }
.report-body em { color:var(--jade); font-style:italic; }

.report-body p { margin-bottom:14px; }
.report-body p:last-child { margin-bottom:0; }

/* Quick stats sidebar card */
.ins-sidebar {
  float:right; width:240px; margin:0 0 24px 28px;
  background:var(--ink-2); border:1px solid var(--jade-br);
  border-radius:6px; overflow:hidden;
}
.ins-sidebar-head {
  padding:12px 16px; background:var(--ink-1);
  border-bottom:1px solid var(--bd);
  font-size:9px; font-weight:600; letter-spacing:0.12em;
  text-transform:uppercase; color:var(--jade);
}
.ins-sidebar-row {
  display:flex; justify-content:space-between; align-items:baseline;
  padding:8px 16px; border-bottom:1px solid var(--bd);
  font-size:11px; gap:8px;
}
.ins-sidebar-row:last-child { border-bottom:none; }
.ins-sidebar-label { font-weight:400; color:var(--dk-3); }
.ins-sidebar-val   { font-weight:500; color:var(--dk-1); }
.ins-sidebar-val.jade { color:var(--jade); }

/* Data tab */
.data-grid {
  display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:24px;
}
.data-card {
  background:var(--ink-2); border:1px solid var(--bd); border-radius:6px;
  overflow:hidden;
}
.data-card.full { grid-column:1/-1; }
.data-card.jade  { border-top:2px solid var(--jade); }
.data-card.amber { border-top:2px solid var(--amber); }
.data-card.gold  { border-top:2px solid var(--gold); }
.data-card-head {
  padding:11px 16px; background:var(--ink-1);
  border-bottom:1px solid var(--bd);
  font-size:10px; font-weight:600; letter-spacing:0.08em;
  text-transform:uppercase;
}
.data-card.jade  .data-card-head { color:var(--jade); }
.data-card.amber .data-card-head { color:var(--amber); }
.data-card.gold  .data-card-head { color:var(--gold); }
.data-row {
  display:flex; justify-content:space-between; align-items:baseline;
  padding:9px 16px; border-bottom:1px solid var(--bd);
  font-size:12px; gap:12px;
}
.data-row:last-child { border-bottom:none; }
.data-label { font-weight:400; color:var(--dk-3); flex-shrink:0; }
.data-val   { font-weight:500; color:var(--dk-1); text-align:right; line-height:1.4; }
.data-val.jade { color:var(--jade); }
.data-val.amber { color:var(--amber); }
.data-val.red   { color:var(--red); }

/* Macro strip */
.macro-strip {
  display:grid; grid-template-columns:repeat(4,1fr);
  gap:1px; background:var(--bd); border-radius:6px;
  overflow:hidden; margin-bottom:12px;
}
.macro-cell { background:var(--ink-2); padding:14px 10px; text-align:center; }
.macro-val  { font-family:var(--mono); font-size:22px; font-weight:500; color:var(--jade); line-height:1; margin-bottom:3px; }
.macro-val.amber { color:var(--amber); }
.macro-val.slate { color:var(--dk-2); }
.macro-label { font-size:9px; font-weight:600; letter-spacing:0.1em; text-transform:uppercase; color:var(--dk-3); }

/* Actions */
.ins-actions { display:flex; gap:8px; flex-wrap:wrap; margin-top:28px; padding-top:20px; border-top:1px solid var(--bd); }
.ins-btn {
  padding:9px 18px; background:transparent;
  border:1px solid var(--bd-2); border-radius:4px;
  font-family:var(--sans); font-size:10px; font-weight:600;
  letter-spacing:0.08em; text-transform:uppercase;
  color:var(--dk-3); cursor:pointer; transition:all 0.15s;
}
.ins-btn:hover { color:var(--jade); border-color:var(--jade-br); }
.ins-btn.jade  { background:var(--jade); border-color:var(--jade); color:var(--ink); }
.ins-btn.red   { color:var(--red); border-color:var(--red-br); }

/* No profile */
.no-profile { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:60vh; text-align:center; padding:48px; gap:14px; }
.no-profile h2 { font-family:var(--serif); font-size:30px; font-weight:300; }
.no-profile p  { font-size:14px; font-weight:300; color:var(--dk-2); max-width:360px; line-height:1.7; }
.no-profile a  { display:inline-block; padding:12px 28px; background:var(--jade); border-radius:6px; font-size:13px; font-weight:600; letter-spacing:0.06em; text-transform:uppercase; color:var(--ink); text-decoration:none; }

@media(max-width:700px){
  .ins-hero { flex-direction:column; gap:12px; }
  .ins-sidebar { float:none; width:100%; margin:0 0 20px 0; }
  .data-grid { grid-template-columns:1fr; }
  .data-card.full { grid-column:1; }
  .page { padding:0 16px 80px; }
  .ins-title { font-size:38px; }
  .macro-strip { grid-template-columns:repeat(2,1fr); }
}

<script>
const profile = getProfile();

// ── RECOVERY: build report from whatever data exists ──────────────

async function rebuildFromFormBackup(formData) {
  const resultEl = document.getElementById('scrap-result');
  // Build the same prompt as onboarding
  const lines = [];
  if (formData.name)       lines.push('Name: ' + formData.name);
  if (formData.age)        lines.push('Age: ' + formData.age);
  if (formData.sex)        lines.push('Sex: ' + formData.sex);
  if (formData.height)     lines.push('Height: ' + formData.height + 'cm');
  if (formData.weight)     lines.push('Weight: ' + formData.weight + 'kg');
  if (formData.goal)       lines.push('Goal: ' + formData.goal);
  if (formData.days)       lines.push('Training days: ' + formData.days);
  if (formData.gym)        lines.push('Gym access: ' + formData.gym);
  if (formData.exp)        lines.push('Experience: ' + formData.exp);
  if (formData.diet)       lines.push('Diet: ' + formData.diet);
  if (formData.sleep)      lines.push('Sleep: ' + formData.sleep);
  if (formData.wake)       lines.push('Wake time: ' + formData.wake);
  if (formData.stress)     lines.push('Stress: ' + formData.stress);
  if (formData.injuries && formData.injuries.length) lines.push('Injuries: ' + formData.injuries.join(', '));
  if (formData.chatContext) lines.push('Follow-up context: ' + formData.chatContext.slice(0, 500));

  const prompt = `You are a senior performance coach. Rebuild a complete personalised programme from this saved questionnaire data.

${lines.join('\n')}

Return ONLY a valid JSON object with this exact structure:
{
  "profile": {
    "goal": "derived primary goal",
    "calories": 0, "protein": 0, "carbs": 0, "fat": 0, "tdee": 0,
    "calorieReasoning": "2-3 sentences",
    "proteinReasoning": "1-2 sentences",
    "mealCount": 4,
    "keyFoodPrinciples": ["principle 1", "principle 2", "principle 3"],
    "foodsToAvoid": [],
    "triggerStrategy": "one sentence"
  },
  "weekPlan": [
    {"day":"Monday","type":"Push","focus":"Chest, shoulders, triceps","kcal":0,"priority":"training","keyExercises":["Bench press 4x8-10","OHP 3x10","Lateral raise 3x15"],"modifications":[],"coachNote":"one sentence"},
    {"day":"Tuesday","type":"Rest","focus":"Recovery","kcal":0,"priority":"rest","keyExercises":[],"modifications":[],"coachNote":"one sentence"},
    {"day":"Wednesday","type":"Pull","focus":"Back, biceps","kcal":0,"priority":"training","keyExercises":["Pull-ups 4x6","Row 3x10"],"modifications":[],"coachNote":"one sentence"},
    {"day":"Thursday","type":"Rest","focus":"Recovery","kcal":0,"priority":"rest","keyExercises":[],"modifications":[],"coachNote":"one sentence"},
    {"day":"Friday","type":"Legs","focus":"Quads, glutes, hamstrings","kcal":0,"priority":"training","keyExercises":["Squat 4x8","RDL 3x10","Leg press 3x12"],"modifications":[],"coachNote":"one sentence"},
    {"day":"Saturday","type":"Upper","focus":"Full upper body","kcal":0,"priority":"training","keyExercises":["OHP 4x8","Row 3x10","Arms"],"modifications":[],"coachNote":"one sentence"},
    {"day":"Sunday","type":"Rest","focus":"Full rest","kcal":0,"priority":"rest","keyExercises":[],"modifications":[],"coachNote":"one sentence"}
  ],
  "supplements": [
    {"name":"Creatine monohydrate","dose":"5g","timing":"Daily","reason":"one sentence"},
    {"name":"Omega-3","dose":"2-3g","timing":"With largest meal","reason":"one sentence"},
    {"name":"Vitamin D3","dose":"3000IU","timing":"With fat meal","reason":"one sentence"},
    {"name":"Magnesium glycinate","dose":"400mg","timing":"30min before sleep","reason":"one sentence"}
  ],
  "injuries": [],
  "weeklyProgression": {
    "week1": {"phase":"Foundation","focus":"Learn the patterns, establish baseline loads","volumeNote":"Lower volume, technique priority","keyFocus":"one sentence"},
    "week2": {"phase":"Build","focus":"Add volume and load","volumeNote":"+10-15% sets","keyFocus":"one sentence"},
    "week3": {"phase":"Peak","focus":"Highest intensity","volumeNote":"RPE 8-9 on primary lifts","keyFocus":"one sentence"},
    "week4": {"phase":"Deload","focus":"50% volume, maintain load","volumeNote":"Active recovery","keyFocus":"one sentence"}
  },
  "coachSummary": "3-4 sentences: overall read, biggest lever, what will make or break progress",
  "programmeGoal": "what they should be able to do after 4 weeks"
}
weekPlan must have exactly 7 entries Mon-Sun.`;

  try {
    if (resultEl) resultEl.innerHTML = 'Rebuilding your programme… (this takes about 30 seconds)';
    const res = await fetch('/api/chat', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        model:'claude-sonnet-4-20250514', max_tokens:1800,
        system:'Senior performance coach. Return ONLY valid JSON. No markdown. No preamble.',
        messages:[{role:'user', content:prompt}]
      })
    });
    const data = await res.json();
    const text = (data.content||[]).map(b=>b.text||'').join('').trim();
    const match = text.match(/\{[\s\S]*\}/);
    if (!match) throw new Error('No JSON');
    const result = JSON.parse(match[0]);

    // Build final profile merging formData + AI result
    const prog = result.profile || {};
    const existing = (() => { try { return JSON.parse(localStorage.getItem('bl_profile')||'{}'); } catch(e) { return {}; } })();
    const newProfile = {
      ...existing,
      name:           formData.name || existing.name || 'User',
      age:            formData.age  || existing.age,
      sex:            formData.sex  || existing.sex,
      height:         formData.height || existing.height,
      weight:         formData.weight || existing.weight,
      goal:           prog.goal || formData.goal || existing.goal,
      calories:       prog.calories || 0,
      protein:        prog.protein  || 0,
      carbs:          prog.carbs    || 0,
      fat:            prog.fat      || 0,
      tdee:           prog.tdee     || 0,
      mealCount:      prog.mealCount || 4,
      keyFoodPrinciples: prog.keyFoodPrinciples || [],
      foodsToAvoid:   prog.foodsToAvoid || [],
      weekPlan:       result.weekPlan || existing.weekPlan || [],
      supplements:    result.supplements || existing.supplements || [],
      injuries:       result.injuries || formData.injuries || existing.injuries || [],
      coachSummary:   result.coachSummary || '',
      weeklyProgression: result.weeklyProgression || existing.weeklyProgression,
      programmeGoal:  result.programmeGoal || '',
      experience:     formData.exp || existing.experience,
      trainingDays:   parseInt(formData.days) || existing.trainingDays || 4,
      wakeTime:       formData.wake || existing.wakeTime || '07:00',
      dietType:       formData.diet || existing.dietType,
      foodExclusions: formData.excl || existing.foodExclusions || [],
      gymAccess:      formData.gym  || existing.gymAccess,
      equipmentUsed:  formData.equipment || existing.equipmentUsed || [],
      recoveryTools:  formData.recovery || existing.recoveryTools || [],
      sleep:          formData.sleep || existing.sleep,
      stressLevel:    formData.stress || existing.stressLevel,
      generated:      true,
      generatedAt:    existing.generatedAt || new Date().toISOString(),
      instructions:   existing.instructions || '',
    };
    localStorage.setItem('bl_profile', JSON.stringify(newProfile));

    if (resultEl) resultEl.innerHTML = 'Programme rebuilt successfully. Reloading…';
    setTimeout(() => location.reload(), 1200);
  } catch(e) {
    console.error('Rebuild error:', e);
    if (resultEl) resultEl.innerHTML = 'Rebuild failed — please try the onboarding again. <a href="bodylens-onboard.html" style="color:var(--jade);">Start onboarding →</a>';
  }
}

async function tryRebuildFromScraps() {
  const resultEl = document.getElementById('scrap-result');
  if (resultEl) resultEl.innerHTML = 'Searching localStorage for any saved data…';
  
  // Gather every bl_ key from localStorage
  const keys = [];
  for (let i = 0; i < localStorage.length; i++) {
    const k = localStorage.key(i);
    if (k && (k.startsWith('bl_') || k.startsWith('dayplan'))) keys.push(k);
  }
  if (resultEl) resultEl.innerHTML = `Found ${keys.length} BodyLens keys. Looking for profile data…`;

  // Check for formdata backup first — most complete recovery source
  let formBackup = null;
  try {
    const fb = localStorage.getItem('bl_formdata_backup');
    if (fb) formBackup = JSON.parse(fb);
  } catch(e) {}

  if (formBackup && (formBackup.name || formBackup.goal)) {
    if (resultEl) resultEl.innerHTML = `Found your questionnaire answers (saved ${formBackup.savedAt ? new Date(formBackup.savedAt).toLocaleDateString() : 'earlier'}). Rebuilding your full programme now — this takes about 30 seconds…`;
    // Trigger a full rebuild using the saved form data
    await rebuildFromFormBackup(formBackup);
    return;
  }
  
  // Try to find any profile fragment
  let found = null;
  for (const key of keys) {
    try {
      const val = JSON.parse(localStorage.getItem(key) || 'null');
      if (val && (val.name || val.goal || val.calories)) {
        found = val;
        break;
      }
    } catch(e) {}
  }
  
  if (found && found.name) {
    if (resultEl) resultEl.innerHTML = `Found profile for "${found.name}". Rebuilding report…`;
    // Fill in any missing defaults so the report renders
    const recovered = {
      name: found.name || 'You',
      age: found.age || '—',
      sex: found.sex || '—',
      weight: found.weight || '—',
      height: found.height || '—',
      goal: found.goal || 'General fitness',
      calories: found.calories || 0,
      protein: found.protein || 0,
      carbs: found.carbs || 0,
      fat: found.fat || 0,
      trainingDays: found.trainingDays || 4,
      weekPlan: found.weekPlan || [],
      supplements: found.supplements || [],
      injuries: found.injuries || [],
      coachSummary: found.coachSummary || '',
      instructions: found.instructions || '',
      experience: found.experience || '—',
      generatedAt: found.generatedAt || new Date().toISOString(),
      ...found
    };
    localStorage.setItem('bl_profile', JSON.stringify(recovered));
    setTimeout(() => location.reload(), 800);
    return;
  }
  
  // No profile found — offer to rebuild via AI from raw text if they have it
  if (resultEl) resultEl.innerHTML = `No profile data found in this browser. You'll need to re-do the onboarding — it takes about 5 minutes and the follow-up chat means you won't need to fill in everything manually again.`;
}

// ── BUILD REPORT BUTTON: shown when profile has no instructions/report ─
async function buildReportFromScratch(btn) {
  if (btn) { btn.disabled = true; btn.textContent = 'Building your report…'; }
  const container = document.getElementById('report-content');
  if (!container) return;

  // Step 1: Render immediately from JS — instant, no API
  const cacheKey = 'bl_report_v2_' + profile.name + '_' + (profile.generatedAt||'').slice(0,10);
  const html = buildReportHTML(profile);
  try { localStorage.setItem(cacheKey, html); } catch(e) {}
  renderReport(html);

  // Step 2: If profile is missing coachSummary or instructions, regenerate via API
  const needsRegen = !profile.coachSummary || !profile.instructions || profile.calories === 0;
  if (needsRegen) {
    // Update UI to show we're enriching
    const statusEl = document.createElement('div');
    statusEl.id = 'report-status';
    statusEl.style.cssText = 'padding:12px 0;font-size:11px;font-weight:300;color:var(--jade);display:flex;align-items:center;gap:8px;';
    statusEl.innerHTML = '<div style="width:14px;height:14px;border:2px solid rgba(0,200,160,0.3);border-top-color:var(--jade);border-radius:50%;animation:spin 0.8s linear infinite;flex-shrink:0;"></div> Generating your coaching summary and calibrations…';
    if (container) container.insertAdjacentElement('afterend', statusEl);

    try {
      const res = await fetch('/api/chat', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({
          model:'claude-sonnet-4-20250514', max_tokens:600,
          system:'You are a senior performance coach. Return only valid JSON.',
          messages:[{role:'user', content: buildRegenPrompt(profile)}]
        })
      });
      const data = await res.json();
      const text = (data.content||[]).map(b=>b.text||'').join('').trim();
      const match = text.match(/\{[\s\S]*\}/);
      if (match) {
        const regen = JSON.parse(match[0]);
        // Merge into profile and save
        try {
          const raw = localStorage.getItem('bl_profile');
          if (raw) {
            const p = JSON.parse(raw);
            if (regen.coachSummary)  { p.coachSummary  = regen.coachSummary;  profile.coachSummary  = regen.coachSummary;  }
            if (regen.instructions)  { p.instructions  = regen.instructions;  profile.instructions  = regen.instructions;  }
            if (regen.calories && !p.calories) { p.calories = regen.calories; profile.calories = regen.calories; }
            if (regen.protein  && !p.protein)  { p.protein  = regen.protein;  profile.protein  = regen.protein;  }
            if (regen.carbs    && !p.carbs)    { p.carbs    = regen.carbs;    profile.carbs    = regen.carbs;    }
            if (regen.fat      && !p.fat)      { p.fat      = regen.fat;      profile.fat      = regen.fat;      }
            if (regen.weekPlan && (!p.weekPlan || !p.weekPlan.length)) {
              p.weekPlan = regen.weekPlan; profile.weekPlan = regen.weekPlan;
            }
            localStorage.setItem('bl_profile', JSON.stringify(p));
          }
        } catch(e) {}
        // Re-render with new data
        const freshHtml = buildReportHTML(profile);
        try { localStorage.setItem(cacheKey, freshHtml); } catch(e) {}
        renderReport(freshHtml);
      }
    } catch(e) {
      console.error('Report regen error:', e);
    }
    const st = document.getElementById('report-status');
    if (st) st.remove();
  }

  // Step 3: AI voice enrichment (coach opening paragraph)
  enrichReportAsync(profile, cacheKey);
  if (btn) { btn.style.display = 'none'; }
}

function buildRegenPrompt(p) {
  return `You are a senior performance coach. A user completed an onboarding questionnaire but the AI generation did not complete — their profile has basic data but is missing the coaching summary, instructions, and possibly macros. Regenerate the missing pieces.

AVAILABLE PROFILE DATA:
Name: \${p.name} | Age: \${p.age} | Sex: \${p.sex} | Height: \${p.height}cm | Weight: \${p.weight}kg
Goal: \${p.goal || '—'} | Experience: \${p.experience || '—'} | Training: \${p.trainingDays || 4} days/week
Wake: \${p.wakeTime || '07:00'} | Sleep: \${p.sleep || '—'}
Diet: \${p.dietType || 'flexible'} | Exclude: \${(p.foodExclusions||[]).join(', ')||'none'}
Injuries: \${(p.injuries||[]).map(i=>i.location||i).join(', ')||'none'}
Current calories: \${p.calories||0} | Protein: \${p.protein||0}g

Return ONLY valid JSON:
{
  "coachSummary": "3-4 sentences: overall read on this person, their biggest lever, and what will make or break their progress",
  "instructions": "2-3 paragraphs of personalised coaching notes — training approach, nutritional priorities, recovery focus, key non-negotiables for this person",
  "calories": \${p.calories||0},
  "protein": \${p.protein||0},
  "carbs": \${p.carbs||0},
  "fat": \${p.fat||0}
}`;
}

async function generateCoachSummary(p) {
  try {
    const res = await fetch('/api/chat', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514', max_tokens: 200,
        system: 'You are a performance coach. Write a brief coaching summary. Be direct and specific.',
        messages: [{role:'user', content: `Write a 3-4 sentence coaching summary for ${p.name}: ${p.age}yo ${p.sex}, ${p.weight}kg, goal: ${p.goal}. Calories: ${p.calories||'?'}, protein: ${p.protein||'?'}g. Training ${p.trainingDays||4} days/week. Injuries: ${(p.injuryAssessments||p.injuries||[]).map(i=>i.location||i).join(', ')||'none'}. What's the biggest lever and what will make or break their progress?`}]
      })
    });
    const data = await res.json();
    return (data.content||[]).map(b=>b.text||'').join('').trim();
  } catch(e) { return null; }
}

function switchTab(id, btn) {
  document.querySelectorAll('.ins-tab').forEach(b => b.classList.remove('active'));

function generateReport(force) {
  const container = document.getElementById('report-content');
  if (!container) return;

  // Check cache first
  const cacheKey = 'bl_report_v2_' + profile.name + '_' + (profile.generatedAt||'').slice(0,10);
  if (!force) {
    try {
      const cached = localStorage.getItem(cacheKey);
      if (cached) { renderReport(cached); return; }
    } catch(e) {}
  }

  // Build report instantly from profile — no API call needed
  const html = buildReportHTML(profile);
  try { localStorage.setItem(cacheKey, html); } catch(e) {}
  renderReport(html);

  // Then optionally enrich with a tiny AI call for the coach voice paragraph
  enrichReportAsync(profile, cacheKey);
}

function buildReportHTML(p) {
  const isFemale = (p.sex||'').toLowerCase() === 'female';
  const age = p.age || 35;
  const injuries = p.injuryAssessments || p.injuries || [];
  const supps = p.supplements || [];
  const weekPlan = p.weekPlan || [];
  const trainDays = weekPlan.filter(d=>d.priority==='training');
  const restDays  = weekPlan.filter(d=>d.priority!=='training');
  const bmr = isFemale
    ? 10*(p.weight||70)+6.25*(p.height||165)-5*age-161
    : 10*(p.weight||80)+6.25*(p.height||175)-5*age+5;
  const actBonus = (p.activityLevel||'').includes('physical')?0.1:(p.activityLevel||'').includes('feet')?0.05:0;
  const tdee = Math.round(bmr*((( p.trainingDays||4)<=3?1.55:(p.trainingDays||4)<=5?1.65:1.725)+actBonus));
  const deficit = tdee - (p.calories||tdee);

  const injSection = injuries.length ? injuries.map(inj => `
    <div style="margin-bottom:16px;padding:14px 16px;background:rgba(200,148,30,0.05);border-left:3px solid var(--gold-br,rgba(200,148,30,0.3));border-radius:0 4px 4px 0;">

      ${inj.safeAlternatives&&inj.safeAlternatives.length?`<div style="font-size:12px;font-weight:300;color:var(--jade);margin-top:4px;">Safe: ${inj.safeAlternatives.join(', ')}</div>`:''}

  const suppSection = supps.map(s => `
    <div style="display:grid;grid-template-columns:160px 1fr;gap:8px;padding:10px 0;border-bottom:1px solid var(--bd);">
      <div style="font-size:13px;font-weight:500;color:var(--dk-1);">${s.name} <span style="font-weight:300;color:var(--dk-3);">${s.dose}</span></div>

  const weekGrid = weekPlan.map(day => {
    const isTrain = day.priority==='training';
    return `<div style="background:var(--ink-2);border:1px solid var(--bd);${isTrain?'border-top:3px solid var(--jade);':''}border-radius:4px;padding:10px 8px;text-align:center;">

    </div>`;

  return `

      <div style="font-size:10px;font-weight:600;letter-spacing:0.18em;text-transform:uppercase;color:var(--jade);margin-bottom:8px;">Coach's assessment</div>

      ${(p.trainingModifications && p.trainingModifications.length) ? `
      <div style="height:1px;background:var(--bd);margin-bottom:24px;"></div>
      <div style="font-size:9px;font-weight:600;letter-spacing:0.16em;text-transform:uppercase;color:var(--jade);margin-bottom:14px;">Ongoing training modifications</div>
      <div style="font-size:11px;font-weight:300;color:var(--dk-3);margin-bottom:10px;line-height:1.6;">Added via coach chat — appended to the base programme, not replacing it.</div>
      ${(p.trainingModifications||[]).map(mod => `
        <div style="padding:10px 14px;background:var(--ink-2);border:1px solid var(--bd);border-left:3px solid var(--jade);border-radius:0 4px 4px 0;margin-bottom:7px;">
          <div style="font-size:12px;font-weight:400;color:var(--dk-1);">${mod.note}</div>
          <div style="font-size:10px;font-weight:300;color:var(--dk-3);margin-top:3px;">${mod.date||''}</div>
        </div>`).join('')}
      ` : ''}

      <div style="margin-top:28px;display:flex;gap:8px;flex-wrap:wrap;">
        <button id="regen-report-btn" onclick="generateReport(true)"
          style="background:transparent;border:1px solid var(--bd);color:var(--dk-3);padding:7px 16px;border-radius:20px;font-size:10px;cursor:pointer;font-family:var(--sans);letter-spacing:0.04em;">
          ↺ Refresh with AI voice
        </button>
      </div>
    </div>`;
}

async function enrichReportAsync(p, cacheKey) {
  // Small API call just to get a personalised coach opening paragraph
  try {
    const isFemale = (p.sex||'').toLowerCase() === 'female';
    const age = p.age || 35;
    const injuries = p.injuryAssessments || p.injuries || [];
    const prompt = `You are a senior performance coach. Write ONE paragraph (3-4 sentences) as a personal opening for ${p.name}'s coaching report. 
Profile: ${age||p.age}yo ${p.sex}, ${p.weight}kg, goal: ${p.goal}. Training: ${p.trainingDays} days/week. ${injuries.length ? 'Injuries: '+injuries.map(i=>i.location||i).join(', ')+'. ' : ''}Calories: ${p.calories}, protein: ${p.protein}g.
${p.coachSummary ? 'Expand on: '+p.coachSummary : ''}
Be direct and specific. Reference their actual numbers. No hollow affirmations. Serif coaching voice.`;

    const res = await fetch('/api/chat', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        model:'claude-sonnet-4-20250514', max_tokens:180,
        system:'You are a performance coach. Write exactly one paragraph, no headers, no bullets.',
        messages:[{role:'user',content:prompt}]
      })
    });
    if (!res.ok) return;
    const data = await res.json();
    const text = (data.content||[]).map(b=>b.text||'').join('').trim();
    if (!text) return;

    // Slot into the existing rendered report
    const voiceEl = document.getElementById('coach-voice-text');
    if (voiceEl) voiceEl.textContent = text;

    // Update cache with enriched version
    try {
      const cached = localStorage.getItem(cacheKey);
      if (cached) {
        const updated = cached.replace(p.coachSummary||'Programme built and calibrated to your specific profile.', text);
        localStorage.setItem(cacheKey, updated);
      }
    } catch(e) {}
  } catch(e) {
    // Fail silently — report already rendered with coachSummary
  }
}


function renderReport(html) {
  const container = document.getElementById('report-content');
  if (!container) return;

  // The coachreport renderer returns formatted HTML
  // But we also need to handle raw text from the model
  // Wrap it nicely
  container.innerHTML = `
    <div class="report-shell">
      ${html}
    </div>`;
}

async function regenBrief() {
  const btn = document.getElementById('regen-brief-btn');
  if (btn) { btn.textContent = 'Generating…'; btn.disabled = true; }

  const isFemale = (profile.sex||'').toLowerCase() === 'female';
  const injuries = profile.injuryAssessments || [];
  const supps    = profile.supplements || [];
  const weekPlan = profile.weekPlan || [];
  const trainingDays = weekPlan.filter(d=>d.priority==='training').map(d=>d.day).join(', ');

  try {
    const res = await fetch('/api/chat', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:2500,
        system:'You are a senior performance coach writing a personalised coaching brief. Be direct, specific, and personal.',
        messages:[{ role:'user', content:`Write a complete coaching brief document for ${profile.name}.

PROFILE:
${profile.name}, ${profile.age}yo ${profile.sex}, ${profile.height}cm, ${profile.weight}kg
Goal: ${profile.goal} | Target: ${profile.target||'—'}
Calories: ${profile.calories} kcal | Protein: ${profile.protein}g | Carbs: ${profile.carbs}g | Fat: ${profile.fat}g
Training: ${profile.trainingDays} days/week (${trainingDays}) | Wake: ${profile.wakeTime}
Eating window: ${profile.fastingWindow||profile.eatingWindow||'flexible'}
Diet: ${profile.dietType} | Exclusions: ${(profile.foodExclusions||[]).join(', ')||'none'}
Trigger foods: ${profile.triggerFoods||'none'}
Equipment: ${(profile.equipmentUsed||[]).join(', ')||profile.gymAccess||'—'}
Free weight comfort: ${profile.freeWeightComfort||'—'}
Training time: ${profile.trainingTime||'—'}
Activity level: ${profile.activityLevel||'—'}
Injuries: ${injuries.length ? injuries.map(i=>i.location+': '+i.assessment).join('; ') : 'none'}
Non-negotiables: ${(profile.nonNegotiables||[]).join(', ')||'none'}
${isFemale && profile.menstrualCycle ? 'Cycle: '+profile.menstrualCycle : ''}
${isFemale ? 'FEMALE — all content must reflect female physiology.' : 'MALE — reflect male physiology.'}

Write sections: Workout Objective, Goals, Approach, Current Baseline, Injuries, Food Philosophy, Meal Rhythm, Supplement Stack, Efficiency Rule. Direct, specific, personalised prose.` }],
      })
    });
    const data = await res.json();
    const text = data.content?.map(b=>b.text||'').join('')||'';
    if (!text) throw new Error('Empty response');
    profile.instructions = text;
    localStorage.setItem('bl_profile', JSON.stringify(profile));
    if (btn) { btn.textContent = '✓ Done'; btn.disabled = false; }
    setTimeout(() => location.reload(), 600);
  } catch(e) {
    console.error(e);
    if (btn) { btn.textContent = 'Error — try again'; btn.disabled = false; }
  }
}
</script>
<script src="coach.js"></script>
