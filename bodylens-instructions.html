<style>
body { background:var(--ink); color:var(--dk-1); }
.page { max-width:860px; margin:0 auto; padding:0 32px 100px; }

/* Hero */
.ins-hero {
  padding:48px 0 36px;
  border-bottom:1px solid var(--bd);
  margin-bottom:0;
  display:flex; justify-content:space-between; align-items:flex-end; gap:24px;
}
.ins-kicker { font-size:10px; font-weight:600; letter-spacing:0.2em; text-transform:uppercase; color:var(--jade); margin-bottom:10px; display:flex; align-items:center; gap:10px; }
.ins-kicker::before { content:''; width:18px; height:1px; background:var(--jade); }
.ins-title { font-family:var(--serif); font-size:52px; font-weight:300; line-height:0.93; letter-spacing:-0.025em; color:var(--dk-1); margin-bottom:10px; }
.ins-title em { font-style:italic; color:var(--dk-3); }
.ins-meta { font-size:12px; font-weight:300; color:var(--dk-3); }

/* Tabs */
.ins-tabs {
  display:flex; gap:0; border-bottom:1px solid var(--bd);
  margin-bottom:36px; overflow-x:auto;
  position:sticky; top:60px; background:rgba(12,16,16,0.97);
  backdrop-filter:blur(8px); z-index:50; padding-top:4px;
}
.ins-tab {
  font-size:11px; font-weight:600; letter-spacing:0.08em; text-transform:uppercase;
  padding:13px 20px; border:none; background:transparent;
  color:var(--dk-3); cursor:pointer; font-family:var(--sans);
  border-bottom:2px solid transparent; margin-bottom:-1px;
  white-space:nowrap; transition:all 0.12s; flex-shrink:0;
}
.ins-tab:hover { color:var(--dk-2); }
.ins-tab.active { color:var(--jade); border-bottom-color:var(--jade); }

.ins-pane { display:none; padding-top:8px; }
.ins-pane.active { display:block; }

/* Report styles */
.report-shell { max-width:680px; }

.report-section {
  margin-bottom:44px;
  padding-bottom:44px;
  border-bottom:1px solid var(--bd);
}
.report-section:last-child { border-bottom:none; }

.report-sec-label {
  font-size:9px; font-weight:600; letter-spacing:0.18em;
  text-transform:uppercase; color:var(--jade);
  margin-bottom:14px;
  display:flex; align-items:center; gap:10px;
}
.report-sec-label::after { content:''; flex:1; height:1px; background:var(--bd); }
.report-sec-label.amber { color:var(--amber); }
.report-sec-label.gold  { color:var(--gold); }
.report-sec-label.red   { color:var(--red); }
.report-sec-label.slate { color:var(--dk-2); }

.report-body {
  font-size:15px; font-weight:300; color:var(--dk-2);
  line-height:1.9; margin-bottom:14px;
}
.report-body strong { color:var(--dk-1); font-weight:500; }
.report-body em { color:var(--jade); font-style:italic; }

.report-body p { margin-bottom:14px; }
.report-body p:last-child { margin-bottom:0; }

/* Quick stats sidebar card */
.ins-sidebar {
  float:right; width:240px; margin:0 0 24px 28px;
  background:var(--ink-2); border:1px solid var(--jade-br);
  border-radius:6px; overflow:hidden;
}
.ins-sidebar-head {
  padding:12px 16px; background:var(--ink-1);
  border-bottom:1px solid var(--bd);
  font-size:9px; font-weight:600; letter-spacing:0.12em;
  text-transform:uppercase; color:var(--jade);
}
.ins-sidebar-row {
  display:flex; justify-content:space-between; align-items:baseline;
  padding:8px 16px; border-bottom:1px solid var(--bd);
  font-size:11px; gap:8px;
}
.ins-sidebar-row:last-child { border-bottom:none; }
.ins-sidebar-label { font-weight:400; color:var(--dk-3); }
.ins-sidebar-val   { font-weight:500; color:var(--dk-1); }
.ins-sidebar-val.jade { color:var(--jade); }

/* Data tab */
.data-grid {
  display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:24px;
}
.data-card {
  background:var(--ink-2); border:1px solid var(--bd); border-radius:6px;
  overflow:hidden;
}
.data-card.full { grid-column:1/-1; }
.data-card.jade  { border-top:2px solid var(--jade); }
.data-card.amber { border-top:2px solid var(--amber); }
.data-card.gold  { border-top:2px solid var(--gold); }
.data-card-head {
  padding:11px 16px; background:var(--ink-1);
  border-bottom:1px solid var(--bd);
  font-size:10px; font-weight:600; letter-spacing:0.08em;
  text-transform:uppercase;
}
.data-card.jade  .data-card-head { color:var(--jade); }
.data-card.amber .data-card-head { color:var(--amber); }
.data-card.gold  .data-card-head { color:var(--gold); }
.data-row {
  display:flex; justify-content:space-between; align-items:baseline;
  padding:9px 16px; border-bottom:1px solid var(--bd);
  font-size:12px; gap:12px;
}
.data-row:last-child { border-bottom:none; }
.data-label { font-weight:400; color:var(--dk-3); flex-shrink:0; }
.data-val   { font-weight:500; color:var(--dk-1); text-align:right; line-height:1.4; }
.data-val.jade { color:var(--jade); }
.data-val.amber { color:var(--amber); }
.data-val.red   { color:var(--red); }

/* Macro strip */
.macro-strip {
  display:grid; grid-template-columns:repeat(4,1fr);
  gap:1px; background:var(--bd); border-radius:6px;
  overflow:hidden; margin-bottom:12px;
}
.macro-cell { background:var(--ink-2); padding:14px 10px; text-align:center; }
.macro-val  { font-family:var(--mono); font-size:22px; font-weight:500; color:var(--jade); line-height:1; margin-bottom:3px; }
.macro-val.amber { color:var(--amber); }
.macro-val.slate { color:var(--dk-2); }
.macro-label { font-size:9px; font-weight:600; letter-spacing:0.1em; text-transform:uppercase; color:var(--dk-3); }

/* Actions */
.ins-actions { display:flex; gap:8px; flex-wrap:wrap; margin-top:28px; padding-top:20px; border-top:1px solid var(--bd); }
.ins-btn {
  padding:9px 18px; background:transparent;
  border:1px solid var(--bd-2); border-radius:4px;
  font-family:var(--sans); font-size:10px; font-weight:600;
  letter-spacing:0.08em; text-transform:uppercase;
  color:var(--dk-3); cursor:pointer; transition:all 0.15s;
}
.ins-btn:hover { color:var(--jade); border-color:var(--jade-br); }
.ins-btn.jade  { background:var(--jade); border-color:var(--jade); color:var(--ink); }
.ins-btn.red   { color:var(--red); border-color:var(--red-br); }

/* No profile */
.no-profile { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:60vh; text-align:center; padding:48px; gap:14px; }
.no-profile h2 { font-family:var(--serif); font-size:30px; font-weight:300; }
.no-profile p  { font-size:14px; font-weight:300; color:var(--dk-2); max-width:360px; line-height:1.7; }
.no-profile a  { display:inline-block; padding:12px 28px; background:var(--jade); border-radius:6px; font-size:13px; font-weight:600; letter-spacing:0.06em; text-transform:uppercase; color:var(--ink); text-decoration:none; }

@media(max-width:700px){
  .ins-hero { flex-direction:column; gap:12px; }
  .ins-sidebar { float:none; width:100%; margin:0 0 20px 0; }
  .data-grid { grid-template-columns:1fr; }
  .data-card.full { grid-column:1; }
  .page { padding:0 16px 80px; }
  .ins-title { font-size:38px; }
  .macro-strip { grid-template-columns:repeat(2,1fr); }
}

/* ── LOGIC TAB ───────────────────────────────── */
.logic-page { padding:0 0 40px; }

.logic-hero { background:rgba(0,200,160,0.03); border:1px solid rgba(0,200,160,0.14); border-radius:8px; padding:20px 24px; margin-bottom:28px; }
.logic-hero-title { font-size:16px; font-weight:600; color:var(--dk-1); margin-bottom:8px; }
.logic-hero-text { font-size:13px; font-weight:300; color:var(--dk-2); line-height:1.8; }

.logic-section { margin-bottom:24px; }
.logic-block-ctx { margin-bottom:24px; }
.logic-sec-label { font-size:9px; font-weight:700; letter-spacing:0.18em; text-transform:uppercase; color:var(--dk-3); margin-bottom:10px; display:flex; align-items:center; gap:10px; }
.logic-sec-label::after { content:''; flex:1; height:1px; background:var(--bd); }

.logic-card { background:var(--ink-2); border:1px solid var(--bd); border-radius:8px; margin-bottom:8px; overflow:hidden; transition:border-color 0.15s; }
.logic-card:hover { border-color:rgba(0,200,160,0.2); }
.logic-card-head { display:flex; align-items:center; gap:10px; padding:14px 16px; cursor:pointer; }
.logic-card.open .logic-card-head { background:rgba(0,200,160,0.03); border-bottom:1px solid var(--bd); }
.logic-card-icon { font-size:18px; flex-shrink:0; }
.logic-card-title { flex:1; font-size:14px; font-weight:500; color:var(--dk-1); line-height:1.4; }
.logic-chevron { font-size:10px; color:var(--dk-3); flex-shrink:0; transition:transform 0.18s; }
.logic-card.open .logic-chevron { transform:rotate(180deg); }
.logic-card-body { display:none; padding:16px 18px; }
.logic-card.open .logic-card-body { display:block; }

.logic-chain { display:flex; flex-direction:column; gap:0; margin-bottom:14px; }
.logic-chain-row { display:grid; grid-template-columns:160px 1fr; gap:12px; padding:8px 0; border-bottom:1px solid var(--bd); align-items:baseline; }
.logic-chain-row:last-child { border-bottom:none; }
.logic-chain-label { font-size:11px; font-weight:500; color:var(--dk-3); }
.logic-chain-val { font-size:13px; font-weight:300; color:var(--dk-2); line-height:1.6; }

.logic-science { background:var(--ink-1); border-left:2px solid rgba(74,143,168,0.4); padding:10px 14px; border-radius:0 4px 4px 0; margin-bottom:12px; }
.logic-science-label { font-size:8px; font-weight:700; letter-spacing:0.12em; text-transform:uppercase; color:#4a8fa8; margin-bottom:5px; }
.logic-science-text { font-size:11px; font-weight:300; color:var(--dk-3); line-height:1.75; }

.logic-edit-zone { margin-top:10px; }
.logic-edit-btn { background:transparent; border:1px solid var(--bd); color:var(--dk-3); border-radius:4px; padding:6px 14px; font-size:11px; font-weight:500; cursor:pointer; font-family:var(--sans); transition:all 0.12s; }
.logic-edit-btn:hover { border-color:var(--amber-br); color:var(--amber); }
.logic-edit-form { margin-top:10px; padding:14px; background:var(--ink-1); border:1px solid var(--bd); border-radius:6px; }
.logic-edit-note { font-size:11px; font-weight:300; color:var(--dk-3); line-height:1.65; margin-bottom:10px; }
.logic-edit-row { display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
.logic-edit-input { background:var(--ink-2); border:1px solid var(--bd); border-radius:5px; padding:8px 12px; font-size:13px; font-family:var(--mono); color:var(--dk-1); outline:none; width:140px; transition:border-color 0.12s; }
.logic-edit-input:focus { border-color:rgba(0,200,160,0.4); }
.logic-edit-save { background:var(--jade); border:none; color:var(--ink); border-radius:5px; padding:8px 16px; font-size:11px; font-weight:700; cursor:pointer; font-family:var(--sans); letter-spacing:0.04em; }
.logic-edit-cancel { background:transparent; border:1px solid var(--bd); color:var(--dk-3); border-radius:5px; padding:8px 12px; font-size:11px; cursor:pointer; font-family:var(--sans); }
.logic-edit-result { margin-top:8px; font-size:12px; font-weight:300; line-height:1.65; }
</style>
</head>

<script>
const profile = getProfile();

// ── RECOVERY: build report from whatever data exists ──────────────

async function rebuildFromFormBackup(formData) {
  const resultEl = document.getElementById('scrap-result');
  // Build the same prompt as onboarding
  const lines = [];
  if (formData.name)       lines.push('Name: ' + formData.name);
  if (formData.age)        lines.push('Age: ' + formData.age);
  if (formData.sex)        lines.push('Sex: ' + formData.sex);
  if (formData.height)     lines.push('Height: ' + formData.height + 'cm');
  if (formData.weight)     lines.push('Weight: ' + formData.weight + 'kg');
  if (formData.goal)       lines.push('Goal: ' + formData.goal);
  if (formData.days)       lines.push('Training days: ' + formData.days);
  if (formData.gym)        lines.push('Gym access: ' + formData.gym);
  if (formData.exp)        lines.push('Experience: ' + formData.exp);
  if (formData.diet)       lines.push('Diet: ' + formData.diet);
  if (formData.sleep)      lines.push('Sleep: ' + formData.sleep);
  if (formData.wake)       lines.push('Wake time: ' + formData.wake);
  if (formData.stress)     lines.push('Stress: ' + formData.stress);
  if (formData.injuries && formData.injuries.length) lines.push('Injuries: ' + formData.injuries.join(', '));
  if (formData.chatContext) lines.push('Follow-up context: ' + formData.chatContext.slice(0, 500));

  const prompt = `You are a senior performance coach. Rebuild a complete personalised programme from this saved questionnaire data.

${lines.join('\n')}

Return ONLY a valid JSON object with this exact structure:
{
  "profile": {
    "goal": "derived primary goal",
    "calories": 0, "protein": 0, "carbs": 0, "fat": 0, "tdee": 0,
    "trainingKcal": 0,
    "restKcal": 0,
    "calorieReasoning": "2-3 sentences",
    "proteinReasoning": "1-2 sentences",
    "mealCount": 4,
    "keyFoodPrinciples": ["principle 1", "principle 2", "principle 3"],
    "foodsToAvoid": [],
    "triggerStrategy": "one sentence"
  },
  "weekPlan": [
    {"day":"Monday","type":"Push","focus":"Chest, shoulders, triceps","kcal":0,"priority":"training","keyExercises":["Bench press 4x8-10","OHP 3x10","Lateral raise 3x15"],"modifications":[],"coachNote":"one sentence"},
    {"day":"Tuesday","type":"Rest","focus":"Recovery","kcal":0,"priority":"rest","keyExercises":[],"modifications":[],"coachNote":"one sentence"},
    {"day":"Wednesday","type":"Pull","focus":"Back, biceps","kcal":0,"priority":"training","keyExercises":["Pull-ups 4x6","Row 3x10"],"modifications":[],"coachNote":"one sentence"},
    {"day":"Thursday","type":"Rest","focus":"Recovery","kcal":0,"priority":"rest","keyExercises":[],"modifications":[],"coachNote":"one sentence"},
    {"day":"Friday","type":"Legs","focus":"Quads, glutes, hamstrings","kcal":0,"priority":"training","keyExercises":["Squat 4x8","RDL 3x10","Leg press 3x12"],"modifications":[],"coachNote":"one sentence"},
    {"day":"Saturday","type":"Upper","focus":"Full upper body","kcal":0,"priority":"training","keyExercises":["OHP 4x8","Row 3x10","Arms"],"modifications":[],"coachNote":"one sentence"},
    {"day":"Sunday","type":"Rest","focus":"Full rest","kcal":0,"priority":"rest","keyExercises":[],"modifications":[],"coachNote":"one sentence"}
  ],
  "supplements": [
    {"name":"Creatine monohydrate","dose":"5g","timing":"Daily","reason":"one sentence"},
    {"name":"Omega-3","dose":"2-3g","timing":"With largest meal","reason":"one sentence"},
    {"name":"Vitamin D3","dose":"3000IU","timing":"With fat meal","reason":"one sentence"},
    {"name":"Magnesium glycinate","dose":"400mg","timing":"30min before sleep","reason":"one sentence"}
  ],
  "injuries": [],
  "weeklyProgression": {
    "week1": {"phase":"Foundation","focus":"Learn the patterns, establish baseline loads","volumeNote":"Lower volume, technique priority","keyFocus":"one sentence","rpe":"6-7","sets":"3 working sets per primary lift","mealStrategy":"Protein priority, moderate carbs. Establish eating rhythm.","nutritionFocus":"Hit protein target every day. Carbs at training window only."},
    "week2": {"phase":"Build","focus":"Add volume and load","volumeNote":"+10-15% sets","keyFocus":"one sentence","rpe":"7-8","sets":"4 working sets per primary lift","mealStrategy":"Increase carbs on training days. Pre-train meal critical.","nutritionFocus":"Pre-train carbs elevated. Post-train window within 30 min."},
    "week3": {"phase":"Peak","focus":"Highest intensity","volumeNote":"RPE 8-9 on primary lifts","keyFocus":"one sentence","rpe":"8-9","sets":"4-5 working sets, top set AMRAP","mealStrategy":"Maximum carb availability on training days. Aggressive fuelling.","nutritionFocus":"Highest carb intake of the block on training days. Sleep extended if possible."},
    "week4": {"phase":"Deload","focus":"50% volume, maintain load","volumeNote":"Active recovery","keyFocus":"one sentence","rpe":"5-6","sets":"2 working sets, technique focus","mealStrategy":"Return to maintenance calories. Anti-inflammatory foods priority.","nutritionFocus":"Omega-3, fibre, polyphenols. Let the adaptation consolidate."}
  },
  "fourWeekPlan": {
    "week1": {
      "phase": "Foundation",
      "trainingDays": {
        "Monday": {"exercises":[{"name":"Bench press","sets":"3x10","rpe":"7","cue":"Control the descent, 2 sec down"},{"name":"OHP","sets":"3x10","rpe":"6","cue":"Brace hard, no lower back arch"},{"name":"Lateral raise","sets":"3x15","rpe":"7","cue":"Lead with the elbow"}],"gymTime":55,"focus":"Establish movement patterns"},
        "Wednesday": {"exercises":[{"name":"Pull-ups","sets":"3x6-8","rpe":"7","cue":"Full dead hang, chin over bar"},{"name":"Barbell row","sets":"3x10","rpe":"7","cue":"Horizontal pull, chest to bar"},{"name":"Face pull","sets":"3x15","rpe":"6","cue":"External rotation, high elbow"}],"gymTime":55,"focus":"Upper back and pull mechanics"},
        "Friday": {"exercises":[{"name":"Squat","sets":"3x10","rpe":"7","cue":"Brace, sit back, drive through heels"},{"name":"RDL","sets":"3x10","rpe":"7","cue":"Hinge not squat, feel the hamstring load"},{"name":"Leg press","sets":"3x12","rpe":"6","cue":"Full range, controlled negative"}],"gymTime":60,"focus":"Posterior chain baseline"},
        "Saturday": {"exercises":[{"name":"Shoulder press","sets":"3x10","rpe":"7","cue":"Seated or standing, neutral spine"},{"name":"Cable row","sets":"3x12","rpe":"6","cue":"Squeeze at end range"},{"name":"Bicep curl","sets":"3x12","rpe":"7","cue":"Supinate at top"}],"gymTime":50,"focus":"Upper body volume"}
      },
      "mealTheme": "Establish baseline. Hit protein every day without exception. Carbs moderate, timed around training.",
      "keyNutritionRules": ["Protein with every meal", "Carbs in pre and post-training window", "Consistent meal timing sets ghrelin"]
    },
    "week2": {
      "phase": "Build",
      "trainingDays": {
        "Monday": {"exercises":[{"name":"Bench press","sets":"4x8","rpe":"8","cue":"Tuck the elbows, leg drive"},{"name":"Incline DB press","sets":"3x10","rpe":"7","cue":"Stretch at bottom, press to full extension"},{"name":"OHP","sets":"3x8","rpe":"8","cue":"Add load from week 1"},{"name":"Lateral raise","sets":"4x12","rpe":"8","cue":"Slow eccentric"}],"gymTime":65,"focus":"Volume increase, load progression"},
        "Wednesday": {"exercises":[{"name":"Pull-ups","sets":"4x6","rpe":"8","cue":"Add load if bodyweight felt easy"},{"name":"Barbell row","sets":"4x8","rpe":"8","cue":"10% more load than week 1"},{"name":"Face pull","sets":"3x15","rpe":"7","cue":"Maintain quality"},{"name":"Hammer curl","sets":"3x12","rpe":"7","cue":"Brachialis emphasis"}],"gymTime":65,"focus":"Back volume and load"},
        "Friday": {"exercises":[{"name":"Squat","sets":"4x8","rpe":"8","cue":"Heavier than week 1"},{"name":"RDL","sets":"4x8","rpe":"8","cue":"Hinge deep, full stretch"},{"name":"Hip thrust","sets":"3x12","rpe":"7","cue":"Full hip extension at top"},{"name":"Leg curl","sets":"3x12","rpe":"7","cue":"Slow eccentric, hold at top"}],"gymTime":70,"focus":"Posterior chain volume"},
        "Saturday": {"exercises":[{"name":"Shoulder press","sets":"4x8","rpe":"8","cue":"Add load"},{"name":"Weighted pull-ups","sets":"3x6","rpe":"8","cue":"Add weight or more reps"},{"name":"Chest-supported row","sets":"3x10","rpe":"7","cue":"Eliminate momentum"},{"name":"Tricep pushdown","sets":"3x15","rpe":"7","cue":"Squeeze the tricep"}],"gymTime":60,"focus":"Upper body load increase"}
      },
      "mealTheme": "Pre-train carbs elevated. The training is harder — the fuel needs to match.",
      "keyNutritionRules": ["Pre-train meal 90 min before: protein + carbs", "Post-train window: fast protein within 30 min", "Rest day carbs reduced by 20%"]
    },
    "week3": {
      "phase": "Peak",

async function tryRebuildFromScraps() {
  const resultEl = document.getElementById('scrap-result');
  if (resultEl) resultEl.innerHTML = 'Searching localStorage for any saved data…';
  
  // Gather every bl_ key from localStorage
  const keys = [];
  for (let i = 0; i < localStorage.length; i++) {
    const k = localStorage.key(i);
    if (k && (k.startsWith('bl_') || k.startsWith('dayplan'))) keys.push(k);
  }
  if (resultEl) resultEl.innerHTML = `Found ${keys.length} BodyLens keys. Looking for profile data…`;

  // Check for formdata backup first — most complete recovery source
  let formBackup = null;
  try {
    const fb = localStorage.getItem('bl_formdata_backup');
    if (fb) formBackup = JSON.parse(fb);
  } catch(e) {}

  if (formBackup && (formBackup.name || formBackup.goal)) {
    if (resultEl) resultEl.innerHTML = `Found your questionnaire answers (saved ${formBackup.savedAt ? new Date(formBackup.savedAt).toLocaleDateString() : 'earlier'}). Rebuilding your full programme now — this takes about 30 seconds…`;
    // Trigger a full rebuild using the saved form data
    await rebuildFromFormBackup(formBackup);
    return;
  }
  
  // Try to find any profile fragment
  let found = null;
  for (const key of keys) {
    try {
      const val = JSON.parse(localStorage.getItem(key) || 'null');
      if (val && (val.name || val.goal || val.calories)) {
        found = val;
        break;
      }
    } catch(e) {}
  }
  
  if (found && found.name) {
    if (resultEl) resultEl.innerHTML = `Found profile for "${found.name}". Rebuilding report…`;
    // Fill in any missing defaults so the report renders
    const recovered = {
      name: found.name || 'You',
      age: found.age || '—',
      sex: found.sex || '—',
      weight: found.weight || '—',
      height: found.height || '—',
      goal: found.goal || 'General fitness',
      calories: found.calories || 0,
      protein: found.protein || 0,
      carbs: found.carbs || 0,
      fat: found.fat || 0,
      trainingDays: found.trainingDays || 4,
      weekPlan: found.weekPlan || [],
      supplements: found.supplements || [],
      injuries: found.injuries || [],
      coachSummary: found.coachSummary || '',
      instructions: found.instructions || '',
      experience: found.experience || '—',
      generatedAt: found.generatedAt || new Date().toISOString(),
      ...found
    };
    localStorage.setItem('bl_profile', JSON.stringify(recovered));
    setTimeout(() => location.reload(), 800);
    return;
  }
  
  // No profile found — offer to rebuild via AI from raw text if they have it
  if (resultEl) resultEl.innerHTML = `No profile data found in this browser. You'll need to re-do the onboarding — it takes about 5 minutes and the follow-up chat means you won't need to fill in everything manually again.`;
}

async function buildReportFromScratch(btn) {
  if (btn) { btn.disabled = true; btn.textContent = 'Building your report…'; }
  const container = document.getElementById('report-content');
  if (!container) return;

  // Step 1: Render immediately from JS — instant, no API
  const cacheKey = 'bl_report_v2_' + profile.name + '_' + (profile.generatedAt||'').slice(0,10);
  const html = buildReportHTML(profile);
  try { localStorage.setItem(cacheKey, html); } catch(e) {}
  renderReport(html);

  // Step 2: If profile is missing coachSummary or instructions, regenerate via API
  const needsRegen = !profile.coachSummary || !profile.instructions || profile.calories === 0;
  if (needsRegen) {
    // Update UI to show we're enriching
    const statusEl = document.createElement('div');
    statusEl.id = 'report-status';
    statusEl.style.cssText = 'padding:12px 0;font-size:11px;font-weight:300;color:var(--jade);display:flex;align-items:center;gap:8px;';
    statusEl.innerHTML = '<div style="width:14px;height:14px;border:2px solid rgba(0,200,160,0.3);border-top-color:var(--jade);border-radius:50%;animation:spin 0.8s linear infinite;flex-shrink:0;"></div> Generating your coaching summary and calibrations…';
    if (container) container.insertAdjacentElement('afterend', statusEl);

    try {
      const res = await fetch('/api/chat', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({
          model:'claude-sonnet-4-20250514', max_tokens:600,
          system:'You are a senior performance coach. Return only valid JSON.',
          messages:[{role:'user', content: buildRegenPrompt(profile)}]
        })
      });
      const data = await res.json();
      const text = (data.content||[]).map(b=>b.text||'').join('').trim();
      const match = text.match(/\{[\s\S]*\}/);
      if (match) {
        const regen = JSON.parse(match[0]);
        // Merge into profile and save
        try {
          const raw = localStorage.getItem('bl_profile');
          if (raw) {
            const p = JSON.parse(raw);
            if (regen.coachSummary)  { p.coachSummary  = regen.coachSummary;  profile.coachSummary  = regen.coachSummary;  }
            if (regen.instructions)  { p.instructions  = regen.instructions;  profile.instructions  = regen.instructions;  }
            if (regen.calories && !p.calories) { p.calories = regen.calories; profile.calories = regen.calories; }
            if (regen.protein  && !p.protein)  { p.protein  = regen.protein;  profile.protein  = regen.protein;  }
            if (regen.carbs    && !p.carbs)    { p.carbs    = regen.carbs;    profile.carbs    = regen.carbs;    }
            if (regen.fat      && !p.fat)      { p.fat      = regen.fat;      profile.fat      = regen.fat;      }
            if (regen.trainingKcal) { p.trainingKcal = regen.trainingKcal; profile.trainingKcal = regen.trainingKcal; }
            if (regen.restKcal)     { p.restKcal     = regen.restKcal;     profile.restKcal     = regen.restKcal;     }
            // Backfill if not provided
            if (!p.trainingKcal && p.calories) p.trainingKcal = p.calories;
            if (!p.restKcal && p.calories) p.restKcal = Math.round(p.calories * 0.90);
            if (regen.weekPlan && (!p.weekPlan || !p.weekPlan.length)) {
              p.weekPlan = regen.weekPlan; profile.weekPlan = regen.weekPlan;
            }
            localStorage.setItem('bl_profile', JSON.stringify(p));
          }
        } catch(e) {}
        // Re-render with new data
        const freshHtml = buildReportHTML(profile);
        try { localStorage.setItem(cacheKey, freshHtml); } catch(e) {}
        renderReport(freshHtml);
      }
    } catch(e) {
      console.error('Report regen error:', e);
    }
    const st = document.getElementById('report-status');
    if (st) st.remove();
  }

  // Step 3: AI voice enrichment (coach opening paragraph)
  enrichReportAsync(profile, cacheKey);
  if (btn) { btn.style.display = 'none'; }
}

async function generateCoachSummary(p) {
  try {

      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514', max_tokens: 200,
        system: 'You are a performance coach. Write a brief coaching summary. Be direct and specific.',
        messages: [{role:'user', content: `Write a 3-4 sentence coaching summary for ${p.name}: ${p.age}yo ${p.sex}, ${p.weight}kg, goal: ${p.goal}. Calories: ${p.calories||'?'}, protein: ${p.protein||'?'}g. Training ${p.trainingDays||4} days/week. Injuries: ${(p.injuryAssessments||p.injuries||[]).map(i=>i.location||i).join(', ')||'none'}. What's the biggest lever and what will make or break their progress?`}]

    });

function buildLogicTab(p) {
  const isFemale = (p.sex||'').toLowerCase() === 'female';
  const age      = p.age || 35;
  const w        = p.weight || 80;
  const h        = p.height || (isFemale ? 165 : 175);
  const bmr      = isFemale
    ? Math.round(10*w + 6.25*h - 5*age - 161)
    : Math.round(10*w + 6.25*h - 5*age + 5);
  const actStr   = (p.activityLevel||'').toLowerCase();
  const actMult  = actStr.includes('sedentary')||actStr.includes('desk') ? 1.25
                 : actStr.includes('lightly')||actStr.includes('some walk') ? 1.375
                 : actStr.includes('very active')||actStr.includes('physical') ? 1.80
                 : 1.55;
  const tdee     = p.tdee || Math.round(bmr * actMult);
  const deficit  = tdee - (p.calories || tdee);
  const fitnessLevel = p.fitnessLevel !== undefined ? Math.round(p.fitnessLevel*100) : null;
  const fitnessLabel = p.fitnessLevelLabel || null;
  const trainMods    = p.trainingModifications || [];
  const weekProg     = p.weeklyProgression || {};
  const blockNum     = p.blockNumber || 1;
  const injuries     = p.injuryAssessments || p.injuries || [];

  // ── DECISION LOG items ──
  const decisions = [];

  // Calorie decision
  const defStr = deficit > 50  ? `${deficit} kcal/day deficit — ~${(deficit*7/7700).toFixed(1)}kg/week loss`
               : deficit < -50 ? `${Math.abs(deficit)} kcal/day surplus — muscle gain phase`
               : 'maintenance';
  decisions.push({
    icon:'🔢', title:'Why ' + (p.calories||'?') + ' kcal?',
    category:'Nutrition',
    chain: [
      { label:'Formula', val:'Mifflin-St Jeor (most validated for general population)', type:'info' },
      { label:'BMR result', val:`${bmr} kcal — what you burn completely at rest`, type:'calc' },
      { label:'Activity multiplier', val:`${actMult}× (${actStr||'moderate activity'}  )`, type:'calc' },
      { label:'TDEE', val:`${tdee} kcal — your maintenance point`, type:'result' },
      { label:'Goal adjustment', val:deficit > 0 ? `−${deficit} kcal deficit for ${p.goal||'fat loss'}` : deficit < 0 ? `+${Math.abs(deficit)} kcal surplus for muscle gain` : 'No adjustment — maintenance', type: deficit !== 0 ? 'action' : 'info' },
      { label:'Your target', val:`${p.calories||'?'} kcal (${defStr})`, type:'final' },
    ],
    science: 'The Mifflin-St Jeor equation was validated in a 1990 study (n=498) and remains the most accurate formula for sedentary and lightly active adults (±10% error vs 15–20% for Harris-Benedict). Activity multipliers are from Ainsworth et al. (2011) Compendium of Physical Activities.',
    canEdit: true,
    editKey: 'calories',
    editLabel: 'Override calorie target',
    editNote: 'If you have actual metabolic data (DEXA, RMR test, 3-week tracking), enter it here. Your entry overrides the formula.'
  });

  // Protein decision
  const protPerKg = p.protein && w ? (p.protein/w).toFixed(1) : '2.0';
  decisions.push({
    icon:'💪', title:`Why ${p.protein||'?'}g protein (${protPerKg}g/kg)?`,
    category:'Nutrition',
    chain: [
      { label:'Base requirement', val:'0.8g/kg (WHO minimum for nitrogen balance)', type:'info' },
      { label:'Muscle preservation', val:'Resistance training raises requirement to 1.6–2.2g/kg (Morton et al. 2018 meta-analysis, n=1,800)', type:'science' },
      { label:'Age factor', val: age > 40 ? `At ${age}, anabolic resistance increases. 2.0–2.4g/kg needed to trigger same MPS response as younger adults (Churchward-Venne, 2016)` : `At ${age}, 2.0g/kg sits at the top of the effective range for your goal (${p.goal||'—'})`, type: age > 40 ? 'warning' : 'info' },
      { label:'Your target', val:`${p.protein||'?'}g (${protPerKg}g/kg) — ${p.proteinReasoning||'calibrated to goal and training load'}`, type:'final' },
    ],
    science: 'Morton et al. (2018) meta-analysis (49 studies, 1,863 participants): protein beyond 1.62g/kg/day produced no additional lean mass gains. We target 2.0g/kg to account for training-day demand variation and the leucine threshold (~3g per meal for MPS activation).',
    canEdit: true,
    editKey: 'protein',
    editLabel: 'Override protein target (grams)',
    editNote: 'If you have body composition data showing lean mass, you can calculate from that instead: 2.2 × lean mass in kg.'
  });

  // Training split decision
  const trainDays = (p.weekPlan||[]).filter(d=>d.priority==='training').map(d=>d.day+' '+d.type);
  decisions.push({
    icon:'🏋️', title:`Why this training split?`,
    category:'Training',
    chain: [
      { label:'Training days', val:`${p.trainingDays||4} days/week (from questionnaire)`, type:'info' },
      { label:'Weekly structure', val: trainDays.length ? trainDays.join(' · ') : 'see week plan', type:'calc' },
      { label:'Frequency rationale', val:`Each muscle group hit ${p.trainingDays>=4?'2×/week (optimal for hypertrophy, Schoenfeld 2016)':'1×/week (sufficient for strength, suboptimal for hypertrophy)'}`, type: p.trainingDays>=4 ? 'result' : 'warning' },
      { label:'Equipment', val:`${(p.equipmentUsed||[]).join(', ')||p.gymAccess||'full gym'} — exercises selected to match`, type:'info' },
      { label:'Experience', val:`${p.experience||'—'} — ${(p.experience||'').includes('Just') ? 'technique priority, conservative loading' : 'progressive overload applied from week 1'}`, type:'info' },
    ],
    science: 'Schoenfeld et al. (2016) meta-analysis: training each muscle group 2× per week produced greater hypertrophy than 1× per week (effect size 0.50 vs 0.27). At 4 training days, a Push/Pull/Legs or Upper/Lower split achieves twice-weekly frequency. Below 4 days, once-weekly frequency per muscle is still effective for strength.',
    canEdit: false
  });

  // Fitness level decision (if assessed)
  if (fitnessLevel !== null) {
    decisions.push({
      icon:'📊', title:`Why ${fitnessLabel} (${fitnessLevel}% of range)?`,
      category:'Training',
      chain: [
        { label:'Source', val:'5-question assessment: press-up reps, pull-ups, squat load, recovery, consistency', type:'info' },
        { label:'Score', val:`${fitnessLevel}/100 → ${fitnessLabel}`, type:'result' },
        { label:'Effect on programme', val:'Benchmark marker placed at this position on every exercise. Set/rep prescription and RPE targets adjusted for tier.', type:'action' },
        { label:'Reassess when', val:'After 4 weeks or when prescribed loads feel consistently easy (RPE consistently below 6)', type:'info' },
      ],
      science: 'Assessment proxies validated against 1RM strength standards (Lombardi 1989; Mayhew et al. 1993). Body weight push-up count correlates r=0.82 with relative upper body strength. Pull-up count predicts upper body pulling strength with r=0.78.',
      canEdit: true,
      editKey: 'fitnessLevel',
      editLabel: 'Update fitness level (0–100)',
      editNote: 'Use this if you have InBody, DEXA or recent 1RM data. 0 = complete beginner, 50 = intermediate, 80+ = advanced. This repositions your benchmark marker on every exercise.'
    });
  }

  // Age/hormonal decision
  decisions.push({
    icon: isFemale ? '🌙' : '⚡',
    title: `Why these ${isFemale ? 'hormonal' : 'age-related'} assumptions?`,
    category:'Physiology',
    chain: [
      { label:'Profile', val:`${age}-year-old ${isFemale?'female':'male'}, ${w}kg`, type:'info' },
      { label: isFemale ? 'Oestrogen context' : 'Testosterone context',
        val: isFemale
          ? (age < 35 ? 'Pre-perimenopause. Full oestrogen support for bone density and MPS.' : age < 45 ? 'Perimenopause window. Variable oestrogen affects recovery and fat distribution.' : 'Post-menopausal. Reduced oestrogen; resistance training is the primary body composition tool.')
          : (age < 35 ? 'Prime anabolic window. Testosterone fully supports muscle adaptation.' : age < 45 ? 'Gradual testosterone decline (~1%/year). Sleep quality becomes primary anabolic lever.' : 'GH pulse amplitude down ~14%/decade. Deload weeks structurally important.'),
        type: age > 38 ? 'warning' : 'result' },
      { label:'Protein adjustment', val: age > 40 ? `+0.2g/kg added to base target for anabolic resistance at age ${age}` : 'No age adjustment needed at this stage', type: age > 40 ? 'action' : 'info' },
      { label:'Deload cadence', val: age > 38 ? 'Week 4 deload is non-negotiable. Recovery window is longer than at 30.' : 'Standard 4-week block with week 4 deload.', type:'info' },
    ],
    science: isFemale
      ? 'Stacy et al. (2012): oestrogen directly influences satellite cell activation. Luteal phase progesterone reduces mTOR sensitivity. Smith & Thomas (2019): resistance training is the most effective single intervention for post-menopausal body composition, bone density, and insulin sensitivity.'
      : 'Kraemer et al. (1998): GH secretion declines 14% per decade after 30; testosterone begins gradual decline at ~1%/year from age 30. Churchward-Venne (2016): anabolic resistance after 40 requires higher leucine threshold per meal. Sleep quality becomes the dominant recovery variable as pharmaceutical anabolic support declines.',
    canEdit: false
  });

  // Injury decisions (if any)
  injuries.forEach(inj => {
    decisions.push({
      icon:'⚠️', title:`How your ${inj.location||'injury'} shapes the programme`,
      category:'Injuries',
      chain: [
        { label:'Assessment', val: inj.assessment || 'Movement restriction noted', type:'warning' },
        { label:'Avoided movements', val: (inj.avoidMovements||[]).join(', ') || 'High-load variants', type:'warning' },
        { label:'Safe alternatives', val: (inj.safeAlternatives||[]).join(', ') || 'As programmed', type:'result' },
        { label:'Protocol', val: inj.rehabilitationNotes || 'Modified loading throughout the block', type:'action' },
      ],
      science: 'Injury modifications follow the Royal College of Sports Medicine load management framework: maintain stimulus without provocating tissue. Isometric loading at 70–80% MVC is pain-reducing and tendon-strengthening (Rio et al. 2017).',
      canEdit: false
    });
  });

  // Training modifications (from coach chat)
  if (trainMods.length) {
    decisions.push({
      icon:'💬', title:`Coach modifications (${trainMods.length} added)`,
      category:'Modifications',
      chain: trainMods.map(m => ({ label: m.date||'Added', val: m.note, type:'action' })),
      science: 'These were added via coach chat and appended to the base programme. They do not overwrite the core structure — they layer on top.',
      canEdit: false
    });
  }

  // ── RENDER ──────────────────────────────────────────────
  const categoryOrder = ['Nutrition','Training','Physiology','Injuries','Modifications'];
  const grouped = {};
  categoryOrder.forEach(c => grouped[c] = []);
  decisions.forEach(d => {
    if (!grouped[d.category]) grouped[d.category] = [];
    grouped[d.category].push(d);
  });

  const typeColours = {
    info:'var(--dk-3)', calc:'var(--amber)', science:'#4a8fa8',
    result:'var(--jade)', warning:'#c8941e', action:'var(--jade)', final:'var(--jade)'
  };

  let html = '<div class="logic-page">';

  // Hero explanation
  html += `<div class="logic-hero">
    <div class="logic-hero-title">Why this programme was built this way</div>
    <div class="logic-hero-text">
      Every number in your programme follows a decision chain: your inputs → established formula → science anchor → goal adjustment → your target.
      Where the science makes an assumption, it's stated. Where you have better data (from a machine, from tracking, from experience), you can override it.
    </div>
  </div>`;

  // Decision sections
  for (const cat of categoryOrder) {
    const items = grouped[cat];
    if (!items || !items.length) continue;
    html += `<div class="logic-section">
      <div class="logic-sec-label">${cat}</div>`;

    items.forEach((d, di) => {
      const chainRows = d.chain.map(row => `
        <div class="logic-chain-row">
          <div class="logic-chain-label">${row.label}</div>
          <div class="logic-chain-val" style="color:${typeColours[row.type]||'var(--dk-2)'};">${row.val}</div>
        </div>`).join('');

      const editSection = d.canEdit ? `
        <div class="logic-edit-zone" id="edit-zone-${d.editKey}">
          <button class="logic-edit-btn" onclick="toggleLogicEdit('${d.editKey}', '${d.editLabel}', '${(d.editNote||'').replace(/'/g,"\'")}')">
            ✏️ Override this assumption
          </button>
          <div class="logic-edit-form" id="edit-form-${d.editKey}" style="display:none;">
            <div class="logic-edit-note">${d.editNote||''}</div>
            <div class="logic-edit-row">
              <input class="logic-edit-input" id="edit-input-${d.editKey}" type="number"
                value="${p[d.editKey]||''}" placeholder="${d.editLabel}">
              <button class="logic-edit-save" onclick="saveLogicEdit('${d.editKey}')">Save →</button>
              <button class="logic-edit-cancel" onclick="document.getElementById('edit-form-${d.editKey}').style.display='none'">Cancel</button>
            </div>
            <div class="logic-edit-result" id="edit-result-${d.editKey}"></div>
          </div>
        </div>` : '';

      html += `<div class="logic-card">
        <div class="logic-card-head" onclick="this.parentElement.classList.toggle('open')">
          <span class="logic-card-icon">${d.icon}</span>
          <div class="logic-card-title">${d.title}</div>
          <span class="logic-cat-badge" style="background:rgba(0,200,160,0.07);color:var(--jade);border:1px solid rgba(0,200,160,0.18);font-size:8px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;padding:2px 8px;border-radius:8px;white-space:nowrap;">${cat}</span>
          <span class="logic-chevron">▾</span>
        </div>
        <div class="logic-card-body">
          <div class="logic-chain">${chainRows}</div>
          <div class="logic-science">
            <div class="logic-science-label">Science anchor</div>
            <div class="logic-science-text">${d.science}</div>
          </div>
          ${editSection}
        </div>
      </div>`;
    });
    html += '</div>';
  }

  // Block progress context
  html += `<div class="logic-block-ctx">
    <div class="logic-sec-label">Programme block context</div>
    <div class="logic-card open">
      <div class="logic-card-head" onclick="this.parentElement.classList.toggle('open')">
        <span class="logic-card-icon">📅</span>
        <div class="logic-card-title">Block ${blockNum} — 4-week periodisation</div>
        <span class="logic-chevron">▾</span>
      </div>
      <div class="logic-card-body">
        <div class="logic-chain">
          ${['week1','week2','week3','week4'].map((wk,i) => {
            const w = weekProg[wk]; if (!w) return '';
            return `<div class="logic-chain-row">
              <div class="logic-chain-label">Week \${i+1} — \${w.phase}</div>
              <div class="logic-chain-val" style="color:var(--dk-2);">\${w.focus} · \${w.volumeNote}</div>
            </div>`;
          }).join('')}
        </div>
        <div class="logic-science">
          <div class="logic-science-label">Science anchor</div>
          <div class="logic-science-text">Periodisation framework from Bompa & Buzzichelli (2019). Foundation → Build → Peak → Deload follows the principle of progressive overload (Helms et al. 2017): volume and intensity are manipulated across weeks to maximise supercompensation. Deload week prevents cumulative fatigue from masking fitness gains.</div>
        </div>
      </div>
    </div>
  </div>`;

  html += '</div>';
  return html;
}

window.toggleLogicEdit = function(key, label, note) {
  const form = document.getElementById('edit-form-'+key);
  if (!form) return;
  form.style.display = form.style.display === 'none' ? 'block' : 'none';
};

window.saveLogicEdit = function(key) {
  const input = document.getElementById('edit-input-'+key);
  const result = document.getElementById('edit-result-'+key);
  if (!input) return;
  const val = parseFloat(input.value);
  if (isNaN(val) || val <= 0) {
    if (result) result.innerHTML = '<span style="color:var(--red);">Enter a valid number.</span>';
    return;
  }
  try {
    const raw = localStorage.getItem('bl_profile');
    if (!raw) return;
    const p = JSON.parse(raw);

    if (key === 'calories') {
      const tdee = p.tdee || (p.calories || val);
      const newDef = tdee - val;
      p.calories = val;
      if (result) result.innerHTML = `<span style="color:var(--jade);">✓ Calorie target updated to \${val} kcal (\${newDef > 0 ? '-'+newDef+' deficit' : '+'+Math.abs(newDef)+' surplus'} vs TDEE \${tdee}).</span>`;
    } else if (key === 'protein') {
      p.protein = val;
      const newPerKg = p.weight ? (val/p.weight).toFixed(1) : '?';
      if (result) result.innerHTML = `<span style="color:var(--jade);">✓ Protein updated to \${val}g (\${newPerKg}g/kg). Fat and carbs will auto-adjust on your next plan rebuild.</span>`;
    } else if (key === 'fitnessLevel') {
      const pct = Math.min(100, Math.max(0, val));
      const score = pct / 100;
      p.fitnessLevel = score;
      p.fitnessLevelLabel = score < 0.25 ? 'Beginner' : score < 0.50 ? 'Low-intermediate' : score < 0.70 ? 'Intermediate' : score < 0.85 ? 'Upper-intermediate' : 'Advanced';
      p.fitnessLevelTier  = score < 0.35 ? 'beginner' : score < 0.65 ? 'intermediate' : 'advanced';
      if (result) result.innerHTML = `<span style="color:var(--jade);">✓ Fitness level updated to \${pct}/100 (\${p.fitnessLevelLabel}). Benchmark markers will update on your next session view.</span>`;
    }

    p.lastUpdated = new Date().toISOString();
    localStorage.setItem('bl_profile', JSON.stringify(p));

    // Close form after 2 seconds
    setTimeout(() => {
      const form = document.getElementById('edit-form-'+key);
      if (form) form.style.display = 'none';
    }, 2500);
  } catch(e) {
    if (result) result.innerHTML = '<span style="color:var(--red);">Save failed — try again.</span>';
  }
};

function switchTab(id, btn) {
  document.querySelectorAll('.ins-tab').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.ins-pane').forEach(p => p.classList.remove('active'));
  if (btn) btn.classList.add('active');
  document.getElementById('pane-' + id).classList.add('active');
}

function generateReport(force) {
  const container = document.getElementById('report-content');
  if (!container) return;

  // Check cache first
  const cacheKey = 'bl_report_v2_' + profile.name + '_' + (profile.generatedAt||'').slice(0,10);
  if (!force) {
    try {
      const cached = localStorage.getItem(cacheKey);
      if (cached) { renderReport(cached); return; }
    } catch(e) {}
  }

  // Build report instantly from profile — no API call needed
  const html = buildReportHTML(profile);
  try { localStorage.setItem(cacheKey, html); } catch(e) {}
  renderReport(html);

  // Then optionally enrich with a tiny AI call for the coach voice paragraph
  enrichReportAsync(profile, cacheKey);
}

function buildAssumptionsSection(p) {
  const isFemale = (p.sex||'').toLowerCase() === 'female';
  const age = p.age || 35;
  const w   = p.weight || 80;
  const h   = p.height || (isFemale ? 165 : 175);
  const bmr = isFemale
    ? Math.round(10*w + 6.25*h - 5*age - 161)
    : Math.round(10*w + 6.25*h - 5*age + 5);
  const tdee    = p.tdee || Math.round(bmr * 1.55);
  const deficit = tdee - (p.calories || tdee);
  const deficitLabel = deficit > 50
    ? '-' + deficit + ' kcal/day deficit (&asymp;' + (deficit*7/7700).toFixed(1) + 'kg/week)'
    : deficit < -50
      ? '+' + Math.abs(deficit) + ' kcal/day surplus (muscle gain phase)'
      : 'maintenance calories';
  const protPerKg = (p.protein && w) ? (p.protein / w).toFixed(1) : '2.0';

  let ageNote = '';
  if (isFemale) {
    if (age < 35)      ageNote = 'Hormonal context: prime training years. Oestrogen supports muscle recovery and bone density. No restrictions on training intensity.';
    else if (age < 45) ageNote = 'Hormonal context: perimenopause window. Resistance training is the most effective intervention for body composition and bone density at this life stage. Progesterone fluctuations affect recovery — track energy levels week-to-week.';
    else               ageNote = 'Hormonal context: post-menopausal. Oestrogen decline increases fat storage tendency and reduces muscle protein synthesis response. Higher protein targets and resistance training are the primary tools.';
  } else {
    if (age < 35)      ageNote = 'Hormonal context: prime anabolic window. Testosterone supports recovery and muscle adaptation fully. Training age and consistency are the primary limiters, not hormones.';
    else if (age < 45) ageNote = 'Hormonal context: testosterone begins gradual decline (~1%/year after 30). Sleep quality becomes the #1 recovery lever — GH pulses during deep sleep are the primary anabolic stimulus from here. Deload weeks start to matter more.';
    else               ageNote = 'Hormonal context: GH pulse amplitude declines ~14%/decade after 40. Deload weeks are non-negotiable. Sleep and stress management have outsized impact on body composition relative to training volume.';
  }

  return '<div style="margin-bottom:28px;">' +
    '<div style="font-size:9px;font-weight:600;letter-spacing:0.14em;text-transform:uppercase;color:var(--amber);margin-bottom:12px;">Programme assumptions — what this is built on</div>' +

    // Update the cache
    try {
      const cached = localStorage.getItem(cacheKey);
      if (cached) {
        const updated = buildReportHTML(p);
        localStorage.setItem(cacheKey, updated);
        renderReport(updated);
      }
    } catch(e) {}

  } catch(e) {
    console.warn('Report enrichment failed:', e);
  }
}


function renderReport(html) {
  const container = document.getElementById('report-content');
  if (!container) return;

  // The coachreport renderer returns formatted HTML
  // But we also need to handle raw text from the model
  // Wrap it nicely
  container.innerHTML = `
    <div class="report-shell">
      ${html}
    </div>`;
}

async function regenBrief() {
  const btn = document.getElementById('regen-brief-btn');
  if (btn) { btn.textContent = 'Generating…'; btn.disabled = true; }

  const isFemale = (profile.sex||'').toLowerCase() === 'female';
  const injuries = profile.injuryAssessments || [];
  const supps    = profile.supplements || [];
  const weekPlan = profile.weekPlan || [];
  const trainingDays = weekPlan.filter(d=>d.priority==='training').map(d=>d.day).join(', ');

  try {
    const res = await fetch('/api/chat', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:2500,
        system:'You are a senior performance coach writing a personalised coaching brief. Be direct, specific, and personal.',
        messages:[{ role:'user', content:`Write a complete coaching brief document for ${profile.name}.

PROFILE:
${profile.name}, ${profile.age}yo ${profile.sex}, ${profile.height}cm, ${profile.weight}kg
Goal: ${profile.goal} | Target: ${profile.target||'—'}
Calories: ${profile.calories} kcal | Protein: ${profile.protein}g | Carbs: ${profile.carbs}g | Fat: ${profile.fat}g
Training: ${profile.trainingDays} days/week (${trainingDays}) | Wake: ${profile.wakeTime}
Eating window: ${profile.fastingWindow||profile.eatingWindow||'flexible'}
Diet: ${profile.dietType} | Exclusions: ${(profile.foodExclusions||[]).join(', ')||'none'}
Trigger foods: ${profile.triggerFoods||'none'}
Equipment: ${(profile.equipmentUsed||[]).join(', ')||profile.gymAccess||'—'}
Free weight comfort: ${profile.freeWeightComfort||'—'}
Training time: ${profile.trainingTime||'—'}
Activity level: ${profile.activityLevel||'—'}
Injuries: ${injuries.length ? injuries.map(i=>i.location+': '+i.assessment).join('; ') : 'none'}
Non-negotiables: ${(profile.nonNegotiables||[]).join(', ')||'none'}
${isFemale && profile.menstrualCycle ? 'Cycle: '+profile.menstrualCycle : ''}
${isFemale ? 'FEMALE — all content must reflect female physiology.' : 'MALE — reflect male physiology.'}

Write sections: Workout Objective, Goals, Approach, Current Baseline, Injuries, Food Philosophy, Meal Rhythm, Supplement Stack, Efficiency Rule. Direct, specific, personalised prose.` }],
      })
    });
    const data = await res.json();
    const text = data.content?.map(b=>b.text||'').join('')||'';
    if (!text) throw new Error('Empty response');
    profile.instructions = text;
    localStorage.setItem('bl_profile', JSON.stringify(profile));
    if (btn) { btn.textContent = '✓ Done'; btn.disabled = false; }
    setTimeout(() => location.reload(), 600);
  } catch(e) {
    console.error(e);
    if (btn) { btn.textContent = 'Error — try again'; btn.disabled = false; }
  }
}
