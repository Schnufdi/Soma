<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>BodyLens — Food</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=Space+Grotesk:wght@300;400;500;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
body { background:var(--ink); color:var(--dk-1); }

/* ── HERO ── */
.food-hero {
  padding:44px 32px 36px;
  max-width:1100px; margin:0 auto;
  border-bottom:1px solid var(--bd);
  display:grid; grid-template-columns:1fr auto;
  align-items:end; gap:32px;
}
.food-hero-left {}
.food-kicker {
  font-size:10px; font-weight:600; letter-spacing:0.2em;
  text-transform:uppercase; color:var(--amber);
  margin-bottom:10px; display:flex; align-items:center; gap:10px;
}
.food-kicker::before { content:''; width:18px; height:1px; background:var(--amber); }
.food-title {
  font-family:var(--serif); font-size:56px; font-weight:300;
  line-height:0.93; letter-spacing:-0.025em; color:var(--dk-1);
  margin-bottom:12px;
}
.food-title em { font-style:italic; color:var(--dk-3); }
.food-sub {
  font-size:14px; font-weight:300; color:var(--dk-2);
  line-height:1.7; max-width:460px;
}

/* ── BASELINE CHART ── */
.food-baseline {
  background:var(--ink-2); border:1px solid var(--bd);
  border-radius:8px; padding:22px 24px; min-width:320px;
}
.food-baseline-title {
  font-size:9px; font-weight:600; letter-spacing:0.14em;
  text-transform:uppercase; color:var(--dk-3); margin-bottom:14px;
}
.food-bl-row {
  display:grid; grid-template-columns:120px 1fr 52px;
  align-items:center; gap:10px; margin-bottom:8px;
}
.food-bl-label { font-size:11px; font-weight:400; color:var(--dk-3); }
.food-bl-track {
  height:4px; background:var(--ink-3); border-radius:2px; overflow:hidden;
}
.food-bl-fill {
  height:100%; border-radius:2px; transition:width 0.6s ease;
}
.food-bl-val {
  font-family:var(--mono); font-size:11px; font-weight:500;
  color:var(--dk-2); text-align:right;
}
.food-bl-val.amber { color:var(--amber); }
.food-bl-divider {
  border:none; border-top:1px solid var(--bd); margin:10px 0;
}
.food-bl-target {
  display:flex; justify-content:space-between; align-items:baseline;
  font-size:12px;
}
.food-bl-target-label { font-weight:300; color:var(--dk-3); }
.food-bl-target-val { font-family:var(--mono); font-weight:600; color:var(--amber); }

/* ── TABS ── */
.food-tabs {
  display:flex; gap:0; border-bottom:1px solid var(--bd);
  max-width:1100px; margin:0 auto;
  overflow-x:auto; -webkit-overflow-scrolling:touch;
}
.food-tab {
  font-size:11px; font-weight:600; letter-spacing:0.08em;
  text-transform:uppercase; padding:14px 22px;
  border:none; background:transparent;
  color:var(--dk-3); cursor:pointer;
  font-family:var(--sans); border-bottom:2px solid transparent;
  margin-bottom:-1px; white-space:nowrap; transition:all 0.12s;
}
.food-tab:hover { color:var(--dk-2); }
.food-tab.active { color:var(--amber); border-bottom-color:var(--amber); }

.food-pane { display:none; }
.food-pane.active { display:block; }

/* ── CONTENT WRAPPER ── */
.food-content { max-width:1100px; margin:0 auto; padding:36px 32px 100px; }

/* ── TODAY TAB ── */
.today-grid {
  display:grid; grid-template-columns:1fr 340px;
  gap:24px; align-items:start;
}

/* Macro progress */
.macro-progress-card {
  background:var(--ink-2); border:1px solid var(--bd);
  border-radius:8px; overflow:hidden;
}
.mpc-head {
  background:var(--ink-1); border-bottom:1px solid var(--bd);
  padding:14px 20px; display:flex; justify-content:space-between;
  align-items:center;
}
.mpc-head-label {
  font-size:9px; font-weight:600; letter-spacing:0.14em;
  text-transform:uppercase; color:var(--amber);
}
.mpc-head-day {
  font-size:11px; font-weight:300; color:var(--dk-3);
}
.mpc-macros {
  display:grid; grid-template-columns:repeat(4,1fr);
  gap:1px; background:var(--bd);
}
.mpc-macro {
  background:var(--ink-1); padding:14px 12px; text-align:center;
}
.mpc-val {
  font-family:var(--mono); font-size:20px; font-weight:500;
  color:var(--jade); line-height:1; margin-bottom:3px;
}
.mpc-val.amber { color:var(--amber); }
.mpc-val.slate { color:var(--dk-2); }
.mpc-label { font-size:9px; font-weight:600; letter-spacing:0.1em; text-transform:uppercase; color:var(--dk-3); }
.mpc-remaining { font-size:9px; font-weight:300; color:var(--dk-3); margin-top:2px; }

/* Progress bars */
.mpc-bars { padding:16px 20px; }
.mpc-bar-row { margin-bottom:12px; }
.mpc-bar-top {
  display:flex; justify-content:space-between;
  font-size:11px; margin-bottom:5px;
}
.mpc-bar-name { font-weight:500; color:var(--dk-2); }
.mpc-bar-nums { font-family:var(--mono); font-weight:300; color:var(--dk-3); }
.mpc-bar-track {
  height:6px; background:var(--ink-3); border-radius:3px; overflow:hidden;
}
.mpc-bar-fill {
  height:100%; border-radius:3px; transition:width 0.5s ease;
}

/* Log strip */
.log-strip {
  background:var(--ink-2); border:1px solid var(--bd);
  border-radius:8px; padding:16px 20px; margin-top:16px;
}
.log-strip-title {
  font-size:9px; font-weight:600; letter-spacing:0.14em;
  text-transform:uppercase; color:var(--dk-3); margin-bottom:12px;
}
.log-input-row { display:flex; gap:8px; }
.log-input {
  flex:1; background:var(--ink-3); border:1px solid var(--bd-2);
  border-radius:4px; padding:9px 14px; font-size:13px;
  color:var(--dk-1); font-family:var(--sans); outline:none;
  transition:border-color 0.12s;
}
.log-input:focus { border-color:var(--amber-br); }
.log-input::placeholder { color:var(--dk-3); font-size:12px; }
.log-btn {
  padding:9px 18px; background:var(--amber); border:none;
  border-radius:4px; font-family:var(--sans); font-size:11px;
  font-weight:600; letter-spacing:0.06em; text-transform:uppercase;
  color:var(--ink); cursor:pointer; transition:opacity 0.12s;
  flex-shrink:0;
}
.log-btn:hover { opacity:0.85; }
.log-entries { margin-top:10px; }
.log-entry {
  display:flex; justify-content:space-between; align-items:center;
  padding:7px 0; border-bottom:1px solid var(--bd);
  font-size:12px;
}
.log-entry:last-child { border-bottom:none; }
.log-entry-name { font-weight:400; color:var(--dk-1); }
.log-entry-cals { font-family:var(--mono); font-weight:300; color:var(--amber); }
.log-entry-del { color:var(--dk-3); cursor:pointer; padding:2px 6px; font-size:14px; }
.log-entry-del:hover { color:var(--red); }

/* Today meals */
.today-meals {}
.today-meal-sec {
  font-size:9px; font-weight:600; letter-spacing:0.18em;
  text-transform:uppercase; color:var(--amber);
  margin:0 0 12px; display:flex; align-items:center; gap:10px;
}
.today-meal-sec::after { content:''; flex:1; height:1px; background:var(--bd); }

/* ── WEEK TAB ── */
.week-header {
  display:flex; justify-content:space-between; align-items:center;
  margin-bottom:20px;
}
.week-header-title {
  font-family:var(--serif); font-size:28px; font-weight:300; color:var(--dk-1);
}

/* Calorie rhythm chart */
.cal-rhythm {
  background:var(--ink-2); border:1px solid var(--bd);
  border-radius:8px; padding:20px 24px; margin-bottom:24px;
}
.cal-rhythm-title {
  font-size:9px; font-weight:600; letter-spacing:0.14em;
  text-transform:uppercase; color:var(--dk-3); margin-bottom:16px;
}
.cal-rhythm-chart {
  display:grid; grid-template-columns:repeat(7,1fr);
  gap:6px; align-items:end; height:80px;
}
.cal-day-bar { display:flex; flex-direction:column; align-items:center; gap:4px; height:100%; }
.cal-bar-wrap { flex:1; display:flex; align-items:flex-end; width:100%; }
.cal-bar {
  width:100%; border-radius:3px 3px 0 0;
  transition:height 0.5s ease; min-height:4px;
}
.cal-bar.training { background:var(--amber); }
.cal-bar.rest     { background:var(--ink-3); }
.cal-bar.today-bar { background:var(--jade); }
.cal-day-label {
  font-size:9px; font-weight:500; letter-spacing:0.05em;
  text-transform:uppercase; color:var(--dk-3);
}
.cal-day-num {
  font-family:var(--mono); font-size:9px; font-weight:300;
  color:var(--dk-3);
}

/* Week meal grid */
.week-meal-grid {
  display:grid; grid-template-columns:repeat(7,1fr);
  gap:10px; margin-bottom:32px;
}
.week-day-col {
  background:var(--ink-2); border:1px solid var(--bd);
  border-radius:6px; overflow:hidden;
  transition:border-color 0.15s;
}
.week-day-col.training-day { border-top:3px solid var(--amber); }
.week-day-col.rest-day     { border-top:3px solid var(--bd); }
.week-day-col.is-today     { border-color:var(--jade); }

.wdc-head {
  padding:10px 12px;
  background:var(--ink-1);
  border-bottom:1px solid var(--bd);
}
.wdc-name {
  font-size:10px; font-weight:600; letter-spacing:0.08em;
  text-transform:uppercase;
  color:var(--dk-3);
}
.wdc-name.training { color:var(--amber); }
.wdc-name.today    { color:var(--jade); }
.wdc-kcal {
  font-family:var(--mono); font-size:10px; font-weight:300;
  color:var(--dk-3); margin-top:2px;
}

.wdc-meals { padding:8px; }
.wdc-meal {
  background:var(--ink-3); border-radius:4px;
  padding:8px 10px; margin-bottom:6px; cursor:pointer;
  transition:background 0.12s; position:relative;
}
.wdc-meal:last-child { margin-bottom:0; }
.wdc-meal:hover { background:rgba(255,255,255,0.04); }
.wdc-meal-name {
  font-size:11px; font-weight:500; color:var(--dk-1);
  line-height:1.3; margin-bottom:3px;
}
.wdc-meal-macros {
  font-size:9px; font-weight:300; color:var(--dk-3);
  font-family:var(--mono);
}
.wdc-meal-swap {
  position:absolute; top:6px; right:8px;
  font-size:11px; color:var(--dk-3); opacity:0;
  transition:opacity 0.12s; cursor:pointer;
  background:none; border:none; padding:0;
}
.wdc-meal:hover .wdc-meal-swap { opacity:1; }
.wdc-meal-swap:hover { color:var(--amber); }

.wdc-loading {
  padding:20px 10px; text-align:center;
  font-size:11px; font-weight:300; color:var(--dk-3);
}

/* Meal detail modal */
.meal-modal-overlay {
  position:fixed; inset:0; background:rgba(12,16,16,0.92);
  z-index:500; display:flex; align-items:center; justify-content:center;
  padding:24px; display:none;
}
.meal-modal-overlay.open { display:flex; }
.meal-modal {
  background:var(--ink-2); border:1px solid var(--bd-2);
  border-radius:10px; padding:32px; max-width:520px;
  width:100%; max-height:80vh; overflow-y:auto;
  animation:slideUp 0.2s ease;
}
@keyframes slideUp {
  from { opacity:0; transform:translateY(12px); }
  to   { opacity:1; transform:translateY(0); }
}
.mm-close {
  float:right; font-size:20px; color:var(--dk-3);
  cursor:pointer; background:none; border:none;
  margin-top:-8px; margin-right:-8px;
}
.mm-close:hover { color:var(--dk-1); }
.mm-meal-name {
  font-family:var(--serif); font-size:30px; font-weight:300;
  color:var(--dk-1); margin-bottom:6px; clear:both;
}
.mm-meal-type { font-size:11px; font-weight:300; color:var(--dk-3); margin-bottom:16px; }
.mm-macros {
  display:grid; grid-template-columns:repeat(4,1fr);
  gap:1px; background:var(--bd); border-radius:4px;
  overflow:hidden; margin-bottom:20px;
}
.mm-macro {
  background:var(--ink-1); padding:12px 8px; text-align:center;
}
.mm-macro-val {
  font-family:var(--mono); font-size:18px; font-weight:500;
  color:var(--jade); line-height:1; margin-bottom:3px;
}
.mm-macro-val.amber { color:var(--amber); }
.mm-macro-val.slate { color:var(--dk-2); }
.mm-macro-label { font-size:8px; font-weight:600; letter-spacing:0.1em; text-transform:uppercase; color:var(--dk-3); }
.mm-section-label {
  font-size:9px; font-weight:600; letter-spacing:0.14em;
  text-transform:uppercase; color:var(--amber); margin:16px 0 8px;
}
.mm-ingredient {
  display:flex; justify-content:space-between;
  padding:7px 0; border-bottom:1px solid var(--bd);
  font-size:12px;
}
.mm-ingredient:last-child { border-bottom:none; }
.mm-ing-name { font-weight:400; color:var(--dk-1); }
.mm-ing-qty  { font-family:var(--mono); font-weight:300; color:var(--dk-3); }
.mm-instructions {
  font-size:13px; font-weight:300; color:var(--dk-2);
  line-height:1.8; margin-top:4px;
}
.mm-why {
  padding:12px 16px; background:rgba(196,124,24,0.06);
  border-left:3px solid var(--amber-br); border-radius:0 4px 4px 0;
  font-size:12px; font-weight:300; color:var(--dk-2); line-height:1.7;
  margin-top:16px;
}
.mm-swap-btn {
  width:100%; margin-top:20px; padding:12px;
  background:transparent; border:1px solid var(--amber-br);
  border-radius:4px; font-family:var(--sans); font-size:11px;
  font-weight:600; letter-spacing:0.08em; text-transform:uppercase;
  color:var(--amber); cursor:pointer; transition:all 0.12s;
}
.mm-swap-btn:hover { background:var(--amber-dim); }

/* ── SHOPPING LIST TAB ── */
.shop-header {
  display:flex; justify-content:space-between; align-items:center;
  margin-bottom:24px;
}
.shop-header-title {
  font-family:var(--serif); font-size:28px; font-weight:300; color:var(--dk-1);
}
.shop-actions { display:flex; gap:8px; }
.shop-btn {
  padding:9px 18px; background:transparent;
  border:1px solid var(--bd-2); border-radius:4px;
  font-family:var(--sans); font-size:10px; font-weight:600;
  letter-spacing:0.08em; text-transform:uppercase;
  color:var(--dk-3); cursor:pointer; transition:all 0.12s;
}
.shop-btn:hover { color:var(--amber); border-color:var(--amber-br); }
.shop-btn.amber { background:var(--amber); border-color:var(--amber); color:var(--ink); }
.shop-btn.amber:hover { opacity:0.85; }

.shop-categories { columns:2; gap:24px; }
.shop-cat { break-inside:avoid; margin-bottom:24px; }
.shop-cat-title {
  font-size:9px; font-weight:600; letter-spacing:0.18em;
  text-transform:uppercase; color:var(--amber);
  margin-bottom:10px; display:flex; align-items:center; gap:10px;
}
.shop-cat-title::after { content:''; flex:1; height:1px; background:var(--bd); }
.shop-item {
  display:flex; align-items:center; gap:12px;
  padding:9px 0; border-bottom:1px solid var(--bd);
  cursor:pointer; transition:opacity 0.15s;
}
.shop-item:last-child { border-bottom:none; }
.shop-item.checked { opacity:0.35; }
.shop-item-check {
  width:16px; height:16px; border-radius:3px;
  border:1px solid var(--bd-2); flex-shrink:0;
  display:flex; align-items:center; justify-content:center;
  transition:all 0.12s;
}
.shop-item.checked .shop-item-check {
  background:var(--jade); border-color:var(--jade);
  color:var(--ink); font-size:10px;
}
.shop-item-name { font-size:13px; font-weight:400; color:var(--dk-1); flex:1; }
.shop-item.checked .shop-item-name { text-decoration:line-through; }
.shop-item-qty { font-family:var(--mono); font-size:11px; font-weight:300; color:var(--amber); white-space:nowrap; }
.shop-item-meals { font-size:10px; font-weight:300; color:var(--dk-3); margin-top:1px; }

/* ── SCIENCE TAB ── */
.science-link-grid {
  display:grid; grid-template-columns:repeat(3,1fr); gap:10px;
}
.sci-link-card {
  background:var(--ink-2); border:1px solid var(--bd);
  border-radius:6px; padding:18px 16px; text-decoration:none;
  display:block; transition:all 0.15s;
}
.sci-link-card:hover { border-color:var(--amber-br); transform:translateY(-1px); }
.sci-link-icon { font-size:22px; margin-bottom:8px; display:block; }
.sci-link-title { font-size:13px; font-weight:600; color:var(--amber); margin-bottom:4px; }
.sci-link-desc  { font-size:11px; font-weight:300; color:var(--dk-3); line-height:1.5; }

/* ── LOADING ── */
.food-loading {
  display:flex; flex-direction:column; align-items:center;
  justify-content:center; min-height:300px; gap:14px;
}
.food-spinner {
  width:36px; height:36px; border:2px solid var(--bd-2);
  border-top-color:var(--amber); border-radius:50%;
  animation:spin 0.8s linear infinite;
}
@keyframes spin { to { transform:rotate(360deg); } }
.food-loading-text { font-size:13px; font-weight:300; color:var(--dk-3); }

/* ── NO PROFILE ── */
.no-profile-food {
  display:flex; flex-direction:column; align-items:center;
  justify-content:center; min-height:60vh; text-align:center; padding:48px;
}
.no-profile-food h2 {
  font-family:var(--serif); font-size:32px; font-weight:300; color:var(--dk-1);
  margin-bottom:10px;
}
.no-profile-food p {
  font-size:14px; font-weight:300; color:var(--dk-2);
  max-width:360px; line-height:1.7; margin-bottom:24px;
}
.no-profile-food a {
  display:inline-block; padding:12px 28px; background:var(--amber);
  border-radius:6px; font-size:12px; font-weight:600;
  letter-spacing:0.06em; text-transform:uppercase;
  color:var(--ink); text-decoration:none;
}

@media(max-width:900px){
  .today-grid { grid-template-columns:1fr; }
  .week-meal-grid { grid-template-columns:repeat(4,1fr); }
  .food-hero { grid-template-columns:1fr; }
  .science-link-grid { grid-template-columns:1fr 1fr; }
  .shop-categories { columns:1; }
}
@media(max-width:600px){
  .food-hero, .food-content { padding-left:16px; padding-right:16px; }
  .food-title { font-size:38px; }
  .week-meal-grid { grid-template-columns:1fr 1fr; }
  .mpc-macros { grid-template-columns:repeat(2,1fr); }
  .food-tabs { padding:0 16px; }
  .science-link-grid { grid-template-columns:1fr; }
}
</style>
</head>
<body>

<nav class="site-nav" id="main-nav"><!-- populated by script --></nav>

<div id="food-app">
  <!-- Rendered by JS after profile loads -->
</div>

<!-- Meal detail modal -->
<div class="meal-modal-overlay" id="meal-modal">
  <div class="meal-modal" id="meal-modal-inner"></div>
</div>

<script src="nav.js"></script>
<script src="page-generator.js"></script>
<script>
const API   = '/api/chat';
const MODEL = 'claude-sonnet-4-20250514';

// ── PROFILE ──────────────────────────────────────────────
const profile = getProfile();

// ── NAV ──────────────────────────────────────────────────
(function(){
  const nav = document.getElementById('main-nav');
  if (!nav) return;
  nav.outerHTML = `<nav class="site-nav">
  <div class="nav-brand">Body<em>Lens</em></div>
  <div class="nav-links">
    <a class="nav-link nav-daily" href="bodylens-day.html">Today</a>
    <a class="nav-link nav-food active" href="bodylens-food.html">Food</a>
    <a class="nav-link" href="bodylens-programme.html">Programme</a>
    <a class="nav-link" href="bodylens-science.html">Science</a>
  </div>
  <div class="nav-right-group">
    <a class="nav-right" href="bodylens-howitworks.html">How it works</a>
    <div class="nav-meta" id="nav-meta"></div>
  </div>
</nav>`;
})();

if (!profile) {
  document.getElementById('food-app').innerHTML = `
    <div class="no-profile-food">
      <div style="font-size:48px;margin-bottom:16px;">🍽️</div>
      <h2>Build your food system</h2>
      <p>Complete onboarding and your personalised food system — meals, shopping list, and nutrition science — will be ready.</p>
      <a href="bodylens-onboard.html">Get started →</a>
    </div>`;
} else {
  document.getElementById('nav-meta').innerHTML =
    `<span class="nav-tag nt-jade">${profile.name}</span>`;
  renderFoodApp(profile);
}

// ── STATE ─────────────────────────────────────────────────
const DAY_MAP   = {0:6,1:0,2:1,3:2,4:3,5:4,6:5};
const DAY_NAMES = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
const todayIdx  = DAY_MAP[new Date().getDay()];
const todayName = DAY_NAMES[todayIdx];
const weekPlan  = profile ? (profile.weekPlan || []) : [];
const todayPlan = weekPlan[todayIdx] || {priority:'rest', kcal:profile?.calories||2000};
const isTraining = todayPlan.priority === 'training';

let weekMeals  = null;   // generated week meal plan

// ── MACRO PROGRESS ────────────────────────────────────────
function renderMacroProgress(p, log) {
  const target = { cal: todayPlan.kcal||p.calories||2000, prot: p.protein||140, carbs: p.carbs||160, fat: p.fat||60 };
  const logged = log.reduce((a,e)=>({cal:a.cal+(e.cal||0),prot:a.prot+(e.prot||0),carbs:a.carbs+(e.carbs||0),fat:a.fat+(e.fat||0)}),{cal:0,prot:0,carbs:0,fat:0});

  const pct = (v,t) => Math.min(100, Math.round((v/t)*100)) + '%';

  return `<div class="macro-progress-card" id="macro-progress-card">
    <div class="mpc-head">
      <div class="mpc-head-label">${isTraining ? '🏋️ Training day' : '😴 Rest day'}</div>
      <div class="mpc-head-day">${todayName}</div>
    </div>
    <div class="mpc-macros">
      <div class="mpc-macro">
        <div class="mpc-val">${target.cal}</div>
        <div class="mpc-label">Calories</div>
        <div class="mpc-remaining" id="rem-cal">${target.cal - logged.cal} left</div>
      </div>
      <div class="mpc-macro">
        <div class="mpc-val">${target.prot}g</div>
        <div class="mpc-label">Protein</div>
        <div class="mpc-remaining" id="rem-prot">${target.prot - logged.prot}g left</div>
      </div>
      <div class="mpc-macro">
        <div class="mpc-val amber">${target.carbs}g</div>
        <div class="mpc-label">Carbs</div>
        <div class="mpc-remaining" id="rem-carbs">${target.carbs - logged.carbs}g left</div>
      </div>
      <div class="mpc-macro">
        <div class="mpc-val slate">${target.fat}g</div>
        <div class="mpc-label">Fat</div>
        <div class="mpc-remaining" id="rem-fat">${target.fat - logged.fat}g left</div>
      </div>
    </div>
    <div class="mpc-bars">
      ${renderBar('Protein', logged.prot, target.prot, 'var(--jade)')}
      ${renderBar('Carbs',   logged.carbs, target.carbs, 'var(--amber)')}
      ${renderBar('Fat',     logged.fat,   target.fat,   '#8a9490')}
      ${renderBar('Calories',logged.cal,   target.cal,   '#c47c18')}
    </div>
  </div>`;
}

function renderBar(name, logged, target, color) {
  const pct = Math.min(100, Math.round((logged/target)*100));
  const unit = name === 'Calories' ? ' kcal' : 'g';
  return `<div class="mpc-bar-row">
    <div class="mpc-bar-top">
      <span class="mpc-bar-name">${name}</span>
      <span class="mpc-bar-nums">${logged}${unit} / ${target}${unit}</span>
    </div>
    <div class="mpc-bar-track">
      <div class="mpc-bar-fill" style="width:${pct}%;background:${color};"></div>
    </div>
  </div>`;
}

// ── LOG STRIP ─────────────────────────────────────────────
function renderLogStrip() {
  return `<div class="log-strip" id="log-strip" style="margin-top:12px;">
    <div class="log-strip-title">Quick log</div>
    <div class="log-input-row">
      <input class="log-input" id="log-input" type="text"
        placeholder="e.g. 200g chicken breast, 1 banana…" autocomplete="off">
      <button class="log-btn" onclick="logItem()">Log</button>
    </div>
    <div class="log-entries" id="log-entries"></div>
  </div>`;
}

function updateLogDisplay() {
  const el = document.getElementById('log-entries');
  if (!el) return;
  if (!foodLog.length) { el.innerHTML = ''; return; }
  el.innerHTML = foodLog.map((e,i) => `
    <div class="log-entry">
      <span class="log-entry-name">${e.name}</span>
      <span class="log-entry-cals">${e.cal} kcal</span>
      <button class="log-entry-del" onclick="removeLog(${i})">×</button>
    </div>`).join('');
}

async function logItem() {
  const inp = document.getElementById('log-input');
  const val = inp.value.trim();
  if (!val) return;
  inp.value = '';
  inp.disabled = true;

  // Ask Claude to estimate macros
  try {
    const res = await fetch(API, {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        model: MODEL, max_tokens: 150,
        system: 'You are a nutrition calculator. Return ONLY valid JSON: {"name":"item","cal":0,"prot":0,"carbs":0,"fat":0}',
        messages:[{role:'user',content:'Estimate macros for: '+val}],
      }),
    });
    const data = await res.json();
    const text = (data.content||[]).map(b=>b.text||'').join('');
    const match = text.match(/\{[^}]+\}/);
    if (match) {
      const item = JSON.parse(match[0]);
      foodLog.push(item);
      trySet(TODAY_LOG_KEY, foodLog);
      updateMacroDisplay(profile);
      updateLogDisplay();
    }
  } catch(e) {
    // Fallback — add with 0 macros
    foodLog.push({name:val, cal:0, prot:0, carbs:0, fat:0});
    trySet(TODAY_LOG_KEY, foodLog);
    updateLogDisplay();
  }
  inp.disabled = false;
  inp.focus();
}

function removeLog(idx) {
  foodLog.splice(idx, 1);
  trySet(TODAY_LOG_KEY, foodLog);
  updateMacroDisplay(profile);
  updateLogDisplay();
}

function updateMacroDisplay(p) {
  // Re-render the macro card
  const card = document.getElementById('macro-progress-card');
  if (!card) return;
  card.outerHTML = renderMacroProgress(p, foodLog);
  updateLogDisplay();
}

    const res = await fetch(API, {

Generate 7 days Mon-Sun. Training days: higher carb. Rest days: lower carb, same protein. Match cuisine preferences throughout. Vary meals — no repeated dinners.`;

  try {
    const res = await fetch(API, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        model: MODEL, max_tokens: 4000,
        system: 'You are a performance nutritionist. Return only valid JSON.',
        messages: [{role:'user',content:prompt}],
      }),
    });
    const data = await res.json();
    const text = (data.content||[]).map(b=>b.text||'').join('');
    const match = text.match(/\{[\s\S]*\}/);
    if (!match) throw new Error('No JSON');
    weekMeals = JSON.parse(match[0]);
    trySet(WEEK_MEALS_KEY, weekMeals);
    renderWeekMeals(weekMeals, p);

    // Also generate shopping list from these meals
    generateShoppingFromMeals(weekMeals, p);
  } catch(e) {
    console.error('Week meals error:', e);
    document.getElementById('week-meal-grid-wrap').innerHTML =
      `<div style="text-align:center;padding:60px;color:var(--dk-3);font-size:13px;">
        Could not generate week plan.
        <button onclick="loadWeekMeals(profile)" style="color:var(--amber);background:none;border:none;cursor:pointer;text-decoration:underline;">Try again</button>
      </div>`;
  }
}

function renderWeekMeals(plan, p) {
  const wrap = document.getElementById('week-meal-grid-wrap');
  if (!wrap) return;
  window._weekMeals = plan.days || [];

  const cols = (plan.days||[]).map((day, di) => {
    const isT = day.type === 'training';
    const isTD = DAY_NAMES[todayIdx] === day.day;
    const cls = isTD ? 'is-today' : isT ? 'training-day' : 'rest-day';

    const mealSlots = (day.meals||[]).map((m,mi) => `
      <div class="wdc-meal" onclick="openMealModal(${mi}, 'week', ${di})">
        <div class="wdc-meal-name">${m.name||'—'}</div>
        <div class="wdc-meal-macros">${m.calories||'—'} kcal · ${m.protein||'—'}g P</div>
        <button class="wdc-meal-swap" onclick="event.stopPropagation();swapMeal(${di},${mi})" title="Swap this meal">⟳</button>
      </div>`).join('');

    const totalCal = (day.meals||[]).reduce((a,m)=>a+(m.calories||0),0);

    return `<div class="week-day-col ${cls}">
      <div class="wdc-head">
        <div class="wdc-name ${isTD?'today':isT?'training':''}">${day.day.slice(0,3)}${isTD?' ·':''}</div>
        <div class="wdc-kcal">${totalCal||'—'} kcal</div>
      </div>
      <div class="wdc-meals">${mealSlots}</div>
    </div>`;
  }).join('');

  wrap.innerHTML = `<div class="week-meal-grid">${cols}</div>`;
}

// ── SHOPPING LIST ─────────────────────────────────────────
async function loadShoppingList() {
  const cached = tryGet(SHOP_KEY);
  if (cached) { renderShoppingList(cached); return; }

  if (weekMeals) {
    await generateShoppingFromMeals(weekMeals, profile);
  } else {
    document.getElementById('shop-content').innerHTML =
      `<div style="text-align:center;padding:60px;color:var(--dk-3);font-size:13px;">
        Generate your week plan first — shopping list is derived from it.
        <button onclick="switchFood('week',document.querySelectorAll('.food-tab')[1]);loadWeekMeals(profile)"
          style="display:block;margin:16px auto 0;color:var(--amber);background:none;border:1px solid var(--amber-br);
          border-radius:4px;padding:9px 20px;cursor:pointer;font-size:11px;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;font-family:var(--sans);">
          Generate week plan →
        </button>
      </div>`;
  }
}

async function generateShoppingFromMeals(meals, p) {
  if (!meals || !meals.days) return;

  // Collect all ingredients
  const allIngredients = [];
  (meals.days||[]).forEach(day => {
    (day.meals||[]).forEach(meal => {
      (meal.ingredients||[]).forEach(ing => {
        allIngredients.push({ ...ing, meal: meal.name, day: day.day });
      });
    });
  });

  const prompt = `Consolidate this list of weekly meal ingredients into a clean shopping list.

INGREDIENTS FROM WEEK PLAN:
${allIngredients.map(i=>`${i.quantity} ${i.name} (for ${i.meal}, ${i.day})`).join('\n')}

PERSON:
Diet: ${p.dietType||'no restrictions'} | Exclude: ${(p.foodExclusions||[]).join(', ')||'none'}
Cuisine preferences: ${(p.cuisinePrefs||[]).join(', ')||'neutral'}

Consolidate duplicates, add up quantities where possible. Organise by supermarket category.

Return ONLY JSON:
{
  "categories": [
    {
      "name": "Protein",
      "icon": "🥩",
      "items": [
        { "name": "Chicken breast", "quantity": "1.4kg", "meals": ["Lunch Mon", "Dinner Wed"] }
      ]
    }
  ]
}

Categories: Protein, Dairy & eggs, Produce, Grains & carbs, Pantry & condiments, Supplements & extras.
Every ingredient from the week plan must appear somewhere.`;

  try {
    const res = await fetch(API, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        model: MODEL, max_tokens: 2000,
        system: 'You are a nutritionist organising a shopping list. Return only valid JSON.',
        messages: [{role:'user',content:prompt}],
      }),
    });
    const data = await res.json();
    const text = (data.content||[]).map(b=>b.text||'').join('');
    const match = text.match(/\{[\s\S]*\}/);
    if (!match) throw new Error('No JSON');
    shopList = JSON.parse(match[0]);
    trySet(SHOP_KEY, shopList);
    renderShoppingList(shopList);
  } catch(e) {
    console.error('Shopping list error:', e);
  }
}

function renderShoppingList(list) {
  const el = document.getElementById('shop-content');
  if (!el) return;

  // Load checked state
  const checked = tryGet('bl_shop_checked') || {};

  const catsHTML = (list.categories||[]).map(cat => {
    const items = (cat.items||[]).map((item,i) => {
      const key = cat.name + '_' + i;
      const isChecked = checked[key];
      return `<div class="shop-item ${isChecked?'checked':''}" onclick="toggleShopItem('${key}', this)">
        <div class="shop-item-check">${isChecked?'✓':''}</div>
        <div>
          <div class="shop-item-name">${item.name}</div>
          ${item.meals ? `<div class="shop-item-meals">${item.meals.join(', ')}</div>` : ''}
        </div>
        <div class="shop-item-qty">${item.quantity||''}</div>
      </div>`;
    }).join('');

    return `<div class="shop-cat">
      <div class="shop-cat-title">${cat.icon||'🛒'} ${cat.name}</div>
      ${items}
    </div>`;
  }).join('');

  el.innerHTML = `
    <div style="margin-bottom:16px;font-size:13px;font-weight:300;color:var(--dk-3);">
      Derived from your week meal plan · Tap items to check off as you shop
    </div>
    <div class="shop-categories">${catsHTML}</div>
    <div style="margin-top:24px;display:flex;gap:8px;">
      <button class="shop-btn" onclick="clearShopChecked()">Clear all checks</button>
    </div>`;
}

function toggleShopItem(key, el) {
  el.classList.toggle('checked');
  const checked = tryGet('bl_shop_checked') || {};
  if (el.classList.contains('checked')) {
    checked[key] = true;
    el.querySelector('.shop-item-check').textContent = '✓';
  } else {
    delete checked[key];
    el.querySelector('.shop-item-check').textContent = '';
  }
  trySet('bl_shop_checked', checked);
}

function clearShopChecked() {
  trySet('bl_shop_checked', {});
  loadShoppingList();
}

// ── MEAL MODAL ────────────────────────────────────────────
function openMealModal(mealIdx, source, dayIdx) {
  let meal;
  if (source === 'today') {
    meal = (window._todayMeals||[])[mealIdx];
  } else if (source === 'week') {
    meal = ((window._weekMeals||[])[dayIdx]?.meals||[])[mealIdx];
  }
  if (!meal) return;

  const modal = document.getElementById('meal-modal');
  const inner = document.getElementById('meal-modal-inner');

  inner.innerHTML = `
    <button class="mm-close" onclick="closeMealModal()">×</button>
    <div class="mm-meal-name">${meal.name||'—'}</div>
    <div class="mm-meal-type">${meal.type||''} · ${meal.time||''}</div>
    <div class="mm-macros">
      <div class="mm-macro"><div class="mm-macro-val">${meal.calories||'—'}</div><div class="mm-macro-label">Calories</div></div>
      <div class="mm-macro"><div class="mm-macro-val">${meal.protein||'—'}g</div><div class="mm-macro-label">Protein</div></div>
      <div class="mm-macro"><div class="mm-macro-val amber">${meal.carbs||'—'}g</div><div class="mm-macro-label">Carbs</div></div>
      <div class="mm-macro"><div class="mm-macro-val slate">${meal.fat||'—'}g</div><div class="mm-macro-label">Fat</div></div>
    </div>
    ${meal.ingredients && meal.ingredients.length ? `
      <div class="mm-section-label">Ingredients</div>
      ${meal.ingredients.map(i=>`
        <div class="mm-ingredient">
          <span class="mm-ing-name">${i.name}</span>
          <span class="mm-ing-qty">${i.quantity||''}</span>
        </div>`).join('')}` : ''}
    ${meal.prep ? `
      <div class="mm-section-label">How to make it</div>
      <div class="mm-instructions">${meal.prep}</div>` : ''}
    ${meal.why ? `<div class="mm-why">${meal.why}</div>` : ''}
    <button class="mm-swap-btn" onclick="closeMealModal();swapMeal(${dayIdx||0},${mealIdx})">⟳ Swap this meal</button>`;

  modal.classList.add('open');
}

function closeMealModal() {
  document.getElementById('meal-modal').classList.remove('open');
}

document.getElementById('meal-modal').addEventListener('click', e => {
  if (e.target === document.getElementById('meal-modal')) closeMealModal();
});

async function swapMeal(dayIdx, mealIdx) {
  if (!weekMeals || !weekMeals.days || !weekMeals.days[dayIdx]) return;
  const day   = weekMeals.days[dayIdx];
  const meal  = day.meals[mealIdx];
  const p     = profile;

  const prompt = `Suggest ONE alternative meal to replace: "${meal.name}" (${meal.type}, ${meal.calories} kcal, ${meal.protein}g protein).

Day: ${day.day} (${day.type})
Person: ${p.name} | Goal: ${p.goal}
Cuisine: ${(p.cuisinePrefs||[]).join(', ')||'neutral'} | Style: ${p.cookingApproach||'standard'} | Complexity: ${p.recipeComplexity||'standard'}
Exclude: ${(p.foodExclusions||[]).join(', ')||'none'} | Avoid: ${p.triggerFoods||'none'}

Return ONLY JSON for ONE meal:
{"type":"${meal.type}","name":"new meal name","calories":0,"protein":0,"carbs":0,"fat":0,"ingredients":[{"name":"item","quantity":"200g"}],"prep":"2-3 sentence instructions","why":"why this swap"}`;

  try {
    const res = await fetch(API, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ model:MODEL, max_tokens:600,
        system:'Return only valid JSON for a single meal.',
        messages:[{role:'user',content:prompt}] }),
    });
    const data = await res.json();
    const text = (data.content||[]).map(b=>b.text||'').join('');
    const match = text.match(/\{[^]*\}/);
    if (match) {
      const newMeal = JSON.parse(match[0]);
      weekMeals.days[dayIdx].meals[mealIdx] = newMeal;
      trySet(WEEK_MEALS_KEY, weekMeals);
      renderWeekMeals(weekMeals, p);
    }
  } catch(e) { console.error('Swap error:', e); }
}

// ── REGENERATE ────────────────────────────────────────────
function regenerateTodayMeals() {
  localStorage.removeItem('bl_today_meals_' + new Date().toISOString().slice(0,10));
  document.getElementById('today-meals-col').innerHTML =
    `<div class="food-loading" id="today-loading">
      <div class="food-spinner"></div>
      <div class="food-loading-text">Generating new meal ideas…</div>
    </div>`;
  loadTodayMeals(profile);
}

function regenerateWeek() {
  localStorage.removeItem(WEEK_MEALS_KEY);
  localStorage.removeItem(SHOP_KEY);
  weekMeals = null;
  document.getElementById('week-meal-grid-wrap').innerHTML =
    `<div class="food-loading"><div class="food-spinner"></div><div class="food-loading-text">Generating new week…</div></div>`;
  loadWeekMeals(profile);
}

function regenerateShop() {
  localStorage.removeItem(SHOP_KEY);
  shopList = null;
  document.getElementById('shop-content').innerHTML =
    `<div class="food-loading"><div class="food-spinner"></div><div class="food-loading-text">Rebuilding shopping list…</div></div>`;
  if (weekMeals) generateShoppingFromMeals(weekMeals, profile);
  else loadWeekMeals(profile);
}

// ── UTILS ─────────────────────────────────────────────────
function switchFood(id, btn) {
  document.querySelectorAll('.food-pane').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.food-tab').forEach(b=>b.classList.remove('active'));
  document.getElementById('fpane-' + id).classList.add('active');
  if (btn) btn.classList.add('active');
}

function printShop() { window.print(); }

document.getElementById('log-input') && document.getElementById('log-input').addEventListener('keydown', e=>{
  if(e.key==='Enter') logItem();
});
</script>
