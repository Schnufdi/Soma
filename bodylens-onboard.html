<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>BodyLens — Get Started</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=Space+Grotesk:wght@300;400;500;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="ob-shell" id="ob-shell">

  <div class="ob-header">
    <div class="ob-brand">Body<em>Lens</em></div>
    <div class="ob-step" id="ob-step"></div>
  </div>

  <div class="ob-progress">
    <div class="ob-progress-fill" id="ob-progress" style="width:0%"></div>
  </div>

  <div class="ob-messages" id="ob-messages"></div>
  <div class="ob-chips" id="ob-chips"></div>

  <div class="ob-input-bar" id="ob-input-bar">
    <div class="ob-input-inner">
      <input class="ob-input" id="ob-input" type="text"
        placeholder="Type your answer…"
        autocomplete="off" autocorrect="off" autocapitalize="sentences">
      <button class="ob-send" id="ob-send">&#x2191;</button>
    </div>
  </div>

</div>

<script>
// ══════════════════════════════════════════════════════
//  BodyLens Onboarding
//  The AI speaks first and drives the conversation.
//  No wizard steps. Pure conversation.
//  Profile is extracted from the dialogue by Claude.
// ══════════════════════════════════════════════════════

const API = '/api/chat';
const MODEL = 'claude-sonnet-4-20250514';

// ── REDIRECT IF PROFILE EXISTS ─────────────────────────
try {
  const p = localStorage.getItem('bl_profile');
  if (p && JSON.parse(p).name) {
    location.replace('bodylens-day.html');
  }
} catch(e) {}

// ── CONVERSATION STATE ─────────────────────────────────
let history = [];       // full conversation for context
let profileData = {};   // extracted so far
let turnCount = 0;
let generating = false;

// ── SYSTEM PROMPT ──────────────────────────────────────
// The AI's role during onboarding.
// It asks coach questions, extracts data, and when ready
// returns a special JSON block to trigger programme generation.
const ONBOARD_SYSTEM = `You are the BodyLens intake coach. Your job is to have a natural conversation to understand someone's body, goals, lifestyle, and constraints — well enough to build them a complete personalised programme.

You are warm, direct, and expert. You ask one question at a time. You listen carefully. You pick up on what people say and probe deeper when something important comes up — especially around injuries, emotional eating, or lifestyle constraints.

WHAT YOU NEED TO COLLECT (through conversation, not a form):
1. Name
2. Age, height, current weight, estimated body fat if they know it
3. Sex (for hormonal calibration)
4. What they want to look like — specific, not just "lose weight"
5. Where they store fat
6. Energy patterns through the day (do they crash? can they skip meals?)
7. Eating window — do they eat breakfast or fast until later?
8. Trigger foods — anything they can't keep in the house
9. Emotional eating patterns — what happens when stressed?
10. Diet type and food exclusions
11. Cooking habits and flavour preferences
12. Training experience and current level
13. How many days per week they can genuinely train
14. Wake time
15. Gym access and equipment
16. Recovery tools available (sauna, pool, cold plunge, steam room)
17. Alcohol habits
18. INJURIES — this is critical. Current and historical. What hurts, what movements make it worse, any sharp pain history. Probe this thoroughly.
19. Non-negotiables — things the programme works around, not eliminates
20. Anything else they want you to know

TONE:
- Warm but not fluffy
- Ask follow-up questions when something matters
- If they mention an injury, always probe deeper — location, duration, what makes it worse
- If they mention a trigger food, acknowledge it without judgement
- Never ask more than one question at a time
- Keep responses concise — this is a conversation, not a lecture

PROGRESS:
After each response, internally track what you still need. When you have collected all 20 items (or enough to build a solid programme), instead of asking another question, output EXACTLY this:

[PROFILE_COMPLETE]
Then on the next line, a valid JSON object with everything you've collected:
{
  "name": "",
  "age": 0,
  "sex": "",
  "height": 0,
  "weight": 0,
  "bodyFat": null,
  "fatStorage": "",
  "goal": "",
  "target": "",
  "energyPattern": "",
  "eatingWindow": "",
  "triggerFoods": "",
  "emotionalEating": "",
  "dietType": "",
  "foodExclusions": [],
  "cookingHabits": "",
  "experience": "",
  "trainingDays": 0,
  "wakeTime": "",
  "gymAccess": "",
  "recoveryTools": [],
  "alcoholHabit": "",
  "injuries": [{"location":"","detail":"","movementsThatHurt":[],"sharp":false}],
  "nonNegotiables": [],
  "notes": ""
}

Start the conversation now. Introduce yourself briefly and ask the first question. Be natural. Don't mention steps or numbers.`;

// ── RENDER HELPERS ─────────────────────────────────────
function addBubble(role, html) {
  const msgs = document.getElementById('ob-messages');
  const wrap = document.createElement('div');
  wrap.className = `ob-msg ${role}`;

  const avatar = document.createElement('div');
  avatar.className = 'ob-avatar';
  avatar.textContent = role === 'ai' ? 'BL' : (profileData.name ? profileData.name[0].toUpperCase() : 'U');

  const bubble = document.createElement('div');
  bubble.className = 'ob-bubble';
  bubble.innerHTML = html;

  wrap.appendChild(avatar);
  wrap.appendChild(bubble);
  msgs.appendChild(wrap);
  msgs.scrollTop = msgs.scrollHeight;
  return wrap;
}

function addTyping() {
  const msgs = document.getElementById('ob-messages');
  const wrap = document.createElement('div');
  wrap.className = 'ob-msg ai ob-typing';
  wrap.id = 'typing';
  wrap.innerHTML = `
    <div class="ob-avatar">BL</div>
    <div class="ob-bubble">
      <div class="ob-dots"><span></span><span></span><span></span></div>
    </div>`;
  msgs.appendChild(wrap);
  msgs.scrollTop = msgs.scrollHeight;
}

function removeTyping() {
  const t = document.getElementById('typing');
  if (t) t.remove();
}

function setProgress(pct) {
  document.getElementById('ob-progress').style.width = Math.min(pct, 95) + '%';
}

function setChips(chips) {
  const c = document.getElementById('ob-chips');
  c.innerHTML = '';
  (chips || []).forEach(chip => {
    const btn = document.createElement('button');
    btn.className = 'ob-chip';
    btn.textContent = chip;
    btn.onclick = () => {
      document.getElementById('ob-input').value = chip;
      send();
    };
    c.appendChild(btn);
  });
}

// ── CHIP SUGGESTIONS ───────────────────────────────────
// Based on turn count, show contextual chips
function getChips(turn) {
  const sets = [
    [],
    ['Male', 'Female'],
    [],
    ['Around 10%', 'Around 12-13%', 'Around 15-18%', 'Around 20%+', 'Not sure'],
    ['Love handles / lower back', 'Belly', 'Chest', 'All over'],
    ['I crash mid-morning', 'I crash after lunch', 'Pretty stable', 'I can skip meals easily'],
    ['I eat breakfast early', 'I skip breakfast — first meal at lunch', 'Intermittent fasting', 'Varies'],
    ['Bread', 'Crisps / snacks', 'Chocolate', 'Takeaways', 'Nothing — good discipline'],
    ['Carbs / comfort food', 'I drink more', 'I eat more generally', 'Nothing changes'],
    ['No restrictions', 'No red meat', 'No dairy', 'Vegetarian', 'Vegan'],
    [],
    ['Just starting', '1-2 years', '2-3 years', '3-5 years', '5+ years — advanced'],
    ['3 days', '4 days', '5 days', '6 days'],
    ['05:30', '06:00', '06:30', '07:00', '07:30', '08:00+'],
    ['Full commercial gym', 'Home gym', 'Bodyweight only'],
    ['Sauna', 'Swimming pool', 'Cold plunge', 'Steam room', 'Hydro pool', 'None'],
    ['I rarely drink', '1-2 per week', 'Social — weekends', 'Several nights a week'],
    ['No injuries', 'Knee', 'Lower back', 'Shoulder', 'Hip', 'Multiple'],
    [],
    ['Morning coffee', 'Social drinks', 'Family evenings', 'Fully flexible'],
  ];
  return sets[turn] || [];
}

// ── API CALL ───────────────────────────────────────────
async function callClaude(userMessage) {
  if (userMessage) {
    history.push({ role: 'user', content: userMessage });
  }

  const res = await fetch(API, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: MODEL,
      max_tokens: 600,
      system: ONBOARD_SYSTEM,
      messages: history,
    }),
  });

  const data = await res.json();
  const text = data.content?.map(b => b.text || '').join('') || '';
  history.push({ role: 'assistant', content: text });
  return text;
}

// ── SEND ───────────────────────────────────────────────
async function send() {
  const inp = document.getElementById('ob-input');
  const val = inp.value.trim();
  if (!val || generating) return;

  inp.value = '';
  document.getElementById('ob-chips').innerHTML = '';
  document.getElementById('ob-send').disabled = true;

  addBubble('user', val);
  addTyping();
  generating = true;

  try {
    const reply = await callClaude(val);
    removeTyping();

    // Check if profile is complete
    if (reply.includes('[PROFILE_COMPLETE]')) {
      await handleProfileComplete(reply);
      return;
    }

    // Normal conversation turn
    turnCount++;
    const clean = reply.replace(/\[PROFILE_COMPLETE\]/g, '').trim();
    addBubble('ai', clean.replace(/\n/g, '<br>'));
    setProgress(Math.min(95, turnCount * 5));
    setChips(getChips(turnCount));

    // Update name chip avatar if we got a name
    const nameMatch = clean.match(/(?:nice to meet you|great to meet you|hello|hi),?\s+([A-Z][a-z]+)/i);
    if (nameMatch && !profileData.name) {
      profileData.name = nameMatch[1];
    }

  } catch(err) {
    removeTyping();
    addBubble('ai', 'Connection issue — please check your network and try again.');
    console.error(err);
  }

  generating = false;
  document.getElementById('ob-send').disabled = false;
  document.getElementById('ob-input').focus();
}

// ── PROFILE COMPLETE ───────────────────────────────────
async function handleProfileComplete(reply) {
  generating = false;

  // Extract JSON from reply
  let extracted = {};
  try {
    const jsonMatch = reply.match(/\[PROFILE_COMPLETE\][\s\S]*?(\{[\s\S]*\})/);
    if (jsonMatch) {
      extracted = JSON.parse(jsonMatch[1]);
    }
  } catch(e) {
    console.error('Profile JSON parse error:', e);
  }

  // Merge extracted into profileData
  Object.assign(profileData, extracted);

  // Show transition message
  addBubble('ai', `That\'s everything I need, ${profileData.name || 'there'}.<br><br>I\'m going to build your programme now — macros, training split, supplements, daily structure. All derived from what you\'ve told me, the way a coach would reason through it.<br><br>Give me about 20 seconds.`);

  setProgress(100);
  document.getElementById('ob-input-bar').style.display = 'none';
  document.getElementById('ob-chips').innerHTML = '';

  await delay(1500);
  await buildProgramme();
}

// ── PROGRAMME GENERATION ───────────────────────────────
async function buildProgramme() {
  // Show progress
  const genDiv = document.createElement('div');
  genDiv.className = 'ob-msg ai';
  genDiv.innerHTML = `
    <div class="ob-avatar">BL</div>
    <div class="ob-bubble">
      <div style="display:flex;flex-direction:column;gap:8px;font-size:12px;color:var(--dk-3);min-width:220px;">
        <div id="gs1">⏳ Calculating your macro targets…</div>
        <div id="gs2" style="opacity:0.3">⏳ Designing your training split…</div>
        <div id="gs3" style="opacity:0.3">⏳ Building injury modifications…</div>
        <div id="gs4" style="opacity:0.3">⏳ Programming your supplement stack…</div>
        <div id="gs5" style="opacity:0.3">⏳ Writing your instructions…</div>
      </div>
    </div>`;
  document.getElementById('ob-messages').appendChild(genDiv);
  document.getElementById('ob-messages').scrollTop = 99999;

  const tick = (id, label, ms) => setTimeout(() => {
    const el = document.getElementById(id);
    if (el) { el.textContent = '✓ ' + label; el.style.color = 'var(--jade)'; el.style.opacity = '1'; }
  }, ms);

  tick('gs1', 'Macro targets calculated', 800);
  tick('gs2', 'Training split designed', 3500);
  tick('gs3', 'Injury modifications built', 6500);
  tick('gs4', 'Supplement stack programmed', 9500);
  tick('gs5', 'Instructions compiled', 13000);

  try {
    const programme = await generateFullProgramme();
    await delay(14500);

    // Save everything
    const finalProfile = {
      ...profileData,
      ...programme.profile,
      weekPlan:    programme.weekPlan,
      supplements: programme.supplements,
      injuryAssessments: programme.injuries || [],
      coachSummary: programme.coachSummary || '',
      instructions: programme.instructions || '',
      generated: true,
      generatedAt: new Date().toISOString(),
    };

    localStorage.setItem('bl_profile', JSON.stringify(finalProfile));

    // Go to day page
    location.replace('bodylens-day.html');

  } catch(err) {
    console.error('Generation error:', err);
    // Save what we have with fallback macros
    const fallback = buildFallback();
    const finalProfile = {
      ...profileData,
      ...fallback,
      generated: true,
      generatedAt: new Date().toISOString(),
    };
    localStorage.setItem('bl_profile', JSON.stringify(finalProfile));
    location.replace('bodylens-day.html');
  }
}

// ── FULL PROGRAMME GENERATOR ───────────────────────────
async function generateFullProgramme() {
  const p = profileData;

  const prompt = `Based on this coaching conversation, build a complete personalised programme. Reason like a senior coach — derive everything from their actual situation, don't use generic templates.

PROFILE DATA COLLECTED:
${JSON.stringify(p, null, 2)}

Return ONLY a valid JSON object with this exact structure:
{
  "profile": {
    "goal": "derived primary goal in plain English",
    "calories": 0,
    "protein": 0,
    "carbs": 0,
    "fat": 0,
    "tdee": 0,
    "calorieReasoning": "2-3 sentences explaining how you arrived at this target and why",
    "proteinReasoning": "1-2 sentences",
    "fastingWindow": "e.g. 12:00-20:00 or Flexible",
    "mealCount": 3,
    "keyFoodPrinciples": ["principle 1", "principle 2", "principle 3"],
    "foodsToAvoid": ["item"],
    "triggerStrategy": "1-2 sentences on managing their specific triggers"
  },
  "weekPlan": [
    {
      "day": "Monday",
      "type": "Push",
      "focus": "Chest, shoulders, triceps",
      "kcal": 0,
      "priority": "training",
      "keyExercises": ["Bench press 4x8-10", "OHP 3x10", "Lateral raise 3x15"],
      "modifications": ["any injury-specific modification"],
      "coachNote": "one sentence on what matters most today"
    }
  ],
  "injuries": [
    {
      "location": "area",
      "assessment": "coach's assessment of what this is and what it means for training",
      "avoidMovements": ["specific movement to avoid"],
      "safeAlternatives": ["safer alternative with same stimulus"],
      "rehabilitationNotes": "what to do over time to address it"
    }
  ],
  "supplements": [
    {
      "name": "supplement name",
      "dose": "exact dose",
      "timing": "exact timing relative to wake time and training",
      "reason": "one sentence mechanistic reason specific to this person"
    }
  ],
  "coachSummary": "3-4 sentences: your overall read on this person, their biggest lever, and the one thing that will make or break their progress",
  "instructions": "Write a complete Instructions document for this person in the same style as a detailed personal training brief. Include: Workout Objective, Goals (as bullet points), Approach (as bullet points covering training, cardio, recovery, nutrition strategy), Current Baseline (age, height, weight, body fat, fat storage, strengths, weaknesses derived from conversation), Injuries section (detailed, with movement restrictions and modifications), Non-Negotiables (their fixed points), Food Philosophy (proteins, carbs, fats, cooking method, exclusions, flavour preferences), Meal Rhythm (eating window, meal count, macro targets), and an Efficiency Rule. Write it as a proper coaching document — clear, specific, actionable. This will be stored as their Instructions tab."
}

weekPlan must have exactly 7 entries (Monday to Sunday).
Make the injuries section thorough — if they mentioned any pain or injury, give a proper coach assessment.
The instructions field should be comprehensive — this is their programme bible.`;

  const res = await fetch(API, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: MODEL,
      max_tokens: 3000,
      system: 'You are a senior performance coach. Return only valid JSON. No preamble, no explanation, no markdown fences.',
      messages: [{ role: 'user', content: prompt }],
    }),
  });

  const data = await res.json();
  const text = data.content?.map(b => b.text || '').join('') || '';
  const jsonMatch = text.match(/\{[\s\S]*\}/);
  if (!jsonMatch) throw new Error('No JSON in response');
  return JSON.parse(jsonMatch[0]);
}

// ── FALLBACK ───────────────────────────────────────────
function buildFallback() {
  const p = profileData;
  const w = p.weight || 80, age = p.age || 35;
  const sex = p.sex || 'Male';
  const bmr = sex === 'Male'
    ? 10*w + 6.25*(p.height||175) - 5*age + 5
    : 10*w + 6.25*(p.height||165) - 5*age - 161;
  const tdee = Math.round(bmr * 1.65);
  const goal = (p.goal || p.target || '').toLowerCase();
  const calories = goal.includes('los') || goal.includes('cut') ? tdee - 350 : tdee + 150;
  const protein = Math.round(w * 2.0);
  const fat = Math.round(w * 1.0);
  const carbs = Math.max(80, Math.round((calories - protein*4 - fat*9) / 4));
  const k = calories, r = Math.round(k * 0.9);

  return {
    calories, protein, carbs, fat, tdee,
    weekPlan: [
      {day:'Monday',   type:'Push',           focus:'Chest, shoulders, triceps', kcal:k, priority:'training', keyExercises:['Bench press 4x8','OHP 3x10','Lateral raise 3x15'], modifications:[], coachNote:'CNS freshest. Heaviest pressing session.'},
      {day:'Tuesday',  type:'Rest',            focus:'Recovery and nutrition',    kcal:r, priority:'rest',     keyExercises:[], modifications:[], coachNote:'MPS from Monday peaks today. Hit protein.'},
      {day:'Wednesday',type:'Pull',            focus:'Back, biceps, rear delts',  kcal:k, priority:'training', keyExercises:['Pull-ups 4x6','Row 3x10','Face pull 3x15'], modifications:[], coachNote:'Pull-ups first while CNS is fresh.'},
      {day:'Thursday', type:'Rest',            focus:'Recovery and prep',          kcal:r, priority:'rest',     keyExercises:[], modifications:[], coachNote:'Thursday evening protected.'},
      {day:'Friday',   type:'Posterior Chain', focus:'Glutes, hamstrings',        kcal:Math.round(k*1.03), priority:'training', keyExercises:['Hip thrust 4x10','RDL 3x8','Step-up 3x12'], modifications:[], coachNote:'Most important session. Collagen 45min before.'},
      {day:'Saturday', type:'Upper',           focus:'Full upper strength',        kcal:k, priority:'training', keyExercises:['Shoulder press 4x8','Row 3x10','Arms superset'], modifications:[], coachNote:'Second stimulus for upper body.'},
      {day:'Sunday',   type:'Rest',            focus:'Full rest',                  kcal:r, priority:'rest',     keyExercises:[], modifications:[], coachNote:'Complete the week.'},
    ],
    supplements: [
      {name:'Creatine monohydrate', dose:'5g', timing:'Daily, any time', reason:'Phosphocreatine resynthesis. 5-15% strength improvement.'},
      {name:'Omega-3 EPA/DHA',      dose:'2-3g', timing:'With largest meal', reason:'COX pathway suppression. Reduces inflammation. Amplifies MPS.'},
      {name:'Vitamin D3 + K2',      dose:'3000IU + 100mcg', timing:'With fat meal', reason:'UK latitude produces near-universal deficiency Oct-Apr.'},
      {name:'Magnesium glycinate',  dose:'400mg', timing:'30min before sleep', reason:'GABA receptor cofactor. Enables deep slow-wave sleep for GH pulse.'},
      {name:'L-Theanine',           dose:'200mg', timing:'With every coffee', reason:'Removes caffeine anxiety while preserving focus.'},
    ],
    injuryAssessments: [],
    coachSummary: '',
    instructions: `Workout Objective:\n${p.target || 'Optimise body composition and performance.'}\n\nCurrent Baseline:\n- Age: ${p.age || '—'}\n- Height: ${p.height || '—'}cm\n- Weight: ${p.weight || '—'}kg\n- Body fat: ${p.bodyFat ? p.bodyFat + '%' : 'Not assessed'}\n- Fat storage: ${p.fatStorage || '—'}\n\nNon-Negotiables:\n${(p.nonNegotiables || []).map(n => '- ' + n).join('\n') || '- None specified'}\n\nMacro targets:\n- Calories: ${calories} kcal/day\n- Protein: ${protein}g\n- Carbs: ${carbs}g\n- Fat: ${fat}g`,
  };
}

// ── UTILITIES ──────────────────────────────────────────
function delay(ms) { return new Promise(r => setTimeout(r, ms)); }

// ── INIT ───────────────────────────────────────────────
// Wire up input
document.getElementById('ob-send').onclick = send;
document.getElementById('ob-input').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
});

// The AI speaks first
async function init() {
  addTyping();
  try {
    const opening = await callClaude(null);
    removeTyping();
    addBubble('ai', opening.replace(/\n/g, '<br>'));
    turnCount = 1;
    setProgress(5);
    setTimeout(() => document.getElementById('ob-input').focus(), 100);
  } catch(e) {
    removeTyping();
    addBubble('ai', "Hi — I'm your BodyLens coach. I'm going to ask you a few questions to build your personal programme. Let's start simple. What's your name?");
    turnCount = 1;
  }
}

init();
</script>
</body>
</html>
